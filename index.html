<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrowSmart"/>
<link rel="manifest" href="manifest.json"/>
<title>GrowSmart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f0f;--surface:#161616;--card:#1c1c1c;--card2:#212121;
  --border:#2a2a2a;
  --green:#4caf70;--green-dk:#2d6e45;--green-bg:#0d1e0d;--green-hint:#3a6e4a;
  --blue:#5aabf0;--teal:#5adada;--teal-bg:#0e1a1a;--teal-bd:#1e3535;
  --red:#e06060;--red-bg:#2a0d0d;
  --text:#e0e0e0;--text-sub:#aaa;--text-muted:#666;--text-hint:#555;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
#app{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px;}
.scroll::-webkit-scrollbar{display:none;}
.topbar{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tb-title{font-size:14px;font-weight:500;color:var(--text);}
.app-title{font-size:17px;font-weight:600;color:var(--text);}
.icon-btn{background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px;}
.save-pill{background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:7px;padding:5px 12px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--font);}
.bottom-nav{background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 6px;cursor:pointer;background:none;border:none;opacity:0.45;}
.nav-btn.active{opacity:1;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;color:var(--green);font-weight:500;font-family:var(--font);}
.card{background:var(--card);border-radius:14px;border:0.5px solid var(--border);padding:14px;}
.sect-head{font-size:11px;color:var(--green);font-weight:500;letter-spacing:0.05em;padding:3px 0 2px;}
.stat-row{display:flex;gap:8px;}
.stat-box{flex:1;background:var(--surface);border-radius:10px;padding:10px 12px;}
.stat-lbl{font-size:11px;color:var(--text-hint);margin-bottom:2px;}
.stat-val{font-size:18px;font-weight:500;color:var(--text);}
.stat-unit{font-size:11px;color:var(--text-hint);}
.prog-bg{height:5px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.inp-wrap{display:flex;flex-direction:column;gap:3px;flex:1;}
.inp-label{font-size:11px;color:var(--text-hint);}
.inp-field{background:#1c1c1c;border:0.5px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text-sub);font-size:13px;font-family:var(--font);width:100%;outline:none;}
.inp-field:focus{border-color:var(--green-hint);}
.row2{display:flex;gap:8px;}
/* VPD */
.vpd-box{background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.vpd-val{font-size:20px;font-weight:500;color:var(--teal);font-family:var(--mono);}
.vpd-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;margin-top:3px;}
.vpd-scale{display:flex;height:5px;border-radius:3px;overflow:hidden;}
.vpd-seg{flex:1;}
.vpd-mrow{position:relative;height:8px;}
.vpd-marker{position:absolute;top:0;width:2px;height:9px;background:#fff;border-radius:2px;transition:left 0.3s;}
/* CALENDAR - larger cells */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:0.78;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;border:0.5px solid transparent;background:#181818;user-select:none;padding:2px;}
.cal-cell.today{border:2px solid #fff!important;}
.cal-num{font-size:14px;color:var(--text-sub);font-weight:700;line-height:1;}
.cal-cell.today .cal-num{color:#fff;}
.cal-tag{font-size:7.5px;color:rgba(255,255,255,0.65);line-height:1;margin-top:1px;text-align:center;}
.cal-icon{font-size:14px;line-height:1;margin-bottom:1px;}
.cal-dot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:2px;right:3px;background:rgba(255,255,255,0.7);}
/* NUTRIENT TABLE */
.nut-tbl-hdr{border-radius:10px 10px 0 0;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.nut-tbl-wrap{border:0.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.nut-tbl-head{display:grid;grid-template-columns:1fr 58px 60px;padding:5px 10px;border-bottom:0.5px solid var(--border);}
.nth{font-size:11px;font-weight:500;}
.nth:not(:first-child){text-align:right;}
.nut-row-tbl{display:grid;grid-template-columns:1fr 58px 60px;padding:5px 10px;border-bottom:0.5px solid #1e1e1e;align-items:center;}
.nut-row-tbl:last-child{border:none;}
.nut-row-tbl:nth-child(odd){background:#191919;}
.nut-row-tbl:nth-child(even){background:var(--surface);}
.nt-name{font-size:12px;color:#bbb;}
.nt-hint{font-size:12px;text-align:right;font-family:var(--mono);}
.nt-inp{background:#1e1e1e;border:0.5px solid var(--border);border-radius:5px;padding:3px 6px;color:#ddd;font-size:12px;font-family:var(--mono);width:56px;text-align:right;outline:none;}
.nt-inp:focus{border-color:var(--green-hint);}
/* NOTE */
.note-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;}
.note-ta{background:#1c1c1c;border:0.5px solid var(--border);border-radius:7px;padding:8px 10px;color:#aaa;font-size:12px;font-family:var(--font);width:100%;min-height:65px;resize:none;outline:none;line-height:1.6;}
.big-save{border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:500;color:#fff;width:100%;cursor:pointer;font-family:var(--font);}
/* ALERTS */
.alert{border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;border:0.5px solid transparent;}
/* SETTINGS */
.tab-row{display:flex;gap:6px;flex-wrap:wrap;}
.tab-item{display:flex;align-items:center;gap:6px;background:var(--surface);border-radius:8px;padding:6px 12px;border:0.5px solid var(--border);cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--font);}
.tab-item.sel{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.dur-grid{display:flex;flex-wrap:wrap;gap:8px;}
.dur-box{display:flex;flex-direction:column;gap:3px;width:calc(33% - 6px);}
.dur-lbl{font-size:11px;color:var(--text-hint);}
.dur-inp{background:var(--card2);border:0.5px solid var(--border);border-radius:7px;padding:6px;color:var(--text-sub);font-size:13px;text-align:center;width:100%;outline:none;font-family:var(--mono);}
.sub-head{font-size:11px;color:var(--text-hint);font-weight:500;margin-top:8px;margin-bottom:4px;}
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.sw{position:relative;width:44px;height:26px;cursor:pointer;}
.sw input{opacity:0;width:0;height:0;}
.sl{position:absolute;inset:0;background:#333;border-radius:26px;transition:0.2s;}
.sl:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#888;border-radius:50%;transition:0.2s;}
input:checked+.sl{background:var(--green-dk);}
input:checked+.sl:before{transform:translateX(18px);background:var(--green);}
.del-btn{display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;background:none;border:none;font-size:13px;color:var(--red);font-family:var(--font);}
.sec-tog{background:var(--card);border-radius:12px;border:0.5px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text);}
.sec-tog span{flex:1;}
.add-btn{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--font);}
.sav-btn{border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:500;color:#fff;width:100%;cursor:pointer;font-family:var(--font);margin-top:6px;}
/* COLOR/SYMBOL PICKER */
.pick-row{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0;}
.col-opt{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s;}
.col-opt.sel{border-color:#fff;transform:scale(1.2);}
.sym-opt{width:36px;height:36px;border-radius:10px;background:var(--card2);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.15s;}
.sym-opt.sel{border-color:#fff;transform:scale(1.15);}
/* DÜNGER PRODUCT CARD */
.prod-card{background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.prod-color{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
/* AI */
.ai-fetch-btn{background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:12px;padding:14px;text-align:center;cursor:pointer;font-size:14px;color:var(--green);font-weight:500;font-family:var(--font);width:100%;}
/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#ddd;padding:10px 22px;border-radius:22px;font-size:13px;z-index:9999;border:0.5px solid #444;pointer-events:none;opacity:0;transition:opacity 0.25s;white-space:nowrap;}
#toast.show{opacity:1;}
/* CTX MENU */
#ctx-m{position:fixed;z-index:9998;background:#1e1e1e;border:0.5px solid #3a3a3a;border-radius:14px;padding:6px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.7);display:none;}
#ctx-m.show{display:block;}
.ctx-item{padding:12px 16px;border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:10px;}
.ctx-item:active{background:#2a2a2a;}
.ctx-g{color:var(--green);}
.ctx-r{color:var(--red);}
.ctx-ic{font-size:15px;width:22px;text-align:center;}
.ctx-div{height:0.5px;background:#333;margin:4px 0;}
#ctx-ov{position:fixed;inset:0;z-index:9997;display:none;}
#ctx-ov.show{display:block;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 20px;text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="scr-dash">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">🌿 GrowSmart</span>
      <button class="icon-btn" onclick="openEntry(todayISO())">＋</button>
    </div>
    <div class="scroll" id="dash-body"></div>
    <nav class="bottom-nav" id="nav-dash"></nav>
  </div>
  <div class="screen" id="scr-cal">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button onclick="changeMonth(-1)" style="background:none;border:none;color:var(--green);font-size:28px;cursor:pointer;padding:0 10px;line-height:1">‹</button>
      <span style="font-size:16px;font-weight:500" id="cal-lbl">–</span>
      <button onclick="changeMonth(1)" style="background:none;border:none;color:var(--green);font-size:28px;cursor:pointer;padding:0 10px;line-height:1">›</button>
    </div>
    <div class="scroll" id="cal-body" style="padding:8px;gap:6px;"></div>
    <nav class="bottom-nav" id="nav-cal"></nav>
  </div>
  <div class="screen" id="scr-ai">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">✦ KI-Coach</span>
    </div>
    <div class="scroll" id="ai-body"></div>
    <nav class="bottom-nav" id="nav-ai"></nav>
  </div>
  <div class="screen" id="scr-set">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">Einstellungen</span>
    </div>
    <div class="scroll" id="set-body"></div>
    <nav class="bottom-nav" id="nav-set"></nav>
  </div>
  <div class="screen" id="scr-entry">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button class="icon-btn" id="entry-back" style="font-size:20px">←</button>
      <span class="tb-title" id="entry-ttl">Eintrag</span>
      <button class="save-pill" onclick="saveEntry()">Speichern</button>
    </div>
    <div class="scroll" id="entry-body"></div>
  </div>
  <!-- DÜNGER MANAGER SCREEN -->
  <div class="screen" id="scr-duenger">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button class="icon-btn" onclick="goTo('set')" style="font-size:20px">←</button>
      <span class="app-title">Meine Dünger</span>
      <button class="icon-btn" onclick="addProduct()">＋</button>
    </div>
    <div class="scroll" id="duenger-body"></div>
  </div>
</div>
<div id="ctx-ov" onclick="closeCtx()"></div>
<div id="ctx-m"></div>
<div id="toast"></div>
<script>
// ============================================================
// COLORS & SYMBOLS
// ============================================================
const COLORS=[
  {id:'g1',hex:'#4caf70',dk:'#071a0c'},{id:'g2',hex:'#5aabf0',dk:'#071422'},
  {id:'g3',hex:'#e8884a',dk:'#1e0e04'},{id:'g4',hex:'#b06ac8',dk:'#150820'},
  {id:'g5',hex:'#f0d050',dk:'#1e1a04'},{id:'g6',hex:'#e06060',dk:'#1e0606'},
  {id:'g7',hex:'#5adada',dk:'#041616'},{id:'g8',hex:'#a0c840',dk:'#101a04'},
];
const SYMS=['🌿','🌸','🍀','🌴','🌵','🍁','🌾','⭐','🔥','💎'];

// Default product colors for visual distinction
const PROD_COLORS=['#4caf70','#5aabf0','#e8884a','#b06ac8','#f0d050','#e06060','#5adada','#a0c840','#e0a0f0','#f0c080'];

// Phase names
const PN={anzucht:'Anzucht',bloom:'Blüte',flush:'Spülen',ice:'IceFlush',harvest:'Ernte',dry:'Trocknen'};

// Recommended intervals
const RI={anzucht:4,bloom:3,flush:2,ice:2};

// ============================================================
// STATE
// ============================================================
const SK='growsmart_v4';
let S={
  cycles:[],
  entries:{},
  // Custom fertilizer products
  products:[
    {id:'p1',name:'Grunddünger A',unit:'ml/L',color:'#4caf70',note:'Stickstoffbetont – Wachstum'},
    {id:'p2',name:'Blütedünger B',unit:'ml/L',color:'#e8884a',note:'Phosphor/Kalium – Blüte'},
    {id:'p3',name:'Wurzelstimulator',unit:'ml/L',color:'#5aabf0',note:'Anzucht & Vegetationsphase'},
    {id:'p4',name:'CalMag',unit:'ml/L',color:'#f0d050',note:'Calcium & Magnesium'},
  ],
  // Global week schedule: weekNum → {productId: dose}
  weekSchedule:{}
};

let tab='dash',calDate=new Date(),editISO=null,entryFrom='dash';
let showSch=false,showDung=false,selId=null,draft={},lastBack=0;
let editProd=null; // product being edited

function col(c){return COLORS.find(x=>x.id===c.colorId)||COLORS[0];}
function sym(c){return c.symbol||'🌿';}

function loadS(){
  try{
    for(const k of ['growsmart_v4','growsmart_v3','growsmart_v2','growsmart_data']){
      const s=localStorage.getItem(k);
      if(s){
        const p=JSON.parse(s);
        S=Object.assign({cycles:[],entries:{},products:S.products,weekSchedule:{}},p);
        // ensure products exist
        if(!S.products||!S.products.length)S.products=JSON.parse(JSON.stringify(defaultProducts()));
        if(!S.weekSchedule)S.weekSchedule={};
        break;
      }
    }
  }catch(e){}
  S.cycles.forEach((c,i)=>{
    if(!c.colorId)c.colorId=COLORS[i%COLORS.length].id;
    if(!c.symbol)c.symbol=SYMS[i%SYMS.length];
    if(!c.intAnzucht)c.intAnzucht=RI.anzucht;
    if(!c.intBloom)c.intBloom=RI.bloom;
    if(!c.intFlush)c.intFlush=RI.flush;
  });
}

function defaultProducts(){
  return[
    {id:'p1',name:'Grunddünger A',unit:'ml/L',color:'#4caf70',note:'Stickstoffbetont – Wachstum'},
    {id:'p2',name:'Blütedünger B',unit:'ml/L',color:'#e8884a',note:'Phosphor/Kalium – Blüte'},
    {id:'p3',name:'Wurzelstimulator',unit:'ml/L',color:'#5aabf0',note:'Anzucht & Vegetationsphase'},
    {id:'p4',name:'CalMag',unit:'ml/L',color:'#f0d050',note:'Calcium & Magnesium'},
  ];
}

function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ============================================================
// TOAST
// ============================================================
let toastT=null;
function toast(m,d=2200){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),d);}

// ============================================================
// GROW LOGIC
// ============================================================
function todayISO(){return new Date().toISOString().split('T')[0];}
function isoPlus(iso,d){const o=new Date(iso+'T12:00:00');o.setDate(o.getDate()+d);return o.toISOString().split('T')[0];}

function phase(iso,c){
  if(!c.startDate)return null;
  const diff=Math.floor((new Date(iso)-new Date(c.startDate))/86400000);
  if(diff<0)return null;
  const a=c.anzuchtDays||17,b=a+(c.bloomDays||66),f=b+(c.flushDays||9),
        i=f+(c.iceDays||6),h=i+(c.harvestDays||1),d=h+(c.dryDays||7);
  if(diff<a)return{ph:'anzucht',day:diff+1,week:Math.floor(diff/7)+1,total:d};
  if(diff<b)return{ph:'bloom',day:diff+1,week:Math.floor((diff-a)/7)+1,total:d};
  if(diff<f)return{ph:'flush',day:diff+1,week:null,total:d};
  if(diff<i)return{ph:'ice',day:diff+1,week:null,total:d};
  if(diff<h)return{ph:'harvest',day:diff+1,week:null,total:d};
  if(diff<=d)return{ph:'dry',day:diff+1,week:null,total:d};
  return null;
}

function getInt(c,ph){
  if(ph==='anzucht')return c.intAnzucht||RI.anzucht;
  if(ph==='flush')return c.intFlush||RI.flush;
  return c.intBloom||RI.bloom;
}

// Every watering day = Gießtag (always with nutrients based on week plan)
// Returns: null | 'giess' | 'spuelen' | 'ice' | 'ernte' | 'trocknen'
function getAction(iso,c){
  const p=phase(iso,c);
  if(!p)return null;
  if(p.ph==='harvest')return'ernte';
  if(p.ph==='dry')return'trocknen';
  if(p.ph==='ice')return'ice';
  if(p.ph==='flush')return'spuelen';
  const interval=getInt(c,p.ph);
  if((p.day-1)%interval!==0)return null;
  return'giess';
}

function isGiessTag(iso,c){return['giess','spuelen','ice'].includes(getAction(iso,c)||'');}

// Get week schedule for a given cycle/week
function getWeekDoses(cycleId,week){
  const c=S.cycles.find(x=>x.id===cycleId);
  const ownKey=cycleId+'_w'+week;
  // cycle-specific schedule overrides global
  if(S.weekSchedule[ownKey])return S.weekSchedule[ownKey];
  const glKey='global_w'+week;
  if(S.weekSchedule[glKey])return S.weekSchedule[glKey];
  return {};
}
function setWeekDoses(key,doses){S.weekSchedule[key]=doses;}

function nextGiessTag(c,fromISO){
  if(!c.active||!c.startDate)return null;
  for(let i=1;i<=30;i++){const iso=isoPlus(fromISO,i);if(isGiessTag(iso,c))return{iso,days:i};}
  return null;
}
function daysToHarvest(c){
  if(!c.startDate)return null;
  const hd=(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9)+(c.iceDays||6);
  const diff=Math.ceil((new Date(c.startDate).getTime()+hd*86400000-Date.now())/86400000);
  return diff>0?diff:0;
}
function active(){return S.cycles.filter(c=>c.active&&c.startDate);}

function getAlerts(c){
  const today=todayISO();const p=phase(today,c);if(!p||!c.active)return[];
  const out=[];
  const lastW=Object.keys(S.entries).filter(d=>d<=today&&S.entries[d]?.cycleData?.[c.id]?.water).sort().pop();
  if(lastW){
    const days=Math.floor((new Date(today)-new Date(lastW))/86400000);
    const iv=getInt(c,p.ph);
    if(days>iv+1)out.push({type:'warn',icon:'⚠️',title:`${sym(c)} Gießen überfällig`,text:`Letztes Gießen vor ${days} Tagen (Intervall: ${iv} Tage).`});
  }
  if(p.ph==='bloom'){
    const bloomDay=p.day-(c.anzuchtDays||17);
    const rem=(c.bloomDays||66)-bloomDay;
    if(rem>0&&rem<=7)out.push({type:'info',icon:'🚿',title:`${sym(c)} Spülung in ${rem} Tagen`,text:'Letzten Dünger kaufen – danach nur noch klares Wasser.'});
    if(p.week&&p.week>=7)out.push({type:'tip',icon:'🔬',title:`${sym(c)} Woche ${p.week} – Trichome checken`,text:'Lupe bereithalten. Auf bernsteinfarbene Trichome achten.'});
  }
  if(p.ph==='ice'||p.ph==='harvest')out.push({type:'success',icon:'✂️',title:`${sym(c)} Ernte nähert sich!`,text:'Trichome prüfen, Ernte-Equipment vorbereiten.'});
  return out;
}

function calcVPD(t,rh){if(isNaN(t)||isNaN(rh))return null;return Math.round(0.6108*Math.exp(17.27*t/(t+237.3))*(1-rh/100)*100)/100;}
function vpdZone(v){
  if(v===null)return null;
  if(v<0.4)return{label:'Zu feucht – Schimmel!',color:'#7a7af0',bg:'#1e1e3a',hint:'Belüftung erhöhen, Schimmelgefahr!',pct:Math.round(v/0.4*15)};
  if(v<0.8)return{label:'Anzucht – optimal',color:'#5aabf0',bg:'#0d1e2e',hint:'Ideal für Anzucht.',pct:Math.round(15+(v-0.4)/0.4*35)};
  if(v<1.2)return{label:'Blüte – optimal',color:'#4caf70',bg:'#0d1e0d',hint:'Perfekt für Blüte!',pct:Math.round(50+(v-0.8)/0.4*25)};
  if(v<1.6)return{label:'Etwas hoch',color:'#c8a04a',bg:'#2a1e0d',hint:'Luftfeuchtigkeit leicht erhöhen.',pct:Math.round(75+(v-1.2)/0.4*15)};
  return{label:'Pflanzenstress!',color:'#e06060',bg:'#2a0d0d',hint:'Sofort Luftfeuchtigkeit anpassen!',pct:Math.min(97,Math.round(90+(v-1.6)*10))};
}

function shiftFuture(cId,days){
  const today=todayISO();
  const keys=Object.keys(S.entries).filter(d=>d>=today).sort((a,b)=>days>0?b.localeCompare(a):a.localeCompare(b));
  const moves=[];
  keys.forEach(d=>{if(S.entries[d]?.cycleData?.[cId])moves.push({from:d,to:isoPlus(d,days),log:S.entries[d].cycleData[cId]});});
  moves.forEach(({from,to,log})=>{
    delete S.entries[from].cycleData[cId];
    if(!S.entries[to])S.entries[to]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[to].cycleData)S.entries[to].cycleData={};
    S.entries[to].cycleData[cId]=log;
  });
  Object.keys(S.entries).forEach(d=>{const e=S.entries[d];if(!e.temp&&!e.humidity&&!Object.keys(e.cycleData||{}).length)delete S.entries[d];});
}
function shiftAll(cId,days){
  const keys=Object.keys(S.entries).sort((a,b)=>days>0?b.localeCompare(a):a.localeCompare(b));
  const moves=[];
  keys.forEach(d=>{if(S.entries[d]?.cycleData?.[cId])moves.push({from:d,to:isoPlus(d,days),log:S.entries[d].cycleData[cId]});});
  moves.forEach(({from,to,log})=>{
    delete S.entries[from].cycleData[cId];
    if(!S.entries[to])S.entries[to]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[to].cycleData)S.entries[to].cycleData={};
    S.entries[to].cycleData[cId]=log;
  });
  Object.keys(S.entries).forEach(d=>{const e=S.entries[d];if(!e.temp&&!e.humidity&&!Object.keys(e.cycleData||{}).length)delete S.entries[d];});
}

const TABS=['dash','cal','ai','set'];

const TLBL={dash:'Übersicht',cal:'Kalender',ai:'KI-Coach',set:'Einst.'};
function buildNav(t){return TABS.map(x=>`<button class="nav-btn ${x===t?'active':''}" onclick="goTo('${x}')"><span class="nav-icon">${TICO[x]}</span><span class="nav-label">${TLBL[x]}</span></button>`).join('');}

function goTo(t){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr-'+t).classList.add('active');
  tab=t;
  const n=document.getElementById('nav-'+t);if(n)n.innerHTML=buildNav(t);
  if(t==='dash')renderDash();
  else if(t==='cal')renderCal();
  else if(t==='ai')renderAI();
  else if(t==='set')renderSet();
}

window.addEventListener('popstate',()=>{
  if(document.getElementById('scr-entry').classList.contains('active')){goTo(entryFrom);history.pushState(null,'',location.href);return;}
  if(document.getElementById('scr-duenger').classList.contains('active')){goTo('set');history.pushState(null,'',location.href);return;}
  const now=Date.now();
  if(now-lastBack<2000)return;
  lastBack=now;history.pushState(null,'',location.href);
  toast('Nochmal drücken zum Beenden');
});

const MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-lbl').textContent=`${MN[m]} ${y}`;
  const act=active(),today=todayISO();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),off=fd===0?6:fd-1;
  let cells='';
  for(let i=0;i<off;i++)cells+='<div></div>';

  for(let d=1;d<=dim;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===today,hasEntry=!!S.entries[iso];
    const gc=act.filter(c=>isGiessTag(iso,c));
    const allPh=act.map(c=>({c,p:phase(iso,c)})).filter(x=>x.p);
    const isStart=act.some(c=>c.startDate===iso);

    let bg='#181818',border='transparent';
    if(gc.length===1){const cl=col(gc[0]);bg=cl.dk;border=cl.hex+'88';}
    else if(gc.length>=2){const c1=col(gc[0]),c2=col(gc[1]);bg=`linear-gradient(135deg,${c1.dk} 50%,${c2.dk} 50%)`;border=c1.hex+'66';}

    const a=gc.length>0?getAction(iso,gc[0]):null;
    const icon=isStart?'🏁':a?({'giess':'🪣','spuelen':'🚿','ice':'❄️','ernte':'✂️','trocknen':'🍃'}[a]||''):'';
    const tagInfo=allPh[0];
    const tagCol=gc.length>0?col(gc[0]).hex:(tagInfo?col(tagInfo.c).hex:'rgba(255,255,255,0.4)');

    cells+=`<div class="cal-cell ${isToday?'today':''}" style="background:${bg};border-color:${border}"
      onclick="calClick('${iso}')"
      ontouchstart="lpS('${iso}',event)" ontouchend="lpE()" ontouchmove="lpE()">
      ${icon?`<span class="cal-icon">${icon}</span>`:''}
      <span class="cal-num">${d}</span>
      ${tagInfo?`<span class="cal-tag" style="color:${tagCol}">T${tagInfo.p.day}</span>`:''}
      ${hasEntry?`<div class="cal-dot"></div>`:''}
    </div>`;
  }

  // Compact legend
  const cycLeg=act.map(c=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)"><span style="width:8px;height:8px;border-radius:50%;background:${col(c).hex};display:inline-block"></span>${sym(c)} ${c.name}</span>`).join(' ');
  const actLeg=`<span style="font-size:10px;color:var(--text-hint)">🪣 Gießtag &nbsp;🚿 Spülen &nbsp;❄️ Ice &nbsp;✂️ Ernte &nbsp;🏁 Start</span>`;

  document.getElementById('cal-body').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(x=>`<div style="text-align:center;font-size:11px;color:var(--text-muted)">${x}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    <div style="padding:6px 0;border-top:0.5px solid var(--border);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px">${cycLeg}</div>
    <div style="padding:2px 0 4px">${actLeg}</div>
    <div style="height:6px"></div>`;
}

function calClick(iso){entryFrom='cal';openEntry(iso);}
function changeMonth(d){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+d,1);renderCal();}

let lpT=null;
function lpS(iso,e){lpT=setTimeout(()=>{lpT=null;showCtx(iso,e);},600);}
function lpE(){if(lpT){clearTimeout(lpT);lpT=null;}}

function showCtx(iso,e){
  const act=active(),today=todayISO();
  const df=new Date(iso+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  let items=[];
  act.forEach(c=>{
    const p=phase(iso,c);if(!p)return;
    if(iso>=today){
      items.push(`<div class="ctx-item ctx-g" onclick="shiftF('${c.id}',1)"><span class="ctx-ic">+1d</span>${sym(c)} ${c.name} – einen Tag später</div>`);
      items.push(`<div class="ctx-item" style="color:${col(c).hex}" onclick="shiftF('${c.id}',-1)"><span class="ctx-ic">-1d</span>${sym(c)} ${c.name} – einen Tag früher</div>`);
    }
  });
  if(items.length)items.push('<div class="ctx-div"></div>');
  S.cycles.filter(c=>!c.active).forEach(c=>items.push(`<div class="ctx-item ctx-g" onclick="startOn('${c.id}','${iso}')"><span class="ctx-ic">▶</span>${sym(c)} ${c.name} starten</div>`));
  act.forEach(c=>items.push(`<div class="ctx-item ctx-r" onclick="stopC('${c.id}')"><span class="ctx-ic">■</span>${sym(c)} ${c.name} beenden</div>`));
  if(items.length)items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calClick('${iso}');closeCtx()"><span class="ctx-ic">✏</span>Eintrag ${df} öffnen</div>`);

  const menu=document.getElementById('ctx-m');
  menu.innerHTML=`<div style="font-size:11px;color:var(--text-hint);padding:8px 16px 2px;font-weight:500">${df}</div>`+items.join('');
  const t=e?.touches?.[0]||e?.changedTouches?.[0];
  const x=t?Math.min(t.clientX,window.innerWidth-260):window.innerWidth/2-120;
  const y=t?Math.min(t.clientY,window.innerHeight-340):window.innerHeight/2;
  menu.style.left=x+'px';menu.style.top=y+'px';
  menu.classList.add('show');document.getElementById('ctx-ov').classList.add('show');
}
function closeCtx(){document.getElementById('ctx-m').classList.remove('show');document.getElementById('ctx-ov').classList.remove('show');}
function closeCtxMenu(){closeCtx();}

function shiftF(cId,days){
  closeCtx();
  const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  shiftFuture(cId,days);saveS();renderCal();
  toast(`${sym(c)} ${c.name}: ab heute ${days>0?'+':''}${days} Tag`);
}
function startOn(cId,iso){
  closeCtx();const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  c.active=true;c.startDate=iso;saveS();renderCal();
  toast(`${sym(c)} ${c.name} gestartet!`);
  setTimeout(()=>{selId=cId;draft={};goTo('set');},900);
}
function stopC(cId){
  closeCtx();const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  if(!confirm(`"${c.name}" beenden?`))return;
  c.active=false;c.startDate=null;saveS();renderCal();toast(`${sym(c)} beendet`);
}

function editProduct(id){editProd=id;const p=S.products.find(x=>x.id===id);if(p)_pColor=p.color;renderDuenger();}

function renderAI(){

      ${vpd!==null?`<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><span style="font-size:13px;color:var(--text-sub)">${entry.temp}°C · ${entry.humidity}%</span><span class="pill" style="background:${z?.bg};color:${z?.color}">VPD ${vpd.toFixed(2)} kPa</span></div>`:'<div style="font-size:12px;color:var(--text-muted)">Eintrag heute mit Temp &amp; RLF für VPD.</div>'}
    </div>
    ${fc?`<div class="card" style="gap:8px;display:flex;flex-direction:column;border-color:${col(fc).hex}44">
      <div style="display:flex;align-items:center;justify-content:space-between"><div class="sect-head">${sym(fc)} ${fc.name} – Heute</div><button onclick="openDuenger()" style="background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0">Dünger bearbeiten →</button></div>
      ${nutRows}
    </div>`:''}

    <div id="ai-result"></div><div style="height:10px"></div>`;

async function fetchAI(){
  const act=active();if(!act.length){toast('Keine aktiven Zyklen.');return;}
  const btn=document.getElementById('ai-btn');btn.innerHTML='<div class="spin" style="margin:0 auto"></div>';btn.disabled=true;
  const today=todayISO(),entry=S.entries[today]||{},vpd=calcVPD(parseFloat(entry.temp),parseFloat(entry.humidity));
  const allAlerts=act.flatMap(c=>getAlerts(c)).map(a=>a.title).join(', ')||'keine';
  const prodNames=(S.products||[]).map(p=>p.name).join(', ')||'keine eingerichtet';
  const ci=act.map(c=>{
    const p=phase(today,c),a=getAction(today,c);
    return`${sym(c)} ${c.name}: Tag ${p?.day||'–'}, ${p?PN[p.ph]:'–'}${p?.week?' Wo.'+p.week:''}, Gießintervall ${getInt(c,p?.ph||'bloom')} Tage, Heute: ${a==='giess'?'Gießtag':a||'Pause'}`;
  }).join('\n');
  const prompt=`Du bist ein Cannabis-Grow-Experte. Antworte auf Deutsch, freundlich, max. 200 Wörter.\n\nDatum: ${today}\nTemp: ${entry.temp||'?'}°C, RLF: ${entry.humidity||'?'}%, VPD: ${vpd!==null?vpd.toFixed(2)+' kPa':'?'}\nEingesetzte Dünger: ${prodNames}\nWarnungen: ${allAlerts}\n\nZyklen:\n${ci}\n\nBitte: 1) Kurze Tagesanalyse 2) Konkrete Handlungsempfehlung 3) Was in 7 Tagen ansteht?`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'Keine Antwort.';
    document.getElementById('ai-result').innerHTML=`<div class="card" style="gap:10px;display:flex;flex-direction:column"><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div><span style="font-size:13px;color:var(--green);font-weight:500">KI-Analyse</span></div><div style="font-size:13px;color:var(--text-sub);line-height:1.7">${text.replace(/\n/g,'<br>')}</div></div>`;
  }catch(e){document.getElementById('ai-result').innerHTML=`<div class="card"><span style="font-size:13px;color:var(--red)">Verbindungsfehler.</span></div>`;}
  btn.innerHTML='✦ KI-Analyse abrufen';btn.disabled=false;
}

function dd(k,v){draft[k]=isNaN(v)||v===''?v:Number(v);}
function ddS(k,v){draft[k]=v;renderSet();}
function saveDraft(){
  const c=S.cycles.find(x=>x.id===selId);if(!c)return;
  const old=c.startDate,nw=draft.startDate;
  if(old&&nw&&old!==nw){const diff=Math.round((new Date(nw)-new Date(old))/86400000);if(diff)shiftAll(c.id,diff);}
  Object.assign(c,{...draft,id:c.id});
  saveS();toast(`${sym(c)} ${c.name} gespeichert ✓`);renderSet();
}
function selCyc(id){selId=id;draft={};renderSet();}
function addCyc(){
  const i=S.cycles.length;
  const c={id:Date.now().toString(),name:`Zyklus ${i+1}`,location:'',active:false,startDate:null,
    colorId:COLORS[i%COLORS.length].id,symbol:SYMS[i%SYMS.length],
    anzuchtDays:17,bloomDays:66,flushDays:9,iceDays:6,harvestDays:1,dryDays:7,
    intAnzucht:4,intBloom:3,intFlush:2};
  S.cycles.push(c);selId=c.id;draft={...c};saveS();renderSet();
}
function toggleAct(id,checked){
  const c=S.cycles.find(x=>x.id===id);if(!c)return;
  c.active=checked;if(checked&&!c.startDate)c.startDate=todayISO();if(!checked)c.startDate=null;
  draft.active=c.active;draft.startDate=c.startDate;saveS();renderSet();
}
function delCyc(id){
  if(!confirm('Zyklus und alle Logs löschen?'))return;
  S.cycles=S.cycles.filter(x=>x.id!==id);
  Object.keys(S.entries).forEach(d=>{if(S.entries[d]?.cycleData?.[id])delete S.entries[d].cycleData[id];});
  selId=S.cycles[0]?.id||null;draft={};saveS();renderSet();toast('Zyklus gelöscht');
}

      ${hint}`;
  }).join('');

  const noActive=act.length===0?`<div class="empty-state"><div style="font-size:40px;opacity:0.3">🌱</div><div style="font-size:13px;color:var(--text-muted)">Keine aktiven Zyklen.</div><button style="background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--green);cursor:pointer;font-family:var(--font)" onclick="goTo('set')">Zyklus erstellen</button></div>`:'';

  document.getElementById('entry-body').innerHTML=`
    <div class="sect-head">Umgebung</div>
    <div class="row2">
      <div class="inp-wrap"><div class="inp-label">Temperatur (°C)</div><input class="inp-field" type="number" value="${temp}" placeholder="z. B. 23" id="et" oninput="uEnv()"/></div>
      <div class="inp-wrap"><div class="inp-label">Luftfeuchtigkeit (%)</div><input class="inp-field" type="number" value="${rh}" placeholder="z. B. 48" id="er" oninput="uEnv()"/></div>
    </div>
    <div id="vpd-c">${vpdBox}</div>
    ${noActive}${blocks}
    <button class="big-save" style="background:${act.length>0?col(act[0]).hex:'var(--green-dk)'}" onclick="saveEntry()">Speichern</button>
    <div style="height:20px"></div>`;
}

function uEnv(){
  const t=parseFloat(document.getElementById('et')?.value),r=parseFloat(document.getElementById('er')?.value);
  const v=calcVPD(t,r),z=vpdZone(v);
  if(v!==null&&z){
    const vv=document.getElementById('vpd-v'),vp=document.getElementById('vpd-p'),vm=document.getElementById('vpd-m');
    if(vv)vv.textContent=v.toFixed(2);
    if(vp){vp.textContent=z.label;vp.style.background=z.bg;vp.style.color=z.color;}
    if(vm)vm.style.left=Math.min(95,z.pct)+'%';
  }
}

function ensE(cId){
  if(!S.entries[editISO])S.entries[editISO]={temp:'',humidity:'',cycleData:{}};
  if(!S.entries[editISO].cycleData)S.entries[editISO].cycleData={};
  if(!S.entries[editISO].cycleData[cId])S.entries[editISO].cycleData[cId]={doses:{},water:'',ph:'',notes:''};
  if(!S.entries[editISO].cycleData[cId].doses)S.entries[editISO].cycleData[cId].doses={};
}
function uDose(cId,prodId,val){ensE(cId);S.entries[editISO].cycleData[cId].doses[prodId]=parseFloat(val)||0;}
function uEF(cId,f,v){ensE(cId);S.entries[editISO].cycleData[cId][f]=v;}
function saveEntry(){
  if(!editISO)return;
  if(S.cycles.length>0)ensE(S.cycles[0].id);
  S.entries[editISO].temp=document.getElementById('et')?.value||'';
  S.entries[editISO].humidity=document.getElementById('er')?.value||'';
  saveS();toast('Gespeichert ✓');setTimeout(()=>goTo(entryFrom),400);
}

// ============================================================
// INIT
// ============================================================
loadS();calDate=new Date();
goTo('dash');
history.pushState(null,'',location.href);
// Swipe calendar once
(function(){
  const scr=document.getElementById('scr-cal');
  let sx=0,sy=0,st=0;
  scr.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  scr.addEventListener('touchend',e=>{
    if(Date.now()-st>500)return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8)changeMonth(dx<0?1:-1);
  },{passive:true});
})();
</script>
