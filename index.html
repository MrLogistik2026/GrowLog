/**
 * Bestimmt das Blüte-Start-Datum für einen Zyklus.
 *
 * Das ist der biologisch korrekte Ansatz für Photoperioden (Indoor + Outdoor):
 * Die Pflanze reagiert auf Tageslichtstunden, nicht auf den Kalender.
 *
 * OUTDOOR (basierend auf Community-Erfahrung, bestätigt durch mehrere Quellen):
 * Photoperioden-Cannabis beginnt zu blühen wenn das Tageslicht unter 14h fällt.
 * In Deutschland ist das ca. Mitte/Ende August (KW 33-34), nicht bereits zur
 * Sommersonnenwende (21. Juni).
 *
 * Näherungs-Datum für mittlere nördliche Breiten (~50°N wie Deutschland):
 *   17. August (Tag, an dem Tageslicht unter 14h fällt)
 * Südhalbkugel (gespiegelt): 17. Februar
 *
 * Bei sehr spätem Startdatum (z.B. Juli gepflanzt): die Pflanze braucht trotzdem
 * mindestens 4 Wochen Vegetation bevor sie blühen kann → dann ist der Trigger
 * später als das Standard-Datum.
 *
 * Rückgabe (ISO-Datum oder null):
 *   1. Explizit gesetzt (c.bloomStartDate) → das Datum direkt
 *   2. Outdoor-Photoperiode → max(14h-Datum, startDate + 4 Wochen)
 *   3. Sonst (Autos, Indoor ohne explizites Datum) → null
 */
function _computeBloomStartDate(c) {
  if (!c || !c.startDate) return null;

  // Explizit vom User gesetzt (Indoor: beim Licht-Umschalten; Outdoor: manuell falls anders gewünscht)
  if (c.bloomStartDate) return c.bloomStartDate;

  // Auto-Ableitung nur für Outdoor-Photoperiode.
  if (c.growType !== 'outdoor') return null;
  if ((c.seedType || '').toLowerCase().indexOf('auto') >= 0) return null;

  const start = iso12(c.startDate);
  const isSouth = c.hemisphere === 'south';
  const startYear = start.getFullYear();

  // Tageslicht-14h-Trigger: ~17. August (Nord) / ~17. Februar (Süd)
  // Das ist die empirische Realität für Photoperiode-Outdoor in Mitteleuropa.
  const month = isSouth ? 1 : 7;   // August = 7 (0-indexiert), Februar = 1
  const day = 17;
  const candidate1 = new Date(startYear, month, day, 12);
  const candidate2 = new Date(startYear + 1, month, day, 12);
  const trigger = (candidate1 >= start) ? candidate1 : candidate2;

  // Minimum 4 Wochen (28 Tage) Vegi — sonst ist die Pflanze zu jung zum blühen
  // (reduziert von 6 auf 4 Wochen, da spätes Pflanzen meist noch etwas Vegi-Zeit ermöglicht)
  const minVegi = new Date(start.getTime() + 28 * 86400000);

  const bloomStart = trigger >= minVegi ? trigger : minVegi;

  // Zurück nach ISO-String
  const yyyy = bloomStart.getFullYear();
  const mm = String(bloomStart.getMonth() + 1).padStart(2, '0');
  const dd = String(bloomStart.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

/**
 * Datumbasierte Phase-Ableitung: kennt Vegi-bis-Blüte-Start und dann fixe
 * Phasen-Längen ab Blüte-Start (wie bei c.bloomDays etc., nur dass der
 * Vegi-Anteil variabel ist statt fix 21 Tage).
 *
 * Rückgabe: gleiche Form wie phase(), oder null wenn nicht anwendbar.
 */
function _datebasedPhase(iso, c) {
  const bloomStart = _computeBloomStartDate(c);
  if (!bloomStart) return null;

  const d = iso12(iso);
  const start = iso12(c.startDate);
  const bs = iso12(bloomStart);
  if (d < start) return null;

  const bloomLen = c.bloomDays || PHASE_DEFAULTS.bloomDays; // 60
  const flushLen = c.flushDays || PHASE_DEFAULTS.flushDays; // 8
  const harvestLen = c.harvestDays || PHASE_DEFAULTS.harvestDays; // 1
  const dryLen = c.dryDays || PHASE_DEFAULTS.dryDays; // 7
  // Outdoor: kein IceFlush
  const iceLen = c.growType === 'outdoor' ? 0 : (c.iceDays || PHASE_DEFAULTS.iceDays);

  const msPerDay = 86400000;
  const flushStart = new Date(bs.getTime() + bloomLen * msPerDay);
  const iceStart   = new Date(flushStart.getTime() + flushLen * msPerDay);
  const harvestStart = new Date(iceStart.getTime() + iceLen * msPerDay);
  const dryStart     = new Date(harvestStart.getTime() + harvestLen * msPerDay);
  const dryEnd       = new Date(dryStart.getTime() + dryLen * msPerDay);

  const diffDays = Math.round((d - start) / msPerDay);
  const totalDays = Math.max(1, Math.round((dryEnd - start) / msPerDay));
  const pct = Math.min(100, Math.round(diffDays / totalDays * 100));

  // Vegi-Phase aufschlüsseln wenn transplantDate gesetzt ist.
  // Die 7 Tage vor Transplant = Abhärten (an Sonne/Wind gewöhnen)
  if (d < bs) {
    const tp = c.transplantDate ? iso12(c.transplantDate) : null;
    if (tp && tp >= start && tp <= bs) {
      const hardenStart = new Date(tp.getTime() - 7 * msPerDay);
      const week = Math.floor(diffDays / 7) + 1;
      if (d < hardenStart) {
        // Vorzucht drinnen, Tag seit startDate
        const vDay = Math.round((d - start) / msPerDay) + 1;
        return { ph: 'vorzucht', day: diffDays + 1, vegDay: vDay, week, total: totalDays, pct };
      }
      if (d < tp) {
        // Abhärten (tägliche Aus-/Eingewöhnung an Außenklima)
        const hDay = Math.round((d - hardenStart) / msPerDay) + 1;
        return { ph: 'abhärten', day: diffDays + 1, vegDay: hDay, week, total: totalDays, pct };
      }
      // Vegi draußen — Tag seit Transplant
      const vDay = Math.round((d - tp) / msPerDay) + 1;
      const vWeek = Math.floor((d - tp) / msPerDay / 7) + 1;
      return { ph: 'vegi_out', day: diffDays + 1, vegDay: vDay, week: vWeek, total: totalDays, pct };
    }
    // Kein Transplant-Datum gesetzt — klassische Anzucht-Phase (wie bisher)
    const week = Math.floor(diffDays / 7) + 1;
    return { ph: 'anzucht', day: diffDays + 1, week, total: totalDays, pct };
  }
  if (d < flushStart) {
    const bloomDayIdx = Math.round((d - bs) / msPerDay);
    return { ph: 'bloom', day: diffDays + 1, week: Math.floor(bloomDayIdx / 7) + 1, total: totalDays, pct };
  }
  if (d < iceStart) {
    return { ph: 'flush', day: diffDays + 1, week: null, total: totalDays, pct };
  }
  if (iceLen > 0 && d < harvestStart) {
    return { ph: 'ice', day: diffDays + 1, week: null, total: totalDays, pct };
  }
  if (d < dryStart) {
    return { ph: 'harvest', day: diffDays + 1, week: null, total: totalDays, pct };
  }
  if (d < dryEnd) {
    return { ph: 'dry', day: diffDays + 1, week: null, total: totalDays, pct };
  }
  return null;
}

/** Returns the current phase for a given date and cycle */
function phase(iso, c) {
  if (!c) return null;
  // Datum-basierte Phase (Outdoor-Photoperiode oder Indoor mit explizitem bloomStartDate)
  const dated = _datebasedPhase(iso, c);
  if (dated) return dated;

  if (!c.startDate) return null;
  const diff = isoDiff(iso, c.startDate);
  if (diff < 0) return null;

  const a  = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const b  = a + (c.bloomDays || PHASE_DEFAULTS.bloomDays);
  const f  = b + (c.flushDays || PHASE_DEFAULTS.flushDays);
  // Outdoor skips IceFlush phase (Indoor Cup-Niveau trick, not practical outside)
  const iceLen = c.growType === 'outdoor' ? 0 : (c.iceDays || PHASE_DEFAULTS.iceDays);
  const ic = f + iceLen;
  const h  = ic + (c.harvestDays || PHASE_DEFAULTS.harvestDays);
  const dr = h + (c.dryDays || PHASE_DEFAULTS.dryDays);

  if (diff < a)  return { ph: 'anzucht', day: diff + 1, week: Math.floor(diff / 7) + 1, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < b)  return { ph: 'bloom',   day: diff + 1, week: Math.floor((diff - a) / 7) + 1, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < f)  return { ph: 'flush',   day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < ic) return { ph: 'ice',     day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < h)  return { ph: 'harvest', day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < dr) return { ph: 'dry',     day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  return null;
}

/** Get the watering interval for a cycle+phase. Outdoor: +1 day slower (soil + rain). */
function getInt(c, ph) {
  // Outdoor-Bias: Regen + größere Töpfe + Verdunstungsschwankungen → Standard-Intervall ist länger.
  // Der User kann es in den Einstellungen weiterhin manuell überschreiben (c.intAnzucht/intBloom).
  const outBias = (c.growType === 'outdoor') ? 1 : 0;
  if (ph === 'anzucht' || ph === 'vorzucht') return c.intAnzucht || (RI.anzucht + outBias);
  if (ph === 'abhärten')                     return 99;  // kein regelmäßiger Gießtag
  if (ph === 'vegi_out')                     return c.intBloom || (RI.bloom + outBias);  // wie Blütentakt
  if (ph === 'flush')   return c.intFlush || RI.flush;
  if (ph === 'ice')     return c.intIce || RI.ice;
  if (ph === 'harvest') return c.intErnte || RI.ernte;
  if (ph === 'dry')     return c.intDry || RI.dry;
  return c.intBloom || (RI.bloom + outBias);
}

/**
 * [KONTEXT-HELPER] contextFor(c, iso)
 * ---------------------------------------------------------------------
 * DIE zentrale Funktion für Prinzip 5 (kontext-spezifisch).
 * Gibt ein vollständiges Kontext-Objekt zurück das alle Entscheidungen
 * in der App treffen sollte. Statt verteilt im Code `c.seedType === 'auto'`
 * und `c.growType === 'outdoor'` zu prüfen, lauten die Fragen jetzt:
 *
 *   const ctx = contextFor(c, iso);
 *   if (ctx.isAutomatic) ...
 *   if (ctx.needsManualLightSwitch) ...
 *   if (ctx.canTop) ...
 *   if (ctx.isFinisher) ...
 *
 * Das sorgt dafür dass:
 * - Änderungen der Logik an EINER Stelle passieren
 * - Keine Stelle vergessen wird (Suche nach `contextFor` zeigt alles)
 * - Texte via T.* konsistent mit der Logik bleiben
 *
 * Rückgabe: null wenn Zyklus nicht gestartet oder iso außerhalb,
 *           sonst reiches Kontext-Objekt.
 */
function contextFor(c, iso) {
  if (!c || !c.startDate) return null;
  const p = phase(iso, c);
  if (!p) return null;

  const seedType = c.seedType || 'auto';
  const growType = c.growType || 'indoor';
  const isAutomatic = seedType === 'auto';
  const isFeminized = seedType === 'fem';
  const isRegular = seedType === 'reg';
  const isOutdoor = growType === 'outdoor';
  const isIndoor = growType === 'indoor';

  // Ist der User aktuell in einer vegetativen Phase?
  const isVegi = isVegiPhase(p.ph);
  const isBloom = p.ph === 'bloom';
  const isFlush = p.ph === 'flush';
  const isIce = p.ph === 'ice';
  const isHarvest = p.ph === 'harvest';
  const isDry = p.ph === 'dry';

  // FINISHER-MODUS: Letzte 2 Wochen vor Ernte — 30-35% Restgewicht als
  // bewusstes Stress-Tool erlaubt (triggert Harzproduktion).
  // Greift in Blüte-Ende (letzte 14 Tage), Flush, Ice, Harvest.
  const totalDays = (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays) +
                    (c.bloomDays || PHASE_DEFAULTS.bloomDays) +
                    (c.flushDays || PHASE_DEFAULTS.flushDays) +
                    (c.iceDays || PHASE_DEFAULTS.iceDays);
  const daysFromStart = isoDiff(iso, c.startDate);
  const daysUntilHarvest = totalDays - daysFromStart;
  const isFinisher = daysUntilHarvest <= 14 && daysUntilHarvest >= 0 &&
                     (isBloom || isFlush || isIce || isHarvest);

  // Braucht der User manuellen Lichtwechsel beim Blüte-Start?
  // Nur Feminisiert Indoor — Automatics tun's selbst, Outdoor folgt der Sonne.
  const needsManualLightSwitch = isFeminized && isIndoor;

  // Topping-Zeitfenster: Tag 15+ bis Blüte Wo.3
  const canTop = !c.toppingDate && p.day >= 15 &&
                 (isVegi || (isBloom && p.week <= 3));

  // Ist das Toppen schon "zu spät"? (Hinweis nur bei Automatics sinnvoll —
  // Feminisiert kann die Vegi beliebig verlängern durch Licht-Steuerung.)
  const toppingTooLate = !c.toppingDate && isAutomatic && isBloom && p.week >= 4;

  // Ist der User noch "zu früh" zum Toppen?
  const toppingTooEarly = !c.toppingDate && p.day < 15 && isVegi;

  // Topping-Pause aktiv? (Ruhetag nach Topping)
  const isToppingDay = c.toppingDate === iso;
  const isToppingRest = c.toppingDate && !isToppingDay &&
                        isoDiff(iso, c.toppingDate) >= 1 &&
                        isoDiff(iso, c.toppingDate) <= (c.toppingPause || 2);

  return {
    // Basis
    cycle: c,
    phase: p,
    iso,

    // Sortentyp
    seedType,
    isAutomatic,
    isFeminized,
    isRegular,

    // Grow-Art
    growType,
    isIndoor,
    isOutdoor,

    // Phase-Flags
    isVegi,
    isBloom,
    isFlush,
    isIce,
    isHarvest,
    isDry,

    // Abgeleitete Zustände
    isFinisher,
    daysFromStart,
    daysUntilHarvest,

    // Verhaltens-Regeln (was kann/muss der User tun)
    needsManualLightSwitch,
    canTop,
    toppingTooLate,
    toppingTooEarly,
    isToppingDay,
    isToppingRest,
  };
}


// =====================================================================
//  [SEKTION]: RESTGEWICHT-LOGIK (Phase 2)
//  ---------------------------------------------------------------------
//  Berechnungs-Helper für das Restgewicht-Modul.
//  Siehe contextFor() Kommentar für die Logik-Philosophie.
//
//  RESTGEWICHT-SKALA (Prinzip 6 — konsequente Nomenklatur):
//    100%  = Topf frisch gegossen (saturated)
//     40%  = Sweet Spot — JETZT gießen (Standard-Praxis)
//     30%  = Federleicht — bewusster Stress in finaler Blüte (Finisher-Modus)
//      0%  = Bone dry (Wasserstress)
//
//  Die App spricht NICHT von "Dryback" — das ist die umgekehrte Skala und
//  nur im Lexikon als Branchen-Alternative erklärt.
// =====================================================================

/**
 * Berechnet Restgewicht% aus aktuellem Gramm-Gewicht (Waage-Modus).
 * Formel: ((current - dry) / (saturated - dry)) * 100
 *
 * @param {number} currentG  Aktuelles Topfgewicht in Gramm
 * @param {number} saturatedG  Referenz-Gewicht voll gesättigt
 * @param {number} dryG  Referenz-Gewicht bone-dry
 * @returns {number|null}  Restgewicht in % (0-110), oder null wenn Inputs ungültig
 */
function calcRestPct(currentG, saturatedG, dryG) {
  const cur = parseFloat(currentG);
  const sat = parseFloat(saturatedG);
  const dry = parseFloat(dryG);
  if (!isFinite(cur) || !isFinite(sat) || !isFinite(dry)) return null;
  if (sat <= dry) return null; // Saturated muss schwerer sein als Dry
  const pct = ((cur - dry) / (sat - dry)) * 100;
  // Clamp leicht über 100% (kurz nach Guss kann's 102% sein) und unter 0%
  return Math.round(pct * 10) / 10;
}

/**
 * Klassifiziert ein Restgewicht% in einen Status und liefert
 * eine Entscheidungs-Empfehlung.
 *
 * Im Finisher-Modus (letzte 2 Wochen vor Ernte) verschiebt sich der Sweet-Spot
 * nach unten — 30-35% werden zum Ziel, weil bewusster Stress die Harzproduktion
 * triggert.
 *
 * @param {number} restPct  Restgewicht in %
 * @param {boolean} isFinisher  true wenn in letzten 2 Wochen vor Ernte
 * @returns {object} { status, color, label, text }
 *   status: 'saturated' | 'wait' | 'approaching' | 'sweetSpot' | 'finisher' | 'dry' | 'stress'
 *   color: CSS var name
 *   label: kurzer Status-Text
 *   text: längere Erklärung via T.water.*
 */
function classifyRestPct(restPct, isFinisher) {
  const p = parseFloat(restPct);
  if (!isFinite(p)) return null;

  // Finisher-Modus: andere Zielbereiche
  if (isFinisher) {
    if (p > 50) {
      return {
        status: 'wait', color: 'var(--blue)',
        label: 'Noch zu feucht',
        text: T.water.finisherWait({ restPct: Math.round(p) }),
      };
    }
    if (p >= 30 && p <= 40) {
      return {
        status: 'finisher', color: 'var(--green)',
        label: 'Finisher Sweet Spot',
        text: T.water.finisherReady(),
      };
    }
    if (p < 25) {
      return {
        status: 'stress', color: 'var(--red)',
        label: 'Wasserstress',
        text: T.water.waterStress({ restPct: Math.round(p) }),
      };
    }
    // 40-50% in finisher: warten bis federleichter
    return {
      status: 'wait', color: 'var(--blue)',
      label: 'Noch warten',
      text: T.water.finisherWait({ restPct: Math.round(p) }),
    };
  }

  // Normal-Modus
  if (p > 60) {
    return {
      status: 'wait', color: 'var(--blue)',
      label: 'Noch zu feucht',
      text: T.water.tooWet({ restPct: Math.round(p) }),
    };
  }
  if (p >= 45) {
    return {
      status: 'approaching', color: 'var(--teal)',
      label: 'Bald gießen',
      text: T.water.gettingDry({ restPct: Math.round(p) }),
    };
  }
  if (p >= 35) {
    return {
      status: 'sweetSpot', color: 'var(--green)',
      label: 'Sweet Spot — jetzt gießen',
      text: T.water.readyToWater(),
    };
  }
  if (p >= 25) {
    return {
      status: 'dry', color: 'var(--orange)',
      label: 'Langsam kritisch',
      text: T.water.gettingDry({ restPct: Math.round(p) }),
    };
  }
  return {
    status: 'stress', color: 'var(--red)',
    label: 'Wasserstress',
    text: T.water.waterStress({ restPct: Math.round(p) }),
  };
}


// ---------------------------------------------------------------------
// RESTGEWICHT-SETUP-FLOW
// ---------------------------------------------------------------------
// Die Setup-Flows sind user-facing und rufen customInput() sequenziell auf.
// Drei Szenarien:
//   setWeightModeOff(c)    — schaltet Modul ab (zurück zum Fallback)
//   setWeightModeLift(c)   — aktiviert Hebe-Test (kein Setup nötig, nur Info)
//   setWeightModeScale(c)  — aktiviert Waage (beide Referenz-Gewichte abfragen)
// Nach dem Setup: vibrate + toast + saveS() + renderSet().

async function setWeightModeOff(c) {
  if (!c) return;
  if (c.weightMode === 'off') return;
  c.weightMode = 'off';
  saveS();
  toast('Restgewicht-Modus deaktiviert');
  renderSet();
}

async function setWeightModeLift(c) {
  if (!c) return;
  c.weightMode = 'lift';
  saveS();
  toast('✓ Hebe-Test aktiviert — im Entry erscheint der Slider');
  renderSet();
}

async function setWeightModeScale(c) {
  if (!c) return;

  // Schritt 1: Saturated Weight
  const sat = await customInput({
    title: '⚖️ Schritt 1: Gewicht voll gesättigt',
    msg: 'Gieße den Topf jetzt gut — bis ~10% Drain unten rauskommt. Warte bis kein Wasser mehr abläuft. Dann Topf <b>mit Pflanze und Untersetzer</b> wiegen.',
    unit: 'g',
    initial: c.saturatedWeight || null,
    hint: 'z.B. 14200 g für einen vollen 11L-Topf mit Pflanze',
    okText: 'Weiter',
    min: 0,
  });
  if (sat === null) return; // Abgebrochen

  // Schritt 2: Dry Weight (kann später eingetragen werden!)
  const dryMsg =
    '<b>Das brauchen wir ein paar Tage später</b> — wenn der Topf sich spürbar leicht anfühlt und die Erde oben trocken ist (kurz bevor du normalerweise gießen würdest). ' +
    'Wiege dann wieder. Du kannst das auch jetzt überspringen und später nachtragen.';

  const dry = await customInput({
    title: '⚖️ Schritt 2: Gewicht bone-dry (später)',
    msg: dryMsg,
    unit: 'g',
    initial: c.dryWeight || null,
    hint: 'Jetzt überspringen → Abbrechen. Später in den Einstellungen nachtragen.',
    okText: 'Speichern',
    min: 0,
  });

  // Beide Werte speichern (dry optional)
  c.weightMode = 'scale';
  c.saturatedWeight = sat;
  if (dry !== null) {
    c.dryWeight = dry;
    // Plausibilitäts-Check
    if (dry >= sat) {
      toast('⚠ Dry-Gewicht muss leichter sein als Saturated!', 4000);
      c.dryWeight = null;
    }
  }
  saveS();
  vibrate();

  if (c.dryWeight) {
    const capacity = c.saturatedWeight - c.dryWeight;
    toast(`✓ Waage-Modus aktiv · Kapazität ${(capacity/1000).toFixed(1)} L`);
  } else {
    toast('✓ Saturated gespeichert — Dry später nachtragen');
  }
  renderSet();
}


// =====================================================================
//  [SEKTION]: RUNOFF-ANALYSE (Phase 2)
//  ---------------------------------------------------------------------
//  Runoff = Wasser das unten aus dem Topf rausläuft.
//  Ein professioneller Grower misst Runoff-pH und Runoff-EC bei jedem Gieß-
//  Vorgang mit Drain. Die Differenz zum Input verrät was in der Erde passiert:
//
//    - EC-Runoff >> EC-Input  → Salze sammeln sich (Flush nötig)
//    - EC-Runoff << EC-Input  → Pflanze frisst stark (evtl. nachdüngen)
//    - pH-Runoff deutlich anders → Erde driftet → Lockout-Gefahr
//
//  Datenfelder pro Entry-Tag (S.entries[iso].cycleData[cId]):
//    ph        Input-pH (beim Gießen)
//    ec        Input-EC
//    runoffPh  pH am Ablauf
//    runoffEc  EC am Ablauf
// =====================================================================

/**
 * Analysiert die Runoff-Werte eines Eintrags gegenüber dem Input.
 * Gibt ein strukturiertes Objekt mit Differenzen und kontextuellen
 * Warnungen zurück.
 *
 * @param {object} cd  cycleData-Objekt eines Tages (S.entries[iso].cycleData[cId])
 * @returns {object} {
 *   hasRunoff: boolean  — sind überhaupt Runoff-Werte eingetragen?
 *   ecDelta: number|null  — runoffEc - inputEc
 *   phDelta: number|null  — runoffPh - inputPh
 *   ecStatus: 'ok' | 'warning-high' | 'warning-low' | null
 *   phStatus: 'ok' | 'warning-high' | 'warning-low' | null
 *   ecLabel: string  — T.runoff.ecLabel-Ausgabe
 *   phLabel: string  — T.runoff.phLabel-Ausgabe
 *   warnings: string[]  — Liste aller relevanten Warnungen
 * }
 */
function analyzeRunoff(cd) {
  if (!cd) {
    return { hasRunoff: false, ecDelta: null, phDelta: null, ecStatus: null, phStatus: null, ecLabel: '', phLabel: '', warnings: [] };
  }

  const inputPh = parseFloat(cd.ph);
  const inputEc = parseFloat(cd.ec);
  const runoffPh = parseFloat(cd.runoffPh);
  const runoffEc = parseFloat(cd.runoffEc);

  const hasRunoffPh = isFinite(runoffPh);
  const hasRunoffEc = isFinite(runoffEc);
  const hasRunoff = hasRunoffPh || hasRunoffEc;

  const ecDelta = (isFinite(inputEc) && hasRunoffEc) ? (runoffEc - inputEc) : null;
  const phDelta = (isFinite(inputPh) && hasRunoffPh) ? (runoffPh - inputPh) : null;

  // Status-Klassifikation
  let ecStatus = null;
  if (ecDelta !== null) {
    if (Math.abs(ecDelta) < 0.2) ecStatus = 'ok';
    else if (ecDelta > 0.5) ecStatus = 'warning-high';
    else if (ecDelta < -0.5) ecStatus = 'warning-low';
    else ecStatus = 'ok'; // Leichte Abweichung, nicht dramatisch
  }

  let phStatus = null;
  if (phDelta !== null) {
    if (Math.abs(phDelta) < 0.3) phStatus = 'ok';
    else if (phDelta > 0.5) phStatus = 'warning-high';
    else if (phDelta < -0.5) phStatus = 'warning-low';
    else phStatus = 'ok';
  }

  // Warnungen sammeln (nur die wichtigen)
  const warnings = [];
  if (ecStatus === 'warning-high') {
    warnings.push(T.runoff.ecWarningHigh({ inputEc, runoffEc }));
  }
  if (ecStatus === 'warning-low') {
    warnings.push(T.runoff.ecWarningLow({ inputEc, runoffEc }));
  }
  if (phStatus === 'warning-high') {
    warnings.push(T.runoff.phWarningHigh({ inputPh, runoffPh }));
  }
  if (phStatus === 'warning-low') {
    warnings.push(T.runoff.phWarningLow({ inputPh, runoffPh }));
  }

  return {
    hasRunoff,
    ecDelta,
    phDelta,
    ecStatus,
    phStatus,
    ecLabel: T.runoff.ecLabel({ delta: ecDelta }),
    phLabel: T.runoff.phLabel({ delta: phDelta }),
    warnings,
  };
}


/**
 * SHIFT SYSTEM V5: offsetHistory – Liste von Offset-Einträgen
 *
 * Jede Verschiebung (Shift/Topping) erzeugt einen Eintrag:
 *   { date: '2026-04-17', offset: 1 }
 *
 * Für ein gegebenes Datum wird der kumulative Offset berechnet:
 * Alle Einträge mit entry.date <= iso werden aufsummiert.
 * So hat jede Verschiebung ihre eigene Grenze und die Vergangenheit
 * wird nie verändert.
 */
function getAction(iso, c) {
  if (!c.startDate) return null;

  // EINZELNE TAGE ENTFERNT: stumm geschaltet, Raster bleibt intakt
  if (c.skippedDays && c.skippedDays.includes(iso)) {
    return null;
  }

  // TOPPING-PAUSE: 3 Tage nach dem Topping kein Gießen
  if (c.toppingDate) {
    const daysSinceTop = isoDiff(iso, c.toppingDate);
    if (daysSinceTop >= 1 && daysSinceTop <= (c.toppingPause || 2)) {
      return null;
    }
  }

  // Kumulativen Offset für dieses Datum berechnen
  let totalOffset = 0;
  for (const entry of c.offsetHistory || []) {
    if (iso >= entry.date) totalOffset += entry.offset;
  }

  const virtualStart = isoPlus(c.startDate, totalOffset);
  const diff = isoDiff(iso, virtualStart);

  if (diff < 0) return null;

  // Datum-basierte Phase (Outdoor-Photoperiode oder Indoor mit explizitem bloomStartDate).
  // Wir leiten die Phase aus phase() ab und berechnen den Gieß-Rhythmus anhand der
  // Tage seit Zyklus-Start (einfach, unabhängig vom Phase-Übergang).
  // Outdoor: Regen kann jeden Gießtag ersetzen, der User skippt dann einzeln.
  const dated = _datebasedPhase(iso, c);
  if (dated) {
    const ph = dated.ph;
    const iv = getInt(c, ph);
    if (diff % iv === 0) {
      if (ph === 'anzucht') return 'giess_anz';
      if (ph === 'vorzucht') return 'giess_anz';  // Outdoor drinnen vorgezogen = Sämlingspflege
      if (ph === 'abhärten') return null;          // In 7-Tage-Abhärtung nicht extra gießen (User bestimmt)
      if (ph === 'vegi_out') return 'giess';       // Wachstum draußen = normaler Gießtag
      if (ph === 'bloom')   return 'giess';
      if (ph === 'flush')   return 'spuelen';
      if (ph === 'ice')     return 'ice';
      if (ph === 'harvest') return 'ernte';
      if (ph === 'dry')     return 'trocknen';
    }
    return null;
  }

  // Phasengrenzen (tag-basiert, klassisch)
  const a  = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const b  = a + (c.bloomDays || PHASE_DEFAULTS.bloomDays);
  const f  = b + (c.flushDays || PHASE_DEFAULTS.flushDays);
  // Outdoor skips IceFlush (same logic as phase())
  const iceLen = c.growType === 'outdoor' ? 0 : (c.iceDays || PHASE_DEFAULTS.iceDays);
  const ic = f + iceLen;
  const h  = ic + (c.harvestDays || PHASE_DEFAULTS.harvestDays);
  const dr = h + (c.dryDays || PHASE_DEFAULTS.dryDays);

  let ph;
  if (diff < a)       ph = 'anzucht';
  else if (diff < b)  ph = 'bloom';
  else if (diff < f)  ph = 'flush';
  else if (diff < ic) ph = 'ice';
  else if (diff < h)  ph = 'harvest';
  else if (diff < dr) ph = 'dry';
  else return null;

  let phStart = 0;
  if (ph === 'bloom')   phStart = a;
  if (ph === 'flush')   phStart = b;
  if (ph === 'ice')     phStart = f;
  if (ph === 'harvest') phStart = ic;
  if (ph === 'dry')     phStart = h;

  const dayInPhase = diff - phStart;
  const iv = getInt(c, ph);

  if (dayInPhase % iv === 0) {
    if (ph === 'anzucht') return 'giess_anz';
    if (ph === 'bloom')   return 'giess';
    if (ph === 'flush')   return 'spuelen';
    if (ph === 'ice')     return 'ice';
    if (ph === 'harvest') return 'ernte';
    if (ph === 'dry')     return 'trocknen';
  }
  return null;
}

function isGiessTag(iso, c) {
  return ['giess','giess_anz','spuelen','ice'].includes(getAction(iso, c) || '');
}

/**
 * Get planned doses for a given week, with optional mode-aware scaling.
 *
 * When the active preset has doseMode='weekly-split' (Biobizz Official,
 * where the schedule values represent TOTAL weekly doses), the returned
 * doses are divided by the expected watering frequency so the user can
 * fertilize on every watering day without overdosing.
 *
 * For doseMode='per-watering' (Classic, Light — where the schedule values
 * ARE per-watering doses) the values pass through unchanged.
 *
 * @param {string} cId - Cycle id
 * @param {number} w   - Week number (1-12)
 * @param {Object} [c] - Optional cycle object, required for weekly-split to
 *                      look up watering interval. If omitted, falls back to
 *                      per-watering mode (raw schedule values).
 */
function getWeekDoses(cId, w, c) {
  const raw = S.weekSchedule[cId + '_w' + w] || S.weekSchedule['global_w' + w] || {};
  const preset = S.presetKey ? getPreset(S.presetKey) : null;
  const mode = preset?.doseMode || 'per-watering';
  if (mode !== 'weekly-split' || !c) return raw;
  // Pick phase-appropriate watering interval: anzucht weeks 1-2, bloom weeks 3+
  const iv = (w <= 2) ? (c.intAnzucht || RI.anzucht) : (c.intBloom || RI.bloom);
  const wateringsPerWeek = 7 / iv;
  if (wateringsPerWeek <= 0) return raw;
  const out = {};
  Object.entries(raw).forEach(([pid, val]) => {
    // Round to 2 decimals to keep display clean (0.8/2.33 = 0.343 → 0.34)
    out[pid] = Math.round((val / wateringsPerWeek) * 100) / 100;
  });
  return out;
}

/**
 * Check if a product unit is per-litre (scales with water) or absolute (fixed amount).
 * Per-litre: "ml/L", "g/L", "Tropfen/L", "Tr/L"
 * Absolute:  "ml", "g"
 */
function isPerLitre(unit) {
  return !!(unit && /\/L\b/.test(unit));
}

/**
 * Display unit extracted from a full unit string.
 * "ml/L" → "ml", "g/L" → "g", "Tropfen/L" → "Tropfen", "Tr/L" → "Tr", "g" → "g", "ml" → "ml"
 */
function displayUnit(unit) {
  if (!unit) return 'ml';
  return unit.replace(/\/L\b/, '').trim() || 'ml';
}

/**
 * Calculate the amount of fertilizer to add, based on:
 *  - plan: the planned dose (number, in product's unit)
 *  - waterMl: water volume in ml
 *  - unit: product unit (ml/L, g/L, Tr/L, ml, g)
 * Returns the amount in the product's display unit (ml, g, Tropfen/Tr).
 * For "/L" units: scales with water (plan × waterMl / 1000).
 * For absolute units: returns plan as-is regardless of water amount.
 */
function calcDose(plan, waterMl, unit) {
  if (!plan || plan <= 0) return 0;
  if (isPerLitre(unit)) {
    return Math.round((plan * waterMl / 1000) * 10) / 10;
  }
  // Absolute: fixed amount per watering, independent of water volume
  return Math.round(plan * 10) / 10;
}

/**
 * Return S.products sorted by S.mixOrder (if defined).
 * Products not in mixOrder are appended at the end in their original order.
 * When mixOrder is empty, products are returned as-is.
 * This single helper keeps week plan, nutrient table, additives list etc.
 * in a consistent order — the one the user set in "Mischreihenfolge".
 */
function orderedProducts() {
  const prods = S.products || [];
  if (!S.mixOrder || S.mixOrder.length === 0) return prods;
  // Build map name → product for fast lookup
  const byName = new Map(prods.map(p => [p.name, p]));
  const out = [];
  const seen = new Set();
  // First: products in mixOrder
  for (const name of S.mixOrder) {
    const p = byName.get(name);
    if (p && !seen.has(p.id)) { out.push(p); seen.add(p.id); }
  }
  // Then: any products not yet seen (e.g. freshly added before mixOrder-sync catches up)
  for (const p of prods) {
    if (!seen.has(p.id)) out.push(p);
  }
  return out;
}

function nextGiessTag(c, from) {
  if (!c.active || !c.startDate) return null;
  for (let i = 1; i <= 60; i++) {
    const iso = isoPlus(from, i);
    if (isGiessTag(iso, c)) return { iso, days: i };
  }
  return null;
}

function daysToHarvest(c) {
  if (!c.startDate) return null;
  const hd = (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays) + (c.bloomDays || PHASE_DEFAULTS.bloomDays) + (c.flushDays || PHASE_DEFAULTS.flushDays) + (c.iceDays || PHASE_DEFAULTS.iceDays);
  const harvestISO = isoPlus(c.startDate, hd);
  const diff = isoDiff(harvestISO, todayISO());
  return diff > 0 ? diff : 0;
}

function active() { return S.cycles.filter(c => c.active && c.startDate && !c.archived); }
// "archived()" in the visual sense: any cycle that has a startDate but isn't currently
// an active grow — includes both user-archived cycles and user-deactivated (stopped) ones.
// These render faded in the calendar so historical data stays visible.
function archived() { return S.cycles.filter(c => !c.active && c.startDate); }

/**
 * HISTORISCHE DATENVORSCHAU (Phase 3).
 * Liefert kompaktes HTML mit den wichtigsten eingetragenen Werten eines Tages:
 * Restgewicht, Gießmenge, pH/EC, Runoff-Diff, Topping, Notizen-Preview.
 * Respektiert Prinzip 8 (Ehrlichkeit der Daten): _suggested-Werte werden
 * gedämpft/kursiv dargestellt.
 *
 * @param {string} iso  Tag im ISO-Format
 * @param {object} opts { compact: boolean — kleinere Darstellung für Context-Menü }
 * @returns {string} HTML (leer wenn keine sinnvollen Daten)
 */
function dayDataPreview(iso, opts = {}) {
  if (!S.entries[iso]) return '';
  const entry = S.entries[iso];
  const act = active();
  const previews = [];

  act.forEach(c => {
    const cd = entry.cycleData?.[c.id];
    if (!cd) return;
    const ctx = contextFor(c, iso);
    if (!ctx) return;

    const sugg = cd._suggested || {};
    const parts = [];

    // Restgewicht (falls vorhanden, bevorzugt Waage über Hebe-Test)
    if (cd.weightG !== undefined && cd.weightG !== null && c.saturatedWeight && c.dryWeight) {
      const pct = calcRestPct(cd.weightG, c.saturatedWeight, c.dryWeight);
      if (pct !== null) {
        const clf = classifyRestPct(pct, ctx.isFinisher);
        parts.push(`<span style="color:${clf ? clf.color : 'var(--text-sub)'};font-family:var(--mono)">⚖️ ${cd.weightG}g · ${pct.toFixed(0)}%</span>`);
      }
    } else if (cd.restPct !== undefined && cd.restPct !== null) {
      const clf = classifyRestPct(parseFloat(cd.restPct), ctx.isFinisher);
      parts.push(`<span style="color:${clf ? clf.color : 'var(--text-sub)'};font-family:var(--mono)">✋ ${cd.restPct}%</span>`);
    }

    // Gießmenge
    if (cd.water) {
      const color = sugg.water ? 'var(--text-hint)' : 'var(--blue)';
      const style = sugg.water ? 'font-style:italic;opacity:0.7' : '';
      parts.push(`<span style="color:${color};font-family:var(--mono);${style}">💧 ${cd.water}ml</span>`);
    }

    // pH / EC (Input)
    if (cd.ph) {
      const color = sugg.ph ? 'var(--text-hint)' : 'var(--text-sub)';
      const style = sugg.ph ? 'font-style:italic;opacity:0.7' : '';
      parts.push(`<span style="color:${color};font-family:var(--mono);${style}">pH ${cd.ph}</span>`);
    }
    if (cd.ec) {
      const color = sugg.ec ? 'var(--text-hint)' : 'var(--text-sub)';
      const style = sugg.ec ? 'font-style:italic;opacity:0.7' : '';
      parts.push(`<span style="color:${color};font-family:var(--mono);${style}">EC ${cd.ec}</span>`);
    }

    // Runoff-Diff (kompakt, nur wenn Daten da)
    const ra = analyzeRunoff(cd);
    if (ra.hasRunoff && (ra.phDelta !== null || ra.ecDelta !== null)) {
      const warn = ra.warnings.length > 0;
      const color = warn ? 'var(--orange)' : 'var(--green)';
      const diffParts = [];
      if (ra.phDelta !== null) diffParts.push(`Δph ${ra.phDelta > 0 ? '+' : ''}${ra.phDelta.toFixed(1)}`);
      if (ra.ecDelta !== null) diffParts.push(`Δec ${ra.ecDelta > 0 ? '+' : ''}${ra.ecDelta.toFixed(1)}`);
      parts.push(`<span style="color:${color};font-family:var(--mono);font-size:10px">🌊 ${diffParts.join(' · ')}${warn ? ' ⚠' : ''}</span>`);
    }

    // Topping an dem Tag?
    if (c.toppingDate === iso) {
      parts.push(`<span style="color:var(--red);font-family:var(--mono)">✂️ Topping</span>`);
    }

    // Notizen-Vorschau (max 60 Zeichen)
    const notes = cd.notes && cd.notes.trim();
    let notesHTML = '';
    if (notes) {
      const short = notes.length > 60 ? notes.slice(0, 60) + '…' : notes;
      notesHTML = `<div style="font-size:10px;color:var(--text-muted);font-style:italic;line-height:1.4;margin-top:3px">📝 ${short}</div>`;
    }

    if (parts.length || notesHTML) {
      previews.push(`<div style="padding:4px 0;border-top:0.5px dashed var(--border)">
        <div style="display:flex;flex-wrap:wrap;gap:4px 10px;font-size:11px;line-height:1.5">${parts.join('')}</div>
        ${notesHTML}
      </div>`);
    }
  });

  return previews.length ? previews.join('') : '';
}

/**
 * HARVEST-COUNTDOWN (Phase 3 Schritt 6).
 * Berechnet Tage bis zur voraussichtlichen Ernte mit ehrlicher Unsicherheits-Angabe.
 *
 * Unsicherheit ergibt sich aus der Biologie:
 *   - Automatic: Genetik bestimmt, aber Stretch/Stress variiert → ±5 Tage
 *   - Feminisiert Indoor: 12/12 triggert klar, Trichome entscheiden final → ±3 Tage
 *   - Feminisiert Outdoor: Sonne + Wetter = hohe Varianz → ±10 Tage
 *
 * Letztendlich entscheiden Trichome (milchig/bernstein) über Erntezeitpunkt — die
 * berechnete Zahl ist ein Richtwert, keine Prophezeiung.
 *
 * @param {object} c  Zyklus-Objekt
 * @param {string} iso  Referenz-Datum (default: heute)
 * @returns {object|null} {
 *   daysRemaining: number  (negativ wenn Ernte-Zeit überschritten)
 *   uncertainty: number    (± Tage)
 *   harvestISO: string     Geplantes Erntedatum
 *   status: 'upcoming' | 'harvest-window' | 'overdue' | 'finished'
 *   label: string          Formatiert (z.B. "32 ±5 T.")
 *   tooltip: string        Lange Erklärung
 * }
 */
function harvestCountdown(c, iso = null) {
  if (!c || !c.startDate) return null;
  const refISO = iso || todayISO();

  const anzucht = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const bloom = c.bloomDays || PHASE_DEFAULTS.bloomDays;
  const flush = c.flushDays || PHASE_DEFAULTS.flushDays;
  const ice = c.iceDays || PHASE_DEFAULTS.iceDays;
  // Ernte-Tag = letzter Tag der Ernte-Phase. Die harvestDays-Phase ist kurz (1-3 T).
  // Wir zielen auf den ERSTEN Erntetag = nach Anzucht+Blüte+Flush+Ice.
  const daysToHarvest = anzucht + bloom + flush + ice;
  const harvestISO = isoPlus(c.startDate, daysToHarvest - 1);
  const daysRemaining = isoDiff(harvestISO, refISO);

  // Unsicherheit nach Typ
  const seedType = c.seedType || 'auto';
  const growType = c.growType || 'indoor';
  let uncertainty = 5;
  if (seedType === 'fem' && growType === 'indoor') uncertainty = 3;
  else if (seedType === 'fem' && growType === 'outdoor') uncertainty = 10;

  // Status
  let status, label, tooltip;
  if (daysRemaining > uncertainty) {
    status = 'upcoming';
    label = `${daysRemaining} ±${uncertainty} T.`;
    tooltip = `Erwartet am ~${fmtDE(harvestISO, {day:'2-digit', month:'2-digit'})}. Unsicherheit ±${uncertainty} Tage — letztendlich entscheiden die Trichome (milchig = Peak THC, bernstein = mehr Couchlock).`;
  } else if (daysRemaining >= -uncertainty) {
    status = 'harvest-window';
    label = daysRemaining === 0 ? 'Ernte-Tag!' : daysRemaining > 0 ? `~${daysRemaining} T.` : `heute ${Math.abs(daysRemaining)} T. über`;
    tooltip = `Ernte-Fenster ist offen. Trichome täglich mit Lupe prüfen — milchig bedeutet Peak, erste bernsteinfarbene = jetzt oder in 2-3 T. ernten. Zu früh = weniger Wirkung, zu spät = sedativer.`;
  } else {
    status = 'overdue';
    label = `${Math.abs(daysRemaining)} T. über`;
    tooltip = `Planmäßig bereits geerntet. Falls noch nicht passiert: Trichome jetzt bernsteinfarben? Zeit zum Schneiden.`;
  }

  return { daysRemaining, uncertainty, harvestISO, status, label, tooltip };
}


/**
 * ZYKLUS-OVERVIEW-STREIFEN (Phase 3).
 * Baut für einen Zyklus eine visuelle Gesamt-Leiste: Anzucht | Blüte | Flush | Ice | Ernte.
 * Jede Phase proportional nach ihrer Dauer. "Heute"-Marker als vertikale Linie + Caret.
 * Wenn der Zyklus noch nicht startete oder zu Ende ist, passend anzeigen.
 *
 * @param {object} c  Zyklus-Objekt
 * @returns {string} HTML
 */
function cycleOverviewStrip(c) {
  if (!c || !c.startDate) return '';

  // Phasen-Dauern (mit Defaults)
  const anzucht = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const bloom = c.bloomDays || PHASE_DEFAULTS.bloomDays;
  const flush = c.flushDays || PHASE_DEFAULTS.flushDays;
  const ice = c.iceDays || PHASE_DEFAULTS.iceDays;
  const harvest = c.harvestDays || PHASE_DEFAULTS.harvestDays;
  const dry = c.dryDays || PHASE_DEFAULTS.dryDays;
  const total = anzucht + bloom + flush + ice + harvest + dry;

  // Wo bin ich heute?
  const today = todayISO();
  const daysFromStart = isoDiff(today, c.startDate) + 1; // Tag 1 = Start
  const clampedDay = Math.max(1, Math.min(total, daysFromStart));
  const todayPct = ((clampedDay - 1) / total) * 100;

  // Phase-Block-Definition (Farben passend zum Kalender)
  const phases = [
    { name: 'Anz', full: 'Anzucht', days: anzucht, color: '#4caf70', bg: 'rgba(76,175,112,0.18)' },
    { name: 'Bloom', full: 'Blüte', days: bloom, color: '#e8884a', bg: 'rgba(232,136,74,0.18)' },
    { name: 'Flush', full: 'Spülen', days: flush, color: '#5ab0d8', bg: 'rgba(90,176,216,0.18)' },
    { name: 'Ice', full: 'IceFlush', days: ice, color: '#6fdce0', bg: 'rgba(111,220,224,0.18)' },
    { name: 'Ernte', full: 'Ernte', days: harvest, color: '#f0c050', bg: 'rgba(240,192,80,0.22)' },
    { name: 'Dry', full: 'Trocknen', days: dry, color: '#c88a48', bg: 'rgba(200,138,72,0.18)' },
  ].filter(ph => ph.days > 0);

  // Aktuelle Phase hervorheben
  let runningDay = 0;
  let currentPhaseName = null;
  for (const ph of phases) {
    if (clampedDay > runningDay && clampedDay <= runningDay + ph.days) {
      currentPhaseName = ph.name;
      break;
    }
    runningDay += ph.days;
  }

  // Segment-HTML
  const segmentsHTML = phases.map(ph => {
    const pct = (ph.days / total) * 100;
    const isCurrent = ph.name === currentPhaseName;
    return `<div style="width:${pct}%;background:${ph.bg};border-right:0.5px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:${isCurrent ? ph.color : 'rgba(255,255,255,0.45)'};padding:0 2px;overflow:hidden;white-space:nowrap;${isCurrent ? 'box-shadow:inset 0 -2px 0 ' + ph.color : ''}">${pct >= 8 ? ph.name : ''}</div>`;
  }).join('');

  // Today-Marker (vertikale Linie über den gesamten Streifen)
  const todayMarker = (daysFromStart >= 1 && daysFromStart <= total)
    ? `<div style="position:absolute;left:${todayPct}%;top:-3px;bottom:-3px;width:2px;background:var(--text);box-shadow:0 0 0 1px rgba(0,0,0,0.3);pointer-events:none">
         <div style="position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--text)"></div>
       </div>`
    : '';

  // Status-Text rechts — mit Ernte-Countdown und Unsicherheit
  let statusText, statusTooltip = '';
  if (daysFromStart < 1) {
    statusText = `startet in ${Math.abs(daysFromStart - 1)} T.`;
  } else if (daysFromStart > total) {
    statusText = 'abgeschlossen';
  } else {
    // Countdown mit ±X Tagen
    const hc = harvestCountdown(c, today);
    if (hc && hc.status === 'upcoming') {
      statusText = `🌾 ${hc.label}`;
      statusTooltip = hc.tooltip;
    } else if (hc && hc.status === 'harvest-window') {
      statusText = `🌾 ${hc.label}`;
      statusTooltip = hc.tooltip;
    } else if (hc && hc.status === 'overdue') {
      statusText = `🌾 ${hc.label}`;
      statusTooltip = hc.tooltip;
    } else {
      statusText = `Tag ${clampedDay}/${total}`;
    }
  }

  return `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:6px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px;min-width:0;flex:1">
        <span style="font-size:14px">${sym(c)}</span>
        <span style="font-size:12px;font-weight:600;color:${col(c).hex};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</span>
        ${currentPhaseName ? `<span style="font-size:9px;background:var(--card2);padding:2px 6px;border-radius:8px;color:var(--text-sub);font-weight:600">${phases.find(p => p.name === currentPhaseName)?.full || ''}</span>` : ''}
      </div>
      <span title="${statusTooltip}" style="font-size:10px;color:var(--text-muted);font-family:var(--mono);white-space:nowrap${statusTooltip ? ';cursor:help' : ''}">${statusText}</span>
    </div>
    <div style="position:relative;height:18px;border-radius:4px;overflow:visible;display:flex;background:var(--card2)">
      <div style="display:flex;width:100%;height:100%;border-radius:4px;overflow:hidden">${segmentsHTML}</div>
      ${todayMarker}
    </div>
  </div>`;
}

function calcStreak(c) {
  const today = todayISO();
  let s = 0;
  for (let i = 0; i < 90; i++) {
    const iso = isoPlus(today, -i);
    if (isGiessTag(iso, c)) {
      // Ein Gießtag zählt für den Streak wenn:
      // - Wassermenge eingetragen wurde, ODER
      // - Der User "Erledigt" auf dem Dashboard geklickt hat (_doneTodo)
      // Das verhindert dass der Streak bricht wenn jemand nur schnell abhakt.
      const cd = S.entries[iso]?.cycleData?.[c.id];
      if (cd && (cd.water || cd._doneTodo)) s++;
      else break;
    }
  }
  return s;
}

function waterStats(c) {
  const today = todayISO();
  const v = [];
  for (let i = 13; i >= 0; i--) {
    v.push(parseFloat(S.entries[isoPlus(today, -i)]?.cycleData?.[c.id]?.water) || 0);
  }
  return v;
}

/**
 * Dynamische Gießmengen-Empfehlung basierend auf Grow-Phase & Tag.
 *
 * Volumen-Matrix (für 11L Topf):
 * Phase 1 - Sämling (Tag 1-10):    50 → 250 ml (Ring um Sämling)
 * Phase 2 - Etablierung (Tag 11-17): 500 → 1500 ml (Radius vergrößern)
 * Phase 3 - Topping-Zone (Tag 18-24): 2000 → 2500 ml (ganzer Topf, kein Drain)
 * Phase 4 - Blüte-Stretch (Tag 25+): 3000 → 3500 ml (Vollsättigung, 10-15% Drain)
 * Spülen/IceFlush: 3500 → 4000 ml (extra Durchspülung)
 *
 * Skaliert proportional zur Topfgröße (Basis: 11L).
 */
function waterSuggestion(c, p) {
  // Helper: berechnet die "rohe" biophysikalische Empfehlung (ohne Personalisierung)
  const rawSuggestion = () => _waterSuggestionRaw(c, p);

  const raw = rawSuggestion();

  // PERSONALISIERUNG: Wenn der User in den letzten Gießtagen systematisch mehr
  // (oder weniger) gegossen hat als empfohlen, passt sich die App an.
  // Wir nehmen das Verhältnis aus den letzten 3 tatsächlich gegossenen Tagen und
  // bilden ein gleitendes Mittel. So wirken einmalige Abweichungen nicht zu stark.
  if (c && c.id && p && S.entries) {
    const today = todayISO();
    const recentRatios = [];
    // Rückwärts durch die letzten 30 Tage gehen, bis 3 relevante Gießtage gefunden sind
    for (let i = 1; i <= 30 && recentRatios.length < 3; i++) {
      const iso = isoPlus(today, -i);
      const cd = S.entries[iso]?.cycleData?.[c.id];
      if (!cd?.water) continue;
      const userMl = parseFloat(cd.water);
      if (!userMl || userMl < 50) continue; // Ignoriere Tag-1 (0 ml) und absurd niedrige
      const pPast = phase(iso, c);
      if (!pPast) continue;
      const expectedMl = _waterSuggestionRaw(c, pPast);
      if (!expectedMl) continue;
      const ratio = userMl / expectedMl;
      // Clamp auf sinnvollen Bereich — wer mal deutlich weniger gießt (z.B. weil Erde
      // noch feucht war) soll nicht die ganze Zukunft nach unten ziehen.
      if (ratio >= 0.5 && ratio <= 2.0) {
        recentRatios.push(ratio);
      }
    }
    if (recentRatios.length >= 2) {
      const avgRatio = recentRatios.reduce((a, b) => a + b, 0) / recentRatios.length;
      // Sanfte Anpassung: Nur anwenden wenn Abweichung >10% ist, sonst Default lassen.
      // So wird nicht bei jeder kleinen Variation alles umgerechnet.
      if (Math.abs(avgRatio - 1.0) > 0.1) {
        return Math.round(raw * avgRatio / 50) * 50;
      }
    }
  }
  return raw;
}

// Interne rohe Empfehlung ohne Personalisierung — Basis für Personalisierungs-Berechnung
function _waterSuggestionRaw(c, p) {
  const pot = S.potSize || 11;
  const scale = pot / 11; // Skalierungsfaktor relativ zu 11L
  // Outdoor-Pflanzen haben mehr Blattmasse + Sonne/Wind = mehr Verdunstung.
  // Empirisch (Foren-Berichte): 30L-Topf mit 1,4m Pflanze verbraucht an heißen Tagen
  // komplett 10-12L. Skaliert = +30-40% gegenüber Indoor bei gleicher Topfgröße.
  const outFactor = (c && c.growType === 'outdoor') ? 1.3 : 1.0;
  const snap = (ml) => Math.round(ml * scale * outFactor / 50) * 50;

  if (!p) return snap(3000);

  // Spülen & IceFlush: extra viel (Durchspülung)
  if (p.ph === 'flush' || p.ph === 'ice') {
    return snap(3750);
  }

  // VORZUCHT drinnen (Outdoor vorgezogen): wie Indoor-Anzucht, kein Outdoor-Faktor
  if (p.ph === 'vorzucht') {
    const day = p.vegDay || p.day || 1;
    if (day <= 10) {
      const ml = 50 + (day - 1) * (200 / 9); // 50 → 250
      return Math.round(ml * scale / 50) * 50;  // KEIN outFactor — ist ja drinnen
    }
    if (day <= 18) {
      const ml = 500 + (day - 11) * (1000 / 7);
      return Math.round(ml * scale / 50) * 50;
    }
    // Wenn Vorzucht länger dauert: max ~2L (noch keine Riesenpflanze)
    const ml = 1500 + Math.min(day - 18, 20) * 25;
    return Math.round(ml * scale / 50) * 50;
  }

  // VEGI DRAUSSEN (vegi_out): ausgewachsene Pflanze, volle Outdoor-Verdunstung
  // Community-Werte (Hanf-im-Glück, Hanfgartenshop): 10-25% des Topfvolumens pro Gießung
  // Bei 30L-Topf: 3-7,5L pro Gießung
  if (p.ph === 'vegi_out') {
    const vDay = p.vegDay || 1;
    // Grundbedarf: ~20% des Topfvolumens bei ausgewachsener Pflanze
    // Start niedriger (frisch umgepflanzt, Wurzeln noch nicht voll entwickelt), dann hoch
    // Basis in ml/L Topf: 150ml/L (entspricht 15% Topfvolumen)
    const mlPerLiterPot = vDay <= 7 ? 100      // frisch umgepflanzt: 10% Topfvolumen
                       : vDay <= 14 ? 130      // etabliert: 13%
                       : vDay <= 28 ? 160      // volles Wachstum: 16%
                       : 200;                  // ausgewachsen: 20%
    const baseMl = pot * mlPerLiterPot;
    // Outdoor-Faktor bereits in outFactor enthalten, aber hier wenden wir ihn direkt an
    // (statt über snap-Scaling) — Community-Werte sind bereits für Outdoor-Topf gedacht.
    return Math.round(baseMl / 50) * 50;
  }

  // Gesamttag im Zyklus (1-basiert) — für klassische Indoor/Outdoor-Anzucht
  const day = p.day || 1;

  // Phase 1: Sämling (Tag 1-10)
  if (day <= 10) {
    const ml = 50 + (day - 1) * (200 / 9); // 50 → 250
    return snap(ml);
  }
  // Phase 2: Etablierung (Tag 11-17/18)
  if (day <= 18) {
    const ml = 500 + (day - 11) * (1000 / 7); // 500 → 1500
    return snap(ml);
  }
  // Phase 3: Topping-Zone / Prä-Blüte (Tag 18-24)
  if (day <= 24) {
    const ml = 2000 + (day - 18) * (500 / 6); // 2000 → 2500
    return snap(ml);
  }
  // Phase 4: Blüte-Stretch & Volle Blüte (Tag 25+)
  const bloomDay = day - 24;
  // Bei Outdoor mit großen Töpfen (20L+): realistischer Verbrauch steigt deutlich.
  // Forum-Bericht: 30L-Topf, Blüte, heißer Tag → bis 12L/Tag möglich.
  if (c && c.growType === 'outdoor' && pot >= 20) {
    // Outdoor, großer Topf: 15-25% Topfvolumen pro Gießung
    const mlPerL = Math.min(250, 150 + bloomDay * 5);  // 150→250 ml/L Topf
    return Math.round(pot * mlPerL / 50) * 50;
  }
  if (bloomDay <= 10) {
    const ml = 3000 + bloomDay * (500 / 10); // 3000 → 3500
    return snap(ml);
  }
  return snap(3500);
}

function getAlerts(c) {
  const today = todayISO();
  const p = phase(today, c);
  if (!p || !c.active) return [];
  const out = [];

  // Overdue check
  const waterDates = Object.keys(S.entries)
    .filter(d => d <= today && S.entries[d]?.cycleData?.[c.id]?.water)
    .sort();
  const lastW = waterDates[waterDates.length - 1];
  if (lastW) {
    const days = isoDiff(today, lastW);
    const iv = getInt(c, p.ph);
    if (days > iv + 1) {
      out.push({ icon: '⚠️', text: `Gießen überfällig! Letztes: vor ${days}d (Intervall: ${iv}d)`, type: 'warn' });
    }
  }

  // Irregular interval warning (check last 5 waterings)
  if (waterDates.length >= 3) {
    const recent = waterDates.slice(-5);
    const gaps = [];
    for (let i = 1; i < recent.length; i++) gaps.push(isoDiff(recent[i], recent[i-1]));
    const avg = gaps.reduce((a, b) => a + b, 0) / gaps.length;
    const variance = gaps.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / gaps.length;
    if (variance > 2) {
      out.push({ icon: '📊', text: `Gießrhythmus schwankt (${gaps.join(', ')}d). Gleichmäßiger = besser!`, type: 'tip' });
    }
  }

  // Phase-specific alerts
  if (p.ph === 'bloom') {
    const rem = (c.bloomDays || PHASE_DEFAULTS.bloomDays) - (p.day - (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays));
    if (rem > 0 && rem <= 7) out.push({ icon: '🚿', text: `Spülung in ${rem} Tagen`, type: 'info' });
    if (p.week >= 7) out.push({ icon: '🔬', text: `Woche ${p.week} – Trichome checken!`, type: 'tip', action: 'trichome', cId: c.id });
  }
  if (p.ph === 'ice' || p.ph === 'harvest') {
    out.push({ icon: '✂️', text: 'Ernte naht!', type: 'success' });
  }

  // OUTDOOR HITZESTRESS — biophysikalisch fundierter Check.
  // Quellen: RQS, Atami, GrowWeedEasy, BestVaLED:
  //   - Über 30°C: Stomata schließen → Photosynthese stoppt → kein Wachstum
  //   - In Blüte über 28°C: Terpene verdampfen, Bud-Qualität leidet
  //   - Schwarze Töpfe in Sonne: Wurzelzone bis 45°C → "wurzelt" wörtlich aus
  //   - Über 31°C Wurzelzone: THC-Produktion sinkt, Stress-Shock
  // Wir nutzen die Wetter-Prognose (wenn vorhanden) UND letzte Messung.
  if (c.growType === 'outdoor') {
    // Heutige Prognose-Höchsttemp oder letzter Messwert
    const wTMax = S.weather?.data?.forecast?.find(f => f.date === today)?.tmax;
    const lastTemp = lastW && S.entries[lastW] ? parseFloat(S.entries[lastW].temp) : NaN;
    const checkTemp = !isNaN(wTMax) ? wTMax : (!isNaN(lastTemp) ? lastTemp : null);

    if (checkTemp !== null) {
      if (checkTemp >= 35) {
        const text = S.beginnerMode
          ? `🔥 ${checkTemp}°C heute — kritisch! Pflanze unbedingt schattieren. Topf möglichst aus der Sonne, morgens & abends gießen.`
          : `🔥 ${checkTemp}°C Hitze — Stomata schließen dauerhaft, kein Wachstum. Schatten + Mulch + doppelt gießen (morgens/abends).`;
        out.push({ icon: '🔥', text, type: 'warn' });
      } else if (checkTemp >= 30) {
        const inBloom = p.ph === 'bloom';
        const text = S.beginnerMode
          ? (inBloom
             ? `🌡️ ${checkTemp}°C heute — in der Blüte kostet das Qualität. Schatten zur Mittagszeit hilft.`
             : `🌡️ ${checkTemp}°C heute heiß — morgens gießen damit die Wurzel kühl bleibt.`)
          : (inBloom
             ? `🌡️ ${checkTemp}°C in Blüte → Terpene verdampfen, Buds werden luftig. Mittagsschatten + morgens gießen empfohlen.`
             : `🌡️ ${checkTemp}°C — Stomata beginnen zu schließen. Photosynthese läuft noch aber gebremst. Morgens gießen.`);
        out.push({ icon: '🌡️', text, type: 'tip' });
      }
    }

    // Sommer-Spezial: Warnung vor heißen Töpfen — nur bei echter Hitze UND Sommer UND aktiver Vegi/Blüte
    // (kein persistenter Dismiss — die Warnung verschwindet von selbst wenn es kühler wird)
    const month = new Date(today + 'T12:00:00').getMonth(); // 0=Jan, 5=Juni, 7=Aug
    const isSummer = month >= 5 && month <= 7;
    const isVegiOrBloom = p.ph === 'vegi_out' || p.ph === 'bloom';
    const isActuallyHot = !isNaN(wTMax) && wTMax >= 28;
    if (isSummer && isVegiOrBloom && isActuallyHot) {
      out.push({
        icon: '🫙',
        text: S.beginnerMode
          ? 'Schwarze Töpfe werden in der Sonne bis 45°C heiß und verbrennen die Wurzeln. Heller Übertopf oder Mulch hilft.'
          : 'Biophysik: Schwarze Töpfe in Direktsonne → Wurzelzone 40-50°C → über 31°C sinkt THC-Produktion. Heller Übertopf + Mulch = Lösung.',
        type: 'tip',
      });
    }

    // Kühle Nächte in Blüte = Feature. Nur anzeigen wenn's heute tatsächlich kühl wird.
    if (p.ph === 'bloom' && p.week >= 4) {
      const wTMin = S.weather?.data?.forecast?.find(f => f.date === today)?.tmin;
      if (!isNaN(wTMin) && wTMin <= 13 && wTMin >= 5) {
        out.push({
          icon: '❄️',
          text: S.beginnerMode
            ? `Kühle Nacht (${wTMin}°C) — in der Blüte ist das GUT: färbt Trichome intensiver und dichter.`
            : `${wTMin}°C nachts → Kälte-Signal triggert Anthocyan/Trichom-Produktion. Gold für Farbe + Harz.`,
          type: 'tip',
        });
      }
    }

    // HERBST-SCHIMMEL-FRÜHWARNUNG (Botrytis/Grauschimmel)
    // Quellen: mallorca-seeds.com, mr-hanf.de — ab Mitte September steigt Risiko massiv.
    // Biophysik: Dichte Buds + hohe RLF + kühl = perfektes Botrytis-Klima.
    // Ab Bluete Woche 5+ sind Buds dicht genug dass Schimmel von innen entstehen kann.
    const today12 = new Date(today + 'T12:00:00');
    const m = today12.getMonth(); // 8=Sept, 9=Okt
    const isHighRiskSeason = m === 8 || m === 9;
    if (isHighRiskSeason && p.ph === 'bloom' && p.week >= 5) {
      // Kombiniere Wetter-Risiko + letzte Messung
      const wF = S.weather?.data?.forecast?.slice(0, 3) || [];
      const wetCoolDays = wF.filter(d => d.rain_sum >= 3 && d.tmax <= 20).length;
      const lastRH = lastW && S.entries[lastW] ? parseFloat(S.entries[lastW].humidity) : NaN;

      if (wetCoolDays >= 2 || (!isNaN(lastRH) && lastRH >= 75)) {
        out.push({
          icon: '🍄',
          text: S.beginnerMode
            ? 'Schimmelgefahr steigt! Buds täglich auf graue/braune Stellen prüfen. Bei Funden sofort weg­schneiden, nicht warten.'
            : 'Botrytis-Risiko (nass + kühl + dichte Buds). Tägliche Bud-Inspektion, verdächtige Stellen sofort chirurgisch entfernen. Im Zweifel: frühe Ernte.',
          type: 'warn',
        });
      } else {
        // Allgemeine Aufmerksamkeits-Reminder ohne akute Gefahr
        out.push({
          icon: '🔍',
          text: S.beginnerMode
            ? 'Herbst-Blüte: alle 2-3 Tage Buds prüfen. Grauer Flaum oder braune Stellen = Schimmel.'
            : 'Herbstmonitoring: Buds alle 2-3 Tage auf Botrytis checken (grauer Flaum, braune Innenstellen).',
          type: 'tip',
        });
      }
    }
  }

  // EC warning from last entry
  if (lastW) {
    const lastEC = parseFloat(S.entries[lastW]?.cycleData?.[c.id]?.ec);
    if (lastEC > 2.5) {
      const text = S.beginnerMode
        ? `Dünger-Wert zu hoch (${lastEC}) — nächstes Mal nur Wasser geben`
        : `Letzter EC: ${lastEC} — Zwischenguss mit reinem Wasser erwägen`;
      out.push({ icon: '🧪', text, type: 'warn' });
    }
  }

  // Smart: Topping reminder (Vegi Wo2-3, not yet topped)
  // Greift nun auch bei Outdoor (vorzucht/vegi_out) und Indoor (anzucht)
  if (isVegiPhase(p.ph) && p.week >= 2 && p.week <= 3 && !c.toppingDate) {
    const text = S.beginnerMode
      ? 'Du könntest jetzt "toppen" — das verdoppelt deinen Ertrag. Im Lexikon nachschlagen.'
      : 'Topping-Fenster offen! 4.–5. Nodium = idealer Zeitpunkt.';
    out.push({ icon: '✂️', text, type: 'tip' });
  }

  // Smart: Light schedule (dynamic based on seedType)
  // Outdoor skips this — the sun's photoperiod handles the transition.
  if (c.seedType !== 'auto' && c.growType !== 'outdoor') {
    // Feminisiert/Regulär: remind to switch light when bloom starts
    if (p.ph === 'bloom' && p.week === 1 && c.lightVeg !== c.lightBloom) {
      out.push({ icon: '💡', text: `Licht von ${c.lightVeg || '18/6'} auf ${c.lightBloom || '18/6'} umstellen!`, type: 'warn' });
    }
  }

  // Smart: pH trend warning (last 5 entries)
  if (waterDates.length >= 3) {
    const recentPH = waterDates.slice(-5).map(d => parseFloat(S.entries[d]?.cycleData?.[c.id]?.ph)).filter(v => v > 0);
    if (recentPH.length >= 3) {
      const avgPH = recentPH.reduce((a, b) => a + b, 0) / recentPH.length;
      if (avgPH < 6.0) out.push({ icon: '📉', text: `pH-Trend zu niedrig (Ø ${avgPH.toFixed(1)}) — pH höher korrigieren!`, type: 'warn' });
      if (avgPH > 6.8) out.push({ icon: '📈', text: `pH-Trend zu hoch (Ø ${avgPH.toFixed(1)}) — mehr pH-Down nutzen!`, type: 'warn' });
    }
  }

  // Smart: Estimated harvest date
  if (p.ph === 'bloom' || isVegiPhase(p.ph)) {
    // Bei Outdoor-Photoperiode mit bloomStartDate: Ernte = bloomStart + bloomDays + flush + ice + harvest
    const bs = _computeBloomStartDate(c);
    let harvestISO;
    if (bs) {
      const bloomLen = c.bloomDays || PHASE_DEFAULTS.bloomDays;
      const flushLen = c.flushDays || PHASE_DEFAULTS.flushDays;
      const iceLen = c.growType === 'outdoor' ? 0 : (c.iceDays || PHASE_DEFAULTS.iceDays);
      harvestISO = isoPlus(bs, bloomLen + flushLen + iceLen);
    } else {
      const totalGrowDays = (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays) + (c.bloomDays || PHASE_DEFAULTS.bloomDays) + (c.flushDays || PHASE_DEFAULTS.flushDays) + (c.iceDays || PHASE_DEFAULTS.iceDays);
      harvestISO = isoPlus(c.startDate, totalGrowDays);
    }
    const daysLeft = isoDiff(harvestISO, today);
    if (daysLeft > 0 && daysLeft <= 14) {
      out.push({ icon: '📅', text: `Ernte ca. ${fmtDE(harvestISO, {day:'2-digit',month:'short'})} (in ${daysLeft}d)`, type: 'success' });
    } else if (c.growType === 'outdoor' && daysLeft > 14 && daysLeft <= 90 && p.ph === 'bloom') {
      // Outdoor: schon in Blüte aber noch nicht kritisch nah — Fenster-Prognose
      // ± 7 Tage weil echtes Erntetiming nach Trichomen, nicht Kalender geht
      const earlyISO = isoPlus(harvestISO, -7);
      const lateISO = isoPlus(harvestISO, 7);
      out.push({
        icon: '🗓️',
        text: S.beginnerMode
          ? `Erntefenster: ${fmtDE(earlyISO, {day:'2-digit',month:'short'})} bis ${fmtDE(lateISO, {day:'2-digit',month:'short'})} (in ${daysLeft}d). Ab Woche 7 Trichome prüfen!`
          : `Erntefenster: ${fmtDE(earlyISO, {day:'2-digit',month:'short'})}–${fmtDE(lateISO, {day:'2-digit',month:'short'})} (${daysLeft}d). Trichome-Lupe ab Wo 7, Farbwechsel ist der Trigger.`,
        type: 'tip',
      });
    }
  }

  // Milestones — Motivations-Karten für Anfänger. Werden pro Zyklus einmal
  // "abgehakt" (c._milestones = {key: true}), sodass sie nur kurz erscheinen.
  // Wir zeigen aber auch solche die schon gesehen wurden wieder, wenn der
  // entsprechende Tag *heute* ist — so verpasst niemand den Moment.
  const daysSinceStart = p.day;
  const milestones = [];
  if (daysSinceStart === 3) milestones.push({ key: 'd3', icon: '🌱', text: 'Tag 3 — erste Blättchen kommen raus! Jetzt nur ganz wenig gießen.', type: 'milestone' });
  if (daysSinceStart === 7) milestones.push({ key: 'd7', icon: '🎉', text: 'Eine Woche geschafft! Typisch: erstes echtes Laubblatt-Paar.', type: 'milestone' });
  if (daysSinceStart === 14) milestones.push({ key: 'd14', icon: '💪', text: '2 Wochen! Jetzt passiert das meiste unter der Erde — Wurzeln wachsen wie verrückt.', type: 'milestone' });
  if (daysSinceStart === 21) milestones.push({ key: 'd21', icon: '🌿', text: '3 Wochen! Die Pflanze sollte jetzt buschiger werden. Zeit fürs Topping (wenn gewünscht).', type: 'milestone' });
  if (p.ph === 'bloom' && p.day === 1) milestones.push({ key: 'bloom_start', icon: '🌸', text: 'Blütenphase startet! Ab jetzt kein Stickstoff mehr hochdrehen, die Pflanze stretcht noch 2-3 Wochen.', type: 'milestone' });
  if (p.ph === 'bloom' && daysSinceStart && p.week === 4) milestones.push({ key: 'bloom_wk4', icon: '✨', text: 'Woche 4 Blüte — die ersten echten Blütenansätze werden sichtbar!', type: 'milestone' });

  // PHASE-ÜBERGANG-VORSCHAU: 3 Tage vor einem wichtigen Phasenwechsel rechtzeitig hinweisen.
  // Wir schauen welche Phase in 3 Tagen aktiv sein wird und vergleichen mit heute.
  // So bekommt der User Zeit sich vorzubereiten (Licht umstellen, Spülwasser bereit, etc.).
  // MIGRATION Phase 2: nutzt jetzt T.phaseTransition.* mit seedType×growType-Logik —
  // Automatics bekommen den korrekten "nichts tun"-Text, nicht generische "12/12"-Pauke.
  const p3 = phase(isoPlus(today, 3), c);
  if (p3 && p && p3.ph !== p.ph) {
    const transitionKey = `prev_${p.ph}_to_${p3.ph}`;
    const seedType = c.seedType || 'auto';
    const growType = c.growType || 'indoor';
    let hint = null;
    if (p3.ph === 'bloom' && isVegiPhase(p.ph)) {
      // ZENTRALE STELLE: T.phaseTransition.toBloomSoon entscheidet seedType×growType-
      // abhängig was der User lesen soll. Kein "12/12" für Automatics mehr.
      hint = { icon: '🌸', text: T.phaseTransition.toBloomSoon({ seedType, growType, daysUntil: 3 }) };
    } else if (p3.ph === 'flush') {
      hint = { icon: '🚿', text: T.phaseTransition.toFlushSoon({ daysUntil: 3 }) };
    } else if (p3.ph === 'ice') {
      hint = { icon: '🧊', text: T.phaseTransition.toIceSoon({ daysUntil: 3 }) };
    } else if (p3.ph === 'harvest') {
      hint = { icon: '✂️', text: T.phaseTransition.toHarvestSoon({ daysUntil: 3 }) };
    } else if (p3.ph === 'dry') {
      hint = { icon: '🍂', text: T.phaseTransition.toDrySoon({ daysUntil: 3 }) };
    }
    if (hint && !c._milestones?.[transitionKey]) {
      milestones.push({ key: transitionKey, ...hint, type: 'milestone' });
    }
  }

  milestones.forEach(m => {
    // Nur anzeigen wenn noch nicht gesehen UND es heute passt. Die Speicherung
    // erfolgt erst wenn der User die Karte via dismissMilestone entfernt.
    if (!c._milestones?.[m.key]) {
      out.push({ ...m, cId: c.id });
    }
  });

  // Wöchentlicher Foto-Reminder: "Mach dein Wochen-Foto!"
  // Bedingung: Heute ist Sonntag (Wochenende) UND letztes Foto ist > 6 Tage her.
  // So kann der User sich eine schöne Fortschritts-Timeline bauen.
  const isSunday = new Date(today + 'T12:00:00').getDay() === 0;
  if (isSunday && p.day >= 7) {
    // Letztes Foto-Datum finden
    let lastPhotoISO = null;
    const photoDates = Object.keys(S.entries)
      .filter(d => S.entries[d]?.cycleData?.[c.id]?.photos?.length > 0)
      .sort();
    if (photoDates.length > 0) lastPhotoISO = photoDates[photoDates.length - 1];
    const daysSincePhoto = lastPhotoISO ? isoDiff(today, lastPhotoISO) : 99;
    if (daysSincePhoto >= 6 && !c._milestones?.[`photoRem_${today}`]) {
      out.push({
        icon: '📸',
        text: `<b>Wochen-Foto</b> für ${c.name} — zeig wie weit sie ist! Später gibt's daraus eine Fortschritts-Kollage.`,
        type: 'photo_reminder',
        cId: c.id,
        key: `photoRem_${today}`,
      });
    }
  }

  return out;
}

function calcVPD(t, rh) {
  if (isNaN(t) || isNaN(rh)) return null;
  return Math.round(0.6108 * Math.exp(17.27 * t / (t + 237.3)) * (1 - rh / 100) * 100) / 100;
}

/**
 * VPD zone labels + styling. Optional args:
 *   - phaseInfo {ph, week}: late bloom (bloom wk 7+) 1.4-1.6 is Cup-Niveau (intentional)
 *   - growType: 'outdoor' skips actionable hints ("Lüfter an", "RLF erhöhen") since
 *               the user can't control the weather — only informational labels remain.
 */
function vpdZone(v, phaseInfo, growType) {
  if (v === null) return null;
  const isLateBloom = phaseInfo && phaseInfo.ph === 'bloom' && (phaseInfo.week || 0) >= 7;
  const outdoor = growType === 'outdoor';
  if (v < 0.4) return { label: 'Zu feucht', color: '#7a7af0', bg: '#1e1e3a', hint: outdoor ? 'Hohe Luftfeuchte — Schimmelrisiko beobachten.' : 'Lüfter an!', pct: v / 0.4 * 15 };
  if (v < 0.8) return { label: 'Anzucht ✓', color: '#5aabf0', bg: '#0d1e2e', hint: 'Ideal für Sämlinge.', pct: 15 + (v - 0.4) / 0.4 * 35 };
  if (v < 1.2) return { label: 'Blüte ✓', color: '#4caf70', bg: '#0d1e0d', hint: 'Optimal für Blüte!', pct: 50 + (v - 0.8) / 0.4 * 25 };
  if (v < 1.6) {
    if (isLateBloom) {
      return { label: 'Spätblüte ✓', color: '#4caf70', bg: '#0d1e0d', hint: 'Cup-Niveau: Trichom-Boost durch milden Trockenstress.', pct: 75 + (v - 1.2) / 0.4 * 15 };
    }
    return { label: 'Etwas hoch', color: '#c8a04a', bg: '#2a1e0d', hint: outdoor ? 'Trockener Tag — häufiger gießen falls heiß.' : 'RLF erhöhen (in Spätblüte OK als Cup-Niveau).', pct: 75 + (v - 1.2) / 0.4 * 15 };
  }
  return { label: 'Stress!', color: '#e06060', bg: '#2a0d0d', hint: outdoor ? 'Sehr trocken — Schattenplatz und Wasser prüfen.' : 'Sofort RLF anpassen!', pct: Math.min(97, 90 + (v - 1.6) * 10) };
}

/**
 * Plausibility warnings for the entry screen. Returns an array of
 * {type: 'warn'|'info'|'err', text} sorted most-critical-first.
 * Helps beginners catch typos or unreasonable values before they hurt the plant.
 *
 * @param {Object} cd - per-cycle data (water, ph, ec, ...)
 * @param {Object} p  - phase info from phase()
 * @param {Object} e  - entry (for temp, humidity)
 * @param {Object} c  - cycle (for waterSuggestion comparison)
 */
function getEntryWarnings(cd, p, e, c) {
  const out = [];
  const waterVal = parseFloat(cd?.water);
  const phVal = parseFloat(cd?.ph);
  const ecVal = parseFloat(cd?.ec);
  const tempVal = parseFloat(e?.temp);
  const rhVal = parseFloat(e?.humidity);

  // Water: too much compared to suggestion (only during growth phases)
  if (p && waterVal > 0 && (isVegiPhase(p.ph) || p.ph === 'bloom')) {
    const sug = waterSuggestion(c, p);
    if (waterVal > sug * 2.5) {
      out.push({ type: 'err', text: `⚠️ Sehr viel Wasser für Tag ${p.day}! Empfehlung: ~${sug} ml. Zu viel Wasser = Wurzelfäule.` });
    } else if (waterVal > sug * 1.8) {
      out.push({ type: 'warn', text: `💧 Viel Wasser (Empfehlung: ~${sug} ml). Sicher? Erde darf dazwischen antrocknen.` });
    }
  }

  // pH: dangerous zones + Cup-Niveau Grenzbereich-Warnungen
  if (phVal > 0) {
    if (phVal < 5.5) {
      const text = S.beginnerMode
        ? `pH ${phVal.toFixed(1)} ist zu sauer — die Pflanze kann Nährstoffe nicht aufnehmen. Ziel: 6,2–6,4.`
        : `⚠️ pH ${phVal.toFixed(1)} zu niedrig! Nährstoff-Lockout droht. Ziel: 6.2–6.4.`;
      out.push({ type: 'err', text });
    } else if (phVal < 6.0) {
      const text = S.beginnerMode
        ? `pH ${phVal.toFixed(1)} etwas zu sauer — Ziel: 6,2–6,4.`
        : `⚠ pH ${phVal.toFixed(1)} unter 6.0 — Ca/Mg werden blockiert (Lockout). Ziel: 6.2–6.4.`;
      out.push({ type: 'warn', text });
    } else if (phVal > 7.2) {
      const text = S.beginnerMode
        ? `pH ${phVal.toFixed(1)} zu basisch — pH-Down nutzen. Ziel: 6,2–6,4.`
        : `⚠️ pH ${phVal.toFixed(1)} zu hoch! Eisen/Mangan unerreichbar. Ziel: 6.2–6.4.`;
      out.push({ type: 'err', text });
    } else if (phVal > 6.5) {
      const text = S.beginnerMode
        ? `pH ${phVal.toFixed(1)} etwas zu basisch — pH-Down nutzen. Ziel: 6,2–6,4.`
        : `⚠ pH ${phVal.toFixed(1)} über 6.5 — Eisen/Mangan/Phosphor werden blockiert. pH-Down nutzen. Ziel: 6.2–6.4.`;
      out.push({ type: 'warn', text });
    }
  }

  // EC checks (preserves existing logic but goes through central system)
  if (ecVal > 2.5) {
    const text = S.beginnerMode
      ? '⚠ Dünger-Wert zu hoch — nächstes Mal weniger düngen. Bei Bedarf: nur Wasser geben.'
      : '⚠️ EC über 2.5! Überdüngung möglich. Nächstes Mal weniger düngen, ggf. Zwischenguss mit reinem Wasser.';
    out.push({ type: 'err', text });
  } else if (ecVal > 0 && ecVal < 0.8 && p && p.ph === 'bloom') {
    const text = S.beginnerMode
      ? 'ℹ Dünger-Wert niedrig — du könntest etwas mehr düngen.'
      : 'ℹ️ EC unter 0.8 — Pflanze kann mehr vertragen. Dosis leicht erhöhen.';
    out.push({ type: 'info', text });
  }

  // Temperature (environment) — Schwellen abhängig von Grow-Typ
  // Outdoor: natürliche Schwankungen sind normal (Nachtkühle triggert sogar Trichomfärbung).
  // Indoor: engere Kontrolle, Cup-Niveau.
  const isOutdoor = c && c.growType === 'outdoor';
  if (!isNaN(tempVal) && tempVal > 0) {
    if (isOutdoor) {
      // Outdoor: nur kritische Extreme als Warnung
      if (tempVal > 35) out.push({ type: 'err', text: `🌡️ ${tempVal}°C sehr heiß! Schatten oder morgens gießen damit die Wurzeln nicht kochen.` });
      else if (tempVal > 30) out.push({ type: 'warn', text: `🌡️ ${tempVal}°C heiß — Pflanze kann welk wirken, abends viel gießen.` });
      else if (tempVal < 8) out.push({ type: 'err', text: `🌡️ ${tempVal}°C zu kalt — Frostschutz! Pflanze ggf. reinholen oder abdecken.` });
      else if (tempVal < 12 && p && isVegiPhase(p.ph)) out.push({ type: 'info', text: `🌡️ ${tempVal}°C — kühl aber OK. Wachstum verlangsamt sich.` });
      // Kälte in der Blüte ist IHM sogar erwünscht (Trichomfärbung) — keine Warnung.
    } else {
      // Indoor: engere Schwellen
      if (tempVal > 32) out.push({ type: 'err', text: `🌡️ ${tempVal}°C zu heiß! Hitzestress (Taco-Blätter). Lüftung erhöhen.` });
      else if (tempVal > 29) out.push({ type: 'warn', text: `🌡️ ${tempVal}°C hoch — Stoffwechsel bremst. Ideal: 22–28°C.` });
      else if (tempVal < 15) out.push({ type: 'err', text: `🌡️ ${tempVal}°C zu kalt — Wachstum stoppt, Wurzelschäden drohen. Heizen!` });
      else if (tempVal < 18) out.push({ type: 'warn', text: `🌡️ ${tempVal}°C unter 18°C — Phosphor-Lockout droht, lila/rote Verfärbungen möglich.` });
    }
  }

  // Humidity — Outdoor: RLF ist Wetter, kann man nicht kontrollieren
  if (!isNaN(rhVal) && rhVal > 0) {
    if (isOutdoor) {
      // Outdoor: Nur echte Schimmelwarnung in der Blüte, sonst keine Warnung
      if (rhVal > 85 && p && p.ph === 'bloom' && p.week >= 4) {
        out.push({ type: 'warn', text: `💨 ${rhVal}% RLF sehr hoch in späterer Blüte — Schimmelrisiko! Bei anhaltender Nässe Netz/Dach nutzen.` });
      }
    } else {
      if (rhVal > 80) out.push({ type: 'err', text: `💨 ${rhVal}% RLF sehr hoch — Schimmelrisiko! Lüftung maximal.` });
      else if (rhVal > 70) out.push({ type: 'warn', text: `💨 ${rhVal}% RLF über 70 — Aktivkohlefilter kann kondensieren und Geruch durchlassen.` });
      else if (rhVal < 30 && p && p.ph !== 'dry') out.push({ type: 'warn', text: `💨 ${rhVal}% RLF sehr niedrig — Pflanze schließt Stomata.` });
    }
  }

  // Sort: err > warn > info.
  // Use ?? (nullish coalescing) not ||, because 0 || 9 === 9 would misplace err-type.
  const order = { err: 0, warn: 1, info: 2 };
  out.sort((a, b) => (order[a.type] ?? 9) - (order[b.type] ?? 9));
  return out;
}

const TABS = ['dash','cal','tips','set'];
const TICO = { dash: '🌱', cal: '📅', tips: '💡', set: '⚙' };
const TLBL = { dash: 'Home', cal: 'Kalender', tips: 'Tipps', set: 'Einst.' };

function buildNav(t, onClickFn) {
  const handler = onClickFn || `goTo('__X__')`;
  return TABS.map(x =>
    `<button class="nav-btn ${x === t ? 'active' : ''}" data-tab="${x}" onclick="${handler.replace('__X__', x)}">
      <span class="nav-icon">${TICO[x]}</span>
      <span class="nav-label">${TLBL[x]}</span>
    </button>`
  ).join('');
}

function goTo(t) {
  // Stop PPFD sensor if leaving tips tab
  if (tab === 'tips' && t !== 'tips' && typeof stopPPFD === 'function' && _ppfdSensor) {
    stopPPFD();
  }
  // When entering settings fresh, scroll to top
  if (t === 'set' && tab !== 'set') _setScrollY = 0;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const scr = document.getElementById('scr-' + t);
  scr.classList.add('active');
  tab = t;
  const n = document.getElementById('nav-' + t);
  if (n) n.innerHTML = buildNav(t);
  if (t === 'dash') renderDash();
  else if (t === 'cal') renderCal();
  else if (t === 'tips') renderTips();
  else if (t === 'set') renderSet();
  // Always scroll to top when switching tabs
  const scrollEl = scr.querySelector('.scroll');
  if (scrollEl) scrollEl.scrollTop = 0;
}

window.addEventListener('popstate', () => {
  if (document.getElementById('scr-entry').classList.contains('active')) {
    goTo(entryFrom); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-duenger').classList.contains('active')) {
    goTo('set'); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-lexikon').classList.contains('active')) {
    goTo('tips'); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-howto').classList.contains('active')) {
    goTo('tips'); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-gallery').classList.contains('active')) {
    goTo('dash'); history.pushState(null, '', location.href); return;
  }
  // Wizard: wie ✕-Button reagieren (zum Ursprung zurück)
  const scrWizard = document.getElementById('scr-wizard');
  if (scrWizard && scrWizard.classList.contains('active')) {
    closeWizard(); history.pushState(null, '', location.href); return;
  }
  // Welcome-Screen: Hardware-Back soll die App nicht gleich verlassen,
  // stattdessen als "Skip" behandeln (User markiert Welcome als gesehen).
  const scrWelcome = document.getElementById('scr-welcome');
  if (scrWelcome && scrWelcome.classList.contains('active')) {
    welcomeSkip(); history.pushState(null, '', location.href); return;
  }
  const now = Date.now();
  if (now - lastBack < 2000) return;
  lastBack = now;
  history.pushState(null, '', location.href);
  toast('Nochmal drücken zum Beenden');
});

function ring(pct, color, sz = 56) {
  const r = 22, circ = 2 * Math.PI * r, off = circ - (pct / 100) * circ;
  return `<div class="ring-wrap" style="width:${sz}px;height:${sz}px">
    <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="var(--border)" stroke-width="4" fill="none"/>
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="${color}" stroke-width="4" fill="none"
        stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"
        style="transition:stroke-dashoffset 0.6s"/>
    </svg>
    <div class="ring-lbl">${Math.round(pct)}%</div>
  </div>`;
}

function getSmartTip(c, p) {
  if (!p) return null;
  const tips = {
    'anzucht_1': { text: 'Erde feucht halten, kein Dünger.', lex: 'Dryback (Trocken-Nass-Zyklus)' },
    'anzucht_2': { text: 'Leichter Dünger (25-50%) möglich.', lex: 'NPK' },
    'anzucht_3': { text: 'Umtopfen prüfen!', lex: 'Umtopfen' },
    'bloom_1':   { text: 'Blüte gestartet! PK erhöhen.', lex: 'NPK' },
    'bloom_3':   { text: 'Blüten formen sich. Stützen!', lex: 'LST (Low Stress)' },
    'bloom_5':   { text: 'Peak-Blüte. Rhythmus halten!', lex: 'Dryback (Trocken-Nass-Zyklus)' },
    'bloom_7':   { text: 'Trichome kontrollieren – Lupe!', lex: 'Trichom-Analyse (Ernte-Trigger)' },
    'bloom_9':   { text: 'Letzte Woche vor Spülung.', lex: 'Spülung' },
    'flush':     { text: 'Nur klares Wasser. pH 6.4.', lex: 'Spülung' },
    'ice':       { text: 'Eiswasser (<10°C) für Trichome.', lex: 'IceFlush' },
    'harvest':   { text: 'Ernten! Dunkel stellen, schneiden.', lex: 'Trichom-Analyse (Ernte-Trigger)' },
    'dry':       { text: '18-21°C, 55-65% RLF. Nicht zu schnell!', lex: 'Trocknung' },
  };
  return tips[p.week ? `${p.ph}_${p.week}` : p.ph] || null;
}
