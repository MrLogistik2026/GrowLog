      pitfall: 'Zu häufiges Gießen ist Problem Nr. 1 bei Einsteigern. Symptome von Überwässerung (hängende Blätter, gelbe untere Blätter) sehen oft wie „zu wenig Wasser" aus → User gießt noch mehr → Teufelskreis. Immer Topf-Gewicht prüfen, nicht Blätter deuten.' },
    { t: 'Air-Pruning (luftdurchlässige Töpfe)',
      brief: 'Stofftöpfe statt Plastik. Wurzel-Spitzen trocknen am Rand ab → Pflanze verzweigt massiv nach innen.',
      mechanism: 'In luftdurchlässigen Gefäßen (Stofftopf, Air-Pot) wachsen Wurzeln an den Rand. Dort <b>trocknet die Spitze ab</b> und stirbt. Die Pflanze reagiert mit starker Verzweigung im Topf-Inneren — statt weniger großer Wurzeln entsteht ein <b>dichtes Netzwerk feinster Wurzeln</b>. Mehr Oberfläche = bessere Nährstoff- und Wasser-Aufnahme.',
      practice: '<b>Materialien:</b><br>• Stofftopf (Fabric Pot): günstig, atmungsaktiv, wiederverwendbar<br>• Air-Pot: Hartplastik mit Luftlöchern, stabiler aber teurer<br><br><b>Größen-Tipp:</b><br>• 11 L für 60-80 g Automatics<br>• 15-19 L für größere Autos oder kleine Fems<br>• 25+ L für Fem-Photoperiode mit 3+ Monate Veg<br><br><b>Setup:</b> Unter den Topf ein Untersetzer (für Drain), <b>darüber</b> nochmal ein Gitter oder Klötzchen damit Luft unten durchkommt. Sonst steht der Stofftopf im Wasser.',
      pitfall: 'Stofftöpfe trocknen schneller aus — du musst öfter gießen. Im Winter-Zelt bei kalten Böden: Wurzeln unten werden kalt weil Luft drunter zieht. Lösung: Styropor-Platte drunter oder Heizmatte.' },
    { t: 'Sauerstoff-Sog',
      brief: 'Der physikalische Grund warum Dryback funktioniert. Trockene Erde saugt Luft rein — feuchte nicht.',
      mechanism: 'Wenn die Pflanze durch Transpiration Wasser aus dem Substrat zieht, entsteht im Wurzelballen ein <b>mikroskopisches Vakuum</b>. Dieser Unterdruck saugt aktiv <b>frische Luft (und damit Sauerstoff)</b> durch die Erdporen ein. Ohne Wasserverlust → kein Vakuum → keine neue Luft → Wurzeln ersticken.',
      practice: '<b>Praxis-Konsequenz:</b> Lockeres, poröses Substrat (Light-Mix mit 20-30 % Perlite) hat mehr Poren und saugt besser nach. Komprimierte oder zu feine Erde „atmet" kaum.<br><br><b>Die ganze Kette:</b> Transpiration → Vakuum → Sauerstoff-Sog → aerobe Bakterien/Mykorrhiza leben → organische Nährstoffe werden aufgespalten → Pflanze bekommt Dünger.',
      pitfall: 'Bio-Produkte (Alg·A·Mic, Acti·Vera, Bio·Heaven, Enzyme) funktionieren <b>nur in lebendigem Boden</b> mit Sauerstoff-Sog. In permanent nasser Erde oder inertem Coco bringen sie nichts — die Bakterien fehlen oder sind tot.' },
    { t: 'Turgordruck',
      brief: 'Der Wasserdruck in den Zellen der Pflanze. Maximal voll = stabiler Stängel. Schlaff = Welke.',
      mechanism: 'Pflanzen haben kein Knochenskelett — ihre Stabilität kommt aus dem <b>Wasserdruck in den Zellvakuolen</b> (Turgor). Prall gefüllt = Zellen drücken gegen die Wand = steif und stabil. Trocknet die Pflanze aus, sinkt der Druck und die Zellen erschlaffen = welke Pflanze.',
      practice: '<b>Wichtig für High Stress Training</b> (Topping, FIM, Super-Cropping): Nur bei vollem Turgor gelingen <b>saubere Schnitte</b>. Durstige, schlaffe Pflanze wird von der Schere <b>gequetscht</b> statt sauber getrennt → lange Heilungszeit, Infektionsrisiko.<br><br><b>Regel:</b> Vor jedem Schnitt-Eingriff 2-4 Stunden vorher voll gießen. Die Pflanze muss sichtbar <b>strotzend</b> aussehen.',
      pitfall: 'Welke Blätter müssen nicht immer Wassermangel bedeuten — können auch Transpirations-Probleme (VPD!) oder Wurzel-Probleme (Fäule) sein. Erst Topf-Gewicht prüfen. Schlaffe Pflanze in nasser Erde = Wurzelproblem, nicht Durst.' },
    { t: 'Wasser-Härte & Umkehrosmose',
      brief: 'Dein Leitungswasser ist nicht neutral. Kalkgehalt bestimmt pH-Drift und Düngerbedarf.',
      mechanism: 'Leitungswasser enthält regional unterschiedlich viele gelöste Mineralien — primär <b>Calcium- und Magnesium-Carbonat (Kalk)</b>. Das ist die <b>Wasserhärte</b>.<br><br><b>Hartes Wasser (>15 °dH):</b> Hohe Carbonat-Puffer-Wirkung. pH-Down wird „aufgefressen", pH driftet zurück nach oben → Lockouts.<br><b>Weiches Wasser (&lt;8 °dH):</b> Kaum Puffer. pH kippt leicht in beide Richtungen. CalMag-Mangel fast garantiert.',
      practice: '<b>Wasserhärte checken:</b> Bei Wasserwerk-Website oder mit Teststreifen (Aquaristik).<br><br><b>Lösungen:</b><br>• Hartes Wasser: 2-3 Tage abstehen lassen (Kalk fällt teilweise aus), etwas mehr pH-Down<br>• Weiches Wasser: CalMag immer dazu<br>• Cup-Niveau: <b>Umkehrosmose (RO)</b> — filtert 99 % aller Mineralien raus, EC ~0.0. Perfekte „leere Leinwand".<br><br><b>Bei RO:</b> CalMag ist Pflicht! Ohne → sofortiger Ca/Mg-Mangel, weil nichts mehr drin ist.',
      pitfall: 'Viele Grower kaufen RO-Anlage ohne zu verstehen dass dann das komplette Dünger-Regime umgestellt werden muss. Bei weichem Wasser reicht oft Leitungswasser + CalMag — RO-Anlage ist 300-600 € die oft unnötig ausgegeben sind.' },
    { t: 'Drain-Kontrolle',
      brief: '5-10 % des Gießwassers soll unten ablaufen. Der wichtigste Hebel gegen Versalzung.',
      mechanism: 'Bei jedem Guss sammeln sich <b>ungenutzte Salze</b> im Substrat — was die Pflanze nicht aufnimmt, bleibt drin. Durch das überschüssige Drain-Wasser werden diese Salze <b>aktiv ausgewaschen</b>. Ohne Drain würden sie sich ansammeln bis der EC-Wert im Topf gefährlich steigt (Nutrient Burn).',
      practice: '<b>Menge:</b> 10-20 % der Gieß-Menge soll unten als Drain austreten. Bei 1 L Guss → ~100-200 ml Drain.<br><br><b>Drain-Wasser sofort entsorgen</b>, NIEMALS zurück in die Dünger-Kanne — es ist Salz-angereichert.<br><br><b>Runoff-Messung</b> (pH und EC) am Drain zeigt den echten Zustand im Substrat — oft erstes Warnsignal vor sichtbaren Mangel-Symptomen.',
      pitfall: 'Untersetzer die vollaufen und NICHT geleert werden → Wurzeln saugen das Salz-angereicherte Wasser zurück → doppelt schlimm. Immer Drain komplett entsorgen, Topf eventuell kurz hochstellen bis abgetropft.' },
    { t: 'Umtopfen',
      brief: 'Ob und wann umgetopft wird hängt komplett vom Seed-Typ ab. Autos ≠ Feminisierte!',
      mechanism: 'Umtopfen <b>stresst die Pflanze</b> und kostet 3-7 Tage Wachstum. Der Stress ist für Feminisierte (die lang wachsen) hinnehmbar — für Automatics (kurze Lebenszeit) ein echter Ertragskiller.<br><br><b>Warum überhaupt umtopfen?</b> Kleine Töpfe = weniger Wasser-Puffer zwischen Güssen = stärkeres Wurzelwachstum durch Dryback. Bei Fem mit 3+ Monaten Gesamtdauer lohnt der schrittweise Aufbau.',
      practice: '<b>Automatics (dein Fall):</b> <b>Direkt in den Endtopf</b> pflanzen (typisch 11 L für 60-80 g Pflanzen, 15-19 L für größere Autos). KEIN Umtopfen! Jeder Tag zählt in der fixen Lebenszeit.<br><br><b>Feminisierte:</b> Kann schrittweise:<br>• Jiffy-Würfel → ca. 10 Tage<br>• 0.5-1 L Töpfchen → 1-2 Wochen<br>• 3-5 L Zwischen-Topf → 2-3 Wochen (optional)<br>• Endtopf (11-20 L) vor Blüte-Beginn<br><br>Wenn umgetopft: Substrat vorher leicht feucht, Wurzelballen vorsichtig, Wurzeln nicht auseinanderreißen.',
      pitfall: '<b>Auto-Grower-Trap:</b> „Ich topf noch schnell in größer um" = 5-10 Tage Entwicklungs-Verlust, die eine Auto nicht kompensieren kann. Einmal entschieden, bleibt die Pflanze wo sie ist.<br><br>Nie in der Blüte umtopfen — egal welcher Typ. Der Stress löst Zwitter-Bildung aus oder wirft den Blüte-Rhythmus komplett durcheinander.' },
    { t: 'Bottom-Watering (Tauchen)',
      brief: 'Von unten gießen statt von oben. Gut gegen Trauermücken, fördert tiefes Wurzelwachstum.',
      mechanism: 'Bewässerung erfolgt über Untersetzer oder Kapillarmatten. Die Pflanze saugt das Wasser durch <b>Kapillarkraft</b> nach oben durch das Substrat. Ergebnis: Wurzeln wachsen aktiv nach unten zum Wasser, obere Erdschicht bleibt trocken.',
      practice: '<b>So geht es:</b><br>1. Topf in flaches Wasserbad (2-3 cm Wasser-Höhe) stellen<br>2. Nach 10-30 Min rausnehmen wenn die Oberfläche des Substrats spürbar feuchter geworden ist<br>3. Topf kurz abtropfen lassen<br><br><b>Vorteile:</b><br>• Oberste Erdschicht trocken → Trauermücken haben keinen Brutplatz<br>• Tiefer wachsende Wurzeln → stabilere Pflanze<br>• Gleichmäßigere Durchfeuchtung<br><br><b>Wann einsetzen:</b> Bei Trauermücken-Befall als Hauptmaßnahme. Bei Jungpflanzen und Stecklingen zur Wurzel-Förderung.',
      pitfall: 'Zu lange im Wasser = Wurzelfäule-Risiko. Nicht über 30 Min. Nach bottom-watering muss auch normales „top-watering" mit Drain erfolgen, sonst sammeln sich Salze oben im Substrat (Umgekehrtes Problem: EC-Aufbau an der Oberfläche).' },
    { t: 'Runoff-EC (Drain-Messung)',
      brief: 'EC des abgelaufenen Wassers messen — zeigt den tatsächlichen Zustand im Substrat, lange bevor Symptome sichtbar sind.',
      mechanism: 'Der <b>Inflow-EC</b> (was du reingibst) kann perfekt sein — entscheidend ist der <b>Runoff-EC</b> (was unten rauskommt). Der Runoff zeigt was die Wurzeln wirklich „sehen":<br>• Runoff = Inflow → Pflanze nimmt ausgeglichen auf<br>• Runoff HÖHER als Inflow → Salze sammeln sich, Versalzungs-Gefahr<br>• Runoff NIEDRIGER als Inflow → Pflanze hungert, nimmt mehr auf als du gibst',
      practice: '<b>Messung einfach:</b> Unter den Drain ein Glas halten, 5-10 ml fangen, mit EC-Meter messen.<br><br><b>Typische Zielwerte:</b><br>• Runoff-EC ≈ Inflow-EC ±0.2 = gesund<br>• Runoff 0.5+ höher = Dosis reduzieren oder zwischen-flushen<br>• Runoff 0.3+ niedriger = Dosis erhöhen<br><br><b>Frequenz:</b> 1× pro Woche reicht, bei Problemen öfter.',
      pitfall: 'Erstmessung oft überraschend hoch (Substrat-eigene Salze). Erst nach 2-3 Gieß-Zyklen pendelt sich das System ein, dann vergleichen. Bei Coco: Runoff-EC oft 0.3-0.5 höher als Inflow normal.' },
    { t: 'Wassertemperatur',
      brief: 'Gießwasser zwischen 18-22 °C. Kälter = Wurzelschock, wärmer = Sauerstoffmangel und Fäulnis-Risiko.',
      mechanism: '<b>Unter 18 °C:</b> Wurzeln erleiden <b>Kälteschock</b>, Membranfunktion stoppt, Nährstoffaufnahme friert kurzzeitig ein. Nach wiederholten Kälteschocks: Wachstumsstau und Anfälligkeit.<br><br><b>Über 22 °C:</b> Gelöster <b>Sauerstoff sinkt drastisch</b>. <b>Pythium</b> (Wurzelfäule-Pilz) wird aktiv. Bei Hydro besonders kritisch, da keine Puffer.',
      practice: '<b>Einfachste Methode:</b> Gießwasser am Vortag anmischen und im Zelt stehen lassen → passt sich Raumtemperatur automatisch an.<br><br><b>Winter/Keller:</b> Wenn Raum unter 18 °C, Wasser vor Gießen kurz auf Heizung stellen oder mit Aquarium-Heizstab vorwärmen.<br><br><b>Prüfen:</b> Finger rein — soll sich lauwarm bis neutral anfühlen, nicht kühl/kalt.',
      pitfall: 'Direkt von der Leitung gegossen = meist 10-15 °C = Schock. Das ist der häufigste „unsichtbare" Wachstums-Bremsklotz bei Anfängern. Besonders schlimm: Kalte Pflanze + kaltes Wasser an kaltem Tag.' },
    { t: '☀️ Outdoor-Gießen: Grundregeln',
      brief: 'Outdoor folgt keinem Kalender — das Wetter bestimmt. Die goldene Regel: Topf anheben, nicht nach Plan gießen.',
      mechanism: 'Outdoor-Bedingungen schwanken täglich: Sonne, Wind, Luftfeuchte, Regen, Temperatur. Jede dieser Variablen verändert Wasser-Verbrauch der Pflanze. Ein Kalender-basierter Plan kann das nie erfassen — einzige verlässliche Methode ist der <b>Topf-Gewichts-Test</b>.',
      practice: '<b>Die goldene Regel — Topf anheben statt nach Plan gießen:</b><br>• <b>Leicht</b> → gießen<br>• <b>Schwer</b> → warten, auch wenn „heute Gießtag wäre"<br>• Obere 3-5 cm trocken, darunter feucht → normal, warten<br><br><b>Menge:</b> 20-30 % des Topfvolumens bis leichter Drain. 50-L-Topf → 10-15 L pro Guss wenn nötig.<br><br><b>Timing:</b> Früh morgens oder abends. Nie in praller Mittagssonne — Wasser verdunstet sofort, Tropfen auf heißen Blättern = Linseneffekt = Verbrennungen.<br><br><b>Wasser:</b> Leitungswasser meist OK. pH 6,0-7,0 reicht (nicht auf 6,4 exakt wie Indoor — Bodenleben puffert).<br><br><b>Nach Regen:</b> 2+ Tage Pause. Bei Starkregen 3-4 Tage. Immer Topf fühlen.',
      pitfall: 'Alles nach Kalender gießen bei Outdoor ist der häufigste Fehler — führt zu Überwässerung in Regenperioden und Unterwässerung in Hitzewellen. Und: bei Tröpfchen-Bewässerung regelmäßig checken ob die noch funktioniert, Schläuche verstopfen leicht.' },
    { t: '🌧 Outdoor: Regenmanagement',
      brief: 'Regen ist gratis-Gießen — aber nur wenn die Menge stimmt. Leichter Regen zählt nicht.',
      mechanism: 'Regenwasser ist pH-neutral und frei von Chlor — eigentlich ideal. Die Frage ist nur <b>wie viel</b> wirklich bis zu den Wurzeln durchdringt. Leichter Regen befeuchtet nur die Oberfläche, verdunstet schnell. Die Wurzeln kriegen nichts.',
      practice: '<b>Grobe Einteilung:</b><br>• <b>Leichter Regen (&lt; 5 mm)</b>: Zählt nicht. Normal weitergießen.<br>• <b>Mittlerer Regen (5-15 mm)</b>: Ersetzt einen Gießtag. 🌧 Regen-Button auf dem Dashboard drücken.<br>• <b>Starkregen (>15 mm)</b>: Ersetzt 2-3 Gießtage.<br>• <b>Dauerregen (5+ Tage)</b>: Staunässe-Gefahr! Topf schräg stellen, Drainage checken.<br><br><b>Regenmenge messen:</b> Flaches Gefäß neben Pflanze, Wasserhöhe = mm Regen. Alternativ: Wetter-App DWD oder Kachelmann.<br><br><b>Dachvorsprung als Notlösung</b> bei Dauerregen — wenn möglich Topf kurz unterstellen.',
      pitfall: 'Topf trotz Regen gießen weil „der Zeitplan so sagt" = verrottete Wurzeln. Umgekehrt: Topf unter Dachvorsprung stehen lassen nach Regen = die Pflanze denkt sie hat getrunken, aber es ist nichts angekommen. Immer Topf fühlen!' },
  ]},
  { cat: '🧪 Nährstoffe', items: [
    { t: 'NPK',
      brief: 'Die drei Hauptnährstoffe — jeder mit seiner Rolle. Der Schlüssel zum Lesen jeder Dünger-Etikette.',
      mechanism: '<b>Stickstoff (N)</b> baut Proteine & Chlorophyll → für Wachstum und grüne Blätter.<br><b>Phosphor (P)</b> ist Energie-Währung (ATP) → für Wurzeln und Blütenbildung.<br><b>Kalium (K)</b> reguliert Wasserhaushalt und Stoffwechsel → für feste Zellen und Widerstandsfähigkeit.',
      practice: '<b>Anzucht:</b> N-lastig (z.B. NPK 4-2-2).<br><b>Blüte Wo 1-3:</b> Ausgewogen (3-3-4).<br><b>Blüte Wo 4+:</b> P-K-lastig, N drosseln (1-3-4 oder weniger N).<br>Die Zahlen auf der Flasche sind die Prozente.',
      pitfall: 'Zu viel N in Blüte = blättrige statt dichte Buds. Zu viel K ohne CalMag → Ca-Lockout. Immer mit halber Dosis starten, dann hochtasten.' },
    { t: 'CalMag',
      brief: 'Calcium + Magnesium — der unterschätzte Grund-Dünger. Besonders kritisch bei LED, Coco und weichem Wasser.',
      mechanism: '<b>Calcium (Ca):</b> Baut Zellwände, Signalstoff für Wurzel-Wachstum. <b>Immobil</b> — einmal eingelagert, bleibt es. Mangel zeigt sich an neuen Trieben.<br><br><b>Magnesium (Mg):</b> Zentrum des <b>Chlorophyll-Moleküls</b>. Ohne Mg kein Grün, keine Photosynthese. Mg ist mobil — Pflanze verschiebt es nach oben → Mangel zeigt sich unten (Intervenalchlorose).<br><br><b>Warum „gemeinsam"?</b> Beide werden oft zusammen ausgewaschen, beide konkurrieren mit Kalium um Aufnahme. Eine getrennte Dosierung ist unpraktisch.',
      practice: '<b>Dosierung:</b> 0.3-0.5 ml/L bei jedem Guss (je nach Produkt).<br><br><b>Kritische Regel:</b> CalMag immer als <b>ALLERERSTES</b> ins Wasser, vor allen anderen Düngern. Grund: Ca²⁺ reagiert mit Phosphat aus NPK-Düngern → Calciumphosphat fällt aus = weiße Flocken = Ca unwirksam.<br><br><b>Immer dazu bei:</b><br>• LED-Beleuchtung (treibt Wachstum, mehr Ca-Bedarf)<br>• Coco-Substrat (Coco bindet aktiv Ca)<br>• Weichem Leitungswasser (< 8 °dH)<br>• RO-Wasser (immer, da keine Mineralien drin)<br><br><b>Nicht nötig bei:</b> Living Soil mit ausreichend Kalk-Kreide-Puffer, oder hartem Leitungswasser (> 15 °dH) mit All-Mix.',
      pitfall: 'Zu spät zugegeben → Ausfällung = weiße Flocken im Dünger. Die sind dann verloren, obwohl du bezahlt hast. Auch: CalMag mit Bittersalz ersetzen (kommt öfter als Spartipp) — Bittersalz ist nur Mg, kein Ca. Dann hast du weiter Ca-Mangel.' },
    { t: 'Überdüngung',
      brief: 'Verbrannte Blattspitzen. Das häufigste Problem bei Einsteigern — „mehr hilft mehr" stimmt hier nicht.',
      mechanism: 'Bei zu hohem EC im Substrat kehrt sich der <b>osmotische Druck</b> um: Statt dass Wurzeln Wasser aufnehmen, <b>zieht das Substrat Wasser aus den Wurzeln raus</b>. Ergebnis: Die Pflanze „verbrennt" von innen — verdurstet in nasser Erde. Zuerst an den Blattspitzen sichtbar (dort verdunstet am meisten), dann weiter Richtung Blattmitte.',
      practice: '<b>Typische Zeichen:</b><br>• Blattspitzen werden braun-knusprig, kräuseln sich nach unten<br>• Gelb-braune Ränder die sich nach innen ausbreiten<br>• Satte, dunkelgrüne Blätter mit „Klauen"-Form (klassisch bei N-Überschuss)<br><br><b>Sofortmaßnahmen:</b><br>1. Runoff-EC messen → bestätigt die Diagnose<br>2. Nächsten Guss nur Wasser (pH 6.4) bis Drain austritt<br>3. Bei schwerer Versalzung: 2-3× Topfvolumen flushen<br>4. Dünger-Dosis um 25-30 % reduzieren<br>5. Nächsten Guss vorsichtig beobachten',
      pitfall: 'Häufigster Fehler: „Sie sieht schwächlich aus, also mehr düngen." Nein — erst **pH prüfen** (Lockout häufiger als Mangel), dann Runoff-EC messen. Überdüngung ist oft schwerer zu heilen als Mangel, weil Salze lange im Substrat bleiben. Bereits eingetragene Schäden an Blättern wachsen nicht weg.' },
    { t: 'Nährstoffmangel',
      brief: 'Wie du erkennst was fehlt — über Farbe, Position und Muster der Verfärbung.',
      mechanism: 'Jeder Nährstoff hat ein typisches Mangel-Bild. Die <b>Position</b> (unten/oben) sagt schon viel: <b>Mobile Nährstoffe</b> (N, P, K, Mg) werden aus alten Blättern in neue umgeleitet → Mangel zeigt sich <b>unten zuerst</b>. <b>Immobile</b> (Ca, Fe, S) bleiben wo sie sind → Mangel zeigt sich <b>oben</b>.',
      practice: '<b>N-Mangel:</b> Untere Blätter gleichmäßig gelb, fallen ab.<br><b>P-Mangel:</b> Lila-bronzene Stiele und Adern, braune Blattränder.<br><b>K-Mangel:</b> Braune, trockene Blattränder und -spitzen (unten).<br><b>Ca-Mangel:</b> Braune Flecken auf neuen Blättern, verdrehtes Wachstum.<br><b>Mg-Mangel:</b> Gelbe Flecken zwischen grünen Blattadern (Intervenalchlorose).<br><b>Fe-Mangel:</b> Neue Blätter komplett gelb, Adern bleiben grün.',
      pitfall: 'Viele Mängel werden durch <b>falschen pH</b> ausgelöst, nicht durch fehlende Dünger. Immer pH prüfen (6.2–6.4) bevor du mehr düngst. Mangelbild + pH-Drift + Runoff-EC zusammen denken.' },
    { t: 'Mischreihenfolge',
      brief: 'Die Reihenfolge in der Dünger ins Wasser kommen — entscheidend für Wirksamkeit. Falsch = weiße Flocken und halbes Produkt wirkungslos.',
      mechanism: 'Bestimmte Nährstoffe <b>reagieren chemisch miteinander</b> wenn sie gleichzeitig in konzentrierter Form zusammenkommen. Klassische Ausfällungen: Ca²⁺ + PO₄³⁻ → Calciumphosphat (weiß, unlöslich). Die Reihenfolge lässt jedes Produkt erst <b>im verdünnten Zustand</b> sich verteilen bevor das nächste kommt.',
      practice: '<b>Die universelle Reihenfolge:</b><br>1. <b>Wasser</b> (idealerweise RO, sonst Leitungswasser)<br>2. <b>Silizium</b> (falls benutzt — muss ganz vorne sein, sonst flockt es)<br>3. <b>CalMag</b> (Ca vor allem anderen, verhindert Phosphat-Ausfällung)<br>4. <b>Basisdünger</b> (Bio·Grow, Bio·Bloom oder NPK-Mineral)<br>5. <b>Bio-Additive</b> (Root·Juice, Bio·Heaven, Alg·A·Mic, Acti·Vera)<br>6. <b>Humin-/Fulvosäuren</b> (Top·Max — immer zuletzt, verschieben pH stark)<br>7. <b>pH-Korrektur</b> auf Ziel-pH einstellen<br><br><b>Zwischen jedem Schritt kurz umrühren</b>, nicht einfach alles reinschütten.',
      pitfall: 'Wenn CalMag zu spät kommt: weiße Schlieren oder Flocken im Dünger = Ca ist verloren. Wenn Top·Max vor pH-Einstellung kommt ist OK — wenn pH-Einstellung vor Top·Max, ist die pH-Messung gleich wieder daneben.' },
    { t: 'Bio vs. Mineralisch',
      brief: 'Zwei komplett verschiedene Philosophien. Eine füttert Bodenleben, die andere direkt die Pflanze.',
      mechanism: '<b>Bio/Organisch:</b> Du fütterst <b>nicht die Pflanze</b>, sondern das <b>Bodenleben</b> — Bakterien, Pilze, Würmer. Die zersetzen organisches Material und machen es aufnehmbar. Wirkt <b>zeitverzögert</b> (Tage bis Wochen), baut Puffer auf, extrem fehlerverzeihend.<br><br><b>Mineralisch/Synthetisch:</b> Du fütterst die Pflanze <b>direkt mit sofort verfügbaren Ionen</b>. Wirkung in Stunden. Chirurgisch präzise steuerbar — aber Fehler = sofort sichtbar (Burn, Lockout).',
      practice: '<b>Bio-Marken:</b> BioBizz, Plagron Alga, Biogrow. Brauchen lebendiges Substrat (Light-Mix, All-Mix).<br><b>Mineralisch-Marken:</b> Canna, Advanced, Hesi Mineral, Plagron Terra. Funktionieren in Coco + Hydro.<br><br><b>Hybrid möglich:</b> Mineralische Basis + Bio-Additive (Enzyme, Humin-Säuren). Viele machen das für Fehler-Toleranz mit Präzision.<br><br><b>Empfehlung:</b><br>• Einsteiger: Bio in All-Mix<br>• Erfahrener Grower: Bio in Light-Mix<br>• Power-User: Mineralisch in Coco',
      pitfall: 'Bio-Produkte in Coco = funktionieren nur halb (kein Bodenleben). Mineral in Living Soil = zerstört über Zeit die Mikrobiologie. Die beiden Welten <b>nicht versehentlich mischen</b>, gezielte Hybrid-Ansätze brauchen Erfahrung.' },
    { t: 'Silizium (Zellwand-Verstärker)',
      brief: 'Stabilisiert Zellwände und dicke Stämme. Oft vergessener Dünger mit sichtbarem Effekt.',
      mechanism: 'Silizium wird als Kieselsäure aufgenommen und <b>in die Zellwände eingebaut</b>. Das gibt der Pflanze einen physischen Panzer — dickere Stängel, härtere Blätter. Auch: Silizium-arme Pflanzen wachsen zwar, knicken aber unter schweren Blüten leichter um.',
      practice: '<b>Wann sinnvoll:</b><br>• Anzucht + frühe Vegi (für starke Struktur)<br>• Bei Hitze-Stress (Si erhöht Hitze-Toleranz)<br>• Bei LED-Anbau mit hoher Lichtintensität<br>• Wenn Schädlinge wie Raupen angreifen (härtere Blätter = weniger Fraß)<br><br><b>Produkte:</b> Advanced Nutrients Rhino Skin, Plagron Silic Power, BAC Kiezelzuur.<br><br><b>Kritische Reihenfolge:</b> Silizium <b>zuerst</b> ins Wasser, <b>vor</b> CalMag. Sonst flockt es mit Ca aus und ist verloren.',
      pitfall: 'In der späten Blüte (letzten 2 Wochen) Si reduzieren — verhärtet Blüten optisch, schmeckt dann kratziger. Auch: Si hebt den pH stark an (oft um 0.5-1.0 Punkte), immer nach Zugabe neu messen.' },
    { t: 'Humin- & Fulvosäuren (Chelatoren)',
      brief: 'Organische Transporter die Nährstoffe wie Klauen umhüllen und leichter in die Wurzel lassen.',
      mechanism: 'Humin- und Fulvosäuren sind <b>natürliche organische Verbindungen</b> aus zersetztem Pflanzenmaterial. Sie <b>binden Nährstoff-Ionen</b> (besonders Mikronährstoffe wie Fe, Mn, Zn) und transportieren sie aktiv durch die Zellmembranen der Wurzeln (<i>Chelatbildung</i>). Ohne Chelatoren bleiben viele Mikronährstoffe im Substrat „gefangen".',
      practice: '<b>In BioBizz:</b> Das Produkt ist <b>Top·Max</b>. In anderen Linien: „Big Bud", „Molasses-basierte Zusätze", Huminsäure-Konzentrate.<br><br><b>Dosierung:</b> Meist 1-4 ml/L je nach Phase. In der Blüte höher dosieren (P/K-Aufnahme steigt mit Chelatoren stark).<br><br><b>Zeitpunkt:</b> <b>Immer zuletzt</b> ins Wasser, nach allen anderen Düngern. Dann pH prüfen (verschieben es oft um 0.3-0.8 Punkte) und einstellen.',
      pitfall: 'Zu früh zugegeben verändern sie den pH mitten im Mischen — du machst pH-Korrektur zweimal. Überdosierung macht Wasser tief-braun bis schwarz — sieht dramatisch aus, ist aber nur optisch, nicht schädlich solange EC im Rahmen bleibt.' },
    { t: 'Enzyme (Katalysatoren)',
      brief: 'Spalten abgestorbene Wurzelmasse auf. Halten die Wurzelzone sauber und verhindern Fäulnis.',
      mechanism: 'Enzyme (v.a. <b>Zellulasen</b>) sind Proteine die spezifische chemische Reaktionen katalysieren. Sie spalten abgestorbene Wurzelreste und organische Masse im Substrat in <b>verwertbare Zucker</b> auf. Effekte: saubere Wurzelzone (keine Fäulnis-Herde), recyceltes Kohlenhydrat-Angebot, weniger Pythium-Gefahr.',
      practice: '<b>Produkte:</b> Cannazym (Canna), Sensizym (Advanced), Hesi PowerZyme.<br><br><b>Dosierung:</b> 2-4 ml/L einmal pro Woche oder bei jedem zweiten Guss.<br><br><b>Wichtig vor allem bei:</b><br>• Recycling-Substrat (alte Erde wiederverwenden)<br>• Langen Zyklen (Fem 3+ Monate)<br>• Hydro-Systemen (Biofilm-Prävention)<br>• Nach massivem Wurzelstress (Umtopfen bei Fem)',
      pitfall: 'Enzyme wirken <b>nur im lebenden Boden</b> — in sterilen Hydro-Tanks bei zu hoher Temperatur (über 25 °C Nährlösung) werden sie zerstört. Nicht mit starken Fungiziden oder Chlor-Wasser kombinieren.' },
    { t: 'Mykorrhiza (Symbiose-Pilze)',
      brief: 'Pilze die mit den Wurzeln verwachsen und die Absorptionsfläche vervielfachen. Einmal eingebracht — lebenslang.',
      mechanism: 'Spezialisierte Bodenpilze dringen in die Wurzel ein oder ummanteln sie. Sie <b>vergrößern die aktive Absorptionsfläche um bis zu 700 %</b> durch ihr feines Pilz-Geflecht (Hyphen). Im Austausch bekommt der Pilz <b>Photosynthese-Zucker</b> von der Pflanze. Echte Symbiose — beide profitieren.',
      practice: '<b>Anwendung (einmalig):</b><br>• Pulver direkt an die junge Wurzel beim Umtopfen oder Einpflanzen<br>• Oder: mit Wasser befeuchten und Wurzelballen darin „baden"<br>• Eine Prise reicht, keine Nachdosierung nötig — Pilze leben mit der Pflanze<br><br><b>Produkte:</b> Mykos (Xtreme Gardening), Plagron Mycor, BioBizz Root·Juice enthält u.a. Mykorrhiza.<br><br><b>Besonders wertvoll bei:</b><br>• Biologischem Anbau<br>• Outdoor (Wurzel-Robustheit)<br>• Stresstoleranz (Trocken-Phasen, Hitze)',
      pitfall: 'Mit <b>chemischen Fungiziden tödlich inkompatibel</b> — tötet die Mykorrhiza sofort. Auch: häufige, harte Flushes spülen die Pilz-Masse raus. In Coco oder Hydro mit Sterilisation: zwecklos, Pilze überleben nicht.' },
    { t: 'Nährstoff-Lockout',
      brief: 'Nährstoffe sind da — aber die Pflanze kommt nicht dran. Das unsichtbare Problem hinter vielen „Mängeln".',
      mechanism: 'Drei Hauptursachen blockieren die Aufnahme:<br><br><b>1. pH außerhalb des Sweet-Spots</b> (Erde: 6.2-6.4). Bei pH 5.5 → Ca/Mg blockiert. Bei pH 7.0 → Fe/Mn/P blockiert. Der Dünger ist da, wird aber als Ion-Form nicht aufgenommen.<br><br><b>2. EC zu hoch / Versalzung.</b> Osmotischer Druck dreht sich um — Substrat zieht Wasser aus der Pflanze.<br><br><b>3. Sauerstoffmangel</b> (dauerfeuchtes Substrat, Wurzelfäule). Wurzeln brauchen O₂ für aktiven Nährstoff-Transport.',
      practice: '<b>Diagnose-Schritt-für-Schritt:</b><br>1. Runoff-pH messen. Ist er < 6.0 oder > 6.7?<br>2. Runoff-EC messen. Ist er > 2.5?<br>3. Substrat anheben: schwer und nass seit Tagen?<br><br><b>Je nach Ursache:</b><br>• pH-Lockout: Zwischenguss mit pH-korrigiertem Wasser (2× Topfvolumen)<br>• Versalzung: Flushen mit klarem Wasser<br>• Sauerstoffmangel: Dryback abwarten, Gieß-Rhythmus prüfen, Perlite-Anteil erhöhen',
      pitfall: 'Die klassische Falle: Mangel-Symptome → <b>mehr düngen</b> → EC steigt → noch schlimmerer Lockout. Bei Verdacht immer zuerst pH und EC prüfen, nicht nach Farbe blind düngen.' },
    { t: 'Flushen (Zwischenguss)',
      brief: 'Gezieltes Durchspülen des Substrats um Salze rauszuwaschen. Nicht verwechseln mit dem finalen Flush vor der Ernte.',
      mechanism: 'Durch das Eingießen großer Mengen <b>pH-reguliertem, dünger-freiem Wasser</b> werden die im Substrat angesammelten Salze aktiv ausgewaschen. Der Runoff-EC sinkt, der Lockout löst sich. Danach kann normale Düngung wieder ohne Blockade aufgenommen werden.',
      practice: '<b>Wann flushen:</b><br>• Bei Überdüngung (Blattspitzen verbrennen)<br>• Bei Lockout durch Versalzung (Runoff-EC >> Inflow)<br>• Präventiv alle 4-6 Wochen bei intensiver Düngung<br><br><b>Wie:</b><br>1. Wasser auf pH 6.3-6.4 einstellen<br>2. 2-3× Topfvolumen langsam durchspülen (11 L Topf → 22-33 L)<br>3. Runoff-EC während Spülen messen — soll unter 1.0 sinken<br>4. Topf gut abtropfen lassen<br>5. Nächsten Guss mit leichter Enzym-Zugabe, halbe Dünger-Dosis',
      pitfall: 'Nicht jeden kleinen Mangel mit Flushen „fixen" — kostet die Pflanze 3-5 Tage Wachstum und kann Mikronährstoffe auswaschen die knapp waren. Flush ist das große Werkzeug, nicht die Erstlinien-Maßnahme. Niemals in der Peak-Blüte flushen — Stress in falscher Phase.' },
  ]},
  { cat: '💡 Licht', items: [
    { t: 'Lichtzyklen',
      brief: 'Die Lichtdauer steuert ob die Pflanze wächst oder blüht — bei Feminisierten. Automatics ignorieren das.',
      mechanism: 'Cannabis ist eine <b>Kurztagspflanze</b>. Erst wenn die Dunkelphase lang genug ist (≥12h), aktiviert das <b>Phytochrom-System</b> den Blüte-Trigger. Tagsüber wird Phytochrom geladen, nachts zerfällt es — wenn zu wenig übrigbleibt, startet die Pflanze die Blüte.',
      practice: '<b>Feminisierte Indoor:</b><br>• Anzucht/Vegi: 18/6 (18h an, 6h aus)<br>• Blüte einläuten: auf 12/12 umschalten<br><br><b>Automatics:</b> Immer 18/6 oder 20/4 — Blüte kommt automatisch nach ~3-4 Wochen unabhängig vom Lichtzyklus.<br><br><b>Outdoor Feminisiert:</b> Natürliche Jahreszeit triggert Blüte ab Mitte August.',
      pitfall: '<b>Störlicht in der Nacht ist kritisch</b> — schon wenige Minuten können die Blüte stören oder Zwitter produzieren. Zelt muss absolut lichtdicht sein. Netzstecker-LEDs, Telefon-Displays, Straßenlaternen → alles raus.' },
    { t: 'Lichtabstand',
      brief: 'Der Abstand zwischen LED und Blätterspitze. Zu nah = Bleach, zu weit = Stretchen. Es gibt eine genaue Zahl.',
      mechanism: 'Lichtintensität (PPFD) sinkt <b>quadratisch</b> mit dem Abstand. Eine Verdopplung des Abstands = Viertel der Intensität. Zu nah: PPFD steigt über 1000+, Chlorophyll bleicht aus, Blätter werden weiß-gelblich (<b>Light Bleach</b>). Zu weit: Pflanze „sucht" nach Licht → lange dünne Zweige, große Nodien (<b>Stretching</b>).',
      practice: '<b>Abstand je nach LED-Wattage (Blüte):</b><br>• 100 W: ~30 cm<br>• 150 W: ~40 cm<br>• 200 W: ~50 cm<br>• 300 W: ~60 cm<br>• 600 W: ~75 cm<br><br><b>Besser als Daumenregel:</b> Quantum-Meter/Lightmeter-App messen. Ziel je Phase:<br>• Anzucht: 200-400 PPFD<br>• Vegi: 400-600 PPFD<br>• Blüte: 600-900 PPFD<br><br><b>Handtest (keine Meter vorhanden):</b> Hand flach auf Höhe der obersten Blätter, 30 Sekunden. Zu heiß für die Haut = zu heiß für die Pflanze. LED höher oder dimmen.',
      pitfall: 'LED-Hersteller geben oft viel zu kurze Abstände an — Marketing. Bei billigen China-LEDs oft ineffizient + zu hoher Rot-Anteil → „Fühlt sich" okay an (nicht heiß), bleicht aber trotzdem. Immer mit PPFD-Meter oder App (Photone) kalibriert prüfen.' },
    { t: 'Lampen-Typen (LED / HPS / CFL)',
      brief: 'Der wichtigste Hardware-Unterschied in deinem Setup. LED ist Standard — aber nicht gleich LED.',
      mechanism: '<b>LED</b>: Halbleiter wandelt Strom direkt in Photonen um. Effizienz: 2.5-3.5 µmol/J bei guten Modellen. Wenig Wärmeabstrahlung, volles Spektrum möglich, lange Lebensdauer.<br><br><b>HPS (Natrium-Hochdruck)</b>: Gas-Entladungslampe. Rotes Spektrum mit wenig Blau. Extreme Hitze-Abstrahlung (40-50 % der Energie wird IR-Wärme). Effizient im µmol/J (2.0-2.5) aber erzwingt Zwangs-Klimatisierung.<br><br><b>CFL (Energiespar)</b>: Niedrige Intensität, billig. Nur für Klone/Stecklinge oder reine Anzucht. Für Blüte ungeeignet — PPFD zu niedrig.',
      practice: '<b>Empfehlung:</b><br>• Kleine Zelte (60×60, 80×80): LED 120-240 W reicht<br>• Mittlere Zelte (100×100): LED 240-320 W oder Mischung mit UV-Bar<br>• HPS nur noch wenn man Hitze im Winter nutzen will (sparen Heizkosten)<br><br><b>LED-Qualität unterscheiden:</b><br>• Gute Marken: Mars Hydro TS/FC, Spider Farmer, HLG, Lumatek, Sanlight<br>• Vorsicht: Billig-LEDs von Aliexpress oft nur halbe deklarierte Leistung<br>• Kennzahl: µmol/J (Samsung LM301H: ~2.7, Osram Oslon: ~2.8-3.0)',
      pitfall: 'HPS durch LED ersetzen aber gleichen Abstand nutzen = LED zu nah = Bleach. LEDs brauchen mehr Abstand weil PPFD konzentrierter ist. Auch: „600-W-LED" auf Verpackung oft nur Stromverbrauch von 80-150 W — marketing-Wattage, nicht echter Draw.' },
    { t: 'Lichtspektrum & Emerson-Effekt',
      brief: 'Verschiedene Wellenlängen machen verschiedene Jobs. Vollspektrum deckt alles ab — gezieltes Spektrum feintunt.',
      mechanism: '<b>UV (280-400 nm):</b> Stress-Trigger → Harz-Produktion hoch. Nur in Spätblüte nützlich.<br><br><b>Blau (400-500 nm):</b> Kurze Internodien, kompakter Wuchs. Wichtig in Veg.<br><br><b>Grün (500-600 nm):</b> Dringt tiefer ins Blätterdach ein als Blau/Rot (wird nicht so stark absorbiert).<br><br><b>Rot (600-700 nm):</b> Haupt-Antreiber für Blüten-Masse. Stärkster PAR-Absorber.<br><br><b>Fern-Rot (700-780 nm):</b> <b>Emerson-Effekt</b> — Kombination 680+730 nm steigert Photosyntheserate überproportional. Auch: löst Blüte in Feminisierten bei Lichtphasen-Ende schneller aus.',
      practice: 'Moderne Vollspektrum-LEDs decken 380-780 nm ab — reicht für die meisten Grower.<br><br><b>Spezial-Upgrades wenn Bestleistung:</b><br>• UV-Bar (280-315 nm UV-B): 2-3 Std/Tag in letzten 2-4 Wochen Blüte → +5-15% THC<br>• Fern-Rot-Emitter: 10-15 Min vor Lichtaus schaltet Fern-Rot allein → signalisiert „Sonnenuntergang" → schnellere Dunkelphase-Anpassung<br>• Mehr Blau in Veg: kompaktere Struktur, besser für kleine Zelte',
      pitfall: 'UV ist zweischneidig — Schutzbrille Pflicht beim Arbeiten im Zelt. Zu viel UV tötet Pflanze statt sie zu pushen. Fern-Rot während gesamter Lichtphase (nicht nur am Ende) = Pflanze „denkt" es ist Schatten, streckt sich massiv → lange Zweige.' },
    { t: 'UV-Bestrahlung (UV-A / UV-B)',
      brief: 'Gezielter Stress in der Spätblüte. UV-B treibt Harzproduktion hoch — aber Augenschutz Pflicht.',
      mechanism: 'UV-B (280-315 nm) <b>schädigt zelluläre Strukturen</b>. Die Pflanze reagiert mit Produktion von <b>sekundären Metaboliten als „Sonnencreme"</b> — Flavonoide, Cannabinoide (THC!), Terpene. Der Stress wird in harzige Verteidigung umgeleitet. Studien zeigen 5-15 % mehr Cannabinoide bei korrektem UV-B-Einsatz.',
      practice: '<b>Setup:</b><br>• UV-Bar (Philips, Migro, Kind UV) oder Reptilien-UV-B-Röhre<br>• 2-4 Std/Tag mitten in der Lichtphase<br>• Nur in den <b>letzten 2-4 Blüte-Wochen</b><br>• Abstand 40-60 cm von der Canopy<br><br><b>Sicherheit:</b><br>• <b>UV-Schutzbrille (UV400)</b> beim Zelt-Öffnen — UV-B schädigt Netzhaut irreversibel<br>• Lange Ärmel beim längeren Arbeiten im Zelt<br>• UV-Bar zeitsteuern, nicht selbst ein-/ausschalten (Gefahr Überdosis)',
      pitfall: 'Überdosis führt zu echten Strahlenschäden an Blättern (weiße Flecken, nekrotische Bereiche) → Pflanze geschwächt. UV während der gesamten Lichtphase laufen lassen = zu viel. Auch: <b>UV-B ist gefährlich für dich</b>, nicht unterschätzen. Netzhaut-Schäden sind nicht heilbar.' },
    { t: 'Photoperiode (18/6 vs. 12/12)',
      brief: 'Licht-Stunden-Verhältnis. Entscheidet über Wachstum vs. Blüte — aber nur bei Feminisierten. Autos ignorieren das.',
      mechanism: 'Feminisierte Cannabis-Pflanzen sind <b>Kurztagspflanzen</b>: Bei >12 h Dunkelheit wird der Blüte-Mechanismus ausgelöst (über Phytochrom-Abbau). Bei <12 h Dunkelheit bleiben sie im vegetativen Modus.<br><br><b>Automatics</b> haben diese Kopplung an die Lichtperiode <b>genetisch rausgezüchtet</b> — sie blühen nach ca. 3-4 Wochen Alter unabhängig von der Lichtzeit.',
      practice: '<b>Feminisierte Indoor:</b><br>• Vegi-Phase: 18/6 (18 h Licht, 6 h Dunkel)<br>• Blüte einläuten: auf 12/12 umschalten<br>• Geben wir ihr lange Vegi → große Pflanze, mehr Vorzucht-Zeit<br>• Kurze Vegi → kleine Pflanze, SoG-artig<br><br><b>Automatics:</b><br>• 18/6 (Standard) oder 20/4 (maximales Licht, mehr Ertrag)<br>• 24/0 nicht empfohlen — auch Autos brauchen Ruhephase für Hormon-Ausgleich<br>• Lichtperiode bleibt <b>den ganzen Zyklus gleich</b> — nicht umstellen',
      pitfall: 'Feminisierte mit 24/0 laufen lassen = Pflanze blüht nie. Automatics auf 12/12 umstellen = 1/3 weniger Ertrag ohne jeden Grund. Die beiden Seed-Typen <b>nicht versehentlich gleich behandeln</b> — die Pflanze reagiert komplett verschieden.' },
    { t: 'Störlicht & absolute Dunkelphase',
      brief: 'Jede noch so kleine Lichtquelle in der Dunkelphase kann den gesamten Zyklus ruinieren — bei Feminisierten.',
      mechanism: 'In der 12-stündigen Nachtphase baut die Pflanze das Blühhormon <b>Florigen</b> auf. Schon <b>wenige Minuten Störlicht</b> (Standby-LED, Telefon-Display, Straßenlaterne durch Zelt-Spalt) reicht um <b>das Phytochrom zu reaktivieren</b> und Florigen abzubauen. Wiederholter Stress → <b>Hermaphroditismus (Zwitter-Bildung)</b> oder Revegging.',
      practice: '<b>Zelt-Dichtigkeitstest:</b><br>1. Im Dunkeln (Raumlicht aus) ins Zelt setzen<br>2. 5 Minuten warten bis Augen adaptiert sind<br>3. Gibt es irgendwo Lichtspalte sichtbar? Dann abdichten<br>4. Standby-LEDs aller Geräte im Raum abkleben<br><br><b>Während Dunkelphase:</b><br>• Zelt nicht öffnen (auch nicht für „schnell anschauen")<br>• Wenn unbedingt Check nötig: <b>grünes Licht</b> (Grünes LED-Licht, Stirnlampe mit Grün-Modus) — Pflanzen nehmen Grün kaum wahr<br>• Handy-Display weg halten, Bildschirm-Helligkeit auf null',
      pitfall: 'Bei <b>Automatics</b> ist Störlicht <b>nicht kritisch</b> — die blühen altersbedingt, nicht photoperiodisch. Bei Feminisierten sind Zwitter-Schäden oft erst nach 2-3 Wochen sichtbar und dann nicht mehr rückgängig. Eine einzige Nacht mit hellem Licht in Woche 5 = Samen in Ernte.' },
  ]},
  { cat: '💨 Klima & Umgebung', items: [
    { t: 'CO₂-Anreicherung',
      brief: 'CO₂ erhöhen für mehr Ertrag — aber nur wenn Licht und Temperatur mitspielen. Sonst verschenktes Geld.',
      mechanism: 'Atmosphäre hat ~400 ppm CO₂. In der Photosynthese ist CO₂ das limitierende Element wenn Licht + Temperatur hoch sind. Auf 1000-1500 ppm angehoben kann die Pflanze <b>30-50 % mehr Photosynthese</b> pro Blatt leisten. Aber: der Engpass muss von CO₂ sein. Wenn Licht oder Wärme der Bremse sind, bringt extra CO₂ nichts.',
      practice: '<b>Voraussetzungen damit sich CO₂ lohnt:</b><br>• PPFD > 1000 µmol/m²/s (die meisten Hobby-Setups erreichen das nicht)<br>• Temperatur 28-32 °C<br>• Luftdichtes Zelt/Raum (CO₂ muss drinbleiben)<br>• Funktionierende CO₂-Regelung (Sensor + Ventil)<br><br><b>Setup-Kosten:</b><br>• CO₂-Flasche + Druckminderer + Solenoid-Ventil: ~200 €<br>• CO₂-Controller + Sensor: 150-400 €<br>• Oder: CO₂-Tabs/-Taschen (ineffizient, nur für Notlösung)<br><br><b>Für Hobby meist nicht lohnend</b> — Geld besser in bessere LED + AKF investiert.',
      pitfall: 'CO₂ im Wohnraum gefährlich — ab 5000 ppm Kopfschmerzen, ab 10000 ppm akut toxisch. Niemals in schlecht belüfteten Räumen betreiben. Auch: offene Flamme mit CO₂-Flasche = keine gute Idee, CO₂ verdrängt Sauerstoff schneller als gedacht.' },
    { t: 'Luftwechselrate (Abluft)',
      brief: 'Wie oft die Zelt-Luft pro Stunde komplett ausgetauscht wird. Die wichtigste Klima-Variable nach Licht.',
      mechanism: 'Die Abluftanlage saugt alte, warme, feuchte, CO₂-arme Luft raus. Durch den Unterdruck strömt frische Luft durch Ansaug-Öffnungen nach. Ergebnis: frisches CO₂, Wärme weg, Feuchtigkeit weg, Geruch durch AKF.<br><br><b>Ohne Abluft:</b> Hitzestau, Feuchte-Stau, Schimmel-Risiko, CO₂-Mangel → Photosynthese stoppt.',
      practice: '<b>Berechnung:</b> Zelt-Volumen (m³) × 40 = benötigte m³/h.<br>• 60×60×140 cm Zelt = 0.5 m³ → 20 m³/h minimum<br>• 80×80×180 cm = 1.15 m³ → 46 m³/h<br>• 100×100×200 cm = 2.0 m³ → 80 m³/h<br>• 120×120×220 cm = 3.17 m³ → 127 m³/h<br><br><b>Mit AKF</b> (widerstandsbedingt): +30-50 % auf die Rechnung draufrechnen.<br><br><b>Tipp:</b> Regelbaren Lüfter wählen (Stufenschalter oder EC-Motor mit Controller). Tagsüber Vollast, Dunkelphase reduziert.',
      pitfall: 'Zu starker Lüfter + zu kleines Zelt = riesiger Unterdruck, Zelt wird zusammengezogen, Stress für Pflanzen durch ständige Luftwirbel. Zu schwacher Lüfter: 35 °C und Schimmel. Lieber etwas überdimensioniert kaufen + regeln können, als zu schwach.' },
    { t: 'Oszillatoren & Clip-Fans (Umluft)',
      brief: 'Interne Luftbewegung im Zelt. Nicht für Austausch, sondern für Stabilität + Stängel-Training.',
      mechanism: 'Ventilatoren im Zelt-Inneren erzeugen <b>konstante Luftbewegung zwischen den Pflanzen</b>. Zwei Effekte:<br><br><b>1. Mikroklima-Auflösung:</b> Zwischen dichten Buds bildet sich sonst feuchte, stehende Luft → Schimmel-Brutstätte. Luftbewegung löst diese Taschen auf.<br><br><b>2. Mechanischer Reiz:</b> Stämme biegen sich im Wind → Pflanze baut mehr Zellulose ein → dicke, stabile Stämme. Ohne Wind: dünne, lange Stämme die unter Cola-Gewicht knicken.',
      practice: '<b>Setup:</b><br>• 1-3 Clip-Fans pro Zelt (je nach Größe)<br>• Oszillierend wenn möglich (schwenkend)<br>• Einen <b>unter</b> der Canopy, einen <b>über</b> der Canopy für Zirkulation<br>• Sanfter Wind — Blätter bewegen sich leicht, nicht wie im Sturm<br><br><b>Laufzeit:</b> 24/7 auch in der Dunkelphase. Nachts ist Luft-Zirkulation besonders wichtig weil Abluft reduziert läuft.',
      pitfall: 'Direkt in einen Punkt pusten = <b>Windbrand</b>: Blätter kräuseln sich, Blattspitzen trocknen aus, Pflanze leidet. Immer <b>Luftstrom streuen</b> — gegen Zelt-Wand pusten, von dort reflektieren. Auch: billige Ventilatoren werden mit der Zeit laut + vibrieren → Resonanz-Schwingungen stressen die Pflanzen.' },
    { t: 'Aktivkohlefilter (AKF)',
      brief: 'Der Geruchsabsorber für deine Abluft. Wichtiger als du denkst — und kaputt gehen kann er leise.',
      mechanism: 'Ein Zylinder mit <b>hochporöser Aktivkohle</b>. Abluft wird durchgesaugt, die <b>Terpen-Moleküle verfangen sich in den Poren</b>. Riecht nichts mehr → kein Cannabis-Geruch in Nachbarschaft. Physikalisches Prinzip: Adsorption an der riesigen inneren Oberfläche (1 g Aktivkohle = ~1000 m²).',
      practice: '<b>Dimensionierung:</b> AKF muss <b>gleich stark oder stärker</b> sein als die Abluft. Ein zu schwacher Filter = Luft rauscht durch ohne Kontakt = ungefilterte Abluft.<br><br><b>Wann austauschen:</b><br>• Nach 12-24 Monaten Standard-Betrieb<br>• Deutlich früher wenn durchgehend über 60 % Luftfeuchte<br>• Riech-Test: Außenseite des Zelts riechen → wenn Geruch durchkommt: Filter fertig<br><br><b>Positionierung:</b><br>• Am Ausgangs-Schlauch (drückende Abluft-Seite) oder direkt am Lüfter-Eingang<br>• Senkrecht aufhängen (Kondensation kann ablaufen)',
      pitfall: '<b>AKF sterben leise</b> — kein Warnsignal. Bei RLF > 70 % kondensiert Wasser in den Poren → Filter klebt zu → Geruch durchbricht plötzlich. Bei Dauer-Feuchte kann Filter schon nach 6 Monaten unbrauchbar sein. Immer AKF neu kaufen vor wichtigem Zyklus, nicht mitten drin nach Alter kontrollieren.' },
    { t: 'Grow-Tent vs. Grow-Room',
      brief: 'Zelt oder eigener Raum? Für Hobby fast immer Zelt — außer bei großen Mengen.',
      mechanism: '<b>Zelt:</b> In-sich-geschlossenes Mikroklima mit reflektierenden Innenwänden (Mylar). Licht bleibt drin, Klima schnell regelbar, Volumen überschaubar.<br><br><b>Raum:</b> Ganzer Raum umgebaut. Mehr Platz, aber <b>große Luft-Volumen reagieren träge</b> — Temperatur-Änderungen dauern länger, Feuchte-Peaks schwer abzufangen.',
      practice: '<b>Zelt-Empfehlungen nach Pflanzenanzahl:</b><br>• 1-2 Pflanzen: 80×80 oder 100×100 cm<br>• 3-4 Pflanzen: 100×100 bis 120×120 cm<br>• 4-6 Pflanzen: 120×120 oder 150×150 cm<br>• Größer → eigener Raum sinnvoller<br><br><b>Höhe 200+ cm</b> einplanen für Fem-Photoperiode (Stretch in Blüte). Für Autos reichen 140-180 cm.<br><br><b>Marken-Empfehlungen:</b><br>• Mittlere Qualität: Mars Hydro, Vivosun<br>• Premium: Secret Jardin (DarkStreet, DarkRoom)',
      pitfall: 'Billig-Zelt (< 50 €) = dünne Außenhaut, Licht-Leaks an den Reißverschlüssen, Mylar blättert ab nach 6 Monaten. Für ein 200+ € LED-Setup macht ein 150-€-Zelt Sinn — kein Grund dort zu sparen. Bei Room-Umbau Stromkreis beachten (2-3 KW LED-Setup nicht an einen 16-A-Kreis klemmen).' },
  ]},
  { cat: '🧬 Genetik & Entwicklung', items: [
    { t: 'Genotyp vs. Phänotyp',
      brief: 'Die DNA-Blaupause vs. die tatsächliche Pflanze. Gleiche Gene, verschiedene Umwelt = verschiedene Ergebnisse.',
      mechanism: '<b>Genotyp:</b> Der im Samen festgeschriebene, unveränderliche genetische Code. Die Blaupause.<br><br><b>Phänotyp:</b> Das tatsächliche Erscheinungsbild — Geruch, Farbe, Harz, Ertrag. Die gebaute Wirklichkeit.<br><br><b>Die Gleichung:</b> Phänotyp = Genotyp + Umweltbedingungen. Selbst 10 Samen derselben Mutter wachsen leicht verschieden. 10 Klone derselben Mutter in verschiedenen Umgebungen produzieren verschiedene Ergebnisse.',
      practice: '<b>Crop Steering</b> ist die Kunst die Umwelt so perfekt zu steuern, dass die Pflanze ihr <b>genetisches Maximum</b> ausbilden muss.<br><br>Die Cup-Level-Hebel:<br>• VPD-Management (Transpiration steuern)<br>• PPFD/DLI-Optimierung<br>• pH/EC-Präzision<br>• Dryback-Kontrolle<br>• Spektrum-Feinjustage (UV in Spätblüte)<br><br>Gute Genetik + schlechte Umgebung = mittelmäßiger Phänotyp. Mittlere Genetik + perfekte Umgebung = kann Top-Genetik schlagen.',
      pitfall: 'Auf YouTube werden Ergebnisse oft dem Strain zugeschrieben — in Wahrheit macht die Umgebung oft 50 % des Unterschieds. „Ich hab Strain X angebaut und nur 40 g bekommen" heißt nicht zwingend der Strain ist schwach. Immer Umgebungs-Setup mitbewerten.' },
    { t: 'Photoperiodismus (Automatic vs. Photoperiodisch)',
      brief: 'Der wahre Unterschied zwischen Auto und Fem liegt nicht im Geschlecht — sondern im Blüte-Auslöser.',
      mechanism: '<b>„Feminisiert"</b> bedeutet nur dass der Samen 99.9 % weiblich ist — eine Aussage über das <b>Geschlecht</b>. „Automatic" ist eine Aussage über den <b>Blüte-Auslöser</b>. Beides kann kombiniert sein (die meisten Autos sind auch feminisiert).<br><br><b>Photoperiodische Pflanzen:</b> Besitzen ein Phytochrom-System, messen die Dunkelheit. Bei >14 h Licht → Wachstum. Bei ~12 h Dunkelheit → Blüte. Du entscheidest wann durch Lichtschalter.<br><br><b>Automatics:</b> Durch Einkreuzung von <b>Cannabis Ruderalis</b> (sibirische Wildform) wurde das Phytochrom-System weggezüchtet. Blüte kommt nach <b>3-4 Wochen Alter</b>, unabhängig von Licht.',
      practice: '<b>Photoperiodisch:</b><br>• Volle Kontrolle über Größe (lange Vegi = große Pflanze)<br>• 18/6 bis zur gewünschten Größe, dann 12/12 für Blüte<br>• 3-5 Monate Gesamtzyklus möglich<br>• Klonen möglich (da genetisch stabil im Veg-Modus)<br><br><b>Automatics (dein Fall):</b><br>• 18/6 oder 20/4 konstant<br>• 8-12 Wochen Gesamtzyklus fix<br>• Größe durch Genetik + Topfgröße bestimmt<br>• KEIN Umtopfen, KEINE HST in früher Phase<br>• Nicht klonbar (Klon hat gleiches Alter wie Mutter)',
      pitfall: 'Häufiger Einsteiger-Fehler: Automatics auf 12/12 umstellen weil „ich hab Feminisierte gehabt". Ergebnis: Pflanze wächst viel kleiner, Ertrag halbiert. Autos brauchen maximal viel Licht über die ganze kurze Lebenszeit — <b>nie umstellen</b>.' },
    { t: 'Indica vs. Sativa vs. Ruderalis',
      brief: 'Die drei evolutionären Herkünfte. Prägen Wuchs-Form, Blütezeit und Wirkungsprofil.',
      mechanism: '<b>Indica:</b> Bergklima Zentralasiens (Hindu Kush). Kurze Sommer → kurze Blütezeit. Physikalische Anpassung: breit, buschig, dicht, robust.<br><br><b>Sativa:</b> Äquatoriale Zonen (Tropen). Lange Feuchte-Perioden → Schutz durch lange, luftige Struktur. Hochwachsend um Schimmel zu vermeiden.<br><br><b>Ruderalis:</b> Sibirische Wildform mit extrem kurzer Saison. Kaum Cannabinoide/Terpene, aber <b>Auto-Gen</b> — blüht unabhängig von Licht.',
      practice: '<b>Indica-Charakteristik:</b><br>• Wuchs: breitblättrig, 60-120 cm<br>• Blütezeit: 7-9 Wochen<br>• Wirkung: körperbetont, sedierend („couch-lock")<br>• Beispiele: Northern Lights, Afghan, Purple Kush<br><br><b>Sativa-Charakteristik:</b><br>• Wuchs: schmalblättrig, stark stretchend (150-250 cm)<br>• Blütezeit: 10-14+ Wochen<br>• Wirkung: kopfbetont, energetisch<br>• Beispiele: Haze, Amnesia, Durban Poison<br><br><b>Moderne Hybride:</b> Reine Indica/Sativa sind selten. Die meisten Strains sind Kreuzungen („60% Indica/40% Sativa"). Sensi Amnesia XXL Auto ist Sativa-dominant mit Auto-Gen von Ruderalis.',
      pitfall: 'Indica/Sativa ist oft überhypte Kategorisierung. Chemisch (Cannabinoid-/Terpen-Profil) sagt das <b>Chemotyp</b> mehr aus als Indica-/Sativa-Label. Ein „Indica"-Strain kann mehr Sativa-Wirkung haben wenn das Terpen-Profil limonen-dominiert ist. Besser: Terpen-Liste und Cannabinoid-Ratio anschauen, nicht Indica/Sativa-Label vertrauen.' },
  ]},
  { cat: '✂️ Training', items: [
    { t: 'Apikaldominanz & Auxin',
      brief: 'Warum Cannabis einen dicken Haupttrieb bildet und alles andere verkümmern lässt — und wie man das austrickst.',
      mechanism: 'Die oberste Triebspitze produziert das Hormon <b>Auxin</b>. Dieses wandert <b>nach unten</b> und hemmt das Wachstum aller Seitentriebe. In der Natur sinnvoll — die Pflanze wächst möglichst hoch, überragt Konkurrenten. Unter stationärem Kunstlicht aber <b>ineffizient</b>: ein Haupttrieb bekommt viel Licht, die Seitentriebe kümmern.',
      practice: '<b>Training bricht Apikaldominanz:</b><br>• <b>Topping:</b> Entfernt die Spitze → kein Auxin mehr → Seitentriebe wachsen gleichwertig<br>• <b>FIM:</b> Halb-Topping → 4+ neue Haupttriebe<br>• <b>LST:</b> Haupttrieb horizontal biegen → Auxin verteilt sich um → Seitentriebe gleichen sich an<br>• <b>Supercropping:</b> Stamm knicken → unterbricht Auxin-Transport<br><br>Kombinationen sind mächtig: LST + Topping + Defoliation = flache, breite Canopy mit vielen gleichwertigen Colas.',
      pitfall: 'Auxin-Ausgleich braucht 3-7 Tage nach Eingriff. In dieser Zeit wächst die Pflanze kaum — wirkt wie Stillstand. Bei Autos kostet das wertvolle Tage der begrenzten Lebenszeit. Darum HST (Topping, Supercropping) bei Autos <b>nicht empfohlen</b>, LST dagegen sehr wohl.' },
    { t: 'Topping',
      brief: 'Haupttrieb mit scharfer Schere köpfen. Aus 1 wird 2 — die klassische Methode um Apikaldominanz zu brechen.',
      mechanism: 'Mit steriler Schere wird die oberste Triebspitze (das <b>apikale Meristem</b>) über dem 4.-5. Nodium abgeschnitten. Die Auxin-Produktion stoppt schlagartig. Die Pflanze aktiviert die darunterliegenden Seitentriebe — diese werden zu zwei neuen, gleichwertigen Haupttrieben. Auf dem verbliebenen Stamm bildet sich eine <b>Kallus-Narbe</b> die den neuen Saftfluss-Knotenpunkt markiert.',
      practice: '<b>Voraussetzungen:</b><br>• Voller Turgordruck (2-4 h vorher gegossen)<br>• Sterile scharfe Schere (Isopropanol abwischen)<br>• Schnitt über 4.-5. Nodium (nicht früher, nicht später)<br>• Nur in der Veg-Phase, <b>mindestens 2 Wochen vor Blüte-Umstellung</b><br><br><b>Timing für Fem:</b><br>• Erstes Topping bei 5-6 Nodien (ca. 3-4 Wochen nach Keimung)<br>• Zweites Topping nach 2 Wochen Erholung (jeder der zwei neuen Haupttriebe wird erneut getoppt → 4 Colas)<br><br>Nach Topping: 3 Tage Ruhe (keine weitere Manipulation, keine Düngung), dann normal weiter.',
      pitfall: '<b>Nicht bei Automatics!</b> Autos haben keine Zeit für Erholung — jede Topping-Phase kostet 5-10 Tage, das verringert den Ertrag. Bei Autos stattdessen <b>LST</b> (Low Stress Training). Auch: Topping zu spät (in der Blüte) = Katastrophe, Pflanze fällt in Shock, bildet Zwitter.' },
    { t: 'Reihenfolge: Gießen vor Topping',
      brief: 'Immer erst gießen, dann schneiden. Nie umgekehrt. Der Unterschied zwischen sauberer Heilung und Wachstums-Stopp.',
      mechanism: 'Eine gut gewässerte Pflanze hat pralle, <b>Wasser-gefüllte Zellen</b> (voller Turgordruck). Der Schnitt durch wassergefüllten Stängel ist sauber und glatt — die Zellen trennen sich klar. Bei durstiger Pflanze ist das Gewebe weich — die Schere <b>quetscht die Zellen</b> statt sie zu trennen. Die Wunde heilt dadurch langsamer, Infektionsrisiko steigt, die Pflanze steht 5-7 statt 2-3 Tage.',
      practice: '<b>Timing-Regel:</b><br>1. Am Morgen volles Gießen (mit Plan-Dünger)<br>2. 2-4 h warten → Pflanze sieht strotzend aus, Blätter aufgerichtet<br>3. Topping am frühen Nachmittag<br>4. Keine Düngung mehr heute<br>5. 3 Tage Ruhe ohne Gießen (Dryback in Ruhe abwarten)<br>6. Erst dann nächster Guss (mit schwächerer Dosis)<br><br><b>Nach dem Schnitt:</b> Falls Saft austritt = Zeichen von gutem Turgor. Kein Pflaster oder Heilmittel nötig — Pflanze versiegelt selbst binnen Stunden.',
      pitfall: 'Falsche Reihenfolge 1: Abends toppen → nachts erholt sich die Pflanze nicht (fehlende Photosynthese für Wundheilung). Falsche Reihenfolge 2: <b>Düngen nach dem Topping</b> → gestresstes System nimmt Dünger schlecht auf, EC staut sich im Substrat an. Immer erst gießen, schneiden, dann 3 Tage gar nichts.' },
    { t: 'Canopy-Management',
      brief: 'Alle Triebspitzen auf gleicher Höhe halten. Die wichtigste Strategie für maximalen Ertrag pro m².',
      mechanism: 'Lichtintensität (PPFD) sinkt <b>quadratisch</b> mit dem Abstand zur Lampe. Ein Trieb 10 cm höher als andere bekommt nicht 10 % mehr, sondern oft 30-50 % mehr Photonen. Die niedrigeren Triebe kümmern im Schatten. Durch Training (LST, SCROG, Topping) werden alle Spitzen auf <b>gleiche Höhe manipuliert</b> → jeder Trieb bekommt identische PPFD → alle entwickeln sich gleichwertig.',
      practice: '<b>Erste Regel:</b> Canopy flach halten. Kein Trieb darf über der Masse herausragen.<br><br><b>Werkzeuge je nach Stadium:</b><br>• <b>Vegi:</b> Topping/FIM um Vielzahl Triebspitzen zu erzeugen; LST um Höhe auszugleichen<br>• <b>Stretch-Phase (ersten 2-3 Wochen Blüte):</b> LST + Super-Cropping um schnell wachsende Triebe zu „bremsen"<br>• <b>Späte Blüte:</b> Defoliation untere Blätter + Lollipopping (alles unter Canopy entfernen)<br><br><b>Ziel für Top-Ertrag:</b> 10-15 gleichwertige Colas auf exakt gleicher Höhe.',
      pitfall: 'Canopy zu spät flach machen = einzelne Triebe schon zu hoch → nur noch HST (Supercropping) hilft, und das stresst. Besser: <b>frühzeitig</b> in der Vegi beginnen LST zu machen. Bei Autos: LST sofort ab 4-5 Nodien, weil die Stretch-Phase bei Autos extrem kurz ist.' },
    { t: 'LST (Low Stress)',
      brief: 'Triebe sanft herunterbiegen und fixieren. Die harmloseste aber mächtigste Training-Methode — perfekt für Autos.',
      mechanism: 'Durch das Biegen des Haupttriebs nach unten wird die vertikale Wuchs-Richtung gebrochen. Auxin verteilt sich um in die horizontalen Seitentriebe, die dadurch <b>aktiver wachsen</b>. Kein Schnitt, keine Wunde, kaum Stress — die Pflanze wächst einfach in die gewünschte Form. Funktioniert auch bei Automatics ohne Ertragsverlust.',
      practice: '<b>Werkzeuge:</b> Gartendraht mit Plastik-Ummantelung (verletzt den Stamm nicht), Yo-Yos, Pflanzen-Clips.<br><br><b>Wie:</b><br>1. Topf-Rand hat oft Löcher oder man bohrt welche rein<br>2. Weichen Draht um den Haupttrieb legen, am Topf-Rand fixieren<br>3. Trieb sanft in die Waagerechte ziehen (nicht knicken!)<br>4. Nach 1-2 Tagen wächst die Spitze wieder nach oben → erneut biegen<br>5. Ziel: Kronendach 90 ° zum Stamm, alle Spitzen gleich hoch<br><br><b>Timing:</b> Ab 4-5 Nodien beginnen, während der ganzen Vegi-Phase, auch in frühen Blüte-Wochen noch möglich.',
      pitfall: 'Zu schnell/zu straff biegen = Stängel bricht. Dann knoten und weiter wachsen lassen (ja, heilt selbst). Drahtlagen ohne Plastik-Ummantelung schneiden in den Stamm. Spätes LST in der Blüte (ab Woche 3) kann Buds mechanisch schädigen — lieber früh flach legen.' },
    { t: 'HST (High Stress)',
      brief: 'Supercropping und Topping. Aggressive Eingriffe die viel Ertrag bringen können — aber Zeit kosten.',
      mechanism: '<b>High Stress Training</b> umfasst alle Eingriffe die die Pflanze <b>verwunden oder überdehnen</b>:<br>• <b>Topping</b>: Spitze abschneiden<br>• <b>FIM</b>: Teil-Topping<br>• <b>Super-Cropping</b>: Stamm gezielt quetschen bis das innere Gewebe bricht (ohne die äußere Rinde zu durchtrennen). Bildet einen <b>Kallus</b> (Verdickung) der den Nährstofftransport dauerhaft stärkt → später dickere Colas.<br>• <b>Defoliation aggressiv</b>: 40-50 % der Blätter auf einmal',
      practice: '<b>Super-Cropping Schritt-für-Schritt:</b><br>1. Voll gegossen, strotzender Turgor<br>2. Zwischen zwei Nodien den Stamm zwischen Daumen und Zeigefinger nehmen<br>3. 30 Sekunden sanft rollen/quetschen bis das innere Gewebe weich wird<br>4. Trieb in gewünschten Winkel biegen (jetzt geht es, vorher wäre er gebrochen)<br>5. Mit weichem Draht fixieren<br>6. Nach 5-10 Tagen: Kallus ist ausgebildet, Stamm steht steifer als vorher<br><br><b>Wann HST machen:</b> Nur bei Feminisierten. Mindestens 2-3 Wochen vor Blüte-Umstellung abschließen.',
      pitfall: '<b>HST nicht bei Automatics!</b> Jeder HST-Eingriff kostet 5-10 Tage Wachstum — bei einer 10-Wochen-Pflanze verliert man 10-15 % des Zyklus. Zu weit quetschen beim Super-Cropping = Stamm bricht komplett ab. Geduld: der erste Supercrop erfordert Übung, am besten an Test-Pflanze ausprobieren.' },
    { t: 'Defoliation (Entlaubung)',
      brief: 'Gezielt Blätter entfernen. Umstritten aber wirkungsvoll — wenn du weißt welche und wann.',
      mechanism: 'Blätter im <b>unteren, beschatteten Drittel</b> der Pflanze verbrauchen oft mehr Energie (Atmung, Unterhalt) als sie durch Photosynthese erzeugen — <b>Ertrags-Parasiten</b>. Durch gezieltes Entfernen zwingt man die Pflanze, ihre Nährstoffe (besonders P+K in der Blüte) nach oben in die Blütenstände zu verlagern. Zusätzlich sinkt die <b>Transpirationsfläche</b> → Luftfeuchte im Zelt leichter zu steuern → weniger Schimmelrisiko.',
      practice: '<b>Was entfernen:</b><br>• Große Lüfterblätter im unteren Drittel der Pflanze<br>• Blätter die andere Triebspitzen direkt überschatten<br>• Gelbe oder fast abgestorbene Blätter (sowieso)<br>• Blätter direkt über entwickelnden Blüten (geben weniger als sie nehmen)<br><br><b>Nicht entfernen:</b> Junge neue Blätter an Triebspitzen, gesunde mittelgroße Fächerblätter die direkt Licht bekommen.<br><br><b>Optimale Zeitpunkte (bei Fem):</b><br>1. Tag der 12/12-Umstellung (massive Entlaubung, 30-40 % aller Blätter)<br>2. Tag 21 Blüte (vor Peak-Blüte, 20-30 %)<br>3. Bei Bedarf späte Lollipop (alles unter Canopy weg)<br><br><b>Bei Autos:</b> Sehr vorsichtig! Maximal 10-15 % auf einmal, nur sichtbar nutzlose Blätter.',
      pitfall: 'Zu viel auf einmal = Shock, Wachstumsstopp von 5-10 Tagen. Bei Autos kann aggressive Defoliation den Ertrag halbieren. Die gesunden großen Fächerblätter (oben) sind <b>Kraftwerke</b> — nur weil sie groß sind ist kein Grund sie zu entfernen. Regel: wenn du zweifelst → dran lassen.' },
    { t: 'Fimming (F.I.M.)',
      brief: 'Das „versehentliche" Topping das zu 4+ neuen Trieben führt. Name steht für „Fuck, I Missed".',
      mechanism: 'Statt den Haupttrieb komplett abzuschneiden (Topping), werden nur <b>70-80 % der obersten Triebspitze</b> durchtrennt. Ein Rest des Meristem-Gewebes bleibt stehen — und von dort aus bildet die Pflanze <b>3-6 neue Haupttriebe</b> statt nur 2 wie beim Topping. Höheres Ertragspotenzial bei gleichem Stress.',
      practice: '<b>Technik:</b><br>1. Voll gegossen (wie bei Topping)<br>2. Oberste Triebspitze identifizieren (die noch unentfaltete Blatt-Rosette ganz oben)<br>3. Mit scharfer Schere nur den <b>oberen Teil der Rosette</b> abschneiden — ca. 70-80 % der sichtbaren Knospen<br>4. Der Rest bleibt stehen → von dort wachsen 4-6 neue Haupttriebe<br>5. 3 Tage Ruhe, dann normal<br><br><b>Beste Zeit:</b> Ab 4-5 Nodien, nur in Vegi, mindestens 2 Wochen vor Blüte-Umstellung.',
      pitfall: 'Schnitt-Tiefe ist heikler als beim Topping — 50 % geschnitten = fast wie Topping (2 Triebe), 90 % geschnitten = Topping (2 Triebe). Der Sweet-Spot bei 70-80 % ist Gefühlssache. Asymmetrisches Wachstum ist typisch — manchmal werden aus 4 Trieben nur 3 ernsthafte Colas. Bei Autos genauso wie HST <b>nicht empfohlen</b>.' },
    { t: 'SCROG (Screen of Green)',
      brief: 'Horizontales Netz über der Pflanze. Jeder Trieb wird durchs Netz gewebt — die perfekte, flache Canopy.',
      mechanism: 'Ein <b>horizontales Pflanzen-Netz</b> (Zucht-Gitter, 5-10 cm Maschenweite) wird 20-30 cm über dem Topf gespannt. Während des Wachstums werden alle Triebspitzen einzeln durchs Netz gewebt und horizontal geführt. Ergebnis: eine <b>perfekt flache Canopy</b> — alle Triebe auf identischer Höhe, jeder bekommt gleiche PPFD, maximaler Ertrag pro m².',
      practice: '<b>Setup:</b><br>1. Netz an Zelt-Stangen spannen, 20 cm über Topfkante<br>2. Ab Veg-Ende oder früh in der Blüte mit Weben beginnen<br>3. Jede Triebspitze die das Netz erreicht → unter das Netz biegen und durch ein anderes Loch wieder nach oben ziehen<br>4. Wenn das Netz gefüllt ist → auf 12/12 umstellen<br>5. In der Blüte: Triebe unter dem Netz durchs Gitter nicht mehr verschieben<br><br><b>Ideal für:</b> Photoperiodische Strains mit langer Vegi. <b>Nicht für Autos</b> — die haben zu wenig Zeit, Netz nicht vollwachsen.',
      pitfall: 'Zu spät mit Weben anfangen = Triebe brechen beim Umlenken. Zu frühes Netz-Spannen = Triebe wachsen zwischen dem Netz schief durch. Bei SCROG + Defoliation: alles unter dem Netz entfernen (Lollipopping) = kein versch. Licht, nur Haupt-Triebspitzen bekommen die Intensität.' },
    { t: 'SOG (Sea of Green)',
      brief: 'Viele Pflanzen auf kleinem Raum, jede mit nur einer großen Cola. Das Gegenteil von SCROG.',
      mechanism: 'Bei SOG wird die natürliche Apikaldominanz <b>bewusst ausgenutzt</b>: Viele Pflanzen (oft 9-25 auf 1 m²) werden mit kurzer oder gar keiner Vegi-Phase in die Blüte geschickt. Jede Pflanze bildet nur <b>eine einzige massive Haupt-Cola</b> aus. Kein Training, keine Toppings — reine Kolatrieb-Dominanz. Ertrags-Effizienz pro Zeit ist extrem hoch.',
      practice: '<b>Setup:</b><br>• 9-25 kleine Töpfe (3-5 L) pro m²<br>• Klone oder Autos (für Uniformität)<br>• Direkt nach Bewurzelung auf Blüte stellen (Fem) bzw. Auto ohne Training<br>• Licht von oben, keine Seitenbewegung<br><br><b>Vorteile:</b><br>• Sehr schneller Turnover (nur 8-10 Wochen)<br>• Hoher Ertrag pro m²<br>• Kein Training-Aufwand<br><br><b>Nachteile:</b><br>• Viele Pflanzen = höherer Samen-/Klon-Aufwand<br>• Weniger gesetzlich erlaubte Pflanzenzahl<br>• Uniform-Genetik nötig (sonst ungleichmäßig)',
      pitfall: 'SOG braucht <b>identische Genetik</b> (alle Klone oder alle gleicher Auto-Strain). Wenn unterschiedliche Pflanzen → verschiedene Höhen → Canopy ungleichmäßig → einige kümmern. Rechtlich: 3 Pflanzen in DE erlaubt, SOG mit 9+ ist illegal.' },
    { t: 'Mainlining / Manifolding',
      brief: 'Die Extrem-Form des Trainings. Pflanze wird mehrfach symmetrisch gespalten bis zu 8-16 gleichgroße Colas entstehen.',
      mechanism: 'Beim Mainlining wird die Pflanze sehr früh (am 4.-5. Nodium) getoppt, dabei werden die beiden unteren Seitentriebe als neue Haupttriebe genommen. Diese werden horizontal weggebogen — ein <b>„Manifold"</b> (Verteiler-Rohr) entsteht. Nach 2-3 Wochen wird jeder dieser Triebe erneut getoppt → 4 Haupttriebe. Nochmal = 8. Ergebnis: <b>hydraulisch perfekte Symmetrie</b>, jeder Trieb hat gleichen Wurzel-Abstand, Nährstoffe verteilen sich absolut gleichmäßig.',
      practice: '<b>Schritt-für-Schritt (6-8 Wochen Aufbau):</b><br>1. Pflanze wachsen lassen bis 5-6 Nodien<br>2. Haupttrieb am 3. Nodium toppen (alles darüber weg)<br>3. Die 2 Seitentriebe am 3. Nodium werden neue Haupttriebe<br>4. LST: beide weit nach außen biegen (horizontal), bis sie waagerecht stehen<br>5. Alle anderen Seitentriebe an ihnen wegschneiden (nur oberste 2 behalten)<br>6. Nach 2-3 Wochen: jeden der 2 Triebe toppen → 4 Triebe<br>7. Optional: nochmal → 8 Triebe<br>8. Dann 12/12 → Blüte<br><br><b>Ideal für:</b> Erfahrene Fem-Grower, lange Vegi möglich, Licht-Raum gut ausnutzen.',
      pitfall: '<b>Nur für Feminisierte!</b> 6-8 Wochen Vegi-Aufbau — Autos haben diese Zeit nicht. Ein falscher Schnitt = Asymmetrie = ungleiche Entwicklung. Anfänger-Fehler: zu früh toppen (bei 3-4 Nodien) → Pflanze kleiner als sie sein könnte. Geduld ist der Schlüssel.' },
    { t: 'Monster Cropping',
      brief: 'Klone aus einer bereits blühenden Pflanze nehmen. Ergebnis: extrem buschige „Monster" im Re-Veg.',
      mechanism: 'Stecklinge (Klone) werden aus einer Pflanze geschnitten die sich bereits <b>2-3 Wochen in der Blüte</b> befindet. Diese Klone werden zurück in Vegi-Licht (18/6) gestellt. Durch die noch vorhandenen <b>Blüte-Hormone</b> mutieren sie beim <b>Re-Vegging</b> zu extrem buschigen Pflanzen mit vielen Seitentrieben — teils mit mutierten Blattformen. Nach 3-4 Wochen Re-Veg haben sie eine enorme Triebdichte.',
      practice: '<b>Technik:</b><br>1. Mutterpflanze in Woche 2-3 der Blüte auswählen<br>2. Klon schneiden wie gewohnt (5-10 cm, 2-3 Nodien, unten Blätter entfernen)<br>3. Bewurzeln (Torf-Würfel, Klon-Pulver, hohe Feuchte)<br>4. Nach Bewurzelung: auf 18/6 Vegi-Licht<br>5. Erste 2-4 Wochen: Pflanze wächst seltsam, zwittrige Blätter, Einzelfinger-Blätter<br>6. Danach: normale Vegi-Form, aber extrem buschig mit vielen Seitentrieben<br><br>Sehr ertragreich wenn funktioniert. Gut mit SOG kombinierbar.',
      pitfall: 'Erfahrung nötig. Re-Vegging-Phase dauert und sieht merkwürdig aus — viele Anfänger werfen die Pflanze frustriert weg. Erhöhtes Hermie-Risiko durch die Hormon-Achterbahn. Nicht für Automatics möglich (Autos kann man nicht klonen, Klon hat gleiches Alter wie Mutter).' },
    { t: 'Pflanzen-Stütze (Yo-Yos & Netze)',
      brief: 'In der Spätblüte werden Buds so schwer dass Stämme knicken. Stütze ist Pflicht, nicht Kür.',
      mechanism: 'Schwere reife Blüten erzeugen Hebelkräfte die selbst dicke Stämme knicken lassen. Ein geknickter Stamm <b>klemmt den Saftfluss ab</b> — die betroffene Cola hört auf zu reifen, Harz- und Cannabinoid-Synthese stoppen. Stütze verhindert das mechanische Versagen und sichert so den Ertrag der letzten kritischen 2-3 Wochen.',
      practice: '<b>Drei Haupt-Methoden:</b><br><br><b>1. Yo-Yos (Pflanzen-Haltegurte):</b> Kleine Rollen mit Haken, an der Zelt-Decke befestigt. Flexibel, einzelne Triebe werden damit hochgezogen. Gut für gezielte Unterstützung weniger Haupttriebe.<br><br><b>2. Stütznetze (Trellis):</b> Horizontales Netz oberhalb der Canopy (nicht durchs Netz wie SCROG, sondern drüber). Trägt das gesamte Gewicht.<br><br><b>3. Bambusstäbe:</b> Klassisch, günstig. Trieb an Stab mit weichem Band fixieren. Gut für einzelne besonders schwere Colas.<br><br><b>Timing:</b> Ab Woche 4-5 der Blüte proaktiv installieren, bevor Buds anfangen sich schwer durchzubiegen.',
      pitfall: 'Zu spät eingesetzt (Stamm schon gebogen) = mechanischer Schaden bleibt. Zu starre Stütze = bei Dryback schrumpft Pflanze, Trieb bricht ab. Yo-Yos regelmäßig nachstellen. Bei Outdoor: Windlast beachten, feste Staketen tief in den Boden.' },
  ]},
  { cat: '🌸 Lebensphasen', items: [
    { t: 'Keimung',
      brief: 'Der embryonale Start. 24-72 h bis die erste Wurzel sichtbar ist. Setup entscheidet alles.',
      mechanism: 'Der Samen nimmt durch <b>Osmose</b> Wasser auf, quillt, die Schale platzt. Die <b>Pfahlwurzel (Radicula)</b> bricht zuerst durch — sucht aktiv nach unten Schwerkraft + Wasser. Erst dann entfalten sich die <b>Keimblätter (Kotyledonen)</b> nach oben.<br><br>Kritisch: <b>Sauerstoff</b>. Stehendes Wasser oder zu nasse Erde = Schimmel + Fäulnis = Samen erstickt bevor er keimt.',
      practice: '<b>3 bewährte Methoden:</b><br>• <b>Zewa-Methode:</b> Samen zwischen 2 feuchte Küchentücher, in dunkle Schale, 22-25 °C, alle 12 h kontrollieren. Sobald Wurzel 2-3 mm = einpflanzen.<br>• <b>Direkt im Substrat:</b> Samen 0.5-1 cm tief in feuchtes Light-Mix, mit Folie abdecken, 22-25 °C. Schlüpft binnen 3-7 Tagen durch.<br>• <b>Jiffy-Würfel:</b> 30 Min in lauwarmem Wasser einweichen, Samen 5 mm tief reindrücken, im Mini-Gewächshaus.<br><br><b>Wichtig:</b> Direkt in Endtopf bei <b>Automatics!</b> Bei Fems kann ein 0.5-1 L Anzucht-Topf vorgeschaltet werden, dann nach 2 Wochen umtopfen.<br><br><b>Wasser:</b> pH 6.0-6.4, nur Spritzflasche, niemals fluten.',
      pitfall: 'Häufigste Fehler: (1) Samen zu tief vergraben → Sämling kommt nicht durch. (2) Zu warm (über 28 °C) → Pilzwachstum. (3) Zu trocken → Wurzel verbrennt sobald sie raussteht. (4) Auto in Anzucht-Topf statt Endtopf → 5-10 Tage Wachstumsverlust durch Umtopfen.' },
    { t: 'Sämlingsphase',
      brief: 'Die ersten 1-3 Wochen nach Keimung. Pflanze winzig aber empfindlich — wenig hilft mehr als viel.',
      mechanism: 'Vom Aufgang der Keimblätter bis zu den ersten echten 3-Finger-Blättern. Das Wurzelsystem ist <b>noch nicht etabliert</b> — die Pflanze lebt von den Reserven im Samen + minimaler Aufnahme. Sie reagiert extrem empfindlich auf:<br>• Salz (zu viel Dünger = Burn)<br>• Trockenheit (Wurzeln noch flach, kein Reserve-Sog)<br>• Falsche Feuchte (zu hoch = Damping-off-Pilz, zu niedrig = trocknet aus)',
      practice: '<b>Klima:</b><br>• Temperatur 22-25 °C (gleich Tag/Nacht oder leichte Nachtsenkung)<br>• Luftfeuchte 60-70 %<br>• VPD 0.4-0.8 kPa<br>• Schwaches Licht: 200-400 PPFD reichen<br><br><b>Wasser:</b> Spritzflasche, mehrmals täglich kleine Mengen. Nur die obere Substratschicht feucht halten. <b>Kein Dünger</b> in den ersten 7-14 Tagen — All-Mix hat eingebauten Vordünger, Light-Mix für 2 Wochen, Coco erfordert ab Tag 1 leichte CalMag-Lösung.<br><br><b>Schutz:</b> Mini-Gewächshaus oder Frischhaltefolie über Topf für die ersten 5-7 Tage = Feucht-Tröpfchen halten Klima stabil.',
      pitfall: 'Damping-off (umkippender Pilz-Sämling) ist Sämlings-Killer Nr. 1 — Ursache fast immer zu nass + zu warm. Behebung: Substrat antrocknen lassen, Luft bewegen mit kleinem Lüfter (sanft). Auch: Sämlinge zu nah unter starker LED → Stress, gestauchtes Wachstum. Lieber höher hängen.' },
    { t: 'Vegetationsphase',
      brief: 'Die Wachstumsphase. Pflanze baut Struktur auf — Stamm, Blätter, Wurzeln. Hier wird trainiert.',
      mechanism: 'Nach der Sämlingsphase startet das aktive Wachstum. Pflanze baut <b>Biomasse</b> auf (Blätter, Stiele) und das <b>Wurzelsystem</b>. Hoher Bedarf an <b>Stickstoff (N)</b> — primär für Chlorophyll und Proteine. Bei photoperiodischen Pflanzen kann diese Phase beliebig lang gehalten werden (18/6 Licht). Bei Autos läuft sie automatisch ~21 Tage und endet mit der Blüte-Phase.',
      practice: '<b>Klima:</b><br>• Temperatur 22-26 °C<br>• Luftfeuchte 50-70 %<br>• VPD 0.8-1.2 kPa<br>• Licht: 400-600 PPFD<br><br><b>Düngung (Erde):</b><br>• All-Mix: Erst ab Woche 3 leichte Düngung<br>• Light-Mix: Ab Woche 2 mit halber Dosis starten<br>• Coco: Vom ersten Tag an Vegi-Dünger + CalMag<br><br><b>Trainings-Fenster:</b><br>• Topping/FIM bei Fem ab 5-6 Nodien<br>• LST von Anfang an möglich<br>• Mainlining ab Vegi-Mitte<br>• 3 Tage Pause nach jedem HST-Eingriff<br><br><b>Dauer:</b> Fem 4-8 Wochen frei wählbar; Autos fix 18-25 Tage.',
      pitfall: 'Bei Fems oft zu früh auf 12/12 umgestellt → Pflanze zu klein → Ertrag halbiert. Mindestens 4 Wochen Vegi für ordentliche Größe einplanen. Bei Autos: aggressives HST in Vegi → kostet 5-10 Tage = direkt Ertragsverlust. Bei Autos nur LST.' },
    { t: 'Stretch (Pre-Flower)',
      brief: 'Die ersten 2-3 Wochen Blüte. Pflanze verdoppelt oder verdreifacht ihre Höhe — hier wird gnadenlos gestreckt.',
      mechanism: 'Hormonell gesteuerter Wachstumsschub. Bei photoperiodischen Pflanzen direkt nach 12/12-Umstellung; bei Autos ab Tag 21-35. Die Pflanze <b>plant strategisch</b> — sie will ihre Blüten ans Sonnenlicht bringen bevor sie reifen. Internodiale Abstände (zwischen Blatt-Etagen) werden <b>final festgelegt</b>. Nach dem Stretch wächst kein Höhenzentimeter mehr — nur Blütenfüllung.',
      practice: '<b>Vor dem Stretch:</b> Lampe muss <b>höher</b> hängen können — sonst wächst Pflanze in die LED rein → Lichtbrand. Faustregel: 1.5-2× aktuelle Pflanzenhöhe einplanen.<br><br><b>Während Stretch:</b><br>• Lampe nach Bedarf hochziehen<br>• LST aktiv: Triebe runterbiegen die rausragen<br>• Super-Cropping bei einzelnen aggressiven Trieben<br>• Düngung schon Richtung P/K verschieben (Mischphase)<br><br><b>Wann Stretch endet:</b> Wenn Pflanze 7-14 Tage keine Höhenzunahme mehr zeigt → Stretch ist abgeschlossen, ab jetzt nur Blütenfüllung.',
      pitfall: 'Häufigster Fehler: Lampen-Höhe nicht mitwachsen lassen → Buds zu nah unter LED → Bleach (weiße Buds, Cannabinoid-Verlust). Bei kleinen Zelten: zu spät LST → Triebe wachsen in die LED → mechanischer Schaden. Lieber sofort flach legen wenn Stretch beginnt.' },
    { t: 'Blüte-Phasen (früh / mittel / spät)',
      brief: 'Drei sehr verschiedene Phasen mit verschiedenen Bedürfnissen. Du musst je nach Phase anders düngen, gießen und klimaregeln.',
      mechanism: '<b>Frühe Blüte (Woche 1-3):</b> Transition. Stretch läuft, weiße Stigmen (Pistil-Härchen) bilden sich. Pflanze ist noch im „Wachsen + Blühen"-Mix.<br><br><b>Mittlere Blüte / Bulk (Woche 4-6):</b> Höhenwachstum stoppt. Calyxe schwellen massiv. Nährstoffbedarf dreht von <b>N</b> hin zu <b>P + K</b>. Hier wird die meiste Bud-Masse aufgebaut.<br><br><b>Späte Blüte / Ripening (Woche 7+):</b> Ausreifen. Harzproduktion am Maximum, Terpene flüchtig. Erntezeitpunkt rückt näher.',
      practice: '<b>Anpassungen je Phase:</b><br><br><b>Frühe Blüte:</b><br>• Klima: 22-26 °C, RLF 50-60 %, VPD 1.0-1.3<br>• Dünger: NPK noch leicht N-lastig, langsam P/K rein<br>• Defoliation an Tag 21<br><br><b>Mittlere Blüte:</b><br>• Klima: 22-26 °C, RLF 45-55 %, VPD 1.1-1.4<br>• Dünger: Voll P/K, hohe EC (1.6-2.0)<br>• Pflanzen-Stütze installieren<br><br><b>Späte Blüte:</b><br>• Klima: 20-24 °C, RLF 40-50 %, VPD 1.2-1.6<br>• Dünger: Reduzieren, Spülen vorbereiten<br>• UV-Bar einsetzen (letzte 2-4 Wochen)',
      pitfall: 'Falsche Düngung in falscher Phase: zu viel N in Blüte = lange Blätter, weniger Buds. Zu früh K-Boost = Pflanze stresst, Hermie-Risiko. Klima nicht anpassen: 70 % RLF in Spätblüte = Schimmel binnen 3 Tagen. Jede Phase hat eigene Regeln, nicht alles gleich behandeln.' },
    { t: 'Reife (Seneszenz)',
      brief: 'Die letzte Phase. Pflanze baut sich selbst ab um die letzten Nährstoffe in die Blüten zu schicken.',
      mechanism: 'Programmiertes Sterben. Pflanze stellt die Nährstoffaufnahme ein (oder wird durch Flushen aktiv dazu gezwungen). Sie greift auf <b>Reserven aus den eigenen Blättern</b> zurück — Stickstoff, Magnesium, Kalium werden aus den Blättern in die reifenden Blüten umgeleitet. Chlorophyll wird abgebaut → grüne Farbe verschwindet → die <b>verborgenen Anthocyane</b> (lila/rot) und Carotinoide (gelb) werden sichtbar.',
      practice: '<b>Sichtbare Zeichen:</b><br>• Untere Blätter werden gelb<br>• Ganze Pflanze farbenfroh: gelb, orange, lila, braun<br>• Stigmen werden orange/braun und ziehen sich zurück<br>• Trichome werden milchig, dann teils amber<br>• Pflanze duftet intensiver als je zuvor<br><br><b>Was tun:</b><br>• Nicht in Panik düngen — Vergilbung ist gewollt!<br>• Spülen (nur Wasser) je nach Substrat 1-2 Wochen vor Ernte (Erde) bzw. 3-7 Tage (Coco)<br>• Trichome regelmäßig mit Lupe oder Smartphone-Mikroskop checken<br>• 24-48 h vor Ernte: Lampe aus (Dunkelheit triggert finale Trichom-Reife)',
      pitfall: 'Anfänger sehen die gelbe Pflanze und panisch düngen → bringt nichts mehr (Pflanze nimmt nichts auf), nur Salze im Substrat. Geduld haben: gelb + violett + braun = Pflanze macht ihren Job. Ungeduld = zu früh ernten = weniger THC, „kratziger" Rauch durch unfertige Cannabinoid-Synthese.' },
  ]},
  { cat: '🔬 Ernte', items: [
    { t: 'Trichom-Analyse (Ernte-Trigger)',
      brief: 'Die einzig zuverlässige Methode den Erntezeitpunkt zu bestimmen. Mit Lupe oder Smartphone-Mikroskop.',
      mechanism: 'Trichome sind die <b>Harz-Drüsen</b> auf den Blüten und Sugar-Leaves. Sie verändern ihre Farbe je nach Reife:<br><br><b>Klar/durchsichtig:</b> Unreif, Cannabinoid-Synthese läuft noch. Zu früh = wenig Wirkung, kratziger Rauch.<br><br><b>Milchig/trüb (weiß):</b> Peak <b>THC-A</b>. Maximale psychoaktive Potenz nach Decarboxylierung.<br><br><b>Bernstein/amber:</b> THC-A degradiert oxidativ zu <b>CBN</b> (sedierend, „couch-lock"). Total-THC sinkt.',
      practice: '<b>Werkzeuge (günstig → besser):</b><br>• Smartphone + Makro-Aufsatz (10-30 €)<br>• Taschen-Mikroskop 60-100× (15 €)<br>• USB-Mikroskop (40-80 €) — beste Bilder<br><br><b>Prüfung:</b><br>• Auf <b>Calyx</b> (Blüten-Knospe) schauen, nicht auf Sugar-Leaves<br>• 3-4 verschiedene Stellen + verschiedene Höhen prüfen<br>• Trichome müssen scharf sichtbar sein, nicht nur Pistil-Härchen<br><br><b>Erntezeit-Profile:</b><br>• <b>Energetisch/Sativa-Effekt:</b> 80-90 % milchig, ~10 % amber<br>• <b>Standard-Cup:</b> 70-80 % milchig, 15-20 % amber, Rest klar<br>• <b>Sedierend/Schlaf:</b> 50 % milchig, 40-50 % amber<br><br>Faustregel: <b>Wenn ~70 % milchig erreicht sind</b> = jetzt nicht mehr lange.',
      pitfall: 'Pistilen (die Härchen) sind <b>kein verlässlicher Indikator</b> — viele Strains haben 100 % braune Pistilen aber noch klare Trichome. Immer auf Trichome schauen, nicht auf Pistilen. Auch: zu lange warten = Trichome werden glasig-grau (overripe), Wirkung lässt nach.' },
    { t: 'Dunkelphase vor der Ernte (48–72h)',
      brief: 'Letztes Pflanzen-Ritual: 2-3 Tage komplett dunkel vor dem Schnitt. Schützt Terpene, soll Harz pushen.',
      mechanism: 'Pflanze stoppt Photosynthese komplett, fängt an Stärke aus den Blättern abzubauen. <b>Flüchtige Terpene</b> verdampfen normalerweise unter Licht und Hitze — in absoluter Dunkelheit bleiben sie länger erhalten. Manche Studien zeigen außerdem leichte Erhöhung der THC-Konzentration in den letzten 48 h durch Stress-Antwort.',
      practice: '<b>Setup:</b><br>1. 48-72 h vor geplantem Schnitt: Lampe komplett aus, Zelt absolut lichtdicht<br>2. Temperatur etwas absenken (18-20 °C)<br>3. Luftfeuchte runter (40-50 %)<br>4. Lüfter weiterhin laufen lassen (Klima-Kontrolle)<br>5. Kein Gießen mehr in dieser Phase<br>6. Ernten am Morgen <b>vor</b> dem Lichtangang (auch wenn Lampe aus ist) — Cannabinoide sind nachts maximal in den Blüten konzentriert',
      pitfall: 'Manche behaupten Dunkelphase macht keinen Unterschied — Effekt ist tatsächlich klein, aber nicht null. Risiko: bei zu warmem oder feuchtem Zelt in dieser Phase = Schimmel-Bedingungen während Pflanze nicht mehr verteidigt. Klima konsequent kontrollieren.' },
    { t: 'Wet Trim vs. Dry Trim',
      brief: 'Sofort nach Ernte trimmen — oder erst trocknen, dann trimmen? Cup-Standard ist Dry.',
      mechanism: '<b>Wet Trim:</b> Direkt nach dem Schnitt werden alle Sugar-Leaves abgeschnitten, <b>nasse Buds</b> hängen. Trocknet schneller (5-7 Tage), dafür <b>fehlt das Schutzpolster</b> der Blätter.<br><br><b>Dry Trim:</b> Pflanze wird komplett mit Blättern aufgehängt. Erst nach 10-14 Tagen, wenn trocken, werden die Sugar-Leaves entfernt. Die Blätter wirken als <b>Feuchtigkeits-Buffer</b> — die Buds trocknen langsam und gleichmäßig.',
      practice: '<b>Wann Wet Trim sinnvoll:</b><br>• Hohe Luftfeuchte im Trockenraum (>65 %) — sonst Schimmelgefahr<br>• Sehr dichte Buds, die innen feucht bleiben würden<br>• Wenig Platz zum kompletten Aufhängen<br><br><b>Wann Dry Trim besser:</b><br>• Standard-Bedingungen (RLF 50-60 %, 18-20 °C)<br>• Cup-Qualität / maximale Terpene<br>• Genug Hänge-Platz<br><br><b>Kompromiss „Halb-Trim":</b> Große Lüfterblätter direkt nach Ernte entfernen, kleine Sugar-Leaves dranlassen, dann hängen. Beste beider Welten.',
      pitfall: 'Wet Trim ohne perfektes Klima = Buds trocknen außen schnell, innen Schimmel. Dry Trim mit zu viel Blattmasse + zu hoher Feuchte = ebenfalls Schimmel-Falle. <b>Klima ist entscheidender als die Trim-Methode.</b> Hygrometer im Trockenraum Pflicht.' },
    { t: 'Spülung',
      brief: 'Nur Wasser in den letzten 7-14 Tagen. Lässt Pflanze Nährstoffreste verbrauchen — sauberer Geschmack.',
      mechanism: 'In der finalen Phase wird die Düngung komplett gestoppt. Die Pflanze greift auf gespeicherte Nährstoffe in den Blättern und im Substrat zurück. Diese werden in die Blüten umgeleitet UND gleichzeitig <b>Salz-Reste werden ausgespült</b>. Ergebnis: Blüten ohne Restsalze → keine bitteren Noten beim Rauchen, weiße statt schwarze Asche.',
