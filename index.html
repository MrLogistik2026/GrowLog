  const ppfdEl = document.getElementById('ppfd-val');
  const dliEl = document.getElementById('dli-val');
  const luxEl = document.getElementById('lux-val');
  const btn = document.getElementById('ppfd-btn');

  if (_ppfdSensor) { stopPPFD(); return; }

  function update(lux) {
    const src = document.getElementById('ppfd-src')?.value || 'led_white';
    const hours = parseFloat(document.getElementById('ppfd-hours')?.value) || 18;
    const factor = LUX_TO_PPFD[src] || 0.0185;
    const ppfd = Math.round(lux * factor);
    const dli = (ppfd * hours * 3600 / 1000000).toFixed(1);
    if (ppfdEl) { ppfdEl.textContent = ppfd; ppfdEl.style.color = ppfd >= 600 && ppfd <= 900 ? 'var(--green)' : ppfd > 900 ? 'var(--red)' : ppfd >= 200 ? 'var(--yellow)' : 'var(--text-muted)'; }
    if (luxEl && !luxEl.isContentEditable) luxEl.textContent = Math.round(lux);
    if (dliEl) { dliEl.textContent = dli; dliEl.style.color = parseFloat(dli) >= 30 && parseFloat(dli) <= 45 ? 'var(--green)' : parseFloat(dli) > 45 ? 'var(--orange)' : 'var(--teal)'; }
  }

  function startSensor() {
    try {
      const sensor = new AmbientLightSensor({ frequency: 2 });
      sensor.addEventListener('reading', () => update(sensor.illuminance));
      sensor.addEventListener('error', e => {
        if (status) status.textContent = '⚠ Sensor-Fehler: ' + (e.error?.message || 'Unbekannt');
        showManual();
      });
      sensor.start();
      _ppfdSensor = sensor;
      if (btn) { btn.textContent = '⏹ Stoppen'; btn.style.borderColor = 'rgba(224,96,96,0.5)'; }
      if (status) status.textContent = '📡 Lichtsensor aktiv — Handy mit Display nach oben unter die Lampe';
    } catch (e) {
      if (status) status.textContent = '⚠ Sensor nicht verfügbar: ' + e.message;
      showManual();
    }
  }

  function showManual() {
    if (luxEl) {
      luxEl.contentEditable = 'true';
      luxEl.style.cssText += ';border:1px solid var(--yellow);border-radius:4px;padding:2px 6px;outline:none;-webkit-user-select:text;user-select:text;min-width:60px';
      luxEl.textContent = '15000';
      luxEl.oninput = () => update(parseFloat(luxEl.textContent) || 0);
      update(15000);
    }
    if (status) status.innerHTML = '✏️ Sensor nicht verfügbar. Lux manuell eingeben oder eine Lux-Meter-App nutzen.';
  }

  // Check for AmbientLightSensor support
  if ('AmbientLightSensor' in window) {
    // Try to get permission first
    if (navigator.permissions && navigator.permissions.query) {
      navigator.permissions.query({ name: 'ambient-light-sensor' })
        .then(result => {
          if (result.state === 'denied') {
            if (status) status.textContent = '🔒 Lichtsensor-Berechtigung verweigert. In Browser-Einstellungen aktivieren.';
            showManual();
          } else {
            startSensor();
          }
        })
        .catch(() => startSensor()); // permission query not supported, just try
    } else {
      startSensor();
    }
  } else {
    if (status) status.textContent = '⚠ AmbientLightSensor wird von diesem Browser nicht unterstützt.';
    showManual();
  }
}

function stopPPFD() {
  if (_ppfdSensor) {
    try { _ppfdSensor.stop(); } catch(e) {}
    _ppfdSensor = null;
  }
  const btn = document.getElementById('ppfd-btn');
  const status = document.getElementById('ppfd-status');
  if (btn) { btn.textContent = '☀️ Messung starten'; btn.style.borderColor = 'rgba(240,208,80,0.3)'; }
  if (status) status.textContent = '';
}

// =====================================================================
//  LONG-PRESS FOR STEPPER BUTTONS
//  Hold down +/- to rapidly increment. After 400ms the click auto-repeats
//  every 100ms, accelerating to 50ms after 1.5s.
// =====================================================================
(function() {
  let heldBtn = null;
  let startTimer = null;
  let repeatTimer = null;
  let startTime = 0;

  function isStepperBtn(el) {
    if (!el || !el.onclick) return false;
    if (el.classList && el.classList.contains('stepper-btn')) return true;
    // Mix-dose stepper buttons have inline style but onclick contains stepMixDose
    const oc = el.getAttribute && el.getAttribute('onclick');
    if (oc && oc.indexOf('stepMixDose(') !== -1) return true;
    return false;
  }

  function fireClick(el) {
    if (!el || !el.onclick) return;
    // Synthesize a minimal event object so stopPropagation calls don't crash
    const fakeEvt = { stopPropagation: () => {}, preventDefault: () => {} };
    try { el.onclick.call(el, fakeEvt); } catch (e) { /* ignore */ }
  }

  function stopHold() {
    if (startTimer) { clearTimeout(startTimer); startTimer = null; }
    if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
    heldBtn = null;
  }

  function startHold(el) {
    stopHold();
    heldBtn = el;
    startTime = Date.now();
    // After 400ms, start repeating
    startTimer = setTimeout(() => {
      if (!heldBtn) return;
      repeatTimer = setInterval(() => {
        if (!heldBtn) { clearInterval(repeatTimer); return; }
        fireClick(heldBtn);
        // Accelerate: after 1.5s of holding, switch to faster interval
        if (Date.now() - startTime > 1900 && repeatTimer) {
          clearInterval(repeatTimer);
          repeatTimer = setInterval(() => {
            if (!heldBtn) { clearInterval(repeatTimer); return; }
            fireClick(heldBtn);
          }, 50);
        }
      }, 100);
    }, 400);
  }

  document.addEventListener('mousedown', e => {
    const el = e.target.closest('button');
    if (isStepperBtn(el)) startHold(el);
  }, true);
  document.addEventListener('touchstart', e => {
    const el = e.target.closest('button');
    if (isStepperBtn(el)) startHold(el);
  }, { passive: true, capture: true });

  ['mouseup', 'mouseleave', 'touchend', 'touchcancel', 'blur'].forEach(ev => {
    document.addEventListener(ev, stopHold, true);
  });
  // Also stop if we scroll — Android often fires touchstart on scroll start
  document.addEventListener('touchmove', () => {
    // Only cancel if we're within the startup period (before repeat kicked in)
    // If repeat is already running, user probably wants to keep going
    if (startTimer && !repeatTimer) stopHold();
  }, { passive: true, capture: true });
})();

// =====================================================================
//  TOUR ENGINE
//  Guided onboarding with overlay + popup + highlight.
//
//  A tour is an array of step objects:
//  {
//    target: '#css-selector'       // element to highlight (optional for intro/outro)
//    tab: 'dash'|'cal'|'tips'|'set' // auto-switch to this tab before step
//    title: '🎯 Schritt-Titel'
//    body: 'Erklärungstext'
//    arrow: 'auto'|'top'|'bottom'|'left'|'right'  // popup arrow direction
//    waitFor: 'click'|null         // null = show "Weiter" button; 'click' = wait for user tap on target
//    skipBack: true                // hide back button (e.g. after screen switch)
//  }
// =====================================================================
const Tour = (function() {
  let active = null;        // current tour definition
  let stepIdx = 0;
  let overlay = null;
  let hole = null;
  let popup = null;
  let resizeObs = null;
  let actionListener = null;
  let actionTarget = null;

  // Find element by selector. If multiple elements match, prefer one inside the currently
  // active screen — this handles duplicated elements like nav buttons that exist per-screen.
  function byId(s) {
    const all = document.querySelectorAll(s);
    if (all.length === 0) return null;
    if (all.length === 1) return all[0];
    // Multiple matches: find one inside .screen.active
    const activeScreen = document.querySelector('.screen.active');
    if (activeScreen) {
      for (const el of all) {
        if (activeScreen.contains(el)) return el;
      }
    }
    // Fallback: first match
    return all[0];
  }

  function buildDom() {
    overlay = document.createElement('div');
    overlay.className = 'tour-overlay';
    document.body.appendChild(overlay);
    hole = document.createElement('div');
    hole.className = 'tour-hole';
    document.body.appendChild(hole);
    popup = document.createElement('div');
    popup.className = 'tour-popup';
    document.body.appendChild(popup);
    // Overlay is pointer-events: none in CSS. Only popup + hole sit on top visually.
    // Clicks reach the underlying app, which is what action-waiter steps need.
  }

  function destroyDom() {
    [overlay, hole, popup].forEach(el => { if (el && el.parentNode) el.parentNode.removeChild(el); });
    overlay = hole = popup = null;
    if (actionListener && actionTarget) {
      actionTarget.removeEventListener('click', actionListener, true);
    }
    actionListener = actionTarget = null;
  }

  function positionHole(target) {
    if (!target || !hole) { if (hole) hole.style.display = 'none'; return; }
    const r = target.getBoundingClientRect();
    hole.style.display = 'block';
    hole.style.left = (r.left - 4) + 'px';
    hole.style.top = (r.top - 4) + 'px';
    hole.style.width = (r.width + 8) + 'px';
    hole.style.height = (r.height + 8) + 'px';
  }

  function positionPopup(target, arrowHint) {
    if (!popup) return;
    // Make sure popup has been rendered so we can measure it
    popup.style.left = '0px';
    popup.style.top = '0px';
    const pr = popup.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const margin = 16;

    if (!target) {
      // Center on screen
      popup.style.left = Math.round((vw - pr.width) / 2) + 'px';
      popup.style.top = Math.round((vh - pr.height) / 2) + 'px';
      const arrow = popup.querySelector('.tour-popup-arrow');
      if (arrow) arrow.style.display = 'none';
      return;
    }
    const tr = target.getBoundingClientRect();
    // Pick arrow direction: if hint given and it fits, use it; else auto
    let dir = arrowHint || 'auto';
    const spaceTop = tr.top;
    const spaceBottom = vh - tr.bottom;
    const spaceLeft = tr.left;
    const spaceRight = vw - tr.right;
    if (dir === 'auto') {
      if (spaceBottom >= pr.height + margin + 16) dir = 'top'; // popup below target, arrow on top
      else if (spaceTop >= pr.height + margin + 16) dir = 'bottom';
      else if (spaceRight >= pr.width + margin + 16) dir = 'left';
      else if (spaceLeft >= pr.width + margin + 16) dir = 'right';
      else dir = 'top'; // fallback
    }
    // Position popup based on direction
    let left, top;
    if (dir === 'top') {
      top = tr.bottom + margin;
      left = tr.left + tr.width / 2 - pr.width / 2;
    } else if (dir === 'bottom') {
      top = tr.top - pr.height - margin;
      left = tr.left + tr.width / 2 - pr.width / 2;
    } else if (dir === 'left') {
      left = tr.right + margin;
      top = tr.top + tr.height / 2 - pr.height / 2;
    } else { // right
      left = tr.left - pr.width - margin;
      top = tr.top + tr.height / 2 - pr.height / 2;
    }
    // Clamp to viewport
    left = Math.max(margin, Math.min(left, vw - pr.width - margin));
    top = Math.max(margin, Math.min(top, vh - pr.height - margin));
    popup.style.left = Math.round(left) + 'px';
    popup.style.top = Math.round(top) + 'px';

    // Update arrow position + visibility
    const arrow = popup.querySelector('.tour-popup-arrow');
    if (arrow) {
      arrow.className = 'tour-popup-arrow ' + dir;
      arrow.style.display = 'block';
    }
  }

  function renderStep() {
    if (!active || !popup) return;
    const step = active.steps[stepIdx];
    if (!step) return;

    // Tab switch if requested
    if (step.tab && typeof tab !== 'undefined' && tab !== step.tab) {
      goTo(step.tab);
    }

    // Scroll target into view if it exists
    setTimeout(() => {
      if (!active) return; // Tour ended during scroll wait
      const target = step.target ? byId(step.target) : null;
      if (target) {
        const r = target.getBoundingClientRect();
        if (r.top < 60 || r.bottom > window.innerHeight - 60) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
      // After scroll settles, render
      setTimeout(() => {
        if (!active) return; // Tour ended during render wait
        doRender(step);
      }, 300);
    }, step.tab ? 200 : 0);
  }

  function doRender(step) {
    if (!active || !popup) return;
    const target = step.target ? byId(step.target) : null;
    positionHole(target);

    // Build popup content
    const dots = active.steps.map((_, i) => {
      const cls = i === stepIdx ? 'active' : (i < stepIdx ? 'done' : '');
      return `<div class="tour-dot ${cls}"></div>`;
    }).join('');

    const isFirst = stepIdx === 0;
    const isLast = stepIdx === active.steps.length - 1;
    const waiting = step.waitFor === 'click' || step.waitFor === 'input' || step.waitFor === 'change';
    const isInputMode = step.waitFor === 'input';

    // For input-mode steps, seed the preview with the current field value
    let initialPreview = '';
    if (isInputMode && step.target) {
      const tgt = byId(step.target);
      const v = (tgt && tgt.value || '').trim();
      initialPreview = v ? '📝 ' + v.replace(/</g, '&lt;') : '📝 <span style="color:var(--text-hint)">(noch leer, tipp ins Feld)</span>';
    }

    popup.innerHTML = `
      <div class="tour-popup-arrow"></div>
      <div class="tour-dots">${dots}</div>
      <div class="tour-popup-title">${step.title || ''}</div>
      <div class="tour-popup-body">${step.body || ''}</div>
      ${isInputMode ? `<div class="tour-input-preview" style="margin:-4px 0 10px;padding:8px 10px;background:var(--surface);border-radius:8px;font-size:12px;color:var(--text-muted);word-break:break-word;min-height:16px">${initialPreview}</div>` : ''}
      <div class="tour-popup-btns">
        ${!isFirst && !step.skipBack ? '<button class="tour-popup-btn secondary" data-act="back">← Zurück</button>' : ''}
        ${waiting
          ? '<button class="tour-popup-btn primary" data-act="skip-wait">Weiter →</button>'
          : `<button class="tour-popup-btn primary" data-act="next">${isLast ? 'Fertig ✓' : 'Weiter →'}</button>`}
        ${!isLast ? '<button class="tour-popup-btn skip" data-act="end">Tour beenden</button>' : ''}
      </div>
    `;

    // Wire up buttons
    popup.querySelectorAll('[data-act]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const a = btn.getAttribute('data-act');
        if (a === 'next' || a === 'skip-wait') nextStep();
        else if (a === 'back') prevStep();
        else if (a === 'end') end();
      };
    });

    // Position popup AFTER it's in DOM and has dimensions
    requestAnimationFrame(() => positionPopup(target, step.arrow));

    // Wire up action waiter.
    // Supported modes:
    //   waitFor: 'click'  — wait for a click/tap on target (default for backward compat)
    //   waitFor: 'input'  — wait for text input; optional step.waitValue(val) predicate
    //                       Debounced: advances only after user stops typing for ~1.2s
    //   waitFor: 'change' — wait for select/radio/checkbox change; optional step.waitValue(val)
    // If step.waitValue is provided, it's called with the current field value; only advance on true.
    cleanupActionListener();
    if (waiting && target) {
      actionTarget = target;
      const mode = step.waitFor; // 'click' | 'input' | 'change'
      const eventName = (mode === 'input') ? 'input'
                      : (mode === 'change') ? 'change'
                      : 'click';
      const predicate = step.waitValue || (() => true);
      let fired = false;
      let debounceTimer = null;
      let enterHandler = null;
      // Helper: advance immediately, cleaning up + closing keyboard
      const advance = () => {
        fired = true;
        if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
        // Blur the input so the mobile keyboard closes
        if (actionTarget && typeof actionTarget.blur === 'function') {
          try { actionTarget.blur(); } catch (_) {}
        }
        cleanupActionListener();
        const delay = step.advanceDelay || 300;
        setTimeout(() => { if (active) nextStep(); }, delay);
      };
      actionListener = (e) => {
        if (fired) return;
        const val = (mode === 'click') ? null : (e.target && e.target.value);
        // For 'input' mode: live-update the popup preview, but NEVER auto-advance.
        // User must press Enter or tap "Weiter →" button to confirm.
        if (mode === 'input') {
          const preview = popup && popup.querySelector('.tour-input-preview');
          if (preview) {
            const shown = (val || '').trim() || '<span style="color:var(--text-hint)">(noch leer)</span>';
            preview.innerHTML = '📝 ' + shown.replace(/</g, '&lt;');
            // Highlight whether predicate is met, so user knows Enter will work
            const ok = predicate(val);
            preview.style.color = ok ? 'var(--green)' : 'var(--text-muted)';
          }
          return; // never auto-advance on input
        }
        // For click/change: advance immediately after optional predicate check
        if (mode !== 'click' && !predicate(val)) return;
        advance();
      };
      target.addEventListener(eventName, actionListener, true);
      actionTarget._tourEventName = eventName;
      // For 'input' mode: Enter key is the primary confirmation
      if (mode === 'input') {
        enterHandler = (e) => {
          if (fired) return;
          if (e.key !== 'Enter' && e.keyCode !== 13) return;
          const latestVal = actionTarget && actionTarget.value;
          if (!predicate(latestVal)) return; // condition not met — ignore Enter
          e.preventDefault();
          advance();
        };
        target.addEventListener('keydown', enterHandler, true);
        actionTarget._tourEnterHandler = enterHandler;
      }
    }
  }

  function cleanupActionListener() {
    if (actionListener && actionTarget) {
      const eventName = actionTarget._tourEventName || 'click';
      actionTarget.removeEventListener(eventName, actionListener, true);
      delete actionTarget._tourEventName;
    }
    if (actionTarget && actionTarget._tourEnterHandler) {
      actionTarget.removeEventListener('keydown', actionTarget._tourEnterHandler, true);
      delete actionTarget._tourEnterHandler;
    }
    actionListener = actionTarget = null;
  }

  function nextStep() {
    cleanupActionListener();
    if (!active) return;
    if (stepIdx >= active.steps.length - 1) { end(); return; }
    stepIdx++;
    renderStep();
  }

  function prevStep() {
    cleanupActionListener();
    if (!active || stepIdx === 0) return;
    stepIdx--;
    renderStep();
  }

  function start(tourDef) {
    if (active) end(); // end any previous tour
    active = tourDef;
    stepIdx = 0;
    if (!overlay) buildDom();
    overlay.classList.add('visible');
    renderStep();
    // Reposition (lightweight, no full re-render) on resize/scroll/focus events.
    // Keyboard opening often triggers resize on Android; focus fires just before.
    const reposition = () => {
      if (!active) return;
      const step = active.steps[stepIdx];
      if (!step) return;
      const target = step.target ? byId(step.target) : null;
      positionHole(target);
      requestAnimationFrame(() => positionPopup(target, step.arrow));
    };
    window.addEventListener('resize', reposition);
    window.addEventListener('scroll', reposition, true);
    Tour._reposition = reposition;
  }

  function end() {
    cleanupActionListener();
    active = null;
    stepIdx = 0;
    if (overlay) overlay.classList.remove('visible');
    if (Tour._reposition) {
      window.removeEventListener('resize', Tour._reposition);
      window.removeEventListener('scroll', Tour._reposition, true);
      Tour._reposition = null;
    }
    // Blur any focused input so the mobile keyboard closes
    if (document.activeElement && typeof document.activeElement.blur === 'function') {
      try { document.activeElement.blur(); } catch (_) {}
    }
    // Fade out then destroy
    setTimeout(() => destroyDom(), 300);
    // Mark completed in state
    if (typeof S !== 'undefined' && typeof saveS === 'function') {
      S._tourCompleted = true;
      saveS();
    }
  }

  return { start, end, nextStep, prevStep,
    // test/debug accessors
    _state: () => ({ active: !!active, stepIdx, stepCount: active ? active.steps.length : 0 }),
  };
})();

/** Reset state + start interactive tour (for manual button in how-to). */
function startInteractiveTutorial() {
  // Go to dashboard first so tour starts from a known state
  goTo('dash');
  setTimeout(() => startInteractiveTour(), 300);
}

/** Reset + start tour (for the manual "Tour starten" button in how-to). */
function restartOnboardingTour() {
  if (typeof S !== 'undefined') {
    S._tourCompleted = false;
    saveS();
  }
  // Go to dashboard first so tour starts from a known state
  goTo('dash');
  setTimeout(() => startOnboardingTour(), 300);
}

// Auto-start: if no active cycles AND tour hasn't been completed, run onboarding on app load
setTimeout(() => {
  if (typeof S !== 'undefined' && !S._tourCompleted && (!S.cycles || S.cycles.filter(c => c.active).length === 0)) {
    // Delay a bit so the initial dashboard render is settled
    setTimeout(() => startOnboardingTour(), 800);
  }
}, 100);
