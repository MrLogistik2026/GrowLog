<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrowSmart"/>
<link rel="manifest" href="manifest.json"/>
<title>GrowSmart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#131313;--card:#1a1a1a;--card2:#1f1f1f;--border:#262626;--green:#4caf70;--green-dk:#1a3a24;--green-bg:#0d1e0d;--green-hint:#3a6e4a;--blue:#5aabf0;--blue-bg:#0a1520;--teal:#5adada;--teal-bg:#0e1a1a;--teal-bd:#1e3535;--red:#e06060;--orange:#e8884a;--orange-bg:#1e0e04;--purple:#b06ac8;--yellow:#f0d050;--text:#e8e8e8;--text-sub:#aaa;--text-muted:#666;--text-hint:#505050;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
#app{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:14px;}.scroll::-webkit-scrollbar{display:none;}
.topbar{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tb-title{font-size:14px;font-weight:500;}.app-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.icon-btn{background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px;}
.save-pill{background:var(--green);border:none;border-radius:20px;padding:6px 16px;font-size:12px;color:#fff;cursor:pointer;font-family:var(--font);font-weight:600;}
.bottom-nav{background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;cursor:pointer;background:none;border:none;opacity:0.4;transition:opacity 0.2s;}.nav-btn.active{opacity:1;}
.nav-icon{font-size:20px;line-height:1;}.nav-label{font-size:10px;color:var(--green);font-weight:600;font-family:var(--font);}
.card{background:var(--card);border-radius:14px;border:0.5px solid var(--border);padding:14px;}
.sect-head{font-size:11px;color:var(--green);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 0 2px;}
.stat-row{display:flex;gap:8px;}.stat-box{flex:1;background:var(--surface);border-radius:10px;padding:10px 12px;border:0.5px solid var(--border);}
.stat-lbl{font-size:10px;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:2px;}.stat-val{font-size:18px;font-weight:600;}.stat-unit{font-size:11px;color:var(--text-hint);}
.inp-wrap{display:flex;flex-direction:column;gap:3px;flex:1;}.inp-label{font-size:11px;color:var(--text-hint);font-weight:500;}
.inp-field{background:var(--card);border:0.5px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--text-sub);font-size:13px;font-family:var(--font);width:100%;outline:none;transition:border-color 0.2s;}.inp-field:focus{border-color:var(--green-hint);}
.row2{display:flex;gap:8px;}
.vpd-box{background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.vpd-val{font-size:22px;font-weight:600;color:var(--teal);font-family:var(--mono);}
.vpd-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;margin-top:3px;}
.vpd-scale{display:flex;height:5px;border-radius:3px;overflow:hidden;}.vpd-seg{flex:1;}
.vpd-mrow{position:relative;height:8px;}.vpd-marker{position:absolute;top:0;width:2px;height:9px;background:#fff;border-radius:2px;transition:left 0.3s;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:0.78;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;border:0.5px solid transparent;background:#151515;user-select:none;padding:2px;transition:transform 0.1s;}.cal-cell:active{transform:scale(0.92);}
.cal-cell.today{border:2px solid #fff!important;}.cal-num{font-size:14px;color:var(--text-sub);font-weight:700;line-height:1;}.cal-cell.today .cal-num{color:#fff;}
.cal-tag{font-size:7.5px;color:rgba(255,255,255,0.6);line-height:1;margin-top:1px;text-align:center;}.cal-icon{font-size:13px;line-height:1;margin-bottom:1px;}
.cal-dot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:2px;right:3px;background:rgba(255,255,255,0.7);}
.nut-tbl-hdr{border-radius:10px 10px 0 0;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.nut-tbl-wrap{border:0.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.nut-tbl-head{display:grid;grid-template-columns:1fr 58px 60px;padding:5px 10px;border-bottom:0.5px solid var(--border);}
.nth{font-size:11px;font-weight:500;}.nth:not(:first-child){text-align:right;}
.nut-row-tbl{display:grid;grid-template-columns:1fr 58px 60px;padding:5px 10px;border-bottom:0.5px solid #1e1e1e;align-items:center;}.nut-row-tbl:last-child{border:none;}
.nut-row-tbl:nth-child(odd){background:#171717;}.nut-row-tbl:nth-child(even){background:var(--surface);}
.nt-name{font-size:12px;color:#bbb;}.nt-hint{font-size:12px;text-align:right;font-family:var(--mono);}
.nt-inp{background:#1e1e1e;border:0.5px solid var(--border);border-radius:5px;padding:3px 6px;color:#ddd;font-size:12px;font-family:var(--mono);width:56px;text-align:right;outline:none;}.nt-inp:focus{border-color:var(--green-hint);}
.note-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;}
.note-ta{background:var(--card);border:0.5px solid var(--border);border-radius:7px;padding:8px 10px;color:#aaa;font-size:12px;font-family:var(--font);width:100%;min-height:65px;resize:none;outline:none;line-height:1.6;}.note-ta:focus{border-color:var(--green-hint);}
.big-save{border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:600;color:#fff;width:100%;cursor:pointer;font-family:var(--font);}.big-save:active{opacity:0.8;}
.alert{border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;border:0.5px solid transparent;}
.tab-row{display:flex;gap:6px;flex-wrap:wrap;}
.tab-item{display:flex;align-items:center;gap:6px;background:var(--surface);border-radius:8px;padding:6px 12px;border:0.5px solid var(--border);cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--font);}.tab-item.sel{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.dur-grid{display:flex;flex-wrap:wrap;gap:8px;}.dur-box{display:flex;flex-direction:column;gap:3px;width:calc(33% - 6px);}
.dur-lbl{font-size:11px;color:var(--text-hint);}
.dur-inp{background:var(--card2);border:0.5px solid var(--border);border-radius:7px;padding:6px;color:var(--text-sub);font-size:13px;text-align:center;width:100%;outline:none;font-family:var(--mono);}
.sub-head{font-size:11px;color:var(--text-hint);font-weight:500;margin-top:8px;margin-bottom:4px;}
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.sw{position:relative;width:44px;height:26px;cursor:pointer;}.sw input{opacity:0;width:0;height:0;}
.sl{position:absolute;inset:0;background:#333;border-radius:26px;transition:0.2s;}.sl:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#888;border-radius:50%;transition:0.2s;}
input:checked+.sl{background:var(--green-dk);}input:checked+.sl:before{transform:translateX(18px);background:var(--green);}
.del-btn{display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;background:none;border:none;font-size:13px;color:var(--red);font-family:var(--font);}
.sec-tog{background:var(--card);border-radius:12px;border:0.5px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text);}.sec-tog:active{background:var(--card2);}.sec-tog>div{flex:1;}
.add-btn{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--font);font-weight:600;}
.sav-btn{border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:600;color:#fff;width:100%;cursor:pointer;font-family:var(--font);margin-top:6px;}.sav-btn:active{opacity:0.8;}
.pick-row{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0;}
.col-opt{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s;}.col-opt.sel{border-color:#fff;transform:scale(1.2);}
.sym-opt{width:36px;height:36px;border-radius:10px;background:var(--card2);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.15s;}.sym-opt.sel{border-color:#fff;transform:scale(1.15);}
.prod-card{background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.prod-color{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(26,26,26,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#ddd;padding:10px 22px;border-radius:22px;font-size:13px;z-index:9999;border:0.5px solid #444;pointer-events:none;opacity:0;transition:all 0.25s;white-space:nowrap;}#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#ctx-m{position:fixed;z-index:9998;background:rgba(28,28,28,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:0.5px solid #3a3a3a;border-radius:16px;padding:6px;min-width:270px;box-shadow:0 12px 48px rgba(0,0,0,0.7);display:none;animation:ctxIn 0.18s ease;}#ctx-m.show{display:block;}
@keyframes ctxIn{from{opacity:0;transform:scale(0.94);}to{opacity:1;transform:scale(1);}}
.ctx-item{padding:12px 16px;border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:10px;}.ctx-item:active{background:rgba(255,255,255,0.06);}
.ctx-g{color:var(--green);}.ctx-r{color:var(--red);}.ctx-b{color:var(--blue);}.ctx-div{height:0.5px;background:#333;margin:4px 0;}
.ctx-ic{font-size:15px;width:22px;text-align:center;}
#ctx-ov{position:fixed;inset:0;z-index:9997;display:none;}#ctx-ov.show{display:block;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:sp 0.7s linear infinite;}@keyframes sp{to{transform:rotate(360deg);}}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 20px;text-align:center;}
.tip-card{background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
.streak{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#2a1500,#1a0a00);border:0.5px solid rgba(232,136,74,0.35);border-radius:16px;padding:3px 8px;font-size:10px;color:var(--orange);font-weight:600;}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}.ring-wrap svg{transform:rotate(-90deg);}.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.mini-chart{display:flex;align-items:flex-end;gap:1px;height:24px;}.mini-bar{flex:1;min-width:2px;border-radius:1px 1px 0 0;transition:height 0.3s;}
.photo-grid{display:flex;gap:6px;flex-wrap:wrap;}.photo-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;border:0.5px solid var(--border);cursor:pointer;}
.photo-add{width:52px;height:52px;border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-hint);cursor:pointer;}.photo-add:active{border-color:var(--green);}
.qn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}.qn-chip{background:var(--card2);border:0.5px solid var(--border);border-radius:16px;padding:5px 10px;font-size:11px;color:var(--text-sub);cursor:pointer;font-family:var(--font);white-space:nowrap;}.qn-chip:active{background:var(--green-bg);border-color:var(--green-dk);color:var(--green);}
.mix-step{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:var(--text-sub);}.mix-num{width:20px;height:20px;border-radius:50%;background:var(--green-dk);color:var(--green);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="scr-dash"><div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))"><span class="app-title">🌱 GrowSmart</span><button class="icon-btn" onclick="openEntry(todayISO())">＋</button></div><div class="scroll" id="dash-body"></div><nav class="bottom-nav" id="nav-dash"></nav></div>
  <div class="screen" id="scr-cal"><div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))"><button onclick="changeMonth(-1)" style="background:none;border:none;color:var(--green);font-size:28px;cursor:pointer;padding:0 10px;line-height:1">‹</button><span style="font-size:16px;font-weight:600" id="cal-lbl">–</span><button onclick="changeMonth(1)" style="background:none;border:none;color:var(--green);font-size:28px;cursor:pointer;padding:0 10px;line-height:1">›</button></div><div class="scroll" id="cal-body" style="padding:8px;gap:6px;"></div><nav class="bottom-nav" id="nav-cal"></nav></div>
  <div class="screen" id="scr-tips"><div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))"><span class="app-title">💡 Grow-Tipps</span></div><div class="scroll" id="tips-body"></div><nav class="bottom-nav" id="nav-tips"></nav></div>
  <div class="screen" id="scr-set"><div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))"><span class="app-title">⚙ Einstellungen</span></div><div class="scroll" id="set-body"></div><nav class="bottom-nav" id="nav-set"></nav></div>
  <div class="screen" id="scr-entry"><div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))"><button class="icon-btn" id="entry-back" style="font-size:20px">←</button><span class="tb-title" id="entry-ttl">Eintrag</span><button class="save-pill" onclick="saveEntry()">Speichern</button></div><div class="scroll" id="entry-body"></div></div>
  <div class="screen" id="scr-duenger"><div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))"><button class="icon-btn" onclick="goTo('set')" style="font-size:20px">←</button><span class="app-title">🧪 Dünger</span><button class="icon-btn" onclick="addProduct()">＋</button></div><div class="scroll" id="duenger-body"></div></div>
  <div id="photo-viewer" style="position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;cursor:pointer" onclick="this.style.display='none'"><img id="pv-img" style="max-width:94%;max-height:88%;border-radius:12px;object-fit:contain"/></div>
</div>
<div id="ctx-ov" onclick="closeCtx()"></div><div id="ctx-m"></div><div id="toast"></div>
<script>
// ===================== CONSTANTS =====================
const COLORS=[{id:'g1',hex:'#4caf70',dk:'#071a0c'},{id:'g2',hex:'#5aabf0',dk:'#071422'},{id:'g3',hex:'#e8884a',dk:'#1e0e04'},{id:'g4',hex:'#b06ac8',dk:'#150820'},{id:'g5',hex:'#f0d050',dk:'#1e1a04'},{id:'g6',hex:'#e06060',dk:'#1e0606'},{id:'g7',hex:'#5adada',dk:'#041616'},{id:'g8',hex:'#a0c840',dk:'#101a04'}];
const SYMS=['🌱','🪴','🌿','☘️','🍃','🌻','💧','🔬','💎','🍀'];
const PROD_COLORS=['#4caf70','#5aabf0','#e8884a','#b06ac8','#f0d050','#e06060','#5adada','#a0c840','#e0a0f0','#f0c080'];
const PN={anzucht:'Anzucht',bloom:'Blüte',flush:'Spülen',ice:'IceFlush',harvest:'Ernte',dry:'Trocknen'};
const RI={anzucht:4,bloom:3,flush:3,ice:2,ernte:1,dry:1};
const ACT_ICON={giess:'💧',giess_anz:'🌱',spuelen:'🚿',ice:'🧊',ernte:'✂️',trocknen:'🍂'};
const PH_ICON={anzucht:'🌱',bloom:'🌸',flush:'🚿',ice:'🧊',harvest:'✂️',dry:'🍂'};
const START_ICON='🌰';

// ===================== DÜNGER PRESETS mit Mischreihenfolge =====================
const FERT_PRESETS={
  biobizz:{name:'BioBizz (Light-Mix)',
    mixOrder:['Root·Juice','CalMag','Bio·Grow','Bio·Bloom','Top·Max'],
    mixInfo:'Immer einzeln einrühren. Root·Juice und CalMag zuerst, dann Basisdünger, zuletzt Booster. pH am Ende prüfen (6.2–6.5).',
    products:[
      {name:'Root·Juice',unit:'ml/L',color:'#5aabf0',note:'Wurzelstimulator'},
      {name:'Bio·Grow',unit:'ml/L',color:'#4caf70',note:'Wachstumsdünger (organisch)'},
      {name:'Bio·Bloom',unit:'ml/L',color:'#e8884a',note:'Blütedünger (organisch)'},
      {name:'Top·Max',unit:'ml/L',color:'#b06ac8',note:'Blütestimulator'},
      {name:'CalMag',unit:'ml/L',color:'#f0d050',note:'Calcium & Magnesium'},
    ],schedule:{
      1:{},2:{'Bio·Grow':2,'Root·Juice':4},3:{'Bio·Grow':3,'Bio·Bloom':1,'Root·Juice':4,'CalMag':1},
      4:{'Bio·Grow':3,'Bio·Bloom':2,'Top·Max':1,'CalMag':1},5:{'Bio·Grow':2,'Bio·Bloom':3,'Top·Max':1,'CalMag':1},
      6:{'Bio·Bloom':3,'Top·Max':2,'CalMag':1},7:{'Bio·Bloom':4,'Top·Max':3,'CalMag':1},
      8:{'Bio·Bloom':4,'Top·Max':4,'CalMag':1},9:{'Bio·Bloom':4,'Top·Max':4},10:{},
  }},
  plagron:{name:'Plagron Terra',
    mixOrder:['Power Roots','Pure Zym','Terra Grow','Terra Bloom','Green Sensation'],
    mixInfo:'Mineralische Dünger direkt löslich. Einzeln einrühren, nach jedem Produkt kurz umrühren. pH 5.5–6.5.',
    products:[
      {name:'Terra Grow',unit:'ml/L',color:'#4caf70',note:'Wachstumsdünger (mineralisch)'},
      {name:'Terra Bloom',unit:'ml/L',color:'#e8884a',note:'Blütedünger (mineralisch)'},
      {name:'Power Roots',unit:'ml/L',color:'#5aabf0',note:'Wurzelstimulator'},
      {name:'Green Sensation',unit:'ml/L',color:'#a0c840',note:'Blüte-Booster (letzte 4-6 Wo)'},
      {name:'Pure Zym',unit:'ml/L',color:'#f0d050',note:'Enzympräparat'},
    ],schedule:{
      1:{'Terra Grow':2.5,'Power Roots':1,'Pure Zym':1},2:{'Terra Grow':5,'Power Roots':1,'Pure Zym':1},
      3:{'Terra Bloom':5,'Power Roots':1,'Pure Zym':1},4:{'Terra Bloom':5,'Pure Zym':1},
      5:{'Terra Bloom':5,'Pure Zym':1},6:{'Terra Bloom':4,'Pure Zym':1,'Green Sensation':1},
      7:{'Terra Bloom':4.5,'Green Sensation':1},8:{'Terra Bloom':5,'Green Sensation':1},
      9:{'Terra Bloom':5,'Green Sensation':1},10:{},
  }},
  canna:{name:'CANNA Terra',
    mixOrder:['RHIZOTONIC','CANNAZYM','CANNA Terra Vega','CANNA Terra Flores','PK 13/14'],
    mixInfo:'Additive zuerst (RHIZOTONIC, CANNAZYM), dann Basisdünger. PK 13/14 nur Wo 4-6 der Blüte. pH 5.5–6.5.',
    products:[
      {name:'CANNA Terra Vega',unit:'ml/L',color:'#4caf70',note:'Wachstumsdünger'},
      {name:'CANNA Terra Flores',unit:'ml/L',color:'#e8884a',note:'Blütedünger'},
      {name:'CANNAZYM',unit:'ml/L',color:'#5adada',note:'Enzympräparat'},
      {name:'RHIZOTONIC',unit:'ml/L',color:'#5aabf0',note:'Wurzelstimulator'},
      {name:'PK 13/14',unit:'ml/L',color:'#b06ac8',note:'PK-Booster (Blüte Wo 4-6)'},
    ],schedule:{

function todayISO(){return new Date().toISOString().split('T')[0];}
function iso12(iso){return new Date(iso+'T12:00:00');}
function isoPlus(iso,d){const o=iso12(iso);o.setDate(o.getDate()+d);return o.toISOString().split('T')[0];}
function isoDiff(a,b){return Math.round((iso12(a)-iso12(b))/86400000);}
function fmtDE(iso,o){return iso12(iso).toLocaleDateString('de-DE',o||{day:'2-digit',month:'2-digit'});}

// ===================== GROW LOGIC =====================
function phase(iso,c){
  if(!c.startDate)return null;const diff=isoDiff(iso,c.startDate);if(diff<0)return null;
  const a=c.anzuchtDays||17,b=a+(c.bloomDays||66),f=b+(c.flushDays||9),ic=f+(c.iceDays||6),h=ic+(c.harvestDays||1),dr=h+(c.dryDays||7);
  if(diff<a)return{ph:'anzucht',day:diff+1,week:Math.floor(diff/7)+1,total:dr,pct:Math.round(diff/dr*100)};
  if(diff<b)return{ph:'bloom',day:diff+1,week:Math.floor((diff-a)/7)+1,total:dr,pct:Math.round(diff/dr*100)};
  if(diff<f)return{ph:'flush',day:diff+1,week:null,total:dr,pct:Math.round(diff/dr*100)};
  if(diff<ic)return{ph:'ice',day:diff+1,week:null,total:dr,pct:Math.round(diff/dr*100)};
  if(diff<h)return{ph:'harvest',day:diff+1,week:null,total:dr,pct:Math.round(diff/dr*100)};
  if(diff<=dr)return{ph:'dry',day:diff+1,week:null,total:dr,pct:Math.round(diff/dr*100)};
  return null;
}
function getInt(c,ph){if(ph==='anzucht')return c.intAnzucht||RI.anzucht;if(ph==='flush')return c.intFlush||RI.flush;if(ph==='ice')return c.intIce||RI.ice;if(ph==='harvest')return c.intErnte||RI.ernte;if(ph==='dry')return c.intDry||RI.dry;return c.intBloom||RI.bloom;}

// NEUES VERSCHIEBE-SYSTEM: "Geplanter Tag" Berechnung
// Berechnet den GEPLANTEN nächsten Gießtag ab einem Referenzpunkt.
// skipDays enthält Verschiebungen: {cycleId: {altesISO: neuesISO}}
// Wenn ein geplanter Tag verschoben wurde, wird er am alten Datum ignoriert
// und stattdessen am neuen Datum angezeigt. Ab dem neuen Datum zählt der Intervall weiter.
function getBaseAction(iso,c){
  const p=phase(iso,c);if(!p)return null;
  const diff=isoDiff(iso,c.startDate);
  const phStart={
    anzucht:0, bloom:c.anzuchtDays||17,
    flush:(c.anzuchtDays||17)+(c.bloomDays||66),
    ice:(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9),
    harvest:(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9)+(c.iceDays||6),
    dry:(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9)+(c.iceDays||6)+(c.harvestDays||1),
  };
  const dayInPhase=diff-phStart[p.ph];
  const iv=getInt(c,p.ph);
  if(dayInPhase%iv===0){
    if(p.ph==='anzucht')return'giess_anz';if(p.ph==='bloom')return'giess';
    if(p.ph==='flush')return'spuelen';if(p.ph==='ice')return'ice';
    if(p.ph==='harvest')return'ernte';if(p.ph==='dry')return'trocknen';
  }
  return null;
}

function getAction(iso,c){
  const skips=S.skipDays[c.id]||{};
  // 1. Check: Wurde ein ANDERER Tag hierher verschoben? → zeige dessen Action
  for(const[fromKey,toISO] of Object.entries(skips)){
    if(toISO===iso){
      // Extra-Gießtag? Bestimme Action aus der Phase des Ziel-Datums
      if(fromKey.startsWith('_extra_')){
        const p=phase(iso,c);
        if(!p)return null;
        if(p.ph==='anzucht')return'giess_anz';if(p.ph==='bloom')return'giess';
        if(p.ph==='flush')return'spuelen';if(p.ph==='ice')return'ice';
        return'giess';
      }
      // Normal verschoben: Action-Typ aus dem Quell-Datum berechnen
      const ba=getBaseAction(fromKey,c);
      return ba;
    }
  }
  // 2. Check: Wurde DIESER Tag woanders hin verschoben? → kein Action hier
  if(skips[iso])return null;
  // 3. Normaler geplanter Tag
  return getBaseAction(iso,c);
}

function isGiessTag(iso,c){return['giess','giess_anz','spuelen','ice'].includes(getAction(iso,c)||'');}
function getWeekDoses(cId,w){return S.weekSchedule[cId+'_w'+w]||S.weekSchedule['global_w'+w]||{};}
function nextGiessTag(c,from){if(!c.active||!c.startDate)return null;for(let i=1;i<=60;i++){const iso=isoPlus(from,i);if(isGiessTag(iso,c))return{iso,days:i};}return null;}
function daysToHarvest(c){if(!c.startDate)return null;const hd=(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9)+(c.iceDays||6);const diff=Math.ceil((iso12(c.startDate).getTime()+hd*86400000-Date.now())/86400000);return diff>0?diff:0;}
function active(){return S.cycles.filter(c=>c.active&&c.startDate);}
function calcStreak(c){const today=todayISO();let s=0;for(let i=0;i<90;i++){const iso=isoPlus(today,-i);if(isGiessTag(iso,c)){if(S.entries[iso]?.cycleData?.[c.id]?.water)s++;else break;}}return s;}
function waterStats(c){const today=todayISO(),v=[];for(let i=13;i>=0;i--)v.push(parseFloat(S.entries[isoPlus(today,-i)]?.cycleData?.[c.id]?.water)||0);return v;}

// SHIFT: Maps a planned action day to a different date
function shiftDay(cId,fromKey,days){
  if(!S.skipDays[cId])S.skipDays[cId]={};
  const toISO=isoPlus(fromKey.startsWith('_extra_')?fromKey.split('_').pop():fromKey,days);
  S.skipDays[cId][fromKey]=toISO;
  // Move logged data from the old display date to the new one
  const oldDisplay=fromKey.startsWith('_extra_')?null:fromKey;
  if(oldDisplay&&S.entries[oldDisplay]?.cycleData?.[cId]){
    const data=JSON.parse(JSON.stringify(S.entries[oldDisplay].cycleData[cId]));
    delete S.entries[oldDisplay].cycleData[cId];
    if(!S.entries[toISO])S.entries[toISO]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[toISO].cycleData)S.entries[toISO].cycleData={};
    S.entries[toISO].cycleData[cId]=data;
  }
  saveS();
}

// Gießmenge berechnen basierend auf Topfgröße
function waterSuggestion(c,p){
  const pot=S.potSize||11;
  // Faustregel: 10-20% des Topfvolumens pro Guss, in Blüte mehr
  const factor=p?.ph==='bloom'?0.2:(p?.ph==='flush'||p?.ph==='ice')?0.25:0.15;
  return Math.round(pot*factor*1000/50)*50; // auf 50ml runden
}

function getAlerts(c){const today=todayISO(),p=phase(today,c);if(!p||!c.active)return[];const out=[];const lastW=Object.keys(S.entries).filter(d=>d<=today&&S.entries[d]?.cycleData?.[c.id]?.water).sort().pop();if(lastW){const days=isoDiff(today,lastW);const iv=getInt(c,p.ph);if(days>iv+1)out.push({icon:'⚠️',text:`Gießen überfällig! Letztes: vor ${days}d (Intervall: ${iv}d)`,type:'warn'});}if(p.ph==='bloom'){const rem=(c.bloomDays||66)-(p.day-(c.anzuchtDays||17));if(rem>0&&rem<=7)out.push({icon:'🚿',text:`Spülung in ${rem} Tagen`,type:'info'});if(p.week>=7)out.push({icon:'🔬',text:`Woche ${p.week} – Trichome checken!`,type:'tip'});}if(p.ph==='ice'||p.ph==='harvest')out.push({icon:'✂️',text:'Ernte naht!',type:'success'});return out;}

function calcVPD(t,rh){if(isNaN(t)||isNaN(rh))return null;return Math.round(0.6108*Math.exp(17.27*t/(t+237.3))*(1-rh/100)*100)/100;}
function vpdZone(v){if(v===null)return null;if(v<0.4)return{label:'Zu feucht',color:'#7a7af0',bg:'#1e1e3a',hint:'Lüfter an!',pct:v/0.4*15};if(v<0.8)return{label:'Anzucht ✓',color:'#5aabf0',bg:'#0d1e2e',hint:'Ideal für Sämlinge.',pct:15+(v-0.4)/0.4*35};if(v<1.2)return{label:'Blüte ✓',color:'#4caf70',bg:'#0d1e0d',hint:'Optimal für Blüte!',pct:50+(v-0.8)/0.4*25};if(v<1.6)return{label:'Etwas hoch',color:'#c8a04a',bg:'#2a1e0d',hint:'RLF erhöhen.',pct:75+(v-1.2)/0.4*15};return{label:'Stress!',color:'#e06060',bg:'#2a0d0d',hint:'Sofort RLF anpassen!',pct:Math.min(97,90+(v-1.6)*10)};}

let lpT=null;
function lpS(iso,e){lpT=setTimeout(()=>{lpT=null;if(navigator.vibrate)navigator.vibrate(30);showCtx(iso,e);},450);}
function lpE(){if(lpT){clearTimeout(lpT);lpT=null;}}
function showCtx(iso,e){
  const act=active(),df=fmtDE(iso),today=todayISO();let items=[];
  const isFuture=iso>=today;
  act.forEach(c=>{const p=phase(iso,c);if(!p)return;const s=sym(c),a=getAction(iso,c);
    if(a&&isFuture){
      // Aktionstag in der Zukunft → verschieben möglich
      items.push(`<div class="ctx-item ctx-g" onclick="doShift('${c.id}','${iso}',1)"><span class="ctx-ic">→</span>${s} ${ACT_ICON[a]||''} Morgen statt heute</div>`);
      items.push(`<div class="ctx-item ctx-b" onclick="doShift('${c.id}','${iso}',-1)"><span class="ctx-ic">←</span>${s} ${ACT_ICON[a]||''} Gestern schon</div>`);
    } else if(!a&&isFuture){
      // Kein Aktionstag aber Zukunft → extra Gießtag einfügen
      items.push(`<div class="ctx-item ctx-g" onclick="addExtraDay('${c.id}','${iso}')"><span class="ctx-ic">+</span>${s} Extra Gießtag hier</div>`);
    }
    // Ggf. verschobene Tage rückgängig machen
    const skips=S.skipDays[c.id]||{};
    const undoKey=Object.keys(skips).find(k=>skips[k]===iso);
    if(undoKey){
      items.push(`<div class="ctx-item" style="color:var(--orange)" onclick="undoShift('${c.id}','${undoKey}')"><span class="ctx-ic">↺</span>${s} Verschiebung rückgängig</div>`);
    }
  });
  if(items.length)items.push('<div class="ctx-div"></div>');
  S.cycles.filter(c=>!c.active).forEach(c=>items.push(`<div class="ctx-item ctx-g" onclick="startOn('${c.id}','${iso}')"><span class="ctx-ic">▶</span>${sym(c)} ${c.name} starten</div>`));
  act.forEach(c=>items.push(`<div class="ctx-item ctx-r" onclick="stopC('${c.id}')"><span class="ctx-ic">■</span>${sym(c)} ${c.name} beenden</div>`));
  if(items.length)items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calClick('${iso}');closeCtx()"><span class="ctx-ic">✏</span>Eintrag öffnen</div>`);
  const menu=document.getElementById('ctx-m');
  const dayInfo=act.map(c=>{const p=phase(iso,c);return p?`${sym(c)} T${p.day}`:''}).filter(Boolean).join(' ');
  menu.innerHTML=`<div style="font-size:11px;color:var(--text-hint);padding:8px 16px 2px;font-weight:600">${df} ${dayInfo}</div>`+items.join('');
  const t=e?.touches?.[0];const x=t?Math.min(Math.max(8,t.clientX),window.innerWidth-280):window.innerWidth/2-140;const y=t?Math.min(t.clientY-20,window.innerHeight-items.length*48-40):window.innerHeight/2;
  menu.style.left=x+'px';menu.style.top=Math.max(8,y)+'px';menu.classList.add('show');document.getElementById('ctx-ov').classList.add('show');
}
function closeCtx(){document.getElementById('ctx-m').classList.remove('show');document.getElementById('ctx-ov').classList.remove('show');}
function doShift(cId,displayISO,days){
  closeCtx();
  const skips=S.skipDays[cId]||{};
  // Find if this displayed day is the result of a previous shift
  const sourceKey=Object.keys(skips).find(k=>skips[k]===displayISO);
  if(sourceKey){
    // Already shifted: update mapping to new target
    const newTarget=isoPlus(displayISO,days);
    // Move data from current display to new target
    if(S.entries[displayISO]?.cycleData?.[cId]){
      const data=JSON.parse(JSON.stringify(S.entries[displayISO].cycleData[cId]));
      delete S.entries[displayISO].cycleData[cId];
      if(!S.entries[newTarget])S.entries[newTarget]={temp:'',humidity:'',cycleData:{}};
      if(!S.entries[newTarget].cycleData)S.entries[newTarget].cycleData={};
      S.entries[newTarget].cycleData[cId]=data;
    }
    skips[sourceKey]=newTarget;
    saveS();
  } else {
    // First shift of this planned day
    shiftDay(cId,displayISO,days);
  }
  renderCal();toast(`${days>0?'→ Morgen verschoben':'← Vorgezogen'} ✓`);
}
function undoShift(cId,key){
  closeCtx();
  const skips=S.skipDays[cId];if(!skips)return;
  const toISO=skips[key];
  // Move logged data back from target to original date (if not extra)
  if(toISO&&!key.startsWith('_extra_')){
    if(S.entries[toISO]?.cycleData?.[cId]){
      const data=JSON.parse(JSON.stringify(S.entries[toISO].cycleData[cId]));
      delete S.entries[toISO].cycleData[cId];
      // Clean empty target entry
      const te=S.entries[toISO];
      if(te&&!te.temp&&!te.humidity&&(!te.cycleData||!Object.keys(te.cycleData).length))delete S.entries[toISO];
      // Put data back at original date
      if(!S.entries[key])S.entries[key]={temp:'',humidity:'',cycleData:{}};
      if(!S.entries[key].cycleData)S.entries[key].cycleData={};
      S.entries[key].cycleData[cId]=data;
    }
  } else if(toISO&&key.startsWith('_extra_')){
    // Extra day: just remove data at target
    if(S.entries[toISO]?.cycleData?.[cId])delete S.entries[toISO].cycleData[cId];
  }
  // Remove the skip mapping
  delete skips[key];
  // Clean empty skipDays
  if(!Object.keys(skips).length)delete S.skipDays[cId];
  saveS();renderCal();toast('↺ Rückgängig ✓');
}
function addExtraDay(cId,iso){closeCtx();if(!S.skipDays[cId])S.skipDays[cId]={};S.skipDays[cId]['_extra_'+Date.now()]=iso;saveS();renderCal();toast('+ Extra-Gießtag ✓');}
function startOn(cId,iso){closeCtx();const c=S.cycles.find(x=>x.id===cId);if(!c)return;c.active=true;c.startDate=iso;saveS();renderCal();toast(`${sym(c)} gestartet!`);setTimeout(()=>{selId=cId;draft={};goTo('set');},800);}
function stopC(cId){closeCtx();const c=S.cycles.find(x=>x.id===cId);if(!c)return;if(!confirm(`"${c.name}" beenden?`))return;c.active=false;c.startDate=null;saveS();renderCal();toast(`${sym(c)} beendet`);}

  const symPick=SYMS.map(s=>`<div class="sym-opt ${d.symbol===s?'sel':''}" onclick="ddS('symbol','${s}')">${s}</div>`).join('');
  const durs=sel?[['Anzucht','anzuchtDays',17],['Blüte','bloomDays',66],['Spülen','flushDays',9],['IceFlush','iceDays',6],['Ernte','harvestDays',1],['Trocknen','dryDays',7]].map(([l,k,def])=>`<div class="dur-box"><div class="dur-lbl">${l}</div><input class="dur-inp" type="number" value="${d[k]!==undefined?d[k]:def}" oninput="dd('${k}',this.value)"/></div>`).join(''):'';
  document.getElementById('set-body').innerHTML=`<div class="card" style="gap:10px;display:flex;flex-direction:column"><div style="display:flex;align-items:center;justify-content:space-between"><div class="sect-head">Meine Zyklen</div><button class="add-btn" onclick="addCyc()">＋ Neu</button></div><div class="tab-row">${tabs}</div>${sel?`<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px"><div class="sub-head">Farbe</div><div class="pick-row">${colPick}</div><div class="sub-head">Symbol</div><div class="pick-row">${symPick}</div><div class="inp-wrap"><div class="inp-label">Name</div><input class="inp-field" value="${d.name||''}" oninput="dd('name',this.value)" style="border-color:${cl.hex}44"/></div><div class="inp-wrap"><div class="inp-label">Standort / Zelt</div><input class="inp-field" value="${d.location||''}" oninput="dd('location',this.value)"/></div><div class="sw-row"><span style="font-size:13px;color:var(--text-sub)">Aktiv</span><label class="sw"><input type="checkbox" ${sel.active?'checked':''} onchange="toggleAct('${sel.id}',this.checked)"/><span class="sl"></span></label></div><div class="inp-wrap"><div class="inp-label">Startdatum</div><input class="inp-field" type="date" value="${d.startDate||''}" oninput="dd('startDate',this.value)" style="color-scheme:dark"/></div><div class="sub-head">Phasendauern (Tage)</div><div class="dur-grid">${durs}</div><div class="sub-head">Gießintervall (alle X Tage)</div><div class="dur-grid"><div class="dur-box"><div class="dur-lbl">Anzucht</div><input class="dur-inp" type="number" value="${d.intAnzucht||4}" oninput="dd('intAnzucht',this.value)"/></div><div class="dur-box"><div class="dur-lbl">Blüte</div><input class="dur-inp" type="number" value="${d.intBloom||3}" oninput="dd('intBloom',this.value)"/></div><div class="dur-box"><div class="dur-lbl">Spülen</div><input class="dur-inp" type="number" value="${d.intFlush||3}" oninput="dd('intFlush',this.value)"/></div></div><div class="dur-grid" style="margin-top:6px"><div class="dur-box"><div class="dur-lbl">IceFlush</div><input class="dur-inp" type="number" value="${d.intIce||2}" oninput="dd('intIce',this.value)"/></div><div class="dur-box"><div class="dur-lbl">Ernte</div><input class="dur-inp" type="number" value="${d.intErnte||1}" oninput="dd('intErnte',this.value)"/></div><div class="dur-box"><div class="dur-lbl">Trocknen</div><input class="dur-inp" type="number" value="${d.intDry||1}" oninput="dd('intDry',this.value)"/></div></div><button class="sav-btn" style="background:${cl.hex}" onclick="saveDraft()">💾 ${sym(d)||'🌱'} ${d.name||'Zyklus'} speichern</button><button class="del-btn" onclick="delCyc('${sel.id}')">🗑 Zyklus löschen</button></div>`:'<div style="font-size:13px;color:var(--text-muted)">Erstelle deinen ersten Zyklus!</div>'}</div>
  <div class="sec-tog" onclick="openDuenger()" style="border-color:rgba(76,175,112,0.25)"><span>🧪</span><div><div style="font-weight:500">Dünger & Wochenplan</div><div style="font-size:11px;color:var(--text-muted)">${(S.products||[]).length} Produkte${S.presetKey?' · '+FERT_PRESETS[S.presetKey]?.name:''}</div></div><span style="color:var(--text-muted)">›</span></div>
  <div class="card" style="gap:8px;display:flex;flex-direction:column"><div class="sect-head">Topfgröße</div><div style="font-size:12px;color:var(--text-muted);line-height:1.5">Für Gießmengen-Vorschlag am Gießtag.</div><div class="row2"><div class="inp-wrap"><div class="inp-label">Liter</div><input class="inp-field" type="number" value="${S.potSize||11}" oninput="S.potSize=Number(this.value)||11;saveS()"/></div><div style="flex:1;display:flex;align-items:flex-end;font-size:12px;color:var(--text-muted);padding-bottom:10px">→ ~${waterSuggestion(null,{ph:'bloom'})} ml pro Guss (Blüte)</div></div></div>
  <div class="sec-tog" onclick="exportData()"><span>📤</span><div><div style="font-weight:500">Backup exportieren</div></div><span style="color:var(--text-muted)">›</span></div>
  <div class="sec-tog" onclick="importData()"><span>📥</span><div><div style="font-weight:500">Backup importieren</div></div><span style="color:var(--text-muted)">›</span></div>
  <div style="text-align:center;padding:16px 0;font-size:11px;color:var(--text-hint)">GrowSmart v2.1 🌱</div><div style="height:20px"></div>`;
}
function dd(k,v){draft[k]=isNaN(v)||v===''?v:Number(v);}function ddS(k,v){draft[k]=v;renderSet();}
function saveDraft(){const c=S.cycles.find(x=>x.id===selId);if(!c)return;const old=c.startDate,nw=draft.startDate;if(old&&nw&&old!==nw){const diff=isoDiff(nw,old);if(diff){const keys=Object.keys(S.entries).sort((a,b)=>diff>0?b.localeCompare(a):a.localeCompare(b));keys.forEach(d=>{if(!S.entries[d]?.cycleData?.[c.id])return;const nd=isoPlus(d,diff),data=JSON.parse(JSON.stringify(S.entries[d].cycleData[c.id]));delete S.entries[d].cycleData[c.id];if(!S.entries[nd])S.entries[nd]={temp:'',humidity:'',cycleData:{}};if(!S.entries[nd].cycleData)S.entries[nd].cycleData={};S.entries[nd].cycleData[c.id]=data;});}}Object.assign(c,{...draft,id:c.id});saveS();toast(`${sym(c)} ${c.name} gespeichert ✓`);renderSet();}
function selCyc(id){selId=id;draft={};renderSet();}
function addCyc(){const i=S.cycles.length;const c={id:Date.now().toString(),name:`Zyklus ${i+1}`,location:'',active:false,startDate:null,colorId:COLORS[i%COLORS.length].id,symbol:SYMS[i%SYMS.length],anzuchtDays:17,bloomDays:66,flushDays:9,iceDays:6,harvestDays:1,dryDays:7,intAnzucht:4,intBloom:3,intFlush:3,intIce:2,intErnte:1,intDry:1};S.cycles.push(c);selId=c.id;draft={...c};saveS();renderSet();}
function toggleAct(id,checked){const c=S.cycles.find(x=>x.id===id);if(!c)return;c.active=checked;if(checked&&!c.startDate)c.startDate=todayISO();if(!checked)c.startDate=null;draft.active=c.active;draft.startDate=c.startDate;saveS();renderSet();}
function delCyc(id){if(!confirm('Zyklus und alle Daten löschen?'))return;S.cycles=S.cycles.filter(x=>x.id!==id);Object.keys(S.entries).forEach(d=>{if(S.entries[d]?.cycleData?.[id])delete S.entries[d].cycleData[id];});if(S.skipDays[id])delete S.skipDays[id];selId=S.cycles[0]?.id||null;draft={};saveS();renderSet();toast('Gelöscht');}
function exportData(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='growsmart_'+todayISO()+'.json';a.click();toast('Backup ✓');}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!confirm(`${(d.cycles||[]).length} Zyklen laden? Aktuelle Daten werden überschrieben!`))return;S=Object.assign({cycles:[],entries:{},products:[],weekSchedule:{},skipDays:{},potSize:11},d);saveS();toast('Geladen ✓');goTo('dash');}catch(err){toast('Fehler');}};r.readAsText(f);};inp.click();}

// ===================== ENTRY SCREEN =====================
const QN={anzucht:['Keimling sichtbar','Umgetopft','Erste Blätter','Licht angepasst','Leicht gedüngt','Erde trocken','Erde feucht'],bloom:['Erste Blüten','Blüten wachsen','Stütze gesetzt','Blätter gelb unten','Geruch intensiv','Trichome milchig','Trichome klar','Stretch-Phase'],flush:['Nur Wasser','pH korrigiert','Runoff klar','Vergilbung normal'],ice:['Eiswasser gegeben','Trichome glitzern'],harvest:['Geerntet!','Wet Trim','Dry Trim','Aufgehängt'],dry:['Trocknung läuft','Stiele knacken','In Gläser','Burping']};
function openEntry(iso){editISO=iso;document.getElementById('entry-back').onclick=()=>goTo(entryFrom);document.getElementById('entry-ttl').textContent=fmtDE(iso,{day:'2-digit',month:'2-digit',year:'numeric'});document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('scr-entry').classList.add('active');renderEntry(iso);}

function renderEntry(iso){
  const act=active(),saved=S.entries[iso]||{},temp=saved.temp||'',rh=saved.humidity||'';const vpd=calcVPD(parseFloat(temp),parseFloat(rh)),z=vpdZone(vpd);
  const vpdBox=vpd!==null?`<div class="vpd-box"><div><div style="font-size:10px;color:#3a7a7a;margin-bottom:2px;font-weight:600">VPD</div><div style="display:flex;align-items:baseline;gap:3px"><span class="vpd-val" id="vpd-v">${vpd.toFixed(2)}</span><span style="font-size:11px;color:#3a7a7a"> kPa</span></div><span class="vpd-pill" id="vpd-p" style="background:${z.bg};color:${z.color}">${z.label}</span></div><div style="display:flex;flex-direction:column;gap:3px;width:88px"><div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>Anz.</span><span>Blüte</span><span>Stress</span></div><div class="vpd-scale"><div class="vpd-seg" style="background:#1e3a6e"></div><div class="vpd-seg" style="background:#1e6e3a"></div><div class="vpd-seg" style="background:#6e4a1e"></div></div><div class="vpd-mrow"><div class="vpd-marker" id="vpd-m" style="left:${Math.min(95,z.pct)}%"></div></div><div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>0.4</span><span>0.8</span><span>1.2</span><span>1.8</span></div></div></div>`:`<div style="background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text-muted)">Temp & RLF eingeben → VPD</div>`;
  const blocks=act.map(c=>{
    const p=phase(iso,c),a=getAction(iso,c),cl=col(c),s=sym(c),cd=saved.cycleData?.[c.id]||{},wk=p?Math.min(p.week||1,10):1,doses=getWeekDoses(c.id,wk);
    const isWaterDay=a==='giess'||a==='giess_anz'||a==='spuelen'||a==='ice';
    const waterSug=waterSuggestion(c,p);
    // Gießtag-Karte mit Wasser-Vorschlag
    const giessCard=a?`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${cl.hex}11;border:0.5px solid ${cl.hex}33;border-radius:10px;margin-bottom:8px"><span style="font-size:24px">${ACT_ICON[a]||'💧'}</span><div style="flex:1"><div style="font-size:13px;font-weight:600;color:${cl.hex}">${a==='giess_anz'?'🌱 Anzucht-Gießtag!':a==='giess'?'💧 Gießtag!':a==='spuelen'?'🚿 Spültag':a==='ice'?'🧊 IceFlush!':a==='ernte'?'✂️ Erntetag!':'🍂 Trocknung'}</div>${isWaterDay?`<div style="font-size:11px;color:var(--text-muted)">Vorschlag: ~${waterSug} ml · Topf ${S.potSize||11}L · ${getInt(c,p?.ph||'bloom')}d Intervall</div>`:''}</div></div>`:(!a&&p&&['flush','ice','harvest','dry'].includes(p.ph)?`<div style="padding:8px 12px;background:${cl.hex}08;border:0.5px solid ${cl.hex}1a;border-radius:10px;margin-bottom:8px;font-size:12px;color:${cl.hex}99">${PH_ICON[p.ph]||''} ${PN[p.ph]} – kein Gießtag</div>`:'');
    const showNutrients=a==='giess'||a==='giess_anz';
    const prodRows=showNutrients?(S.products||[]).map(prod=>{const plan=doses[prod.id]||0;const logged=cd.doses?.[prod.id]||'';return`<div class="nut-row-tbl"><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${prod.color};flex-shrink:0"></div><span class="nt-name">${prod.name}</span></div><span class="nt-hint" style="color:${prod.color}88">${plan>0?(plan+' '+(prod.unit||'ml/L')):'–'}</span><input class="nt-inp" style="border-color:${prod.color}44" type="number" step="0.1" value="${logged}" placeholder="${plan||'0'}" onchange="uDose('${c.id}','${prod.id}',this.value)"/></div>`;}).join(''):'';
    const mixLine=S.mixOrder?S.mixOrder.filter(n=>{const pr=S.products.find(p=>p.name===n);return pr&&(doses[pr.id]||0)>0;}).join(' → '):'';
    const nutSection=showNutrients?`<div class="nut-tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none"><span style="font-size:12px;font-weight:600;color:#fff">Nährstoffe Wo.${wk}</span><button onclick="openDuenger()" style="background:none;border:none;color:${cl.hex};font-size:11px;cursor:pointer">Plan ✏</button></div><div class="nut-tbl-wrap" style="border-color:${cl.hex}33;background:var(--surface)"><div class="nut-tbl-head" style="background:${cl.dk}"><span class="nth" style="color:${cl.hex}">Produkt</span><span class="nth" style="text-align:right;color:${cl.hex}88">Plan</span><span class="nth" style="text-align:right;color:${cl.hex}">Ist</span></div>${prodRows||`<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Keine Dünger konfiguriert. <span style="color:var(--blue);cursor:pointer" onclick="openDuenger()">Dünger einrichten →</span></div>`}</div>${mixLine?`<div style="background:var(--card);border:0.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:8px 12px;font-size:11px;color:var(--text-hint)">⚗️ Mischen: ${mixLine}</div>`:''}`:(a==='spuelen'||a==='ice')?`<div style="background:${cl.hex}08;border:0.5px solid ${cl.hex}22;border-radius:10px;padding:10px 12px;font-size:12px;color:${cl.hex}99;margin-bottom:4px">${a==='spuelen'?'🚿 Nur klares Wasser – kein Dünger!':'🧊 Nur eiskaltes Wasser – kein Dünger!'}</div>`:'';
    const tip=getSmartTip(c,p);const hintHTML=tip?`<div style="background:${cl.hex}0a;border:0.5px solid ${cl.hex}1a;border-radius:9px;padding:8px 11px;font-size:11px;color:${cl.hex}cc;line-height:1.5;margin-top:4px">💡 ${tip}</div>`:'';
    const qnotes=QN[p?.ph]||[];const qnHTML=qnotes.length?`<div class="qn-row">${qnotes.map(n=>`<div class="qn-chip" onclick="addQN('${c.id}',this,'${n.replace(/'/g,"\\'")}')">+ ${n}</div>`).join('')}</div>`:'';
    const photos=cd.photos||[];const photoHTML=`<div class="photo-grid">${photos.map(ph=>`<img class="photo-thumb" src="${ph}" onclick="viewPhoto(this.src)"/>`).join('')}<div class="photo-add" onclick="addPhoto('${c.id}')">📷</div></div>`;
    return`<div style="display:flex;align-items:center;gap:8px;margin-top:14px;margin-bottom:6px"><span style="font-size:20px">${s}</span><div><div style="font-size:13px;font-weight:600;color:${cl.hex}">${c.name}${c.location?' · '+c.location:''}</div><div style="font-size:11px;color:var(--text-muted)">${PH_ICON[p?.ph]||''} ${p?PN[p.ph]:'–'}${p?.week?' Wo.'+p.week:''} · Tag ${p?.day||'–'}</div></div></div>${giessCard||''}${nutSection}<div class="row2" style="margin-top:8px"><div class="inp-wrap"><div class="inp-label">Wasser (ml)</div><input class="inp-field" type="number" value="${cd.water||''}" placeholder="${isWaterDay?waterSug:'–'}" onchange="uEF('${c.id}','water',this.value)" style="border-color:${cl.hex}44"/></div><div style="width:78px;flex-shrink:0"><div class="inp-label">pH</div><input class="inp-field" type="number" step="0.1" value="${cd.ph||''}" placeholder="6.2" onchange="uEF('${c.id}','ph',this.value)"/></div></div><div class="note-wrap" style="border-color:${cl.hex}33;margin-top:8px"><div class="inp-label" style="margin-bottom:3px">Notizen</div><textarea class="note-ta" id="note-${c.id}" placeholder="Blattfarbe, Geruch, Wachstum..." onchange="uEF('${c.id}','notes',this.value)">${cd.notes||''}</textarea>${qnHTML}</div><div style="margin-top:8px"><div class="inp-label" style="margin-bottom:4px">Fotos</div>${photoHTML}</div>${hintHTML}`;
  }).join('');
  const noActive=act.length===0?`<div class="empty-state"><div style="font-size:40px;opacity:0.3">🌱</div><div style="font-size:13px;color:var(--text-muted)">Keine aktiven Zyklen.</div><button style="background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--green);cursor:pointer;font-family:var(--font)" onclick="goTo('set')">Zyklus erstellen</button></div>`:'';
  document.getElementById('entry-body').innerHTML=`<div class="sect-head">Umgebung</div><div class="row2"><div class="inp-wrap"><div class="inp-label">Temperatur (°C)</div><input class="inp-field" type="number" value="${temp}" placeholder="23" id="et" oninput="uEnv()"/></div><div class="inp-wrap"><div class="inp-label">Luftfeuchtigkeit (%)</div><input class="inp-field" type="number" value="${rh}" placeholder="48" id="er" oninput="uEnv()"/></div></div><div id="vpd-c">${vpdBox}</div>${noActive}${blocks}<button class="big-save" style="background:${act.length>0?col(act[0]).hex:'var(--green-dk)'}" onclick="saveEntry()">💾 Speichern</button><div style="height:20px"></div>`;
}
function uEnv(){const t=parseFloat(document.getElementById('et')?.value),r=parseFloat(document.getElementById('er')?.value);const v=calcVPD(t,r),z=vpdZone(v);if(v!==null&&z){const vv=document.getElementById('vpd-v'),vp=document.getElementById('vpd-p'),vm=document.getElementById('vpd-m');if(vv)vv.textContent=v.toFixed(2);if(vp){vp.textContent=z.label;vp.style.background=z.bg;vp.style.color=z.color;}if(vm)vm.style.left=Math.min(95,z.pct)+'%';}}
function ensE(cId){if(!S.entries[editISO])S.entries[editISO]={temp:'',humidity:'',cycleData:{}};if(!S.entries[editISO].cycleData)S.entries[editISO].cycleData={};if(!S.entries[editISO].cycleData[cId])S.entries[editISO].cycleData[cId]={doses:{},water:'',ph:'',notes:'',photos:[]};if(!S.entries[editISO].cycleData[cId].doses)S.entries[editISO].cycleData[cId].doses={};if(!S.entries[editISO].cycleData[cId].photos)S.entries[editISO].cycleData[cId].photos=[];}
function uDose(cId,pid,v){ensE(cId);S.entries[editISO].cycleData[cId].doses[pid]=parseFloat(v)||0;}
function uEF(cId,f,v){ensE(cId);S.entries[editISO].cycleData[cId][f]=v;}
function addQN(cId,el,text){ensE(cId);const ta=document.getElementById('note-'+cId);const ex=ta?.value||S.entries[editISO].cycleData[cId].notes||'';const nv=ex.trim()?(ex.trim()+', '+text):text;S.entries[editISO].cycleData[cId].notes=nv;if(ta)ta.value=nv;el.style.background='var(--green-bg)';el.style.borderColor='var(--green-dk)';el.style.color='var(--green)';toast('✓ '+text);}
function saveEntry(){if(!editISO)return;if(S.cycles.length>0)ensE(S.cycles[0].id);S.entries[editISO].temp=document.getElementById('et')?.value||'';S.entries[editISO].humidity=document.getElementById('er')?.value||'';saveS();toast('Gespeichert ✓');setTimeout(()=>goTo(entryFrom),400);}
function addPhoto(cId){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;if(f.size>3*1024*1024){toast('Max 3MB');return;}const r=new FileReader();r.onload=ev=>{ensE(cId);S.entries[editISO].cycleData[cId].photos.push(ev.target.result);saveS();renderEntry(editISO);toast('Foto 📸');};r.readAsDataURL(f);};inp.click();}
function viewPhoto(src){document.getElementById('pv-img').src=src;document.getElementById('photo-viewer').style.display='flex';}

// ===================== INIT =====================
loadS();calDate=new Date();goTo('dash');history.pushState(null,'',location.href);
(function(){const scr=document.getElementById('scr-cal');let sx=0,sy=0,st=0;scr.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});scr.addEventListener('touchend',e=>{if(Date.now()-st>500)return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8)changeMonth(dx<0?1:-1);},{passive:true});})();
</script>
