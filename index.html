<!--
  ============================================================================
  GROWSMART — EIN MEISTERWERK IM WERDEN
  ============================================================================

  KERN-ANSPRUCH:
  "Eine App die Cannabis-Anbau entmystifiziert. Die Anfänger vor den häufigen
  tödlichen Fehlern schützt, und Profis zeigt wo sie noch Ertrag liegen lassen."

  Die erste Grow-App mit echter Biophysik statt Daumenregeln.

  ----------------------------------------------------------------------------
  MEISTERWERK-PRINZIPIEN (verbindlich, nicht verhandelbar)
  ----------------------------------------------------------------------------

  1. EHRLICHKEIT ÜBER OPTIMISMUS
     Die App lügt nie — auch nicht aus Freundlichkeit. Schätzwerte sind als
     solche gekennzeichnet. Keine falschen Präzisionen. Keine Success-Theater.
     Leere Felder sind leer, nicht "angenommen gefüllt".

  2. SICHTBARES WARUM
     Jede Zahl, jede Empfehlung, jede Phase kann der User aufklappen und sehen
     warum das so ist. Kein Geheimwissen. Kein "die App sagt halt".

  3. DER MENSCH BLEIBT CHEF
     Die App schlägt vor, sie entscheidet nicht. Jede Empfehlung ist
     überschreibbar, jede Automatik abschaltbar. Bei biologisch schädlichem
     Verhalten wird einmal deutlich gewarnt — dann lässt die App machen.

  4. ZWEI SPRACHEN, EIN KERN
     Einsteiger- und Profi-Modus sind nicht verschiedene Apps, sondern
     verschiedene Übersetzungen derselben Wahrheit. Gleiche Berechnung,
     anderer Detailgrad.

  5. KONTEXT-SPEZIFISCH (seedType × growType × phase)
     Jede Empfehlung, jede Warnung, jeder Tipp wird gegen die Kombination
     seedType × growType × phase geprüft. Keine generischen Sätze die für
     eine Gruppe falsch sind. Automatics brauchen kein 12/12. Feminisiert
     Outdoor folgt der Sonne. Jeder Ton muss stimmen.

  6. NOMENKLATUR KONSEQUENT
     Jeder Begriff hat genau eine Bedeutung, jede Bedeutung einen Begriff.
     Keine gemischten Synonyme. Das Lexikon erklärt alternative Begriffe
     aus der Branche, aber die App selbst spricht EINE Sprache.
     Beispiel: "Restgewicht" in der App, "Dryback" nur im Lexikon erwähnt.

  7. LEXIKON KONTEXTUELL
     Die richtige Information zur richtigen Zeit am richtigen Ort. Wer
     "Spinnmilben" antippt sieht sofort die Sofort-Maßnahme inline, nicht
     erst nach drei Klicks in einem anderen Tab.

  8. EHRLICHKEIT DER DATEN
     Ein eingetragener Wert = gemessen. Ein Placeholder = Empfehlung, nicht
     Messung. Nichts wird automatisch in den Daten-Strom gekippt was der
     User nicht bewusst bestätigt hat. Statistiken zeigen was wirklich
     passiert ist, nicht was die App vermutet hat.

  ----------------------------------------------------------------------------
  ARCHITEKTUR-PRINZIPIEN
  ----------------------------------------------------------------------------

  A. Single-File PWA. Keine Frameworks. Keine Build-Chain. Portabel.
     Wird in 10 Jahren noch laufen.

  B. Alles lokal. LocalStorage für Struktur, IndexedDB für Fotos (geplant).
     Kein Backend, kein Tracking, kein Account.

  C. Modulare interne Organisation: Daten / Logik / UI klar getrennt,
     auch wenn alles in einer Datei lebt.

  D. Alle User-Texte laufen durch T('key') — kein Hardcoded-Text im
     Logik-Code. Bereitet Internationalisierung vor.

  ============================================================================
-->

<style>
/* ===================== CSS VARIABLES ===================== */
:root {
  --bg: #0a0a0a;
  --surface: #131313;
  --card: #1a1a1a;
  --card2: #1f1f1f;
  --border: #262626;
  --green: #4caf70;
  --green-dk: #1a3a24;
  --green-bg: #0d1e0d;
  --green-hint: #3a6e4a;
  --blue: #5aabf0;
  --blue-bg: #0a1520;
  --teal: #5adada;
  --teal-bg: #0e1a1a;
  --teal-bd: #1e3535;
  --red: #e06060;
  --orange: #e8884a;
  --orange-bg: #1e0e04;
  --purple: #b06ac8;
  --yellow: #f0d050;
  --text: #e8e8e8;
  --text-sub: #aaa;
  --text-muted: #666;
  --text-hint: #505050;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

/* ===================== RESET & BASE ===================== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
#app { width: 100%; height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
/* Allow text selection only in input fields and textareas */
input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }

/* ===================== SCREENS ===================== */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }
.scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px; display: flex; flex-direction: column; gap: 14px;
}
.scroll::-webkit-scrollbar { display: none; }

/* ===================== TOPBAR ===================== */
.topbar {
  background: var(--surface); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border); flex-shrink: 0;
}
.tb-title { font-size: 14px; font-weight: 500; }
.app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.icon-btn { background: none; border: none; color: var(--green); font-size: 22px; cursor: pointer; padding: 4px; }
.save-pill {
  background: var(--green); border: none; border-radius: 20px;
  padding: 6px 16px; font-size: 12px; color: #fff; cursor: pointer;
  font-family: var(--font); font-weight: 600;
}

/* ===================== BOTTOM NAV ===================== */
.bottom-nav {
  background: var(--surface); border-top: 0.5px solid var(--border);
  display: flex; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 8px 0 6px; min-height: 52px; cursor: pointer; background: none; border: none;
  opacity: 0.4; transition: opacity 0.2s;
}
.nav-btn.active { opacity: 1; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; color: var(--green); font-weight: 600; font-family: var(--font); }

/* ===================== CARDS ===================== */
.card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 14px; }
.sect-head {
  font-size: 11px; color: var(--green); font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 0 2px;
}

/* ===================== STATS ===================== */
.stat-row { display: flex; gap: 8px; }
.stat-box { flex: 1; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 0.5px solid var(--border); }
.stat-lbl { font-size: 10px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.stat-val { font-size: 18px; font-weight: 600; }
.stat-unit { font-size: 11px; color: var(--text-hint); }

/* ===================== INPUTS ===================== */
.inp-wrap { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.inp-label { font-size: 11px; color: var(--text-hint); font-weight: 500; }
.inp-field {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 7px;
  padding: 9px 11px; color: var(--text-sub); font-size: 13px; font-family: var(--font);
  width: 100%; outline: none; transition: border-color 0.2s;
}
.inp-field:focus { border-color: var(--green-hint); }
.row2 { display: flex; gap: 8px; }

/* Vorgeschlagene Werte (Auto-Fill): grau/kursiv statt fett
   — unterscheidet "vorgeschlagen" von "gemessen". Beim ersten manuellen Tippen
   wird _suggested entfernt, Klasse verschwindet, Wert wird normal angezeigt. */
.inp-field.suggested,
input.suggested { color: var(--text-hint) !important; font-style: italic; opacity: 0.7; }
.inp-field.suggested:focus,
input.suggested:focus { color: var(--text) !important; font-style: normal; opacity: 1; }

/* ===================== VPD ===================== */
.vpd-box {
  background: var(--teal-bg); border: 0.5px solid var(--teal-bd); border-radius: 10px;
  padding: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.vpd-val { font-size: 22px; font-weight: 600; color: var(--teal); font-family: var(--mono); }
.vpd-pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; margin-top: 3px; }
.vpd-scale { display: flex; height: 5px; border-radius: 3px; overflow: hidden; }
.vpd-seg { flex: 1; }
.vpd-mrow { position: relative; height: 8px; }
.vpd-marker {
  position: absolute; top: 0; width: 2px; height: 9px;
  background: #fff; border-radius: 2px; transition: left 0.3s;
}

/* ===================== CALENDAR ===================== */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-cell {
  aspect-ratio: 0.78; border-radius: 9px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; position: relative;
  border: 0.5px solid transparent; background: #151515; user-select: none;
  padding: 2px; transition: transform 0.1s;
}
.cal-cell:active { transform: scale(0.92); }
.cal-cell.today { border: 2px solid #fff !important; }
.cal-num { font-size: 14px; color: var(--text-sub); font-weight: 700; line-height: 1; }
.cal-cell.today .cal-num { color: #fff; }
.cal-tag { font-size: 7.5px; color: rgba(255,255,255,0.6); line-height: 1; margin-top: 1px; text-align: center; }
.cal-icon { font-size: 13px; line-height: 1; margin-bottom: 1px; display: inline-flex; align-items: center; justify-content: center; height: 16px; width: 16px; }
.cal-icon svg { width: 100%; height: 100%; display: block; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 2px; right: 3px; background: rgba(255,255,255,0.7); }

/* ===================== NUTRIENT TABLE ===================== */
.nut-tbl-hdr {
  border-radius: 10px 10px 0 0; padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.nut-tbl-wrap {
  border: 0.5px solid var(--border); border-top: none;
  border-radius: 0 0 10px 10px; overflow: hidden;
}
.nut-tbl-head {
  display: grid; grid-template-columns: 1fr 58px 68px 60px;
  padding: 5px 10px; border-bottom: 0.5px solid var(--border);
}
.nth { font-size: 11px; font-weight: 500; }
.nth:not(:first-child) { text-align: right; }
.nut-row-tbl {
  display: grid; grid-template-columns: 1fr 58px 68px 60px;
  padding: 5px 10px; border-bottom: 0.5px solid #1e1e1e; align-items: center;
}
.nut-row-tbl:last-child { border: none; }
.nut-row-tbl:nth-child(odd) { background: #171717; }
.nut-row-tbl:nth-child(even) { background: var(--surface); }
.nt-name { font-size: 12px; color: #bbb; }
.nt-hint { font-size: 12px; text-align: right; font-family: var(--mono); }
.nt-calc { font-size: 11px; text-align: right; font-family: var(--mono); color: var(--green); }
.nt-inp {
  background: #1e1e1e; border: 0.5px solid var(--border); border-radius: 5px;
  padding: 3px 6px; color: #ddd; font-size: 12px; font-family: var(--mono);
  width: 56px; text-align: right; outline: none;
}
.nt-inp:focus { border-color: var(--green-hint); }

/* ===================== NOTES ===================== */
.note-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 10px; }
.note-ta {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 7px;
  padding: 8px 10px; color: #aaa; font-size: 12px; font-family: var(--font);
  width: 100%; min-height: 65px; resize: none; outline: none; line-height: 1.6;
}
.note-ta:focus { border-color: var(--green-hint); }

/* ===================== BUTTONS ===================== */
.big-save {
  border: none; border-radius: 10px; padding: 14px; font-size: 14px;
  font-weight: 600; color: #fff; width: 100%; cursor: pointer; font-family: var(--font);
}
.big-save:active { opacity: 0.8; }
.sav-btn {
  border: none; border-radius: 10px; padding: 12px; font-size: 13px;
  font-weight: 600; color: #fff; width: 100%; cursor: pointer; font-family: var(--font); margin-top: 6px;
}
.sav-btn:active { opacity: 0.8; }
.wk-accordion > summary::-webkit-details-marker { display: none; }
.wk-accordion[open] .wk-caret { transform: rotate(180deg); }
.add-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-bg); border: 0.5px solid var(--green-dk); border-radius: 8px;
  padding: 6px 12px; font-size: 12px; color: var(--green); cursor: pointer;
  font-family: var(--font); font-weight: 600;
}
.del-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 0; cursor: pointer;
  background: none; border: none; font-size: 13px; color: var(--red); font-family: var(--font);
}

/* ===================== ALERTS ===================== */
.alert { border-radius: 12px; padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; border: 0.5px solid transparent; }

/* ===================== TABS ===================== */
.tab-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border-radius: 8px; padding: 9px 14px;
  border: 0.5px solid var(--border); cursor: pointer; font-size: 12px;
  color: var(--text-muted); font-family: var(--font); min-height: 40px;
}
.tab-item.sel { border-color: var(--green); background: var(--green-bg); color: var(--green); }

/* ===================== DURATION GRID ===================== */
.dur-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.dur-box { display: flex; flex-direction: column; gap: 3px; width: calc(33% - 6px); }
.dur-lbl { font-size: 11px; color: var(--text-hint); }
.dur-inp {
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 7px;
  padding: 6px; color: var(--text-sub); font-size: 13px; text-align: center;
  width: 100%; outline: none; font-family: var(--mono);
}
.sub-head { font-size: 11px; color: var(--text-hint); font-weight: 500; margin-top: 8px; margin-bottom: 4px; }

/* ===================== SWITCHES ===================== */
.sw-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
.sw { position: relative; width: 44px; height: 26px; cursor: pointer; }
.sw input { opacity: 0; width: 0; height: 0; }
.sl {
  position: absolute; inset: 0; background: #333; border-radius: 26px; transition: 0.2s;
}
.sl:before {
  content: ''; position: absolute; width: 20px; height: 20px;
  left: 3px; top: 3px; background: #888; border-radius: 50%; transition: 0.2s;
}
input:checked + .sl { background: var(--green-dk); }
input:checked + .sl:before { transform: translateX(18px); background: var(--green); }

/* ===================== SECTION TOGGLE ===================== */
.sec-tog {
  background: var(--card); border-radius: 12px; border: 0.5px solid var(--border);
  padding: 16px 16px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; font-size: 14px; color: var(--text);
}
.sec-tog + .sec-tog { margin-top: 10px; }
#tips-normal > .sec-tog:first-child { margin-top: 8px; }
#tips-normal > .sec-tog { margin-top: 10px; }
#tips-normal > div[style*="background:var(--card)"] { margin-top: 10px !important; }
#tips-body .sub-card-pad { padding: 16px !important; margin-top: 10px !important; }
.sec-tog:active { background: var(--card2); }
.sec-tog > div { flex: 1; }

/* ===================== COLOR / SYMBOL PICKERS ===================== */
.pick-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0; }
.col-opt {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform 0.15s;
}
.col-opt.sel { border-color: #fff; transform: scale(1.2); }
.sym-opt {
  width: 36px; height: 36px; border-radius: 10px; background: var(--card2);
  border: 2px solid transparent; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 18px; transition: transform 0.15s;
}
.sym-opt.sel { border-color: #fff; transform: scale(1.15); }

/* ===================== STEPPER BUTTONS ===================== */
.stepper-btn {
  width: 40px; height: 40px; border-radius: 7px;
  background: var(--card2); border: 0.5px solid var(--border);
  color: var(--text-sub); font-size: 16px; cursor: pointer;
  font-family: var(--mono); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.stepper-btn:active { background: var(--surface); transform: scale(0.95); }

/* ===================== PRODUCT CARDS ===================== */
.prod-card {
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px;
}
.prod-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* ===================== TOAST ===================== */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(26,26,26,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: #ddd; padding: 10px 22px; border-radius: 22px; font-size: 13px;
  z-index: 9999; border: 0.5px solid #444; pointer-events: none;
  opacity: 0; transition: all 0.25s; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================== CONTEXT MENU ===================== */
#ctx-m {
  position: fixed; z-index: 9998;
  background: rgba(28,28,28,0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 0.5px solid #3a3a3a; border-radius: 16px; padding: 6px;
  min-width: 270px; box-shadow: 0 12px 48px rgba(0,0,0,0.7);
  display: none; animation: ctxIn 0.18s ease;
}
#ctx-m.show { display: block; }
@keyframes ctxIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
.ctx-item {
  padding: 12px 16px; border-radius: 10px; font-size: 13px; color: var(--text-sub);
  cursor: pointer; display: flex; align-items: center; gap: 10px;
}
.ctx-item:active { background: rgba(255,255,255,0.06); }
.ctx-g { color: var(--green); } .ctx-r { color: var(--red); } .ctx-b { color: var(--blue); }
.ctx-div { height: 0.5px; background: #333; margin: 4px 0; }
.ctx-ic { font-size: 15px; width: 22px; text-align: center; }
#ctx-ov { position: fixed; inset: 0; z-index: 9997; display: none; }
#ctx-ov.show { display: block; }

/* ===================== CUSTOM CONFIRM MODAL ===================== */
#modal-overlay {
  position: fixed; inset: 0; z-index: 10001;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#modal-overlay.show { display: flex; }
#modal-box {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 18px;
  padding: 24px; max-width: 340px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
#modal-title {
  font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px;
}
#modal-msg {
  font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px;
}
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1; padding: 12px; border-radius: 10px; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: var(--font); border: none;
}
#modal-cancel {
  background: var(--card2); color: var(--text-sub); border: 0.5px solid var(--border);
}
#modal-ok { background: var(--red); color: #fff; }

/* Input-Modal (Zahlen-Eingabe, z.B. Restgewicht-Setup) */
#input-modal-overlay {
  position: fixed; inset: 0; z-index: 10002;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#input-modal-overlay.show { display: flex; }
#input-modal-box {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 18px;
  padding: 24px; max-width: 380px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: modalIn 0.2s ease;
}
#input-modal-title {
  font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px;
}
#input-modal-msg {
  font-size: 12px; color: var(--text-sub); line-height: 1.55; margin-bottom: 14px;
}
#input-modal-field-wrap {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 10px;
  padding: 10px 12px;
}
#input-modal-field {
  flex: 1; background: transparent; border: none; color: var(--text);
  font-size: 18px; font-weight: 600; font-family: var(--mono); outline: none;
  text-align: right; min-width: 0;
}
#input-modal-unit {
  font-size: 13px; color: var(--text-muted); font-weight: 500;
}
#input-modal-hint {
  font-size: 11px; color: var(--text-hint); line-height: 1.5; margin-bottom: 16px;
  min-height: 16px;
}
#input-modal-cancel {
  background: var(--card2); color: var(--text-sub); border: 0.5px solid var(--border);
}
#input-modal-ok { background: var(--green); color: #fff; }

/* ===================== MISC ===================== */
.spin {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--green-bg); border-top-color: var(--green);
  border-radius: 50%; animation: sp 0.7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }
.empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 30px 20px; text-align: center; }
.tip-card {
  background: var(--green-bg); border: 0.5px solid var(--green-dk); border-radius: 12px;
  padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
}
.streak {
  display: inline-flex; align-items: center; gap: 3px;
  background: linear-gradient(135deg, #2a1500, #1a0a00);
  border: 0.5px solid rgba(232,136,74,0.35); border-radius: 16px;
  padding: 3px 8px; font-size: 10px; color: var(--orange); font-weight: 600;
}
.legal-body p { margin: 0 0 8px; }
.legal-body p:last-child { margin-bottom: 0; }
.legal-body ul { margin: 4px 0 8px; padding-left: 20px; }
.legal-body li { margin-bottom: 3px; }
.legal-body b { color: var(--text); }
.ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.mini-chart { display: flex; align-items: flex-end; gap: 1px; height: 24px; }
.mini-bar { flex: 1; min-width: 2px; border-radius: 1px 1px 0 0; transition: height 0.3s; }
.photo-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.photo-wrap { position: relative; width: 52px; height: 52px; }
.photo-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; border: 0.5px solid var(--border); cursor: pointer; display: block; }
.photo-del {
  position: absolute; top: -4px; right: -4px; width: 22px; height: 22px;
  border-radius: 50%; background: rgba(224,96,96,0.95); border: 1.5px solid #0a0a0a;
  color: #fff; font-size: 14px; font-weight: 700; line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); padding: 0;
}
.photo-del:active { transform: scale(0.9); }
.photo-add {
  width: 52px; height: 52px; border-radius: 8px; border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  color: var(--text-hint); cursor: pointer;
}
.photo-add:active { border-color: var(--green); }
.qn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.qn-chip {
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 16px;
  padding: 7px 12px; font-size: 11px; color: var(--text-sub); cursor: pointer;
  font-family: var(--font); white-space: nowrap; min-height: 30px;
  display: inline-flex; align-items: center; transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.qn-chip:active { transform: scale(0.95); }
.qn-chip.active {
  background: var(--green-bg) !important;
  border-color: var(--green-dk) !important;
  color: var(--green) !important;
  font-weight: 600;
}
.mix-step {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  font-size: 12px; color: var(--text-sub);
}
.mix-num {
  width: 20px; height: 20px; border-radius: 50%; background: var(--green-dk);
  color: var(--green); font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ===================== WATER INPUT (Dünger-Rechner) ===================== */
.water-input-box {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.water-input-box .inp-field {
  max-width: 100px; font-size: 15px; font-weight: 600; text-align: center;
  font-family: var(--mono);
}
.ph-hint {
  background: var(--green-bg); border: 0.5px solid var(--green-dk);
  border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--green);
  margin-top: 6px; text-align: center;
}

/* ============================================================== */
/* Tour: overlay + popup + highlight                               */
/* ============================================================== */
.tour-overlay {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(0, 0, 0, 0.35);
  pointer-events: none;
  opacity: 0; transition: opacity 0.25s;
}
.tour-overlay.visible { opacity: 1; }
.tour-hole {
  position: fixed; z-index: 9999;
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35),
              0 0 0 2px var(--green),
              0 0 20px rgba(76, 175, 112, 0.4);
  pointer-events: none;
  transition: all 0.3s ease-out;
  animation: tour-pulse 2s infinite ease-in-out;
}
@keyframes tour-pulse {
  0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35),
                          0 0 0 2px var(--green),
                          0 0 15px rgba(76, 175, 112, 0.35); }
  50%      { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35),
                          0 0 0 3px var(--green),
                          0 0 25px rgba(76, 175, 112, 0.55); }
}
.tour-popup {
  position: fixed; z-index: 10000;
  background: var(--card); border: 1px solid var(--green-dk);
  border-radius: 14px; padding: 16px 16px 14px;
  max-width: 300px; width: calc(100vw - 32px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  font-family: var(--font);
  animation: tour-pop-in 0.3s ease-out;
}
@keyframes tour-pop-in {
  from { opacity: 0; transform: scale(0.9) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.tour-popup-arrow {
  position: absolute; width: 12px; height: 12px;
  background: var(--card); border: 1px solid var(--green-dk);
  transform: rotate(45deg);
}
.tour-popup-arrow.top    { top: -7px;    left: 50%; margin-left: -6px; border-bottom: none; border-right: none; }
.tour-popup-arrow.bottom { bottom: -7px; left: 50%; margin-left: -6px; border-top: none; border-left: none; }
.tour-popup-arrow.left   { left: -7px;   top: 50%;  margin-top: -6px;  border-right: none; border-top: none; }
.tour-popup-arrow.right  { right: -7px;  top: 50%;  margin-top: -6px;  border-left: none; border-bottom: none; }
.tour-popup-title {
  font-size: 13px; font-weight: 700; color: var(--green);
  margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
}
.tour-popup-body {
  font-size: 12px; color: var(--text-sub); line-height: 1.55;
  margin-bottom: 12px;
}
.tour-popup-btns {
  display: flex; gap: 6px; align-items: center;
}
.tour-popup-btn {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: var(--font); border: 0.5px solid transparent;
}
.tour-popup-btn.primary   {
  background: #1b4027; color: #fff; border-color: var(--green);
  font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.tour-popup-btn.primary:hover  { background: #245432; }
.tour-popup-btn.primary:active { background: #152e1c; transform: scale(0.97); }
.tour-popup-btn.secondary { background: var(--surface); color: var(--text-sub); border-color: var(--border); }
.tour-popup-btn.skip      { background: rgba(232,136,74,0.08); color: var(--orange); padding: 9px 14px; flex: 0 0 auto; font-size: 12px; border-color: rgba(232,136,74,0.3); font-weight: 600; }
.tour-popup-btn.skip:active { background: rgba(232,136,74,0.15); transform: scale(0.97); }
.tour-popup-x {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(232,136,74,0.1); border: 0.5px solid rgba(232,136,74,0.3);
  color: var(--orange); font-size: 13px; cursor: pointer;
  font-family: var(--font); padding: 0; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.tour-popup-x:active { background: rgba(232,136,74,0.2); transform: scale(0.92); }
.tour-popup-step {
  font-size: 10px; color: var(--text-hint); margin-left: auto;
}
/* Step indicator dots */
.tour-dots {
  display: flex; justify-content: center; gap: 4px; margin-bottom: 10px;
}
.tour-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border); transition: all 0.2s;
}
.tour-dot.active { background: var(--green); transform: scale(1.3); }
.tour-dot.done   { background: var(--green-dk); }

/* Advanced controls (Undo/Redo, Test-Mode usw.) — nur im Profi-Modus sichtbar. */
.advanced-ctl { display: flex; }
body.beginner .advanced-ctl { display: none !important; }
</style>

<script>
// =====================================================================
//  [SEKTION]: CONSTANTS
// =====================================================================
const COLORS = [
  { id: 'g1', hex: '#4caf70', dk: '#071a0c' },
  { id: 'g2', hex: '#5aabf0', dk: '#071422' },
  { id: 'g3', hex: '#e8884a', dk: '#1e0e04' },
  { id: 'g4', hex: '#b06ac8', dk: '#150820' },
  { id: 'g5', hex: '#f0d050', dk: '#1e1a04' },
  { id: 'g6', hex: '#e06060', dk: '#1e0606' },
  { id: 'g7', hex: '#5adada', dk: '#041616' },
  { id: 'g8', hex: '#a0c840', dk: '#101a04' },
];
const SYMS = ['🌱','🪴','🌿','☘️','🍃','🌻','💧','🔬','💎','🍀'];
const PROD_COLORS = ['#4caf70','#5aabf0','#e8884a','#b06ac8','#f0d050','#e06060','#5adada','#a0c840','#e0a0f0','#f0c080'];

// =====================================================================
//  [SEKTION]: TEXT-REGISTER
//  ---------------------------------------------------------------------
//  Alle User-sichtbaren Texte laufen durch dieses Register. Das hat drei
//  Gründe:
//
//  1. KONSISTENZ: Ein Text existiert an einer Stelle, nicht kopiert
//     durch den Code verteilt. Änderungen passieren an einer Stelle.
//
//  2. MEISTERWERK-TON: Alle Texte lassen sich zentral auf Ton, Präzision
//     und Ehrlichkeit prüfen. Kein Success-Theater, keine Vagheit.
//
//  3. INTERNATIONALISIERUNG VORBEREITEN: Später kann daneben T_EN.*,
//     T_ES.* etc. leben, und ein Language-Switch wechselt die Quelle.
//
//  KONVENTION:
//  - Funktionen statt reine Strings wenn dynamische Einsetzungen nötig
//  - Namen beschreiben den Zweck, nicht den Wortlaut
//  - Parameter-Aufrufe mit Objekten: T.water.warningTooMuch({ expected: 2500 })
//  - Kontextuelle Varianten via seedType × growType × phase wo nötig
//  - Kein Hardcoded-Text in der Logik mehr — erst durchs Register
//
//  MIGRATIONS-HINWEIS:
//  Die App hat historisch viele Inline-Texte. Diese werden schrittweise
//  ins Register migriert. Neue Features ab sofort nur über T.* .
//  Bereich für Bereich wird umgezogen, nicht alles auf einmal.
// =====================================================================
const T = {
  // ---------------------------------------------------------------------
  // PHASES — Anzeige-Namen der Pflanzen-Phasen
  // ---------------------------------------------------------------------
  phase: {
    anzucht: 'Anzucht',
    vorzucht: 'Vorzucht',
    vegi_out: 'Wachstum draußen',
    abhärten: 'Abhärten',
    bloom: 'Blüte',
    flush: 'Spülen',
    ice: 'IceFlush',
    harvest: 'Ernte',
    dry: 'Trocknen',
  },

  // ---------------------------------------------------------------------
  // SEED TYPES — Sortentypen
  // ---------------------------------------------------------------------
  seedType: {
    auto: 'Automatic',
    fem: 'Feminisiert',
    // Kurze Beschreibungen für Erklärungen inline
    autoDesc: 'Blüht automatisch nach Alter — Lichtzyklus bleibt konstant',
    femDesc: 'Blüte wird durch Licht getriggert — manuell 12/12 umschalten (Indoor) oder Saison (Outdoor)',
  },

  // ---------------------------------------------------------------------
  // GROW TYPES
  // ---------------------------------------------------------------------
  growType: {
    indoor: 'Indoor',
    outdoor: 'Outdoor',
  },

  // ---------------------------------------------------------------------

const STAGE_NAMES = {
  1: 'Keimung', 2: 'Sämling', 3: 'Vegetation', 4: 'Pre-Flower',
  5: 'Frühe Blüte', 6: 'Späte Blüte', 7: 'Spülphase',
  8: 'Ernte', 9: 'Trocknung',
};

/**
 * Map a cycle's current position (date + phase config) to stage number 1-9.
 * Rules:
 *  - Stage 1-2 live inside phase "anzucht" (first 5/14 days)
 *  - Stage 3-4 also within anzucht for photoperiod (vegetation + pre-flower)
 *  - Stage 5-6 within phase "bloom" (early/late split)
 *  - Stage 7: phase "flush"
 *  - Stage 8: phase "harvest"
 *  - Stage 9: phase "dry" or "ice"
 * For Automatics, "anzucht" only covers 21 days and bloom is shorter,
 * so we use shorter thresholds.
 */
function stageForCycle(cyc, iso) {
  if (!cyc || !cyc.startDate) return null;
  const p = phase(iso || todayISO(), cyc);
  if (!p) return null;
  const day = p.day; // 1-based day in the cycle
  const ph = p.ph;
  const isAuto = (cyc.seedType || '').toLowerCase().indexOf('auto') >= 0;

  if (ph === 'anzucht' || ph === 'vorzucht') {
    // Subdivide germination → seedling → vegetation → pre-flower
    const dayForStage = (ph === 'vorzucht' && p.vegDay) ? p.vegDay : day;
    if (dayForStage <= 5) return 1;                  // Keimung
    if (dayForStage <= 14) return 2;                 // Sämling
    if (isAuto) {
      if (dayForStage <= 21) return 3;
      return 4;
    }
    const anzuchtLen = cyc.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
    const stretchStart = Math.max(35, anzuchtLen - 14);
    if (dayForStage < stretchStart) return 3;
    return 4;
  }

  if (ph === 'abhärten') return 3;    // Noch Vegi
  if (ph === 'vegi_out') return 3;    // Wachstum draußen = Vegetation

  if (ph === 'bloom') {
    const bloomLen = cyc.bloomDays || PHASE_DEFAULTS.bloomDays;
    const bloomDay = day - (cyc.anzuchtDays || PHASE_DEFAULTS.anzuchtDays);
    // First ~40% early flower, rest late flower
    if (bloomDay <= Math.ceil(bloomLen * 0.4)) return 5;
    return 6;
  }

  if (ph === 'flush') return 7;
  if (ph === 'harvest') return 8;
  if (ph === 'ice' || ph === 'dry') return 9;
  return null;
}

/**
 * Sucht Strain-Vorlagen die zum gegebenen Namens-Fragment passen.
 * Case-insensitive, einfacher Substring-Match auf dem Namen.
 */
function findStrainMatches(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase().trim();
  return STRAINS.filter(s => s.name.toLowerCase().includes(q)).slice(0, 5);
}

/**
 * Liefert den vollen Datensatz zu einem Strain-Namen (exakter Match, case-insensitive).
 * @returns {object|null} Strain-Objekt oder null wenn nicht gefunden
 */
function getStrainDetails(name) {
  if (!name) return null;
  const q = name.toLowerCase().trim();
  return STRAINS.find(s => s.name.toLowerCase() === q) || null;
}

/**
 * Gibt alle Strains zurück, optional gefiltert nach Typ (auto/fem).
 * Sortiert nach Schwierigkeit aufsteigend (anfängerfreundlichste zuerst).
 */
function listStrains(filter = {}) {
  let list = STRAINS.slice();
  if (filter.type) list = list.filter(s => s.type === filter.type);
  if (filter.maxDifficulty) list = list.filter(s => (s.difficulty || 2) <= filter.maxDifficulty);
  return list.sort((a, b) => (a.difficulty || 2) - (b.difficulty || 2));
}

/**
 * Formatiert Schwierigkeitsgrad als lesbaren Text.
 */
function strainDifficultyLabel(d) {
  return d === 1 ? 'Anfänger' : d === 2 ? 'Fortgeschritten' : d === 3 ? 'Profi' : '—';
}

/**
 * Diagnose-Engine: Bewertet alle Probleme gegen ein User-Symptom-Profil
 * und liefert die wahrscheinlichsten Diagnosen sortiert nach Match-Score.
 *
 * @param {object} symptoms  {location: string[], colors: string[], shapes: string[], timing: string}
 * @param {object} ctx       Kontextuelle App-Daten: {phase, phHigh, phLow, tempHot, tempCold, restHigh, restLow, ecDeltaPos, ecDeltaNeg, humidityHigh, daysToHarvestLow, runoffDriftHigh, runoffDriftLow}
 * @returns {Array<{problem, score, matchedReasons, contextReasons}>} sortiert absteigend
 */
function diagnoseProblems(symptoms, ctx = {}) {
  const sLocation = symptoms.location || [];
  const sColors = symptoms.colors || [];
  const sShapes = symptoms.shapes || [];

  const results = PROBLEMS.map(p => {
    // Symptom-Score: anteilige Übereinstimmung zwischen User-Input und Problem-Profil
    const pLoc = p.symptoms.location || [];
    const pCol = p.symptoms.color || [];
    const pShp = p.symptoms.shape || [];

    const matchedLoc = sLocation.filter(l => pLoc.includes(l));
    const matchedCol = sColors.filter(c => pCol.includes(c));
    const matchedShp = sShapes.filter(s => pShp.includes(s));

    // Anzahl matchender Bereiche (0-3)
    let areas = 0;
    if (matchedLoc.length > 0) areas++;
    if (matchedCol.length > 0) areas++;
    if (matchedShp.length > 0) areas++;

    // Mindestens 1 Bereich muss matchen — sonst raus
    if (areas === 0) return null;

    // Basisscore: 0-1 je nach Anzahl übereinstimmender Bereiche
    let score = areas / 3;

    // Kontext-Boost: jeder matchende Kontext +5%, maximal +20%
    const matchedReasons = [];
    const contextReasons = [];

    if (matchedLoc.length > 0) matchedReasons.push(matchedLoc.join(', '));
    if (matchedCol.length > 0) matchedReasons.push(matchedCol.join(', '));
    if (matchedShp.length > 0) matchedReasons.push(matchedShp.join(', '));

    const pCtx = p.context || {};
    let ctxBoost = 0;
    if (pCtx.phase && ctx.phase) {
      if (pCtx.phase.includes(ctx.phase) || (pCtx.phase.includes('vegi') && ['anzucht','vorzucht','vegi_out','abhärten'].includes(ctx.phase))) {
        ctxBoost += 0.05; contextReasons.push(`passt zu Phase (${ctx.phase})`);
      }
    }
    if (pCtx.phHigh && ctx.phHigh) { ctxBoost += 0.05; contextReasons.push('pH zu hoch'); }
    if (pCtx.phLow && ctx.phLow) { ctxBoost += 0.05; contextReasons.push('pH zu niedrig'); }
    if (pCtx.tempHot && ctx.tempHot) { ctxBoost += 0.05; contextReasons.push('Temperatur zu warm'); }
    if (pCtx.tempCold && ctx.tempCold) { ctxBoost += 0.05; contextReasons.push('Temperatur zu kalt'); }
    if (pCtx.tempWarm && ctx.tempWarm) { ctxBoost += 0.03; contextReasons.push('warmes Klima'); }
    if (pCtx.restHigh && ctx.restHigh) { ctxBoost += 0.05; contextReasons.push('Erde dauer-feucht'); }
    if (pCtx.restLow && ctx.restLow) { ctxBoost += 0.05; contextReasons.push('Erde sehr trocken'); }
    if (pCtx.ecDeltaPos && ctx.ecDeltaPos) { ctxBoost += 0.05; contextReasons.push('EC-Runoff steigend'); }
    if (pCtx.ecDeltaNeg && ctx.ecDeltaNeg) { ctxBoost += 0.05; contextReasons.push('EC-Runoff fallend'); }
    if (pCtx.ecLow && ctx.ecLow) { ctxBoost += 0.03; contextReasons.push('EC zu niedrig'); }
    if (pCtx.humidityHigh && ctx.humidityHigh) { ctxBoost += 0.05; contextReasons.push('Luftfeuchte zu hoch'); }
    if (pCtx.daysToHarvestLow && ctx.daysToHarvestLow) { ctxBoost += 0.05; contextReasons.push('Ernte-Fenster nahe'); }
    if (pCtx.runoffDriftHigh && ctx.runoffDriftHigh) { ctxBoost += 0.08; contextReasons.push('Runoff-pH driftet hoch'); }
    if (pCtx.runoffDriftLow && ctx.runoffDriftLow) { ctxBoost += 0.08; contextReasons.push('Runoff-pH driftet niedrig'); }
    ctxBoost = Math.min(ctxBoost, 0.2);

    // Phasen-Ausschluss: z.B. Stickstoff-Mangel in Flush ist normal
    if (pCtx.ignoreInFlush && ctx.phase === 'flush') return null;

    score = Math.min(1, score + ctxBoost);
    return { problem: p, score, matchedReasons, contextReasons };
  }).filter(Boolean);

  // Sortiert absteigend nach Score, top 5
  return results.sort((a, b) => b.score - a.score).slice(0, 5);
}

/**
 * Extrahiert kontextuelle Hinweise aus App-Daten für einen Zyklus zur
 * Verwendung mit diagnoseProblems(). Nutzt contextFor, letzte Entries,
 * Runoff-Analyse, etc.
 */
function buildDiagnosticContext(c, iso = null) {
  const refISO = iso || todayISO();
  const ctxObj = contextFor(c, refISO);
  const hc = harvestCountdown(c, refISO);
  const result = {};

  if (ctxObj) {
    // Phase als flacher String
    if (ctxObj.isVegi) result.phase = 'vegi';
    else if (ctxObj.isBloom) result.phase = 'bloom';
    else if (ctxObj.isFlush) result.phase = 'flush';
    else if (ctxObj.isIce) result.phase = 'ice';
    else if (ctxObj.isHarvest) result.phase = 'harvest';
  }

  // Ernte-Nähe
  if (hc && hc.daysRemaining <= 14) result.daysToHarvestLow = true;

  // Letzte Entries prüfen (3 Tage rückwärts) für pH/Temp/Runoff-Hinweise
  const entries = [];
  for (let dBack = 0; dBack <= 3; dBack++) {
    const thisISO = isoPlus(refISO, -dBack);
    if (S.entries[thisISO]) {
      const e = S.entries[thisISO];
      const cd = e.cycleData?.[c.id];
      if (cd) entries.push({ iso: thisISO, e, cd });
    }
  }

  // pH-Durchschnitt aus den letzten Tagen (wenn gemessen, nicht _suggested)
  let phSum = 0, phCount = 0;
  entries.forEach(({ e, cd }) => {
    const sugg = cd._suggested || {};
    if (cd.ph && !sugg.ph) {
      const ph = parseFloat(cd.ph);
      if (isFinite(ph)) { phSum += ph; phCount++; }
    }
  });
  if (phCount >= 2) {
    const phAvg = phSum / phCount;
    if (phAvg > 6.6) result.phHigh = true;
    else if (phAvg < 6.0) result.phLow = true;
  }

  // Temperatur aus dem letzten Entry
  const latestEntry = entries[0];
  if (latestEntry && latestEntry.e.temp) {
    const t = parseFloat(latestEntry.e.temp);
    if (isFinite(t)) {
      if (t >= 30) result.tempHot = true;
      else if (t <= 18) result.tempCold = true;
      if (t >= 25) result.tempWarm = true;
    }
  }
  if (latestEntry && latestEntry.e.humidity) {
    const h = parseFloat(latestEntry.e.humidity);
    if (isFinite(h) && h >= 70) result.humidityHigh = true;
  }

  // Restgewicht (Hebe oder Waage)
  if (latestEntry) {
    let pct = null;
    if (latestEntry.cd.weightG && c.saturatedWeight && c.dryWeight) {
      pct = calcRestPct(latestEntry.cd.weightG, c.saturatedWeight, c.dryWeight);
    } else if (latestEntry.cd.restPct !== undefined) {
      pct = parseFloat(latestEntry.cd.restPct);
    }
    if (pct !== null) {
      if (pct > 65) result.restHigh = true;
      if (pct < 25) result.restLow = true;
    }
  }

  // Runoff-Analyse aus letztem Entry
  if (latestEntry) {
    const ra = analyzeRunoff(latestEntry.cd);
    if (ra.ecStatus === 'warning-high') result.ecDeltaPos = true;
    if (ra.ecStatus === 'warning-low') result.ecDeltaNeg = true;
    if (ra.phStatus === 'warning-high') result.runoffDriftHigh = true;
    if (ra.phStatus === 'warning-low') result.runoffDriftLow = true;
  }

  return result;
}

// =====================================================================
/**
 * Wizard-State. Wird bei openDiagnostics() zurückgesetzt.
 *   step: 1=Wo, 2=Wie, 3=Seit-wann, 4=Ergebnis
 *   cycleId: welcher Zyklus liefert den Kontext (optional)
 */
let diagState = {
  step: 1,
  cycleId: null,
  location: [],   // e.g. ['oldLeaves', 'allLeaves']
  colors: [],     // e.g. ['yellow', 'spots']
  shapes: [],     // e.g. ['curlUp']
  timing: null,   // 'hours' | 'days' | 'weeks'
};

/**
 * Öffnet den Diagnose-Wizard. Optional mit cycleId vom aufrufenden Kontext
 * (z.B. Dashboard-Alert-Card) — dann wird beim Ergebnis automatisch der
 * Kontext dieses Zyklus eingespeist.
 */
function openDiagnostics(cycleId = null) {
  diagState = { step: 1, cycleId, location: [], colors: [], shapes: [], timing: null };
  renderDiagWizard();
}

function closeDiagnostics() {
  const el = document.getElementById('diag-wizard');
  if (el) el.remove();
}

/**
 * Einstieg aus dem Wissen-Tab. Nutzt den ersten aktiven Zyklus für Kontext,
 * oder startet ohne Kontext wenn keine aktiven Zyklen existieren.
 */
function openDiagnosticsFromTips() {
  const act = active();
  openDiagnostics(act.length > 0 ? act[0].id : null);
}

/**
 * Blendet den Diagnose-Hint für einen Zyklus aus bis die Bedingungen sich ändern.
 * Einträge in S.dismissedDiagHints werden beim nächsten neuen Trigger-Signal
 * zurückgesetzt (siehe resetDiagHintDismissal).
 */
function dismissDiagHint(cycleId) {
  if (!S.dismissedDiagHints) S.dismissedDiagHints = [];
  if (!S.dismissedDiagHints.includes(cycleId)) {
    S.dismissedDiagHints.push(cycleId);
    saveS();
  }
  renderDash();
}

/**
 * Proaktive Hinweise: Prüft Zyklus auf kritische Kontext-Signale und liefert,
 * wenn auffällige Muster vorhanden sind, einen Hint der den Diagnose-Flow
 * vorschlägt. Wird im Dashboard als sanfter Vorschlag gezeigt.
 *
 * Kriterien (mindestens EINES muss zutreffen für einen Hinweis):
 *   - pH-Historie driftet (phHigh ODER phLow aus gemessenen Werten)
 *   - Runoff-pH weicht deutlich vom Input ab (runoffDriftHigh / runoffDriftLow)
 *   - Runoff-EC steigt stark (ecDeltaPos — Salz-Akkumulation)
 *   - Extreme Restgewicht-Zone (restHigh = Überwässerung, restLow = Dehydration)
 *   - Temperatur kritisch (tempHot ≥30°C oder tempCold ≤18°C)
 *
 * @param {object} c  Zyklus-Objekt
 * @returns {object|null} {icon, text, cycleId} oder null wenn nichts auffällig
 */
function getDiagnosticHints(c) {
  if (!c || !c.startDate) return null;
  const ctx = buildDiagnosticContext(c);

  const signals = [];
  if (ctx.phHigh) signals.push('pH-Werte der letzten Tage liegen hoch');
  if (ctx.phLow) signals.push('pH-Werte der letzten Tage liegen niedrig');
  if (ctx.runoffDriftHigh) signals.push('Runoff-pH steigt deutlich über Input');
  if (ctx.runoffDriftLow) signals.push('Runoff-pH fällt deutlich unter Input');
  if (ctx.ecDeltaPos) signals.push('Runoff-EC steigt — Salze sammeln sich');
  if (ctx.restHigh) signals.push('Erde bleibt dauerhaft feucht');
  if (ctx.restLow) signals.push('Erde ist sehr trocken');
  if (ctx.tempHot) signals.push('Raumtemperatur zu hoch');
  if (ctx.tempCold) signals.push('Raumtemperatur zu niedrig');
  if (ctx.humidityHigh) signals.push('Luftfeuchte erhöht — Schimmel-Risiko');

  if (signals.length === 0) return null;

  // Wir nehmen max 2 Signale in den Text damit die Karte nicht überladen wirkt
  const displaySignals = signals.slice(0, 2);
  return {
    icon: '🔍',
    text: `Auffällige Messwerte bei <b>${c.name}</b>: ${displaySignals.join(', ')}. Symptome an der Pflanze sichtbar? Jetzt diagnostizieren.`,
    cycleId: c.id,
  };
}

/**
 * Toggle-Helper für Multi-Select-Optionen.
 */
function diagToggle(field, value) {
  const arr = diagState[field];
  const idx = arr.indexOf(value);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(value);
  renderDiagWizard();
}

function diagSetTiming(value) {
  diagState.timing = value;
  renderDiagWizard();
}

function diagGoTo(step) {
  // Validierung bei Vorwärts-Navigation
  if (step > diagState.step) {
    if (diagState.step === 1 && diagState.location.length === 0) {
      toast('Bitte mindestens einen Ort wählen');
      return;
    }
    if (diagState.step === 2 && diagState.colors.length === 0 && diagState.shapes.length === 0) {
      toast('Bitte mindestens eine Farbe oder Form wählen');
      return;
    }
  }
  diagState.step = step;
  renderDiagWizard();
}

/**

 */
function renderDiagWizard() {
  // Existiert das Element schon? Dann nur den Body ersetzen.
  let root = document.getElementById('diag-wizard');
  if (!root) {
    root = document.createElement('div');
    root.id = 'diag-wizard';
    root.setAttribute('data-day-picker', '1'); // ermöglicht Schließen via ESC-Patterns
    root.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;font-family:var(--font);color:var(--text)';
    document.body.appendChild(root);
  }

  const step = diagState.step;
  const totalSteps = 4;

  // Header mit Fortschritts-Indikator
  const header = `<div style="flex-shrink:0;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border)">
    <button onclick="closeDiagnostics()" style="background:transparent;border:none;color:var(--text-sub);font-size:20px;cursor:pointer;padding:4px 8px">✕</button>

    <div style="display:flex;gap:3px">
      ${[1,2,3,4].map(i => `<span style="width:20px;height:3px;border-radius:2px;background:${i <= step ? 'var(--green)' : 'var(--card2)'}"></span>`).join('')}

  // Body je nach Schritt
  let body = '';
  if (step === 1) body = renderDiagStep1();
  else if (step === 2) body = renderDiagStep2();
  else if (step === 3) body = renderDiagStep3();
  else if (step === 4) body = renderDiagStep4();

  // Footer mit Navigation
  const footer = renderDiagFooter();

  root.innerHTML = header + `<div style="flex:1;overflow-y:auto;padding:20px 16px 12px" class="scroll">${body}</div>` + footer;
}

// =====================================================================
//  [SEKTION]: CUSTOM DÜNGER-PRESETS (Phase 4 Schritt 5)
// =====================================================================
/**
 * Einheitlicher Zugriff auf Presets — liefert das Objekt unabhängig davon
 * ob es ein System-Preset (FERT_PRESETS) oder ein User-Preset (S.customPresets)
 * ist. Custom-Preset-Keys haben das Präfix "custom_".
 */
function getPreset(key) {
  if (!key) return null;
  if (key.startsWith('custom_')) {
    return (S.customPresets && S.customPresets[key]) || null;
  }
  return FERT_PRESETS[key] || null;
}

/**
 * Erzeugt eine eindeutige Custom-Preset-ID.
 * Nutzt Date.now() + Sub-Millisekunden-Zähler + Kollisions-Check
 * (falls zwei Presets im selben Tick erstellt werden).
 */
let _presetIdCounter = 0;
function nextCustomPresetId() {
  _presetIdCounter++;
  let candidate = 'custom_' + Date.now().toString(36) + '_' + _presetIdCounter.toString(36);
  // Belt-and-suspenders: bei Kollision hochzählen bis frei
  while (S.customPresets && S.customPresets[candidate]) {
    _presetIdCounter++;
    candidate = 'custom_' + Date.now().toString(36) + '_' + _presetIdCounter.toString(36);
  }
  return candidate;
}

/**
 * Liefert eine vereinte Liste aller verfügbaren Preset-Keys mit Metadaten.
 * Reihenfolge: System-Presets zuerst, dann Custom (alphabetisch nach Name).
 */
function listAllPresets() {
  const result = Object.entries(FERT_PRESETS).map(([key, p]) => ({
    key, name: p.name, subtitle: p.subtitle, isCustom: false,
  }));
  if (S.customPresets) {
    const custom = Object.entries(S.customPresets).map(([key, p]) => ({
      key, name: p.name, subtitle: p.subtitle || 'Eigenes Preset', isCustom: true,
    }));
    custom.sort((a, b) => a.name.localeCompare(b.name));
    result.push(...custom);
  }
  return result;
}

/**
 * Erzeugt ein Custom-Preset aus dem aktuellen Setup (S.products + S.weekSchedule).
 * Übernimmt Produkte und Wochenplan so wie sie gerade eingestellt sind.
 * @returns {string|null} ID des neuen Presets, oder null wenn keine Produkte.
 */
function createCustomPresetFromCurrent(name, subtitle = '') {
  if (!S.products || S.products.length === 0) return null;
  const id = nextCustomPresetId();

  const products = S.products.map(p => ({
    name: p.name, unit: p.unit, color: p.color, note: p.note || '',
  }));
  const schedule = JSON.parse(JSON.stringify(S.weekSchedule || {}));

  const preset = {
    name: name || 'Mein Preset',
    subtitle: subtitle || 'Eigenes Preset',
    doseMode: 'per-watering',
    mixOrder: products.map(p => p.name),
    mixInfo: S.mixInfo || 'Reihenfolge wie oben — CalMag zuerst, Chelat-Additive zuletzt.',
    drainInfo: '5–10 % Drain bei jedem Guss erzeugen. Drain sofort entsorgen.',
    weekFocus: {},
    products,
    schedule,
    _createdAt: new Date().toISOString(),
  };

  if (!S.customPresets) S.customPresets = {};
  S.customPresets[id] = preset;
  saveS();
  return id;
}

/**
 * Löscht ein Custom-Preset. Wenn es gerade aktiv ist, wird presetKey auf null gesetzt.
 */
function deleteCustomPreset(key) {
  if (!key || !key.startsWith('custom_')) return false;
  if (!S.customPresets || !S.customPresets[key]) return false;
  delete S.customPresets[key];
  if (S.presetKey === key) S.presetKey = null;
  saveS();
  return true;
}

/**
 * Exportiert ein Custom-Preset als JSON-String (für Clipboard/Download).
 */
function exportCustomPreset(key) {
  const p = getPreset(key);
  if (!p) return null;
  const exported = {
    _type: 'growsmart_preset',
    _version: 1,
    _exportedAt: new Date().toISOString(),
    name: p.name,
    subtitle: p.subtitle,
    doseMode: p.doseMode,
    mixOrder: p.mixOrder,
    mixInfo: p.mixInfo,
    drainInfo: p.drainInfo,
    weekFocus: p.weekFocus || {},
    products: p.products,
    schedule: p.schedule,
  };
  return JSON.stringify(exported, null, 2);
}

/**
 * Importiert ein Custom-Preset aus einem JSON-String.
 * Validiert Pflichtfelder; gibt neue ID bei Erfolg zurück, null bei Fehler.
 */
function importCustomPreset(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    // Basis-Validierung
    if (data._type !== 'growsmart_preset') throw new Error('Falsches Format');
    if (!data.name || typeof data.name !== 'string') throw new Error('Name fehlt');
    if (!Array.isArray(data.products)) throw new Error('Produkte fehlen');
    if (typeof data.schedule !== 'object') throw new Error('Schedule fehlt');

    const id = nextCustomPresetId();
    if (!S.customPresets) S.customPresets = {};
    S.customPresets[id] = {
      name: data.name,
      subtitle: data.subtitle || 'Importiertes Preset',
      doseMode: data.doseMode || 'per-watering',
      mixOrder: data.mixOrder || [],
      mixInfo: data.mixInfo || '',
      drainInfo: data.drainInfo || '',
      weekFocus: data.weekFocus || {},
      products: data.products,
      schedule: data.schedule,
      _importedAt: new Date().toISOString(),
    };
    saveS();
    return id;
  } catch (e) {
    return null;
  }
}

async function saveCurrentAsPreset() {
  if (!S.products || S.products.length === 0) {
    toast('⚠ Kein Plan zum Speichern — erst Produkte hinzufügen');

  }
  const name = await customPrompt({

  });

  const id = createCustomPresetFromCurrent(name.trim(), '');

    toast(`🎨 "${name}" gespeichert`);
    vibrate(15);
    if (typeof renderSet === 'function') renderSet();
  }

/**
 * Exportiert ein Custom-Preset als JSON in die Zwischenablage.
 */
async function exportCustomPresetToClipboard(key) {
  const json = exportCustomPreset(key);
  if (!json) { toast('Preset nicht gefunden'); return; }
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(json);
      toast('📤 Als JSON in Zwischenablage kopiert');
    } else {
      // Fallback: Textarea anzeigen zum manuellen Kopieren
      const win = window.open('', '_blank');
      if (win) {
        win.document.write(`<pre style="white-space:pre-wrap;word-break:break-all">${json.replace(/</g,'&lt;')}</pre>`);
        win.document.close();
      } else {
        toast('Clipboard nicht verfügbar — Text manuell kopieren');
      }
    }
  } catch (e) {
    toast('Export fehlgeschlagen: ' + e.message);
  }
}

 */
async function promptImportPreset() {

    msg: 'Füge hier einen exportierten Preset-JSON ein. Er wird als neues eigenes Preset hinzugefügt.',

/**
 * Sammelt alle Fotos eines Zyklus chronologisch mit Kontext-Metadaten.
 * Liefert Array von {date, src, phaseDay, phaseName, notes, dayNumber}.
 * dayNumber = Tag im Zyklus ab startDate (nicht die Phasen-Tag-Nummer).
 */
function collectCyclePhotos(c) {
  if (!c || !c.startDate) return [];
  const photos = [];
  const dates = Object.keys(S.entries || {}).sort();
  dates.forEach(d => {
    const e = S.entries[d];
    if (!e || !e.cycleData) return;
    const cd = e.cycleData[c.id];
    if (!cd || !cd.photos || cd.photos.length === 0) return;
    const p = phase(d, c);
    if (!p) return; // Foto außerhalb des Zyklus
    const dayNumber = isoDiff(d, c.startDate) + 1;
    cd.photos.forEach((src, idx) => {
      photos.push({
        date: d,
        src,
        idx,
        phaseDay: p.day,
        phaseName: PN[p.ph] || '',
        notes: cd.notes || '',
        dayNumber,
      });
    });
  });
  return photos;
}

/**
 * Erzeugt eine Collage als Data-URL (PNG) aus allen Fotos des Zyklus.
 * Raster-Layout mit Tag-/Phase-Overlay auf jedem Bild, Titel-Header oben,
 * Metadaten-Footer unten.
 *
 * Canvas-Größe 1080×1920 (9:16, Instagram-Story). Raster passt sich an Foto-Anzahl an.
 *
 * @param {object} c  Zyklus
 * @returns {Promise<string|null>} Data-URL (PNG) oder null wenn keine Fotos
 */
async function generateCycleCollage(c) {
  const photos = collectCyclePhotos(c);
  if (photos.length === 0) return null;

  // Canvas-Dimensionen
  const W = 1080, H = 1920;
  const headerH = 180;
  const footerH = 160;
  const gridPadding = 20;
  const gridTop = headerH + 10;
  const gridBottom = H - footerH - 10;
  const gridH = gridBottom - gridTop;

  // Raster-Dimensionen: quadratisch, automatisch bestimmt
  const n = photos.length;
  let cols = Math.ceil(Math.sqrt(n * (W / gridH)));
  if (cols < 2) cols = 2;
  if (cols > 6) cols = 6;
  const rows = Math.ceil(n / cols);
  const cellW = (W - gridPadding * (cols + 1)) / cols;
  const cellH = (gridH - gridPadding * (rows + 1)) / rows;

  // Canvas erzeugen
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Hintergrund (Dark Mode passend)
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0e0a');
  grad.addColorStop(0.5, '#0e1410');
  grad.addColorStop(1, '#080a08');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Zyklus-Farbe für Akzent
  const cycleColor = col(c).hex;

  // HEADER
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px -apple-system, system-ui, sans-serif';
  ctx.fillText(sym(c) + '  ' + c.name, W / 2, 80);

  // Strain + Zyklus-Dauer
  const startDate = fmtDE(c.startDate, { day: '2-digit', month: '2-digit', year: 'numeric' });
  const lastDate = photos[photos.length - 1].date;
  const days = isoDiff(lastDate, c.startDate) + 1;
  ctx.fillStyle = '#a0a0a0';
  ctx.font = '26px -apple-system, system-ui, sans-serif';
  const subtitle = `${startDate} · ${days} Tage · ${photos.length} Fotos`;
  ctx.fillText(subtitle, W / 2, 120);

  // Akzent-Linie
  ctx.strokeStyle = cycleColor;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 100, 148);
  ctx.lineTo(W / 2 + 100, 148);
  ctx.stroke();

  // FOTOS — parallel laden
  const loaded = await Promise.all(photos.map(ph => new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ ph, img });
    img.onerror = () => resolve(null);
    img.src = ph.src;
  })));

  loaded.forEach((item, i) => {
    if (!item) return;
    const { ph, img } = item;
    const col_i = i % cols;
    const row_i = Math.floor(i / cols);
    const x = gridPadding + col_i * (cellW + gridPadding);
    const y = gridTop + gridPadding + row_i * (cellH + gridPadding);

    // Bild-Aspect-Ratio erhalten (object-cover)
    const srcRatio = img.width / img.height;
    const dstRatio = cellW / cellH;
    let sx = 0, sy = 0, sw = img.width, sh = img.height;
    if (srcRatio > dstRatio) {
      // Bild zu breit — seitlich croppen
      sw = img.height * dstRatio;
      sx = (img.width - sw) / 2;
    } else {
      // Bild zu hoch — oben/unten croppen
      sh = img.width / dstRatio;
      sy = (img.height - sh) / 2;
    }

    // Rundecken-Clipping
    const r = 10;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + cellW - r, y);
    ctx.quadraticCurveTo(x + cellW, y, x + cellW, y + r);
    ctx.lineTo(x + cellW, y + cellH - r);
    ctx.quadraticCurveTo(x + cellW, y + cellH, x + cellW - r, y + cellH);
    ctx.lineTo(x + r, y + cellH);
    ctx.quadraticCurveTo(x, y + cellH, x, y + cellH - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(img, sx, sy, sw, sh, x, y, cellW, cellH);

    // Tag-Overlay unten
    const overlayH = 30;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(x, y + cellH - overlayH, cellW, overlayH);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`T${ph.dayNumber}`, x + 8, y + cellH - 10);
    ctx.textAlign = 'right';
    ctx.fillStyle = cycleColor;
    ctx.fillText(ph.phaseName, x + cellW - 8, y + cellH - 10);

    ctx.restore();
  });

  // FOOTER
  ctx.textAlign = 'center';
  ctx.fillStyle = '#606060';
  ctx.font = '20px -apple-system, system-ui, sans-serif';
  ctx.fillText('Erstellt mit GrowSmart', W / 2, H - 80);
  ctx.fillStyle = cycleColor;
  ctx.font = 'bold 22px -apple-system, system-ui, sans-serif';
  if (c.strain) ctx.fillText(c.strain, W / 2, H - 40);

  return canvas.toDataURL('image/png');
}
