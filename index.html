let _pColor = PROD_COLORS[0];

async function loadPreset(key) {
  const pr = FERT_PRESETS[key];
  if (!pr) return;
  const ok = await customConfirm(
    `"${pr.name}" laden?`,
    'Produkte & Wochenplan werden ersetzt. Deine aktuellen Dünger-Einstellungen gehen verloren.',
    'Laden', 'var(--green)'
  );
  if (!ok) return;

  S.products = pr.products.map((p, i) => ({ id: 'p' + Date.now() + i, ...p }));
  S.weekSchedule = {};
  Object.entries(pr.schedule).forEach(([w, doses]) => {
    const mapped = {};
    Object.entries(doses).forEach(([name, dose]) => {
      const prod = S.products.find(p => p.name === name);
      if (prod) mapped[prod.id] = dose;
    });
    S.weekSchedule['global_w' + w] = mapped;
  });
  S.presetKey = key;
  S.mixOrder = pr.mixOrder;
  S.mixInfo = pr.mixInfo;
  S.drainInfo = pr.drainInfo || null;
  saveS();
  renderDuenger();
  toast(`${pr.name} geladen ✓`);
}

function selPC(c) {
  _pColor = c;
  PROD_COLORS.forEach((x, i) => {
    const el = document.getElementById('pc-' + i);
    if (el) el.style.borderColor = x === c ? '#fff' : 'transparent';
  });
}

function setGD(w, pid, v) {
  const k = 'global_w' + w;
  if (!S.weekSchedule[k]) S.weekSchedule[k] = {};
  S.weekSchedule[k][pid] = parseFloat(v) || 0;
}

function addProduct() { editProd = 'new'; _pColor = PROD_COLORS[0]; renderDuenger(); }
function editProduct(id) { editProd = id; const p = S.products.find(x => x.id === id); if (p) _pColor = p.color; renderDuenger(); }

function saveProd() {
  const name = document.getElementById('pn')?.value?.trim();
  if (!name) { toast('Name eingeben'); return; }
  const note = document.getElementById('pnote')?.value?.trim() || '';
  const unit = document.getElementById('punit')?.value || 'ml/L';
  if (editProd === 'new') {
    S.products.push({ id: 'p' + Date.now(), name, note, unit, color: _pColor });
  } else {
    const p = S.products.find(x => x.id === editProd);
    if (p) Object.assign(p, { name, note, unit, color: _pColor });
  }
  editProd = null;
  saveS();
  renderDuenger();
  toast('Gespeichert ✓');
}

async function delProduct(id) {
  const ok = await customConfirm('Produkt löschen?', 'Dieses Dünger-Produkt wird entfernt.', 'Löschen');
  if (!ok) return;
  S.products = S.products.filter(x => x.id !== id);
  saveS();
  renderDuenger();
  toast('Gelöscht');
}

function dd(k, v) { draft[k] = isNaN(v) || v === '' ? v : Number(v); }
function ddS(k, v) { draft[k] = v; renderSet(); }

function saveDraft() {
  const c = S.cycles.find(x => x.id === selId);
  if (!c) return;

  // Auto-activate if not yet active and has a startDate in draft
  if (!draft.active && draft.startDate) {
    draft.active = true;
  }
  // If active but no startDate, set today
  if (draft.active && !draft.startDate) {
    draft.startDate = todayISO();
  }

  // If start date changed, migrate entry data
  const old = c.startDate, nw = draft.startDate;
  if (old && nw && old !== nw) {
    const diff = isoDiff(nw, old);
    if (diff) {
      const keys = Object.keys(S.entries).sort((a, b) => diff > 0 ? b.localeCompare(a) : a.localeCompare(b));
      keys.forEach(d => {
        if (!S.entries[d]?.cycleData?.[c.id]) return;
        const nd = isoPlus(d, diff);
        const data = JSON.parse(JSON.stringify(S.entries[d].cycleData[c.id]));
        delete S.entries[d].cycleData[c.id];
        if (!S.entries[nd]) S.entries[nd] = { temp: '', humidity: '', cycleData: {} };
        if (!S.entries[nd].cycleData) S.entries[nd].cycleData = {};
        S.entries[nd].cycleData[c.id] = data;
      });
    }
  }

  Object.assign(c, { ...draft, id: c.id });
  saveS();
  vibrate();
  toast(`${sym(c)} ${c.name} gespeichert ✓`);
  renderSet();
}

function selCyc(id) { selId = id; draft = {}; renderSet(); }

function addCyc() {
  const i = S.cycles.length;
  const c = {
    id: Date.now().toString(), name: `Zyklus ${i + 1}`, location: '',
    active: true, startDate: todayISO(), colorId: COLORS[i % COLORS.length].id,
    symbol: SYMS[i % SYMS.length], seedType: 'auto', lightVeg: '18/6', lightBloom: '18/6',
    anzuchtDays: PHASE_DEFAULTS.anzuchtDays, bloomDays: PHASE_DEFAULTS.bloomDays,
    flushDays: PHASE_DEFAULTS.flushDays, iceDays: PHASE_DEFAULTS.iceDays,
    harvestDays: PHASE_DEFAULTS.harvestDays, dryDays: PHASE_DEFAULTS.dryDays,
    intAnzucht: RI.anzucht, intBloom: RI.bloom, intFlush: RI.flush,
    intIce: RI.ice, intErnte: RI.ernte, intDry: RI.dry,
    offsetHistory: [], toppingDate: null, toppingPause: 3, skippedDays: [],
  };
  S.cycles.push(c);
  selId = c.id;
  draft = { ...c };
  saveS();
  renderSet();
  toast(`🌱 ${c.name} erstellt — Start: ${fmtDE(c.startDate, {day:'2-digit',month:'2-digit'})}`);
}

function toggleAct(id, checked) {
  const c = S.cycles.find(x => x.id === id);
  if (!c) return;
  c.active = checked;
  if (checked && !c.startDate) c.startDate = todayISO();
  // Deactivating: keep data intact. Use "Archivieren" or "Löschen" for destructive actions.
  draft.active = c.active;
  draft.startDate = c.startDate;
  saveS();
  renderSet();
}

/** Archive a grow — keeps all data but removes from active schedule */
async function archiveCycle(id) {

    'Archivieren', 'var(--blue)'
  );

  c.active = false; // Deactivate from watering schedule

  draft.active = false;

  vibrate();
  toast(`📦 ${c.name} archiviert`);

}

/** Unarchive a grow — restore to editable state */
async function unarchiveCycle(id) {

/**
 * Count past watering days (giess/giess_anz/spuelen/ice) between startDate and today
 * that have no entry yet. Used to decide whether to show the backfill button and how
 * many days it covers.
 */
function countMissingPastWateringDays(c) {
  if (!c.startDate) return 0;
  const today = todayISO();
  let count = 0;
  let iter = c.startDate;
  // Safety limit: don't iterate more than 200 days (covers longest possible grow + buffer)
  for (let i = 0; i < 200 && iter < today; i++) {
    const a = getAction(iter, c);
    if (['giess','giess_anz','spuelen','ice'].includes(a)) {
      const existing = S.entries[iter]?.cycleData?.[c.id];
      const hasData = existing && (existing.water || existing.ph || (existing.doses && Object.values(existing.doses).some(v => v > 0)));
      if (!hasData) count++;
    }
    iter = isoPlus(iter, 1);
  }
  return count;
}

/**
 * Fill past watering days with planned values. Skips days that already have data
 * (non-destructive). Computes fertilizer week per phase + day, same logic as entry render.
 */
async function backfillPast(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c || !c.startDate) return;
  const missing = countMissingPastWateringDays(c);
  if (missing === 0) return;
  const ok = await customConfirm(
    `🕐 ${missing} vergangene Gießtage auto-eintragen?`,
    `Wasser, pH 6.4 und Plan-Dünger werden für ${missing} Gießtage zwischen ${fmtDE(c.startDate, {day:'2-digit',month:'short'})} und heute eingetragen. Bestehende Einträge bleiben unverändert.`,
    'Auto-eintragen', 'var(--yellow)'
  );
  if (!ok) return;
  
  const today = todayISO();
  let filled = 0;
  let iter = c.startDate;
  for (let i = 0; i < 200 && iter < today; i++) {
    const a = getAction(iter, c);
    if (['giess','giess_anz','spuelen','ice'].includes(a)) {
      const existing = S.entries[iter]?.cycleData?.[c.id];
      const hasData = existing && (existing.water || existing.ph || (existing.doses && Object.values(existing.doses).some(v => v > 0)));
      if (!hasData) {
        const p = phase(iter, c);
        if (p) {
          // Compute fert week: same as entry screen logic
          let fertWk = 1;
          if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
          else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
          else {
            const td = isoDiff(iter, c.startDate);
            fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10));
          }
          // Ensure entry exists with proper shape
          if (!S.entries[iter]) S.entries[iter] = { temp: '', humidity: '', cycleData: {} };
          if (!S.entries[iter].cycleData) S.entries[iter].cycleData = {};
          if (!S.entries[iter].cycleData[c.id]) S.entries[iter].cycleData[c.id] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
          const cd = S.entries[iter].cycleData[c.id];
          if (!cd.doses) cd.doses = {};
          
          const waterMl = waterSuggestion(c, p);
          cd.water = String(waterMl);
          cd.ph = '6.4';
          // Only fertilizers on normal watering days
          if (a === 'giess' || a === 'giess_anz') {
            const doses = getWeekDoses(c.id, fertWk, c);
            Object.entries(doses).forEach(([prodId, plan]) => {
              if (plan > 0) {
                const ml = Math.round((plan * waterMl / 1000) * 10) / 10;
                cd.doses[prodId] = ml;
              }
            });
          }
          // Environment: only set if still empty
          const e = S.entries[iter];
          if (!e.temp || String(e.temp).trim() === '') e.temp = '23.5';
          if (!e.humidity || String(e.humidity).trim() === '') e.humidity = '60';
          // Mark auto-filled so user knows
          if (!cd.notes) cd.notes = '🤖 Auto-eingetragen';
          filled++;
        }
      }
    }
    iter = isoPlus(iter, 1);
  }
  saveS();
  vibrate(20);
  toast(`✓ ${filled} Tage eingetragen`);
  renderSet();
}

/** Reset only notes for a cycle */
async function resetNotes(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c) return;
  const ok = await customConfirm(
    'Notizen löschen?',
    `Alle Notizen für "${c.name}" werden gelöscht. Wasser, pH, Fotos und Dünger-Daten bleiben erhalten.`,
    'Notizen löschen', 'var(--orange)'
  );
  if (!ok) return;
  Object.keys(S.entries).forEach(d => {
    if (S.entries[d]?.cycleData?.[id]) {
      S.entries[d].cycleData[id].notes = '';
    }
  });
  saveS();
  toast('Notizen gelöscht ✓');
}

/** Reset ALL data for a cycle (notes, water, pH, photos, doses) but keep cycle config */
async function resetAll(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c) return;
  const ok = await customConfirm(
    'Alles zurücksetzen?',
    `Alle Einträge für "${c.name}" werden gelöscht: Notizen, Wasser, pH, Fotos, Düngerdaten. Der Zyklus selbst bleibt erhalten.`,
    'Alles zurücksetzen'
  );
  if (!ok) return;
  Object.keys(S.entries).forEach(d => {
    if (S.entries[d]?.cycleData?.[id]) {
      delete S.entries[d].cycleData[id];
    }
    // Remove entry if no cycle data remains and no env data
    const e = S.entries[d];
    if (e && (!e.cycleData || Object.keys(e.cycleData).length === 0) && !e.temp && !e.humidity) {
      delete S.entries[d];
    }
  });
  // Reset offset, topping, and skipped days
  c.offsetHistory = [];
  c.toppingDate = null;
  c.skippedDays = [];
  saveS();
  renderSet();
  toast('Zurückgesetzt ✓');
}

/** Bulk: Remove notes from all inactive cycles */
async function resetInactive() {
  const inactive = S.cycles.filter(c => !c.active);
  if (inactive.length === 0) { toast('Keine inaktiven Zyklen'); return; }
  const ok = await customConfirm(
    'Notizen aller inaktiven Zyklen löschen?',
    `Betrifft ${inactive.length} Zyklen: ${inactive.map(c => sym(c)+' '+c.name).join(', ')}. Nur Notizen werden gelöscht, Wasser/pH/Fotos bleiben. Aktive Zyklen werden nicht verändert.`,
    'Notizen löschen', 'var(--orange)'
  );
  if (!ok) return;
  const inactiveIds = new Set(inactive.map(c => c.id));
  let count = 0;
  Object.keys(S.entries).forEach(d => {
    const cd = S.entries[d]?.cycleData || {};
    Object.keys(cd).forEach(cId => {
      if (inactiveIds.has(cId) && cd[cId].notes) {
        cd[cId].notes = '';
        count++;
      }
    });
  });
  saveS();
  toast(`✓ ${count} Notizen-Einträge geleert`);
}

/** Bulk: Wipe all data from inactive cycles */
async function wipeInactive() {
  const inactive = S.cycles.filter(c => !c.active);
  if (inactive.length === 0) { toast('Keine inaktiven Zyklen'); return; }
  const ok = await customConfirm(
    'Alle Daten inaktiver Zyklen löschen?',
    `Betrifft ${inactive.length} Zyklen: ${inactive.map(c => sym(c)+' '+c.name).join(', ')}. ALLE Einträge (Wasser, pH, Fotos, Notizen, Dünger) werden gelöscht. Die Zyklen selbst bleiben bestehen. Aktive Zyklen sind nicht betroffen.`,
    'Alle Daten löschen'
  );
  if (!ok) return;
  const inactiveIds = new Set(inactive.map(c => c.id));
  let count = 0;
  Object.keys(S.entries).forEach(d => {
    const e = S.entries[d];
    if (!e?.cycleData) return;
    Object.keys(e.cycleData).forEach(cId => {
      if (inactiveIds.has(cId)) {
        delete e.cycleData[cId];
        count++;
      }
    });
    if (Object.keys(e.cycleData).length === 0 && !e.temp && !e.humidity) {
      delete S.entries[d];
    }
  });
  // Reset offset/topping on the cycles themselves
  inactive.forEach(c => { c.offsetHistory = []; c.toppingDate = null; c.skippedDays = []; });
  saveS();
  renderSet();
  toast(`✓ ${count} Einträge gelöscht`);
}

/** Wipe absolutely ALL entries (for when no cycles exist) */
async function wipeAllEntries() {
  const count = Object.keys(S.entries).length;
  if (count === 0) { toast('Keine Einträge vorhanden'); return; }
  const ok = await customConfirm(
    `${count} Einträge endgültig löschen?`,
    `Alle ${count} Tageseinträge (Wasser, pH, EC, Fotos, Notizen, Temperatur, RLF) werden unwiderruflich gelöscht. Nur durchführen wenn keine Zyklen mehr da sind!`,
    'Alle löschen'
  );
  if (!ok) return;
  S.entries = {};
  saveS();
  renderSet();
  toast(`🗑 ${count} Einträge gelöscht`);
}

/** Purge all orphaned entries — entries with no active cycle data */
async function purgeOrphans() {
  const activeCycleIds = new Set(S.cycles.map(c => c.id));
  let count = 0;

  Object.keys(S.entries).forEach(d => {
    const e = S.entries[d];
    if (!e) { delete S.entries[d]; count++; return; }

    // Remove cycleData for non-existent cycles
    if (e.cycleData) {
      Object.keys(e.cycleData).forEach(cId => {
        if (!activeCycleIds.has(cId)) {
          delete e.cycleData[cId];
        }
      });
    }

    // Check if entry has real (non-empty) cycle data
    const hasCycleData = e.cycleData && Object.keys(e.cycleData).some(cId => {
      const cd = e.cycleData[cId];
      if (!cd) return false;
      return Object.entries(cd).some(([, v]) => {
        if (v === '' || v === null || v === undefined || v === 0) return false;
        if (Array.isArray(v)) return v.length > 0;
        if (typeof v === 'object') return Object.keys(v).length > 0;
        return true;
      });
    });

    // Check env data: only count as real if truthy AND not empty string
    const hasEnv = (e.temp && String(e.temp).trim() !== '') || (e.humidity && String(e.humidity).trim() !== '');

    if (!hasCycleData && !hasEnv) {
      delete S.entries[d];
      count++;
    }
  });

  saveS();
  renderSet();
  toast(count > 0 ? `🧹 ${count} Einträge bereinigt` : '✓ Keine verwaisten Einträge');
}

async function delCyc(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c) return;
  const ok = await customConfirm(
    `"${c.name}" löschen?`,
    'Der Zyklus und alle zugehörigen Daten (Einträge, Fotos, Notizen) werden unwiderruflich gelöscht!',
    'Endgültig löschen'
  );
  if (!ok) return;

  S.cycles = S.cycles.filter(x => x.id !== id);
  // Remove all cycle data from entries + clean up empty entries
  Object.keys(S.entries).forEach(d => {
    if (S.entries[d]?.cycleData?.[id]) delete S.entries[d].cycleData[id];
    // Remove entry if no cycle data remains and no env data
    const e = S.entries[d];
    if (e && (!e.cycleData || Object.keys(e.cycleData).length === 0) && !e.temp && !e.humidity) {
      delete S.entries[d];
    }
  });
  selId = S.cycles[0]?.id || null;
  draft = {};
  saveS();
  renderSet();
  toast('Gelöscht');
}

async function importData() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        const ok = await customConfirm(
          'Backup laden?',
          `${(d.cycles || []).length} Zyklen gefunden. Aktuelle Daten werden überschrieben!`,
          'Laden', 'var(--green)'
        );
        if (!ok) return;
        S = Object.assign({
          cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
        }, d);
        // Ensure offsetHistory exists on imported cycles (migrate old format)
        S.cycles.forEach(c => {
          if (!c.offsetHistory) {
            c.offsetHistory = [];
            if (c.dayOffset && c.dayOffset !== 0 && c.offsetDate) {
              c.offsetHistory.push({ date: c.offsetDate, offset: c.dayOffset });
            }
          }
          delete c.dayOffset; delete c.offsetDate;
        });
        delete S.skipDays; // remove legacy
        saveS();
        toast('Geladen ✓');
        goTo('dash');
      } catch (err) { toast('Fehler beim Laden'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

async function toggleNotify(enabled) {
  if (enabled) {
    if (!('Notification' in window)) {
      toast('⚠ Browser unterstützt keine Notifications');
      S.notifyEnabled = false;
      renderSet();
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      toast('⚠ Notification-Berechtigung abgelehnt');
      S.notifyEnabled = false;
      renderSet();
      return;
    }
    S.notifyEnabled = true;
    scheduleNotify();
    toast('🔔 Erinnerung aktiviert');
  } else {
    S.notifyEnabled = false;
    if (_notifyTimer) { clearTimeout(_notifyTimer); _notifyTimer = null; }
    toast('🔕 Erinnerung deaktiviert');
  }
  saveS();
  renderSet();
}

let _notifyTimer = null;

function scheduleNotify() {
  if (!S.notifyEnabled) return;
  if (_notifyTimer) clearTimeout(_notifyTimer);

  const today = todayISO();
  const act = active();
  // Find next watering day
  let nextDay = null;
  for (const c of act) {
    if (isGiessTag(today, c)) { nextDay = today; break; }
    const n = nextGiessTag(c, today);
    if (n && (!nextDay || n.iso < nextDay)) nextDay = n.iso;
  }
  if (!nextDay) return;

  // Reminder at 20:00 the EVENING BEFORE the watering day
  // So the user can prepare water (Leitungswasser abstehen lassen)
  const eveBefore = isoPlus(nextDay, -1);
  const target = new Date(eveBefore + 'T20:00:00');
  const now = Date.now();
  const ms = target.getTime() - now;

  if (ms > 0 && ms < 7 * 86400000) {
    _notifyTimer = setTimeout(() => {
      const actions = act.map(c => {
        const a = getAction(nextDay, c);
        return a ? `${sym(c)} ${c.name}: ${ACT_ICON[a] || ''}` : null;
      }).filter(Boolean);
      if (actions.length > 0) {
        new Notification('💧 Morgen ist Gießtag!', {
          body: 'Wasser jetzt bereitstellen.\n' + actions.join('\n'),
          icon: '🌱',
          tag: 'growsmart-water',
        });
      }
      setTimeout(scheduleNotify, 60000);
    }, ms);
  } else if (ms <= 0) {
    // Evening already passed — check if today IS the watering day and it's morning
    const todayTarget = new Date(today + 'T08:00:00');
    const msToday = todayTarget.getTime() - now;
    if (msToday > 0 && isGiessTag(today, act[0])) {
      // Fallback: morning reminder if evening was missed
      _notifyTimer = setTimeout(() => {
        new Notification('🌱 Heute ist Gießtag!', {
          body: 'Nicht vergessen zu gießen!',
          tag: 'growsmart-water',
        });
        setTimeout(scheduleNotify, 60000);
      }, msToday);
    } else {
      // Retry in 1h
      _notifyTimer = setTimeout(scheduleNotify, 3600000);
    }
  }
}

// Auto-start notification scheduling on load
setTimeout(() => { if (S.notifyEnabled) scheduleNotify(); }, 2000);

/**
 * Maps Smart Quick Note labels to Lexikon entries. When a chip is activated
 * for a label that has a mapping, a small "📖 Info" link is shown — so beginners
 * can learn about what they just observed in context.
 */
const QN_LEX = {
  'Blätter hängen': 'Dryback-Methode',
  'Blätter gelblich': 'Nährstoffmangel',
  'Untere Blätter gelb': 'Nährstoffmangel',
  'Überwässert': 'Dryback-Methode',
  'Umgetopft': 'Umtopfen',
  'Stretch sichtbar': 'Lichtzyklen',
  'Trichome klar': 'Trichom-Stadien',
  'Trichome milchig': 'Trichom-Stadien',
  'Trichome bernstein': 'Trichom-Stadien',
  'Trichome glitzern': 'IceFlush',
  'Stütze gesetzt': 'LST (Low Stress)',
  'Nur klares Wasser': 'Spülung',
  'Eiswasser gegeben': 'IceFlush',
  'Wet Trim': 'Trocknung',
  'Aufgehängt': 'Trocknung',
  'Stiele knacken': 'Trocknung',
  'In Gläser gefüllt': 'Curing',
  'Burping gemacht': 'Curing',
  'Schädling gesehen': 'Schädlinge',
};

/**
 * Smart Quick-Actions: kontextuelle Vorschläge basierend auf
 * Tag, Phase, und ob bestimmte Meilensteine schon markiert wurden.
 * Gibt Array von { label, icon, type } zurück.
 * type: 'note' (als Notiz-Tag) | 'state' (Zustand der Pflanze)
 */
function getSmartQuickNotes(c, p, cd, iso) {
  if (!p) return [];
  const out = [];
  const day = p.day || 1;
  const allEntries = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[c.id]);
  const notesAllTime = allEntries.map(d => S.entries[d]?.cycleData?.[c.id]?.notes || '').join(' ');

  // === ZUSTANDS-CHECKS (immer relevant) ===
  out.push({ label: 'Sieht gesund aus', icon: '✅', type: 'state' });
  out.push({ label: 'Blätter hängen', icon: '🥀', type: 'state' });

  // === PHASE-SPEZIFISCH ===
  if (p.ph === 'anzucht') {
    // Tag 1-3: Keimung
    if (day <= 3 && !notesAllTime.includes('Keimling sichtbar')) {
      out.push({ label: 'Keimling sichtbar', icon: '🌱', type: 'milestone' });
    }
    // Tag 4-10: Erste Blätter
    if (day >= 3 && day <= 10 && !notesAllTime.includes('Erste Blätter')) {
      out.push({ label: 'Erste Blätter (Cotyledons)', icon: '🌿', type: 'milestone' });
    }
    // Tag 7-15: Echte Blätter
    if (day >= 7 && day <= 18 && !notesAllTime.includes('Echte Blätter')) {
      out.push({ label: 'Echte Blätter da', icon: '🍃', type: 'milestone' });
    }
    // Umtopfen Hinweis ab Tag 10
    if (day >= 10 && !notesAllTime.includes('Umgetopft')) {
      out.push({ label: 'Umgetopft', icon: '🪴', type: 'milestone' });
    }
    // Standard-Checks in Anzucht
    out.push({ label: 'Blätter gelblich', icon: '🟡', type: 'state' });
    out.push({ label: 'Überwässert', icon: '💧', type: 'state' });
  }

  if (p.ph === 'bloom') {
    const bloomWeek = p.week || 1;
    // Wo 1-2: Stretch + erste Blüten
    if (bloomWeek <= 2 && !notesAllTime.includes('Erste Blüten')) {
      out.push({ label: 'Erste Blüten', icon: '🌸', type: 'milestone' });
    }
    if (bloomWeek <= 2) {
      out.push({ label: 'Stretch sichtbar', icon: '📏', type: 'state' });
    }
    // Wo 3-5: Buds formen sich
    if (bloomWeek >= 2 && bloomWeek <= 5 && !notesAllTime.includes('Stütze gesetzt')) {
      out.push({ label: 'Stütze gesetzt', icon: '🪵', type: 'milestone' });
    }
    // Wo 4+: Geruch
    if (bloomWeek >= 4) {
      out.push({ label: 'Geruch intensiv', icon: '👃', type: 'state' });
    }
    // Wo 6+: Trichome & Reife
    if (bloomWeek >= 6) {
      out.push({ label: 'Trichome klar', icon: '💎', type: 'observation' });
      out.push({ label: 'Trichome milchig', icon: '🥛', type: 'observation' });
    }
    if (bloomWeek >= 7) {
      out.push({ label: 'Trichome bernstein', icon: '🍯', type: 'observation' });
    }
    // Vergilbung ist ab Wo 6 normal
    if (bloomWeek >= 6) {
      out.push({ label: 'Untere Blätter gelb', icon: '🍂', type: 'state' });
    }
  }

  if (p.ph === 'flush') {
    out.push({ label: 'Nur klares Wasser', icon: '💧', type: 'action' });
    out.push({ label: 'Runoff klar', icon: '✨', type: 'observation' });
  }

  if (p.ph === 'ice') {
    out.push({ label: 'Eiswasser gegeben', icon: '🧊', type: 'action' });
    out.push({ label: 'Trichome glitzern', icon: '✨', type: 'observation' });
  }

  if (p.ph === 'harvest') {
    if (!notesAllTime.includes('Geerntet')) out.push({ label: 'Geerntet!', icon: '🏆', type: 'milestone' });
    out.push({ label: 'Wet Trim', icon: '✂️', type: 'action' });
    out.push({ label: 'Aufgehängt', icon: '🪢', type: 'milestone' });
  }

  if (p.ph === 'dry') {
    out.push({ label: 'Stiele knacken', icon: '🔊', type: 'observation' });
    out.push({ label: 'In Gläser gefüllt', icon: '🫙', type: 'milestone' });
    out.push({ label: 'Burping gemacht', icon: '💨', type: 'action' });
  }

  // === PROBLEM-MARKER (phasenübergreifend) ===
  out.push({ label: 'Schädling gesehen', icon: '🐛', type: 'problem' });

  return out;
}

(function() {

            <div class="vpd-seg" style="background:#6e4a1e"></div>
          </div>
          <div class="vpd-mrow"><div class="vpd-marker" id="vpd-m" style="left:${Math.min(95, z.pct)}%"></div></div>
          <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>0.4</span><span>0.8</span><span>1.2</span><span>1.8</span></div>
        </div>
      </div>`
    : `<div style="background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text-muted)">Temp & RLF eingeben → VPD</div>`;

  // Build per-cycle blocks
  const blocks = act.map(c => {
    const p = phase(iso, c);
    const a = getAction(iso, c);
    const cl = col(c), s = sym(c);
    const cd = saved.cycleData?.[c.id] || {};
    // Düngeplan-Woche: Phase-bewusst!
    // Spülen/IceFlush → immer Wo11, Ernte/Trocknung → Wo12
    // Anzucht/Blüte → Gesamtwoche seit Zyklusstart (max Wo10)
    let wk = 1;
    if (p) {
      if (p.ph === 'flush' || p.ph === 'ice') {
        wk = 11;
      } else if (p.ph === 'harvest' || p.ph === 'dry') {
        wk = 12;
      } else {
        const totalDay = c.startDate ? isoDiff(iso, c.startDate) : 0;
        wk = Math.max(1, Math.min(Math.floor(totalDay / 7) + 1, 10));
      }
    }
    const doses = getWeekDoses(c.id, wk, c);
    const isWaterDay = a === 'giess' || a === 'giess_anz' || a === 'spuelen' || a === 'ice';
    const waterSug = waterSuggestion(c, p);

    // === ACTION CARD (header for each cycle) ===
    const giessCard = a
      ? `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${cl.hex}11;border:0.5px solid ${cl.hex}33;border-radius:10px;margin-bottom:8px">
          <span style="font-size:24px">${ACT_ICON[a] || '💧'}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:${cl.hex}">${
              a === 'giess_anz' ? '🌱 Anzucht-Gießtag!' :
              a === 'giess' ? '💧 Gießtag!' :
              a === 'spuelen' ? '🚿 Spültag' :
              a === 'ice' ? '🧊 IceFlush!' :
              a === 'ernte' ? '✂️ Erntetag!' : '🍂 Trocknung'
            }</div>
            ${isWaterDay ? `<div style="font-size:11px;color:var(--text-muted)">Vorschlag: ~${waterSug} ml · Topf ${S.potSize || 11}L · ${getInt(c, p?.ph || 'bloom')}d Intervall</div>` : ''}
          </div>
        </div>
        ${(isWaterDay && iso >= todayISO()) ? `<div style="display:flex;gap:8px;margin-bottom:4px">
          <button onclick="doShiftFromEntry('${c.id}',-1)" style="flex:1;background:var(--blue-bg);border:0.5px solid rgba(90,171,240,0.25);border-radius:10px;padding:10px 8px;font-size:12px;color:var(--blue);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px">
            ← Vorziehen
          </button>
          <button onclick="doShiftFromEntry('${c.id}',1)" style="flex:1;background:var(--orange-bg);border:0.5px solid rgba(232,136,74,0.25);border-radius:10px;padding:10px 8px;font-size:12px;color:var(--orange);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px">
            Auf morgen verschieben →
          </button>
        </div>
        <button onclick="skipDay('${c.id}','${iso}')" style="width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px;font-size:11px;color:var(--red);cursor:pointer;font-family:var(--font);margin-bottom:8px;opacity:0.7">
          🚫 Diesen Gießtag entfernen
        </button>` : ''}`
      : (!a && p && c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 3))
        // Topping rest day
        ? `<div style="padding:10px 12px;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.25);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
            <span style="font-size:20px">✂️</span>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--purple)">Ruhetag nach Topping</div>
              <div style="font-size:11px;color:var(--text-muted)">Tag ${isoDiff(iso, c.toppingDate)} von ${c.toppingPause || 3} · Kein Gießen</div>
            </div>
          </div>`
      : (!a && p && c.skippedDays && c.skippedDays.includes(iso))
        // Skipped day - show restore option
        ? `<div style="padding:10px 12px;background:rgba(224,96,96,0.06);border:0.5px solid rgba(224,96,96,0.2);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">🚫</span>
              <div>
                <div style="font-size:12px;color:var(--red)">Gießtag entfernt</div>
                <div style="font-size:11px;color:var(--text-muted)">Raster bleibt unverändert</div>
              </div>
            </div>
            <button onclick="restoreDay('${c.id}','${iso}')" style="background:none;border:0.5px solid rgba(76,175,112,0.3);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--green);cursor:pointer;font-family:var(--font)">
              ↩ Wiederherstellen
            </button>
          </div>`
      : (!a && p && ['flush','ice','harvest','dry'].includes(p.ph)
        ? `<div style="padding:8px 12px;background:${cl.hex}08;border:0.5px solid ${cl.hex}1a;border-radius:10px;margin-bottom:8px;font-size:12px;color:${cl.hex}99">${PH_ICON[p.ph] || ''} ${PN[p.ph]} – kein Gießtag</div>`
        : ''
      );

    // Topping button: show on Anzucht/early Bloom watering days if not yet topped
    const canTop = isWaterDay && !c.toppingDate && p && (p.ph === 'anzucht' || (p.ph === 'bloom' && p.week <= 3)) && iso >= todayISO();
    // Undo Topping button: show on the topping day itself OR on any rest day after topping
    const isToppingDay = c.toppingDate === iso;
    const isToppingRest = c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 3);
    const showUndoTop = isToppingDay || isToppingRest;

    const toppingBtn = canTop
      ? `<button onclick="doTopping('${c.id}','${iso}')" style="width:100%;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.25);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--purple);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px">

      ? `<div style="background:rgba(176,106,200,0.06);border:0.5px solid rgba(176,106,200,0.2);border-radius:10px;padding:10px 12px;margin-bottom:8px">

          <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px;line-height:1.5">Getoppt am ${fmtDE(c.toppingDate, {day:'2-digit',month:'2-digit'})}. Nächster Guss am ${fmtDE(isoPlus(c.toppingDate, (c.toppingPause||3)+1), {day:'2-digit',month:'2-digit'})}.</div>
          <button onclick="undoTopping('${c.id}')" style="width:100%;background:var(--surface);border:0.5px solid rgba(224,96,96,0.3);border-radius:8px;padding:8px;font-size:12px;color:var(--red);cursor:pointer;font-family:var(--font)">↩ Topping rückgängig machen</button>
        </div>`

    // === NUTRIENT / ADDITIVE TABLE ===
    // Show on ALL water days: giess, giess_anz get full nutrients
    // spuelen, ice get "Zusätze" (e.g. CalMag, pH-Down – user can log what they actually use)
    const isFlushType = a === 'spuelen' || a === 'ice';
    const showNutrients = a === 'giess' || a === 'giess_anz';

    let nutSection = '';
    if (isWaterDay) {
      // Water amount input for calculation
      const savedWater = cd.water || '';
      const waterAmt = parseFloat(savedWater) || waterSug;

      const drainMl = Math.round(waterSug * 0.1);
      const pot = S.potSize || 11;
      const iv = getInt(c, p?.ph || 'bloom');
      const growDay = p?.day || 1;
      const showDrain = growDay >= 25 || p?.ph === 'flush' || p?.ph === 'ice'; // Drain erst ab Vollsättigung

      const waterInput = `<div style="display:flex;flex-direction:column;gap:8px">
        ${(['giess','giess_anz','spuelen','ice'].includes(a) && !parseFloat(cd.water) && !parseFloat(cd.ph))
          ? `<button onclick="applyRecommended('${c.id}',${wk})" style="width:100%;background:linear-gradient(135deg,${cl.hex}22,${cl.hex}11);border:1px solid ${cl.hex}66;border-radius:10px;padding:10px 14px;font-size:13px;color:${cl.hex};cursor:pointer;font-family:var(--font);font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px">
              <span style="font-size:16px">✨</span>
              <span>Empfohlene Werte übernehmen</span>
            </button>`
          : ''}
        <div class="water-input-box" style="gap:10px;align-items:stretch">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">💧</span>
            <div>
              <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">Gießmenge (ml)</div>
              <div style="display:flex;align-items:center;gap:4px">
                <button onclick="stepWater('${c.id}',-50,${wk})" class="stepper-btn">−</button>
                <input class="inp-field" type="number" step="50" id="water-calc-${c.id}" value="${savedWater}" placeholder="${waterSug}"
                  style="border-color:${cl.hex}44;width:80px;height:32px;font-size:15px;font-weight:600;font-family:var(--mono);text-align:center;padding:6px 2px"
                  oninput="updateCalc('${c.id}',${wk});uEF('${c.id}','water',this.value)"/>
                <button onclick="stepWater('${c.id}',50,${wk})" class="stepper-btn">+</button>
              </div>
            </div>
          </div>
          <div style="flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:110px">
            <div style="font-size:9px;color:var(--text-hint);font-weight:600;text-transform:uppercase;letter-spacing:0.03em">🚰 Gieß-Guide</div>
            ${showDrain
              ? `<div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--green)">●</span> ~${waterSug} ml → ${drainMl} ml Drain</div>
                 <div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--orange)">●</span> Drain entsorgen!</div>`
              : `<div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--green)">●</span> ~${waterSug} ml · kein Drain</div>
                 <div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--blue)">●</span> ${growDay <= 10 ? 'Ring um Sämling' : growDay <= 18 ? 'Radius vergrößern' : 'Ganzer Topf'}</div>`
            }
            <div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--blue)">●</span> ${pot}L · ~alle ${iv}d · 30% Dryback</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:0 4px">
          <div>
            <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">pH</div>
            <div style="display:flex;align-items:center;gap:3px">
              <button onclick="stepPH('${c.id}',-0.1)" class="stepper-btn">−</button>
              <input class="inp-field" type="number" step="0.1" min="4" max="9" id="ph-${c.id}" value="${cd.ph || ''}" placeholder="6.4"
                style="width:52px;font-size:15px;font-weight:600;font-family:var(--mono);text-align:center;padding:6px 2px"
                onfocus="if(!this.value)this.value='6.4'" oninput="uEF('${c.id}','ph',this.value)"/>
              <button onclick="stepPH('${c.id}',0.1)" class="stepper-btn">+</button>
            </div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">EC</div>
            <input class="inp-field" type="number" step="0.1" min="0" max="5" value="${cd.ec || ''}" placeholder="1.2"
              style="width:52px;height:32px;font-size:15px;font-weight:600;font-family:var(--mono);text-align:center;padding:6px 2px"
              oninput="uEF('${c.id}','ec',this.value)"/>
          </div>
          <div style="flex:1;text-align:right;font-size:10px;color:var(--text-hint);line-height:1.5">
            Ziel: pH 6.4 · EC 0.8–2.0<br>Drain entsorgen!
          </div>
        </div>
      </div>
      ${(() => {
        const ws = getEntryWarnings(cd, p, saved, c);
        if (!ws.length) return '';
        const bg = { err: 'rgba(224,96,96,0.08)', warn: 'rgba(232,136,74,0.08)', info: 'rgba(90,171,240,0.06)' };
        const bd = { err: 'rgba(224,96,96,0.25)', warn: 'rgba(232,136,74,0.25)', info: 'rgba(90,171,240,0.2)' };
        const fg = { err: 'var(--red)', warn: 'var(--orange)', info: 'var(--blue)' };
        return ws.map(w => `<div style="background:${bg[w.type]};border:0.5px solid ${bd[w.type]};border-radius:8px;padding:6px 10px;font-size:11px;color:${fg[w.type]};margin-bottom:6px;line-height:1.5">${w.text}</div>`).join('');
      })()}`;

      if (showNutrients) {
        // Full nutrient table with plan + calculated amounts
        const prodRows = (S.products || []).map(prod => {
          const plan = doses[prod.id] || 0;
          const logged = cd.doses?.[prod.id] || '';
          const calcMl = plan > 0 ? (plan * waterAmt / 1000).toFixed(1) : '–';
          return `<div class="nut-row-tbl">
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:8px;height:8px;border-radius:50%;background:${prod.color};flex-shrink:0"></div>
              <span class="nt-name">${prod.name}</span>
            </div>
            <span class="nt-hint" style="color:${prod.color}88">${plan > 0 ? (plan + ' ' + (prod.unit || 'ml/L')) : '–'}</span>
            <span class="nt-calc" data-cycle="${c.id}" data-prod="${prod.id}" data-plan="${plan}" data-unit="${prod.unit || 'ml/L'}">${calcMl !== '–' ? calcMl + ' ml' : '–'}</span>
            <input class="nt-inp" style="border-color:${prod.color}44" type="number" step="0.1"
              value="${logged}" placeholder="${calcMl !== '–' ? calcMl : '0'}"
              oninput="uDose('${c.id}','${prod.id}',this.value)"/>
          </div>`;
        }).join('');

        // Mix order
        const activeMixProducts = S.mixOrder
          ? S.mixOrder.filter(n => { const pr = S.products.find(p => p.name === n); return pr && (doses[pr.id] || 0) > 0; })
          : [];
        const mixSteps = activeMixProducts.length > 0
          ? `<div style="background:var(--card);border:0.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:10px 12px">
              <div style="font-size:10px;color:var(--text-hint);margin-bottom:6px;font-weight:600">⚗️ MISCHREIHENFOLGE</div>
              ${activeMixProducts.map((name, i) => {
                const pr = S.products.find(p => p.name === name);
                const d2 = doses[pr?.id] || 0;
                const calc2 = d2 > 0 ? (d2 * waterAmt / 1000).toFixed(1) : 0;
                // Q1: persistent check state, stored per-entry keyed by product id
                const checked = !!(cd.mixChecks?.[pr?.id]);
                const checkId = `mix-${c.id}-${i}`;
                const rowStyle = checked
                  ? 'padding:10px 8px;margin:0 -4px;border-radius:8px;transition:background 0.15s;align-items:center;cursor:pointer;background:rgba(76,175,112,0.06);opacity:0.6'
                  : 'padding:10px 8px;margin:0 -4px;border-radius:8px;transition:background 0.15s;align-items:center;cursor:pointer';
                return `<div class="mix-step" id="${checkId}" onclick="toggleMixCheck('${c.id}','${pr?.id}')" style="${rowStyle}">
                  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
                    <div class="mix-chk" style="font-size:18px;width:24px;text-align:center;flex-shrink:0;color:${checked ? 'var(--green)' : ''}">${checked ? '✓' : '○'}</div>
                    <div style="width:10px;height:10px;border-radius:50%;background:${pr?.color || '#555'};flex-shrink:0"></div>
                    <span style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
                    <button onclick="event.stopPropagation();stepMixDose('${c.id}','${pr?.id}',${wk},-0.1,${waterAmt})" style="width:26px;height:26px;border-radius:5px;background:var(--surface);border:0.5px solid var(--border);color:var(--text-sub);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono)">−</button>
                    <span style="color:var(--green);font-family:var(--mono);font-size:13px;font-weight:600;width:52px;text-align:center">${calc2} ml</span>
                    <button onclick="event.stopPropagation();stepMixDose('${c.id}','${pr?.id}',${wk},0.1,${waterAmt})" style="width:26px;height:26px;border-radius:5px;background:var(--surface);border:0.5px solid var(--border);color:var(--text-sub);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono)">+</button>
                  </div>
                </div>`;
              }).join('')}
            </div>`
          : '';

        nutSection = `${waterInput}
          <div class="nut-tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none">
            <span style="font-size:12px;font-weight:600;color:#fff">🧪 Nährstoffe Wo.${wk}</span>
            <button onclick="openDuenger()" style="background:none;border:none;color:${cl.hex};font-size:11px;cursor:pointer">Plan ✏</button>
          </div>
          <div class="nut-tbl-wrap" style="border-color:${cl.hex}33;background:var(--surface)">
            <div class="nut-tbl-head" style="background:${cl.dk}">
              <span class="nth" style="color:${cl.hex}">Produkt</span>
              <span class="nth" style="text-align:right;color:${cl.hex}88">Plan/L</span>
              <span class="nth" style="text-align:right;color:${cl.hex}">Berechnet</span>
              <span class="nth" style="text-align:right;color:${cl.hex}">Ist</span>
            </div>
            ${prodRows || `<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Keine Dünger konfiguriert. <span style="color:var(--blue);cursor:pointer" onclick="openDuenger()">Dünger einrichten →</span></div>`}
          </div>
          ${mixSteps}
          <div class="ph-hint">🎯 pH: 6.4 · EC: 0.8–2.0 · Drain: 5–10%</div>
          <div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-top:6px">
            <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.gtgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'" style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px">
              <span style="font-size:13px">🚰</span>
              <span style="flex:1;font-size:11px;font-weight:600;color:var(--blue)">Gießanleitung (Safe Dryback)</span>
              <span class="gtgl" style="color:var(--text-muted);font-size:13px">▸</span>
            </div>
            <div style="display:none;padding:0 12px 10px">
              <div style="display:flex;flex-direction:column;gap:6px;font-size:10px;color:var(--text-sub);line-height:1.5">
                <div style="background:rgba(224,96,96,0.06);border-radius:6px;padding:6px 8px;color:var(--red)">⚠️ <b>Regel Nr. 1:</b> Nach Topfgewicht gießen, nicht nach Kalender!</div>
                <div><b style="color:var(--blue)">① Vollsättigung:</b> Langsam gießen bis 10–15% Drain unten austritt (~${waterSug} ml). Topfgewicht merken = 100% Referenz.</div>
                <div><b style="color:var(--teal)">② Rücktrocknung:</b> Finger weg! Trocknung zieht O₂ in die Wurzelzone = Motor für Wachstum.</div>
                <div><b style="color:var(--green)">③ Sweetspot:</b> Erst gießen bei 30–35% Restgewicht. Obere 3–5cm knochentrocken. (~alle ${getInt(c, p?.ph || 'bloom')} Tage)</div>
                <div style="background:rgba(240,208,80,0.06);border-radius:6px;padding:6px 8px;color:var(--yellow)">💡 <b>Unsicher?</b> Lieber 1 Tag länger warten. Hängende Blätter = 2h Erholung. Staunässe-Wurzelfäule = irreversibel.</div>
                <div><b style="color:var(--orange)">🧪 Mischen:</b> CalMag zuerst → umrühren → Basisdünger → Additive → pH auf 6.4</div>
                <div><b style="color:var(--orange)">🚿 Drain:</b> 5–10% Drain bei jedem Guss. Drain-Wasser sofort entsorgen!</div>
              </div>
            </div>
          </div>`;

      } else {
        // Flush/Ice: "Nur klares Wasser" hint + Zusätze-Eingabe (user can still log products they use)
        const additivesInfo = isFlushType
          ? `<div style="background:${cl.hex}08;border:0.5px solid ${cl.hex}22;border-radius:10px;padding:10px 12px;font-size:12px;color:${cl.hex}99;margin-bottom:6px">
              ${a === 'spuelen' ? '🚿 Nur klares Wasser – kein Basisdünger!' : '🧊 Nur eiskaltes Wasser – kein Basisdünger!'}
            </div>`

/** Live-update the calculated amounts when water input changes */
function updateCalc(cId, wk) {
  const waterEl = document.getElementById('water-calc-' + cId);
  if (!waterEl) return;
  const ml = parseFloat(waterEl.value) || parseFloat(waterEl.placeholder) || waterSuggestion(null, { ph: 'bloom', day: 35 });

  // Update only calc cells for THIS cycle (scoped by data-cycle attribute)
  document.querySelectorAll(`.nt-calc[data-cycle="${cId}"]`).forEach(cell => {
    const plan = parseFloat(cell.dataset.plan) || 0;
    if (plan > 0) {
      cell.textContent = (plan * ml / 1000).toFixed(1) + ' ml';
    }
  });
}

/** Step water amount by 50ml increments */
function stepWater(cId, step, wk) {
  const el = document.getElementById('water-calc-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || parseFloat(el.placeholder) || 0;
  const newVal = Math.max(0, Math.round((current + step) / 50) * 50);
  el.value = newVal;
  uEF(cId, 'water', String(newVal));
  updateCalc(cId, wk);
  vibrate(8);
}

/** Step pH by 0.1 increments */
function stepPH(cId, step) {
  const el = document.getElementById('ph-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || 6.4;
  const newVal = Math.max(4, Math.min(9, Math.round((current + step) * 10) / 10));
  el.value = newVal;
  uEF(cId, 'ph', String(newVal));
  vibrate(8);
}

/** Step environment inputs (temperature/humidity) */
function stepEnv(id, step) {
  const el = document.getElementById(id);
  if (!el) return;
  // Default if empty: 23.5°C for temp, 60% for humidity (ideal anzucht/bloom values)
  const defaultVal = id === 'et' ? 23.5 : 60;
  const current = parseFloat(el.value) || defaultVal;
  // Range: temp 0-45, humidity 0-100
  const min = 0;
  const max = id === 'et' ? 45 : 100;
  // Precision: 1 decimal for both temp (0.1 steps) and humidity (0.2 steps)
  const precision = Math.abs(step) < 1 ? 10 : 1;
  const newVal = Math.max(min, Math.min(max, Math.round((current + step) * precision) / precision));
  el.value = newVal;
  uEnv();
  vibrate(8);
}

/**
 * Toggle a mix-step check. Persisted per entry day, keyed by product id,
 * so checks survive re-renders (e.g. after ± dose adjustment on another product).
 * Checks are intentionally per-day: a new watering day starts fresh.
 */
function toggleMixCheck(cId, prodId) {
  if (!editISO || !cId || !prodId) return;
  ensE(cId);
  const cd = S.entries[editISO].cycleData[cId];
  if (!cd.mixChecks) cd.mixChecks = {};
  cd.mixChecks[prodId] = !cd.mixChecks[prodId];
  // Clean up the key if it was un-toggled (keeps state lean)
  if (!cd.mixChecks[prodId]) delete cd.mixChecks[prodId];
  saveS();
  vibrate(10);
  // Re-render entry to reflect visual check state
  if (editISO) renderEntry(editISO);
}

/**
 * Adjust a fertilizer dose by ±stepMl on the DISPLAY (ml actually poured into the
 * water can). The stored plan value (ml/L) becomes a fractional number — that's
 * intentional. User wants to think in "poured ml", not in "concentration".
 * If waterAmt is missing, falls back to ±0.1 ml/L plan-value steps.
 */
function stepMixDose(cId, prodId, wk, stepMl, waterAmt) {
  const key = 'global_w' + wk;
  if (!S.weekSchedule[key]) S.weekSchedule[key] = {};
  const plan = S.weekSchedule[key][prodId] || 0;
  let newPlan;
  if (waterAmt && waterAmt > 0) {
    // Current displayed ml → add step → back to ml/L
    const currentMl = plan * waterAmt / 1000;
    const newMl = Math.max(0, Math.round((currentMl + stepMl) * 10) / 10);
    newPlan = newMl * 1000 / waterAmt;
    // Keep stored plan value to a sensible precision (4 decimals is plenty)
    newPlan = Math.round(newPlan * 10000) / 10000;
  } else {
    // Fallback: legacy ml/L stepping
    newPlan = Math.max(0, Math.round((plan + stepMl) * 10) / 10);
  }
  S.weekSchedule[key][prodId] = newPlan;
  saveS();
  vibrate(8);
  // Re-render the entry to reflect updated doses
  if (editISO) renderEntry(editISO);
}

function uEnv() {
  _entryDirty = true;
  const t = parseFloat(document.getElementById('et')?.value);
  const r = parseFloat(document.getElementById('er')?.value);
  const v = calcVPD(t, r), z = vpdZone(v);
  if (v !== null && z) {
    const vv = document.getElementById('vpd-v');
    const vp = document.getElementById('vpd-p');
    const vm = document.getElementById('vpd-m');
    if (vv) vv.textContent = v.toFixed(2);
    if (vp) { vp.textContent = z.label; vp.style.background = z.bg; vp.style.color = z.color; }
    if (vm) vm.style.left = Math.min(95, z.pct) + '%';
  }
}

function ensE(cId) {
  if (!S.entries[editISO]) S.entries[editISO] = { temp: '', humidity: '', cycleData: {} };
  if (!S.entries[editISO].cycleData) S.entries[editISO].cycleData = {};
  if (!S.entries[editISO].cycleData[cId]) S.entries[editISO].cycleData[cId] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
  if (!S.entries[editISO].cycleData[cId].doses) S.entries[editISO].cycleData[cId].doses = {};
  if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
}

function uDose(cId, pid, v) { _entryDirty = true; ensE(cId); S.entries[editISO].cycleData[cId].doses[pid] = parseFloat(v) || 0; }

/**
 * Apply one-click recommended values for a watering day:
 * sets water to the suggestion, pH to 6.4, and writes all planned fertilizer
 * doses (ml/L × water / 1000) as the logged amounts. Skips flush day fertilizers
 * since flush = water only. Fires toast on success.
 */
function applyRecommended(cId, wk) {
  if (!editISO) return;
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const p = phase(editISO, c);
  const a = getAction(editISO, c);
  if (!p || !a) return;
  ensE(cId);
  const cd = S.entries[editISO].cycleData[cId];
  // Water: use suggestion
  const waterMl = waterSuggestion(c, p);
  cd.water = String(waterMl);
  // pH: 6.4 standard target
  cd.ph = '6.4';
  // Fertilizers: only on normal watering days (giess, giess_anz), not flush/ice
  if (a === 'giess' || a === 'giess_anz') {
    const doses = getWeekDoses(cId, wk, c);
    Object.entries(doses).forEach(([prodId, plan]) => {
      if (plan > 0) {
        const ml = Math.round((plan * waterMl / 1000) * 10) / 10;
        cd.doses[prodId] = ml;
      }
    });
  }
  // Environment: only set if empty (don't overwrite real measurements)
  const e = S.entries[editISO];
  if (!e.temp || String(e.temp).trim() === '') e.temp = '23.5';
  if (!e.humidity || String(e.humidity).trim() === '') e.humidity = '60';
  saveS();
  vibrate(15);
  toast('✨ Empfohlene Werte übernommen');
  renderEntry(editISO);
}
function uTrich(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].trichomes) S.entries[editISO].cycleData[cId].trichomes = { clear: 70, milky: 25, amber: 5 };
  S.entries[editISO].cycleData[cId].trichomes[field] = parseInt(v) || 0;
}
function uHarvest(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].harvestLog) S.entries[editISO].cycleData[cId].harvestLog = {};
  S.entries[editISO].cycleData[cId].harvestLog[field] = v;
}

function addQN(cId, el, textArg) {
  ensE(cId);
  // Read label from data-label (preferred) or fall back to argument for backwards compat.
  // This avoids fragile apostrophe escaping in onclick handlers.
  const text = textArg || el.dataset.label || '';
  if (!text) return;
  const icon = el.dataset.icon || '+';
  const ta = document.getElementById('note-' + cId);
  const ex = ta?.value || S.entries[editISO].cycleData[cId].notes || '';

  // TOGGLE: if already added, remove it
  if (ex.includes(text)) {
    let nv = ex.replace(new RegExp('(,\\s*)?' + text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(,\\s*)?', 'g'),
      (match, before, after) => (before && after) ? ', ' : '');
    nv = nv.replace(/^,\s*/, '').replace(/,\s*$/, '').replace(/,\s*,/g, ',').trim();

    S.entries[editISO].cycleData[cId].notes = nv;
    if (ta) ta.value = nv;
    el.classList.remove('active');
    el.textContent = icon + ' ' + text;
    vibrate(8);
    toast('− ' + text);
    return;
  }

  // ADD
  const nv = ex.trim() ? (ex.trim() + ', ' + text) : text;
  S.entries[editISO].cycleData[cId].notes = nv;
  if (ta) ta.value = nv;
  el.classList.add('active');
  el.textContent = '✓ ' + text;
  vibrate(10);
  toast('✓ ' + text);
}

function saveEntry() {
  if (!editISO) return;
  if (S.cycles.length > 0) ensE(S.cycles[0].id);
  S.entries[editISO].temp = document.getElementById('et')?.value || '';
  S.entries[editISO].humidity = document.getElementById('er')?.value || '';

  // Also save water from smart calculator inputs
  active().forEach(c => {
    const waterCalcEl = document.getElementById('water-calc-' + c.id);
    if (waterCalcEl && waterCalcEl.value) {
      ensE(c.id);
      S.entries[editISO].cycleData[c.id].water = waterCalcEl.value;
    }
  });

  saveS();
  _entryDirty = false;
  vibrate();
  toast('Gespeichert ✓');
  // Re-render to activate VPD display with saved temp/humidity
  renderEntry(editISO);
}

function addPhoto(cId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { toast('Max 10MB'); return; }
    toast('📸 Foto wird verarbeitet...', 3000);

    const r = new FileReader();
    r.onload = ev => {
      // Compress image via canvas (max 1200px wide)
      const img = new Image();
      img.onload = () => {
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        ensE(cId);
        if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
        S.entries[editISO].cycleData[cId].photos.push(compressed);
        // Quota probe: saveS() swallows errors, so we do one explicit write here
        // to detect QuotaExceededError and roll back cleanly. If the probe succeeds,
        // saveS() will redo the write (with orphan cleanup & undo push) — a small
        // cost in exchange for proper user-visible quota handling.
        try {
          localStorage.setItem(SK, JSON.stringify(S));
        } catch (err) {
          S.entries[editISO].cycleData[cId].photos.pop(); // rollback in-memory state
          if (err && (err.name === 'QuotaExceededError' || err.code === 22)) {
            customConfirm(
              '💾 Speicher voll!',
              'Der Browser-Speicher reicht nicht mehr für weitere Fotos. Bitte lösche einige alte Fotos oder exportiere ein Backup (JSON) und starte danach frisch. Dein aktuelles Foto wurde nicht gespeichert.',
              'Verstanden', 'var(--orange)'
            );
          } else {
            toast('⚠ Foto konnte nicht gespeichert werden');
          }
          return;
        }
        // Probe succeeded — commit via saveS (undo push, flash, etc.)
        saveS();
        renderEntry(editISO);
        toast('✓ Foto gespeichert');
        maybeWarnStorageQuota();
      };
      img.onerror = () => toast('⚠ Foto konnte nicht geladen werden');
      img.src = ev.target.result;
    };
    r.onerror = () => toast('⚠ Fehler beim Lesen');
    r.readAsDataURL(f);
  };
  inp.click();
}

/** Estimate localStorage usage. Warns user if >3 MB. */
let _lastQuotaWarn = 0;
function maybeWarnStorageQuota() {
  try {
    const size = (localStorage.getItem(SK) || '').length;
    // Each char in a serialized JSON is ~1 byte (ASCII) or 2 (UTF-16 in memory, 1 stored).
    const mb = size / 1048576;
    const now = Date.now();
    if (mb > 3.5 && now - _lastQuotaWarn > 300000) { // max 1 warn per 5min
      _lastQuotaWarn = now;
      toast(`⚠ Speicher ${mb.toFixed(1)} MB — bald voll. Alte Fotos löschen?`, 4500);
    }
  } catch (e) {}
}

/**
 * Called live as user types — only re-renders the results/info section,
 * keeping the search input DOM-stable so the mobile keyboard stays open
 * and the cursor doesn't jump.
 */
function _onHowtoSearchInput(q) {
  const query = (q || '').trim();
  const resultsEl = document.getElementById('howto-results');
  if (!resultsEl) { renderHowto(); return; }
  resultsEl.innerHTML = _buildHowtoResults(query);
  // Toggle the X button
  const clearBtn = document.getElementById('howto-search-clear');
  if (clearBtn) clearBtn.style.display = query ? 'flex' : 'none';
  // Toggle the tours section at the bottom
  const toursEl = document.getElementById('howto-tours');
  if (toursEl) toursEl.style.display = query ? 'none' : 'block';
}

/**
 * Normalize a string for search matching.
 * Lowercase, strip HTML, replace German umlauts so "düngen"/"duengen"/"DÜNGEN" all match.
 */
function _normSearch(s) {
  if (!s) return '';
  return String(s)
    .replace(/<[^>]+>/g, ' ')
    .toLowerCase()
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/\s+/g, ' ')
    .trim();
}

function _escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/**
 * Highlight all case-insensitive occurrences of `query` in `html`, without breaking tags.
 */
function _highlightMatches(html, query) {
  if (!query) return html;
  const parts = html.split(/(<[^>]+>)/g);
  return parts.map(p => {
    if (p.startsWith('<')) return p;
    const re = new RegExp(_escRegex(query), 'gi');
    return p.replace(re, m => `<mark style="background:rgba(240,208,80,0.35);color:var(--text);padding:1px 2px;border-radius:3px">${m}</mark>`);
  }).join('');
}

/** Build the info box + filtered chapters HTML (no search field, no tours) */
function _buildHowtoResults(query) {
  const totalEntries = HOWTO.reduce((sum, cat) => sum + cat.items.length, 0);
  const normQuery = _normSearch(query);

  let matchedCats = HOWTO;
  let matchCount = totalEntries;
  if (normQuery) {
    matchedCats = HOWTO.map(cat => ({
      cat: cat.cat,
      items: cat.items.filter(item => {
        const hay = _normSearch(item.t + ' ' + item.txt + ' ' + cat.cat);
        return hay.includes(normQuery);
      })
    })).filter(cat => cat.items.length > 0);
    matchCount = matchedCats.reduce((s, c) => s + c.items.length, 0);
  }

  const infoBox = normQuery
    ? `<div style="padding:12px 14px;background:var(--card);border:0.5px solid var(--green-dk);border-radius:12px;margin-bottom:10px">
         <div style="font-size:12px;color:var(--green);font-weight:600">🔍 ${matchCount} ${matchCount === 1 ? 'Treffer' : 'Treffer'} für „${query.replace(/</g, '&lt;')}"</div>
         ${matchCount === 0 ? '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.5">Nichts gefunden. Probier: <i>wasser, pH, düngen, ernte, trocknen, spülen, trichome, lexikon</i></div>' : ''}
       </div>`
    : `<div style="padding:14px 16px;background:linear-gradient(135deg, rgba(90,171,240,0.08), rgba(176,106,200,0.05));border:0.5px solid rgba(90,171,240,0.25);border-radius:14px;margin-bottom:10px">
         <div style="font-size:14px;font-weight:700;color:var(--blue);margin-bottom:4px">📖 Anleitung zum Nachlesen</div>
         <div style="font-size:12px;color:var(--text-sub);line-height:1.6">${HOWTO.length} Kapitel · ${totalEntries} Einträge. Tipp auf eine Überschrift um den Text auf- oder zuzuklappen, oder benutz die Suche oben. Weiter unten findest du auch interaktive Touren.</div>
       </div>`;

  const entriesOpen = !!normQuery;
  const bodyDisplay = entriesOpen ? 'block' : 'none';
  const toggleIcon = entriesOpen ? '▾' : '▸';

  const chapters = matchedCats.map(cat => `
    <div style="margin-bottom:4px">
      <div class="sect-head" style="font-size:12px;padding:10px 0 6px">${cat.cat}</div>
      ${cat.items.map(item => {
        const titleHTML = _highlightMatches(item.t, query);
        const bodyHTML = _highlightMatches(item.txt, query);
        return `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">
          <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.htgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'"
            style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px">
            <div style="flex:1;font-size:13px;font-weight:500;color:var(--text)">${titleHTML}</div>
            <span class="htgl" style="color:var(--text-muted);font-size:14px">${toggleIcon}</span>
          </div>
          <div style="display:${bodyDisplay};padding:0 14px 12px">
            <div style="font-size:12px;color:var(--text-sub);line-height:1.7">${bodyHTML}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');

  return infoBox + chapters;
}

function openGallery() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-gallery').classList.add('active');
  renderGallery();
}

function renderGallery() {
  const act = S.cycles;
  const allPhotos = [];
  Object.keys(S.entries).sort().forEach(d => {
    const e = S.entries[d];
    if (!e?.cycleData) return;
    Object.keys(e.cycleData).forEach(cId => {
      const cd = e.cycleData[cId];
      const c = S.cycles.find(x => x.id === cId);
      if (cd?.photos?.length) {
        cd.photos.forEach(src => {
          allPhotos.push({ date: d, cId, name: c?.name || '–', src });
        });
      }
    });
  });

  if (allPhotos.length === 0) {
    document.getElementById('gallery-body').innerHTML = `
      <div class="empty-state"><div style="font-size:40px;opacity:0.3">📷</div>
      <div style="font-size:13px;color:var(--text-muted)">Noch keine Fotos.</div></div>`;
    return;
  }

  // Group by month
  const months = {};
  allPhotos.forEach(p => {
    const key = p.date.substring(0, 7);
    if (!months[key]) months[key] = [];
    months[key].push(p);
  });

  document.getElementById('gallery-body').innerHTML = Object.entries(months).reverse().map(([key, photos]) => {
    const [y, m] = key.split('-');
    return `<div>
      <div class="sect-head">${MN[parseInt(m)-1]} ${y} · ${photos.length} Fotos</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${photos.map(p => {
          // Find the photo's index in its cycle's daily array to enable delete
          const cd = S.entries[p.date]?.cycleData?.[p.cId];
          const idx = cd?.photos ? cd.photos.indexOf(p.src) : -1;
          return `<div class="photo-wrap" style="width:72px;height:72px">
            <img src="${p.src}" style="width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer;border:0.5px solid var(--border);display:block" onclick="viewPhoto(this.src)"/>
            <div style="position:absolute;bottom:2px;left:2px;font-size:8px;color:#fff;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:4px;pointer-events:none">${fmtDE(p.date)}</div>
            ${idx >= 0 ? `<button class="photo-del" onclick="delPhotoFromGallery('${p.cId}','${p.date}',${idx})" title="Foto löschen">×</button>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('') + '<div style="height:20px"></div>';
}

// =====================================================================
//  PPFD / DLI LIGHT METER (Ambient Light Sensor → Manual fallback)
// =====================================================================
const LUX_TO_PPFD = {
  led_white: 0.0185,
  led_blurple: 0.0250,
  hps: 0.0148,
  cfl: 0.0135,
  sun: 0.0185,
};
let _ppfdSensor = null;

function startPPFD() {
  const status = document.getElementById('ppfd-status');
  const ppfdEl = document.getElementById('ppfd-val');
  const dliEl = document.getElementById('dli-val');
  const luxEl = document.getElementById('lux-val');
  const btn = document.getElementById('ppfd-btn');

  if (_ppfdSensor) { stopPPFD(); return; }

  function update(lux) {
    const src = document.getElementById('ppfd-src')?.value || 'led_white';
    const hours = parseFloat(document.getElementById('ppfd-hours')?.value) || 18;
    const factor = LUX_TO_PPFD[src] || 0.0185;
    const ppfd = Math.round(lux * factor);
    const dli = (ppfd * hours * 3600 / 1000000).toFixed(1);
    if (ppfdEl) { ppfdEl.textContent = ppfd; ppfdEl.style.color = ppfd >= 600 && ppfd <= 900 ? 'var(--green)' : ppfd > 900 ? 'var(--red)' : ppfd >= 200 ? 'var(--yellow)' : 'var(--text-muted)'; }
    if (luxEl && !luxEl.isContentEditable) luxEl.textContent = Math.round(lux);
    if (dliEl) { dliEl.textContent = dli; dliEl.style.color = parseFloat(dli) >= 30 && parseFloat(dli) <= 45 ? 'var(--green)' : parseFloat(dli) > 45 ? 'var(--orange)' : 'var(--teal)'; }
  }

  function startSensor() {
    try {
      const sensor = new AmbientLightSensor({ frequency: 2 });
      sensor.addEventListener('reading', () => update(sensor.illuminance));
      sensor.addEventListener('error', e => {
        if (status) status.textContent = '⚠ Sensor-Fehler: ' + (e.error?.message || 'Unbekannt');
        showManual();
      });
      sensor.start();
      _ppfdSensor = sensor;
      if (btn) { btn.textContent = '⏹ Stoppen'; btn.style.borderColor = 'rgba(224,96,96,0.5)'; }
      if (status) status.textContent = '📡 Lichtsensor aktiv — Handy mit Display nach oben unter die Lampe';
    } catch (e) {
      if (status) status.textContent = '⚠ Sensor nicht verfügbar: ' + e.message;
      showManual();
    }
  }

  function showManual() {
    if (luxEl) {
      luxEl.contentEditable = 'true';
      luxEl.style.cssText += ';border:1px solid var(--yellow);border-radius:4px;padding:2px 6px;outline:none;-webkit-user-select:text;user-select:text;min-width:60px';
      luxEl.textContent = '15000';
      luxEl.oninput = () => update(parseFloat(luxEl.textContent) || 0);
      update(15000);
    }
    if (status) status.innerHTML = '✏️ Sensor nicht verfügbar. Lux manuell eingeben oder eine Lux-Meter-App nutzen.';
  }

  // Check for AmbientLightSensor support
  if ('AmbientLightSensor' in window) {
    // Try to get permission first
    if (navigator.permissions && navigator.permissions.query) {
      navigator.permissions.query({ name: 'ambient-light-sensor' })
        .then(result => {
          if (result.state === 'denied') {
            if (status) status.textContent = '🔒 Lichtsensor-Berechtigung verweigert. In Browser-Einstellungen aktivieren.';
            showManual();
          } else {
            startSensor();
          }
        })
        .catch(() => startSensor()); // permission query not supported, just try
    } else {
      startSensor();
    }
  } else {
    if (status) status.textContent = '⚠ AmbientLightSensor wird von diesem Browser nicht unterstützt.';
    showManual();
  }
}
