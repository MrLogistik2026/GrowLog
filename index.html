      practice: '<b>Dauer je nach Substrat:</b><br>• Erde / Light-Mix / All-Mix: <b>10-14 Tage</b> Spülen<br>• Coco: <b>5-7 Tage</b> (kürzer, da kein Pufferungs-Effekt)<br>• Hydro: <b>3-5 Tage</b> (sehr schnell auswaschbar)<br>• Living Soil: oft <b>gar nicht spülen</b> (lebendiger Boden balanciert sich selbst)<br><br><b>Wie:</b><br>1. Nur pH-reguliertes Wasser (6.4 für Erde, 5.8 für Coco)<br>2. Normale Mengen, keine extra Flush-Aktion<br>3. Bei Bedarf: 1× größerer Durchspülgang nach 5-7 Tagen<br><br><b>Anzeichen für gut gespülte Pflanze:</b> Blätter werden gelb/lila, Pflanze sieht „erschöpft" aus — genau das ist gewollt.',
      pitfall: 'Zu lange spülen (>14 Tage in Erde) = Pflanze leidet zu früh, Trichom-Produktion stoppt. Zu kurz spülen oder gar nicht = bitter, schwarzer Asche-Test. <b>Bei Living Soil oder vollbiologischem Anbau:</b> Spülen ist nicht nötig — der lebendige Boden hält Nährstoffe in organischer Form, die nicht ausgeschwemmt werden müssen.' },
    { t: 'IceFlush',
      brief: 'Eiswasser in den letzten 48 h vor Ernte. Frost-Simulation pusht Harz und triggert lila Farben.',
      mechanism: 'Eiswasser (unter 10 °C) wird statt Standard-Wasser in den letzten 48 h aufgegossen. Die Pflanze interpretiert das als <b>nahenden Frost</b> und reagiert mit Notfall-Maßnahmen:<br>• Anthocyan-Produktion hoch (Frostschutz-Pigmente) → mehr Lila<br>• Letzte Trichom-Schübe (Harz als Schutz)<br>• Beschleunigtes Reifen',
      practice: '<b>Setup:</b><br>1. 48 h vor geplanter Ernte: Wasserkanne mit Eiswürfeln präparieren<br>2. Wasser-Temperatur 5-10 °C, pH 6.0-6.4<br>3. Topf 1× komplett mit eiskaltem Wasser durchgießen<br>4. Restliche 48 h: kein weiteres Gießen<br>5. Optional: Zelt-Temperatur auf 18-19 °C senken (verstärkt Effekt)<br><br>Kombiniert sich gut mit der <b>finalen Dunkelphase</b>.<br><br>Bei Strains mit lila-Genetik (Purple Punch, Granddaddy Purple) sehr sichtbar. Bei rein grünen Genetiken kaum Farb-Effekt, aber Harz-Boost trotzdem.',
      pitfall: 'Bei zu kalter Wurzel-Temperatur (unter 5 °C) = echter Schaden, Wurzeln können absterben. Wenn Pflanze noch nicht ausreichend gereift ist: IceFlush stresst, ohne Vorteile. Nur als finaler Schritt einsetzen, nicht als Standard-Verfahren.' },
    { t: 'Wurzelschnitt (Splitting)',
      brief: 'Stamm spalten oder Wurzeln verletzen vor Ernte. Stress-Maximum für angeblich mehr Harz — wissenschaftlich umstritten.',
      mechanism: '<b>Stamm-Splitting:</b> Mit Messer einen Längsschnitt im untersten Stamm (5-10 cm), dann Holzkeil reinstecken um Schnitt offen zu halten. <b>Wurzelschnitt:</b> Spaten neben dem Topf in den Boden stechen, einige Wurzeln durchtrennen. Die Pflanze interpretiert das als tödlichen Schaden und pumpt angeblich alle Reserven in die Blüten — letzter Harz-Push.',
      practice: '<b>Wenn überhaupt:</b><br>• Nur bei photoperiodischen Pflanzen, nie Autos (zu kurze Lebenszeit)<br>• 48-72 h vor Ernte<br>• Stamm-Split unten am Stamm (nicht in Trieb-Gabelungen)<br>• Holzkeil sauber, eingeölt damit nichts in die Wunde wandert<br>• Direkt danach: nichts mehr machen, in Ruhe lassen<br><br><b>Wissenschaftliche Lage:</b> Studien dazu sind dünn. Anekdotische Berichte schwanken stark. Manche schwören drauf, manche merken keinen Unterschied. Cup-Profis nutzen es selten.',
      pitfall: 'Pflanze welkt vorzeitig = Trichome trocknen aus, Terpene verdampfen → schlechter als ohne Splitting. Hohes Infektionsrisiko offene Wunde 48 h. <b>Empfehlung:</b> Nicht als Standard machen. Wenn experimentieren, dann 1 von 4 Pflanzen splitten, Vergleich machen, eigene Daten sammeln.' },
  ]},
  { cat: '🍂 Nach der Ernte', items: [
    { t: 'Trocknung',
      brief: 'Die vergessene Hälfte der Qualität. Langsames Trocknen ist der Unterschied zwischen Heu und Premium.',
      mechanism: 'Während der Trocknung passieren zwei kritische Prozesse parallel: <b>Wasser verdunstet</b> (zu schnell = Außen hart, Innen feucht = Schimmel-Risiko), und <b>Chlorophyll baut sich ab</b> (zu schnell getrocknet = bleibt drin = kratziger Rauch, "Heu-Geschmack"). Beides braucht Zeit.',
      practice: '<b>Setup:</b><br>• 7–14 Tage Dauer<br>• 18–21 °C Raumtemperatur<br>• 55–65 % Luftfeuchte<br>• Komplett dunkel<br>• Leichte Luftbewegung (Ventilator, nicht direkt anblasen)<br><br><b>Zwei Methoden:</b><br>• <b>Dry Trim:</b> Ganze Zweige aufhängen, erst nach Trocknung trimmen (Cup-Standard, schützt Trichome).<br>• <b>Wet Trim:</b> Direkt nach Ernte trimmen, dann Buds auf Netz. Schneller aber weniger Aroma.<br><br><b>Fertig-Check:</b> Dünne Stiele knacken hörbar wenn man sie biegt. Dickere Stiele biegen noch etwas — das ist OK.',
      pitfall: '<b>Zu schnell</b> (40 °C, 30 % Luftfeuchte, 2 Tage): knocheltrockene Außenseite, aber Chlorophyll bleibt drin → Heu-Geschmack, der sich nie wegcured.<br><b>Zu langsam</b> (>2 Wochen bei hoher Feuchte): Schimmel-Risiko, Aroma verliert sich.' },
    { t: 'Curing (Veredelung)',
      brief: 'Die Blüten reifen 2-8 Wochen in Gläsern nach. Macht aus „okay" → „top". Wichtigster Schritt nach der Ernte.',
      mechanism: 'Nach Trocknung haben Blüten ~10-12 % Restfeuchte. In luftdicht verschlossenen Gläsern laufen <b>mikrobielle und enzymatische Prozesse</b> ab:<br>• <b>Restliches Chlorophyll wird abgebaut</b> → kein Heu/Gras-Aroma mehr<br>• <b>Zucker und Stärke werden umgewandelt</b> → milderer Rauch<br>• <b>Terpene stabilisieren sich</b> → Aroma-Profil reift wie Wein<br>• <b>Feuchtigkeit verteilt sich gleichmäßig</b> → besseres Brennverhalten',
      practice: '<b>Setup:</b><br>• Mason-Jars (Bügel-/Schraubgläser, ~0.5-1 L)<br>• Luftdicht verschließend, lichtundurchlässig oder im Dunkeln gelagert<br>• Hygrometer (klein, batterie-betrieben) ins Glas → idealer Bereich 58-65 % RLF<br>• Pro Glas nicht mehr als 2/3 Volumen füllen<br><br><b>Burping-Schedule:</b><br>• Tag 1-7: <b>1× täglich 15 Min</b> öffnen<br>• Woche 2: alle 2 Tage<br>• Woche 3-4: alle 3-4 Tage<br>• Ab Woche 4+: nur noch wöchentlich<br><br><b>Dauer:</b><br>• Minimum: 2 Wochen<br>• Standard: 4 Wochen<br>• Cup-Qualität: 6-8 Wochen<br>• Long-Cure: 3-6 Monate (für besondere Strains)',
      pitfall: 'Zu hohe Restfeuchte (>70 %) im Glas = <b>Schimmel</b>. Wenn beim ersten Öffnen Ammoniak-Geruch da ist → Buds rausnehmen, kurz ablüften, Glas trocknen. Glas im Hellen lagern = Cannabinoid-Abbau. Plastikbehälter statt Glas = Terpene wandern in den Kunststoff.' },
    { t: 'Dekarboxylierung',
      brief: 'Cannabis ist roh nicht psychoaktiv. Erst Hitze macht THC-A → THC. Wichtig für Edibles.',
      mechanism: 'In der frischen Pflanze ist THC nicht in seiner aktiven Form vorhanden, sondern als <b>THC-A</b> (Tetrahydrocannabinolsäure) — chemisch eine Carbonsäure. Beim Erhitzen <b>spaltet sich ein CO₂-Molekül ab</b>, aus THC-A wird das psychoaktive <b>THC</b>. Gleiches gilt für CBD-A → CBD und alle anderen Cannabinoid-Säuren.<br><br>Beim Rauchen/Verdampfen passiert die Decarboxylierung automatisch durch die hohe Temperatur. Bei Edibles muss man es vorher künstlich machen.',
      practice: '<b>Decarb für Edibles (Ofen-Methode):</b><br>1. Buds fein zerkleinern (nicht pulverisieren)<br>2. Auf Backblech mit Backpapier verteilen<br>3. Ofen auf <b>110 °C</b> vorheizen<br>4. <b>30-40 Min backen</b> — Cannabis sollte hellbraun, knusprig werden<br>5. Auskühlen lassen, dann verarbeiten (in Butter, Öl)<br><br><b>Temperatur-Stufen:</b><br>• 100 °C: 60+ Min (schonend, Terpen-erhaltend)<br>• 110 °C: 30-40 Min (Standard)<br>• 120 °C: 20-25 Min (schneller, mehr Terpen-Verlust)<br>• Über 130 °C: Cannabinoide degradieren, nicht empfohlen',
      pitfall: 'Frische Buds direkt für Edibles zu nutzen ohne Decarb = sehr schwache Wirkung. Auch: zu heiß/zu lang = Cannabinoide werden zerstört. Auch CBN entsteht durch Über-Decarb (sedierend, nicht jeder will das). Riech-Test: stark grasiger Geruch beim Backen = Terpene gehen verloren, Lüftung anmachen.' },
    { t: 'Aroma-Entwicklung (Terpen-Reifung)',
      brief: 'Während Curing reifen die Terpene wie bei Wein. Frische Buds vs. 2 Monate gecurt = anderer Strain im Vergleich.',
      mechanism: 'Während Curing geschehen mehrere Prozesse parallel:<br>• <b>Monoterpene</b> (leicht, flüchtig — Myrcen, Limonen, Pinen) verflüchtigen sich teilweise<br>• <b>Sesquiterpene</b> (schwerer, stabiler — Caryophyllen, Humulen) treten in den Vordergrund<br>• <b>Neue Aroma-Verbindungen</b> entstehen durch enzymatische Umwandlungen<br><br>Ergebnis: das Aromaprofil wird <b>komplexer, runder, reifer</b>. Frisch gecurt riecht oft „grasig-grün", nach 6-8 Wochen voll entwickelt mit allen Nuancen.',
      practice: '<b>Beobachtung über Zeit:</b><br>• Woche 1-2: Heu/grasig dominiert<br>• Woche 3-4: Strain-typisches Aroma kommt durch<br>• Woche 6-8: volle Komplexität, beste Phase<br>• Monat 3-4: oft Peak-Aroma<br>• Monat 6+: Terpene beginnen langsam abzubauen<br><br><b>Optimieren:</b><br>• Konstante 60 % RLF im Glas<br>• Dunkel + kühl (15-18 °C ideal)<br>• Glas nur kurz öffnen, schnell wieder zu<br>• Verschiedene Strains nicht im selben Glas (Aromen vermischen sich)',
      pitfall: 'Über-Lagerung > 1 Jahr ohne Vakuum oder spezielle Kühlung: Terpene verflüchtigen sich, Aroma flacht ab. Andere Falle: zu früh in Vakuum-Beutel verbannen → Curing wird unterbrochen, Aroma reift nicht aus.' },
    { t: 'Feuchtigkeits-Regulatoren (Boveda / Integra)',
      brief: 'Zwei-Wege-Membranen die das Curing-Klima automatisch konstant halten. Spart tägliches Burping.',
      mechanism: 'Boveda und Integra sind <b>halbdurchlässige Beutel</b> mit Salz-Wasser-Lösung in spezifischer Konzentration. Sie geben <b>Feuchtigkeit ab</b> wenn das Glas zu trocken ist (unter Zielwert) und <b>nehmen welche auf</b> wenn es zu feucht ist (über Zielwert). Effekt: stabiles Glas-Klima ohne tägliche Eingriffe. Verhindert sowohl Schimmel (zu feucht) als auch Heu-Aroma (zu trocken).',
      practice: '<b>Größen-Empfehlungen:</b><br>• 62 % RLF: Standard für Lagerung & Konsum<br>• 58 % RLF: Long-Term-Lagerung, etwas trockener<br>• 65 % RLF: Cigar-/Pipe-Tabak, für Cannabis zu feucht<br><br><b>Größe nach Glas:</b><br>• 4-g-Pack: für 30-50 g Bud<br>• 8-g-Pack: für ~100 g<br>• 60-g-Pack: für 500 g (Vorratsdosen)<br><br><b>Anwendung:</b><br>• Pack ins Glas legen (Buds nicht direkt drauf)<br>• Nach 2-4 Wochen Cure ist Pack verbraucht (wird hart, kristallin)<br>• Austauschen wenn Pack komplett kristallisiert ist',
      pitfall: 'Bei zu nasser Buds (>70 % RLF) frisch ins Glas → Pack kann nicht so schnell entfeuchten → Schimmel. Pflicht: <b>erst korrekt trocknen</b> (Stiele knacken statt biegen), dann Pack einsetzen. Auch: gefälschte Boveda aus billigen Aliexpress-Quellen — funktionieren nicht zuverlässig.' },
    { t: 'Lagerung',
      brief: 'Nach abgeschlossenem Curing geht es um Konservierung. Dunkel, kühl, dicht — die drei Regeln.',
      mechanism: 'Nach abgeschlossenem Cure (4-8 Wochen) sollten Cannabinoide und Terpene möglichst lange erhalten bleiben. Drei Hauptfeinde:<br>• <b>Licht</b> (besonders UV) → THC degradiert zu CBN<br>• <b>Wärme</b> → Terpene verdampfen, Cannabinoide oxidieren<br>• <b>Sauerstoff</b> → Oxidation aller aktiven Verbindungen<br>• <b>Falsche Feuchte</b> → Schimmel oder Heu-Aroma',
      practice: '<b>Optimal-Bedingungen:</b><br>• Temperatur: 15-20 °C (Keller, kühler Schrank)<br>• Luftfeuchte: 58-62 % RLF (mit Boveda-Pack)<br>• Licht: dunkel — getöntes Glas oder im dunklen Schrank<br>• Behälter: Glas oder lebensmittelechter Kunststoff (kein PE!)<br><br><b>Lagerdauer & Qualität:</b><br>• 1-3 Monate: optimal, frisch und voll aromatisch<br>• 3-6 Monate: noch sehr gut, leichter Aroma-Verlust<br>• 6-12 Monate: deutlicher Terpen-Abbau, THC noch stabil<br>• 12+ Monate: deutlicher Qualitätsverlust, mehr CBN<br><br><b>Cup-Trick (Long-Term):</b> Vakuum-Beutel + Tiefkühler. Hält 1-2 Jahre fast ohne Verlust.',
      pitfall: 'Plastikdosen ohne Lebensmittelechte = Weichmacher wandern in Buds. Direktes Sonnenlicht durch Glas = THC zerstört in Wochen. Im Kühlschrank lagern (NICHT Tiefkühler) ohne Vakuum = Kondensation beim Rausnehmen, Schimmel-Risiko. Tiefkühlung NUR mit Vakuum-Beutel.' },
  ]},
  { cat: '☀️ Outdoor-Spezifika', items: [
    { t: 'Eisheilige (Transplant-Zeitpunkt)',
      brief: 'Die Bauernregel für Mai: Nach den Eisheiligen (15. Mai) ist Frostgefahr meist vorbei. Aber: Wetter schlägt Kalender.',
      mechanism: 'Die fünf „Eisheiligen" sind Mamertus, Pankratius, Servatius, Bonifatius und „kalte Sophie" — Namenstage vom 11. bis 15. Mai. Meteorologisch: in Mitteleuropa besteht bis Mitte Mai noch Restrisiko für <b>Bodenfrost</b>. Cannabis verträgt keine Temperaturen unter 5 °C — bei Frost frieren die Zellen, Blätter werden glasig-schwarz. Selbst bei +3-5 °C nachts hat die Pflanze massiven Stress, stoppt Wachstum für Tage.',
      practice: '<b>Auspflanz-Checkliste:</b><br>• Datum: <b>nach den Eisheiligen (15. Mai)</b> als Faustregel<br>• Nachtttemperatur: konstant <b>>10 °C</b> über mindestens 5-7 Tage<br>• Pflanzengröße: 20-30 cm, 4-5 echte Blattpaare<br>• Wettervorhersage 7-10 Tage prüfen — kein Kälteeinbruch in Sicht<br><br><b>App-Standard:</b> Transplant-Datum ist auf 15. Mai gesetzt, in den Zyklus-Einstellungen anpassbar.<br><br><b>Regional-Anpassungen:</b><br>• Süddeutschland/Rhein-Tal: oft schon Anfang Mai möglich<br>• Norddeutschland/Mittelgebirge: lieber bis Ende Mai warten<br>• Höhenlagen >500 m: Anfang Juni',
      pitfall: '„Es wird schon nicht mehr frieren" → eine kalte Mainacht zerstört monatelange Vorzucht. Wenn Forecast 5 °C oder weniger ankündigt: Pflanzen 1-2 Nächte rein holen, oder mit Vlies abdecken. Eisheilige sind Bauernregel, kein Naturgesetz — eigene Wetter-Beobachtung schlägt jeden Kalender.' },
    { t: 'Abhärten (Hardening Off)',
      brief: 'Die 7 Tage zwischen drinnen und draußen. Ohne Abhärten = Sonnenbrand und Schock. Mit = stabile Outdoor-Pflanze.',
      mechanism: 'Drinnen vorgezogene Pflanzen haben dünne <b>Wachsschichten (Cuticula)</b> auf den Blättern und weiche Stängel. Sie waren nie Wind, direkter UV-Strahlung oder Temperaturschwankungen ausgesetzt. Draußen würden sie binnen Stunden Sonnenbrand bekommen, die Stängel würden im Wind brechen. Während des Abhärtens verdickt die Pflanze ihre Cuticula, bildet UV-Schutz (Flavonoide) und stärkt die Zellwände.',
      practice: '<b>Das 7-Tage-Protokoll:</b><br>• <b>Tag 1-2:</b> 2-3 Std raus, Halbschatten, windgeschützt (Hauswand, unter Baum)<br>• <b>Tag 3-4:</b> 4-6 Std raus, langsam mehr Sonne dazu<br>• <b>Tag 5-6:</b> Ganzen Tag raus, abends rein<br>• <b>Tag 7:</b> 24 Std draußen — bereit fürs Beet<br><br><b>Beste Tageszeit zum Anfangen:</b> Vormittags raus, vor Mittagshitze. Nicht direkt mittags in volle Sonne.<br><br><b>Im App:</b> Eigene Abhärten-Phase (🌤) mit täglichen Tipps — startet 7 Tage vor Transplant-Datum automatisch.',
      pitfall: 'Häufiger Fehler: „Die Pflanze ist groß genug, kann direkt raus" → Sonnenbrand am ersten Tag (braune Flecken zwischen den Adern). Auch: Bei Wind-böigem Wetter abhärten = Stamm bricht weil noch zu weich. Lieber 2-3 Tage länger abhärten als zu schnell raussetzen. Re-Adaptation kostet 1-2 Wochen Wachstum.' },
    { t: 'Sommersonnenwende (Mythos-Trigger)',
      brief: 'Populärer Irrtum: Cannabis blüht NICHT zur Sommersonnenwende. Der wahre Trigger kommt 8 Wochen später.',
      mechanism: 'Verbreiteter Irrglaube: Die Sommersonnenwende am 21. Juni löst die Blüte aus. Realität: am 21. Juni werden die Tage zwar kürzer, aber sind immer noch viel zu lang (16-17 h Tageslicht in Mitteleuropa). Cannabis braucht Nächte von <b>mindestens ~10 Stunden</b> für den Phytochrom-Trigger. Das passiert in Deutschland erst <b>ab ~17. August</b> — wenn der Tag unter 14 h fällt.',
      practice: '<b>Realer Outdoor-Blüte-Beginn (Deutschland, ~50°N):</b><br>• Mitte August: erste Pre-Flowers (kleine weiße Härchen sichtbar)<br>• Ende August: aktive Blütenbildung beginnt<br>• September: volle Blüte, Buds werden dicker<br>• Oktober: Reife, je nach Strain Ende September bis Mitte Oktober Erntezeit<br><br><b>Sortenabhängige Variationen:</b><br>• Frühe Strains (Indica, Auto): Erntezeit Ende September<br>• Standard: Anfang bis Mitte Oktober<br>• Sativa-lastige: Ende Oktober bis Anfang November (oft schon Frostgefahr!)<br><br><b>App-Standard:</b> Blüte-Trigger auf 17. August kalibriert (Deutschland). Bei abweichenden Sorten: erste Pistil-Sichtung manuell als Blüte-Beginn eintragen.',
      pitfall: 'Anfänger panisch wenn Pflanze im Juli noch nicht blüht — alles okay, das ist normal. Sativas die zu spät blühen können in den Herbst-Schimmel laufen → richtige Sorten-Wahl im Frühjahr ist entscheidend. Frühblüher oder Auto für späte Auspflanzungen.' },
    { t: 'Wurzelzone Outdoor (Topf-Hitze)',
      brief: 'Schwarze Töpfe in voller Sonne werden 50 °C heiß. Wurzeln sterben bei 31 °C. Sichtbar wird das erst Tage später.',
      mechanism: 'Schwarze Plastik-Oberflächen <b>absorbieren bis zu 95 %</b> der Sonnenstrahlung als Wärme. Innen kann die Topf-Temperatur an heißen Tagen <b>45-50 °C</b> erreichen. Cannabis-Wurzeln sterben bei anhaltend über 31 °C. Das fatale: oberirdisch sieht die Pflanze noch Tage gut aus — unten stirbt das Wurzelsystem schon. Sichtbar wird der Schaden später als unerklärliches Welken trotz Gießen, Mangel-Symptome ohne Grund.',
      practice: '<b>Lösungen in der Reihenfolge ihrer Wirkung:</b><br>1. <b>Stofftöpfe</b> — luftdurchlässig, Verdunstung kühlt aktiv (10-15 °C kühler als schwarzer Plastik)<br>2. <b>Heller Übertopf</b> — weiße Farbe oder heller Keramik als „Mantel" um schwarzen Topf<br>3. <b>Mulch-Schicht</b> auf der Erdoberfläche (Rindenmulch, Stroh, Holzhäcksel)<br>4. <b>Morgens gießen</b> — kühles Wasser senkt die Topf-Temperatur für Stunden<br>5. <b>Mittags-Schatten</b> (11-15 Uhr) durch Sonnensegel/Schirm wenn Hitzewelle<br><br><b>Schnell-Test:</b> Mittags die Hand auf die Außenseite des schwarzen Topfes legen. Heiß = Wurzeln fühlen dasselbe.<br><br><b>Topf-Größe:</b> Größere Töpfe (50+ L) heizen langsamer auf, sind träger. Kleine Töpfe (10-20 L) reagieren schnell — gefährlicher.',
      pitfall: 'Häufiger Fehler: schwarzer 30-L-Plastiktopf auf hellem Stein-Balkon → doppelte Hitze (Sonne + Reflektion). Außerdem: Tröpfchen-Bewässerung mit warmem Wasser aus dem Schlauch (50 °C nach 2 Min Sonne) = thermischer Schock. Erst Wasser laufen lassen bis kalt, dann gießen.' },
  ]},
  { cat: '🐛 Probleme', items: [
    { t: 'Trauermücken (Sciaridae)',
      brief: 'Kleine schwarze Fliegen über der Erde. Die Larven fressen Wurzelhaare — das ist das eigentliche Problem.',
      mechanism: 'Trauermücken legen ihre Eier in <b>feuchte Substrat-Oberfläche</b>. Die Larven leben in den oberen 2-3 cm Erde und fressen <b>feine Wurzelhaare und organisches Material</b>. Die adulten Fliegen selbst sind harmlos — der Schaden kommt unten. Bei starkem Befall: ganze Wurzelhaar-Schichten weg → Pflanze nimmt schlechter auf, kümmert.',
      practice: '<b>Diagnose:</b><br>• Schwarze, fruchtfliegen-große Insekten beim Gießen oder Bewegen<br>• Sitzen auf der Erde oder fliegen herum<br>• Larven-Test: oberste Erdschicht in eine Tasse → Wasser drauf → kleine weiße Würmer schwimmen oben<br><br><b>Bekämpfung (kombiniert):</b><br>1. <b>Gelbtafeln</b> über die Töpfe hängen — fängt adulte Fliegen<br>2. <b>Nematoden</b> (Steinernema feltiae): Pulver mit Gießwasser einbringen, parasitieren die Larven biologisch<br>3. <b>BTI-Bakterien</b> (Bacillus thuringiensis israelensis): tötet Larven gezielt, harmlos für Pflanze<br>4. <b>Bottom-Watering</b> präventiv: oberste Schicht trocken = kein Brutplatz<br>5. <b>Sand-/Kies-Top-Layer</b> 1-2 cm: Fliegen können nicht mehr eindringen',
      pitfall: 'Häufiger Fehler: Erst chemisch sprühen, später biologisch — die Chemie hat dann schon die Nematoden mitgekillt. Immer erst biologisch starten. Auch: nur Gelbtafeln allein reicht nicht — sie fangen die adulten, die Larven (das eigentliche Problem) bleiben unten. Drei Methoden parallel = effektiv.' },
    { t: 'Spinnmilben (Tetranychidae)',
      brief: 'Mikroskopisch kleine Sauger auf der Blattunterseite. Können in 2 Wochen ein Zelt komplett ruinieren.',
      mechanism: 'Spinnmilben sind keine Insekten sondern <b>Spinnentiere</b>. Sie sitzen auf der Blattunterseite und <b>saugen Zellsaft</b>. Eine Population kann sich alle 3 Tage verdoppeln — bei trocken-heißem Klima (VPD zu hoch) explodieren sie. Spätstadium: feine Spinnenfäden ziehen sich um die Buds, Blätter werden spröde, alles trocknet aus. Häufig <b>aus Aliexpress-Erde oder mitgebrachten Pflanzen eingeschleppt</b>.',
      practice: '<b>Frühe Diagnose (entscheidend!):</b><br>• <b>Winzige weiße/gelbe Punkte</b> auf der Blatt-Oberseite (Stippen-Muster)<br>• Lupe/Smartphone-Mikroskop: kleine bewegliche Punkte auf der Unterseite<br>• Spätes Stadium: feine weiße Fäden zwischen Blättern und Buds<br><br><b>Bekämpfung (Eskalations-Stufen):</b><br>1. <b>Raubmilben</b> (Phytoseiulus persimilis) — biologischer Gegenspieler, frisst nur Spinnmilben<br>2. <b>Neemöl-Spritzung</b> (alle 5-7 Tage, 3× wiederholen) — NUR in Veg, niemals in Blüte!<br>3. <b>Insektizidseife</b> oder Schmierseifen-Lösung — abwaschen<br>4. <b>Luftfeuchte erhöhen</b> auf 60-65 % — Milben hassen feucht<br>5. <b>Bei Massenbefall in Spätblüte:</b> abernten was erntereif ist, Rest opfern',
      pitfall: 'Im <b>Spät-Blüte-Befall</b> ist Sprühen unmöglich (Buds werden nass = Schimmel). Wer zu spät erkennt, verliert die Ernte. Daher: <b>Wöchentlich</b> mit Lupe Blattunterseiten checken — präventiv, nicht erst wenn Schaden sichtbar. Auch: Pflanzen aus dem Garten (Tomaten, Erdbeeren) bringen Spinnmilben mit ins Zelt.' },
    { t: 'Thripse',
      brief: 'Längliche kleine Insekten die Blattzellen aussaugen. Hinterlassen silbrige Flecken — typisches Erkennungsmerkmal.',
      mechanism: 'Thripse sind 1-2 mm lange, gelb-braune Insekten. Sie <b>raspeln die Blattzellen auf</b> und saugen den Saft. Die zerstörten Zellen erscheinen <b>silbrig-glänzend</b> (Lufteinschluss). Daneben: kleine schwarze Kot-Punkte. Auch Übertragen Thripse gerne <b>Viren</b> — sind also doppelt schädlich.',
      practice: '<b>Diagnose:</b><br>• <b>Silbrig-glänzende Flecken</b> auf Blättern (typisches Merkmal)<br>• Kleine schwarze Kot-Punkte<br>• Verformungen neuer Blätter (gekräuselt)<br>• Adulte Thripse beim Schütteln des Blattes sichtbar<br><br><b>Bekämpfung:</b><br>1. <b>Blautafeln</b> (Thripse reagieren auf BLAU, nicht Gelb wie Trauermücken)<br>2. <b>Raubmilben</b> (Amblyseius cucumeris) — biologischer Gegenspieler<br>3. <b>Florfliegenlarven</b> (Chrysoperla carnea)<br>4. <b>Neemöl-Spritzung</b> in Veg<br>5. <b>Insektizidseife</b><br><br>Bei frühem Befall reicht oft Blautafeln + Neemöl.',
      pitfall: 'Thripse leben oft IN der Erde (Puppenstadium) — nur Sprühen oben reicht nicht. Substrat-Oberfläche mit Beauveria bassiana (entomopathogener Pilz) behandeln für vollständige Bekämpfung. Auch: Verwechslung mit Spinnmilben — Spinnmilben machen weiße/gelbe Punkte (kleinere Stippen), Thripse machen silbrige Flecken (größer, glänzend).' },
    { t: 'Echter Mehltau',
      brief: 'Weißer mehlig-pudriger Belag auf den Blättern. Systemischer Pilz — dringt in die Pflanze ein, abwischen reicht nicht.',
      mechanism: 'Pilzbefall der oberen Blattschicht. Die Sporen verbreiten sich durch Luft und keimen bei <b>hoher Feuchte + stehender Luft + Tag/Nacht-Temperatur-Schwankungen</b>. Anders als Schimmel (Botrytis) befällt Echter Mehltau primär die <b>Blattoberseiten</b> und ist <b>systemisch</b> — dringt in die Pflanze ein. Reine Oberflächen-Reinigung beseitigt das Problem nur kurzfristig.',

function openLexikon() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-lexikon').classList.add('active');
  renderLexikon();
}

/** Open Lexikon and auto-expand a specific entry by title */
function openLexikonEntry(title) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-lexikon').classList.add('active');
  renderLexikon(title);
}

function renderLexikon(highlightTitle) {
  // STRUKTUR-SUPPORT (Phase 4 Schritt 4):
  // Ein Lexikon-Eintrag kann jetzt optionale strukturierte Felder haben:
  //   brief:     1-Satz-Kern (erscheint als Subtitel unter dem Titel)
  //   mechanism: "Wie funktioniert es" (Mechanik-Block)
  //   practice:  "Wie mache ich es konkret" (Praxis-Block)
  //   pitfall:   "Was schiefgehen kann" (Warnung-Block)
  //   txt:       Freitext-Fallback (bisheriges Format)
  //
  // Mindestens EINES der Felder muss befüllt sein. Der Renderer prüft welche
  // da sind und rendert entsprechend. Reine txt-Einträge bleiben unverändert.
  function renderLexItemBody(item) {
    const sections = [];
    if (item.mechanism) sections.push({ label: 'Mechanik', body: item.mechanism, color: 'var(--blue)' });
    if (item.practice) sections.push({ label: 'Praxis', body: item.practice, color: 'var(--green)' });
    if (item.pitfall) sections.push({ label: 'Vorsicht', body: item.pitfall, color: 'var(--orange)' });

    let html = '';
    if (item.brief) {
      html += `<div style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:10px;font-weight:600">${item.brief}</div>`;
    }
    if (sections.length > 0) {
      html += sections.map(s =>
        `<div style="margin-bottom:10px">
          <div style="font-size:10px;font-weight:700;color:${s.color};text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">${s.label}</div>
          <div style="font-size:12px;color:var(--text-sub);line-height:1.65">${s.body}</div>
        </div>`
      ).join('');
      // Wenn zusätzlich txt als Ergänzung vorhanden: als "Hintergrund" unten anhängen
      if (item.txt) {
        html += `<div style="font-size:12px;color:var(--text-sub);line-height:1.65;padding-top:6px;border-top:0.5px dashed var(--border)">${item.txt}</div>`;
      }
    } else if (item.txt) {
      // Fallback: klassisches txt-only Format
      html = `<div style="font-size:12px;color:var(--text-sub);line-height:1.7">${item.txt}</div>`;
    } else {
      html = `<div style="font-size:11px;color:var(--text-muted);font-style:italic">Kein Inhalt hinterlegt.</div>`;
    }
    return html;
  }

  document.getElementById('lexikon-body').innerHTML = LEXIKON.map(cat => `
    <div style="margin-bottom:4px">
      <div class="sect-head" style="font-size:12px;padding:6px 0">${cat.cat}</div>
      ${cat.items.map(item => {
        const isHL = highlightTitle && item.t === highlightTitle;
        const hasStructure = !!(item.brief || item.mechanism || item.practice || item.pitfall);
        return `
        <div id="lex-${item.t.replace(/[^a-zA-Z]/g,'')}" style="background:${isHL ? 'var(--green-bg)' : 'var(--card)'};border:0.5px solid ${isHL ? 'var(--green-dk)' : 'var(--border)'};border-radius:10px;overflow:hidden;margin-bottom:6px;${isHL ? 'scroll-margin-top:80px' : ''}">
          <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.ltgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'" 
            style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:${isHL ? '700' : '500'};color:${isHL ? 'var(--green)' : 'var(--text)'}">${item.t}${hasStructure ? ' <span style="font-size:9px;color:var(--text-hint);font-weight:500">· strukturiert</span>' : ''}</div>
            </div>
            <span class="ltgl" style="color:var(--text-muted);font-size:14px">${isHL ? '▾' : '▸'}</span>
          </div>
          <div style="display:${isHL ? 'block' : 'none'};padding:0 14px 12px">
            ${renderLexItemBody(item)}
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('') + '<div style="height:20px"></div>';

  // Auto-scroll to highlighted entry
  if (highlightTitle) {
    setTimeout(() => {
      const el = document.getElementById('lex-' + highlightTitle.replace(/[^a-zA-Z]/g, ''));
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}

function openHowto() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-howto').classList.add('active');
  renderHowto();
}

function renderHowto() {
  const q = (document.getElementById('howto-search')?.value || '').trim();
  // Full render (rebuilds DOM including search field). Called on open.
  _renderHowtoFull(q);
}

/**
 * Called live as user types — only re-renders the results/info section,
 * keeping the search input DOM-stable so the mobile keyboard stays open
 * and the cursor doesn't jump.
 */
function _onHowtoSearchInput(q) {
  const query = (q || '').trim();
  const resultsEl = document.getElementById('howto-results');
  if (!resultsEl) { renderHowto(); return; }
  resultsEl.innerHTML = _buildHowtoResults(query);
  // Toggle the X button
  const clearBtn = document.getElementById('howto-search-clear');
  if (clearBtn) clearBtn.style.display = query ? 'flex' : 'none';
  // Toggle the tours section at the bottom
  const toursEl = document.getElementById('howto-tours');
  if (toursEl) toursEl.style.display = query ? 'none' : 'block';
}

/**
 * Normalize a string for search matching.
 * Lowercase, strip HTML, replace German umlauts so "düngen"/"duengen"/"DÜNGEN" all match.
 */
// =====================================================================
//  [SEKTION]: CHARTS: Zeitreihen-Visualisierung pro Zyklus (v0.8.89)
//  Eigene SVG-Implementierung, kein externes Chart-Library nötig.
// =====================================================================

/**
 * Collect a time-series of a specific metric from a cycle's entries.
 * Returns an array of {day, iso, val, phase} sorted by day.
 * Skips days without the metric set (or where value is empty/NaN).
 */
function collectMetric(cycleId, field, subfield) {
  const cyc = S.cycles.find(c => c.id === cycleId);
  if (!cyc || !cyc.startDate) return [];
  const points = [];
  Object.keys(S.entries || {}).forEach(iso => {
    const e = S.entries[iso];
    if (!e) return;
    let val;
    if (subfield) {
      // cycleData field (e.g. 'ph', 'ec', 'water')
      val = e.cycleData && e.cycleData[cycleId] && e.cycleData[cycleId][subfield];
    } else {
      // top-level (e.g. 'temp', 'humidity')
      val = e[field];
    }
    const num = parseFloat(val);
    if (isNaN(num)) return;
    const day = isoDiff(iso, cyc.startDate);
    if (day < 0) return;
    const ph = phase(iso, cyc);
    points.push({ day, iso, val: num, phase: ph ? ph.ph : null });
  });
  points.sort((a, b) => a.day - b.day);
  return points;
}

/**
 * Collect VPD time-series. VPD is computed from temp + humidity on each day
 * that has both values.
 */
function collectVPDSeries(cycleId) {
  const cyc = S.cycles.find(c => c.id === cycleId);
  if (!cyc || !cyc.startDate) return [];
  const points = [];
  Object.keys(S.entries || {}).forEach(iso => {
    const e = S.entries[iso];
    if (!e) return;
    const t = parseFloat(e.temp);
    const r = parseFloat(e.humidity);
    if (isNaN(t) || isNaN(r)) return;
    const v = calcVPD(t, r);
    if (v === null) return;
    const day = isoDiff(iso, cyc.startDate);
    if (day < 0) return;
    const ph = phase(iso, cyc);
    points.push({ day, iso, val: v, phase: ph ? ph.ph : null });
  });
  points.sort((a, b) => a.day - b.day);
  return points;
}

/**
 * Build an SVG line or bar chart for a time-series.
 *
 * config: {
 *   title: string,
 *   unit: string,               // e.g. 'pH', 'mS/cm', 'kPa', 'L'
 *   min: number, max: number,   // Y-axis range
 *   zones: [{from, to, color, label}]  // optional background zones
 *   type: 'line' | 'bar',
 *   chartId: string             // unique DOM id for tooltip targeting
 * }
 */
function buildChart(points, totalDays, config) {
  const W = 320, H = 140;
  const padL = 32, padR = 10, padT = 10, padB = 22;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  // Map data coords to SVG coords
  const xMax = Math.max(totalDays || 1, 1);
  const xAt = (day) => padL + (day / xMax) * innerW;
  const yAt = (v) => padT + innerH - ((v - config.min) / (config.max - config.min)) * innerH;

  // Zones as background rects
  const zoneHTML = (config.zones || []).map(z => {
    const y1 = yAt(z.to);
    const y2 = yAt(z.from);
    const h = y2 - y1;
    return `<rect x="${padL}" y="${y1}" width="${innerW}" height="${h}" fill="${z.color}" opacity="0.12"/>`;
  }).join('');

  // Y-axis grid + labels (4 lines)
  const ySteps = 4;
  let gridHTML = '';
  for (let i = 0; i <= ySteps; i++) {
    const v = config.min + (config.max - config.min) * (i / ySteps);
    const y = yAt(v);
    gridHTML += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#2a3b2a" stroke-width="0.5" opacity="0.5"/>`;
    gridHTML += `<text x="${padL - 4}" y="${y + 3}" font-size="9" text-anchor="end" fill="#8a9a8a" font-family="monospace">${v.toFixed(config.decimals ?? 1)}</text>`;
  }

  // X-axis labels (every ~20% of width)
  let xLabelHTML = '';
  const xLabelSteps = 4;
  for (let i = 0; i <= xLabelSteps; i++) {
    const day = Math.round((xMax * i) / xLabelSteps);
    const x = xAt(day);
    xLabelHTML += `<text x="${x}" y="${H - 6}" font-size="9" text-anchor="middle" fill="#8a9a8a" font-family="monospace">T${day}</text>`;
  }

  // Data rendering
  let dataHTML = '';
  if (points.length === 0) {
    dataHTML = `<text x="${W/2}" y="${H/2}" font-size="11" text-anchor="middle" fill="#5a6a5a" font-family="system-ui">Noch keine Daten</text>`;
  } else if (config.type === 'bar') {
    // Bar chart (for water amounts)
    const barWidth = Math.max(2, innerW / xMax * 0.6);
    dataHTML = points.map((p, i) => {
      const x = xAt(p.day);
      const y = yAt(p.val);
      const h = yAt(config.min) - y;
      return `<rect class="chart-bar-${config.chartId}" data-idx="${i}" x="${x - barWidth/2}" y="${y}" width="${barWidth}" height="${h}" fill="#4CAF70" opacity="0.75" onclick="showChartTooltip('${config.chartId}', ${i}, event)" style="cursor:pointer"/>`;
    }).join('');
  } else {
    // Line chart
    if (points.length > 1) {
      const pathD = points.map((p, i) => {
        const cmd = i === 0 ? 'M' : 'L';
        return `${cmd}${xAt(p.day).toFixed(1)},${yAt(p.val).toFixed(1)}`;
      }).join(' ');
      dataHTML += `<path d="${pathD}" fill="none" stroke="#4CAF70" stroke-width="1.5"/>`;
    }
    dataHTML += points.map((p, i) => {
      return `<circle class="chart-pt-${config.chartId}" data-idx="${i}" cx="${xAt(p.day).toFixed(1)}" cy="${yAt(p.val).toFixed(1)}" r="5" fill="#4CAF70" stroke="#0a1a0a" stroke-width="1.5" onclick="showChartTooltip('${config.chartId}', ${i}, event)" style="cursor:pointer"/>`;
    }).join('');
  }

  // Tooltip container (absolute positioned inside wrapper)
  const pointsJSON = JSON.stringify(points).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
  return `
    <div style="position:relative" data-chart-points="${pointsJSON}" data-chart-unit="${config.unit || ''}" id="chart-wrap-${config.chartId}">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">
        ${zoneHTML}
        ${gridHTML}
        ${xLabelHTML}
        ${dataHTML}
      </svg>
      <div id="chart-tt-${config.chartId}" style="display:none;position:absolute;background:#0a1a0a;border:1px solid #4CAF70;border-radius:6px;padding:6px 8px;font-size:11px;color:#e0f0e0;pointer-events:none;white-space:nowrap;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>
    </div>
  `;
}

/**
 * Show tooltip for a chart point. Called from onclick on circle/rect elements.
 */
function showChartTooltip(chartId, idx, ev) {
  ev.stopPropagation();
  const wrap = document.getElementById('chart-wrap-' + chartId);
  const tt = document.getElementById('chart-tt-' + chartId);
  if (!wrap || !tt) return;
  const rawPoints = wrap.getAttribute('data-chart-points');
  const unit = wrap.getAttribute('data-chart-unit') || '';
  let points;
  try {
    points = JSON.parse(rawPoints.replace(/&#39;/g, "'").replace(/&quot;/g, '"'));
  } catch (_) { return; }
  const p = points[idx];
  if (!p) return;

  // Phase labels
  const phaseLabels = { anzucht: 'Anzucht', bloom: 'Blüte', flush: 'Spülen', ice: 'Ice', harvest: 'Ernte', dry: 'Trocknung' };
  const phLabel = p.phase ? phaseLabels[p.phase] || p.phase : '';

  tt.innerHTML = `
    <div style="font-weight:600;color:#4CAF70">${fmtDE(p.iso, { day: '2-digit', month: '2-digit', year: 'numeric' })}</div>
    <div style="color:#b0c0b0;font-size:10px;margin-top:2px">Tag ${p.day + 1}${phLabel ? ' · ' + phLabel : ''}</div>
    <div style="margin-top:3px;font-family:monospace;font-size:13px"><b>${p.val.toFixed(2)}</b> ${unit}</div>
  `;

  // Position tooltip near click point, clamped to wrapper bounds
  const wrapRect = wrap.getBoundingClientRect();
  let left = ev.clientX - wrapRect.left + 8;
  let top = ev.clientY - wrapRect.top - 10;
  tt.style.display = 'block';
  // Clamp after rendering so we have dimensions
  const ttRect = tt.getBoundingClientRect();
  if (left + ttRect.width > wrapRect.width - 4) left = wrapRect.width - ttRect.width - 4;
  if (left < 4) left = 4;
  if (top + ttRect.height > wrapRect.height - 4) top = wrapRect.height - ttRect.height - 4;
  if (top < 0) top = 4;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

/**
 * Hide all chart tooltips (called when clicking outside).
 */
function hideChartTooltips() {
  document.querySelectorAll('[id^="chart-tt-"]').forEach(tt => { tt.style.display = 'none'; });
}
// Set up global click-outside handler
document.addEventListener('click', (e) => {
  if (!e.target.closest('[id^="chart-wrap-"]')) hideChartTooltips();
});

/**
 * Build the complete charts section for a cycle.
 * Returns HTML string with all 4 charts or a "not enough data" notice.
 */
function buildChartsSection(cycleId) {
  const cyc = S.cycles.find(c => c.id === cycleId);
  if (!cyc || !cyc.startDate) return '';

  const phData = collectMetric(cycleId, null, 'ph');
  const ecData = collectMetric(cycleId, null, 'ec');
  const waterData = collectMetric(cycleId, null, 'water');
  const vpdData = collectVPDSeries(cycleId);

  const minPoints = 3;
  const total = Math.max(phData.length, ecData.length, waterData.length, vpdData.length);
  if (total < minPoints) {
    return `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:4px">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">📈 Verlauf & Charts</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.5">Noch nicht genug Daten. Ab <b>${minPoints} Einträgen</b> mit Werten (pH, EC, Temperatur, Luftfeuchte oder Wasser) siehst du hier die Verläufe.</div>
    </div>`;
  }

  // Figure out cycle total days (up to end of dry phase)
  const a = cyc.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const b = a + (cyc.bloomDays || PHASE_DEFAULTS.bloomDays);
  const f = b + (cyc.flushDays || PHASE_DEFAULTS.flushDays);
  const ic = f + (cyc.iceDays || PHASE_DEFAULTS.iceDays);
  const h = ic + (cyc.harvestDays || PHASE_DEFAULTS.harvestDays);
  const dr = h + (cyc.dryDays || PHASE_DEFAULTS.dryDays);

  // Chart configs
  const phChart = buildChart(phData, dr, {
    title: 'pH-Verlauf', unit: 'pH', min: 5.0, max: 7.5, decimals: 1,
    zones: [{ from: 6.2, to: 6.4, color: '#4CAF70' }],
    type: 'line', chartId: 'ph-' + cycleId,
  });
  const ecChart = buildChart(ecData, dr, {
    title: 'EC-Verlauf', unit: 'mS/cm', min: 0, max: 3.0, decimals: 1,
    zones: [{ from: 1.2, to: 2.2, color: '#4CAF70' }],
    type: 'line', chartId: 'ec-' + cycleId,
  });
  const vpdChart = buildChart(vpdData, dr, {
    title: 'VPD-Verlauf', unit: 'kPa', min: 0, max: 2.0, decimals: 2,
    zones: [{ from: 0.8, to: 1.2, color: '#4CAF70' }],
    type: 'line', chartId: 'vpd-' + cycleId,
  });
  const waterMax = Math.max(5, ...waterData.map(p => p.val)) * 1.1;
  const waterChart = buildChart(waterData, dr, {
    title: 'Wassermenge', unit: 'L', min: 0, max: waterMax, decimals: 1,
    type: 'bar', chartId: 'water-' + cycleId,
  });

  // Layout — each chart is independently collapsible, all start collapsed
  return `
    <div class="sect-head" style="margin-top:4px">📈 Verlauf & Charts</div>
    ${_chartBlock('📊 pH-Verlauf', phData.length, 'Grüner Bereich: 6.2–6.4 (Erde, ideal) · tipp auf Punkt für Details', phChart)}
    ${_chartBlock('📊 EC-Verlauf', ecData.length, 'Grüner Bereich: 1.2–2.2 mS/cm (typisch Vegi→Blüte)', ecChart)}
    ${_chartBlock('📊 VPD-Verlauf', vpdData.length, 'Grüner Bereich: 0.8–1.2 kPa (Blüte optimal) · Cup-Niveau Spätblüte: gezielt 1.4–1.6 für Trichom-Boost · aus Temp + Luftfeuchte berechnet', vpdChart)}
    ${_chartBlock('📊 Wassermenge', waterData.length, 'Bar = Liter pro Gießtag', waterChart)}
  `;
}

function _chartBlock(label, count, legend, chartHTML) {
  // Each chart is its own collapsible accordion block, starts closed.
  return `
    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">

function _normSearch(s) {
  if (!s) return '';
  return String(s)
    .replace(/<[^>]+>/g, ' ')
    .toLowerCase()
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/\s+/g, ' ')
    .trim();
}

function _escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/**
 * Highlight all case-insensitive occurrences of `query` in `html`, without breaking tags.
 */
function _highlightMatches(html, query) {
  if (!query) return html;
  const parts = html.split(/(<[^>]+>)/g);
  return parts.map(p => {
    if (p.startsWith('<')) return p;
    const re = new RegExp(_escRegex(query), 'gi');
    return p.replace(re, m => `<mark style="background:rgba(240,208,80,0.35);color:var(--text);padding:1px 2px;border-radius:3px">${m}</mark>`);
  }).join('');
}

function renderGallery() {
  const act = S.cycles;
  const allPhotos = [];
  Object.keys(S.entries).sort().forEach(d => {
    const e = S.entries[d];
    if (!e?.cycleData) return;
    Object.keys(e.cycleData).forEach(cId => {
      const cd = e.cycleData[cId];

      if (cd?.photos?.length) {
        cd.photos.forEach(src => {
          allPhotos.push({ date: d, cId, name: c?.name || '—', src });

      }

// =====================================================================
//  [SEKTION]: PPFD / DLI LIGHT METER (Ambient Light Sensor → Manual fallback)
// =====================================================================
const LUX_TO_PPFD = {
  led_white: 0.0185,
  led_blurple: 0.0250,
  hps: 0.0148,
  cfl: 0.0135,
  sun: 0.0185,
};
let _ppfdSensor = null;

function startPPFD() {
  const status = document.getElementById('ppfd-status');
  const ppfdEl = document.getElementById('ppfd-val');
  const dliEl = document.getElementById('dli-val');
  const luxEl = document.getElementById('lux-val');
  const btn = document.getElementById('ppfd-btn');

  if (_ppfdSensor) { stopPPFD(); return; }

  function update(lux) {
    const src = document.getElementById('ppfd-src')?.value || 'led_white';
    const hours = parseFloat(document.getElementById('ppfd-hours')?.value) || 18;
    const factor = LUX_TO_PPFD[src] || 0.0185;
    const ppfd = Math.round(lux * factor);
    const dli = (ppfd * hours * 3600 / 1000000).toFixed(1);
    if (ppfdEl) { ppfdEl.textContent = ppfd; ppfdEl.style.color = ppfd >= 600 && ppfd <= 900 ? 'var(--green)' : ppfd > 900 ? 'var(--red)' : ppfd >= 200 ? 'var(--yellow)' : 'var(--text-muted)'; }
    if (luxEl && !luxEl.isContentEditable) luxEl.textContent = Math.round(lux);
    if (dliEl) { dliEl.textContent = dli; dliEl.style.color = parseFloat(dli) >= 30 && parseFloat(dli) <= 45 ? 'var(--green)' : parseFloat(dli) > 45 ? 'var(--orange)' : 'var(--teal)'; }
  }

  function startSensor() {
    try {
      const sensor = new AmbientLightSensor({ frequency: 2 });
      sensor.addEventListener('reading', () => update(sensor.illuminance));
      sensor.addEventListener('error', e => {
        if (status) status.textContent = '⚠ Sensor-Fehler: ' + (e.error?.message || 'Unbekannt');
        showManual();
      });
      sensor.start();
      _ppfdSensor = sensor;
      if (btn) { btn.textContent = '⏹ Stoppen'; btn.style.borderColor = 'rgba(224,96,96,0.5)'; }
      if (status) status.textContent = '📡 Lichtsensor aktiv — Handy mit Display nach oben unter die Lampe';
    } catch (e) {
      if (status) status.textContent = '⚠ Sensor nicht verfügbar: ' + e.message;
      showManual();
    }
  }

  function showManual() {
    if (luxEl) {
      luxEl.contentEditable = 'true';
      luxEl.style.cssText += ';border:1px solid var(--yellow);border-radius:4px;padding:2px 6px;outline:none;-webkit-user-select:text;user-select:text;min-width:60px';
      luxEl.textContent = '15000';
      luxEl.oninput = () => update(parseFloat(luxEl.textContent) || 0);
      update(15000);
    }
    if (status) status.innerHTML = '✏️ Sensor nicht verfügbar. Lux manuell eingeben oder eine Lux-Meter-App nutzen.';
  }

  // Check for AmbientLightSensor support
  if ('AmbientLightSensor' in window) {
    // Try to get permission first

          } else {
            startSensor();

        .catch(() => startSensor()); // permission query not supported, just try
    } else {
      startSensor();
    }
  } else {
    if (status) status.textContent = '⚠ AmbientLightSensor wird von diesem Browser nicht unterstützt.';
    showManual();
  }
}

// =====================================================================
//  [SEKTION]: LONG-PRESS FOR STEPPER BUTTONS
//  Hold down +/- to rapidly increment. After 400ms the click auto-repeats
//  every 100ms, accelerating to 50ms after 1.5s.
// =====================================================================
(function() {
  let heldBtn = null;
  let startTimer = null;
  let repeatTimer = null;
  let startTime = 0;

  function isStepperBtn(el) {
    if (!el || !el.onclick) return false;
    if (el.classList && el.classList.contains('stepper-btn')) return true;
    // Mix-dose stepper buttons have inline style but onclick contains stepMixDose
    const oc = el.getAttribute && el.getAttribute('onclick');
    if (oc && oc.indexOf('stepMixDose(') !== -1) return true;
    return false;
  }

  function fireClick(el) {
    if (!el || !el.onclick) return;
    // Synthesize a minimal event object so stopPropagation calls don't crash
    const fakeEvt = { stopPropagation: () => {}, preventDefault: () => {} };
    try { el.onclick.call(el, fakeEvt); } catch (e) { /* ignore */ }
  }

  function stopHold() {
    if (startTimer) { clearTimeout(startTimer); startTimer = null; }
    if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
    heldBtn = null;
  }

  function startHold(el) {
    stopHold();
    heldBtn = el;
    startTime = Date.now();
    // After 400ms, start repeating
    startTimer = setTimeout(() => {
      if (!heldBtn) return;
      repeatTimer = setInterval(() => {
        if (!heldBtn) { clearInterval(repeatTimer); return; }
        fireClick(heldBtn);
        // Accelerate: after 1.5s of holding, switch to faster interval
        if (Date.now() - startTime > 1900 && repeatTimer) {
          clearInterval(repeatTimer);
          repeatTimer = setInterval(() => {
            if (!heldBtn) { clearInterval(repeatTimer); return; }
            fireClick(heldBtn);
          }, 50);
        }
      }, 100);
    }, 400);
  }

  document.addEventListener('mousedown', e => {
    const el = e.target.closest('button');
    if (isStepperBtn(el)) startHold(el);
  }, true);
  document.addEventListener('touchstart', e => {
    const el = e.target.closest('button');
    if (isStepperBtn(el)) startHold(el);
  }, { passive: true, capture: true });

  ['mouseup', 'mouseleave', 'touchend', 'touchcancel', 'blur'].forEach(ev => {
    document.addEventListener(ev, stopHold, true);
  });
  // Also stop if we scroll — Android often fires touchstart on scroll start
  document.addEventListener('touchmove', () => {
    // Only cancel if we're within the startup period (before repeat kicked in)
    // If repeat is already running, user probably wants to keep going
    if (startTimer && !repeatTimer) stopHold();
  }, { passive: true, capture: true });
})();

// =====================================================================
//  [SEKTION]: TOUR ENGINE
//  Guided onboarding with overlay + popup + highlight.
//
//  A tour is an array of step objects:
//  {
//    target: '#css-selector'       // element to highlight (optional for intro/outro)
//    tab: 'dash'|'cal'|'tips'|'set' // auto-switch to this tab before step
//    title: '🎯 Schritt-Titel'
//    body: 'Erklärungstext'
//    arrow: 'auto'|'top'|'bottom'|'left'|'right'  // popup arrow direction
//    waitFor: 'click'|null         // null = show "Weiter" button; 'click' = wait for user tap on target
//    skipBack: true                // hide back button (e.g. after screen switch)
//  }
// =====================================================================
const Tour = (function() {
  let active = null;        // current tour definition
  let stepIdx = 0;
  let overlay = null;
  let hole = null;
  let popup = null;
  let resizeObs = null;
  let actionListener = null;
  let actionTarget = null;

  // Find element by selector. If multiple elements match, prefer one inside the currently
  // active screen — this handles duplicated elements like nav buttons that exist per-screen.
  function byId(s) {
    const all = document.querySelectorAll(s);
    if (all.length === 0) return null;
    if (all.length === 1) return all[0];
    // Multiple matches: find one inside .screen.active
    const activeScreen = document.querySelector('.screen.active');
    if (activeScreen) {
      for (const el of all) {
        if (activeScreen.contains(el)) return el;
      }
    }
    // Fallback: first match
    return all[0];
  }

  function buildDom() {
    overlay = document.createElement('div');
    overlay.className = 'tour-overlay';
    document.body.appendChild(overlay);
    hole = document.createElement('div');
    hole.className = 'tour-hole';
    document.body.appendChild(hole);
    popup = document.createElement('div');
    popup.className = 'tour-popup';
    document.body.appendChild(popup);
    // Overlay is pointer-events: none in CSS. Only popup + hole sit on top visually.
    // Clicks reach the underlying app, which is what action-waiter steps need.
  }

  function destroyDom() {
    [overlay, hole, popup].forEach(el => { if (el && el.parentNode) el.parentNode.removeChild(el); });
    overlay = hole = popup = null;
    if (actionListener && actionTarget) {
      actionTarget.removeEventListener('click', actionListener, true);
    }
    actionListener = actionTarget = null;
  }

  function positionHole(target) {
    if (!target || !hole) { if (hole) hole.style.display = 'none'; return; }
    const r = target.getBoundingClientRect();
    hole.style.display = 'block';
    hole.style.left = (r.left - 4) + 'px';
    hole.style.top = (r.top - 4) + 'px';
    hole.style.width = (r.width + 8) + 'px';
    hole.style.height = (r.height + 8) + 'px';
  }

  function positionPopup(target, arrowHint) {
    if (!popup) return;
    // Make sure popup has been rendered so we can measure it
    popup.style.left = '0px';
    popup.style.top = '0px';
    const pr = popup.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const margin = 16;

    if (!target) {
      // Center on screen
      popup.style.left = Math.round((vw - pr.width) / 2) + 'px';
      popup.style.top = Math.round((vh - pr.height) / 2) + 'px';
      const arrow = popup.querySelector('.tour-popup-arrow');
      if (arrow) arrow.style.display = 'none';
      return;
    }
    const tr = target.getBoundingClientRect();
    // Pick arrow direction: if hint given and it fits, use it; else auto
    let dir = arrowHint || 'auto';
    const spaceTop = tr.top;
    const spaceBottom = vh - tr.bottom;
    const spaceLeft = tr.left;
    const spaceRight = vw - tr.right;
    if (dir === 'auto') {
      if (spaceBottom >= pr.height + margin + 16) dir = 'top'; // popup below target, arrow on top
      else if (spaceTop >= pr.height + margin + 16) dir = 'bottom';
      else if (spaceRight >= pr.width + margin + 16) dir = 'left';
      else if (spaceLeft >= pr.width + margin + 16) dir = 'right';
      else dir = 'top'; // fallback
    }
    // Position popup based on direction
    let left, top;
    if (dir === 'top') {
      top = tr.bottom + margin;
      left = tr.left + tr.width / 2 - pr.width / 2;
    } else if (dir === 'bottom') {
      top = tr.top - pr.height - margin;
      left = tr.left + tr.width / 2 - pr.width / 2;
    } else if (dir === 'left') {
      left = tr.right + margin;
      top = tr.top + tr.height / 2 - pr.height / 2;
    } else { // right
      left = tr.left - pr.width - margin;
      top = tr.top + tr.height / 2 - pr.height / 2;
    }
    // Clamp to viewport
    left = Math.max(margin, Math.min(left, vw - pr.width - margin));
    top = Math.max(margin, Math.min(top, vh - pr.height - margin));
    popup.style.left = Math.round(left) + 'px';
    popup.style.top = Math.round(top) + 'px';

    // Update arrow position + visibility
    const arrow = popup.querySelector('.tour-popup-arrow');
    if (arrow) {
      arrow.className = 'tour-popup-arrow ' + dir;
      arrow.style.display = 'block';
    }
  }

  function renderStep() {
    if (!active || !popup) return;
    const step = active.steps[stepIdx];
    if (!step) return;

    // Tab switch if requested
    if (step.tab && typeof tab !== 'undefined' && tab !== step.tab) {
      goTo(step.tab);
    }

    // Scroll target into view if it exists
    setTimeout(() => {
      if (!active) return; // Tour ended during scroll wait
      const target = step.target ? byId(step.target) : null;
      if (target) {
        const r = target.getBoundingClientRect();
        if (r.top < 60 || r.bottom > window.innerHeight - 60) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
      // After scroll settles, render
      setTimeout(() => {
        if (!active) return; // Tour ended during render wait
        doRender(step);
      }, 300);
    }, step.tab ? 200 : 0);
  }

  function doRender(step) {
    if (!active || !popup) return;
    const target = step.target ? byId(step.target) : null;
    positionHole(target);

    // Build popup content
    const dots = active.steps.map((_, i) => {
      const cls = i === stepIdx ? 'active' : (i < stepIdx ? 'done' : '');
      return `<div class="tour-dot ${cls}"></div>`;
    }).join('');

    const isFirst = stepIdx === 0;
    const isLast = stepIdx === active.steps.length - 1;
    const waiting = step.waitFor === 'click' || step.waitFor === 'input' || step.waitFor === 'change';
    const isInputMode = step.waitFor === 'input';

    // For input-mode steps, seed the preview with the current field value
    let initialPreview = '';
    if (isInputMode && step.target) {
      const tgt = byId(step.target);
      const v = (tgt && tgt.value || '').trim();
      initialPreview = v ? '📝 ' + v.replace(/</g, '&lt;') : '📝 <span style="color:var(--text-hint)">(noch leer, tipp ins Feld)</span>';
    }

    popup.innerHTML = `
      <div class="tour-popup-arrow"></div>
      ${!isLast ? '<button class="tour-popup-x" data-act="end" title="Tour beenden" aria-label="Tour beenden">✕</button>' : ''}
      <div class="tour-dots">${dots}</div>
      <div class="tour-popup-title">${step.title || ''}</div>
      <div class="tour-popup-body">${step.body || ''}</div>
      ${isInputMode ? `<div class="tour-input-preview" style="margin:-4px 0 10px;padding:8px 10px;background:var(--surface);border-radius:8px;font-size:12px;color:var(--text-muted);word-break:break-word;min-height:16px">${initialPreview}</div>` : ''}
      <div class="tour-popup-btns">
        ${!isFirst && !step.skipBack ? '<button class="tour-popup-btn secondary" data-act="back">← Zurück</button>' : ''}
        ${waiting
          ? '<button class="tour-popup-btn primary" data-act="skip-wait">Weiter →</button>'
          : `<button class="tour-popup-btn primary" data-act="next">${isLast ? 'Fertig ✓' : 'Weiter →'}</button>`}
        ${!isLast ? '<button class="tour-popup-btn skip" data-act="end">Tour überspringen</button>' : ''}
      </div>
    `;

    // Wire up buttons
    popup.querySelectorAll('[data-act]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const a = btn.getAttribute('data-act');
        if (a === 'next' || a === 'skip-wait') nextStep();
        else if (a === 'back') prevStep();
        else if (a === 'end') end();
      };
    });

    // Position popup AFTER it's in DOM and has dimensions
    requestAnimationFrame(() => positionPopup(target, step.arrow));

    // Wire up action waiter.
    // Supported modes:
    //   waitFor: 'click'  — wait for a click/tap on target (default for backward compat)
    //   waitFor: 'input'  — wait for text input; optional step.waitValue(val) predicate
    //                       Debounced: advances only after user stops typing for ~1.2s
    //   waitFor: 'change' — wait for select/radio/checkbox change; optional step.waitValue(val)
    // If step.waitValue is provided, it's called with the current field value; only advance on true.
    cleanupActionListener();
    if (waiting && target) {
      actionTarget = target;
      const mode = step.waitFor; // 'click' | 'input' | 'change'
      const eventName = (mode === 'input') ? 'input'
                      : (mode === 'change') ? 'change'
                      : 'click';
      const predicate = step.waitValue || (() => true);
      let fired = false;
      let debounceTimer = null;
      let enterHandler = null;
      // Helper: advance immediately, cleaning up + closing keyboard
      const advance = () => {
        fired = true;
        if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
        // Blur the input so the mobile keyboard closes
        if (actionTarget && typeof actionTarget.blur === 'function') {
          try { actionTarget.blur(); } catch (_) {}
        }
        cleanupActionListener();
        const delay = step.advanceDelay || 300;
        setTimeout(() => { if (active) nextStep(); }, delay);
      };
      actionListener = (e) => {
        if (fired) return;
        const val = (mode === 'click') ? null : (e.target && e.target.value);
        // For 'input' mode: live-update the popup preview, but NEVER auto-advance.
        // User must press Enter or tap "Weiter →" button to confirm.
        if (mode === 'input') {
          const preview = popup && popup.querySelector('.tour-input-preview');
          if (preview) {
            const shown = (val || '').trim() || '<span style="color:var(--text-hint)">(noch leer)</span>';
            preview.innerHTML = '📝 ' + shown.replace(/</g, '&lt;');
            // Highlight whether predicate is met, so user knows Enter will work
            const ok = predicate(val);
            preview.style.color = ok ? 'var(--green)' : 'var(--text-muted)';
          }
          return; // never auto-advance on input
        }
        // For click/change: advance immediately after optional predicate check
        if (mode !== 'click' && !predicate(val)) return;
        advance();
      };
      target.addEventListener(eventName, actionListener, true);
      actionTarget._tourEventName = eventName;
      // For 'input' mode: Enter key is the primary confirmation
      if (mode === 'input') {
        enterHandler = (e) => {
          if (fired) return;
          if (e.key !== 'Enter' && e.keyCode !== 13) return;
          const latestVal = actionTarget && actionTarget.value;
          if (!predicate(latestVal)) return; // condition not met — ignore Enter
          e.preventDefault();
          advance();
        };
        target.addEventListener('keydown', enterHandler, true);
        actionTarget._tourEnterHandler = enterHandler;
      }
    }
  }

  function cleanupActionListener() {
    if (actionListener && actionTarget) {
      const eventName = actionTarget._tourEventName || 'click';
      actionTarget.removeEventListener(eventName, actionListener, true);
      delete actionTarget._tourEventName;
    }
    if (actionTarget && actionTarget._tourEnterHandler) {
      actionTarget.removeEventListener('keydown', actionTarget._tourEnterHandler, true);
      delete actionTarget._tourEnterHandler;
    }
    actionListener = actionTarget = null;
  }

  function nextStep() {
    cleanupActionListener();
    if (!active) return;
    if (stepIdx >= active.steps.length - 1) { end(); return; }
    stepIdx++;
    renderStep();
  }

  function prevStep() {
    cleanupActionListener();
    if (!active || stepIdx === 0) return;
    stepIdx--;
    renderStep();
  }

  function start(tourDef) {
    if (active) end(); // end any previous tour
    active = tourDef;
    stepIdx = 0;
    if (!overlay) buildDom();
    overlay.classList.add('visible');
    renderStep();
    // Reposition (lightweight, no full re-render) on resize/scroll/focus events.
    // Keyboard opening often triggers resize on Android; focus fires just before.
    const reposition = () => {
      if (!active) return;
      const step = active.steps[stepIdx];
      if (!step) return;
      const target = step.target ? byId(step.target) : null;
      positionHole(target);
      requestAnimationFrame(() => positionPopup(target, step.arrow));
    };
    window.addEventListener('resize', reposition);
    window.addEventListener('scroll', reposition, true);
    Tour._reposition = reposition;
  }

  function end() {
    cleanupActionListener();
    active = null;
    stepIdx = 0;
    if (overlay) overlay.classList.remove('visible');
    if (Tour._reposition) {
      window.removeEventListener('resize', Tour._reposition);
      window.removeEventListener('scroll', Tour._reposition, true);
      Tour._reposition = null;
    }
    // Blur any focused input so the mobile keyboard closes
    if (document.activeElement && typeof document.activeElement.blur === 'function') {
      try { document.activeElement.blur(); } catch (_) {}
    }
    // Fade out then destroy
    setTimeout(() => destroyDom(), 300);
    // Mark completed in state
    if (typeof S !== 'undefined' && typeof saveS === 'function') {
      S._tourCompleted = true;
      saveS();
    }
  }

  return { start, end, nextStep, prevStep,
    // test/debug accessors
    _state: () => ({ active: !!active, stepIdx, stepCount: active ? active.steps.length : 0 }),
  };
})();

/** Reset + start tour (for the manual "Tour starten" button in how-to). */
function restartOnboardingTour() {
  if (typeof S !== 'undefined') {
    S._tourCompleted = false;
    saveS();
  }
  // Go to dashboard first so tour starts from a known state
  goTo('dash');
  setTimeout(() => startOnboardingTour(), 300);
}

// Auto-start: if no active cycles AND tour hasn't been completed, run onboarding on app load.
// ABER: Wenn der Welcome-Screen noch aktiv ist (User hat noch nichts gewählt), KEINE Tour
// starten — der Welcome-Screen mit "Ersten Grow einrichten" / "Demo anschauen" ist dann
// der Onboarding-Flow. Die Tour ist für den Fall "leeres Dashboard" oder manuell via How-to.
setTimeout(() => {
  if (typeof S !== 'undefined'
      && !S._tourCompleted
      && S._welcomeSeen
      && (!S.cycles || S.cycles.filter(c => c.active).length === 0)) {
    setTimeout(() => startOnboardingTour(), 800);
  }
}, 100);
