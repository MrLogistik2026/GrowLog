            ${isWaterDay ? `<div style="font-size:11px;color:var(--text-muted)">Vorschlag: ~${waterSug} ml · Topf ${S.potSize || 11}L · ${getInt(c, p?.ph || 'bloom')}d Intervall</div>` : ''}
          </div>
        </div>
        ${(isWaterDay && iso >= todayISO()) ? `<div style="display:flex;gap:8px;margin-bottom:4px">
          <button onclick="doShiftFromEntry('${c.id}',-1)" style="flex:1;background:var(--blue-bg);border:0.5px solid rgba(90,171,240,0.25);border-radius:10px;padding:10px 8px;font-size:12px;color:var(--blue);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px">
            ← Vorziehen
          </button>
          <button onclick="doShiftFromEntry('${c.id}',1)" style="flex:1;background:var(--orange-bg);border:0.5px solid rgba(232,136,74,0.25);border-radius:10px;padding:10px 8px;font-size:12px;color:var(--orange);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px">
            Auf morgen verschieben →
          </button>
        </div>
        <button onclick="skipDay('${c.id}','${iso}')" style="width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px;font-size:11px;color:var(--red);cursor:pointer;font-family:var(--font);margin-bottom:8px;opacity:0.7">
          🚫 Diesen Gießtag entfernen
        </button>` : ''}`
      : (!a && p && c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 3))
        // Topping rest day
        ? `<div style="padding:10px 12px;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.25);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
            <span style="font-size:20px">✂️</span>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--purple)">Ruhetag nach Topping</div>
              <div style="font-size:11px;color:var(--text-muted)">Tag ${isoDiff(iso, c.toppingDate)} von ${c.toppingPause || 3} · Kein Gießen</div>
            </div>
          </div>`
      : (!a && p && c.skippedDays && c.skippedDays.includes(iso))
        // Skipped day - show restore option
        ? `<div style="padding:10px 12px;background:rgba(224,96,96,0.06);border:0.5px solid rgba(224,96,96,0.2);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">🚫</span>
              <div>
                <div style="font-size:12px;color:var(--red)">Gießtag entfernt</div>
                <div style="font-size:11px;color:var(--text-muted)">Raster bleibt unverändert</div>
              </div>
            </div>
            <button onclick="restoreDay('${c.id}','${iso}')" style="background:none;border:0.5px solid rgba(76,175,112,0.3);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--green);cursor:pointer;font-family:var(--font)">
              ↩ Wiederherstellen
            </button>
          </div>`
      : (!a && p && ['flush','ice','harvest','dry'].includes(p.ph)
        ? `<div style="padding:8px 12px;background:${cl.hex}08;border:0.5px solid ${cl.hex}1a;border-radius:10px;margin-bottom:8px;font-size:12px;color:${cl.hex}99">${PH_ICON[p.ph] || ''} ${PN[p.ph]} – kein Gießtag</div>`
        : ''
      );

    // Topping button: show on Anzucht/early Bloom watering days if not yet topped
    const canTop = isWaterDay && !c.toppingDate && p && (p.ph === 'anzucht' || (p.ph === 'bloom' && p.week <= 3)) && iso >= todayISO();
    // Undo Topping button: show on the topping day itself OR on any rest day after topping
    const isToppingDay = c.toppingDate === iso;
    const isToppingRest = c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 3);
    const showUndoTop = isToppingDay || isToppingRest;

    const toppingBtn = canTop
      ? `<button onclick="doTopping('${c.id}','${iso}')" style="width:100%;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.25);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--purple);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px">
          ✂️ Jetzt Toppen (3 Tage Pause danach)
        </button>`
      : showUndoTop
      ? `<div style="background:rgba(176,106,200,0.06);border:0.5px solid rgba(176,106,200,0.2);border-radius:10px;padding:10px 12px;margin-bottom:8px">
          <div style="font-size:12px;color:var(--purple);font-weight:600;margin-bottom:6px">✂️ ${isToppingDay ? 'Topping-Tag' : 'Topping-Ruhetag ' + isoDiff(iso, c.toppingDate) + '/' + (c.toppingPause || 3)}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px;line-height:1.5">Getoppt am ${fmtDE(c.toppingDate, {day:'2-digit',month:'2-digit'})}. Nächster Guss am ${fmtDE(isoPlus(c.toppingDate, (c.toppingPause||3)+1), {day:'2-digit',month:'2-digit'})}.</div>
          <button onclick="undoTopping('${c.id}')" style="width:100%;background:var(--surface);border:0.5px solid rgba(224,96,96,0.3);border-radius:8px;padding:8px;font-size:12px;color:var(--red);cursor:pointer;font-family:var(--font)">↩ Topping rückgängig machen</button>
        </div>`
      : '';

    // === NUTRIENT / ADDITIVE TABLE ===
    // Show on ALL water days: giess, giess_anz get full nutrients
    // spuelen, ice get "Zusätze" (e.g. CalMag, pH-Down – user can log what they actually use)
    const isFlushType = a === 'spuelen' || a === 'ice';
    const showNutrients = a === 'giess' || a === 'giess_anz';

    let nutSection = '';
    if (isWaterDay) {
      // Water amount input for calculation
      const savedWater = cd.water || '';
      const waterAmt = parseFloat(savedWater) || waterSug;

      const drainMl = Math.round(waterSug * 0.1);
      const pot = S.potSize || 11;
      const iv = getInt(c, p?.ph || 'bloom');
      const growDay = p?.day || 1;
      const showDrain = growDay >= 25 || p?.ph === 'flush' || p?.ph === 'ice'; // Drain erst ab Vollsättigung

      const waterInput = `<div style="display:flex;flex-direction:column;gap:8px">
        <div class="water-input-box" style="gap:10px;align-items:stretch">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px">💧</span>
            <div>
              <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">Gießmenge (ml)</div>
              <div style="display:flex;align-items:center;gap:4px">
                <button onclick="stepWater('${c.id}',-50,${wk})" style="width:32px;height:32px;border-radius:6px;background:var(--card2);border:0.5px solid var(--border);color:var(--text-sub);font-size:15px;cursor:pointer;font-family:var(--mono);display:flex;align-items:center;justify-content:center">−</button>
                <input class="inp-field" type="number" step="50" id="water-calc-${c.id}" value="${savedWater}" placeholder="${waterSug}"
                  style="border-color:${cl.hex}44;width:80px;height:32px;font-size:15px;font-weight:600;font-family:var(--mono);text-align:center;padding:6px 2px"
                  oninput="updateCalc('${c.id}',${wk});uEF('${c.id}','water',this.value)"/>
                <button onclick="stepWater('${c.id}',50,${wk})" style="width:32px;height:32px;border-radius:6px;background:var(--card2);border:0.5px solid var(--border);color:var(--text-sub);font-size:15px;cursor:pointer;font-family:var(--mono);display:flex;align-items:center;justify-content:center">+</button>
              </div>
            </div>
          </div>
          <div style="flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:110px">
            <div style="font-size:9px;color:var(--text-hint);font-weight:600;text-transform:uppercase;letter-spacing:0.03em">🚰 Gieß-Guide</div>
            ${showDrain
              ? `<div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--green)">●</span> ~${waterSug} ml → ${drainMl} ml Drain</div>
                 <div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--orange)">●</span> Drain entsorgen!</div>`
              : `<div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--green)">●</span> ~${waterSug} ml · kein Drain</div>
                 <div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--blue)">●</span> ${growDay <= 10 ? 'Ring um Sämling' : growDay <= 18 ? 'Radius vergrößern' : 'Ganzer Topf'}</div>`
            }
            <div style="font-size:10px;color:var(--text-sub);line-height:1.4"><span style="color:var(--blue)">●</span> ${pot}L · ~alle ${iv}d · 30% Dryback</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:0 4px">
          <div>
            <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">pH</div>
            <div style="display:flex;align-items:center;gap:3px">
              <button onclick="stepPH('${c.id}',-0.1)" style="width:32px;height:32px;border-radius:6px;background:var(--card2);border:0.5px solid var(--border);color:var(--text-sub);font-size:14px;cursor:pointer;font-family:var(--mono);display:flex;align-items:center;justify-content:center">−</button>
              <input class="inp-field" type="number" step="0.1" min="4" max="9" id="ph-${c.id}" value="${cd.ph || ''}" placeholder="6.4"
                style="width:52px;font-size:15px;font-weight:600;font-family:var(--mono);text-align:center;padding:6px 2px"
                onfocus="if(!this.value)this.value='6.4'" oninput="uEF('${c.id}','ph',this.value)"/>
              <button onclick="stepPH('${c.id}',0.1)" style="width:32px;height:32px;border-radius:6px;background:var(--card2);border:0.5px solid var(--border);color:var(--text-sub);font-size:14px;cursor:pointer;font-family:var(--mono);display:flex;align-items:center;justify-content:center">+</button>
            </div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">EC</div>
            <input class="inp-field" type="number" step="0.1" min="0" max="5" value="${cd.ec || ''}" placeholder="1.2"
              style="width:52px;height:32px;font-size:15px;font-weight:600;font-family:var(--mono);text-align:center;padding:6px 2px"
              oninput="uEF('${c.id}','ec',this.value)"/>
          </div>
          <div style="flex:1;text-align:right;font-size:10px;color:var(--text-hint);line-height:1.5">
            Ziel: pH 6.4 · EC 0.8–2.0<br>Drain entsorgen!
          </div>
        </div>
      </div>
      ${(parseFloat(cd.ec) > 2.5) ? '<div style="background:rgba(224,96,96,0.08);border:0.5px solid rgba(224,96,96,0.25);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--red);margin-bottom:6px">⚠️ EC über 2.5! Überdüngung möglich — nächstes Mal weniger düngen oder Zwischenguss mit reinem Wasser.</div>' : ''}
      ${(parseFloat(cd.ec) > 0 && parseFloat(cd.ec) < 0.8 && showNutrients) ? '<div style="background:rgba(90,171,240,0.06);border:0.5px solid rgba(90,171,240,0.2);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--blue);margin-bottom:6px">ℹ️ EC unter 0.8 — Pflanze kann mehr vertragen. Dosis leicht erhöhen.</div>' : ''}`;

      if (showNutrients) {
        // Full nutrient table with plan + calculated amounts
        const prodRows = (S.products || []).map(prod => {
          const plan = doses[prod.id] || 0;
          const logged = cd.doses?.[prod.id] || '';
          const calcMl = plan > 0 ? (plan * waterAmt / 1000).toFixed(1) : '–';
          return `<div class="nut-row-tbl">
            <div style="display:flex;align-items:center;gap:6px">

            <input class="nt-inp" style="border-color:${prod.color}44" type="number" step="0.1"
              value="${logged}" placeholder="${calcMl !== '–' ? calcMl : '0'}"
              oninput="uDose('${c.id}','${prod.id}',this.value)"/>
          </div>`;
        }).join('');

        // Mix order
        const activeMixProducts = S.mixOrder
          ? S.mixOrder.filter(n => { const pr = S.products.find(p => p.name === n); return pr && (doses[pr.id] || 0) > 0; })
          : [];
        const mixSteps = activeMixProducts.length > 0
          ? `<div style="background:var(--card);border:0.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:8px 12px">
              <div style="font-size:10px;color:var(--text-hint);margin-bottom:4px;font-weight:600">⚗️ MISCHREIHENFOLGE — antippen zum Abhaken</div>
              ${activeMixProducts.map((name, i) => {
                const pr = S.products.find(p => p.name === name);
                const d2 = doses[pr?.id] || 0;
                const calc2 = d2 > 0 ? (d2 * waterAmt / 1000).toFixed(1) : '–';
                const checkId = `mix-${c.id}-${i}`;
                return `<div class="mix-step" id="${checkId}" onclick="toggleMixCheck('${checkId}')" style="cursor:pointer;border-radius:8px;padding:6px 4px;margin:0 -4px;transition:background 0.15s">

                  <div style="width:8px;height:8px;border-radius:50%;background:${pr?.color || '#555'};flex-shrink:0"></div>
                  <span style="flex:1">${name}</span>
                  <span style="color:var(--green);font-family:var(--mono);font-size:11px">${calc2 !== '–' ? calc2 + ' ml' : ''}</span>
                  <span class="mix-chk" style="font-size:16px;width:22px;text-align:center">○</span>
                </div>`;
              }).join('')}
            </div>`
          : '';

        nutSection = `${waterInput}
          <div class="nut-tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none">
            <span style="font-size:12px;font-weight:600;color:#fff">🧪 Nährstoffe Wo.${wk}</span>
            <button onclick="openDuenger()" style="background:none;border:none;color:${cl.hex};font-size:11px;cursor:pointer">Plan ✏</button>
          </div>
          <div class="nut-tbl-wrap" style="border-color:${cl.hex}33;background:var(--surface)">
            <div class="nut-tbl-head" style="background:${cl.dk}">
              <span class="nth" style="color:${cl.hex}">Produkt</span>
              <span class="nth" style="text-align:right;color:${cl.hex}88">Plan/L</span>
              <span class="nth" style="text-align:right;color:${cl.hex}">Berechnet</span>
              <span class="nth" style="text-align:right;color:${cl.hex}">Ist</span>
            </div>
            ${prodRows || `<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Keine Dünger konfiguriert. <span style="color:var(--blue);cursor:pointer" onclick="openDuenger()">Dünger einrichten →</span></div>`}
          </div>
          ${mixSteps}
          <div class="ph-hint">🎯 pH: 6.4 · EC: 0.8–2.0 · Drain: 5–10%</div>
          <div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-top:6px">
            <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.gtgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'" style="padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px">
              <span style="font-size:13px">🚰</span>
              <span style="flex:1;font-size:11px;font-weight:600;color:var(--blue)">Gießanleitung (Safe Dryback)</span>
              <span class="gtgl" style="color:var(--text-muted);font-size:13px">▸</span>
            </div>
            <div style="display:none;padding:0 12px 10px">
              <div style="display:flex;flex-direction:column;gap:6px;font-size:10px;color:var(--text-sub);line-height:1.5">
                <div style="background:rgba(224,96,96,0.06);border-radius:6px;padding:6px 8px;color:var(--red)">⚠️ <b>Regel Nr. 1:</b> Nach Topfgewicht gießen, nicht nach Kalender!</div>
                <div><b style="color:var(--blue)">① Vollsättigung:</b> Langsam gießen bis 10–15% Drain unten austritt (~${waterSug} ml). Topfgewicht merken = 100% Referenz.</div>
                <div><b style="color:var(--teal)">② Rücktrocknung:</b> Finger weg! Trocknung zieht O₂ in die Wurzelzone = Motor für Wachstum.</div>
                <div><b style="color:var(--green)">③ Sweetspot:</b> Erst gießen bei 30–35% Restgewicht. Obere 3–5cm knochentrocken. (~alle ${getInt(c, p?.ph || 'bloom')} Tage)</div>
                <div style="background:rgba(240,208,80,0.06);border-radius:6px;padding:6px 8px;color:var(--yellow)">💡 <b>Unsicher?</b> Lieber 1 Tag länger warten. Hängende Blätter = 2h Erholung. Staunässe-Wurzelfäule = irreversibel.</div>
                <div><b style="color:var(--orange)">🧪 Mischen:</b> CalMag zuerst → umrühren → Basisdünger → Additive → pH auf 6.4</div>
                <div><b style="color:var(--orange)">🚿 Drain:</b> 5–10% Drain bei jedem Guss. Drain-Wasser sofort entsorgen!</div>
              </div>
            </div>
          </div>`;

      } else {
        // Flush/Ice: "Nur klares Wasser" hint + Zusätze-Eingabe (user can still log products they use)
        const additivesInfo = isFlushType
          ? `<div style="background:${cl.hex}08;border:0.5px solid ${cl.hex}22;border-radius:10px;padding:10px 12px;font-size:12px;color:${cl.hex}99;margin-bottom:6px">
              ${a === 'spuelen' ? '🚿 Nur klares Wasser – kein Basisdünger!' : '🧊 Nur eiskaltes Wasser – kein Basisdünger!'}
            </div>`
          : '';

        // Still show product inputs so user can log additives (CalMag, pH-Down etc.)
        const addRows = (S.products || []).length > 0
          ? (S.products || []).map(prod => {
              const logged = cd.doses?.[prod.id] || '';
              return `<div class="nut-row-tbl" style="grid-template-columns:1fr 60px">
                <div style="display:flex;align-items:center;gap:6px">
                  <div style="width:8px;height:8px;border-radius:50%;background:${prod.color};flex-shrink:0"></div>
                  <span class="nt-name">${prod.name}</span>
                  <span style="font-size:10px;color:var(--text-hint)">${prod.unit || 'ml/L'}</span>
                </div>
                <input class="nt-inp" style="border-color:${prod.color}44" type="number" step="0.1"
                  value="${logged}" placeholder="0"
                  oninput="uDose('${c.id}','${prod.id}',this.value)"/>
              </div>`;
            }).join('')
          : '';

        nutSection = `${waterInput}${additivesInfo}
          ${addRows ? `<div class="nut-tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none">
            <span style="font-size:12px;font-weight:600;color:#fff">📝 Zusätze (optional)</span>
          </div>
          <div class="nut-tbl-wrap" style="border-color:${cl.hex}33;background:var(--surface)">
            <div class="nut-tbl-head" style="background:${cl.dk};grid-template-columns:1fr 60px">
              <span class="nth" style="color:${cl.hex}">Produkt</span>
              <span class="nth" style="text-align:right;color:${cl.hex}">Ist</span>
            </div>
            ${addRows}
          </div>` : ''}`; 
      }
    }

    // Smart tip
    const tip = getSmartTip(c, p);
    const hintHTML = tip
      ? `<div onclick="openLexikonEntry('${tip.lex}')" style="background:${cl.hex}0a;border:0.5px solid ${cl.hex}1a;border-radius:9px;padding:8px 11px;font-size:11px;color:${cl.hex}cc;line-height:1.5;margin-top:4px;cursor:pointer;display:flex;align-items:center;gap:6px">
          <span>💡</span><span style="flex:1">${tip.text}</span><span style="font-size:10px;color:${cl.hex}55">📖›</span>
        </div>`
      : '';

    // Quick notes
    const qnotes = QN[p?.ph] || [];
    const qnHTML = qnotes.length
      ? `<div class="qn-row">${qnotes.map(n => {
          const already = (cd.notes || '').includes(n);
          return `<div class="qn-chip" onclick="addQN('${c.id}',this,'${n.replace(/'/g, "\\'")}')" style="${already ? 'background:var(--green-bg);border-color:var(--green-dk);color:var(--green);font-weight:600' : ''}">${already ? '✓ ' + n : '+ ' + n}</div>`;

/** Live-update the calculated amounts when water input changes */
function updateCalc(cId, wk) {
  const waterEl = document.getElementById('water-calc-' + cId);
  if (!waterEl) return;
  const ml = parseFloat(waterEl.value) || parseFloat(waterEl.placeholder) || waterSuggestion(null, { ph: 'bloom', day: 35 });

  // Update only calc cells for THIS cycle (scoped by data-cycle attribute)
  document.querySelectorAll(`.nt-calc[data-cycle="${cId}"]`).forEach(cell => {
    const plan = parseFloat(cell.dataset.plan) || 0;
    if (plan > 0) {
      cell.textContent = (plan * ml / 1000).toFixed(1) + ' ml';
    }
  });
}

/** Step water amount by 50ml increments */
function stepWater(cId, step, wk) {
  const el = document.getElementById('water-calc-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || parseFloat(el.placeholder) || 0;
  const newVal = Math.max(0, Math.round((current + step) / 50) * 50);
  el.value = newVal;
  uEF(cId, 'water', String(newVal));
  updateCalc(cId, wk);
  vibrate(8);
}

/** Step pH by 0.1 increments */
function stepPH(cId, step) {
  const el = document.getElementById('ph-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || 6.4;
  const newVal = Math.max(4, Math.min(9, Math.round((current + step) * 10) / 10));
  el.value = newVal;
  uEF(cId, 'ph', String(newVal));
  vibrate(8);
}

/** Toggle mix step checkbox */
function toggleMixCheck(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const chk = el.querySelector('.mix-chk');
  const done = chk.textContent === '✓';
  if (done) {
    chk.textContent = '○';
    chk.style.color = '';
    el.style.background = '';
    el.style.opacity = '1';
    el.style.textDecoration = '';
  } else {
    chk.textContent = '✓';
    chk.style.color = 'var(--green)';
    el.style.background = 'rgba(76,175,112,0.06)';
    el.style.opacity = '0.6';
  }
  vibrate(10);
}

function uEnv() {
  const t = parseFloat(document.getElementById('et')?.value);
  const r = parseFloat(document.getElementById('er')?.value);
  const v = calcVPD(t, r), z = vpdZone(v);
  if (v !== null && z) {
    const vv = document.getElementById('vpd-v');
    const vp = document.getElementById('vpd-p');
    const vm = document.getElementById('vpd-m');
    if (vv) vv.textContent = v.toFixed(2);
    if (vp) { vp.textContent = z.label; vp.style.background = z.bg; vp.style.color = z.color; }
    if (vm) vm.style.left = Math.min(95, z.pct) + '%';
  }
}

function ensE(cId) {
  if (!S.entries[editISO]) S.entries[editISO] = { temp: '', humidity: '', cycleData: {} };
  if (!S.entries[editISO].cycleData) S.entries[editISO].cycleData = {};
  if (!S.entries[editISO].cycleData[cId]) S.entries[editISO].cycleData[cId] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
  if (!S.entries[editISO].cycleData[cId].doses) S.entries[editISO].cycleData[cId].doses = {};
  if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
}

function uDose(cId, pid, v) { ensE(cId); S.entries[editISO].cycleData[cId].doses[pid] = parseFloat(v) || 0; }
function uEF(cId, f, v) { ensE(cId); S.entries[editISO].cycleData[cId][f] = v; }
function uTrich(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].trichomes) S.entries[editISO].cycleData[cId].trichomes = { clear: 70, milky: 25, amber: 5 };
  S.entries[editISO].cycleData[cId].trichomes[field] = parseInt(v) || 0;
}
function uHarvest(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].harvestLog) S.entries[editISO].cycleData[cId].harvestLog = {};
  S.entries[editISO].cycleData[cId].harvestLog[field] = v;
}

function addQN(cId, el, text) {
  ensE(cId);
  const ta = document.getElementById('note-' + cId);
  const ex = ta?.value || S.entries[editISO].cycleData[cId].notes || '';
  // Check if already added to avoid duplicates
  if (ex.includes(text)) {
    toast('Schon hinzugefügt');
    return;
  }
  const nv = ex.trim() ? (ex.trim() + ', ' + text) : text;
  S.entries[editISO].cycleData[cId].notes = nv;
  if (ta) ta.value = nv;
  el.style.background = 'var(--green-bg)';
  el.style.borderColor = 'var(--green-dk)';
  el.style.color = 'var(--green)';
  el.style.fontWeight = '600';
  if (!el.textContent.startsWith('✓')) el.textContent = '✓ ' + el.textContent.replace(/^\+\s?/, '');
  vibrate(10);
  toast('✓ ' + text);
}

function saveEntry() {
  if (!editISO) return;
  if (S.cycles.length > 0) ensE(S.cycles[0].id);
  S.entries[editISO].temp = document.getElementById('et')?.value || '';
  S.entries[editISO].humidity = document.getElementById('er')?.value || '';

  // Also save water from smart calculator inputs
  active().forEach(c => {
    const waterCalcEl = document.getElementById('water-calc-' + c.id);
    if (waterCalcEl && waterCalcEl.value) {
      ensE(c.id);
      S.entries[editISO].cycleData[c.id].water = waterCalcEl.value;
    }
  });

  saveS();
  vibrate();
  toast('Gespeichert ✓');
  // Re-render to activate VPD display with saved temp/humidity
  renderEntry(editISO);
}

function addPhoto(cId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { toast('Max 10MB'); return; }
    toast('📸 Foto wird verarbeitet...', 3000);

    const r = new FileReader();
    r.onload = ev => {
      // Compress image via canvas (max 1200px wide)
      const img = new Image();
      img.onload = () => {
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        ensE(cId);
        if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
        S.entries[editISO].cycleData[cId].photos.push(compressed);
        saveS();
        renderEntry(editISO);
        toast('✓ Foto gespeichert');
      };
      img.onerror = () => toast('⚠ Foto konnte nicht geladen werden');
      img.src = ev.target.result;
    };
    r.onerror = () => toast('⚠ Fehler beim Lesen');
    r.readAsDataURL(f);
  };
  inp.click();
}

function viewPhoto(src) {
  document.getElementById('pv-img').src = src;
  document.getElementById('photo-viewer').style.display = 'flex';
}

function renderGallery() {
  const act = S.cycles;
  const allPhotos = [];
  Object.keys(S.entries).sort().forEach(d => {
    const e = S.entries[d];
    if (!e?.cycleData) return;
    Object.keys(e.cycleData).forEach(cId => {
      const cd = e.cycleData[cId];
      const c = S.cycles.find(x => x.id === cId);
      if (cd?.photos?.length) {
        cd.photos.forEach(src => {
          allPhotos.push({ date: d, cId, name: c?.name || '–', src });
        });
      }
    });
  });

  if (allPhotos.length === 0) {
    document.getElementById('gallery-body').innerHTML = `
      <div class="empty-state"><div style="font-size:40px;opacity:0.3">📷</div>
      <div style="font-size:13px;color:var(--text-muted)">Noch keine Fotos.</div></div>`;
    return;
  }

  // Group by month
  const months = {};
  allPhotos.forEach(p => {
    const key = p.date.substring(0, 7);
    if (!months[key]) months[key] = [];
    months[key].push(p);
  });

  document.getElementById('gallery-body').innerHTML = Object.entries(months).reverse().map(([key, photos]) => {
    const [y, m] = key.split('-');
    return `<div>
      <div class="sect-head">${MN[parseInt(m)-1]} ${y} · ${photos.length} Fotos</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${photos.map(p => `<div style="position:relative">
          <img src="${p.src}" style="width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer;border:0.5px solid var(--border)" onclick="viewPhoto(this.src)"/>
          <div style="position:absolute;bottom:2px;left:2px;font-size:8px;color:#fff;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:4px">${fmtDE(p.date)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('') + '<div style="height:20px"></div>';
}

// =====================================================================
//  PPFD / DLI LIGHT METER (Ambient Light Sensor → Manual fallback)
// =====================================================================
const LUX_TO_PPFD = {
  led_white: 0.0185,
  led_blurple: 0.0250,
  hps: 0.0148,
  cfl: 0.0135,
  sun: 0.0185,
};
let _ppfdSensor = null;

function startPPFD() {
  const status = document.getElementById('ppfd-status');
  const ppfdEl = document.getElementById('ppfd-val');
  const dliEl = document.getElementById('dli-val');
  const luxEl = document.getElementById('lux-val');
  const btn = document.getElementById('ppfd-btn');

  if (_ppfdSensor) { stopPPFD(); return; }

  function update(lux) {
    const src = document.getElementById('ppfd-src')?.value || 'led_white';
    const hours = parseFloat(document.getElementById('ppfd-hours')?.value) || 18;
    const factor = LUX_TO_PPFD[src] || 0.0185;
    const ppfd = Math.round(lux * factor);
    const dli = (ppfd * hours * 3600 / 1000000).toFixed(1);
    if (ppfdEl) { ppfdEl.textContent = ppfd; ppfdEl.style.color = ppfd >= 600 && ppfd <= 900 ? 'var(--green)' : ppfd > 900 ? 'var(--red)' : ppfd >= 200 ? 'var(--yellow)' : 'var(--text-muted)'; }
    if (luxEl && !luxEl.isContentEditable) luxEl.textContent = Math.round(lux);
    if (dliEl) { dliEl.textContent = dli; dliEl.style.color = parseFloat(dli) >= 30 && parseFloat(dli) <= 45 ? 'var(--green)' : parseFloat(dli) > 45 ? 'var(--orange)' : 'var(--teal)'; }
  }

  function startSensor() {
    try {
      const sensor = new AmbientLightSensor({ frequency: 2 });
      sensor.addEventListener('reading', () => update(sensor.illuminance));
      sensor.addEventListener('error', e => {
        if (status) status.textContent = '⚠ Sensor-Fehler: ' + (e.error?.message || 'Unbekannt');
        showManual();
      });
      sensor.start();
      _ppfdSensor = sensor;
      if (btn) { btn.textContent = '⏹ Stoppen'; btn.style.borderColor = 'rgba(224,96,96,0.5)'; }
      if (status) status.textContent = '📡 Lichtsensor aktiv — Handy mit Display nach oben unter die Lampe';
    } catch (e) {
      if (status) status.textContent = '⚠ Sensor nicht verfügbar: ' + e.message;
      showManual();
    }
  }

  function showManual() {
    if (luxEl) {
      luxEl.contentEditable = 'true';
      luxEl.style.cssText += ';border:1px solid var(--yellow);border-radius:4px;padding:2px 6px;outline:none;-webkit-user-select:text;user-select:text;min-width:60px';
      luxEl.textContent = '15000';
      luxEl.oninput = () => update(parseFloat(luxEl.textContent) || 0);
      update(15000);
    }
    if (status) status.innerHTML = '✏️ Sensor nicht verfügbar. Lux manuell eingeben oder eine Lux-Meter-App nutzen.';
  }

  // Check for AmbientLightSensor support
  if ('AmbientLightSensor' in window) {
    // Try to get permission first
    if (navigator.permissions && navigator.permissions.query) {
      navigator.permissions.query({ name: 'ambient-light-sensor' })
        .then(result => {
          if (result.state === 'denied') {
            if (status) status.textContent = '🔒 Lichtsensor-Berechtigung verweigert. In Browser-Einstellungen aktivieren.';
            showManual();
          } else {
            startSensor();
          }
        })
        .catch(() => startSensor()); // permission query not supported, just try
    } else {
      startSensor();
    }
  } else {
    if (status) status.textContent = '⚠ AmbientLightSensor wird von diesem Browser nicht unterstützt.';
    showManual();
  }
}

function stopPPFD() {
  if (_ppfdSensor) {
    try { _ppfdSensor.stop(); } catch(e) {}
    _ppfdSensor = null;
  }
  const btn = document.getElementById('ppfd-btn');
  const status = document.getElementById('ppfd-status');
  if (btn) { btn.textContent = '☀️ Messung starten'; btn.style.borderColor = 'rgba(240,208,80,0.3)'; }
  if (status) status.textContent = '';
}

// Swipe navigation for calendar
(function() {
  const scr = document.getElementById('scr-cal');
  let sx = 0, sy = 0, st = 0;
  scr.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
  }, { passive: true });
  scr.addEventListener('touchend', e => {
    if (Date.now() - st > 500) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.8) changeMonth(dx < 0 ? 1 : -1);
  }, { passive: true });
})();
