async function loadPreset(key) {
  const pr = FERT_PRESETS[key];
  if (!pr) return;

  // Check ob schon ein Plan mit diesem Preset existiert
  const existing = (S.fertPlans || []).find(p => p.presetKey === key);

  // Prüfen ob der aktuell aktive Plan "leer" ist (keine Produkte, kein Preset)
  // — in dem Fall wird er wiederverwendet statt einen neuen anzulegen.
  // Das passiert z.B. nach dem Wizard der einen Dummy-Plan als Platzhalter erzeugt.
  const activePlan = (S.fertPlans || []).find(p => p.id === S._activePlanId);
  const activeIsEmpty = activePlan
    && !activePlan.presetKey
    && (!activePlan.products || activePlan.products.length === 0);

  let confirmTitle, confirmBody, confirmBtn;
  if (existing) {
    // Plan mit diesem Preset existiert → wechsle dahin
    confirmTitle = `Zu "${existing.name}" wechseln?`;
    confirmBody = 'Dieser Plan existiert bereits. Wir wechseln einfach dahin, deine anderen Pläne bleiben unverändert.';
    confirmBtn = 'Wechseln';
  } else if (activeIsEmpty) {
    // Leerer aktiver Plan — befüllen statt duplizieren
    confirmTitle = `"${pr.name}" laden?`;
    confirmBody = `Dein aktiver Plan "${activePlan.name}" ist noch leer. Er wird mit ${pr.name} befüllt.`;
    confirmBtn = 'Plan befüllen';
  } else {
    // Kein Plan mit diesem Preset → neuen anlegen (alte Pläne bleiben)
    confirmTitle = `"${pr.name}" laden?`;
    confirmBody = 'Ein neuer Düngeplan wird angelegt und aktiviert. Deine bestehenden Pläne bleiben erhalten.';
    confirmBtn = 'Plan anlegen';
  }

  const ok = await customConfirm(confirmTitle, confirmBody, confirmBtn, 'var(--green)');
  if (!ok) return;

  if (existing) {
    // Einfach aktivieren
    syncGlobalsToActivePlan(); // pending edits sichern
    S._activePlanId = existing.id;
    syncActivePlanToGlobals(); // aus dem Plan laden
    saveS();
    renderDuenger();
    toast(`✓ Zu "${existing.name}" gewechselt`);
    return;
  }

  // Preset-Daten vorbereiten (gemeinsam für "leeren Plan befüllen" und "neu anlegen")
  const products = pr.products.map((p, i) => ({ id: 'p' + Date.now() + '_' + i, ...p }));
  const schedule = {};
  Object.entries(pr.schedule || {}).forEach(([w, doses]) => {
    const mapped = {};
    Object.entries(doses || {}).forEach(([name, dose]) => {
      const prod = products.find(p => p.name === name);
      if (prod) mapped[prod.id] = dose;
    });
    schedule['w' + w] = mapped;
  });

  if (activeIsEmpty && activePlan) {
    // Aktiven leeren Plan befüllen, Name durch Preset-Namen ersetzen
    activePlan.name = pr.name;
    activePlan.products = products;
    activePlan.schedule = schedule;
    activePlan.mixOrder = pr.mixOrder ? [...pr.mixOrder] : [];
    activePlan.mixInfo = pr.mixInfo || '';
    activePlan.drainInfo = pr.drainInfo || null;
    activePlan.presetKey = key;
    syncActivePlanToGlobals(); // globals aktualisieren
    saveS();
    renderDuenger();
    toast(`✓ "${pr.name}" geladen`);
    return;
  }

  // Neuen Plan mit Preset-Daten anlegen
  if (!S.fertPlans) S.fertPlans = [];

  // Vor dem Anlegen pending edits des aktuellen Plans persistieren
  syncGlobalsToActivePlan();

  const newId = 'fp_' + Date.now();

  S.fertPlans.push({
    id: newId,
    name: pr.name,
    products,
    schedule,
    mixOrder: pr.mixOrder ? [...pr.mixOrder] : [],
    mixInfo: pr.mixInfo || '',
    drainInfo: pr.drainInfo || null,
    presetKey: key,
    createdAt: Date.now(),
  });

  S._activePlanId = newId;
  syncActivePlanToGlobals(); // globals aus dem neuen Plan laden
  saveS();
  renderDuenger();
  toast(`✓ "${pr.name}" angelegt`);
}

/**
 * Start a blank custom plan — for Profis with their own fertilizer system.
 * Clears products, schedule, preset key, mix order and mix info so the user
 * starts from a clean slate and builds up.
 */
async function startCustomPlan() {
  const prodCount = (S.products || []).length;
  const hasPreset = !!S.presetKey;
  const hasCustomPlan = !hasPreset && prodCount > 0;

  if (hasCustomPlan) {
    // User already has their own plan — extra-careful warning
    const ok = await customConfirm(
      '⚠ Eigenen Plan zurücksetzen?',
      `Du hast aktuell einen eigenen Plan mit ${prodCount} Produkt${prodCount === 1 ? '' : 'en'}.\n\nAlle Produkte, Mischreihenfolge, Mix-Info und der gesamte Wochenplan werden dauerhaft gelöscht.`,
      'Alles löschen', 'var(--red)'
    );
    if (!ok) return;
  } else if (hasPreset) {
    // Preset is loaded — standard warning
    const ok = await customConfirm(
      'Eigenen Plan starten?',
      `Die Vorlage "${getPreset(S.presetKey)?.name || S.presetKey}" und alle Anpassungen werden gelöscht. Du startest danach mit leerem Plan.`,
      'Neu starten', 'var(--purple)'
    );
    if (!ok) return;
  }
  // else: nothing to lose — skip confirm entirely
  // Ensure at least one plan exists
  if (!S.fertPlans || S.fertPlans.length === 0) {
    S.fertPlans = [{
      id: 'fp_' + Date.now(), name: 'Mein Plan',
      products: [], schedule: {}, mixOrder: [], mixInfo: '', drainInfo: null, presetKey: null,
      createdAt: Date.now(),
    }];
    S._activePlanId = S.fertPlans[0].id;
  }
  S.products = [];
  S.weekSchedule = {};
  S.presetKey = null;
  S.mixOrder = [];
  S.mixInfo = '';
  S.drainInfo = null;
  saveS();
  renderDuenger();
  toast('✨ Leerer Plan bereit — füge deine Produkte hinzu');
}

/** Prompt user for a plan name. Returns trimmed string or null if cancelled/empty. */
async function _promptPlanName(title, defaultVal) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:modalIn 0.2s ease';
    overlay.innerHTML = `
      <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6)">
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px">${title}</div>
        <input id="_planNameInp" type="text" value="${(defaultVal || '').replace(/"/g, '&quot;')}" placeholder="z.B. BioBizz Outdoor, Hydro Mineral..." style="width:100%;padding:10px;border-radius:8px;background:var(--card2);border:0.5px solid var(--border);color:var(--text);font-size:13px;font-family:var(--font);outline:none;box-sizing:border-box;margin-bottom:14px"/>
        <div style="display:flex;gap:10px">
          <button data-act="cancel" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--card2);color:var(--text-sub);border:0.5px solid var(--border)">Abbrechen</button>
          <button data-act="ok" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--blue);color:#fff">OK</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#_planNameInp');
    setTimeout(() => inp.focus(), 50);
    const done = (val) => { overlay.remove(); resolve(val); };
    overlay.querySelector('[data-act="cancel"]').onclick = () => done(null);
    overlay.querySelector('[data-act="ok"]').onclick = () => {
      const v = (inp.value || '').trim();
      done(v || null);
    };
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') {
        const v = (inp.value || '').trim();
        done(v || null);
      } else if (e.key === 'Escape') {
        done(null);
      }
    };
  });
}

/** Add a new empty plan, make it active, and re-render. */
async function addFertPlan() {
  const name = await _promptPlanName('Neuer Düngeplan', '');
  if (!name) return;
  if (!S.fertPlans) S.fertPlans = [];
  const id = 'fp_' + Date.now();
  S.fertPlans.push({
    id, name,
    products: [],
    schedule: {},
    mixOrder: [],
    mixInfo: '',
    drainInfo: null,
    presetKey: null,
    createdAt: Date.now(),
  });
  S._activePlanId = id;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  toast(`✓ Plan "${name}" angelegt`);
}

/** Switch the active plan in the Dünger screen. */
function switchFertPlan(id) {
  // Persist any pending edits on the current plan first
  syncGlobalsToActivePlan();
  S._activePlanId = id;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  vibrate(8);
}

/** Rename the plan with given id. */
async function renameFertPlan(id) {
  const plan = (S.fertPlans || []).find(p => p.id === id);
  if (!plan) return;
  const newName = await _promptPlanName('Plan umbenennen', plan.name);
  if (!newName || newName === plan.name) return;
  plan.name = newName;
  saveS();
  renderDuenger();
  toast(`✓ Umbenannt in "${newName}"`);
}

/** Duplicate a plan and make the copy active. */
async function duplicateFertPlan(id) {
  const plan = (S.fertPlans || []).find(p => p.id === id);
  if (!plan) return;
  const newName = await _promptPlanName('Plan duplizieren', plan.name + ' (Kopie)');
  if (!newName) return;
  const copy = JSON.parse(JSON.stringify(plan));
  copy.id = 'fp_' + Date.now();
  copy.name = newName;
  copy.createdAt = Date.now();
  delete copy.updatedAt;
  S.fertPlans.push(copy);
  S._activePlanId = copy.id;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  toast(`✓ Dupliziert als "${newName}"`);
}

/** Delete a plan. Fails if any cycle uses it (confirms first). */
async function deleteFertPlan(id) {
  const plan = (S.fertPlans || []).find(p => p.id === id);
  if (!plan) return;
  if ((S.fertPlans || []).length <= 1) {
    toast('⚠ Mindestens ein Plan muss erhalten bleiben');
    return;
  }
  const usedBy = (S.cycles || []).filter(c => c.fertPlanId === id && !c.archived);
  const warn = usedBy.length > 0
    ? `⚠ ${usedBy.length} Zyklus${usedBy.length === 1 ? '' : 'se'} nutzen diesen Plan. Diese werden auf den ersten verbleibenden Plan umgestellt.`
    : 'Dieser Plan wird dauerhaft gelöscht.';
  const ok = await customConfirm(
    `"${plan.name}" löschen?`,
    warn,
    'Löschen', 'var(--red)'
  );
  if (!ok) return;
  // Reassign cycles to another plan
  const fallback = S.fertPlans.find(p => p.id !== id);
  S.cycles.forEach(c => { if (c.fertPlanId === id) c.fertPlanId = fallback ? fallback.id : null; });
  // Remove the plan
  S.fertPlans = S.fertPlans.filter(p => p.id !== id);
  // If it was active, pick another
  if (S._activePlanId === id) S._activePlanId = fallback ? fallback.id : null;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  toast(`✓ "${plan.name}" gelöscht`);
}

function setGD(w, pid, v) {
  const k = 'global_w' + w;
  if (!S.weekSchedule[k]) S.weekSchedule[k] = {};
  S.weekSchedule[k][pid] = parseFloat(v) || 0;
}

function addProduct() { editProd = 'new'; _pColor = PROD_COLORS[0]; renderDuenger(); }
function editProduct(id) { editProd = id; const p = S.products.find(x => x.id === id); if (p) _pColor = p.color; renderDuenger(); }

function saveProd() {
  const name = document.getElementById('pn')?.value?.trim();
  if (!name) { toast('Name eingeben'); return; }
  const note = document.getElementById('pnote')?.value?.trim() || '';
  const unit = document.getElementById('punit')?.value || 'ml/L';
  if (editProd === 'new') {
    S.products.push({ id: 'p' + Date.now(), name, note, unit, color: _pColor });
    // Auto-append to mixOrder if one exists (custom plan or preset-derived)
    if (S.mixOrder && !S.mixOrder.includes(name)) {
      S.mixOrder.push(name);
    }
  } else {
    const p = S.products.find(x => x.id === editProd);
    if (p) {
      // Update mixOrder entry if name changed
      if (S.mixOrder && p.name !== name) {
        const idx = S.mixOrder.indexOf(p.name);
        if (idx !== -1) S.mixOrder[idx] = name;
      }
      Object.assign(p, { name, note, unit, color: _pColor });
    }
  }
  editProd = null;
  saveS();
  renderDuenger();
  toast('Gespeichert ✓');
}

async function delProduct(id) {
  const ok = await customConfirm('Produkt löschen?', 'Dieses Dünger-Produkt wird entfernt.', 'Löschen');
  if (!ok) return;
  const p = S.products.find(x => x.id === id);
  S.products = S.products.filter(x => x.id !== id);
  // Keep mixOrder in sync
  if (S.mixOrder && p) {
    S.mixOrder = S.mixOrder.filter(n => n !== p.name);
  }
  saveS();
  renderDuenger();
  toast('Gelöscht');
}

/**
 * Move a product in mixOrder up (-1) or down (+1).
 * Clamps to valid range. Used for custom-plan profi workflow.
 */
function moveMixStep(idx, delta) {
  if (!S.mixOrder || !S.mixOrder.length) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= S.mixOrder.length) return;
  const tmp = S.mixOrder[idx];
  S.mixOrder[idx] = S.mixOrder[newIdx];
  S.mixOrder[newIdx] = tmp;
  saveS();
  renderDuenger();
  vibrate(8);
}

/**
 * Update mixInfo text from the textarea. Called on blur/input.
 */
function updateMixInfo(val) {
  S.mixInfo = val || '';
  saveS();
}

function renderSet() {
  if (!selId && S.cycles.length > 0) selId = S.cycles[0].id;
  const sel = S.cycles.find(c => c.id === selId);
  if (sel && draft.id !== sel.id) draft = { ...sel };
  const d = draft;
  const cl = d.colorId ? COLORS.find(x => x.id === d.colorId) || COLORS[0] : COLORS[0];

  const tabs = S.cycles.map(c =>
    `<div class="tab-item ${c.id === selId ? 'sel' : ''}" onclick="selCyc('${c.id}')" style="${c.archived ? 'opacity:0.5' : ''}">
      <span style="font-size:14px">${sym(c)}</span>
      <span style="color:${col(c).hex}">${c.name}</span>
      ${c.archived ? '<span style="font-size:8px;color:var(--blue)">📦</span>' : ''}
    </div>`
  ).join('');

  const colPick = COLORS.map(x =>
    `<div class="col-opt ${d.colorId === x.id ? 'sel' : ''}" style="background:${x.hex}" onclick="dd('colorId','${x.id}')"></div>`
  ).join('');

  const symPick = SYMS.map(s =>
    `<div class="sym-opt ${d.symbol === s ? 'sel' : ''}" onclick="ddS('symbol','${s}')">${s}</div>`
  ).join('');

  // E5: Beginner mode shows only Anzucht+Blüte; advanced phases revealed as plant reaches them
  const allDurs = [
    ['Anzucht','anzuchtDays',PHASE_DEFAULTS.anzuchtDays],
    ['Blüte','bloomDays',PHASE_DEFAULTS.bloomDays],
    ['Spülen','flushDays',PHASE_DEFAULTS.flushDays],
    ['IceFlush','iceDays',PHASE_DEFAULTS.iceDays],
    ['Ernte','harvestDays',PHASE_DEFAULTS.harvestDays],
    ['Trocknen','dryDays',PHASE_DEFAULTS.dryDays],
  ];
  // Outdoor: hide IceFlush row (not used, only confuses)
  const durListAll = (sel && sel.growType === 'outdoor') ? allDurs.filter(d => d[1] !== 'iceDays') : allDurs;
  const durList = S.beginnerMode ? durListAll.slice(0, 2) : durListAll;
  const durs = sel ? durList.map(([l, k, def]) =>
    `<div class="dur-box"><div class="dur-lbl">${l}</div>
      <input class="dur-inp" type="number" value="${d[k] !== undefined ? d[k] : def}" oninput="dd('${k}',this.value)"/>
    </div>`
  ).join('') : '';

  document.getElementById('set-body').innerHTML = `
    <!-- E5: MODUS-TOGGLE (ganz oben) -->
    <div style="background:var(--card);border:0.5px solid ${S.beginnerMode ? 'rgba(76,175,112,0.35)' : 'var(--border)'};border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">${S.beginnerMode ? '🎯' : '⚡'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:${S.beginnerMode ? 'var(--green)' : 'var(--text)'}">${S.beginnerMode ? 'Einsteiger-Modus' : 'Profi-Modus'}</div>
        <div style="font-size:10px;color:var(--text-muted);line-height:1.4">${S.beginnerMode ? 'Einfache Ansicht · komplexe Optionen versteckt' : 'Alle Einstellungen sichtbar'}</div>
      </div>
      <label class="sw"><input type="checkbox" ${S.beginnerMode ? 'checked' : ''} onchange="toggleBeginnerMode(this.checked)"/><span class="sl"></span></label>
    </div>

    <!-- 1. DÜNGER-STATUS (Top Banner — wichtigste Info) -->
    ${(() => {
      const prodCount = (S.products || []).length;
      const hasPreset = !!S.presetKey;
      const hasCustomPlan = !hasPreset && prodCount > 0;
      const hasAnyPlan = hasPreset || hasCustomPlan;
      const planLabel = hasPreset
        ? `<b style="color:var(--green)">${getPreset(S.presetKey)?.name || S.presetKey}</b> aktiv · ${prodCount} Produkte · 12 Wochen`
        : hasCustomPlan
        ? `<b style="color:var(--purple)">✨ Eigener Plan</b> · ${prodCount} Produkte · 12 Wochen`
        : '⚠ Noch kein Düngeplan — Tippen für Vorlage oder eigenen Plan';
      const accent = hasPreset ? 'var(--green)' : hasCustomPlan ? 'var(--purple)' : 'var(--orange)';
      return `<div onclick="openDuenger()" style="background:linear-gradient(135deg, #0d1e0d, #0a1a0a);border:1px solid ${accent};border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer">
        <span style="font-size:24px">🧪</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:${accent}">Dünger & Wochenplan</div>
          <div style="font-size:11px;color:${hasAnyPlan ? 'var(--text-muted)' : 'var(--orange)'};margin-top:2px">${hasAnyPlan ? '●' : ''} ${planLabel}</div>
        </div>
        <span style="color:${accent};font-size:20px">›</span>
      </div>`;
    })()}

    <!-- 2. ZYKLEN (Hauptbereich) -->
    <div class="card" style="gap:10px;display:flex;flex-direction:column;border-color:${sel ? cl.hex+'33' : 'var(--border)'}">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="sect-head" style="margin:0">🌱 Meine Zyklen</div>
        <button id="add-cyc-btn" class="add-btn" onclick="openCycleWizard()">＋ Neu</button>
      </div>
      <div class="tab-row">${tabs}</div>
      ${sel ? `
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">

          <!-- GRUPPE: Identität -->
          <div class="inp-wrap">
            <div class="inp-label">Name</div>
            <input id="cyc-name-input" class="inp-field" value="${d.name || ''}" oninput="dd('name',this.value)" style="border-color:${cl.hex}44"/>
          </div>
          <div class="inp-wrap">
            <div class="inp-label">Standort / Zelt</div>
            <input id="cyc-location-input" class="inp-field" value="${d.location || ''}" oninput="dd('location',this.value)" placeholder="z.B. Zelt 1"/>
          </div>
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div style="flex:1">
              <div class="inp-label" style="margin-bottom:5px">Farbe</div>
              <div class="pick-row" style="gap:5px">${colPick}</div>
            </div>
            <div style="flex:1">
              <div class="inp-label" style="margin-bottom:5px">Symbol</div>
              <div class="pick-row" style="gap:5px">${symPick}</div>
            </div>
          </div>

          <!-- GRUPPE: Genetik & Licht -->
          <!-- GRUPPE: Indoor/Outdoor — Grow-Typ -->
          <div class="sub-head" style="margin-top:8px">🏠 Grow-Typ</div>
          <div style="display:flex;gap:6px;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:4px">
            <button onclick="dd('growType','indoor');renderSet()" style="flex:1;background:${d.growType!=='outdoor'?'var(--green-dk)':'transparent'};border:none;color:${d.growType!=='outdoor'?'var(--green)':'var(--text-muted)'};padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">🏠 Indoor</button>
            <button onclick="dd('growType','outdoor');renderSet()" style="flex:1;background:${d.growType==='outdoor'?'var(--green-dk)':'transparent'};border:none;color:${d.growType==='outdoor'?'var(--green)':'var(--text-muted)'};padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">☀️ Outdoor</button>
          </div>
          ${d.growType === 'outdoor' ? `
            <div class="inp-wrap" style="margin-top:8px">
              <div class="inp-label">🌍 Hemisphäre</div>
              <select class="inp-field" style="cursor:pointer" onchange="dd('hemisphere',this.value)">
                <option value="north" ${d.hemisphere!=='south'?'selected':''}>Nord (Blüte Juni–Okt)</option>
                <option value="south" ${d.hemisphere==='south'?'selected':''}>Süd (Blüte Dez–April)</option>
              </select>
            </div>
            <div style="font-size:10px;color:var(--teal);line-height:1.4;padding:4px 4px 0">☀️ Outdoor: VPD-Warnungen, 12/12-Reminder und IceFlush ausgeblendet. ${(d.seedType||'').indexOf('auto')>=0 ? 'Autos zählen Tage unabhängig von der Sonnenwende.' : 'Blüte startet automatisch bei Sonnenwende oder nach 6 Wochen Vegi — je nachdem was später kommt.'}</div>
          ` : ''}

          <!-- GRUPPE: Düngeplan-Zuweisung -->
          <div class="sub-head" style="margin-top:8px">🧪 Düngeplan</div>
          ${(() => {
            const plans = S.fertPlans || [];
            if (plans.length === 0) {
              return `<div style="padding:10px 12px;background:var(--card2);border:0.5px dashed var(--border);border-radius:10px;font-size:11px;color:var(--text-muted);line-height:1.4">
                Noch kein Plan angelegt. Gehe zu Einstellungen → Dünger und lege einen Plan an.
              </div>`;
            }
            return `<div class="inp-wrap">
              <select class="inp-field" style="cursor:pointer" onchange="dd('fertPlanId',this.value);renderSet()">
                ${plans.map(pl => `<option value="${pl.id}" ${d.fertPlanId === pl.id ? 'selected' : ''}>${pl.name} · ${(pl.products || []).length} Produkt${(pl.products || []).length === 1 ? '' : 'e'}</option>`).join('')}
              </select>
              <div style="font-size:10px;color:var(--text-hint);line-height:1.4;padding:4px 4px 0">
                Dieser Zyklus nutzt den gewählten Düngeplan. Plan-Produkte und Wochenplan bearbeitest du unter <span style="color:var(--blue)">Dünger</span>.
              </div>
            </div>`;
          })()}

          <div class="sub-head" style="margin-top:8px">🌿 Genetik & Licht</div>
          <div style="display:flex;gap:8px">
            <div class="inp-wrap" style="flex:1">
              <div class="inp-label">Samentyp</div>
              <select id="cyc-seed-select" class="inp-field" style="cursor:pointer" onchange="dd('seedType',this.value);renderSet()">
                <option value="fem" ${d.seedType==='fem'?'selected':''}>♀ Feminisiert</option>
                <option value="auto" ${d.seedType==='auto'?'selected':''}>⚡ Automatic</option>
                ${S.beginnerMode && d.seedType !== 'reg' ? '' : `<option value="reg" ${d.seedType==='reg'?'selected':''}>♀♂ Regulär</option>`}
              </select>
            </div>
            ${d.growType !== 'outdoor' ? `
            <div class="inp-wrap" style="width:90px">
              <div class="inp-label">Licht Veg</div>
              <select class="inp-field" style="cursor:pointer" onchange="dd('lightVeg',this.value)">
                ${['18/6','20/4','24/0','16/8'].map(v => `<option value="${v}" ${d.lightVeg===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
            <div class="inp-wrap" style="width:90px">
              <div class="inp-label">Licht Blüte</div>
              <select class="inp-field" style="cursor:pointer" onchange="dd('lightBloom',this.value)">
                ${['12/12','18/6','20/4','24/0'].map(v => `<option value="${v}" ${d.lightBloom===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>
            ` : ''}
          </div>
          ${d.growType === 'outdoor' ? '<div style="font-size:10px;color:var(--teal);line-height:1.4;padding:2px 4px">☀️ Outdoor: Sonne steuert den Lichtrhythmus automatisch — keine Einstellung nötig.</div>' : ''}
          ${d.seedType === 'auto' && d.growType !== 'outdoor' ? '<div style="font-size:10px;color:var(--teal);line-height:1.4;padding:2px 4px">⚡ Automatics: Kein Lichtwechsel nötig. Blüte startet automatisch.</div>' : ''}
          ${d.seedType === 'auto' && d.growType === 'outdoor' ? '<div style="font-size:10px;color:var(--teal);line-height:1.4;padding:2px 4px">⚡ Auto + Outdoor: Zählt weiter Tage unabhängig von der Sonnenwende.</div>' : ''}

          <!-- Photoperiode: Blüte-Start-Datum (Indoor manuell, Outdoor auto ableitbar) -->
          ${d.seedType !== 'auto' ? (() => {
            // Auto-berechnet für Outdoor-Photoperiode (immer, ohne phaseMode)
            const autoBloomDate = (d.growType === 'outdoor')
              ? (() => {
                  if (!d.startDate) return null;
                  const start = iso12(d.startDate);
                  const isSouth = d.hemisphere === 'south';
                  const month = isSouth ? 11 : 5;
                  const c1 = new Date(start.getFullYear(), month, 21, 12);
                  const c2 = new Date(start.getFullYear() + 1, month, 21, 12);
                  const solstice = (c1 >= start) ? c1 : c2;
                  const minVegi = new Date(start.getTime() + 42 * 86400000);
                  const bs = solstice >= minVegi ? solstice : minVegi;
                  const yyyy = bs.getFullYear();
                  const mm = String(bs.getMonth() + 1).padStart(2, '0');
                  const dd2 = String(bs.getDate()).padStart(2, '0');
                  return `${yyyy}-${mm}-${dd2}`;
                })()
              : null;
            const effectiveBloomDate = d.bloomStartDate || autoBloomDate;
            const isAuto = !d.bloomStartDate && autoBloomDate;

            let hint = '';
            if (d.growType === 'outdoor') {
              if (isAuto) {
                hint = `<span style="color:var(--green)">☀️ Automatisch berechnet</span> aus max(Sonnenwende, 6 Wochen nach Start). Bei Bedarf manuell überschreiben.`;
              } else if (d.bloomStartDate) {
                hint = `✏ Manuell gesetzt — automatische Berechnung überschrieben.`;
              }
            } else {
              hint = `💡 Setze das Datum an dem du auf 12/12 umschaltest (Indoor) oder leer lassen für tagbasierte Phasen.`;
            }

            return `<div class="sub-head" style="margin-top:8px">🌸 Blüte-Start</div>
              <div class="inp-wrap">
                <input class="inp-field" type="date" value="${effectiveBloomDate || ''}" oninput="dd('bloomStartDate',this.value)" style="color-scheme:dark"/>
                <div style="font-size:10px;color:var(--text-hint);line-height:1.4;padding:4px 4px 0">${hint}</div>
                ${d.bloomStartDate ? `<button onclick="dd('bloomStartDate','');renderSet()" style="background:none;border:none;color:var(--red);font-size:11px;cursor:pointer;padding:6px 4px;margin-top:4px;font-family:var(--font)">⚠ Auf automatisch zurücksetzen</button>` : ''}
              </div>`;
          })() : ''}

          <!-- GRUPPE: Start & Aktivierung -->
          <div style="background:${sel.active ? cl.dk : 'var(--surface)'};border:0.5px solid ${sel.active ? cl.hex+'44' : 'var(--border)'};border-radius:12px;padding:12px 14px;margin-top:8px">
            <div class="inp-wrap" style="margin-bottom:10px">
              <div class="inp-label">📅 Startdatum (Tag 1)</div>
              <input id="cyc-start-input" class="inp-field" type="date" value="${d.startDate || todayISO()}" oninput="dd('startDate',this.value)" style="color-scheme:dark;border-color:${cl.hex}33"/>
            </div>
            ${(d.growType === 'outdoor' && d.seedType !== 'auto') ? `
              <div class="inp-wrap" style="margin-bottom:10px">
                <div class="inp-label">🌤 Raus ab (Transplant-Datum)</div>
                <input class="inp-field" type="date" value="${d.transplantDate || ''}" oninput="dd('transplantDate',this.value || null)" style="color-scheme:dark;border-color:${cl.hex}33"/>
                <div style="font-size:10px;color:var(--text-hint);margin-top:4px;line-height:1.5">Wann darf die Pflanze raus? 7 Tage davor beginnt automatisch die Abhärtung (rein/raus). Leer lassen = keine Unterscheidung drinnen/draußen.</div>
              </div>
            ` : ''}
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-size:13px;font-weight:600;color:${sel.active ? cl.hex : 'var(--text-sub)'}">
                  ${sel.active ? '● Aktiver Grow' : '○ Grow pausiert'}
                </div>
                ${!sel.active ? '<div style="font-size:10px;color:var(--text-muted);margin-top:2px">Deaktiviert — wird beim Speichern automatisch aktiviert</div>' : ''}
              </div>
              <label class="sw"><input type="checkbox" ${sel.active ? 'checked' : ''} onchange="toggleAct('${sel.id}',this.checked)"/><span class="sl"></span></label>
            </div>
          </div>

          <!-- GRUPPE: Phasen & Intervalle -->
          <div class="sub-head" style="margin-top:4px">📅 Phasendauern (Tage)</div>
          <div class="dur-grid">${durs}</div>
          ${S.beginnerMode ? '' : `
          <div class="sub-head">💧 Gießintervall (alle X Tage)</div>
          <div class="dur-grid">
            <div class="dur-box"><div class="dur-lbl">Anzucht</div><input class="dur-inp" type="number" value="${d.intAnzucht || 3}" oninput="dd('intAnzucht',this.value)"/></div>
            <div class="dur-box"><div class="dur-lbl">Blüte</div><input class="dur-inp" type="number" value="${d.intBloom || 3}" oninput="dd('intBloom',this.value)"/></div>
            <div class="dur-box"><div class="dur-lbl">Spülen</div><input class="dur-inp" type="number" value="${d.intFlush || 4}" oninput="dd('intFlush',this.value)"/></div>
          </div>
          <div class="dur-grid" style="margin-top:6px">
            <div class="dur-box"><div class="dur-lbl">IceFlush</div><input class="dur-inp" type="number" value="${d.intIce || 4}" oninput="dd('intIce',this.value)"/></div>
            <div class="dur-box"><div class="dur-lbl">Ernte</div><input class="dur-inp" type="number" value="${d.intErnte || 1}" oninput="dd('intErnte',this.value)"/></div>
            <div class="dur-box"><div class="dur-lbl">Trocknen</div><input class="dur-inp" type="number" value="${d.intDry || 1}" oninput="dd('intDry',this.value)"/></div>
          </div>
          `}

          ${(() => {
            // Save-Button nur anzeigen wenn draft tatsächlich vom gespeicherten Zyklus abweicht.
            // So sieht der Anfänger keinen riesigen "Speichern"-Button wenn es nichts zu speichern gibt.
            const isDirty = sel && Object.keys(draft).some(k => {
              // ID ignorieren, interne Felder ignorieren
              if (k === 'id' || k.startsWith('_')) return false;
              return JSON.stringify(draft[k]) !== JSON.stringify(sel[k]);
            });
            if (isDirty) {
              return `<button class="sav-btn" style="background:${cl.hex};margin-top:8px" onclick="saveDraft()">💾 Änderungen sichern</button>`;
            }
            // Gespeichert-Indikator (dezent, informativ)
            return `<div style="margin-top:8px;padding:8px 12px;background:rgba(76,175,112,0.06);border:0.5px solid rgba(76,175,112,0.2);border-radius:10px;font-size:11px;color:var(--text-muted);text-align:center">✓ Alle Änderungen gespeichert</div>`;
          })()}
          ${(() => {
            // Backfill-Button: only if active, started in the past, and has missing past watering entries
            if (!sel.active || sel.archived || !sel.startDate) return '';
            const missing = countMissingPastWateringDays(sel);
            if (missing === 0) return '';
            return `<button onclick="backfillPast('${sel.id}')" style="width:100%;background:rgba(240,208,80,0.08);border:0.5px solid rgba(240,208,80,0.3);border-radius:10px;padding:10px;font-size:13px;color:var(--yellow);cursor:pointer;font-family:var(--font);margin-top:4px">🕐 Vergangene Gießtage auto-eintragen (${missing})</button>`;
          })()}
          ${(() => {
            // ZEITRAFFER/COLLAGE-EXPORT (Phase 5 Schritt 1):
            // Nur zeigen wenn es tatsächlich Fotos gibt — sonst sinnlos.
            const photoCount = collectCyclePhotos(sel).length;
            if (photoCount === 0) return '';
            return `<button onclick="openCollageExport('${sel.id}')" style="width:100%;background:rgba(176,106,200,0.06);border:0.5px solid rgba(176,106,200,0.3);border-radius:10px;padding:10px;font-size:13px;color:var(--purple);cursor:pointer;font-family:var(--font);margin-top:4px">📸 Zeitraffer exportieren <span style="font-size:10px;color:var(--text-muted);font-weight:400">· ${photoCount} Fotos</span></button>`;
          })()}
          ${sel.active && !sel.archived ? `<button onclick="archiveCycle('${sel.id}')" style="width:100%;background:rgba(90,171,240,0.06);border:0.5px solid rgba(90,171,240,0.25);border-radius:10px;padding:10px;font-size:13px;color:var(--blue);cursor:pointer;font-family:var(--font);margin-top:4px">📦 Grow archivieren</button>` : ''}
          ${sel.archived ? `<button onclick="unarchiveCycle('${sel.id}')" style="width:100%;background:rgba(76,175,112,0.06);border:0.5px solid rgba(76,175,112,0.25);border-radius:10px;padding:10px;font-size:13px;color:var(--green);cursor:pointer;font-family:var(--font);margin-top:4px">📦 Archivierung aufheben</button>` : ''}
          <div style="font-size:10px;color:var(--text-hint);text-align:center;padding:8px 4px 2px;line-height:1.5">💡 Zyklus löschen → unten in der <span style="color:var(--red)">Gefahrenzone</span></div>
        </div>
      ` : `<div style="padding:20px 10px;text-align:center">
        <div style="font-size:36px;opacity:0.3;margin-bottom:6px">🌱</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px">Erstelle deinen ersten Zyklus!</div>
        <button onclick="openCycleWizard()" style="background:var(--green);border:none;border-radius:10px;padding:10px 20px;font-size:13px;color:#fff;cursor:pointer;font-family:var(--font);font-weight:600">＋ Neuer Zyklus</button>
      </div>`}
    </div>

    <!-- 3. GRUNDEINSTELLUNGEN -->
    <div class="card" style="gap:10px;display:flex;flex-direction:column">
      <div class="sect-head">⚙️ Grundeinstellungen</div>
      <div class="row2" style="align-items:flex-end">
        <div class="inp-wrap"><div class="inp-label">Topfgröße (Liter)</div>
          <input class="inp-field" type="number" value="${S.potSize || 11}" oninput="S.potSize=Number(this.value)||11;saveS()"/>
        </div>
        <div style="flex:1;font-size:11px;color:var(--text-muted);padding-bottom:10px;line-height:1.5">
          → ~${waterSuggestion(null, { ph: 'bloom', day: 35 })} ml pro Guss<br>(in der Blüte)
        </div>
      </div>
    </div>

    ${sel && !sel.archived ? (() => {
      // RESTGEWICHT-MODUL — Karte für den ausgewählten Zyklus
      const mode = sel.weightMode || 'off';
      const hasWeights = sel.saturatedWeight && sel.dryWeight;
      const capacity = hasWeights ? (sel.saturatedWeight - sel.dryWeight) / 1000 : null;

      const modeLabels = {
        off: { icon: '—', title: 'Aus (Fallback)', desc: 'Biophysikalische Schätzung (±30%)' },
        lift: { icon: '✋', title: 'Hebe-Test', desc: 'Du schätzt Restgewicht in %. Profi-tauglich, keine Waage nötig.' },
        scale: { icon: '⚖️', title: 'Waage', desc: 'Exaktes Gewicht in Gramm. Höchste Präzision.' },
      };
      const curLabel = modeLabels[mode] || modeLabels.off;

      const statusBlock = mode === 'scale' ? `
        <div style="background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:8px">
          <div style="font-size:10px;color:var(--text-hint);font-weight:600;margin-bottom:6px">REFERENZ-GEWICHTE (${sym(sel)} ${sel.name})</div>
          <div style="display:flex;gap:8px;font-size:11px;flex-wrap:wrap">
            <div style="flex:1;min-width:90px">
              <div style="color:var(--text-muted)">Voll (100%)</div>
              <div style="font-family:var(--mono);color:${sel.saturatedWeight ? 'var(--green)' : 'var(--text-hint)'};font-size:13px;font-weight:600">
                ${sel.saturatedWeight ? sel.saturatedWeight + ' g' : '— noch nicht gesetzt'}
              </div>
            </div>
            <div style="flex:1;min-width:90px">
              <div style="color:var(--text-muted)">Trocken (0%)</div>
              <div style="font-family:var(--mono);color:${sel.dryWeight ? 'var(--green)' : 'var(--text-hint)'};font-size:13px;font-weight:600">
                ${sel.dryWeight ? sel.dryWeight + ' g' : '— später nachtragen'}
              </div>
            </div>
            ${capacity !== null ? `
              <div style="flex:1;min-width:90px">
                <div style="color:var(--text-muted)">Kapazität</div>
                <div style="font-family:var(--mono);color:var(--blue);font-size:13px;font-weight:600">${capacity.toFixed(1)} L</div>
              </div>
            ` : ''}
          </div>
          <button onclick="setWeightModeScale(S.cycles.find(c=>c.id==='${sel.id}'))" style="margin-top:8px;background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--text-sub);cursor:pointer;font-family:var(--font)">✎ Gewichte bearbeiten</button>
        </div>
      ` : '';

function dd(k, v) { draft[k] = isNaN(v) || v === '' ? v : Number(v); }
function ddS(k, v) { draft[k] = v; renderSet(); }

function saveDraft() {
  const c = S.cycles.find(x => x.id === selId);
  if (!c) return;

  // Auto-activate if not yet active and has a startDate in draft
  if (!draft.active && draft.startDate) {
    draft.active = true;
  }
  // If active but no startDate, set today
  if (draft.active && !draft.startDate) {
    draft.startDate = todayISO();
  }

  // If start date changed, migrate entry data
  const old = c.startDate, nw = draft.startDate;
  if (old && nw && old !== nw) {
    const diff = isoDiff(nw, old);
    if (diff) {
      const keys = Object.keys(S.entries).sort((a, b) => diff > 0 ? b.localeCompare(a) : a.localeCompare(b));
      keys.forEach(d => {
        if (!S.entries[d]?.cycleData?.[c.id]) return;
        const nd = isoPlus(d, diff);
        const data = JSON.parse(JSON.stringify(S.entries[d].cycleData[c.id]));
        delete S.entries[d].cycleData[c.id];
        if (!S.entries[nd]) S.entries[nd] = { temp: '', humidity: '', cycleData: {} };
        if (!S.entries[nd].cycleData) S.entries[nd].cycleData = {};
        S.entries[nd].cycleData[c.id] = data;
      });
    }
  }

  Object.assign(c, { ...draft, id: c.id });
  saveS();
  vibrate();
  toast(`${sym(c)} ${c.name} gespeichert ✓`);
  renderSet();
}

async function selCyc(id) {
  // Wenn der User ungespeicherte Änderungen am aktuellen Zyklus hat, erst fragen.
  const currentCycle = S.cycles.find(c => c.id === selId);
  if (currentCycle && draft && draft.id === selId) {
    const isDirty = Object.keys(draft).some(k => {
      if (k === 'id' || k.startsWith('_')) return false;
      return JSON.stringify(draft[k]) !== JSON.stringify(currentCycle[k]);
    });
    if (isDirty) {
      const keep = await customConfirm(
        'Ungespeicherte Änderungen',
        `Am Zyklus "${currentCycle.name}" hast du Änderungen die noch nicht gespeichert sind. Sichern vor dem Wechsel?`,
        'Sichern & wechseln',
        'var(--green)'
      );
      if (keep) {
        saveDraft();
      }
      // Egal ob gespeichert oder nicht: weiter zum neuen Zyklus
    }
  }
  selId = id;
  draft = {};
  renderSet();
}

/**
 * Legt einen vollständigen Demo-Zyklus an — damit der User sofort sieht wie die App
 * mit echten Daten aussieht. Der Zyklus ist klar als "Demo" markiert, so dass der
 * User ihn später einfach löschen oder ersetzen kann.
 */
/**
 * Erkennt einen Demo-Zyklus an seinem Namen. Der Demo-Zyklus wird von
 * welcomeStartDemo() mit einem festen Namen angelegt.
 */
function isDemoCycle(c) {
  return c && typeof c.name === 'string' && c.name.startsWith('Demo-Zyklus');
}

function hasDemoCycle() {
  return (S.cycles || []).some(c => isDemoCycle(c) && !c.archived);
}

/**
 * Beendet den Demo-Modus: löscht ALLE Demo-Zyklen und ihre Einträge.
 * Der dazugehörige Demo-Düngeplan bleibt erhalten (falls der User den Plan
 * weiterverwenden will), wird aber deselektiert wenn er nur vom Demo genutzt wurde.
 */
/**
 * Startet den Demo-Modus aus dem How-to heraus. Wenn bereits ein Demo-Zyklus
 * existiert, navigiert die Funktion einfach zum Dashboard (damit der User
 * seinen laufenden Demo weiterschauen kann, ohne ihn zu überschreiben).
 * Sonst wird ein neuer Demo-Zyklus angelegt via welcomeStartDemo().
 */
function _howtoStartDemo() {
  if (hasDemoCycle()) {
    goTo('dash');
    toast('🎓 Dein Demo-Zyklus läuft bereits — du bist schon drin!');
    return;
  }
  welcomeStartDemo();
}

async function endDemoMode() {
  const ok = await customConfirm(
    'Demo beenden?',
    'Alle Demo-Daten (Zyklus, Einträge, Notizen, Dünger-Plan) werden komplett gelöscht. Du startest mit einer leeren App.',
    'Demo löschen',
    'var(--red)'
  );
  if (!ok) return;

  const demoCycles = (S.cycles || []).filter(isDemoCycle);
  const demoIds = new Set(demoCycles.map(c => c.id));

  // Einträge bereinigen: nur die cycleData der Demo-Zyklen löschen, andere behalten
  Object.keys(S.entries).forEach(iso => {
    const ent = S.entries[iso];
    if (!ent || !ent.cycleData) return;
    demoIds.forEach(id => { delete ent.cycleData[id]; });
    // Wenn ein Eintrag jetzt komplett leer ist (keine cycleData und keine parent-Werte), weg damit
    const hasAnyCycleData = Object.keys(ent.cycleData).length > 0;
    const hasParentData = ent.temp || ent.humidity || ent.notes;
    if (!hasAnyCycleData && !hasParentData) {
      delete S.entries[iso];
    }
  });

  // Zyklen rauswerfen
  S.cycles = (S.cycles || []).filter(c => !isDemoCycle(c));

  // Demo-Düngeplan auch rauswerfen (ID-Prefix "fp_demo_"). Wenn der User einen
  // eigenen Plan angelegt hat, bleibt der. Aktiven Plan entsprechend umschalten.
  if (S.fertPlans && S.fertPlans.length) {
    S.fertPlans = S.fertPlans.filter(p => !p.id || !p.id.startsWith('fp_demo_'));
    // Wenn der aktive Plan gelöscht wurde: auf ersten übrigen Plan schalten oder null
    if (S._activePlanId && !S.fertPlans.some(p => p.id === S._activePlanId)) {
      S._activePlanId = S.fertPlans[0]?.id || null;
      if (typeof syncActivePlanToGlobals === 'function') syncActivePlanToGlobals();
    }
  }

  saveS();
  toast('🎓 Demo beendet. Leg jetzt deinen eigenen Zyklus an!');
  renderDash();
}

function welcomeStartDemo() {
  S._welcomeSeen = true;

  // Start-Datum: heute minus 60 Tage (~8,5 Wochen).
  // Das deckt den kompletten Auto-Lebenszyklus ab:
  //  Tag 1-21:  Anzucht (Keimung → Sämling → frühe Vegetation)
  //  Tag 22:    Topping (idealer Zeitpunkt nach 4-5 Nodien)
  //  Tag 22-30: Vorblüte / Stretch
  //  Tag 30-52: Volle Blüte (Stacking → Peak → Reife)
  //  Tag 53-58: Spülung (Flush-Feature)
  //  Tag 59-60: IceFlush / Ernte-Fenster
  // So sieht der User ALLE Phasen + Features der App auf einmal in Aktion.
  const demoStart = new Date();
  demoStart.setDate(demoStart.getDate() - 60);
  const demoStartISO = demoStart.toISOString().split('T')[0];

  // Falls noch kein Düngeplan existiert: BioBizz Master (Cup-Niveau) Vorlage anlegen
  // Master statt Light, damit die Demo den Profi-Plan zeigt mit allen Features.
  if (!S.fertPlans || S.fertPlans.length === 0) {
    const biomaster = FERT_PRESETS?.biobizz_master;
    if (biomaster) {
      const demoPlanId = 'fp_demo_' + Date.now();
      const products = biomaster.products.map((p, i) => ({ id: 'p' + Date.now() + '_' + i, ...p }));
      const schedule = {};
      Object.entries(biomaster.schedule || {}).forEach(([w, doses]) => {
        const mapped = {};
        Object.entries(doses || {}).forEach(([name, dose]) => {
          const prod = products.find(p => p.name === name);
          if (prod) mapped[prod.id] = dose;
        });
        schedule['w' + w] = mapped;
      });
      S.fertPlans = [{
        id: demoPlanId,
        name: biomaster.name,
        products, schedule,
        mixOrder: biomaster.mixOrder ? [...biomaster.mixOrder] : [],
        mixInfo: biomaster.mixInfo || '',
        drainInfo: biomaster.drainInfo || null,
        presetKey: 'biobizz_master',
        createdAt: Date.now(),
      }];
      S._activePlanId = demoPlanId;
      syncActivePlanToGlobals();
    }
  }

  // Topping-Datum: Tag 22 (38 Tage vor heute)
  const toppingDate = new Date(demoStart);
  toppingDate.setDate(toppingDate.getDate() + 21);  // Tag 22
  const toppingISO = toppingDate.toISOString().split('T')[0];

  // Demo-Zyklus anlegen — ein Auto-Zyklus mit Standard-Phasen-Längen
  // (21 Anzucht + 35 Blüte + 3 Flush + 1 Ice + 1 Ernte + 7 Trocknen = 68 Tage gesamt)
  addCyc({
    name: 'Demo-Zyklus (zum Erkunden)',
    growType: 'indoor',
    seedType: 'auto',
    startDate: demoStartISO,
    potSize: 11,
    fertPlanId: S.fertPlans?.[0]?.id || null,
  });

  const cycleId = S.cycles[S.cycles.length - 1]?.id;
  if (!cycleId) { saveS(); goTo('dash'); return; }

  // Phase-Längen für Demo etwas anpassen: Anzucht 21, Blüte 35 (damit Tag 60 knapp vor Flush)
  const cycRef = S.cycles.find(c => c.id === cycleId);
  if (cycRef) {
    cycRef.toppingDate = toppingISO;
    cycRef.toppingPause = 2;
    cycRef.anzuchtDays = 21;
    cycRef.bloomDays = 35;
    cycRef.flushDays = 5;
    cycRef.iceDays = 2;
    cycRef.harvestDays = 1;
    cycRef.dryDays = 7;
  }

  // === REALISTISCHE GIESS-HISTORIE über 60 Tage ===
  // Alle 3 Tage ein Gießtag (Standard-Rhythmus). Topping-Pause Tag 23-24
  // wird durch die App-Logik automatisch gehandhabt, wir überspringen dort.
  const plan = S.fertPlans[0];
  const products = plan?.products || [];
  const sched = plan?.schedule || {};

  // Wasser-Kurve: biologisch korrekt über Lebenszyklus.
  // Tag 1: Samen in vorher leicht feucht gemachte Erde setzen — KEIN Gießen.
  // Tag 4-10: Sprühflaschen-Phase (30-150 ml), Sämling bildet Wurzeln aus.
  // Tag 13-21: Vegi-Start, Durst steigt schnell (350-1000 ml).
  // Tag 22-28: Stretch, Pflanze wird groß (1500-2500 ml).
  // Tag 31-52: Blüte-Peak (2500-3000 ml, stabile Phase).
  // Tag 55-58: Flush mit viel Wasser (3500 ml, spült Salze).
  // Werte für 11L-Stofftopf Indoor — entspricht 15-25% Topfvolumen im Peak.
  const waterForDay = (dayNum) => {
    if (dayNum === 1)   return 0;                                // Samen setzen — kein Gießen
    if (dayNum === 4)   return 30;                               // Erste kleine Sprühgabe
    if (dayNum === 7)   return 80;                               // Keimling steht
    if (dayNum === 10)  return 150;                              // Erstes Blattpaar
    if (dayNum === 13)  return 350;                              // 3. Nodium
    if (dayNum === 16)  return 600;                              // Kräftiges Wachstum
    if (dayNum === 19)  return 1000;                             // Vor Topping gut gewässert
    if (dayNum === 22)  return 1500;                             // Topping-Tag (vor dem Schnitt)
    if (dayNum <= 28)   return 1800 + (dayNum - 28) * 100;       // 1800-2500 Stretch
    if (dayNum <= 45)   return 2500 + Math.min((dayNum - 28) * 30, 500);  // 2500-3000 Blüte
    if (dayNum <= 55)   return 3000;                             // Reife stabil
    return 3500;                                                 // Flush mit viel Wasser
  };

  // pH-Kurve: stabil zwischen 6.2 und 6.4 (perfekter Grower)
  const phForDay = (dayNum) => {
    const cycle = [6.2, 6.3, 6.4, 6.3, 6.3, 6.2, 6.4, 6.3, 6.2, 6.3];
    return cycle[dayNum % cycle.length];
  };

  // EC-Kurve: Null in früher Anzucht, rampt hoch durch Düngung, Peak Blüte, dann Flush zeigt Runoff-EC
  const ecForDay = (dayNum) => {
    if (dayNum <= 7) return '';                                  // Sämling ohne Dünger
    if (dayNum <= 14) return (0.8 + (dayNum - 8) * 0.05).toFixed(1);   // 0.8-1.1
    if (dayNum <= 21) return (1.1 + (dayNum - 14) * 0.05).toFixed(1);  // 1.1-1.5
    if (dayNum <= 35) return (1.5 + (dayNum - 21) * 0.03).toFixed(1);  // 1.5-1.9
    if (dayNum <= 52) return (1.9 + Math.min((dayNum - 35) * 0.01, 0.2)).toFixed(1); // 1.9-2.1
    if (dayNum <= 58) return (2.0 - (dayNum - 52) * 0.2).toFixed(1);   // Flush: 2.0→0.8
    return (0.5).toFixed(1);
  };

  // Generiere Einträge alle 3 Tage (Standard-Gießintervall ab Tag 1)
  // Gieß-Logik: Tag 1, 4, 7, 10, 13, 16, 19, 22 (vor Topping!), 25 (nach 2-Tage-Pause), 28, …
  // Mit toppingPause=2 fällt kein regulärer Gießtag in die Pause (Tag 23/24 still, 25 wieder regulär).
  for (let dayNum = 1; dayNum <= 60; dayNum += 3) {

    const d = new Date(demoStart);
    d.setDate(d.getDate() + dayNum - 1);
    const iso = d.toISOString().split('T')[0];

    if (!S.entries[iso]) S.entries[iso] = {};
    const ent = S.entries[iso];
    if (!ent.cycleData) ent.cycleData = {};
    if (!ent.cycleData[cycleId]) ent.cycleData[cycleId] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
    const cd = ent.cycleData[cycleId];

    // Wassermenge: frühe Tage exakt (kleine Werte), ab Tag 13 auf 50er gerundet
    const w = waterForDay(dayNum);
    cd.water = String(dayNum <= 10 ? w : Math.round(w / 50) * 50);
    cd.ph = dayNum === 1 ? '' : String(phForDay(dayNum));  // Tag 1: kein pH messen (kein Gießen)
    cd.ec = ecForDay(dayNum);

    // Temp/RLF entwickelt sich phasen-passend:
    // - Anzucht: 24-25°C, 60-65% (höher für Sämlinge)
    // - Vegi: 23-25°C, 55-60%
    // - Blüte: 22-24°C, 50-55% (kühler + trockener für Harz)
    // - späte Blüte: 20-23°C, 45-50% (Trichom-Schutz)
    let tempBase, rhBase;
    if (dayNum <= 14)      { tempBase = 24; rhBase = 62; }
    else if (dayNum <= 25) { tempBase = 24; rhBase = 58; }
    else if (dayNum <= 40) { tempBase = 23; rhBase = 52; }
    else                    { tempBase = 22; rhBase = 48; }
    ent.temp = (tempBase + ((dayNum * 7) % 5) * 0.3).toFixed(1);
    ent.humidity = String(rhBase + ((dayNum * 3) % 6));

    // Dünger-Dosen aus Wochenplan
    if (dayNum >= 8) {
      const week = Math.max(1, Math.min(Math.ceil(dayNum / 7), 12));
      const weekSched = sched['w' + week] || {};
      cd.doses = { ...weekSched };
    }
  }

  // === MEILENSTEIN-NOTIZEN (auf Gieß-Tage oder dazwischen für Beobachtungen) ===
  // Notizen-Tage sind bewusst sowohl an Gieß-Tagen (1, 4, 7, 19, 22, 28...) als auch
  // dazwischen (z.B. Tag 14) möglich — ein Notiz-Eintrag ohne Gieß-Daten ist normal
  // für Beobachtungs-Tage.
  const notes = {
    1:  'Samen in Jiffy gesetzt. Erde vorher leicht angefeuchtet — heute nicht nachgegossen. Nur abwarten.',
    4:  'Erste Keimung sichtbar! Kleines Köpfchen drückt durch die Erde. Erste Sprühgabe mit 30ml.',
    7:  'Erstes Blattpaar komplett ausgebildet. Pflanze steht stabil, alles gut.',
    14: '2 Wochen — 4. Nodium zeigt sich. Root·Juice ausgeschlichen. Buschiges Wachstum.',
    19: 'Vor dem Topping nochmal kräftig gegossen. Turgordruck muss stimmen für sauberen Schnitt.',
    22: '✂️ Getoppt über dem 5. Nodium. Sauberer Schnitt, Pflanze war gut hydriert.',
    25: 'Post-Topping-Pause vorbei, erster Guss danach. Zwei neue Haupttriebe schieben kräftig — top Erholung.',
    31: 'Erste Pistillen sichtbar! Blüte startet. Licht auf 12/12 gewechselt (falls Photo).',
    37: 'Stretch vorbei, Pflanze steht in voller Höhe. Bloom-Dünger rauf, N-Anteil halbiert.',
    44: 'Buds stacken sichtbar, Harz-Produktion läuft. Zimmer riecht intensiv.',
    52: 'Reife-Phase! Erste Amber-Trichome unter der Lupe sichtbar. Top·Max auf Max.',
    55: 'Flush-Woche gestartet. Nur noch Wasser. Blätter werden langsam gelb (gewollt).',
    59: 'Ernte steht kurz bevor. Trichome zu ~70% milchig, 10% amber — perfekt für balanced high.',
  };
  Object.entries(notes).forEach(([dayNum, note]) => {
    const d = new Date(demoStart);
    d.setDate(d.getDate() + parseInt(dayNum) - 1);
    const iso = d.toISOString().split('T')[0];
    if (!S.entries[iso]) S.entries[iso] = {};
    if (!S.entries[iso].cycleData) S.entries[iso].cycleData = {};
    if (!S.entries[iso].cycleData[cycleId]) {
      S.entries[iso].cycleData[cycleId] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
    }
    S.entries[iso].cycleData[cycleId].notes = note;
  });

  saveS();
  goTo('dash');
  toast('🎓 Demo-Zyklus (60 Tage, komplett ausgefüllt) angelegt — löschbar wenn du magst.');
}

/**
 * Wizard-State: step 0-5, answers akkumulieren Schritt für Schritt.
 * Wird bei openCycleWizard() resettet.
 */
let _wizStep = 0;
let _wizAnswers = {};
// Wo wurde der Wizard geöffnet? Damit closeWizard() sauber zurück kann.
// 'welcome' = vom Erstbesuch-Screen, 'dash' = vom leeren Dashboard, 'set' = aus Einstellungen (Default)
let _wizOrigin = 'set';

function openCycleWizard(origin) {
  _wizStep = 0;
  _wizAnswers = {};
  _wizOrigin = origin || 'set';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-wizard').classList.add('active');
  _renderWiz();
}

function closeWizard() {
  // Wenn der User vom Welcome-Screen kommt und abbricht:
  // _welcomeSeen setzen, damit er beim nächsten App-Start nicht wieder dahin muss.
  const cameFromWelcome = (_wizOrigin === 'welcome' && !S._welcomeSeen);
  if (cameFromWelcome) {
    S._welcomeSeen = true;
    saveS();
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  // Zurück zum Ursprung — oder dash als sichere Fallback-Ansicht
  if (_wizOrigin === 'welcome' || _wizOrigin === 'dash') {
    // Vom Welcome oder leeren Dashboard: Dashboard ist das beste Ziel.
    // Es zeigt bei leerem State einen freundlichen Call-to-Action (Jetzt starten / Demo / Nachlesen).
    document.getElementById('scr-dash').classList.add('active');
    renderDash();
    // Wenn der User absichtlich übersprungen hat, kurz zeigen wo er weitermachen kann.
    if (cameFromWelcome) {
      setTimeout(() => {
        if (typeof toast === 'function') toast('💡 Unten findest du Tabs für Kalender, Tipps und Einstellungen', 4500);
      }, 300);
    }
  } else {
    document.getElementById('scr-set').classList.add('active');
    // Scroll an den Anfang — egal wo der User zuletzt war, ein Wizard-
    // Schließen sollte nicht in die Mitte der Settings-Seite führen.
    _setScrollY = 0;
    renderSet();
    const scr = document.getElementById('set-body');
    if (scr) scr.scrollTop = 0;
  }
}

/** Profi-Bypass: direkt ins klassische Formular, Zyklus sofort anlegen */
function skipToExpertForm() {
  closeWizard();
  addCyc();
}

function _wizNext() {
  _wizStep++;
  _renderWiz();
}

function _wizBack() {
  if (_wizStep > 0) { _wizStep--; _renderWiz(); }
}

function _wizAnswer(key, value) {
  _wizAnswers[key] = value;
  _wizNext();
}

function _renderWiz() {
  const body = document.getElementById('wiz-body');
  const a = _wizAnswers;

  // Skip-Logic: bei Outdoor kein Samentyp-Screen für Licht-Zyklus, bei Indoor
  // kein Outdoor-Timing-Screen. Screens werden in _wizScreens zusammengesetzt.
  const screens = [
    _wizStepWelcome,
    _wizStepLocation,   // 1: drinnen / draußen
    _wizStepSeedOrTiming, // 2: je nach (1): Samentyp oder Outdoor-Timing
    _wizStepPotSize,    // 3: Topfgröße (mit Empfehlung)
    _wizStepFertPlan,   // 4: Düngeplan
    _wizStepNameSummary, // 5: Name + Zusammenfassung
  ];
  const idx = Math.max(0, Math.min(_wizStep, screens.length - 1));
  const progressHTML = idx > 0 ? `<div style="height:3px;background:var(--border);border-radius:2px;margin:0 16px 12px">
    <div style="height:100%;background:var(--green);border-radius:2px;width:${(idx / (screens.length - 1)) * 100}%;transition:width 0.3s"></div>
  </div>` : '';

  body.innerHTML = progressHTML + screens[idx](a);
}

// Screen 4 — Düngeplan
function _wizStepFertPlan(a) {
  const plans = S.fertPlans || [];

  // Bestehende Pläne (falls vorhanden) anbieten
  const planOptions = plans.map(p => `
    <button onclick="_wizAnswer('fertPlanId','${p.id}')" style="display:block;width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;text-align:left;font-family:var(--font)">
      <div style="font-size:13px;font-weight:600;color:var(--text)">${p.name}</div>

    </button>
  `).join('');

  // BioBizz-Presets: jedes direkt als Option, legt einen Plan beim Wizard-Finish an.
  // Je nach Grow-Typ (Indoor/Outdoor) wird ein anderer Plan empfohlen.
  // Nur anzeigen wenn noch kein Plan mit diesem Preset existiert.
  const isOutdoor = a.growType === 'outdoor';
  // Outdoor zuerst für Outdoor-Grower, sonst Light zuerst.
  const presetKeys = isOutdoor
    ? ['biobizz_outdoor', 'biobizz_light', 'biobizz_master', 'biobizz_official']
    : ['biobizz_light', 'biobizz_master', 'biobizz_official', 'biobizz_outdoor'];
  const recommendedKey = isOutdoor ? 'biobizz_outdoor' : 'biobizz_light';
  const presetOptions = presetKeys
    .filter(key => !plans.some(p => p.presetKey === key))
    .map(key => {
      const pr = FERT_PRESETS[key];
      if (!pr) return '';
      const isRecommended = key === recommendedKey;
      const badge = isRecommended
        ? '<span style="background:rgba(76,175,112,0.25);color:var(--green);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:6px">Empfohlen</span>'
        : '';
      const icon = { biobizz_light: '🌱', biobizz_master: '🏆', biobizz_official: '📋', biobizz_outdoor: '☀️' }[key] || '🧪';
      const summary = {
        biobizz_light: 'Master × 50% · fehlerverzeihend für Einsteiger',
        biobizz_master: 'Cup-Niveau · jedes Gießen · früher N-Cutoff',
        biobizz_official: 'Herstellerplan · automatisch verteilt',
        biobizz_outdoor: 'Fish·Mix in Vegi · für Erdanbau im Freien',
      }[key] || '';
      return `
        <button onclick="_wizAnswer('fertPresetKey','${key}')" style="display:block;width:100%;background:${isRecommended ? 'rgba(76,175,112,0.08)' : 'var(--card)'};border:1px solid ${isRecommended ? 'var(--green)' : 'var(--border)'};border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;text-align:left;font-family:var(--font)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px;flex-shrink:0">${icon}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;flex-wrap:wrap">${pr.name}${badge}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px;line-height:1.4">${summary}</div>
            </div>
          </div>
        </button>
      `;
    }).join('');

  const hasExistingPlans = plans.length > 0;

  return `<div style="padding:20px">
    <h2 style="font-size:20px;font-weight:700;margin:0 0 6px">Düngeplan?</h2>
    <p style="font-size:13px;color:var(--text-muted);margin:0 0 16px">Wähle einen fertigen Plan oder lade einen BioBizz-Standard.</p>

    ${hasExistingPlans ? `<div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Deine Pläne</div>
      ${planOptions}
    </div>` : ''}

    ${presetOptions ? `<div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">BioBizz-Standards ${hasExistingPlans ? '' : '· automatisch einrichten'}</div>
      ${presetOptions}
    </div>` : ''}

    <button onclick="_wizAnswers.fertPlanId=null;_wizAnswers.fertPresetKey=null;_wizNext()" style="display:block;width:100%;background:var(--card2);border:1px dashed var(--border);border-radius:12px;padding:14px;cursor:pointer;text-align:center;font-family:var(--font);color:var(--text-muted);font-size:12px">
      ⏭ Noch keinen Plan — später einrichten
    </button>

    <button onclick="_wizBack()" style="width:100%;background:transparent;color:var(--text-muted);border:none;padding:14px;font-size:12px;cursor:pointer;font-family:var(--font);margin-top:8px">← Zurück</button>

      <div id="wiz-strain-suggest" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--card);border:0.5px solid var(--border);border-radius:10px;margin-top:4px;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4)"></div>
    </div>

    ${strainChips}

    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:20px">
      <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px">📋 Deine Einstellungen</div>
      <div style="font-size:12px;color:var(--text);line-height:1.8">
        <div>${a.growType === 'outdoor' ? '☀️ Outdoor' : '🏠 Indoor'}</div>
        ${a.seedType ? `<div>${seedLabel}</div>` : ''}
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0">
          <span>📅 Start:</span>
          <input type="date" value="${startDateInfo.date}" onchange="_wizAnswers.customStartDate=this.value;_renderWiz()" style="background:var(--card2);border:0.5px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-family:var(--font);font-size:12px;font-weight:700;color-scheme:dark"/>
          <span style="font-size:10px;color:var(--text-muted)">${fmtDE(startDateInfo.date, { weekday:'short' })}</span>
        </div>
        ${a.growType === 'outdoor' && a.seedType !== 'auto' ? (() => {
          // Default: 15. Mai im Jahr des Startdatums (Ende Eisheilige)
          // Wenn startDate nach Mai: 15. Mai nächstes Jahr
          const sd = new Date(startDateInfo.date + 'T12:00:00');
          let defTP = new Date(sd.getFullYear(), 4, 15, 12); // Mai = 4
          if (defTP < sd) defTP.setFullYear(sd.getFullYear() + 1);
          const defISO = defTP.toISOString().split('T')[0];
          const cur = a.transplantDate || defISO;
          return `
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0">
              <span>🌤 Raus ab:</span>
              <input type="date" value="${cur}" onchange="_wizAnswers.transplantDate=this.value;_renderWiz()" style="background:var(--card2);border:0.5px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-family:var(--font);font-size:12px;font-weight:700;color-scheme:dark"/>
              <span style="font-size:10px;color:var(--text-muted)">${fmtDE(cur, { weekday:'short' })}</span>
            </div>
            <div style="font-size:10px;color:var(--text-hint);padding-left:2px;margin-top:-2px">Wann darf die Pflanze raus? (z.B. nach Eisheiligen)</div>
          `;
        })() : ''}
        <div>🪴 Topf: <b>${a.potSize || 11} L</b></div>
        <div>🧪 Düngeplan: <b>${planName}</b></div>

  </div>`;
}

/** Live-Autocomplete für das Name-Feld im Wizard. Zeigt Strain-Matches. */
function _renderStrainSuggestions(query) {
  const el = document.getElementById('wiz-strain-suggest');
  if (!el) return;
  const matches = findStrainMatches(query);
  if (matches.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = matches.map(s => `
    <div onclick="_pickStrain('${s.name.replace(/'/g, "\\'")}')" style="padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;gap:2px">
      <div style="font-size:13px;color:var(--text);font-weight:500">${s.name}</div>
      <div style="font-size:10px;color:var(--text-muted)">${s.type === 'auto' ? '⚡ Auto' : '♀ Photo'} · Blüte ${s.flowering}d · ${s.notes}</div>
    </div>
  `).join('');
}

/** Strain-Chip oder Autocomplete-Eintrag angeklickt: Name + optional Blütedauer setzen. */
function _pickStrain(name) {
  const s = STRAINS.find(x => x.name === name);
  if (!s) return;
  _wizAnswers.name = s.name;
  // Blüte-Dauer speichern — greift im addCyc falls übernommen
  _wizAnswers.bloomDaysHint = s.flowering;
  // Name-Feld aktualisieren + Suggestion-Liste schließen
  const inp = document.getElementById('wiz-name');
  if (inp) inp.value = s.name;
  const sug = document.getElementById('wiz-strain-suggest');
  if (sug) sug.style.display = 'none';
  toast(`✓ ${s.name.split(' ').slice(0, 2).join(' ')} gewählt (${s.flowering}d Blüte)`);
}

/** Löst aus den Wizard-Antworten ein ISO-Startdatum ab. */
function _wizResolveStartDate(a) {
  // Expliziter Override vom User hat Vorrang (via Date-Picker im Summary)
  if (a.customStartDate) {
    return { date: a.customStartDate, note: 'Manuell gewählt' };
  }
  if (a.startOption === 'today' || !a.startOption) {
    return { date: todayISO(), note: 'Heute' };
  }
  if (a.startOption === 'prevegged') {
    // 3 Wochen zurück als Standard-Annahme für vorgezogene Pflanzen
    const d = new Date();
    d.setDate(d.getDate() - 21);
    return { date: d.toISOString().split('T')[0], note: 'Vor 3 Wochen (anpassbar)' };
  }
  if (a.startOption === 'later') {
    return { date: todayISO(), note: 'Manuell anpassen' };
  }
  return { date: todayISO(), note: 'Heute' };
}

/** Wizard abschließen: Zyklus anlegen, aktiver Pflanzen-Typ, los */
function _wizFinish() {
  const a = _wizAnswers;
  const startInfo = _wizResolveStartDate(a);

  // Indoor: Seed-Type kam, draußen kam es nicht — Default auto für Outdoor
  const seedType = a.seedType || (a.growType === 'outdoor' ? 'fem' : 'auto');

  // Wenn der User ein BioBizz-Preset gewählt hat, legen wir JETZT den Plan an
  // damit dein Zyklus direkt damit verknüpft wird. Kein Umweg über den Dünger-Screen.
  let resolvedPlanId = a.fertPlanId !== undefined ? a.fertPlanId : null;
  if (a.fertPresetKey && FERT_PRESETS[a.fertPresetKey]) {
    const key = a.fertPresetKey;
    const pr = FERT_PRESETS[key];
    // Falls bereits ein Plan mit diesem Preset existiert: nutzen
    const existing = (S.fertPlans || []).find(p => p.presetKey === key);
    if (existing) {
      resolvedPlanId = existing.id;
    } else {
      // Neuen Plan aus Preset anlegen
      if (!S.fertPlans) S.fertPlans = [];
      const newId = 'fp_' + Date.now();
      const products = pr.products.map((p, i) => ({ id: 'p' + Date.now() + '_' + i, ...p }));
      const schedule = {};
      Object.entries(pr.schedule || {}).forEach(([w, doses]) => {
        const mapped = {};
        Object.entries(doses || {}).forEach(([name, dose]) => {
          const prod = products.find(p => p.name === name);
          if (prod) mapped[prod.id] = dose;
        });
        schedule['w' + w] = mapped;
      });
      S.fertPlans.push({
        id: newId,
        name: pr.name,
        products, schedule,
        mixOrder: pr.mixOrder ? [...pr.mixOrder] : [],
        mixInfo: pr.mixInfo || '',
        drainInfo: pr.drainInfo || null,
        presetKey: key,
        createdAt: Date.now(),
      });
      S._activePlanId = newId;
      syncActivePlanToGlobals();
      resolvedPlanId = newId;
    }
  }

  const overrides = {
    name: a.name || undefined,
    growType: a.growType || 'indoor',
    seedType,
    startDate: startInfo.date,
    potSize: a.potSize,
    fertPlanId: resolvedPlanId,
  };
  // Strain-Vorlage: Blütedauer übernehmen falls vom User gepickt
  if (a.bloomDaysHint && a.bloomDaysHint > 0) {
    overrides.bloomDays = a.bloomDaysHint;
  }
  // Outdoor-Photoperiode: Transplant-Datum weiterreichen wenn gesetzt
  if (a.transplantDate && a.growType === 'outdoor' && a.seedType !== 'auto') {
    overrides.transplantDate = a.transplantDate;
  }

  // Ist das der erste Zyklus überhaupt? Dann bieten wir einen Modus-Wahl-Dialog
  // damit der User weiß dass er im Einsteiger-Modus ist und wechseln kann.
  const isFirstCycle = (S.cycles || []).length === 0;

  addCyc(overrides);

  // Welcome-Screen ab jetzt als gesehen markieren (egal woher der Wizard geöffnet wurde)
  S._welcomeSeen = true;
  saveS();

  if (isFirstCycle && !S._modeAsked) {
    // Dialog zeigen, dann zum Dashboard
    _showModeChoiceDialog();
  } else {
    closeWizard();
    toast(`🌱 Dein neuer Zyklus ist bereit!`);
  }
}

function addCyc(overrides) {
  const o = overrides || {};
  const i = S.cycles.length;
  const c = {
    id: Date.now().toString(),
    name: o.name || `Zyklus ${i + 1}`,
    location: o.location || '',
    active: true,
    startDate: o.startDate || todayISO(),
    colorId: COLORS[i % COLORS.length].id,
    symbol: SYMS[i % SYMS.length],
    seedType: o.seedType || 'auto',
    lightVeg: o.lightVeg || '18/6',
    lightBloom: o.lightBloom || '18/6',
    anzuchtDays: PHASE_DEFAULTS.anzuchtDays, bloomDays: o.bloomDays || PHASE_DEFAULTS.bloomDays,
    flushDays: PHASE_DEFAULTS.flushDays, iceDays: PHASE_DEFAULTS.iceDays,
    harvestDays: PHASE_DEFAULTS.harvestDays, dryDays: PHASE_DEFAULTS.dryDays,
    intAnzucht: RI.anzucht, intBloom: RI.bloom, intFlush: RI.flush,
    intIce: RI.ice, intErnte: RI.ernte, intDry: RI.dry,
    offsetHistory: [], toppingDate: null, toppingPause: 2, skippedDays: [],
    // Outdoor-support fields
    growType: o.growType || 'indoor',
    hemisphere: o.hemisphere || 'north',
    phaseMode: 'days',
    // Outdoor-Photoperiode: wann geht die Pflanze raus (nach Eisheiligen typisch)
    // Wenn gesetzt, teilt die App die Vegi-Zeit in Vorzucht/Abhärten/Wachstum-draußen auf.
    transplantDate: o.transplantDate || null,
    // RESTGEWICHT-MODUL: Default 'off' (Fallback-Modus). User aktiviert den
    // Modus bewusst in den Zyklus-Einstellungen oder im ersten Entry.
    weightMode: o.weightMode || 'off',
    saturatedWeight: o.saturatedWeight || null,
    dryWeight: o.dryWeight || null,
    // v0.9: inherit the plan that's currently active in the Dünger screen.
    // If none exists, falls back to first plan. If no plans at all → null (user assigns later).
    fertPlanId: o.fertPlanId !== undefined ? o.fertPlanId : (S._activePlanId || (S.fertPlans && S.fertPlans[0]?.id) || null),
  };
  // Pot size: if wizard supplied one, save globally (TODO: per-cycle field in later iteration)
  if (o.potSize) S.potSize = o.potSize;
  S.cycles.push(c);
  selId = c.id;
  draft = { ...c };
  saveS();
  // Nach Zyklus-Erstellung: Scroll an den Anfang der Settings-Seite,
  // damit der User den neu erstellten Zyklus direkt oben sieht und nicht
  // auf die alte Scroll-Position (z.B. Gefahrenzone) zurückspringt.
  _setScrollY = 0;
  renderSet();
  // Belt-and-suspenders: direkt nach dem Render nochmal auf 0 setzen
  const scr = document.getElementById('set-body');
  if (scr) scr.scrollTop = 0;
  toast(`🌱 ${c.name} erstellt — Start: ${fmtDE(c.startDate, {day:'2-digit',month:'2-digit'})}`);

}

/**
 * Count past watering days (giess/giess_anz/spuelen/ice) between startDate and today
 * that have no entry yet. Used to decide whether to show the backfill button and how
 * many days it covers.
 */
function countMissingPastWateringDays(c) {
  if (!c.startDate) return 0;
  const today = todayISO();
  let count = 0;
  let iter = c.startDate;
  // Safety limit: don't iterate more than 200 days (covers longest possible grow + buffer)
  for (let i = 0; i < 200 && iter < today; i++) {
    const a = getAction(iter, c);
    if (['giess','giess_anz','spuelen','ice'].includes(a)) {
      const existing = S.entries[iter]?.cycleData?.[c.id];
      const hasData = existing && (existing.water || existing.ph || (existing.doses && Object.values(existing.doses).some(v => v > 0)));
      if (!hasData) count++;
    }
    iter = isoPlus(iter, 1);
  }
  return count;
}

/**
 * Fill past watering days with planned values. Skips days that already have data
 * (non-destructive). Computes fertilizer week per phase + day, same logic as entry render.
 */
async function backfillPast(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c || !c.startDate) return;
  const missing = countMissingPastWateringDays(c);
  if (missing === 0) return;
  const ok = await customConfirm(
    `🕐 ${missing} vergangene Gießtage auto-eintragen?`,
    `Wasser, pH 6.4 und Plan-Dünger werden für ${missing} Gießtage zwischen ${fmtDE(c.startDate, {day:'2-digit',month:'short'})} und heute eingetragen. Bestehende Einträge bleiben unverändert.`,
    'Auto-eintragen', 'var(--yellow)'
  );
  if (!ok) return;
  
  const today = todayISO();
  let filled = 0;
  let iter = c.startDate;
  for (let i = 0; i < 200 && iter < today; i++) {
    const a = getAction(iter, c);
    if (['giess','giess_anz','spuelen','ice'].includes(a)) {
      const existing = S.entries[iter]?.cycleData?.[c.id];
      const hasData = existing && (existing.water || existing.ph || (existing.doses && Object.values(existing.doses).some(v => v > 0)));
      if (!hasData) {
        const p = phase(iter, c);
        if (p) {
          // Compute fert week: same as entry screen logic
          let fertWk = 1;
          if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
          else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
          else {
            const td = isoDiff(iter, c.startDate);
            fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10));
          }
          // Ensure entry exists with proper shape
          if (!S.entries[iter]) S.entries[iter] = { temp: '', humidity: '', cycleData: {} };
          if (!S.entries[iter].cycleData) S.entries[iter].cycleData = {};
          if (!S.entries[iter].cycleData[c.id]) S.entries[iter].cycleData[c.id] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
          const cd = S.entries[iter].cycleData[c.id];
          if (!cd.doses) cd.doses = {};
          
          const waterMl = waterSuggestion(c, p);
          cd.water = String(waterMl);
          cd.ph = '6.4';
          // Only fertilizers on normal watering days
          if (a === 'giess' || a === 'giess_anz') {
            const doses = getWeekDoses(c.id, fertWk, c);
            Object.entries(doses).forEach(([prodId, plan]) => {
              if (plan > 0) {
                const prod = (S.products || []).find(p => p.id === prodId);
                cd.doses[prodId] = calcDose(plan, waterMl, prod?.unit);
              }
            });
          }
          // Environment: only set if still empty
          const e = S.entries[iter];
          if (!e.temp || String(e.temp).trim() === '') e.temp = '23.5';
          if (!e.humidity || String(e.humidity).trim() === '') e.humidity = '60';
          // Mark auto-filled so user knows
          if (!cd.notes) cd.notes = '🤖 Auto-eingetragen';
          filled++;
        }
      }
    }
    iter = isoPlus(iter, 1);
  }
  saveS();
  vibrate(20);
  toast(`✓ ${filled} Tage eingetragen`);
  renderSet();
}

/** Purge all orphaned entries — entries with no active cycle data */
async function purgeOrphans() {
  const activeCycleIds = new Set(S.cycles.map(c => c.id));
  let count = 0;

  Object.keys(S.entries).forEach(d => {
    const e = S.entries[d];
    if (!e) { delete S.entries[d]; count++; return; }

    // Remove cycleData for non-existent cycles
    if (e.cycleData) {
      Object.keys(e.cycleData).forEach(cId => {
        if (!activeCycleIds.has(cId)) {
          delete e.cycleData[cId];
        }
      });
    }

    // Check if entry has real (non-empty) cycle data
    const hasCycleData = e.cycleData && Object.keys(e.cycleData).some(cId => {
      const cd = e.cycleData[cId];
      if (!cd) return false;
      return Object.entries(cd).some(([, v]) => {
        if (v === '' || v === null || v === undefined || v === 0) return false;
        if (Array.isArray(v)) return v.length > 0;
        if (typeof v === 'object') return Object.keys(v).length > 0;
        return true;
      });
    });

    // Check env data: only count as real if truthy AND not empty string
    const hasEnv = (e.temp && String(e.temp).trim() !== '') || (e.humidity && String(e.humidity).trim() !== '');

    if (!hasCycleData && !hasEnv) {
      delete S.entries[d];
      count++;
    }
  });

  saveS();
  renderSet();
  toast(count > 0 ? `🧹 ${count} Einträge bereinigt` : '✓ Keine verwaisten Einträge');
}
