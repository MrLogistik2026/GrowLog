<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrowSmart"/>
<link rel="manifest" href="manifest.json"/>
<title>GrowSmart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ===================== CSS VARIABLES ===================== */
:root {
  --bg: #0a0a0a;
  --surface: #131313;
  --card: #1a1a1a;
  --card2: #1f1f1f;
  --border: #262626;
  --green: #4caf70;
  --green-dk: #1a3a24;
  --green-bg: #0d1e0d;
  --green-hint: #3a6e4a;
  --blue: #5aabf0;
  --blue-bg: #0a1520;
  --teal: #5adada;
  --teal-bg: #0e1a1a;
  --teal-bd: #1e3535;
  --red: #e06060;
  --orange: #e8884a;
  --orange-bg: #1e0e04;
  --purple: #b06ac8;
  --yellow: #f0d050;
  --text: #e8e8e8;
  --text-sub: #aaa;
  --text-muted: #666;
  --text-hint: #505050;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

/* ===================== RESET & BASE ===================== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
#app { width: 100%; height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
/* Allow text selection only in input fields and textareas */
input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }

/* ===================== SCREENS ===================== */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }
.scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px; display: flex; flex-direction: column; gap: 14px;
}
.scroll::-webkit-scrollbar { display: none; }

/* ===================== TOPBAR ===================== */
.topbar {
  background: var(--surface); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border); flex-shrink: 0;
}
.tb-title { font-size: 14px; font-weight: 500; }
.app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.icon-btn { background: none; border: none; color: var(--green); font-size: 22px; cursor: pointer; padding: 4px; }
.save-pill {
  background: var(--green); border: none; border-radius: 20px;
  padding: 6px 16px; font-size: 12px; color: #fff; cursor: pointer;
  font-family: var(--font); font-weight: 600;
}

/* ===================== BOTTOM NAV ===================== */
.bottom-nav {
  background: var(--surface); border-top: 0.5px solid var(--border);
  display: flex; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  padding: 8px 0 6px; min-height: 52px; cursor: pointer; background: none; border: none;
  opacity: 0.4; transition: opacity 0.2s;
}
.nav-btn.active { opacity: 1; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; color: var(--green); font-weight: 600; font-family: var(--font); }

/* ===================== CARDS ===================== */
.card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 14px; }
.sect-head {
  font-size: 11px; color: var(--green); font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 0 2px;
}

/* ===================== STATS ===================== */
.stat-row { display: flex; gap: 8px; }
.stat-box { flex: 1; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 0.5px solid var(--border); }
.stat-lbl { font-size: 10px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.stat-val { font-size: 18px; font-weight: 600; }
.stat-unit { font-size: 11px; color: var(--text-hint); }

/* ===================== INPUTS ===================== */
.inp-wrap { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.inp-label { font-size: 11px; color: var(--text-hint); font-weight: 500; }
.inp-field {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 7px;
  padding: 9px 11px; color: var(--text-sub); font-size: 13px; font-family: var(--font);
  width: 100%; outline: none; transition: border-color 0.2s;
}
.inp-field:focus { border-color: var(--green-hint); }
.row2 { display: flex; gap: 8px; }

/* ===================== VPD ===================== */
.vpd-box {
  background: var(--teal-bg); border: 0.5px solid var(--teal-bd); border-radius: 10px;
  padding: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.vpd-val { font-size: 22px; font-weight: 600; color: var(--teal); font-family: var(--mono); }
.vpd-pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; margin-top: 3px; }
.vpd-scale { display: flex; height: 5px; border-radius: 3px; overflow: hidden; }
.vpd-seg { flex: 1; }
.vpd-mrow { position: relative; height: 8px; }
.vpd-marker {
  position: absolute; top: 0; width: 2px; height: 9px;
  background: #fff; border-radius: 2px; transition: left 0.3s;
}

/* ===================== CALENDAR ===================== */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-cell {
  aspect-ratio: 0.78; border-radius: 9px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; position: relative;
  border: 0.5px solid transparent; background: #151515; user-select: none;
  padding: 2px; transition: transform 0.1s;
}
.cal-cell:active { transform: scale(0.92); }
.cal-cell.today { border: 2px solid #fff !important; }
.cal-num { font-size: 14px; color: var(--text-sub); font-weight: 700; line-height: 1; }
.cal-cell.today .cal-num { color: #fff; }
.cal-tag { font-size: 7.5px; color: rgba(255,255,255,0.6); line-height: 1; margin-top: 1px; text-align: center; }
.cal-icon { font-size: 13px; line-height: 1; margin-bottom: 1px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 2px; right: 3px; background: rgba(255,255,255,0.7); }

/* ===================== NUTRIENT TABLE ===================== */
.nut-tbl-hdr {
  border-radius: 10px 10px 0 0; padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.nut-tbl-wrap {
  border: 0.5px solid var(--border); border-top: none;
  border-radius: 0 0 10px 10px; overflow: hidden;
}
.nut-tbl-head {
  display: grid; grid-template-columns: 1fr 58px 68px 60px;
  padding: 5px 10px; border-bottom: 0.5px solid var(--border);
}
.nth { font-size: 11px; font-weight: 500; }
.nth:not(:first-child) { text-align: right; }
.nut-row-tbl {
  display: grid; grid-template-columns: 1fr 58px 68px 60px;
  padding: 5px 10px; border-bottom: 0.5px solid #1e1e1e; align-items: center;
}
.nut-row-tbl:last-child { border: none; }
.nut-row-tbl:nth-child(odd) { background: #171717; }
.nut-row-tbl:nth-child(even) { background: var(--surface); }
.nt-name { font-size: 12px; color: #bbb; }
.nt-hint { font-size: 12px; text-align: right; font-family: var(--mono); }
.nt-calc { font-size: 11px; text-align: right; font-family: var(--mono); color: var(--green); }
.nt-inp {
  background: #1e1e1e; border: 0.5px solid var(--border); border-radius: 5px;
  padding: 3px 6px; color: #ddd; font-size: 12px; font-family: var(--mono);
  width: 56px; text-align: right; outline: none;
}
.nt-inp:focus { border-color: var(--green-hint); }

/* ===================== NOTES ===================== */
.note-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 10px; }
.note-ta {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 7px;
  padding: 8px 10px; color: #aaa; font-size: 12px; font-family: var(--font);
  width: 100%; min-height: 65px; resize: none; outline: none; line-height: 1.6;
}
.note-ta:focus { border-color: var(--green-hint); }

/* ===================== BUTTONS ===================== */
.big-save {
  border: none; border-radius: 10px; padding: 14px; font-size: 14px;
  font-weight: 600; color: #fff; width: 100%; cursor: pointer; font-family: var(--font);
}
.big-save:active { opacity: 0.8; }
.sav-btn {
  border: none; border-radius: 10px; padding: 12px; font-size: 13px;
  font-weight: 600; color: #fff; width: 100%; cursor: pointer; font-family: var(--font); margin-top: 6px;
}
.sav-btn:active { opacity: 0.8; }
.add-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-bg); border: 0.5px solid var(--green-dk); border-radius: 8px;
  padding: 6px 12px; font-size: 12px; color: var(--green); cursor: pointer;
  font-family: var(--font); font-weight: 600;
}
.del-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 0; cursor: pointer;
  background: none; border: none; font-size: 13px; color: var(--red); font-family: var(--font);
}

/* ===================== ALERTS ===================== */
.alert { border-radius: 12px; padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; border: 0.5px solid transparent; }

/* ===================== TABS ===================== */
.tab-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tab-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border-radius: 8px; padding: 9px 14px;
  border: 0.5px solid var(--border); cursor: pointer; font-size: 12px;
  color: var(--text-muted); font-family: var(--font); min-height: 40px;
}
.tab-item.sel { border-color: var(--green); background: var(--green-bg); color: var(--green); }

/* ===================== DURATION GRID ===================== */
.dur-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.dur-box { display: flex; flex-direction: column; gap: 3px; width: calc(33% - 6px); }
.dur-lbl { font-size: 11px; color: var(--text-hint); }
.dur-inp {
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 7px;
  padding: 6px; color: var(--text-sub); font-size: 13px; text-align: center;
  width: 100%; outline: none; font-family: var(--mono);
}
.sub-head { font-size: 11px; color: var(--text-hint); font-weight: 500; margin-top: 8px; margin-bottom: 4px; }

/* ===================== SWITCHES ===================== */
.sw-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
.sw { position: relative; width: 44px; height: 26px; cursor: pointer; }
.sw input { opacity: 0; width: 0; height: 0; }
.sl {
  position: absolute; inset: 0; background: #333; border-radius: 26px; transition: 0.2s;
}
.sl:before {
  content: ''; position: absolute; width: 20px; height: 20px;
  left: 3px; top: 3px; background: #888; border-radius: 50%; transition: 0.2s;
}
input:checked + .sl { background: var(--green-dk); }
input:checked + .sl:before { transform: translateX(18px); background: var(--green); }

/* ===================== SECTION TOGGLE ===================== */
.sec-tog {
  background: var(--card); border-radius: 12px; border: 0.5px solid var(--border);
  padding: 13px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; font-size: 13px; color: var(--text);
}
.sec-tog:active { background: var(--card2); }
.sec-tog > div { flex: 1; }

/* ===================== COLOR / SYMBOL PICKERS ===================== */
.pick-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0; }
.col-opt {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: transform 0.15s;
}
.col-opt.sel { border-color: #fff; transform: scale(1.2); }
.sym-opt {
  width: 36px; height: 36px; border-radius: 10px; background: var(--card2);
  border: 2px solid transparent; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 18px; transition: transform 0.15s;
}
.sym-opt.sel { border-color: #fff; transform: scale(1.15); }

/* ===================== STEPPER BUTTONS ===================== */
.stepper-btn {
  width: 40px; height: 40px; border-radius: 7px;
  background: var(--card2); border: 0.5px solid var(--border);
  color: var(--text-sub); font-size: 16px; cursor: pointer;
  font-family: var(--mono); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.stepper-btn:active { background: var(--surface); transform: scale(0.95); }

/* ===================== PRODUCT CARDS ===================== */
.prod-card {
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px;
}
.prod-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

/* ===================== TOAST ===================== */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(26,26,26,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: #ddd; padding: 10px 22px; border-radius: 22px; font-size: 13px;
  z-index: 9999; border: 0.5px solid #444; pointer-events: none;
  opacity: 0; transition: all 0.25s; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================== CONTEXT MENU ===================== */
#ctx-m {
  position: fixed; z-index: 9998;
  background: rgba(28,28,28,0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 0.5px solid #3a3a3a; border-radius: 16px; padding: 6px;
  min-width: 270px; box-shadow: 0 12px 48px rgba(0,0,0,0.7);
  display: none; animation: ctxIn 0.18s ease;
}
#ctx-m.show { display: block; }
@keyframes ctxIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
.ctx-item {
  padding: 12px 16px; border-radius: 10px; font-size: 13px; color: var(--text-sub);
  cursor: pointer; display: flex; align-items: center; gap: 10px;
}
.ctx-item:active { background: rgba(255,255,255,0.06); }
.ctx-g { color: var(--green); } .ctx-r { color: var(--red); } .ctx-b { color: var(--blue); }
.ctx-div { height: 0.5px; background: #333; margin: 4px 0; }
.ctx-ic { font-size: 15px; width: 22px; text-align: center; }
#ctx-ov { position: fixed; inset: 0; z-index: 9997; display: none; }
#ctx-ov.show { display: block; }

/* ===================== CUSTOM CONFIRM MODAL ===================== */
#modal-overlay {
  position: fixed; inset: 0; z-index: 10001;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
#modal-overlay.show { display: flex; }
#modal-box {
  background: var(--card); border: 0.5px solid var(--border); border-radius: 18px;
  padding: 24px; max-width: 340px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
#modal-title {
  font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px;
}
#modal-msg {
  font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px;
}
.modal-btns { display: flex; gap: 10px; }
.modal-btns button {
  flex: 1; padding: 12px; border-radius: 10px; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: var(--font); border: none;
}
#modal-cancel {
  background: var(--card2); color: var(--text-sub); border: 0.5px solid var(--border);
}
#modal-ok { background: var(--red); color: #fff; }

/* ===================== MISC ===================== */
.spin {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--green-bg); border-top-color: var(--green);
  border-radius: 50%; animation: sp 0.7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }
.empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 30px 20px; text-align: center; }
.tip-card {
  background: var(--green-bg); border: 0.5px solid var(--green-dk); border-radius: 12px;
  padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start;
}
.streak {
  display: inline-flex; align-items: center; gap: 3px;
  background: linear-gradient(135deg, #2a1500, #1a0a00);
  border: 0.5px solid rgba(232,136,74,0.35); border-radius: 16px;
  padding: 3px 8px; font-size: 10px; color: var(--orange); font-weight: 600;
}
.ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-lbl { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.mini-chart { display: flex; align-items: flex-end; gap: 1px; height: 24px; }
.mini-bar { flex: 1; min-width: 2px; border-radius: 1px 1px 0 0; transition: height 0.3s; }
.photo-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.photo-wrap { position: relative; width: 52px; height: 52px; }
.photo-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; border: 0.5px solid var(--border); cursor: pointer; display: block; }
.photo-del {
  position: absolute; top: -4px; right: -4px; width: 22px; height: 22px;
  border-radius: 50%; background: rgba(224,96,96,0.95); border: 1.5px solid #0a0a0a;
  color: #fff; font-size: 14px; font-weight: 700; line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); padding: 0;
}
.photo-del:active { transform: scale(0.9); }
.photo-add {
  width: 52px; height: 52px; border-radius: 8px; border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  color: var(--text-hint); cursor: pointer;
}
.photo-add:active { border-color: var(--green); }
.qn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.qn-chip {
  background: var(--card2); border: 0.5px solid var(--border); border-radius: 16px;
  padding: 7px 12px; font-size: 11px; color: var(--text-sub); cursor: pointer;
  font-family: var(--font); white-space: nowrap; min-height: 30px;
  display: inline-flex; align-items: center; transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.qn-chip:active { transform: scale(0.95); }
.qn-chip.active {
  background: var(--green-bg) !important;
  border-color: var(--green-dk) !important;
  color: var(--green) !important;
  font-weight: 600;
}
.mix-step {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  font-size: 12px; color: var(--text-sub);
}
.mix-num {
  width: 20px; height: 20px; border-radius: 50%; background: var(--green-dk);
  color: var(--green); font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ===================== WATER INPUT (Dünger-Rechner) ===================== */
.water-input-box {
  background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.water-input-box .inp-field {
  max-width: 100px; font-size: 15px; font-weight: 600; text-align: center;
  font-family: var(--mono);
}
.ph-hint {
  background: var(--green-bg); border: 0.5px solid var(--green-dk);
  border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--green);
  margin-top: 6px; text-align: center;
}

/* ============================================================== */
/* Tour: overlay + popup + highlight                               */
/* ============================================================== */
.tour-overlay {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(0, 0, 0, 0.35);
  pointer-events: none;
  opacity: 0; transition: opacity 0.25s;
}
.tour-overlay.visible { opacity: 1; }
.tour-hole {
  position: fixed; z-index: 9999;
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35),
              0 0 0 2px var(--green),
              0 0 20px rgba(76, 175, 112, 0.4);
  pointer-events: none;
  transition: all 0.3s ease-out;
  animation: tour-pulse 2s infinite ease-in-out;
}
@keyframes tour-pulse {
  0%, 100% { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35),
                          0 0 0 2px var(--green),
                          0 0 15px rgba(76, 175, 112, 0.35); }
  50%      { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35),
                          0 0 0 3px var(--green),
                          0 0 25px rgba(76, 175, 112, 0.55); }
}
.tour-popup {
  position: fixed; z-index: 10000;
  background: var(--card); border: 1px solid var(--green-dk);
  border-radius: 14px; padding: 14px 16px;
  max-width: 300px; width: calc(100vw - 32px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  font-family: var(--font);
  animation: tour-pop-in 0.3s ease-out;
}
@keyframes tour-pop-in {
  from { opacity: 0; transform: scale(0.9) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.tour-popup-arrow {
  position: absolute; width: 12px; height: 12px;
  background: var(--card); border: 1px solid var(--green-dk);
  transform: rotate(45deg);
}

// =====================================================================
//  LOAD / SAVE
// =====================================================================
function loadS() {
  try {
    for (const k of ['growsmart_v4','growsmart_v3','growsmart_v2','growsmart_data']) {
      const s = localStorage.getItem(k);
      if (s) {
        S = Object.assign({
          cycles: [], entries: {}, products: [], weekSchedule: {},
          potSize: 11, presetKey: null, mixOrder: null, mixInfo: null,
        }, JSON.parse(s));
        break;
      }
    }
  } catch (e) {}

  if (!S.products || !S.products.length) S.products = [];
  if (!S.weekSchedule) S.weekSchedule = {};
  if (!S.potSize) S.potSize = 11;
  // Migrate old 'biobizz' preset key to new 'biobizz_master' (Classic was renamed to Master in v0.8.68)
  if (S.presetKey === 'biobizz') S.presetKey = 'biobizz_master';
  // E5: Beginner mode flag. Default: true for fresh installs (S.beginnerMode === undefined)
  // but stays whatever user has set after that.
  if (S.beginnerMode === undefined) S.beginnerMode = (S.cycles.length === 0);

  // Migrate from old offset system → offsetHistory per cycle
  S.cycles.forEach((c, i) => {
    if (!c.colorId)    c.colorId = COLORS[i % COLORS.length].id;
    if (!c.symbol)     c.symbol = SYMS[i % SYMS.length];
    if (c.intAnzucht === undefined) c.intAnzucht = RI.anzucht;
    if (c.intBloom === undefined)   c.intBloom = RI.bloom;
    if (c.intFlush === undefined)   c.intFlush = RI.flush;
    if (c.intIce === undefined)     c.intIce = RI.ice;
    if (c.intErnte === undefined)   c.intErnte = RI.ernte;
    if (c.intDry === undefined)     c.intDry = RI.dry;
    if (c.toppingPause === undefined) c.toppingPause = 3;
    if (!c.skippedDays) c.skippedDays = [];
    if (!c.seedType) c.seedType = 'auto';
    if (!c.lightVeg) c.lightVeg = '18/6';
    if (!c.lightBloom) c.lightBloom = '18/6';
    if (c.archived === undefined) c.archived = false;

    // Migration: old dayOffset/offsetDate → offsetHistory
    if (!c.offsetHistory) {
      c.offsetHistory = [];
      if (c.dayOffset && c.dayOffset !== 0 && c.offsetDate) {
        c.offsetHistory.push({ date: c.offsetDate, offset: c.dayOffset });
      }
    }
    // Clean up legacy fields
    delete c.dayOffset;
    delete c.offsetDate;
    delete c.bakedOffset;
    delete c.bakedOffsetDate;
  });

  // Remove legacy skipDays
  delete S.skipDays;
}

function saveS() {
  try {
    // Consolidate offsetHistory (only when needed)
    S.cycles.forEach(c => {
      if (c.offsetHistory && c.offsetHistory.length > 1) {
        const merged = {};
        for (const e of c.offsetHistory) {
          merged[e.date] = (merged[e.date] || 0) + e.offset;
        }
        c.offsetHistory = Object.entries(merged)
          .filter(([, off]) => off !== 0)
          .map(([date, offset]) => ({ date, offset }))
          .sort((a, b) => a.date.localeCompare(b.date));
      }
    });

    // Orphan cleanup only on debounced saves (not on every keystroke)
    const now = Date.now();
    if (!saveS._lastUndo || now - saveS._lastUndo > 2000) {
      // Clean up orphaned cycleData
      const cycleIds = new Set(S.cycles.map(c => c.id));
      Object.keys(S.entries).forEach(d => {
        const e = S.entries[d];
        if (e?.cycleData) {
          Object.keys(e.cycleData).forEach(cId => {
            if (!cycleIds.has(cId)) delete e.cycleData[cId];
          });
        }
      });
      pushUndo();
      saveS._lastUndo = now;
    }
    localStorage.setItem(SK, JSON.stringify(S));
    _flashSaved();
  } catch (e) {}
}

// Subtle save indicator - shows a small dot briefly
let _saveIndicator = null;
function _flashSaved() {
  if (!_saveIndicator) {
    _saveIndicator = document.createElement('div');
    _saveIndicator.style.cssText = 'position:fixed;top:calc(env(safe-area-inset-top) + 14px);right:14px;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;box-shadow:0 0 8px var(--green)';
    document.body.appendChild(_saveIndicator);
  }
  _saveIndicator.style.opacity = '1';
  clearTimeout(_flashSaved._t);
  _flashSaved._t = setTimeout(() => { _saveIndicator.style.opacity = '0'; }, 600);
}

function vibrate(ms = 15) {
  try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {}
}

// =====================================================================
//  UNDO/REDO SYSTEM – Snapshots of state, max 20 steps
// =====================================================================
const UNDO_MAX = 20;
let undoStack = [];
let redoStack = [];

/** Push current state onto undo stack (call BEFORE making changes) */
function pushUndo() {
  try {
    undoStack.push(JSON.stringify(S));
    if (undoStack.length > UNDO_MAX) undoStack.shift();
    redoStack = []; // neue Aktion löscht Redo-History
  } catch (e) {}
}

/** Rückgängig – Pop last state, push current to redo */
function doUndo() {
  if (undoStack.length === 0) {
    toast('↩ Nichts zum Rückgängig machen');
    return;
  }
  try {
    // Aktuellen Zustand auf Redo-Stack
    redoStack.push(JSON.stringify(S));
    if (redoStack.length > UNDO_MAX) redoStack.shift();

    const prev = JSON.parse(undoStack.pop());
    S = Object.assign({
      cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
    }, prev);
    S.cycles.forEach(c => {
      if (!c.offsetHistory) c.offsetHistory = [];
      if (c.toppingPause === undefined) c.toppingPause = 3;
      if (!c.skippedDays) c.skippedDays = [];
      delete c.dayOffset; delete c.offsetDate;
    });
    try { localStorage.setItem(SK, JSON.stringify(S)); } catch (e2) {}
    vibrate();
    toast(`↩ Rückgängig (${undoStack.length} übrig)`);
    _rerender();
  } catch (e) { toast('Fehler beim Rückgängig'); }
}

/** Wiederherstellen – Pop from redo, push current to undo */
function doRedo() {
  if (redoStack.length === 0) {
    toast('↪ Nichts zum Wiederherstellen');
    return;
  }
  try {
    undoStack.push(JSON.stringify(S));
    if (undoStack.length > UNDO_MAX) undoStack.shift();

    const next = JSON.parse(redoStack.pop());
    S = Object.assign({
      cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
    }, next);
    S.cycles.forEach(c => {
      if (!c.offsetHistory) c.offsetHistory = [];
      if (c.toppingPause === undefined) c.toppingPause = 3;
      if (!c.skippedDays) c.skippedDays = [];
      delete c.dayOffset; delete c.offsetDate;
    });
    try { localStorage.setItem(SK, JSON.stringify(S)); } catch (e2) {}
    vibrate();
    toast(`↪ Wiederhergestellt (${redoStack.length} übrig)`);
    _rerender();
  } catch (e) { toast('Fehler beim Wiederherstellen'); }
}

/** Re-render the currently active screen */
function _rerender() {
  if (document.getElementById('scr-entry').classList.contains('active') && editISO) renderEntry(editISO);
  else if (document.getElementById('scr-cal').classList.contains('active')) renderCal();
  else if (document.getElementById('scr-dash').classList.contains('active')) renderDash();

let _debugDate = null; // Set to '2026-05-15' etc. for testing
function todayISO() { return _debugDate || new Date().toISOString().split('T')[0]; }
function setDebugDate(v) {
  _debugDate = v || null;
  vibrate();
  toast(_debugDate ? `🧪 Datum: ${fmtDE(_debugDate, {day:'2-digit',month:'short',year:'numeric'})}` : '🧪 Echtes Datum');
  renderSet();

  calDate = _debugDate ? iso12(_debugDate) : new Date();
}
function iso12(iso) { return new Date(iso + 'T12:00:00'); }
function isoPlus(iso, d) { const o = iso12(iso); o.setDate(o.getDate() + d); return o.toISOString().split('T')[0]; }
function isoDiff(a, b) { return Math.round((iso12(a) - iso12(b)) / 86400000); }
function fmtDE(iso, o) { return iso12(iso).toLocaleDateString('de-DE', o || { day: '2-digit', month: '2-digit' }); }

// =====================================================================
//  GROW LOGIC
// =====================================================================

/** Returns the current phase for a given date and cycle */
function phase(iso, c) {
  if (!c.startDate) return null;
  const diff = isoDiff(iso, c.startDate);
  if (diff < 0) return null;

  const a  = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const b  = a + (c.bloomDays || PHASE_DEFAULTS.bloomDays);
  const f  = b + (c.flushDays || PHASE_DEFAULTS.flushDays);
  const ic = f + (c.iceDays || PHASE_DEFAULTS.iceDays);
  const h  = ic + (c.harvestDays || PHASE_DEFAULTS.harvestDays);
  const dr = h + (c.dryDays || PHASE_DEFAULTS.dryDays);

  if (diff < a)  return { ph: 'anzucht', day: diff + 1, week: Math.floor(diff / 7) + 1, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < b)  return { ph: 'bloom',   day: diff + 1, week: Math.floor((diff - a) / 7) + 1, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < f)  return { ph: 'flush',   day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < ic) return { ph: 'ice',     day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < h)  return { ph: 'harvest', day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  if (diff < dr) return { ph: 'dry',     day: diff + 1, week: null, total: dr, pct: Math.round(diff / dr * 100) };
  return null;
}

/** Get the watering interval for a cycle+phase */
function getInt(c, ph) {
  if (ph === 'anzucht') return c.intAnzucht || RI.anzucht;
  if (ph === 'flush')   return c.intFlush || RI.flush;
  if (ph === 'ice')     return c.intIce || RI.ice;
  if (ph === 'harvest') return c.intErnte || RI.ernte;
  if (ph === 'dry')     return c.intDry || RI.dry;
  return c.intBloom || RI.bloom;
}

/**
 * SHIFT SYSTEM V5: offsetHistory – Liste von Offset-Einträgen
 *
 * Jede Verschiebung (Shift/Topping) erzeugt einen Eintrag:
 *   { date: '2026-04-17', offset: 1 }
 *
 * Für ein gegebenes Datum wird der kumulative Offset berechnet:
 * Alle Einträge mit entry.date <= iso werden aufsummiert.
 * So hat jede Verschiebung ihre eigene Grenze und die Vergangenheit
 * wird nie verändert.
 */
function getAction(iso, c) {
  if (!c.startDate) return null;

  // EINZELNE TAGE ENTFERNT: stumm geschaltet, Raster bleibt intakt
  if (c.skippedDays && c.skippedDays.includes(iso)) {
    return null;
  }

  // TOPPING-PAUSE: 3 Tage nach dem Topping kein Gießen
  if (c.toppingDate) {
    const daysSinceTop = isoDiff(iso, c.toppingDate);
    if (daysSinceTop >= 1 && daysSinceTop <= (c.toppingPause || 3)) {
      return null;
    }
  }

  // Kumulativen Offset für dieses Datum berechnen
  let totalOffset = 0;
  for (const entry of c.offsetHistory || []) {
    if (iso >= entry.date) totalOffset += entry.offset;
  }

  const virtualStart = isoPlus(c.startDate, totalOffset);
  const diff = isoDiff(iso, virtualStart);

  if (diff < 0) return null;

  // Phasengrenzen
  const a  = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const b  = a + (c.bloomDays || PHASE_DEFAULTS.bloomDays);
  const f  = b + (c.flushDays || PHASE_DEFAULTS.flushDays);
  const ic = f + (c.iceDays || PHASE_DEFAULTS.iceDays);
  const h  = ic + (c.harvestDays || PHASE_DEFAULTS.harvestDays);
  const dr = h + (c.dryDays || PHASE_DEFAULTS.dryDays);

  let ph;
  if (diff < a)       ph = 'anzucht';
  else if (diff < b)  ph = 'bloom';
  else if (diff < f)  ph = 'flush';
  else if (diff < ic) ph = 'ice';
  else if (diff < h)  ph = 'harvest';
  else if (diff < dr) ph = 'dry';
  else return null;

  let phStart = 0;
  if (ph === 'bloom')   phStart = a;
  if (ph === 'flush')   phStart = b;
  if (ph === 'ice')     phStart = f;
  if (ph === 'harvest') phStart = ic;
  if (ph === 'dry')     phStart = h;

  const dayInPhase = diff - phStart;
  const iv = getInt(c, ph);

  if (dayInPhase % iv === 0) {
    if (ph === 'anzucht') return 'giess_anz';
    if (ph === 'bloom')   return 'giess';
    if (ph === 'flush')   return 'spuelen';
    if (ph === 'ice')     return 'ice';
    if (ph === 'harvest') return 'ernte';
    if (ph === 'dry')     return 'trocknen';
  }
  return null;
}

function isGiessTag(iso, c) {
  return ['giess','giess_anz','spuelen','ice'].includes(getAction(iso, c) || '');
}

/**
 * Get planned doses for a given week, with optional mode-aware scaling.
 *
 * When the active preset has doseMode='weekly-split' (Biobizz Official,
 * where the schedule values represent TOTAL weekly doses), the returned
 * doses are divided by the expected watering frequency so the user can
 * fertilize on every watering day without overdosing.
 *
 * For doseMode='per-watering' (Classic, Light — where the schedule values
 * ARE per-watering doses) the values pass through unchanged.
 *
 * @param {string} cId - Cycle id
 * @param {number} w   - Week number (1-12)
 * @param {Object} [c] - Optional cycle object, required for weekly-split to
 *                      look up watering interval. If omitted, falls back to
 *                      per-watering mode (raw schedule values).
 */
function getWeekDoses(cId, w, c) {
  const raw = S.weekSchedule[cId + '_w' + w] || S.weekSchedule['global_w' + w] || {};
  const preset = S.presetKey ? FERT_PRESETS[S.presetKey] : null;
  const mode = preset?.doseMode || 'per-watering';
  if (mode !== 'weekly-split' || !c) return raw;
  // Pick phase-appropriate watering interval: anzucht weeks 1-2, bloom weeks 3+
  const iv = (w <= 2) ? (c.intAnzucht || RI.anzucht) : (c.intBloom || RI.bloom);
  const wateringsPerWeek = 7 / iv;
  if (wateringsPerWeek <= 0) return raw;
  const out = {};
  Object.entries(raw).forEach(([pid, val]) => {
    // Round to 2 decimals to keep display clean (0.8/2.33 = 0.343 → 0.34)
    out[pid] = Math.round((val / wateringsPerWeek) * 100) / 100;
  });
  return out;
}

function nextGiessTag(c, from) {
  if (!c.active || !c.startDate) return null;
  for (let i = 1; i <= 60; i++) {
    const iso = isoPlus(from, i);
    if (isGiessTag(iso, c)) return { iso, days: i };
  }
  return null;
}

function daysToHarvest(c) {
  if (!c.startDate) return null;
  const hd = (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays) + (c.bloomDays || PHASE_DEFAULTS.bloomDays) + (c.flushDays || PHASE_DEFAULTS.flushDays) + (c.iceDays || PHASE_DEFAULTS.iceDays);
  const harvestISO = isoPlus(c.startDate, hd);
  const diff = isoDiff(harvestISO, todayISO());
  return diff > 0 ? diff : 0;
}

function active() { return S.cycles.filter(c => c.active && c.startDate && !c.archived); }
// "archived()" in the visual sense: any cycle that has a startDate but isn't currently
// an active grow — includes both user-archived cycles and user-deactivated (stopped) ones.
// These render faded in the calendar so historical data stays visible.
function archived() { return S.cycles.filter(c => !c.active && c.startDate); }

function calcStreak(c) {
  const today = todayISO();
  let s = 0;
  for (let i = 0; i < 90; i++) {
    const iso = isoPlus(today, -i);
    if (isGiessTag(iso, c)) {
      if (S.entries[iso]?.cycleData?.[c.id]?.water) s++;
      else break;
    }
  }
  return s;
}

function waterStats(c) {
  const today = todayISO();
  const v = [];
  for (let i = 13; i >= 0; i--) {
    v.push(parseFloat(S.entries[isoPlus(today, -i)]?.cycleData?.[c.id]?.water) || 0);
  }
  return v;
}

/**
 * Dynamische Gießmengen-Empfehlung basierend auf Grow-Phase & Tag.
 *
 * Volumen-Matrix (für 11L Topf):
 * Phase 1 - Sämling (Tag 1-10):    50 → 250 ml (Ring um Sämling)
 * Phase 2 - Etablierung (Tag 11-17): 500 → 1500 ml (Radius vergrößern)
 * Phase 3 - Topping-Zone (Tag 18-24): 2000 → 2500 ml (ganzer Topf, kein Drain)
 * Phase 4 - Blüte-Stretch (Tag 25+): 3000 → 3500 ml (Vollsättigung, 10-15% Drain)
 * Spülen/IceFlush: 3500 → 4000 ml (extra Durchspülung)
 *
 * Skaliert proportional zur Topfgröße (Basis: 11L).
 */
function waterSuggestion(c, p) {
  const pot = S.potSize || 11;
  const scale = pot / 11; // Skalierungsfaktor relativ zu 11L

  if (!p) return Math.round(3000 * scale / 50) * 50;

  // Spülen & IceFlush: extra viel (Durchspülung)
  if (p.ph === 'flush' || p.ph === 'ice') {
    return Math.round(3750 * scale / 50) * 50;
  }

  // Gesamttag im Zyklus (1-basiert)
  const day = p.day || 1;

  // Phase 1: Sämling (Tag 1-10)
  if (day <= 10) {
    const ml = 50 + (day - 1) * (200 / 9); // 50 → 250
    return Math.round(ml * scale / 50) * 50;
  }
  // Phase 2: Etablierung (Tag 11-17/18)
  if (day <= 18) {
    const ml = 500 + (day - 11) * (1000 / 7); // 500 → 1500
    return Math.round(ml * scale / 50) * 50;
  }
  // Phase 3: Topping-Zone / Prä-Blüte (Tag 18-24)
  if (day <= 24) {
    const ml = 2000 + (day - 18) * (500 / 6); // 2000 → 2500
    return Math.round(ml * scale / 50) * 50;
  }
  // Phase 4: Blüte-Stretch & Volle Blüte (Tag 25+)
  // Rampt von 3000 auf 3500 über die ersten 10 Tage, dann konstant
  const bloomDay = day - 24;
  if (bloomDay <= 10) {
    const ml = 3000 + bloomDay * (500 / 10); // 3000 → 3500
    return Math.round(ml * scale / 50) * 50;
  }
  return Math.round(3500 * scale / 50) * 50;
}

function getAlerts(c) {
  const today = todayISO();
  const p = phase(today, c);
  if (!p || !c.active) return [];
  const out = [];

  // Overdue check
  const waterDates = Object.keys(S.entries)
    .filter(d => d <= today && S.entries[d]?.cycleData?.[c.id]?.water)
    .sort();
  const lastW = waterDates[waterDates.length - 1];
  if (lastW) {
    const days = isoDiff(today, lastW);
    const iv = getInt(c, p.ph);
    if (days > iv + 1) {
      out.push({ icon: '⚠️', text: `Gießen überfällig! Letztes: vor ${days}d (Intervall: ${iv}d)`, type: 'warn' });
    }
  }

  // Irregular interval warning (check last 5 waterings)
  if (waterDates.length >= 3) {
    const recent = waterDates.slice(-5);
    const gaps = [];
    for (let i = 1; i < recent.length; i++) gaps.push(isoDiff(recent[i], recent[i-1]));
    const avg = gaps.reduce((a, b) => a + b, 0) / gaps.length;
    const variance = gaps.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / gaps.length;
    if (variance > 2) {
      out.push({ icon: '📊', text: `Gießrhythmus schwankt (${gaps.join(', ')}d). Gleichmäßiger = besser!`, type: 'tip' });
    }
  }

  // Phase-specific alerts
  if (p.ph === 'bloom') {
    const rem = (c.bloomDays || PHASE_DEFAULTS.bloomDays) - (p.day - (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays));
    if (rem > 0 && rem <= 7) out.push({ icon: '🚿', text: `Spülung in ${rem} Tagen`, type: 'info' });
    if (p.week >= 7) out.push({ icon: '🔬', text: `Woche ${p.week} – Trichome checken!`, type: 'tip', action: 'trichome', cId: c.id });
  }
  if (p.ph === 'ice' || p.ph === 'harvest') {
    out.push({ icon: '✂️', text: 'Ernte naht!', type: 'success' });
  }

  // EC warning from last entry
  if (lastW) {
    const lastEC = parseFloat(S.entries[lastW]?.cycleData?.[c.id]?.ec);
    if (lastEC > 2.5) out.push({ icon: '🧪', text: `Letzter EC: ${lastEC} — Zwischenguss mit reinem Wasser erwägen`, type: 'warn' });
  }

  // Smart: Topping reminder (Anzucht Wo2-3, not yet topped)
  if (p.ph === 'anzucht' && p.week >= 2 && p.week <= 3 && !c.toppingDate) {
    out.push({ icon: '✂️', text: 'Topping-Fenster offen! 4.–5. Nodium = idealer Zeitpunkt.', type: 'tip' });
  }

  // Smart: Light schedule (dynamic based on seedType)
  if (c.seedType !== 'auto') {
    // Feminisiert/Regulär: remind to switch light when bloom starts
    if (p.ph === 'bloom' && p.week === 1 && c.lightVeg !== c.lightBloom) {
      out.push({ icon: '💡', text: `Licht von ${c.lightVeg || '18/6'} auf ${c.lightBloom || '18/6'} umstellen!`, type: 'warn' });
    }
  }

  // Smart: pH trend warning (last 5 entries)
  if (waterDates.length >= 3) {
    const recentPH = waterDates.slice(-5).map(d => parseFloat(S.entries[d]?.cycleData?.[c.id]?.ph)).filter(v => v > 0);
    if (recentPH.length >= 3) {
      const avgPH = recentPH.reduce((a, b) => a + b, 0) / recentPH.length;
      if (avgPH < 6.0) out.push({ icon: '📉', text: `pH-Trend zu niedrig (Ø ${avgPH.toFixed(1)}) — pH höher korrigieren!`, type: 'warn' });
      if (avgPH > 6.8) out.push({ icon: '📈', text: `pH-Trend zu hoch (Ø ${avgPH.toFixed(1)}) — mehr pH-Down nutzen!`, type: 'warn' });
    }
  }

  // Smart: Estimated harvest date
  if (p.ph === 'bloom' || p.ph === 'anzucht') {
    const totalGrowDays = (c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays) + (c.bloomDays || PHASE_DEFAULTS.bloomDays) + (c.flushDays || PHASE_DEFAULTS.flushDays) + (c.iceDays || PHASE_DEFAULTS.iceDays);
    const harvestISO = isoPlus(c.startDate, totalGrowDays);
    const daysLeft = isoDiff(harvestISO, today);
    if (daysLeft > 0 && daysLeft <= 14) {
      out.push({ icon: '📅', text: `Ernte ca. ${fmtDE(harvestISO, {day:'2-digit',month:'short'})} (in ${daysLeft}d)`, type: 'success' });
    }
  }

  return out;
}

function calcVPD(t, rh) {
  if (isNaN(t) || isNaN(rh)) return null;
  return Math.round(0.6108 * Math.exp(17.27 * t / (t + 237.3)) * (1 - rh / 100) * 100) / 100;
}

function vpdZone(v) {
  if (v === null) return null;
  if (v < 0.4) return { label: 'Zu feucht', color: '#7a7af0', bg: '#1e1e3a', hint: 'Lüfter an!', pct: v / 0.4 * 15 };
  if (v < 0.8) return { label: 'Anzucht ✓', color: '#5aabf0', bg: '#0d1e2e', hint: 'Ideal für Sämlinge.', pct: 15 + (v - 0.4) / 0.4 * 35 };
  if (v < 1.2) return { label: 'Blüte ✓', color: '#4caf70', bg: '#0d1e0d', hint: 'Optimal für Blüte!', pct: 50 + (v - 0.8) / 0.4 * 25 };
  if (v < 1.6) return { label: 'Etwas hoch', color: '#c8a04a', bg: '#2a1e0d', hint: 'RLF erhöhen.', pct: 75 + (v - 1.2) / 0.4 * 15 };
  return { label: 'Stress!', color: '#e06060', bg: '#2a0d0d', hint: 'Sofort RLF anpassen!', pct: Math.min(97, 90 + (v - 1.6) * 10) };
}

/**
 * Plausibility warnings for the entry screen. Returns an array of
 * {type: 'warn'|'info'|'err', text} sorted most-critical-first.
 * Helps beginners catch typos or unreasonable values before they hurt the plant.
 *
 * @param {Object} cd - per-cycle data (water, ph, ec, ...)
 * @param {Object} p  - phase info from phase()
 * @param {Object} e  - entry (for temp, humidity)
 * @param {Object} c  - cycle (for waterSuggestion comparison)
 */
function getEntryWarnings(cd, p, e, c) {
  const out = [];
  const waterVal = parseFloat(cd?.water);
  const phVal = parseFloat(cd?.ph);
  const ecVal = parseFloat(cd?.ec);
  const tempVal = parseFloat(e?.temp);
  const rhVal = parseFloat(e?.humidity);

  // Water: too much compared to suggestion (only during growth phases)
  if (p && waterVal > 0 && ['anzucht','bloom'].includes(p.ph)) {
    const sug = waterSuggestion(c, p);
    if (waterVal > sug * 2.5) {
      out.push({ type: 'err', text: `⚠️ Sehr viel Wasser für Tag ${p.day}! Empfehlung: ~${sug} ml. Zu viel Wasser = Wurzelfäule.` });
    } else if (waterVal > sug * 1.8) {
      out.push({ type: 'warn', text: `💧 Viel Wasser (Empfehlung: ~${sug} ml). Sicher? Erde darf dazwischen antrocknen.` });
    }
  }

  // pH: dangerous zones
  if (phVal > 0) {
    if (phVal < 5.5) out.push({ type: 'err', text: `⚠️ pH ${phVal.toFixed(1)} zu niedrig! Nährstoff-Lockout droht. Ziel: 6.2–6.5.` });
    else if (phVal < 5.8) out.push({ type: 'warn', text: `⚠ pH ${phVal.toFixed(1)} eher niedrig. Ziel: 6.2–6.5 (Erde).` });
    else if (phVal > 7.2) out.push({ type: 'err', text: `⚠️ pH ${phVal.toFixed(1)} zu hoch! Eisen/Mangan unerreichbar. Ziel: 6.2–6.5.` });
    else if (phVal > 6.8) out.push({ type: 'warn', text: `⚠ pH ${phVal.toFixed(1)} eher hoch. pH-Down nutzen.` });
  }

  // EC checks (preserves existing logic but goes through central system)
  if (ecVal > 2.5) {
    out.push({ type: 'err', text: '⚠️ EC über 2.5! Überdüngung möglich. Nächstes Mal weniger düngen, ggf. Zwischenguss mit reinem Wasser.' });
  } else if (ecVal > 0 && ecVal < 0.8 && p && p.ph === 'bloom') {
    out.push({ type: 'info', text: 'ℹ️ EC unter 0.8 — Pflanze kann mehr vertragen. Dosis leicht erhöhen.' });
  }

  // Temperature (environment)
  if (!isNaN(tempVal) && tempVal > 0) {
    if (tempVal > 32) out.push({ type: 'err', text: `🌡️ ${tempVal}°C zu heiß! Hitzestress. Lüftung erhöhen.` });
    else if (tempVal > 29) out.push({ type: 'warn', text: `🌡️ ${tempVal}°C hoch. Ideal: 22–28°C.` });
    else if (tempVal < 15) out.push({ type: 'warn', text: `🌡️ ${tempVal}°C zu kalt — Wachstum stoppt. Heizen!` });
  }

  // Humidity
  if (!isNaN(rhVal) && rhVal > 0) {
    if (rhVal > 80) out.push({ type: 'warn', text: `💨 ${rhVal}% RLF sehr hoch — Schimmelrisiko!` });
    else if (rhVal < 30 && p && p.ph !== 'dry') out.push({ type: 'warn', text: `💨 ${rhVal}% RLF sehr niedrig — Pflanze schließt Stomata.` });
  }

  // Sort: err > warn > info.
  // Use ?? (nullish coalescing) not ||, because 0 || 9 === 9 would misplace err-type.
  const order = { err: 0, warn: 1, info: 2 };
  out.sort((a, b) => (order[a.type] ?? 9) - (order[b.type] ?? 9));
  return out;
}

const TABS = ['dash','cal','tips','set'];
const TICO = { dash: '🌱', cal: '📅', tips: '💡', set: '⚙' };
const TLBL = { dash: 'Home', cal: 'Kalender', tips: 'Tipps', set: 'Einst.' };

function buildNav(t, onClickFn) {
  const handler = onClickFn || `goTo('__X__')`;
  return TABS.map(x =>
    `<button class="nav-btn ${x === t ? 'active' : ''}" data-tab="${x}" onclick="${handler.replace('__X__', x)}">
      <span class="nav-icon">${TICO[x]}</span>
      <span class="nav-label">${TLBL[x]}</span>
    </button>`
  ).join('');
}

function goTo(t) {
  // Stop PPFD sensor if leaving tips tab
  if (tab === 'tips' && t !== 'tips' && typeof stopPPFD === 'function' && _ppfdSensor) {
    stopPPFD();
  }
  // When entering settings fresh, scroll to top
  if (t === 'set' && tab !== 'set') _setScrollY = 0;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const scr = document.getElementById('scr-' + t);
  scr.classList.add('active');
  tab = t;
  const n = document.getElementById('nav-' + t);
  if (n) n.innerHTML = buildNav(t);
  if (t === 'dash') renderDash();
  else if (t === 'cal') renderCal();
  else if (t === 'tips') renderTips();
  else if (t === 'set') renderSet();
  // Always scroll to top when switching tabs
  const scrollEl = scr.querySelector('.scroll');
  if (scrollEl) scrollEl.scrollTop = 0;
}

window.addEventListener('popstate', () => {
  if (document.getElementById('scr-entry').classList.contains('active')) {
    goTo(entryFrom); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-duenger').classList.contains('active')) {
    goTo('set'); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-lexikon').classList.contains('active')) {
    goTo('tips'); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-howto').classList.contains('active')) {
    goTo('tips'); history.pushState(null, '', location.href); return;
  }
  if (document.getElementById('scr-gallery').classList.contains('active')) {
    goTo('dash'); history.pushState(null, '', location.href); return;
  }
  const now = Date.now();
  if (now - lastBack < 2000) return;
  lastBack = now;
  history.pushState(null, '', location.href);
  toast('Nochmal drücken zum Beenden');
});

function ring(pct, color, sz = 56) {
  const r = 22, circ = 2 * Math.PI * r, off = circ - (pct / 100) * circ;
  return `<div class="ring-wrap" style="width:${sz}px;height:${sz}px">
    <svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="var(--border)" stroke-width="4" fill="none"/>
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="${color}" stroke-width="4" fill="none"
        stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"
        style="transition:stroke-dashoffset 0.6s"/>
    </svg>
    <div class="ring-lbl">${Math.round(pct)}%</div>
  </div>`;
}

/**
 * Returns a concrete "what to do today" instruction card for a cycle.
 * Used on the dashboard to show beginners exactly what action to take today,
 * with water amount, pH target, fertilizer status, and a short rationale.
 * Returns null if nothing actionable today.
 */
function getTodayAction(c, p, a, iso) {
  if (!p) return null;
  const cl = col(c);
  const pot = S.potSize || 11;
  const waterMl = waterSuggestion(c, p);
  const iv = getInt(c, p.ph);

  // Determine fertilizer week same as entry screen
  let fertWk = 1;
  if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
  else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
  else {
    const td = c.startDate ? isoDiff(iso, c.startDate) : 0;
    fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10));
  }
  const doses = getWeekDoses(c.id, fertWk, c);
  const activeDoses = Object.entries(doses).filter(([, v]) => v > 0);

  if (a === 'giess_anz') {
    return {
      title: '🌱 Heute: Anzucht gießen',
      icon: '💧',
      color: cl.hex,
      steps: [
        `Ca. <b>${waterMl} ml</b> lauwarmes Wasser (pH 6.4)`,
        p.day <= 5 ? 'Ring um den Sämling, nicht direkt drauf' : 'Radius allmählich vergrößern',
        activeDoses.length > 0 ? `Dünger (${fertWk >= 2 ? '½ Dosis' : 'noch keiner nötig'}): ${activeDoses.length} Produkte` : 'Noch kein Dünger',
      ],
      hint: 'Erde leicht feucht, nicht nass. Obere 1-2cm dürfen antrocknen.',
    };
  }
  if (a === 'giess') {
    return {
      title: '💧 Heute: Gießtag',
      icon: '💧',
      color: cl.hex,
      steps: [
        `Ca. <b>${waterMl} ml</b> Wasser bis ~10% Drain`,
        `pH auf <b>6.4</b> einstellen · EC im Ziel 0.8–2.0`,
        activeDoses.length > 0
          ? `Nährstoffe Wo. ${fertWk}: ${activeDoses.length} Produkte (siehe Eintrag)`
          : 'Kein Plan für diese Woche',
      ],
      hint: p.day >= 25 ? '5–10% Drain erzeugen, Drain sofort entsorgen' : 'Noch kein Drain nötig (Topf nicht vollgesättigt)',
    };
  }
  if (a === 'spuelen') {
    return {
      title: '🚿 Heute: Spültag',
      icon: '🚿',
      color: cl.hex,
      steps: [
        `Ca. <b>${waterMl} ml</b> reines Wasser · pH 6.4`,
        '<b>KEIN Dünger</b> — nur klares Wasser!',
        'Bis viel Drain unten durchläuft (durchspülen)',
      ],
      hint: 'Pflanze baut Nährstoffreste ab → sauberer Geschmack',
    };
  }
  if (a === 'ice') {
    return {
      title: '🧊 Heute: IceFlush',
      icon: '🧊',
      color: cl.hex,
      steps: [
        `Eiskaltes Wasser (<10°C), ca. <b>${waterMl} ml</b>`,
        'Kältestress fördert Trichom-Produktion',
        'Nur in den letzten Tagen vor Ernte',
      ],
      hint: 'Eiswürfel direkt auf die Erde legen geht auch',
    };
  }
  if (a === 'ernte') {
    return {
      title: '✂️ Heute: Ernte!',
      icon: '✂️',
      color: cl.hex,
      steps: [
        'Trichome final checken (70% milchig + 10%+ bernstein)',
        'Früh am Morgen ernten (maximaler Terpengehalt)',
        'Dunkel hängen lassen: 18–21°C, 55–65% RLF',
      ],
      hint: '7–14 Tage Trocknung, dann Curing in Gläsern',
    };
  }
  if (a === 'trocknen') {
    return {
      title: '🍂 Trocknung läuft',
      icon: '🍂',
      color: cl.hex,
      steps: [
        'Täglich prüfen: Geruch, Feuchtigkeit',
        'Stiele sollten bald knacken beim Biegen',
        '18–21°C, 55–65% RLF halten',
      ],
      hint: 'Zu schnell trocken = Heu-Geschmack. Geduld!',
    };
  }
  return null;
}

function renderDash() {
  const act = active(), today = todayISO();
  const fmt = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long' });
  const allAlerts = act.flatMap(c => getAlerts(c));

  const alertHTML = allAlerts.map(a => {
    const bg = { warn: '#1a1000', info: '#001020', success: '#001a00', tip: '#101000' }[a.type] || '#111';
    const bc = { warn: '#6a4000', info: '#004080', success: '#006000', tip: '#606000' }[a.type] || '#333';
    // Alerts with action=trichome jump to the trichome widget in today's entry
    const clickable = a.action === 'trichome' && a.cId;
    const extraAttr = clickable
      ? ` onclick="entryFrom='dash';openEntryAndScroll('${today}','trich-${a.cId}')" style="background:${bg};border-color:${bc};cursor:pointer"`
      : ` style="background:${bg};border-color:${bc}"`;
    return `<div class="alert"${extraAttr}>
      <span style="font-size:16px;flex-shrink:0">${a.icon}</span>
      <div style="font-size:12px;color:var(--text-sub);line-height:1.5">${a.text}</div>
      ${clickable ? `<span style="color:var(--yellow);font-size:16px;margin-left:auto">›</span>` : ''}
    </div>`;
  }).join('');

  const todayCard = act.length > 0 ? `<div class="card" style="gap:6px;display:flex;flex-direction:column">
    <div style="font-size:12px;color:var(--green);font-weight:600">${fmt}</div>
    ${act.map(c => {
      const p = phase(today, c), a = getAction(today, c), next = nextGiessTag(c, today);
      const cl = col(c);
      // Düngeplan-Woche berechnen
      let fertWk = 1;
      if (p) {
        if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
        else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
        else { const td = isoDiff(today, c.startDate); fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10)); }
      }
      const weekNames = {1:'Keimling',2:'Frühes Wachstum',3:'Vegetation',4:'Vorblüte',5:'Übergang',6:'Stacking',7:'Bud-Entw.',8:'Peak Bloom',9:'Finale Reife',10:'Herbst',11:'Spülen',12:'Ernte'};
      return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
        <span style="font-size:16px">${sym(c)}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${c.name}</div>
          <div style="font-size:11px;color:var(--text-muted)">${PH_ICON[p?.ph] || ''} ${p ? PN[p.ph] : '–'} · Tag ${p?.day || '–'} · <span style="color:${cl.hex}">Wo${fertWk}</span> ${weekNames[fertWk] || ''}</div>
        </div>
        <div style="font-size:12px;color:${cl.hex};font-weight:500">${a
          ? (ACT_ICON[a] || '') + ' ' + (a === 'giess' ? 'Gießtag' : a === 'giess_anz' ? 'Anzucht' : PN[a] || a)
          : (next ? 'in ' + next.days + 'd' : '–')
        }</div>
      </div>`;
    }).join('')}
  </div>` : '';

  const fc = act[0];
  const fcAction = fc ? getAction(today, fc) : null;

  // E2: "Heute zu tun"-Cards (only for cycles with an action today)
  const actionCards = act.map(c => {
    const p = phase(today, c), a = getAction(today, c);
    const td = getTodayAction(c, p, a, today);
    if (!td) return '';
    return `<div style="background:linear-gradient(135deg,${td.color}18,${td.color}08);border:1px solid ${td.color}55;border-radius:14px;padding:14px 16px;cursor:pointer" onclick="entryFrom='dash';openEntry('${today}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:22px">${td.icon}</span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:${td.color}">${td.title}</div>
          <div style="font-size:11px;color:var(--text-muted)">${sym(c)} ${c.name}</div>
        </div>
        <span style="color:${td.color};font-size:20px">›</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:6px">
        ${td.steps.map((s, i) => `<div style="display:flex;gap:6px;font-size:12px;color:var(--text-sub);line-height:1.5">
          <span style="color:${td.color};font-weight:600;flex-shrink:0">${i + 1}.</span>
          <span>${s}</span>
        </div>`).join('')}
      </div>
      ${td.hint ? `<div style="font-size:10px;color:${td.color};opacity:0.85;border-top:0.5px solid ${td.color}33;padding-top:6px;margin-top:4px;line-height:1.4">💡 ${td.hint}</div>` : ''}
    </div>`;
  }).filter(Boolean).join('');

  // Smart stats
  let avgPH = '–', totalWater = 0, harvestDate = '–';
  if (fc) {
    const wDates = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[fc.id]?.water).sort();
    const phVals = wDates.map(d => parseFloat(S.entries[d]?.cycleData?.[fc.id]?.ph)).filter(v => v > 0);
    if (phVals.length > 0) avgPH = (phVals.reduce((a,b) => a+b, 0) / phVals.length).toFixed(1);
    totalWater = wDates.reduce((sum, d) => sum + (parseFloat(S.entries[d]?.cycleData?.[fc.id]?.water) || 0), 0);
    const hDays = (fc.anzuchtDays||PHASE_DEFAULTS.anzuchtDays) + (fc.bloomDays||PHASE_DEFAULTS.bloomDays) + (fc.flushDays||PHASE_DEFAULTS.flushDays) + (fc.iceDays||PHASE_DEFAULTS.iceDays);
    harvestDate = fmtDE(isoPlus(fc.startDate, hDays), {day:'2-digit', month:'short'});
  }

  const stats = act.length > 0 ? `<div class="stat-row">
    <div class="stat-box"><div class="stat-lbl">Ernte in</div><div class="stat-val">${fc ? daysToHarvest(fc) : '–'}<span class="stat-unit"> d</span></div></div>
    <div class="stat-box"><div class="stat-lbl">Heute</div><div class="stat-val" style="font-size:22px">${fcAction ? ACT_ICON[fcAction] || '💤' : '💤'}</div></div>
    <div class="stat-box"><div class="stat-lbl">Ø pH</div><div class="stat-val" style="color:${avgPH !== '–' && parseFloat(avgPH) >= 6.2 && parseFloat(avgPH) <= 6.6 ? 'var(--green)' : avgPH !== '–' ? 'var(--orange)' : 'var(--text-hint)'}">${avgPH}</div></div>
  </div>
  <div class="stat-row" style="margin-top:6px">
    <div class="stat-box"><div class="stat-lbl">Gesamt 💧</div><div class="stat-val">${totalWater > 0 ? (totalWater/1000).toFixed(1) : '–'}<span class="stat-unit"> L</span></div></div>
    <div class="stat-box"><div class="stat-lbl">Erntedatum</div><div class="stat-val" style="font-size:14px">${harvestDate}</div></div>
    <div class="stat-box"><div class="stat-lbl">Streak</div><div class="stat-val">${fc ? calcStreak(fc) : 0}<span class="stat-unit"> 🔥</span></div></div>
  </div>` : '';

  const cards = act.map(c => {
    const p = phase(today, c), a = getAction(today, c), cl = col(c), s = sym(c);
    const pct = p?.pct || 0, sf = fmtDE(c.startDate), next = nextGiessTag(c, today);
    const streak = calcStreak(c), wS = waterStats(c), maxW = Math.max(...wS, 1);
    const tip = getSmartTip(c, p);
    // pH/EC trend data (last 14 days)
    const phStats = [], ecStats = [];
    for (let i = 13; i >= 0; i--) {
      const d2 = isoPlus(today, -i);
      const cd2 = S.entries[d2]?.cycleData?.[c.id];
      phStats.push(parseFloat(cd2?.ph) || 0);
      ecStats.push(parseFloat(cd2?.ec) || 0);
    }
    const hasPhData = phStats.some(v => v > 0);
    const hasEcData = ecStats.some(v => v > 0);

    return `<div style="background:${cl.dk};border:0.5px solid ${cl.hex}33;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;cursor:pointer" onclick="entryFrom='dash';openEntry('${today}')">
      <div style="display:flex;align-items:center;gap:12px">
        ${ring(pct, cl.hex)}
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
            <span style="font-size:16px">${s}</span>
            <span style="font-size:14px;font-weight:600">${c.name}</span>
            ${c.location ? `<span style="font-size:11px;color:var(--text-muted)">· ${c.location}</span>` : ''}
          </div>
          <div style="font-size:12px;color:${cl.hex};font-weight:500">${PH_ICON[p?.ph] || ''} ${p ? PN[p.ph] : '–'}${p?.week ? ' Wo.' + p.week : ''} · Tag ${p?.day || '–'}</div>
          <div style="display:flex;gap:8px;margin-top:3px;align-items:center">
            ${streak > 0 ? `<span class="streak">🔥 ${streak}</span>` : ''}
            <span style="font-size:10px;color:var(--text-muted)">Start ${sf}</span>
          </div>
        </div>
        <div style="text-align:center">
          <div style="font-size:26px">${a ? ACT_ICON[a] || '💤' : '💤'}</div>
          <div style="font-size:10px;color:${a ? cl.hex : 'var(--text-hint)'};font-weight:600;margin-top:1px">${a ? (a === 'giess' ? 'Gießen' : a === 'giess_anz' ? 'Gießen 🌱' : PN[a] || a) : 'Pause'}</div>
        </div>
      </div>
      ${!a && next ? `<div onclick="event.stopPropagation();entryFrom='dash';openEntry('${next.iso}')" style="background:${cl.hex}0c;border:0.5px solid ${cl.hex}22;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer">
        <span style="font-size:16px">💧</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:500;color:${cl.hex}">Nächster Gießtag</div>
          <div style="font-size:12px;color:var(--text-sub)">${fmtDE(next.iso, { weekday: 'long', day: '2-digit', month: 'short' })} · in ${next.days}d</div>
        </div>
        <span style="color:${cl.hex};font-size:16px">›</span>
      </div>` : ''}
      ${wS.filter(v => v > 0).length >= 3 ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text-hint);white-space:nowrap">14d 💧</span>
        <div class="mini-chart" style="flex:1">${wS.map(v =>
          `<div class="mini-bar" style="height:${Math.max(2, v / maxW * 100)}%;background:${cl.hex}${v ? '88' : '33'}"></div>`
        ).join('')}</div>
      </div>` : ''}
      ${hasPhData && phStats.filter(v => v > 0).length >= 3 ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text-hint);white-space:nowrap">14d pH</span>
        <div class="mini-chart" style="flex:1">${phStats.map(v => {
          const h = v > 0 ? Math.max(8, ((v - 5) / 2.5) * 100) : 2;
          const clr = v >= 6.2 && v <= 6.6 ? 'var(--green)' : v > 0 ? 'var(--orange)' : 'var(--border)';
          return `<div class="mini-bar" style="height:${Math.min(100, h)}%;background:${clr}55"></div>`;
        }).join('')}</div>
      </div>` : ''}
      ${hasEcData && ecStats.filter(v => v > 0).length >= 3 ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text-hint);white-space:nowrap">14d EC</span>
        <div class="mini-chart" style="flex:1">${ecStats.map(v => {
          const h = v > 0 ? Math.max(8, (v / 3) * 100) : 2;
          const clr = v > 2.5 ? 'var(--red)' : v > 0 ? 'var(--teal)' : 'var(--border)';
          return `<div class="mini-bar" style="height:${Math.min(100, h)}%;background:${clr}55"></div>`;
        }).join('')}</div>
      </div>` : ''}
    </div>`;
  }).join('');

  const empty = act.length === 0 ? `<div class="empty-state" style="padding:40px 20px">
    <div style="font-size:56px;opacity:0.3;margin-bottom:8px">🌱</div>
    <div style="font-size:18px;color:var(--green);font-weight:700;margin-bottom:6px">Willkommen bei GrowSmart!</div>
    <div style="font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:18px;max-width:280px">So startest du:<br>
      <b style="color:var(--text-sub)">1.</b> Zyklus anlegen mit Namen<br>
      <b style="color:var(--text-sub)">2.</b> Samentyp + Lichtzyklus wählen<br>
      <b style="color:var(--text-sub)">3.</b> BioBizz-Düngeplan laden<br>
      <b style="color:var(--text-sub)">4.</b> Zyklus starten — los geht's!
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center">
      <button id="welcome-start-btn" style="background:var(--green);border:none;border-radius:22px;padding:14px 28px;font-size:15px;color:#fff;cursor:pointer;font-family:var(--font);font-weight:700;box-shadow:0 4px 14px rgba(76,175,112,0.3)" onclick="goTo('set')">🌱 Jetzt starten →</button>
      <button onclick="goTo('tips');setTimeout(openHowto,100)" style="background:var(--surface);border:1px solid var(--green-dk);border-radius:22px;padding:13px 22px;font-size:13px;color:var(--green);cursor:pointer;font-family:var(--font);font-weight:600">📖 Erst nachlesen</button>
    </div>
    <div style="font-size:10px;color:var(--text-hint);margin-top:12px;line-height:1.5;max-width:260px">💡 Tipp: Unter "📖 Erst nachlesen" findest du eine komplette Anleitung mit 9 Kapiteln — und auch geführte Touren durch die App.</div>
  </div>` : '';

  document.getElementById('dash-body').innerHTML = `${actionCards}${todayCard}${alertHTML}${stats}<div class="sect-head">Meine Zyklen</div>${empty}${cards}
    ${act.length > 0 ? `<div class="sec-tog" onclick="openGallery()" style="margin-top:4px;border-color:rgba(176,106,200,0.15)">
      <span>📸</span>
      <div>
        <div style="font-weight:500;font-size:12px">Foto-Galerie</div>
        <div style="font-size:11px;color:var(--text-muted)">Alle Fotos chronologisch</div>
      </div>
      <span style="color:var(--text-muted)">›</span>
    </div>` : ''}
    <div style="height:12px"></div>`;
}

// =====================================================================

// =====================================================================
const MN = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('cal-lbl').textContent = `${MN[m]} ${y}`;
  const act = active(), arch = archived(), today = todayISO();
  const fd = new Date(y, m, 1).getDay(), dim = new Date(y, m + 1, 0).getDate();
  const off = fd === 0 ? 6 : fd - 1;

  let cells = '';
  for (let i = 0; i < off; i++) cells += '<div></div>';

  for (let d = 1; d <= dim; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = iso === today;
    const hasEntry = !!S.entries[iso];
    const dayInfo = act.map(c => ({ c, a: getAction(iso, c), p: phase(iso, c) })).filter(x => x.p);
    const actionDay = dayInfo.find(x => x.a);
    const phaseDay = dayInfo[0];
    const isStart = act.some(c => c.startDate === iso);
    // Archived cycle phase info (faded)
    const archInfo = !phaseDay ? arch.map(c => ({ c, p: phase(iso, c) })).filter(x => x.p)[0] : null;
    // Check if this is a topping rest day or skipped day
    const isToppingRest = act.some(c => c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 3));
    const isToppingDay = act.some(c => c.toppingDate === iso);
    const isSkipped = act.some(c => c.skippedDays && c.skippedDays.includes(iso));

    let bg = '#151515', border = 'transparent';
    if (isStart) { bg = '#1e1a04'; border = '#f0d050aa'; }
    else if (actionDay) { const cl = col(actionDay.c); bg = cl.dk; border = cl.hex + '77'; }
    else if (isToppingRest) { bg = '#150820'; border = 'rgba(176,106,200,0.3)'; }
    else if (isSkipped) { bg = '#1a1010'; border = 'rgba(224,96,96,0.15)'; }

    let icon = '';
    if (isStart) icon = START_ICON;
    else if (isToppingDay) icon = '✂️';
    else if (isToppingRest) icon = '😴';
    else if (isSkipped) icon = '🚫';
    else if (actionDay) icon = ACT_ICON[actionDay.a] || '';

    const tagCol = actionDay ? col(actionDay.c).hex : (phaseDay ? col(phaseDay.c).hex : 'rgba(255,255,255,0.35)');

    cells += `<div class="cal-cell ${isToday ? 'today' : ''}" style="background:${bg};border-color:${border}"
      onclick="calClick('${iso}')" oncontextmenu="return false" ontouchstart="lpS('${iso}',event)" ontouchend="lpE()" ontouchmove="lpE()">
      ${icon ? `<span class="cal-icon">${icon}</span>` : ''}
      <span class="cal-num" ${isStart ? 'style="color:#f0d050;font-weight:800"' : ''}>${d}</span>
      ${phaseDay ? `<span class="cal-tag" style="color:${tagCol}">T${phaseDay.p.day}</span>` : 
        archInfo ? `<span class="cal-tag" style="color:${col(archInfo.c).hex}44;font-size:8px">T${archInfo.p.day}</span>` : ''}
      ${hasEntry ? `<div class="cal-dot"></div>` : ''}
    </div>`;
  }

  const cycLeg = act.map(c =>
    `<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text-muted)">
      <span style="width:8px;height:8px;border-radius:50%;background:${col(c).hex};display:inline-block"></span>
      ${sym(c)} ${c.name}
    </span>`
  ).join(' ');

  document.getElementById('cal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(x => `<div style="text-align:center;font-size:11px;color:var(--text-muted);font-weight:600">${x}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    <div style="padding:6px 0;border-top:0.5px solid var(--border);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px">${cycLeg}</div>
    <div style="padding:4px 0 2px;display:flex;flex-wrap:wrap;gap:4px 10px;font-size:10px;color:var(--text-hint)">
      <span style="color:#f0d050">☘️ Start</span>
      <span>🌱 Anzucht</span>
      <span>💧 Gießen</span>
      <span>🚿 Spülen</span>
      <span>🧊 Ice</span>
      <span>✂️ Topping/Ernte</span>
      <span>😴 Ruhetag</span>
      <span>🍂 Trocknen</span>
    </div>
    <div style="font-size:10px;color:var(--text-hint);padding:2px 0">📌 Gedrückt halten = Gießtag verschieben</div>`;
}

function changeMonth(d) { calDate = new Date(calDate.getFullYear(), calDate.getMonth() + d, 1); renderCal(); }

// =====================================================================
//  LONG PRESS + CONTEXT MENU (offsetHistory-based shifting)
// =====================================================================
let lpT = null;
let lpDone = false; // flag to prevent click after long-press
let lpX = 0, lpY = 0; // stored touch coords

function lpS(iso, e) {
  lpDone = false;
  // Store coordinates immediately before event gets recycled
  const touch = e.touches?.[0];
  if (touch) { lpX = touch.clientX; lpY = touch.clientY; }
  lpT = setTimeout(() => {
    lpT = null;
    lpDone = true; // mark that long-press completed
    vibrate(30);
    showCtx(iso);
  }, 450);
}

function lpE() { if (lpT) { clearTimeout(lpT); lpT = null; } }

function calClick(iso) {
  // Don't open entry if we just did a long-press
  if (lpDone) { lpDone = false; return; }
  entryFrom = 'cal';
  openEntry(iso);
}

function showCtx(iso) {
  const act = active(), df = fmtDE(iso), today = todayISO();
  let items = [];
  const isFuture = iso >= today;

  act.forEach(c => {
    const p = phase(iso, c);
    if (!p) return;
    const s = sym(c), a = getAction(iso, c);

    if (isFuture && a) {
      // Gießtag in der Zukunft/heute → verschieben möglich
      items.push(`<div class="ctx-item ctx-b" onclick="doShift('${c.id}', -1, '${iso}')">
        <span class="ctx-ic">←</span>${s} ${ACT_ICON[a] || ''} Vorziehen
      </div>`);
      items.push(`<div class="ctx-item" style="color:var(--orange)" onclick="doShift('${c.id}', 1, '${iso}')">
        <span class="ctx-ic">→</span>${s} ${ACT_ICON[a] || ''} Auf morgen verschieben
      </div>`);
      items.push(`<div class="ctx-item ctx-r" onclick="skipDayFromCal('${c.id}','${iso}')">
        <span class="ctx-ic">🚫</span>${s} Gießtag entfernen
      </div>`);
    }

    // Show restore option if this day was skipped
    if (c.skippedDays && c.skippedDays.includes(iso)) {
      items.push(`<div class="ctx-item ctx-g" onclick="restoreDayFromCal('${c.id}','${iso}')">
        <span class="ctx-ic">↩</span>${s} Gießtag wiederherstellen
      </div>`);
    }
  });

  if (items.length) items.push('<div class="ctx-div"></div>');

  // Start inactive cycles on this date
  S.cycles.filter(c => !c.active).forEach(c =>
    items.push(`<div class="ctx-item ctx-g" onclick="startOn('${c.id}','${iso}')">
      <span class="ctx-ic">▶</span>${sym(c)} ${c.name} starten
    </div>`)
  );

  // End active cycles
  act.forEach(c =>
    items.push(`<div class="ctx-item ctx-r" onclick="stopC('${c.id}')">
      <span class="ctx-ic">■</span>${sym(c)} ${c.name} beenden
    </div>`)
  );

  if (items.length) items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calClick('${iso}');closeCtx()"><span class="ctx-ic">✏</span>Eintrag öffnen</div>`);

  const menu = document.getElementById('ctx-m');
  const dayInfo = act.map(c => { const p = phase(iso, c); const cl2 = col(c); return p ? `<span style="color:${cl2.hex}">${sym(c)} T${p.day}</span>` : ''; }).filter(Boolean).join(' ');
  const actionInfo = act.map(c => { const a2 = getAction(iso, c); return a2 ? ACT_ICON[a2] : ''; }).filter(Boolean).join(' ');
  menu.innerHTML = `<div style="padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:600;color:var(--text)">${df}</span>
    <span style="font-size:12px">${dayInfo} ${actionInfo}</span>
  </div>` + items.join('');

  const x = lpX ? Math.min(Math.max(8, lpX), window.innerWidth - 280) : window.innerWidth / 2 - 140;
  const y = lpY ? Math.min(lpY - 20, window.innerHeight - items.length * 48 - 40) : window.innerHeight / 2;
  menu.style.left = x + 'px';
  menu.style.top = Math.max(8, y) + 'px';
  menu.classList.add('show');
  document.getElementById('ctx-ov').classList.add('show');
}

function closeCtx() {
  document.getElementById('ctx-m').classList.remove('show');
  document.getElementById('ctx-ov').classList.remove('show');
}

/**
 * Shift watering grid for a cycle.
 * +1 = Auf morgen verschieben (Topf noch nass)
 * -1 = Vorziehen (Topf schon trocken)
 *
 * actionISO = das Datum des Gießtags, der verschoben wird.
 * Jeder Shift erzeugt einen neuen Eintrag in offsetHistory.
 * Die Grenze (date) ist der Tag, AB dem der neue Offset gilt.
 */
function doShift(cId, days, actionISO) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const today = todayISO();

  // actionISO kommt direkt vom Kontextmenü = der angeklickte Gießtag
  // Falls nicht übergeben (Fallback): nächsten Gießtag ab heute suchen
  const actionDay = actionISO || findNextActionDay(c, today);
  if (!actionDay) { toast('⚠ Kein Gießtag gefunden'); return; }

  // Block: Vorziehen nur wenn Aktionstag NACH heute liegt
  if (days < 0 && actionDay <= today) {
    toast('⚠ Kann nicht weiter vorziehen');
    return;
  }

  // Grenze: Bei Vorziehen 1 Tag VOR dem Aktionstag,
  // damit das vorgezogene Icon im neuen Offset-Bereich landet.
  // Bei Verschieben: der Aktionstag selbst (dort verschwindet das Icon,
  // und am Folgetag erscheint es im neuen Raster).
  const boundary = days < 0 ? isoPlus(actionDay, -1) : actionDay;

  if (!c.offsetHistory) c.offsetHistory = [];
  c.offsetHistory.push({ date: boundary, offset: days });

  saveS();
  renderCal();
  vibrate();
  toast(days > 0 ? '→ Auf morgen verschoben' : '← Vorgezogen');
}

/** Same as doShift but re-renders the entry screen */
function doShiftFromEntry(cId, days) {
  const c = S.cycles.find(x => x.id === cId);

  if (days < 0 && actionDay <= today) {
    toast('⚠ Kann nicht weiter vorziehen');
    return;
  }

  const boundary = days < 0 ? isoPlus(actionDay, -1) : actionDay;

  if (!c.offsetHistory) c.offsetHistory = [];
  c.offsetHistory.push({ date: boundary, offset: days });

  saveS();
  vibrate();
  toast(days > 0 ? '→ Auf morgen verschoben' : '← Vorgezogen');

}

/** Find the next action day from a given date (inclusive) */
function findNextActionDay(c, from) {
  for (let i = 0; i <= 30; i++) {
    const iso = isoPlus(from, i);
    if (getAction(iso, c)) return iso;
  }
  return null;
}

/**
 * Topping: Gießen + Toppen am aktuellen Tag.
 * Danach 3 Tage Ruhe. Der Offset wird so berechnet,
 * dass der erste Guss exakt am Tag nach der Ruhe landet.
 */
async function doTopping(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const pause = c.toppingPause || 3;
  const ok = await customConfirm(
    '✂️ Jetzt Toppen?',
    `Heute gießen + toppen. Danach ${pause} Tage Ruhe. Erster Guss am ${fmtDE(isoPlus(iso, pause + 1), {day:'2-digit', month:'2-digit'})}.`,
    'Toppen', 'var(--purple)'
  );
  if (!ok) return;
  c.toppingDate = iso;

  // Berechne den Offset so, dass der erste Guss nach der Pause
  // exakt auf toppingDate + pause + 1 fällt
  const resumeDay = isoPlus(iso, pause + 1);
  const neededOffset = calcToppingOffset(c, iso, pause);

  if (neededOffset !== 0) {
    const boundary = isoPlus(iso, 1);
    if (!c.offsetHistory) c.offsetHistory = [];
    c.offsetHistory.push({ date: boundary, offset: neededOffset });
    // Remember which offset entry was added by topping (for undo)
    c._toppingOffsetBoundary = boundary;
    c._toppingOffsetValue = neededOffset;
  } else {
    c._toppingOffsetBoundary = null;
    c._toppingOffsetValue = 0;
  }
  saveS();
  vibrate();
  toast(`✂️ Getoppt! Nächster Guss: ${fmtDE(resumeDay, {day:'2-digit', month:'2-digit'})}`);
  if (editISO) renderEntry(editISO);
}

/** Undo topping: clear toppingDate and remove the associated offset */
async function undoTopping(cId) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.toppingDate) return;
  const ok = await customConfirm(
    '↩ Topping rückgängig machen?',
    `Das Topping vom ${fmtDE(c.toppingDate, {day:'2-digit', month:'2-digit', year:'numeric'})} wird entfernt. Die Ruhetage und der Offset werden zurückgesetzt, der Gießrhythmus läuft wie zuvor weiter.`,
    'Rückgängig', 'var(--red)'
  );
  if (!ok) return;

  // Remove the offset entry that was added by topping
  if (c._toppingOffsetBoundary && c._toppingOffsetValue && c.offsetHistory) {
    const b = c._toppingOffsetBoundary;
    const v = c._toppingOffsetValue;
    // Find and remove the matching entry (first match with same date+offset)
    const idx = c.offsetHistory.findIndex(e => e.date === b && e.offset === v);
    if (idx !== -1) c.offsetHistory.splice(idx, 1);
  }
  c.toppingDate = null;
  c._toppingOffsetBoundary = null;
  c._toppingOffsetValue = 0;

  saveS();
  vibrate();
  toast('↩ Topping zurückgesetzt');
  if (editISO) renderEntry(editISO);
  renderCal();
}

/**
 * Berechnet den minimalen Offset damit der Gießtag auf den Resume-Tag fällt.
 * Probiert Offsets 0 bis interval-1 durch.
 * Benutzt den kumulativen Offset aus offsetHistory für den Resume-Tag.
 */
function calcToppingOffset(c, toppingISO, pause) {
  const resumeDay = isoPlus(toppingISO, pause + 1);

  // Kumulativen Offset für den Resume-Tag berechnen (ohne den neuen Topping-Offset)
  let currentOffset = 0;
  for (const entry of c.offsetHistory || []) {
    if (resumeDay >= entry.date) currentOffset += entry.offset;
  }

  const diffFromStart = isoDiff(resumeDay, c.startDate);
  const a = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const iv = diffFromStart < a ? (c.intAnzucht || 3) : (c.intBloom || 3);

  for (let testOff = 0; testOff < iv; testOff++) {
    const totalOff = currentOffset + testOff;
    const vs = isoPlus(c.startDate, totalOff);
    const diff = isoDiff(resumeDay, vs);
    if (diff < 0) continue;
    const ps = diff < a ? 0 : a;
    const dip = diff - ps;
    if (dip >= 0 && dip % iv === 0) return testOff;
  }
  return 1; // fallback
}
