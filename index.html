const SK = 'growsmart_v4';
let S = {
  cycles: [], entries: {}, products: [], weekSchedule: {},
  potSize: 11, presetKey: null, mixOrder: null, mixInfo: null,
};
let tab = 'dash', calDate = new Date(), editISO = null, entryFrom = 'dash';
let _entryDirty = false; // Tracks whether the current entry has unsaved changes
let _entrySnapshot = null; // Deep-clone of entry state on openEntry — enables proper "Verwerfen" restore
let _tipsSnapshot = []; // Snapshot of current tips for meta-search
let selId = null, draft = {}, lastBack = 0, editProd = null;
let _dzSel = null; // Danger Zone selected cycle
let _setScrollY = null; // Settings scroll restore

// Helpers
function col(c) { return COLORS.find(x => x.id === c.colorId) || COLORS[0]; }
function sym(c) { return c.symbol || '🌱'; }

// =====================================================================
//  [SEKTION]: VERBRAUCH-STATISTIK (Phase 5 Schritt 3)
// =====================================================================
/**
 * Berechnet den Gesamtverbrauch pro Produkt über einen Zyklus.
 * Unterscheidet gemessene (User hat selbst eingetragen) von vorgeschlagenen
 * Dosen (Auto-Fill).
 *
 * @param {object} c  Zyklus-Objekt
 * @returns {Array<{
 *   id, name, unit, color,
 *   totalMeasured, totalSuggested, totalAll,
 *   dayCount
 * }>}  — gefiltert auf Produkte mit Verbrauch > 0
 */
function calcCycleConsumption(c) {
  if (!c || !c.startDate) return [];
  const products = S.products || [];
  if (products.length === 0) return [];

  const dates = Object.keys(S.entries || {}).filter(d =>
    S.entries[d]?.cycleData?.[c.id]
  ).sort();

  const totals = {};
  products.forEach(p => {
    totals[p.id] = {
      id: p.id,
      name: p.name,
      unit: p.unit || 'ml',
      color: p.color || '#888',
      totalMeasured: 0,
      totalSuggested: 0,
      dayCount: 0,
    };
  });

  dates.forEach(d => {
    const cd = S.entries[d].cycleData[c.id];
    if (!cd || !cd.doses) return;
    const suggDoses = cd._suggestedDoses || {};

    Object.entries(cd.doses).forEach(([pid, dose]) => {
      if (!totals[pid]) return; // Produkt nicht mehr existent
      const d2 = parseFloat(dose);
      if (!isFinite(d2) || d2 <= 0) return;
      if (suggDoses[pid]) {
        totals[pid].totalSuggested += d2;
      } else {
        totals[pid].totalMeasured += d2;
      }
      totals[pid].dayCount++;
    });
  });

  return products.map(p => {
    const t = totals[p.id];
    return {
      ...t,
      totalAll: t.totalMeasured + t.totalSuggested,
    };
  }).filter(t => t.totalAll > 0);
}

/**
 * Formatiert Verbrauchs-Summe mit sinnvoller Einheit.
 */
function formatConsumption(total) {
  if (total >= 1000) {
    return (total / 1000).toFixed(2) + ' L';
  }
  if (total >= 100) {
    return Math.round(total) + ' ml';
  }
  return (Math.round(total * 10) / 10) + ' ml';
}

/**
 * Erstellt eine kompakte Zusammenfassung eines Zyklus für den Vergleich.
 * Sammelt alle Kennzahlen die für Zyklus-zu-Zyklus-Vergleich relevant sind.
 *
 * @param {object} c  Zyklus
 * @returns {object|null} {
 *   id, name, startDate, endDate, status, totalDays,
 *   seedType, growType, strain, strainDetails,
 *   presetName,
 *   entries: { total, firstDate, lastDate },
 *   water: { totalL, avgMlPerDay },
 *   ph: { avg, measured, suggested, honestyPct },
 *   ec: { avg, measured, suggested, honestyPct },
 *   weight: { measurements, sweetSpotCount, sweetSpotPct },
 *   runoff: { phAvgDelta, ecAvgDelta, measurements },
 *   consumption: [{name, totalAll, ...}],
 *   training: { total, byType: {type: count} },
 *   photos: { total },
 *   harvest: harvestCountdown or null
 * }
 */
function summarizeCycle(c) {
  if (!c || !c.startDate) return null;

  const dates = Object.keys(S.entries || {}).filter(d =>
    S.entries[d]?.cycleData?.[c.id]
  ).sort();

  // Endzeitpunkt des Zyklus — für aktive = heute, für inaktive = letzter Entry oder berechnetes Ende
  const today = todayISO();
  const endDate = c.active ? today : (dates[dates.length - 1] || today);
  const totalDays = isoDiff(endDate, c.startDate) + 1;

  // Einträge
  let totalWater = 0;
  const phMeasured = [], phSuggested = [];
  const ecMeasured = [], ecSuggested = [];
  const runoffPhDeltas = [], runoffEcDeltas = [];
  let weightMeasurements = 0, sweetSpotCount = 0;
  let totalPhotos = 0;

  dates.forEach(d => {
    const cd = S.entries[d].cycleData[c.id];
    const sugg = cd._suggested || {};

    if (cd.water) totalWater += parseFloat(cd.water) || 0;
    if (cd.ph) {
      const phVal = parseFloat(cd.ph);
      if (isFinite(phVal)) {
        if (sugg.ph) phSuggested.push(phVal);
        else phMeasured.push(phVal);
      }
    }
    if (cd.ec) {
      const ecVal = parseFloat(cd.ec);
      if (isFinite(ecVal)) {
        if (sugg.ec) ecSuggested.push(ecVal);
        else ecMeasured.push(ecVal);
      }
    }

    if (cd.runoffPh && cd.ph) {
      const d2 = parseFloat(cd.runoffPh) - parseFloat(cd.ph);
      if (isFinite(d2)) runoffPhDeltas.push(d2);
    }
    if (cd.runoffEc && cd.ec) {
      const d2 = parseFloat(cd.runoffEc) - parseFloat(cd.ec);
      if (isFinite(d2)) runoffEcDeltas.push(d2);
    }

    // Restgewicht
    let pct = null;
    if (cd.weightG !== undefined && cd.weightG !== null && c.saturatedWeight && c.dryWeight) {
      pct = calcRestPct(cd.weightG, c.saturatedWeight, c.dryWeight);
    } else if (cd.restPct !== undefined && cd.restPct !== null) {
      pct = parseFloat(cd.restPct);
    }
    if (pct !== null && isFinite(pct)) {
      weightMeasurements++;
      const ctx = contextFor(c, d);
      const clf = classifyRestPct(pct, ctx && ctx.isFinisher);
      if (clf && clf.label && clf.label.toLowerCase().includes('sweet')) {
        sweetSpotCount++;
      }
    }

    if (cd.photos && cd.photos.length) totalPhotos += cd.photos.length;
  });

  // Averages
  const avgPh = phMeasured.length > 0 ? phMeasured.reduce((a,b) => a+b, 0) / phMeasured.length : null;
  const avgEc = ecMeasured.length > 0 ? ecMeasured.reduce((a,b) => a+b, 0) / ecMeasured.length : null;
  const totalPh = phMeasured.length + phSuggested.length;
  const totalEc = ecMeasured.length + ecSuggested.length;

  // Runoff Deltas
  const avgRunoffPhDelta = runoffPhDeltas.length > 0
    ? runoffPhDeltas.reduce((a,b) => a+b, 0) / runoffPhDeltas.length : null;
  const avgRunoffEcDelta = runoffEcDeltas.length > 0
    ? runoffEcDeltas.reduce((a,b) => a+b, 0) / runoffEcDeltas.length : null;

  // Training-Events
  const events = c.trainingEvents || [];
  const byType = {};
  events.forEach(ev => {
    byType[ev.type] = (byType[ev.type] || 0) + 1;
  });

  // Strain-Details
  const strainDetails = c.strain ? getStrainDetails(c.strain) : null;

  // Preset
  const preset = S.presetKey ? getPreset(S.presetKey) : null;

  return {
    id: c.id,
    name: c.name,
    symbol: sym(c),
    color: col(c).hex,
    startDate: c.startDate,
    endDate,
    status: c.active ? 'active' : (c.archived ? 'archived' : 'stopped'),
    totalDays,

    seedType: c.seedType || 'auto',
    growType: c.growType || 'indoor',
    strain: c.strain || null,
    strainDetails,
    presetName: preset?.name || null,

    entries: {
      total: dates.length,
      firstDate: dates[0] || null,
      lastDate: dates[dates.length - 1] || null,
    },

    water: {
      totalMl: totalWater,
      totalL: totalWater / 1000,
      avgMlPerDay: totalDays > 0 ? totalWater / totalDays : 0,
    },

    ph: {
      avg: avgPh,
      measured: phMeasured.length,
      suggested: phSuggested.length,
      honestyPct: totalPh > 0 ? Math.round((phMeasured.length / totalPh) * 100) : null,
    },

    ec: {
      avg: avgEc,
      measured: ecMeasured.length,
      suggested: ecSuggested.length,
      honestyPct: totalEc > 0 ? Math.round((ecMeasured.length / totalEc) * 100) : null,
    },

    weight: {
      measurements: weightMeasurements,
      sweetSpotCount,
      sweetSpotPct: weightMeasurements > 0
        ? Math.round((sweetSpotCount / weightMeasurements) * 100) : null,
    },

    runoff: {
      phAvgDelta: avgRunoffPhDelta,
      ecAvgDelta: avgRunoffEcDelta,
      measurements: runoffPhDeltas.length,
    },

    consumption: calcCycleConsumption(c),

    training: {
      total: events.length,
      byType,
    },

    photos: { total: totalPhotos },

    harvest: harvestCountdown(c, today),
  };
}

/**
 * Vergleicht zwei Zyklus-Summaries und berechnet Delta-Werte + Winner-Markierungen.
 * Winner ist nur gesetzt wenn die Richtung eindeutig "besser" ist.
 *
 * Richtung für "besser":
 *   - sweetSpotPct: höher = besser
 *   - honestyPct (ph/ec): höher = besser (mehr gemessen)
 *   - Runoff-Drift (Absolutwert): kleiner = besser (stabilere Erde)
 *   - Training-Anzahl: keine Richtung (neutral)
 *   - Wasser-Verbrauch: keine Richtung (neutral — mehr Pflanzenmasse braucht mehr)
 *
 * @returns {object} {a, b, deltas: {key: {diff, winner: 'a'|'b'|null, label}}}
 */
function compareCycles(a, b) {
  if (!a || !b) return null;
  const deltas = {};

  // Days (neutral)
  deltas.totalDays = { diff: a.totalDays - b.totalDays, winner: null };

  // Photos (neutral — mehr ist nicht automatisch besser)
  deltas.photos = { diff: a.photos.total - b.photos.total, winner: null };

  // pH Avg (neutral; zu weit von 6.3 = schlechter)
  if (a.ph.avg !== null && b.ph.avg !== null) {
    const aDist = Math.abs(a.ph.avg - 6.3);
    const bDist = Math.abs(b.ph.avg - 6.3);
    deltas.phAvg = {
      diff: a.ph.avg - b.ph.avg,
      winner: Math.abs(aDist - bDist) > 0.05 ? (aDist < bDist ? 'a' : 'b') : null,
    };
  }

  // pH Honesty (higher better)
  if (a.ph.honestyPct !== null && b.ph.honestyPct !== null) {
    deltas.phHonesty = {
      diff: a.ph.honestyPct - b.ph.honestyPct,
      winner: Math.abs(a.ph.honestyPct - b.ph.honestyPct) > 5
        ? (a.ph.honestyPct > b.ph.honestyPct ? 'a' : 'b') : null,
    };
  }

  // EC Honesty
  if (a.ec.honestyPct !== null && b.ec.honestyPct !== null) {
    deltas.ecHonesty = {
      diff: a.ec.honestyPct - b.ec.honestyPct,
      winner: Math.abs(a.ec.honestyPct - b.ec.honestyPct) > 5
        ? (a.ec.honestyPct > b.ec.honestyPct ? 'a' : 'b') : null,
    };
  }

  // Sweet Spot % (higher better)
  if (a.weight.sweetSpotPct !== null && b.weight.sweetSpotPct !== null) {
    deltas.sweetSpot = {
      diff: a.weight.sweetSpotPct - b.weight.sweetSpotPct,
      winner: Math.abs(a.weight.sweetSpotPct - b.weight.sweetSpotPct) > 5
        ? (a.weight.sweetSpotPct > b.weight.sweetSpotPct ? 'a' : 'b') : null,
    };
  }

  // Runoff Drift (absolut kleiner besser)
  if (a.runoff.phAvgDelta !== null && b.runoff.phAvgDelta !== null) {
    const aAbs = Math.abs(a.runoff.phAvgDelta);
    const bAbs = Math.abs(b.runoff.phAvgDelta);
    deltas.runoffPh = {
      diff: aAbs - bAbs,
      winner: Math.abs(aAbs - bAbs) > 0.1 ? (aAbs < bAbs ? 'a' : 'b') : null,
    };
  }

  // Training (neutral)
  deltas.trainingCount = { diff: a.training.total - b.training.total, winner: null };

  // Water (neutral)
  deltas.water = { diff: a.water.totalL - b.water.totalL, winner: null };

  return { a, b, deltas };
}

// ---------------------------------------------------------------------
// UI: Zyklus-Vergleichs-Screen
// ---------------------------------------------------------------------

/**
 * State für den Vergleichs-Screen — welche beiden Zyklen ausgewählt sind.
 */
let _compareState = { aId: null, bId: null };

/**
 * Öffnet den Vergleichs-Screen. Wenn initiale IDs übergeben werden,
 * werden diese preselected.
 */
function openCycleCompare(aId = null, bId = null) {
  const allCycles = (S.cycles || []).filter(c => c.startDate);
  if (allCycles.length < 2) {
    toast('⚠ Mindestens 2 Zyklen nötig für Vergleich');
    return;
  }
  // Default: erste zwei Zyklen
  _compareState.aId = aId || allCycles[0].id;
  _compareState.bId = bId || allCycles.find(c => c.id !== _compareState.aId)?.id;
  renderCompareScreen();
}

function closeCycleCompare() {
  const el = document.getElementById('compare-screen');
  if (el) el.remove();
}

function selectCompareCycle(side, id) {
  _compareState[side] = id;
  renderCompareScreen();
}

function renderCompareScreen() {
  let root = document.getElementById('compare-screen');
  if (!root) {
    root = document.createElement('div');
    root.id = 'compare-screen';
    root.setAttribute('data-day-picker', '1');
    root.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;font-family:var(--font);color:var(--text);overflow-y:auto';
    document.body.appendChild(root);
  }

  const allCycles = (S.cycles || []).filter(c => c.startDate);
  const a = allCycles.find(c => c.id === _compareState.aId);
  const b = allCycles.find(c => c.id === _compareState.bId);
  const sumA = a ? summarizeCycle(a) : null;
  const sumB = b ? summarizeCycle(b) : null;
  const cmp = (sumA && sumB) ? compareCycles(sumA, sumB) : null;

  const header = `<div style="flex-shrink:0;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5">
    <button onclick="closeCycleCompare()" style="background:transparent;border:none;color:var(--text-sub);font-size:20px;cursor:pointer;padding:4px 8px">✕</button>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:700">⚖️ Zyklus-Vergleich</div>
      <div style="font-size:11px;color:var(--text-muted)">Gleiche Messungen, zwei Zyklen</div>
    </div>
  </div>`;

  // Dropdowns zum Auswählen
  const makeDropdown = (side, currentId, otherId) => {
    const opts = allCycles.map(c =>
      `<option value="${c.id}" ${c.id === currentId ? 'selected' : ''} ${c.id === otherId ? 'disabled' : ''}>
        ${sym(c)} ${c.name}${c.active ? ' · aktiv' : ''}
      </option>`
    ).join('');
    return `<select onchange="selectCompareCycle('${side}', this.value)" style="width:100%;padding:10px 12px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);font-family:var(--font);cursor:pointer">
      ${opts}
    </select>`;
  };

  const selectors = `<div style="padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;border-bottom:0.5px solid var(--border)">
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:4px">Zyklus A</div>
      ${makeDropdown('aId', _compareState.aId, _compareState.bId)}
    </div>
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:4px">Zyklus B</div>
      ${makeDropdown('bId', _compareState.bId, _compareState.aId)}
    </div>
  </div>`;

  let body = '';
  if (!sumA || !sumB) {
    body = `<div style="padding:40px 20px;text-align:center;color:var(--text-muted)">Zyklen werden geladen…</div>`;
  } else if (_compareState.aId === _compareState.bId) {
    body = `<div style="padding:40px 20px;text-align:center;color:var(--yellow)">⚠ Bitte zwei <b>verschiedene</b> Zyklen auswählen</div>`;
  } else {
    body = renderCompareBody(sumA, sumB, cmp);
  }

  root.innerHTML = header + selectors + `<div style="flex:1;overflow-y:auto;padding:16px" class="scroll">${body}</div>`;
}

/**
 * Rendert die eigentlichen Vergleichs-Karten.
 */
function renderCompareBody(a, b, cmp) {
  // Helfer für Winner-Badge
  const winner = (metric) => cmp?.deltas?.[metric]?.winner || null;
  const badge = (side, m) => winner(m) === side ? '<span style="font-size:10px;background:#b06ac8;color:#fff;padding:2px 6px;border-radius:8px;font-weight:700;margin-left:4px">🏆</span>' : '';

  // Farb-Akzent oben
  const headCard = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <div style="background:${a.color}11;border:1px solid ${a.color}66;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:22px;margin-bottom:2px">${a.symbol}</div>
      <div style="font-size:13px;font-weight:700;color:${a.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${fmtDE(a.startDate,{day:'2-digit',month:'short',year:'2-digit'})} · ${a.totalDays} T.</div>
    </div>
    <div style="background:${b.color}11;border:1px solid ${b.color}66;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:22px;margin-bottom:2px">${b.symbol}</div>
      <div style="font-size:13px;font-weight:700;color:${b.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${fmtDE(b.startDate,{day:'2-digit',month:'short',year:'2-digit'})} · ${b.totalDays} T.</div>
    </div>
  </div>`;

  // Ein Helfer für Metrik-Zeile
  const metricRow = (label, valA, valB, metricKey) => {
    const wa = winner(metricKey);
    const wb = wa === 'b' ? 'b' : wa === 'a' ? 'a' : null;
    return `<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);align-items:center">
      <div style="text-align:right;font-size:13px;${wa==='a'?'font-weight:700;color:'+a.color:'color:var(--text-sub)'}">${valA} ${wa==='a' ? '🏆':''}</div>
      <div style="font-size:10px;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.03em;white-space:nowrap;padding:0 8px">${label}</div>
      <div style="text-align:left;font-size:13px;${wa==='b'?'font-weight:700;color:'+b.color:'color:var(--text-sub)'}">${valB} ${wa==='b' ? '🏆':''}</div>
    </div>`;
  };

  // Meta-Sektion
  const metaSection = `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:6px">📋 Meta</div>
    ${metricRow('Typ', (a.seedType==='auto'?'Auto':'Fem')+' '+(a.growType==='outdoor'?'Outdoor':'Indoor'), (b.seedType==='auto'?'Auto':'Fem')+' '+(b.growType==='outdoor'?'Outdoor':'Indoor'), 'meta_type')}
    ${metricRow('Strain', a.strain || '—', b.strain || '—', 'meta_strain')}
    ${metricRow('Düngeplan', a.presetName || '—', b.presetName || '—', 'meta_preset')}
    ${metricRow('Einträge', a.entries.total, b.entries.total, 'meta_entries')}
    ${metricRow('Fotos', a.photos.total, b.photos.total, 'photos')}
  </div>`;

  // Bewässerung
  const waterSection = `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:6px">💧 Bewässerung</div>
    ${metricRow('Wasser gesamt', a.water.totalL.toFixed(1)+' L', b.water.totalL.toFixed(1)+' L', 'water')}
    ${metricRow('⌀ pH (gemessen)', a.ph.avg !== null ? a.ph.avg.toFixed(2) : '—', b.ph.avg !== null ? b.ph.avg.toFixed(2) : '—', 'phAvg')}
    ${metricRow('⌀ EC (gemessen)', a.ec.avg !== null ? a.ec.avg.toFixed(2) : '—', b.ec.avg !== null ? b.ec.avg.toFixed(2) : '—', 'ecAvg')}
    ${a.weight.sweetSpotPct !== null || b.weight.sweetSpotPct !== null ? metricRow('Sweet-Spot-Quote', a.weight.sweetSpotPct!==null?a.weight.sweetSpotPct+'%':'—', b.weight.sweetSpotPct!==null?b.weight.sweetSpotPct+'%':'—', 'sweetSpot') : ''}
    ${a.runoff.measurements > 0 || b.runoff.measurements > 0 ? metricRow('⌀ Runoff Δ pH', a.runoff.phAvgDelta!==null?(a.runoff.phAvgDelta>0?'+':'')+a.runoff.phAvgDelta.toFixed(2):'—', b.runoff.phAvgDelta!==null?(b.runoff.phAvgDelta>0?'+':'')+b.runoff.phAvgDelta.toFixed(2):'—', 'runoffPh') : ''}
  </div>`;

  // Ehrlichkeits-Sektion
  const honestySection = (a.ph.honestyPct !== null || b.ph.honestyPct !== null) ? `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:6px">📊 Ehrlichkeit der Daten</div>
    ${metricRow('pH gemessen', a.ph.honestyPct !== null ? a.ph.honestyPct + '%' : '—', b.ph.honestyPct !== null ? b.ph.honestyPct + '%' : '—', 'phHonesty')}
    ${metricRow('EC gemessen', a.ec.honestyPct !== null ? a.ec.honestyPct + '%' : '—', b.ec.honestyPct !== null ? b.ec.honestyPct + '%' : '—', 'ecHonesty')}
  </div>` : '';

  // Training
  const trainingSection = (a.training.total > 0 || b.training.total > 0) ? `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:6px">🌿 Training</div>
    ${metricRow('Events gesamt', a.training.total, b.training.total, 'trainingCount')}
    ${(() => {
      const allTypes = new Set([...Object.keys(a.training.byType), ...Object.keys(b.training.byType)]);
      return [...allTypes].map(t => {
        const meta = T.training && T.training[t];
        const label = (meta ? meta.icon + ' ' + meta.label : t);
        return metricRow(label, a.training.byType[t] || 0, b.training.byType[t] || 0, 'training_' + t);
      }).join('');
    })()}
  </div>` : '';

  // Verbrauch — nur Produkte die in beiden vorkommen
  const consumptionSection = (() => {
    const allNames = new Set([...(a.consumption||[]).map(x=>x.name), ...(b.consumption||[]).map(x=>x.name)]);
    if (allNames.size === 0) return '';
    const rows = [...allNames].map(name => {
      const aItem = (a.consumption||[]).find(x=>x.name===name);
      const bItem = (b.consumption||[]).find(x=>x.name===name);
      return metricRow(
        name,
        aItem ? formatConsumption(aItem.totalAll) : '—',
        bItem ? formatConsumption(bItem.totalAll) : '—',
        'consumption_' + name
      );
    }).join('');
    return `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;margin-bottom:6px">🧪 Verbrauch</div>
      ${rows}
    </div>`;
  })();

  // Insights
  const insights = [];
  if (cmp?.deltas?.sweetSpot?.winner) {
    const w = cmp.deltas.sweetSpot.winner === 'a' ? a : b;
    insights.push(`<b style="color:${w.color}">${w.name}</b> hat die bessere Sweet-Spot-Quote (${w === a ? a.weight.sweetSpotPct : b.weight.sweetSpotPct}%) — gezielter gegossen.`);
  }
  if (cmp?.deltas?.phHonesty?.winner) {
    const w = cmp.deltas.phHonesty.winner === 'a' ? a : b;
    insights.push(`<b style="color:${w.color}">${w.name}</b> hat mehr pH-Werte echt gemessen (${w === a ? a.ph.honestyPct : b.ph.honestyPct}%) — weniger Auto-Fill, mehr eigene Kontrolle.`);
  }
  if (cmp?.deltas?.runoffPh?.winner) {
    const w = cmp.deltas.runoffPh.winner === 'a' ? a : b;
    insights.push(`<b style="color:${w.color}">${w.name}</b> hat stabilere Erde (kleinerer Runoff-Δ pH) — Substrat-pH driftet weniger.`);
  }

  const insightsSection = insights.length > 0 ? `<div style="background:rgba(176,106,200,0.06);border:0.5px solid rgba(176,106,200,0.3);border-radius:12px;padding:14px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;margin-bottom:8px">💡 Einsichten</div>
    ${insights.map(i => `<div style="font-size:12px;color:var(--text-sub);line-height:1.6;margin-bottom:6px">• ${i}</div>`).join('')}
  </div>` : '';

  const footer = `<div style="padding:12px;background:var(--card2);border-radius:10px;font-size:10px;color:var(--text-muted);line-height:1.6;margin-top:4px">
    ⚖️ Zyklen mit sehr unterschiedlichen Strain-Typen oder Anbaumethoden sind nur eingeschränkt vergleichbar. Nutze den Vergleich vor allem um <b>dein eigenes Handwerk über die Zeit</b> zu sehen — wo wurdest du besser, wo nicht.
  </div>`;

  return headCard + insightsSection + metaSection + waterSection + honestySection + trainingSection + consumptionSection + footer;
}

// =====================================================================
//  [SEKTION]: LOAD / SAVE
// =====================================================================
function loadS() {
  try {
    for (const k of ['growsmart_v4','growsmart_v3','growsmart_v2','growsmart_data']) {
      const s = localStorage.getItem(k);
      if (s) {
        S = Object.assign({
          cycles: [], entries: {}, products: [], weekSchedule: {},
          potSize: 11, presetKey: null, mixOrder: null, mixInfo: null,
        }, JSON.parse(s));
        break;
      }
    }
  } catch (e) {}

  if (!S.products || !S.products.length) S.products = [];
  if (!S.weekSchedule) S.weekSchedule = {};
  if (!S.potSize) S.potSize = 11;
  // Migrate old 'biobizz' preset key to new 'biobizz_master' (Classic was renamed to Master in v0.8.68)
  if (S.presetKey === 'biobizz') S.presetKey = 'biobizz_master';
  // E5: Beginner mode flag. Default: true for fresh installs (S.beginnerMode === undefined)
  // but stays whatever user has set after that.
  if (S.beginnerMode === undefined) S.beginnerMode = (S.cycles.length === 0);

  // v0.9 Fertilizer plan migration: legacy had global products+schedule.
  // Now each plan is a named entity in S.fertPlans {id, name, products, weekSchedule,
  // mixOrder, mixInfo, drainInfo, presetKey}. Cycles reference one via c.fertPlanId.
  // On migration, wrap existing global data into a single "Mein Plan" entry.
  if (!S.fertPlans) {
    S.fertPlans = [];
    const hasLegacyData = (S.products && S.products.length > 0)
      || (S.weekSchedule && Object.keys(S.weekSchedule).length > 0)
      || S.presetKey;
    if (hasLegacyData) {
      const legacyName = S.presetKey
        ? (typeof FERT_PRESETS !== 'undefined' ? getPreset(S.presetKey)?.name : null) || 'Mein Plan'
        : 'Mein Plan';
      // Extract weeks with 'global_w' prefix; ignore cycle-specific overrides for now
      const legacySched = {};
      Object.entries(S.weekSchedule || {}).forEach(([key, val]) => {
        if (key.startsWith('global_w')) legacySched[key.replace('global_', '')] = val;
      });
      S.fertPlans.push({
        id: 'fp_legacy_' + Date.now(),
        name: legacyName,
        products: (S.products || []).map(p => ({...p})),
        schedule: legacySched,
        mixOrder: S.mixOrder ? [...S.mixOrder] : [],
        mixInfo: S.mixInfo || '',
        drainInfo: S.drainInfo || null,
        presetKey: S.presetKey || null,
        createdAt: Date.now(),
      });
    }
  }

  // Migrate from old offset system → offsetHistory per cycle
  S.cycles.forEach((c, i) => {
    if (!c.colorId)    c.colorId = COLORS[i % COLORS.length].id;
    if (!c.symbol)     c.symbol = SYMS[i % SYMS.length];
    if (c.intAnzucht === undefined) c.intAnzucht = RI.anzucht;
    if (c.intBloom === undefined)   c.intBloom = RI.bloom;
    if (c.intFlush === undefined)   c.intFlush = RI.flush;
    if (c.intIce === undefined)     c.intIce = RI.ice;
    if (c.intErnte === undefined)   c.intErnte = RI.ernte;
    if (c.intDry === undefined)     c.intDry = RI.dry;
    if (c.toppingPause === undefined) c.toppingPause = 2;
    if (!c.skippedDays) c.skippedDays = [];
    if (!c.seedType) c.seedType = 'auto';
    if (!c.lightVeg) c.lightVeg = '18/6';
    if (!c.lightBloom) c.lightBloom = '18/6';
    if (c.archived === undefined) c.archived = false;

    // Outdoor-support migration: legacy cycles default to indoor.
    // growType: 'indoor' | 'outdoor'
    // hemisphere: 'north' | 'south' — used for outdoor photoperiod phase derivation.
    // phaseMode: vestigial field — not user-facing anymore. Outdoor-Photoperiode
    //   nutzt IMMER saisonale Ableitung (via bloomStartDate). Feld bleibt nur
    //   aus Rückwärtskompatibilität im Datenmodell, wird aber nicht gelesen.
    if (!c.growType) c.growType = 'indoor';
    if (!c.hemisphere) c.hemisphere = 'north';
    if (!c.phaseMode) c.phaseMode = 'days';
    // Outdoor-Photoperiode: transplantDate (wann geht raus). Legacy-Zyklen haben
    // das nicht — bleibt null, dann klassische Anzucht-Phase ohne Aufteilung.
    if (c.transplantDate === undefined) c.transplantDate = null;

    // RESTGEWICHT-MODUL (Meisterwerk Phase 2):
    // Drei Modi für Bewässerungs-Entscheidungen:
    //   'off'   = keine Messung, App nutzt biophysikalische Schätzung (Fallback)
    //   'lift'  = Hebe-Test (User schätzt Restgewicht in % per Gefühl)
    //   'scale' = Waage (User trägt echtes Gramm-Gewicht ein, App rechnet um)
    //
    // Für 'scale'-Modus braucht die App zwei Referenz-Gewichte:
    //   saturatedWeight: Topfgewicht direkt nach gutem Guss (100% Restgewicht)
    //   dryWeight:       Topfgewicht wenn bone-dry (0% Restgewicht)
    // Wasserkapazität = Saturated - Dry
    // Restgewicht% = ((Aktuell - Dry) / (Saturated - Dry)) * 100
    if (c.weightMode === undefined) c.weightMode = 'off';
    if (c.saturatedWeight === undefined) c.saturatedWeight = null; // in Gramm
    if (c.dryWeight === undefined) c.dryWeight = null; // in Gramm

    // v0.9: assign fertPlanId. If a legacy plan was migrated, all old cycles use it.
    if (!c.fertPlanId) {
      c.fertPlanId = S.fertPlans.length > 0 ? S.fertPlans[0].id : null;
    }

    // Migration: old dayOffset/offsetDate → offsetHistory
    if (!c.offsetHistory) {
      c.offsetHistory = [];
      if (c.dayOffset && c.dayOffset !== 0 && c.offsetDate) {
        c.offsetHistory.push({ date: c.offsetDate, offset: c.dayOffset });
      }
    }
    // Clean up legacy fields
    delete c.dayOffset;
    delete c.offsetDate;
    delete c.bakedOffset;
    delete c.bakedOffsetDate;
  });

  // Remove legacy skipDays
  delete S.skipDays;
}

/**
 * Return the fertilizer plan for a cycle (by cycle object or cycleId).
 * If no cycle/plan found, returns null.
 */
function getPlanForCycle(cycOrId) {
  if (!S.fertPlans) return null;
  const c = typeof cycOrId === 'string' ? S.cycles.find(x => x.id === cycOrId) : cycOrId;
  if (!c || !c.fertPlanId) return null;
  return S.fertPlans.find(p => p.id === c.fertPlanId) || null;
}

/**
 * Return the plan currently being shown/edited in the Dünger screen.
 * Priority: user's active-plan selection > first active cycle's plan > first plan.
 * Returns null only if there are no plans at all.
 */
function getActivePlan() {
  if (!S.fertPlans || !S.fertPlans.length) return null;
  if (S._activePlanId) {
    const found = S.fertPlans.find(p => p.id === S._activePlanId);
    if (found) return found;
  }
  // Fall back: plan of first active cycle
  const act = (S.cycles || []).filter(c => c.active && !c.archived);
  if (act.length > 0) {
    const byCyc = getPlanForCycle(act[0]);
    if (byCyc) return byCyc;
  }
  return S.fertPlans[0];
}

/**
 * Mirror the active plan into legacy global fields (S.products, S.weekSchedule,
 * S.mixOrder, S.mixInfo, S.drainInfo, S.presetKey) so existing read-sites keep
 * working without a big-bang refactor. Call this before any render of
 * Dünger screen or entry that shows doses. Call also after mutations that
 * modify global fields — syncGlobalsToActivePlan() does the inverse.
 */
function syncActivePlanToGlobals() {
  const plan = getActivePlan();
  if (!plan) {
    // No plan at all: reset globals to empty
    S.products = [];
    S.weekSchedule = {};
    S.mixOrder = [];
    S.mixInfo = '';
    S.drainInfo = null;
    S.presetKey = null;
    return;
  }
  S.products = plan.products || [];
  // Legacy weekSchedule uses 'global_wN' keys; plan stores 'wN'
  const legacy = {};
  Object.entries(plan.schedule || {}).forEach(([k, v]) => {
    legacy[k.startsWith('w') ? 'global_' + k : k] = v;
  });
  S.weekSchedule = legacy;
  S.mixOrder = plan.mixOrder || [];
  S.mixInfo = plan.mixInfo || '';
  S.drainInfo = plan.drainInfo || null;
  S.presetKey = plan.presetKey || null;
}

/**
 * Inverse of syncActivePlanToGlobals(): copy legacy global fields back into
 * the currently active plan. Call after any code that wrote to S.products /
 * S.weekSchedule / S.mixOrder etc., so the plan stays the source of truth.
 */
function syncGlobalsToActivePlan() {
  const plan = getActivePlan();
  if (!plan) return;
  plan.products = (S.products || []).map(p => ({...p}));
  // Extract 'global_wN' → 'wN' for plan storage
  const sched = {};
  Object.entries(S.weekSchedule || {}).forEach(([k, v]) => {
    if (k.startsWith('global_w')) sched[k.replace('global_', '')] = v;
  });
  plan.schedule = sched;
  plan.mixOrder = [...(S.mixOrder || [])];
  plan.mixInfo = S.mixInfo || '';
  plan.drainInfo = S.drainInfo || null;
  plan.presetKey = S.presetKey || null;
  plan.updatedAt = Date.now();
}

function saveS() {
  try {
    // Sync: legacy global fields → active plan (plan is source of truth)
    syncGlobalsToActivePlan();
    // Consolidate offsetHistory (only when needed)
    S.cycles.forEach(c => {
      if (c.offsetHistory && c.offsetHistory.length > 1) {
        const merged = {};
        for (const e of c.offsetHistory) {
          merged[e.date] = (merged[e.date] || 0) + e.offset;
        }
        c.offsetHistory = Object.entries(merged)
          .filter(([, off]) => off !== 0)
          .map(([date, offset]) => ({ date, offset }))
          .sort((a, b) => a.date.localeCompare(b.date));
      }
    });

    // Orphan cleanup only on debounced saves (not on every keystroke)
    const now = Date.now();
    if (!saveS._lastUndo || now - saveS._lastUndo > 2000) {
      // Clean up orphaned cycleData
      const cycleIds = new Set(S.cycles.map(c => c.id));
      Object.keys(S.entries).forEach(d => {
        const e = S.entries[d];
        if (e?.cycleData) {
          Object.keys(e.cycleData).forEach(cId => {
            if (!cycleIds.has(cId)) delete e.cycleData[cId];
          });
        }
      });
      pushUndo();
      saveS._lastUndo = now;
    }
    localStorage.setItem(SK, JSON.stringify(S));
    _flashSaved();
  } catch (e) {
    // Quota exceeded is the critical case we need to surface to the user
    if (e && (e.name === 'QuotaExceededError' || e.code === 22)) {
      // Rate-limit: only warn once per 5min (same throttle as maybeWarnStorageQuota)
      const now = Date.now();
      if (!saveS._lastQuotaErr || now - saveS._lastQuotaErr > 300000) {
        saveS._lastQuotaErr = now;
        toast('⚠ Speicher voll — Eintrag nicht gesichert! Bitte Foto-Löschen oder JSON-Export nutzen.');
      }
    }
    // Other errors (DOMException in private mode, etc.) silently ignored —
    // nothing sensible we can do, and we don't want to spam toasts.
  }
}

// Subtle save indicator - shows a small dot briefly
let _saveIndicator = null;
function _flashSaved() {
  if (!_saveIndicator) {
    _saveIndicator = document.createElement('div');
    _saveIndicator.style.cssText = 'position:fixed;top:calc(env(safe-area-inset-top) + 14px);right:14px;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;box-shadow:0 0 8px var(--green)';
    document.body.appendChild(_saveIndicator);
  }
  _saveIndicator.style.opacity = '1';
  clearTimeout(_flashSaved._t);
  _flashSaved._t = setTimeout(() => { _saveIndicator.style.opacity = '0'; }, 600);
}

let _modalResolve = null;

/**
 * Show a custom confirm dialog. Returns a Promise<boolean>.
 * Usage: const ok = await customConfirm('Titel', 'Nachricht', 'Löschen', '#e06060');
 */
function customConfirm(title, msg, okText = 'OK', okColor = 'var(--red)') {
  return new Promise((resolve) => {
    _modalResolve = resolve;
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').textContent = msg;
    const okBtn = document.getElementById('modal-ok');
    okBtn.textContent = okText;
    okBtn.style.background = okColor;
    document.getElementById('modal-overlay').classList.add('show');
  });
}

/**
 * Einfaches Text-Input-Modal. Dynamisch erzeugt (eigenes Overlay, nicht
 * das globale Modal-DOM — dieses erwartet feste textContent-Nodes).
 * @returns {Promise<string|null>} Getipter Text oder null bei Abbruch.
 */
function customPrompt({ title, msg = '', placeholder = '', initial = '', multiline = false, okText = 'OK' } = {}) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10002;display:flex;align-items:center;justify-content:center;padding:16px;font-family:var(--font)';
    const field = multiline
      ? `<textarea id="custom-prompt-input" placeholder="${placeholder.replace(/"/g,'&quot;')}" rows="6" style="width:100%;box-sizing:border-box;padding:10px 12px;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);font-family:var(--mono);resize:vertical">${initial}</textarea>`
      : `<input id="custom-prompt-input" type="text" placeholder="${placeholder.replace(/"/g,'&quot;')}" value="${initial}" style="width:100%;box-sizing:border-box;padding:10px 12px;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);font-family:var(--font)"/>`;
    overlay.innerHTML = `
      <div style="background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:20px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">${title}</div>
        ${msg ? `<div style="font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:12px">${msg}</div>` : ''}
        ${field}
        <div style="display:flex;gap:8px;margin-top:14px">
          <button id="custom-prompt-cancel" style="flex:1;padding:10px;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;font-family:var(--font)">Abbrechen</button>
          <button id="custom-prompt-ok" style="flex:1;padding:10px;background:var(--green);border:none;border-radius:10px;font-size:13px;color:#fff;font-weight:700;cursor:pointer;font-family:var(--font)">${okText}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#custom-prompt-input');
    setTimeout(() => { inp.focus(); if (initial) inp.select(); }, 50);
    overlay.querySelector('#custom-prompt-cancel').onclick = () => { overlay.remove(); resolve(null); };
    overlay.querySelector('#custom-prompt-ok').onclick = () => {
      const val = inp.value;
      overlay.remove();
      resolve(val);
    };
    // Enter zum Bestätigen (nur bei Single-Line)
    if (!multiline) {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') overlay.querySelector('#custom-prompt-ok').click();
        if (e.key === 'Escape') overlay.querySelector('#custom-prompt-cancel').click();
      });
    }
  });
}

document.getElementById('modal-cancel').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('show');

};
document.getElementById('modal-ok').onclick = () => {
  document.getElementById('modal-overlay').classList.remove('show');

};

/**
 * Zahlen-Eingabe-Dialog. Ersetzt native prompt() mit konsistentem UI.
 *
 * @param {object} opts
 *   title   string — Überschrift
 *   msg     string — Erklärung (HTML erlaubt)
 *   unit    string — Einheits-Label (z.B. 'g', 'ml', '%')
 *   hint    string — Hilfstext unter dem Input (z.B. Bereichs-Hinweis)
 *   initial number|null — Vorbelegung des Feldes
 *   okText  string — Bestätigen-Button-Text
 *   min     number — Minimum (optional, zur Validierung)
 *   max     number — Maximum (optional)
 * @returns {Promise<number|null>} eingegebener Wert, oder null bei Abbruch
 */
let _inputModalResolve = null;
function customInput({ title, msg = '', unit = '', hint = '', initial = null, okText = 'OK', min = null, max = null } = {}) {
  return new Promise((resolve) => {
    _inputModalResolve = resolve;
    document.getElementById('input-modal-title').textContent = title || '';
    const msgEl = document.getElementById('input-modal-msg');
    msgEl.innerHTML = msg;
    msgEl.style.display = msg ? 'block' : 'none';
    document.getElementById('input-modal-unit').textContent = unit || '';
    document.getElementById('input-modal-hint').textContent = hint || '';
    const field = document.getElementById('input-modal-field');
    field.value = initial !== null && initial !== undefined ? String(initial) : '';
    if (min !== null) field.min = min; else field.removeAttribute('min');
    if (max !== null) field.max = max; else field.removeAttribute('max');
    document.getElementById('input-modal-ok').textContent = okText;
    document.getElementById('input-modal-overlay').classList.add('show');
    setTimeout(() => { field.focus(); field.select(); }, 50);
  });
}
document.getElementById('input-modal-cancel').onclick = () => {
  document.getElementById('input-modal-overlay').classList.remove('show');
  if (_inputModalResolve) { _inputModalResolve(null); _inputModalResolve = null; }
};
document.getElementById('input-modal-ok').onclick = () => {
  const val = parseFloat(document.getElementById('input-modal-field').value);
  document.getElementById('input-modal-overlay').classList.remove('show');
  if (_inputModalResolve) {
    _inputModalResolve(isFinite(val) ? val : null);
    _inputModalResolve = null;
  }
};
// Enter = OK, Escape = Cancel
document.getElementById('input-modal-field').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('input-modal-ok').click();
  if (e.key === 'Escape') document.getElementById('input-modal-cancel').click();
});

/**
 * Öffnet den Symptom-Checker — ein Overlay mit 6 Symptom-Karten.
 * Nach Klick auf ein Symptom: zeigt die möglichen Ursachen mit Handlungsempfehlung.
 */
function openSymptomChecker() {
  const overlay = document.createElement('div');
  overlay.setAttribute('data-symptom', '1');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10004;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;animation:modalIn 0.2s ease';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const buttons = SYMPTOMS.map(s => `
    <button onclick="showSymptomDetail('${s.id}')" style="display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;font-family:var(--font);color:var(--text);text-align:left;margin-bottom:8px">
      <span style="font-size:26px;flex-shrink:0">${s.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:var(--text)">${s.title}</div>
        <div style="font-size:11px;color:var(--text-muted);line-height:1.4;margin-top:2px">${s.subtitle}</div>
      </div>
      <span style="color:var(--text-muted);font-size:18px">›</span>
    </button>
  `).join('');

  overlay.innerHTML = `
    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:22px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6);margin:auto 0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="font-size:28px">🆘</span>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;color:var(--text)">Pflanzen-Check</div>
          <div style="font-size:12px;color:var(--text-muted);line-height:1.4">Was siehst du an deiner Pflanze?</div>
        </div>
        <button onclick="this.closest('[data-symptom]').remove()" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:0 4px">✕</button>
      </div>
      ${buttons}
      <div style="font-size:10px;color:var(--text-hint);line-height:1.5;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)">
        💡 Kein perfektes Werkzeug — nur Orientierung. Bei ernsten Problemen auch Fachforen oder Grow-Shop fragen.
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

/**
 * Detail-View: zeigt alle Ursachen zum gewählten Symptom.
 */
function showSymptomDetail(symptomId) {
  const s = SYMPTOMS.find(x => x.id === symptomId);
  if (!s) return;

  // Alten Overlay ersetzen
  document.querySelectorAll('[data-symptom]').forEach(x => x.remove());

  const overlay = document.createElement('div');
  overlay.setAttribute('data-symptom', '1');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10004;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;animation:modalIn 0.2s ease';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const causes = s.causes.map(c => {
    const lexBtn = c.lex
      ? `<button onclick="document.querySelectorAll('[data-symptom]').forEach(x=>x.remove());openLexikonEntry('${c.lex.replace(/'/g, "\\'")}')" style="background:var(--card2);border:0.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:10px;color:var(--blue);cursor:pointer;font-family:var(--font);font-weight:600;margin-top:6px">📖 Im Lexikon nachlesen</button>`
      : '';
    return `
      <div style="background:var(--card);border-left:3px solid ${c.color};border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:3px">${c.heading}</div>
        <div style="font-size:14px;font-weight:700;color:${c.color};margin-bottom:6px">${c.verdict}</div>
        <div style="font-size:12px;color:var(--text-sub);line-height:1.6">${c.text}</div>
        ${c.when ? `<div style="font-size:10px;color:var(--text-hint);margin-top:6px">⏱ Typisch: ${c.when}</div>` : ''}
        ${lexBtn}
      </div>
    `;
  }).join('');

  overlay.innerHTML = `
    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:22px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6);margin:auto 0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button onclick="openSymptomChecker()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:0 4px">‹</button>
        <span style="font-size:28px">${s.icon}</span>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:var(--text)">${s.title}</div>
          <div style="font-size:11px;color:var(--text-muted)">Mögliche Ursachen</div>
        </div>
        <button onclick="this.closest('[data-symptom]').remove()" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:0 4px">✕</button>
      </div>
      ${causes}
      <div style="font-size:10px;color:var(--text-hint);line-height:1.5;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)">
        💡 Diese Hinweise ersetzen keine professionelle Beratung. Im Zweifel Grow-Shop oder Fachforum fragen.
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

  overlay.innerHTML = `

// =====================================================================
//  [SEKTION]: UNDO/REDO SYSTEM – Snapshots of state, max 20 steps
// =====================================================================
const UNDO_MAX = 20;
let undoStack = [];
let redoStack = [];

/** Push current state onto undo stack (call BEFORE making changes) */
function pushUndo() {
  try {
    undoStack.push(JSON.stringify(S));
    if (undoStack.length > UNDO_MAX) undoStack.shift();
    redoStack = []; // neue Aktion löscht Redo-History
  } catch (e) {}
}

/** Rückgängig – Pop last state, push current to redo */
function doUndo() {
  if (undoStack.length === 0) {
    toast('↩ Nichts zum Rückgängig machen');
    return;
  }
  try {
    // Aktuellen Zustand auf Redo-Stack
    redoStack.push(JSON.stringify(S));
    if (redoStack.length > UNDO_MAX) redoStack.shift();

    const prev = JSON.parse(undoStack.pop());
    S = Object.assign({
      cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
    }, prev);
    S.cycles.forEach(c => {
      if (!c.offsetHistory) c.offsetHistory = [];
      if (c.toppingPause === undefined) c.toppingPause = 2;
      if (!c.skippedDays) c.skippedDays = [];
      delete c.dayOffset; delete c.offsetDate;
    });
    try { localStorage.setItem(SK, JSON.stringify(S)); } catch (e2) {}
    vibrate();
    toast(`↩ Rückgängig (${undoStack.length} übrig)`);
    _rerender();
  } catch (e) { toast('Fehler beim Rückgängig'); }
}

/** Wiederherstellen – Pop from redo, push current to undo */
function doRedo() {
  if (redoStack.length === 0) {
    toast('↪ Nichts zum Wiederherstellen');
    return;
  }
  try {
    undoStack.push(JSON.stringify(S));
    if (undoStack.length > UNDO_MAX) undoStack.shift();

    const next = JSON.parse(redoStack.pop());
    S = Object.assign({
      cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
    }, next);
    S.cycles.forEach(c => {
      if (!c.offsetHistory) c.offsetHistory = [];
      if (c.toppingPause === undefined) c.toppingPause = 2;
      if (!c.skippedDays) c.skippedDays = [];
      delete c.dayOffset; delete c.offsetDate;
    });
    try { localStorage.setItem(SK, JSON.stringify(S)); } catch (e2) {}
    vibrate();
    toast(`↪ Wiederhergestellt (${redoStack.length} übrig)`);
    _rerender();
  } catch (e) { toast('Fehler beim Wiederherstellen'); }
}

/** Re-render the currently active screen */
function _rerender() {

  else if (document.getElementById('scr-cal').classList.contains('active')) renderCal();
  else if (document.getElementById('scr-dash').classList.contains('active')) renderDash();

}

let _debugDate = null; // Set to '2026-05-15' etc. for testing
function todayISO() { return _debugDate || new Date().toISOString().split('T')[0]; }
function setDebugDate(v) {

  vibrate();
  toast(_debugDate ? `🧪 Datum: ${fmtDE(_debugDate, {day:'2-digit',month:'short',year:'numeric'})}` : '🧪 Echtes Datum');

function iso12(iso) { return new Date(iso + 'T12:00:00'); }
function isoPlus(iso, d) { const o = iso12(iso); o.setDate(o.getDate() + d); return o.toISOString().split('T')[0]; }
function isoDiff(a, b) { return Math.round((iso12(a) - iso12(b)) / 86400000); }
function fmtDE(iso, o) { return iso12(iso).toLocaleDateString('de-DE', o || { day: '2-digit', month: '2-digit' }); }
