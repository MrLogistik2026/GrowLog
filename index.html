<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrowSmart"/>
<link rel="manifest" href="manifest.json"/>
<title>GrowSmart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f0f;--surface:#161616;--card:#1c1c1c;--card2:#212121;
  --border:#2a2a2a;
  --green:#4caf70;--green-dk:#2d6e45;--green-bg:#0d1e0d;--green-mid:#162216;--green-hint:#3a6e4a;
  --blue:#5aabf0;--teal:#5adada;--teal-bg:#0e1a1a;--teal-bd:#1e3535;
  --red:#e06060;--red-bg:#2a0d0d;
  --text:#e0e0e0;--text-sub:#aaa;--text-muted:#666;--text-hint:#555;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
#app{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px;}
.scroll::-webkit-scrollbar{display:none;}
.topbar{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tb-title{font-size:14px;font-weight:500;color:var(--text);}
.app-title{font-size:17px;font-weight:600;color:var(--text);}
.icon-btn{background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px;}
.save-pill{background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:7px;padding:5px 12px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--font);}
.bottom-nav{background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 6px;cursor:pointer;background:none;border:none;opacity:0.45;transition:opacity 0.15s;}
.nav-btn.active{opacity:1;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;color:var(--green);font-weight:500;font-family:var(--font);}
.card{background:var(--card);border-radius:14px;border:0.5px solid var(--border);padding:14px;}
.sect-head{font-size:11px;color:var(--green);font-weight:500;letter-spacing:0.06em;padding:4px 0 2px;}
.stat-row{display:flex;gap:8px;}
.stat-box{flex:1;background:var(--surface);border-radius:10px;padding:10px 12px;}
.stat-lbl{font-size:11px;color:var(--text-hint);margin-bottom:3px;}
.stat-val{font-size:18px;font-weight:500;color:var(--text);}
.stat-unit{font-size:11px;color:var(--text-hint);}
.prog-bg{height:5px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.inp-wrap{display:flex;flex-direction:column;gap:3px;flex:1;}
.inp-label{font-size:11px;color:var(--text-hint);}
.inp-field{background:#1c1c1c;border:0.5px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text-sub);font-size:13px;font-family:var(--font);width:100%;outline:none;}
.inp-field:focus{border-color:var(--green-hint);}
.row2{display:flex;gap:8px;}
/* VPD */
.vpd-box{background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.vpd-val{font-size:22px;font-weight:500;color:var(--teal);font-family:var(--mono);}
.vpd-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;margin-top:4px;}
.vpd-scale{display:flex;height:6px;border-radius:3px;overflow:hidden;}
.vpd-seg{flex:1;}
.vpd-mrow{position:relative;height:8px;}
.vpd-marker{position:absolute;top:0;width:2px;height:10px;background:#fff;border-radius:2px;transition:left 0.3s;}
/* TABLE */
.tbl-hdr{border-radius:10px 10px 0 0;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.tbl-wrap{background:var(--surface);border:0.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.tbl-head{display:grid;grid-template-columns:1fr 52px 56px;padding:5px 10px;border-bottom:0.5px solid var(--border);}
.th{font-size:11px;color:var(--green);font-weight:500;}
.th:not(:first-child){text-align:right;}
.tbl-row{display:grid;grid-template-columns:1fr 52px 56px;padding:5px 10px;border-bottom:0.5px solid #1e1e1e;align-items:center;}
.tbl-row:last-child{border:none;}
.tbl-row:nth-child(odd){background:#191919;}
.tbl-row:nth-child(even){background:var(--surface);}
.t-name{font-size:12px;color:#999;}
.t-hint{font-size:12px;color:var(--green-hint);text-align:right;font-family:var(--mono);}
.t-inp{background:#1e1e1e;border:0.5px solid var(--border);border-radius:5px;padding:3px 6px;color:#bbb;font-size:12px;font-family:var(--mono);width:52px;text-align:right;outline:none;}
.t-inp:focus{border-color:var(--green-hint);}
.note-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;}
.note-ta{background:#1c1c1c;border:0.5px solid var(--border);border-radius:7px;padding:8px 10px;color:#aaa;font-size:12px;font-family:var(--font);width:100%;min-height:65px;resize:none;outline:none;line-height:1.6;}
.note-ta:focus{border-color:var(--green-hint);}
.big-save{border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:500;color:#d0f0e0;width:100%;cursor:pointer;font-family:var(--font);}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:0.9;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;border:0.5px solid transparent;background:#181818;user-select:none;padding:2px;}
.cal-cell.today{border:2px solid #fff!important;}
.cal-num{font-size:13px;color:var(--text-sub);font-weight:600;line-height:1;}
.cal-cell.today .cal-num{color:#fff;}
.cal-tag{font-size:8px;color:rgba(255,255,255,0.7);line-height:1;margin-top:1px;text-align:center;}
.cal-icon{font-size:13px;line-height:1;margin-bottom:1px;}
.cal-dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:2px;right:3px;}
/* ALERTS */
.alert{border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;border:0.5px solid transparent;}
.alert-icon{font-size:18px;flex-shrink:0;}
.alert-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;}
.alert-text{font-size:11px;color:var(--text-sub);line-height:1.5;}
/* NEXT WATER CARD */
.next-water{border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;border:0.5px solid transparent;}
/* SETTINGS */
.tab-row{display:flex;gap:6px;flex-wrap:wrap;}
.tab-item{display:flex;align-items:center;gap:6px;background:var(--surface);border-radius:8px;padding:6px 12px;border:0.5px solid var(--border);cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--font);}
.tab-item.active{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.dur-grid{display:flex;flex-wrap:wrap;gap:8px;}
.dur-box{display:flex;flex-direction:column;gap:3px;width:calc(33% - 6px);}
.dur-lbl{font-size:11px;color:var(--text-hint);}
.dur-inp{background:var(--card2);border:0.5px solid var(--border);border-radius:7px;padding:6px;color:var(--text-sub);font-size:13px;text-align:center;width:100%;outline:none;font-family:var(--mono);}
.sub-head{font-size:11px;color:var(--text-hint);font-weight:500;margin-top:8px;margin-bottom:4px;}
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.sw{position:relative;width:44px;height:26px;cursor:pointer;}
.sw input{opacity:0;width:0;height:0;}
.sl{position:absolute;inset:0;background:#333;border-radius:26px;transition:0.2s;}
.sl:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#888;border-radius:50%;transition:0.2s;}
input:checked+.sl{background:var(--green-dk);}
input:checked+.sl:before{transform:translateX(18px);background:var(--green);}
.del-btn{display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;background:none;border:none;font-size:13px;color:var(--red);font-family:var(--font);}
.sec-toggle{background:var(--card);border-radius:12px;border:0.5px solid var(--border);padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text);}
.sec-toggle span{flex:1;}
.add-btn{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--font);}
.sav-btn{border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:500;color:#fff;width:100%;cursor:pointer;font-family:var(--font);margin-top:6px;}
/* COLOR/SYMBOL PICKER */
.pick-row{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0;}
.col-opt{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s;}
.col-opt.sel{border-color:#fff;transform:scale(1.2);}
.sym-opt{width:36px;height:36px;border-radius:10px;background:var(--card2);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.15s;}
.sym-opt.sel{border-color:#fff;transform:scale(1.15);}
/* AI */
.ai-fetch-btn{background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:12px;padding:14px;text-align:center;cursor:pointer;font-size:14px;color:var(--green);font-weight:500;font-family:var(--font);width:100%;}
.nut-row{display:flex;align-items:center;gap:8px;}
.nut-name{font-size:12px;color:var(--text-muted);width:90px;flex-shrink:0;}
.nut-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.nut-fill{height:100%;border-radius:2px;}
.nut-val{font-size:12px;font-weight:500;width:50px;text-align:right;font-family:var(--mono);}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 20px;text-align:center;}
.empty-icon{font-size:40px;opacity:0.3;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#ddd;padding:10px 22px;border-radius:22px;font-size:13px;z-index:9999;border:0.5px solid #444;pointer-events:none;opacity:0;transition:opacity 0.25s;white-space:nowrap;}
#toast.show{opacity:1;}
#ctx-menu{position:fixed;z-index:9998;background:#1e1e1e;border:0.5px solid #3a3a3a;border-radius:14px;padding:6px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.7);display:none;}
#ctx-menu.show{display:block;}
.ctx-item{padding:12px 16px;border-radius:10px;font-size:13px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:10px;}
.ctx-item:active{background:#2a2a2a;}
.ctx-item.green{color:var(--green);}
.ctx-item.red{color:var(--red);}
.ctx-icon{font-size:15px;width:22px;text-align:center;}
.ctx-div{height:0.5px;background:#333;margin:4px 0;}
#ctx-ov{position:fixed;inset:0;z-index:9997;display:none;}
#ctx-ov.show{display:block;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="scr-dash">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">🌿 GrowSmart</span>
      <button class="icon-btn" onclick="openEntry(todayISO())">＋</button>
    </div>
    <div class="scroll" id="dash-body"></div>
    <nav class="bottom-nav" id="nav-dash"></nav>
  </div>
  <div class="screen" id="scr-cal">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button onclick="changeMonth(-1)" style="background:none;border:none;color:var(--green);font-size:26px;cursor:pointer;padding:0 10px;line-height:1">‹</button>
      <span style="font-size:16px;font-weight:500" id="cal-lbl">–</span>
      <button onclick="changeMonth(1)" style="background:none;border:none;color:var(--green);font-size:26px;cursor:pointer;padding:0 10px;line-height:1">›</button>
    </div>
    <div class="scroll" id="cal-body"></div>
    <nav class="bottom-nav" id="nav-cal"></nav>
  </div>
  <div class="screen" id="scr-ai">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">✦ KI-Coach</span>
    </div>
    <div class="scroll" id="ai-body"></div>
    <nav class="bottom-nav" id="nav-ai"></nav>
  </div>
  <div class="screen" id="scr-set">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">Einstellungen</span>
    </div>
    <div class="scroll" id="set-body"></div>
    <nav class="bottom-nav" id="nav-set"></nav>
  </div>
  <div class="screen" id="scr-entry">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button class="icon-btn" id="entry-back-btn" style="font-size:20px">←</button>
      <span class="tb-title" id="entry-title">Eintrag</span>
      <button class="save-pill" onclick="saveEntry()">Speichern</button>
    </div>
    <div class="scroll" id="entry-body"></div>
  </div>
</div>
<div id="ctx-ov" onclick="closeCtx()"></div>
<div id="ctx-menu"></div>
<div id="toast"></div>
<script>
// ============================================================
// CONSTANTS
// ============================================================
const COLORS=[
  {id:'g1',hex:'#4caf70',dk:'#071a0c'},{id:'g2',hex:'#5aabf0',dk:'#071422'},
  {id:'g3',hex:'#e8884a',dk:'#1e0e04'},{id:'g4',hex:'#b06ac8',dk:'#150820'},
  {id:'g5',hex:'#f0d050',dk:'#1e1a04'},{id:'g6',hex:'#e06060',dk:'#1e0606'},
  {id:'g7',hex:'#5adada',dk:'#041616'},{id:'g8',hex:'#a0c840',dk:'#101a04'},
];
const SYMS=['🌿','🌸','🍀','🌴','🌵','🍁','🌾','⭐','🔥','💎'];
const NUTRIENTS=[
  {key:'root_juice',label:'1. Root-Juice'},{key:'bio_grow',label:'2. Bio-Grow'},
  {key:'bio_bloom',label:'3. Bio-Bloom'},{key:'top_max',label:'4. Top-Max'},
  {key:'bio_heaven',label:'5. Bio-Heaven'},{key:'alg_a_mic',label:'6. Alg-A-Mic'},
  {key:'acti_vera',label:'7. Acti-Vera'},{key:'calmag',label:'8. Calmag'}
];
const PHASE_NAMES={anzucht:'Anzucht',bloom:'Blüte',flush:'Spülen',ice:'IceFlush',harvest:'Ernte',dry:'Trocknen'};
// Smart recommended intervals per phase
const REC_INT={anzucht:4,bloom:3,flush:2,ice:2};
const DEFAULT_SCH={
  1:{root_juice:4,bio_grow:0,bio_bloom:0,top_max:0,bio_heaven:2,alg_a_mic:0,acti_vera:0,calmag:0.3},
  2:{root_juice:0,bio_grow:2,bio_bloom:0,top_max:0,bio_heaven:2,alg_a_mic:0,acti_vera:2,calmag:0.3},
  3:{root_juice:0,bio_grow:2,bio_bloom:1,top_max:1,bio_heaven:2,alg_a_mic:1,acti_vera:2,calmag:0.3},
  4:{root_juice:0,bio_grow:3,bio_bloom:2,top_max:1,bio_heaven:3,alg_a_mic:2,acti_vera:3,calmag:0.3},
  5:{root_juice:0,bio_grow:4,bio_bloom:3,top_max:1,bio_heaven:4,alg_a_mic:3,acti_vera:4,calmag:0.3},
  6:{root_juice:0,bio_grow:4,bio_bloom:3,top_max:4,bio_heaven:4,alg_a_mic:3,acti_vera:4,calmag:0.5},
  7:{root_juice:0,bio_grow:4,bio_bloom:4,top_max:4,bio_heaven:5,alg_a_mic:4,acti_vera:5,calmag:0.5},
  8:{root_juice:0,bio_grow:4,bio_bloom:4,top_max:4,bio_heaven:5,alg_a_mic:4,acti_vera:5,calmag:0.5},
  9:{root_juice:0,bio_grow:4,bio_bloom:4,top_max:4,bio_heaven:5,alg_a_mic:4,acti_vera:5,calmag:0.5},
  10:{root_juice:0,bio_grow:4,bio_bloom:4,top_max:4,bio_heaven:5,alg_a_mic:4,acti_vera:5,calmag:0.5}
};

// ============================================================
// STATE
// ============================================================
const SK='growsmart_v3';
let S={cycles:[],entries:{},schedule:JSON.parse(JSON.stringify(DEFAULT_SCH))};
let tab='dash',calDate=new Date(),editISO=null,entryFrom='dash';
let showSch=false,selId=null,draft={},lastBack=0,schDirty=false;

function col(c){return COLORS.find(x=>x.id===c.colorId)||COLORS[0];}
function sym(c){return c.symbol||'🌿';}

function loadS(){
  try{
    const s=localStorage.getItem(SK)||localStorage.getItem('growsmart_v2')||localStorage.getItem('growsmart_data');
    if(s){const p=JSON.parse(s);S=Object.assign({cycles:[],entries:{},schedule:JSON.parse(JSON.stringify(DEFAULT_SCH))},p);}
  }catch(e){}
  S.cycles.forEach((c,i)=>{
    if(!c.colorId)c.colorId=COLORS[i%COLORS.length].id;
    if(!c.symbol)c.symbol=SYMS[i%SYMS.length];
    if(!c.intAnzucht)c.intAnzucht=REC_INT.anzucht;
    if(!c.intBloom)c.intBloom=REC_INT.bloom;
    if(!c.intFlush)c.intFlush=REC_INT.flush;
  });
}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ============================================================
// TOAST
// ============================================================
let toastT=null;
function toast(m,d=2200){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),d);}

// ============================================================
// GROW LOGIC
// ============================================================
function todayISO(){return new Date().toISOString().split('T')[0];}
function isoPlus(iso,d){const o=new Date(iso+'T12:00:00');o.setDate(o.getDate()+d);return o.toISOString().split('T')[0];}

function phase(iso,c){
  if(!c.startDate)return null;
  const diff=Math.floor((new Date(iso)-new Date(c.startDate))/86400000);
  if(diff<0)return null;
  const a=c.anzuchtDays||17,b=a+(c.bloomDays||66),f=b+(c.flushDays||9),
        i=f+(c.iceDays||6),h=i+(c.harvestDays||1),d=h+(c.dryDays||7);
  if(diff<a)return{ph:'anzucht',day:diff+1,week:Math.floor(diff/7)+1,total:d};
  if(diff<b)return{ph:'bloom',day:diff+1,week:Math.floor((diff-a)/7)+1,total:d};
  if(diff<f)return{ph:'flush',day:diff+1,week:null,total:d};
  if(diff<i)return{ph:'ice',day:diff+1,week:null,total:d};
  if(diff<h)return{ph:'harvest',day:diff+1,week:null,total:d};
  if(diff<=d)return{ph:'dry',day:diff+1,week:null,total:d};
  return null;
}

function getInt(c,ph){
  if(ph==='anzucht')return c.intAnzucht||REC_INT.anzucht;
  if(ph==='flush')return c.intFlush||REC_INT.flush;
  return c.intBloom||REC_INT.bloom;
}

// Unified "Gießtag" logic
// Returns: null (no action), 'giess-wasser' (plain water), 'giess-naehr' (with nutrients),
//          'spuelen', 'ice', 'ernte', 'trocknen'
function getAction(iso,c){
  const p=phase(iso,c);
  if(!p)return null;
  if(p.ph==='harvest')return'ernte';
  if(p.ph==='dry')return'trocknen';
  if(p.ph==='ice')return'ice';
  if(p.ph==='flush')return'spuelen';
  const interval=getInt(c,p.ph);
  if((p.day-1)%interval!==0)return null; // not a watering day
  // In bloom alternate nährstoff/wasser; in anzucht always nährstoff
  if(p.ph==='anzucht')return'giess-naehr';
  const feedRound=Math.floor((p.day-1)/interval)%2===0;
  return feedRound?'giess-naehr':'giess-wasser';
}

// Human-readable label
function actionLabel(a){
  return{
    'giess-naehr':'Gießtag 🌱',
    'giess-wasser':'Gießtag 💧',
    'spuelen':'Spülen 🚿',
    'ice':'IceFlush ❄️',
    'ernte':'Ernte ✂️',
    'trocknen':'Trocknen 🍃',
  }[a]||'–';
}
function actionIcon(a){
  return{'giess-naehr':'🌱','giess-wasser':'💧','spuelen':'🚿','ice':'❄️','ernte':'✂️','trocknen':'🍃','start':'🏁'}[a]||'';
}

function isGiessTag(iso,c){
  const a=getAction(iso,c);
  return a&&['giess-naehr','giess-wasser','spuelen','ice'].includes(a);
}

function getNutrients(iso,c){
  const p=phase(iso,c);if(!p)return null;
  const a=getAction(iso,c);
  if(a!=='giess-naehr')return null;
  const wk=Math.min(p.week||1,10);
  const sch=c.ownSchedule?c.ownSchedule[wk]:S.schedule[wk]||S.schedule[1];
  if(p.ph==='anzucht')return{...sch,bio_bloom:0,top_max:0};
  return sch;
}

function nextGiessTag(c,fromISO){
  if(!c.active||!c.startDate)return null;
  for(let i=1;i<=30;i++){
    const iso=isoPlus(fromISO,i);
    if(isGiessTag(iso,c))return{iso,days:i};
  }
  return null;
}

function daysToHarvest(c){
  if(!c.startDate)return null;
  const hd=(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9)+(c.iceDays||6);
  const diff=Math.ceil((new Date(c.startDate).getTime()+hd*86400000-Date.now())/86400000);
  return diff>0?diff:0;
}
function active(){return S.cycles.filter(c=>c.active&&c.startDate);}

// Smart alerts
function alerts(c){
  const today=todayISO();
  const p=phase(today,c);
  if(!p||!c.active)return[];
  const out=[];
  // Overdue check
  const lastWater=Object.keys(S.entries).filter(d=>{
    return d<=today&&S.entries[d]?.cycleData?.[c.id]?.water;
  }).sort().pop();
  if(lastWater){
    const days=Math.floor((new Date(today)-new Date(lastWater))/86400000);
    const interval=getInt(c,p.ph);
    if(days>interval+1)out.push({type:'warn',icon:'⚠️',title:`${sym(c)} Gießen überfällig`,text:`Letztes Gießen vor ${days} Tagen (Intervall: ${interval} Tage).`});
  }
  // Phase warnings
  if(p.ph==='bloom'){
    const dLeft=(c.bloomDays||66)-Math.floor((p.day-1-(c.anzuchtDays||17)));
    // avoid negative on anzucht boundary
    const bloomDay=p.day-(c.anzuchtDays||17);
    const remaining=(c.bloomDays||66)-bloomDay;
    if(remaining>0&&remaining<=7)out.push({type:'info',icon:'🚿',title:`${sym(c)} Spülung in ${remaining} Tagen`,text:'Letzte Nährstoffe kaufen – danach kein Dünger mehr!'});
    if(p.week&&p.week>=7)out.push({type:'tip',icon:'🔬',title:`${sym(c)} Woche ${p.week} – Trichome checken`,text:'Lupe bereithalten. Auf Bernstein-Färbung achten.'});
  }
  if(p.ph==='flush')out.push({type:'info',icon:'❄️',title:`${sym(c)} IceFlush steht bevor`,text:'Nach dem Spülen Eiswasser-Phase vorbereiten.'});
  if(p.ph==='ice'||p.ph==='harvest')out.push({type:'success',icon:'✂️',title:`${sym(c)} Ernte nähert sich!`,text:'Trichome prüfen, Ernte-Equipment bereitlegen.'});
  return out;
}

function calcVPD(t,rh){if(isNaN(t)||isNaN(rh))return null;return Math.round(0.6108*Math.exp(17.27*t/(t+237.3))*(1-rh/100)*100)/100;}
function vpdZone(v){
  if(v===null)return null;
  if(v<0.4)return{label:'Zu feucht – Schimmelgefahr',color:'#7a7af0',bg:'#1e1e3a',hint:'Belüftung erhöhen, Schimmelgefahr!',pct:Math.round(v/0.4*15)};
  if(v<0.8)return{label:'Anzucht – optimal',color:'#5aabf0',bg:'#0d1e2e',hint:'Ideal für Anzucht und Vegphase.',pct:Math.round(15+(v-0.4)/0.4*35)};
  if(v<1.2)return{label:'Blüte – optimal',color:'#4caf70',bg:'#0d1e0d',hint:'Perfekt für Blütephase!',pct:Math.round(50+(v-0.8)/0.4*25)};
  if(v<1.6)return{label:'Etwas hoch',color:'#c8a04a',bg:'#2a1e0d',hint:'Luftfeuchtigkeit leicht erhöhen.',pct:Math.round(75+(v-1.2)/0.4*15)};
  return{label:'Pflanzenstress!',color:'#e06060',bg:'#2a0d0d',hint:'Sofort Luftfeuchtigkeit anpassen!',pct:Math.min(97,Math.round(90+(v-1.6)*10))};
}

// Shift entries ONLY from today forward (past stays untouched)
function shiftFuture(cId,days){
  if(!days)return;
  const today=todayISO();
  const keys=Object.keys(S.entries)
    .filter(d=>d>=today)
    .sort((a,b)=>days>0?b.localeCompare(a):a.localeCompare(b));
  const moves=[];
  keys.forEach(d=>{
    if(S.entries[d]?.cycleData?.[cId]){
      const o=new Date(d+'T12:00:00');o.setDate(o.getDate()+days);
      moves.push({from:d,to:o.toISOString().split('T')[0],log:S.entries[d].cycleData[cId]});
    }
  });
  moves.forEach(({from,to,log})=>{
    delete S.entries[from].cycleData[cId];
    if(!S.entries[to])S.entries[to]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[to].cycleData)S.entries[to].cycleData={};
    S.entries[to].cycleData[cId]=log;
  });
  Object.keys(S.entries).forEach(d=>{
    const e=S.entries[d];
    if(!e.temp&&!e.humidity&&!Object.keys(e.cycleData||{}).length)delete S.entries[d];
  });
}

// Full shift (for start date change in settings)
function shiftAll(cId,days){
  if(!days)return;
  const keys=Object.keys(S.entries).sort((a,b)=>days>0?b.localeCompare(a):a.localeCompare(b));
  const moves=[];
  keys.forEach(d=>{
    if(S.entries[d]?.cycleData?.[cId]){
      const o=new Date(d+'T12:00:00');o.setDate(o.getDate()+days);
      moves.push({from:d,to:o.toISOString().split('T')[0],log:S.entries[d].cycleData[cId]});
    }
  });
  moves.forEach(({from,to,log})=>{
    delete S.entries[from].cycleData[cId];
    if(!S.entries[to])S.entries[to]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[to].cycleData)S.entries[to].cycleData={};
    S.entries[to].cycleData[cId]=log;
  });
  Object.keys(S.entries).forEach(d=>{
    const e=S.entries[d];
    if(!e.temp&&!e.humidity&&!Object.keys(e.cycleData||{}).length)delete S.entries[d];
  });
}

const MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-lbl').textContent=`${MN[m]} ${y}`;
  const act=active(),today=todayISO();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),off=fd===0?6:fd-1;
  let cells='';
  for(let i=0;i<off;i++)cells+='<div></div>';

  for(let d=1;d<=dim;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===today,hasEntry=!!S.entries[iso];
    const gc=act.filter(c=>isGiessTag(iso,c));
    const allPh=act.map(c=>({c,p:phase(iso,c)})).filter(x=>x.p);
    const isStart=act.some(c=>c.startDate===iso);

    let bg='#181818',border='transparent';
    if(gc.length===1){const cl=col(gc[0]);bg=cl.dk;border=cl.hex+'88';}
    else if(gc.length>=2){const c1=col(gc[0]),c2=col(gc[1]);bg=`linear-gradient(135deg,${c1.dk} 50%,${c2.dk} 50%)`;border=c1.hex+'66';}

    const icon=isStart?'🏁':gc.length>0?actionIcon(getAction(iso,gc[0])||'giess-wasser'):'';
    const tagInfo=allPh[0];
    const tagCol=gc.length>0?col(gc[0]).hex:(tagInfo?col(tagInfo.c).hex:'rgba(255,255,255,0.4)');

    cells+=`<div class="cal-cell ${isToday?'today':''}" style="background:${bg};border-color:${border}"
      onclick="calCellClick('${iso}')"

let lpT=null;
function lpStart(iso,e){lpT=setTimeout(()=>{lpT=null;showCtx(iso,e);},600);}
function lpEnd(){if(lpT){clearTimeout(lpT);lpT=null;}}

function showCtx(iso,e){
  const act=active();
  const df=new Date(iso+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  const today=todayISO();
  let items=[];

  act.forEach(c=>{
    const cl=col(c),s=sym(c);
    const p=phase(iso,c);if(!p)return;
    // Only allow future shifts
    if(iso>=today){
      items.push(`<div class="ctx-item" style="color:${cl.hex}" onclick="shiftFrom('${c.id}','${iso}',1)"><span class="ctx-icon">+1</span>${s} ${c.name} – einen Tag später</div>`);
      items.push(`<div class="ctx-item" style="color:${cl.hex}" onclick="shiftFrom('${c.id}','${iso}',-1)"><span class="ctx-icon">-1</span>${s} ${c.name} – einen Tag früher</div>`);
    }
  });

  if(items.length)items.push('<div class="ctx-div"></div>');

  S.cycles.filter(c=>!c.active).forEach(c=>{
    items.push(`<div class="ctx-item green" onclick="startOn('${c.id}','${iso}')"><span class="ctx-icon">▶</span>${sym(c)} ${c.name} starten</div>`);
  });
  act.forEach(c=>{
    items.push(`<div class="ctx-item red" onclick="stopC('${c.id}')"><span class="ctx-icon">■</span>${sym(c)} ${c.name} beenden</div>`);
  });

  if(items.length)items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calCellClick('${iso}');closeCtx()"><span class="ctx-icon">✏</span>Eintrag ${df} öffnen</div>`);

  const menu=document.getElementById('ctx-menu');
  menu.innerHTML=`<div style="font-size:11px;color:var(--text-hint);padding:8px 16px 2px;font-weight:500">${df}</div>`+items.join('');
  const t=e?.touches?.[0]||e?.changedTouches?.[0];
  let x=t?Math.min(t.clientX,window.innerWidth-260):window.innerWidth/2-120;
  let y=t?Math.min(t.clientY,window.innerHeight-340):window.innerHeight/2;
  menu.style.left=x+'px';menu.style.top=y+'px';
  menu.classList.add('show');document.getElementById('ctx-ov').classList.add('show');
}
function closeCtx(){document.getElementById('ctx-menu').classList.remove('show');document.getElementById('ctx-ov').classList.remove('show');}
function closeCtxMenu(){closeCtx();}

function shiftFrom(cId,iso,days){
  closeCtx();
  const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  // Only shift today + future, past stays untouched
  shiftFuture(cId,days);
  // Move startDate only if shift is backward (cycle started later)
  // For +1: just shift future entries, startDate stays (plant was simply watered a day late)
  // For -1: same logic
  saveS();renderCal();
  toast(`${sym(c)} ${c.name}: Gießplan ${days>0?'+':''}${days} Tag`);
}
function startOn(cId,iso){
  closeCtx();
  const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  c.active=true;c.startDate=iso;saveS();renderCal();
  toast(`${sym(c)} ${c.name} gestartet!`);
  setTimeout(()=>{selId=cId;draft={};goTo('set');},900);
}
function stopC(cId){
  closeCtx();
  const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  if(!confirm(`"${c.name}" wirklich beenden?`))return;
  c.active=false;c.startDate=null;saveS();renderCal();
  toast(`${sym(c)} ${c.name} beendet`);
}

    if(!nut)return`<div style="font-size:12px;color:var(--text-muted)">Heute kein Gießtag oder kein Düngertag.</div>`;
    const cl=col(fc);
    return NUTRIENTS.map(n=>{const v=nut[n.key]||0;return`<div class="nut-row"><span class="nut-name">${n.label}</span><div class="nut-bar"><div class="nut-fill" style="width:${Math.round(v/5*100)}%;background:${cl.hex}"></div></div><span class="nut-val" style="color:${cl.hex}">${v} ml/L</span></div>`;}).join('');
  })():'';

  document.getElementById('ai-body').innerHTML=`
    <div class="card" style="gap:8px;display:flex;flex-direction:column">
      <div class="sect-head">Status heute</div>
      ${act.length===0?'<div style="font-size:13px;color:var(--text-muted)">Keine aktiven Zyklen.</div>':rows}
      ${vpd!==null?`<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <span style="font-size:13px;color:var(--text-sub)">${entry.temp}°C · ${entry.humidity}%</span>
        <span class="pill" style="background:${z?.bg};color:${z?.color}">VPD ${vpd.toFixed(2)} kPa</span>
      </div>`:'<div style="font-size:12px;color:var(--text-muted)">Noch kein Eintrag heute – Temp & RLF eintragen für VPD.</div>'}
    </div>
    ${fc?`<div class="card" style="gap:8px;display:flex;flex-direction:column;border-color:${col(fc).hex}44">
      <div class="sect-head">${sym(fc)} ${fc.name} – Gießtag-Nährstoffe</div>
      ${nutRows}
    </div>`:''}
    <button class="ai-fetch-btn" onclick="fetchAI()" id="ai-btn">✦ KI-Analyse abrufen</button>
    <div id="ai-result"></div>
    <div style="height:10px"></div>`;
}

async function fetchAI(){
  const act=active();if(!act.length){toast('Keine aktiven Zyklen.');return;}
  const btn=document.getElementById('ai-btn');
  btn.innerHTML='<div class="spin" style="margin:0 auto"></div>';btn.disabled=true;
  const today=todayISO(),entry=S.entries[today]||{},vpd=calcVPD(parseFloat(entry.temp),parseFloat(entry.humidity));
  const allAlerts=act.flatMap(c=>alerts(c)).map(a=>a.title).join(', ')||'keine';
  const ci=act.map(c=>{
    const p=phase(today,c),a=getAction(today,c);
    return`${sym(c)} ${c.name}: Tag ${p?.day||'–'}, ${p?PHASE_NAMES[p.ph]:'–'}${p?.week?' Wo.'+p.week:''}, Gießintervall ${getInt(c,p?.ph||'bloom')} Tage, Heute: ${a?actionLabel(a):'Pause'}`;
  }).join('\n');
  const prompt=`Du bist ein Cannabis-Grow-Experte. Antworte auf Deutsch, freundlich, max. 200 Wörter.\n\nDatum: ${today}\nTemp: ${entry.temp||'?'}°C, Luftf.: ${entry.humidity||'?'}%, VPD: ${vpd!==null?vpd.toFixed(2)+' kPa':'nicht gemessen'}\nWarnungen: ${allAlerts}\n\nZyklen:\n${ci}\n\nBitte: 1) Kurze Tagesanalyse 2) Was heute konkret tun? 3) Was in 7 Tagen ansteht?`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'Keine Antwort.';
    document.getElementById('ai-result').innerHTML=`<div class="card" style="gap:10px;display:flex;flex-direction:column"><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div><span style="font-size:13px;color:var(--green);font-weight:500">KI-Analyse</span></div><div style="font-size:13px;color:var(--text-sub);line-height:1.7">${text.replace(/\n/g,'<br>')}</div></div>`;
  }catch(e){document.getElementById('ai-result').innerHTML=`<div class="card"><span style="font-size:13px;color:var(--red)">Verbindungsfehler.</span></div>`;}
  btn.innerHTML='✦ KI-Analyse abrufen';btn.disabled=false;
}

    <div class="sect-head" style="color:${cl.hex}">${d.ownSchedule?(sym(d)||'🌿')+' Eigener Düngeplan':'Globaler Düngeplan (ml/L)'}</div>

function dd(k,v){draft[k]=isNaN(v)||v===''?v:Number(v);}
function ddS(k,v){draft[k]=v;renderSet();}
function saveDraft(){
  const c=S.cycles.find(x=>x.id===selId);if(!c)return;
  const old=c.startDate,nw=draft.startDate;
  if(old&&nw&&old!==nw){
    const diff=Math.round((new Date(nw)-new Date(old))/86400000);
    if(diff)shiftAll(c.id,diff);
  }
  Object.assign(c,{...draft,id:c.id});
  saveS();toast(`${sym(c)} ${c.name} gespeichert ✓`);renderSet();
}
function saveSch(){
  const sel=S.cycles.find(x=>x.id===selId);
  const target=sel?.ownSchedule?sel.ownSchedule:S.schedule;
  for(let w=1;w<=10;w++){
    if(!target[w])target[w]={};
    NUTRIENTS.forEach(n=>{const el=document.getElementById(`sch-${w}-${n.key}`);if(el)target[w][n.key]=parseFloat(el.value)||0;});
  }
  saveS();toast('Düngeplan gespeichert ✓');
}
function toggleOwnSch(id,checked){
  const c=S.cycles.find(x=>x.id===id);if(!c)return;
  c.ownSchedule=checked?JSON.parse(JSON.stringify(S.schedule)):null;
  draft.ownSchedule=c.ownSchedule;
  saveS();renderSet();
  toast(checked?`${sym(c)} Eigener Plan aktiviert`:'Globaler Plan wird verwendet');
}
function selCyc(id){selId=id;draft={};renderSet();}
function toggleSch(){showSch=!showSch;renderSet();}
function addCyc(){
  const i=S.cycles.length;
  const c={id:Date.now().toString(),name:`Zyklus ${i+1}`,location:'',active:false,startDate:null,
    colorId:COLORS[i%COLORS.length].id,symbol:SYMS[i%SYMS.length],
    anzuchtDays:17,bloomDays:66,flushDays:9,iceDays:6,harvestDays:1,dryDays:7,
    intAnzucht:4,intBloom:3,intFlush:2,ownSchedule:null};
  S.cycles.push(c);selId=c.id;draft={...c};saveS();renderSet();
}
function toggleAct(id,checked){
  const c=S.cycles.find(x=>x.id===id);if(!c)return;
  c.active=checked;if(checked&&!c.startDate)c.startDate=todayISO();if(!checked)c.startDate=null;
  draft.active=c.active;draft.startDate=c.startDate;saveS();renderSet();
}
function delCyc(id){
  if(!confirm('Zyklus und alle Logs wirklich löschen?'))return;
  S.cycles=S.cycles.filter(x=>x.id!==id);
  Object.keys(S.entries).forEach(d=>{if(S.entries[d]?.cycleData?.[id])delete S.entries[d].cycleData[id];});
  selId=S.cycles[0]?.id||null;draft={};saveS();renderSet();toast('Zyklus gelöscht');
}
function resetSch(){
  if(!confirm('Standardwerte laden?'))return;
  const sel=S.cycles.find(x=>x.id===selId);
  if(sel?.ownSchedule){sel.ownSchedule=JSON.parse(JSON.stringify(DEFAULT_SCH));draft.ownSchedule=sel.ownSchedule;}
  else S.schedule=JSON.parse(JSON.stringify(DEFAULT_SCH));
  saveS();renderSet();toast('Standardwerte geladen');
}

function renderEntry(iso){

    </div>

    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-hint)"><span>Anzucht</span><span>Blüte</span><span>Stress</span></div>

  </div></div>`:
  `<div style="background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text-muted)">Temperatur &amp; Luftfeuchtigkeit eingeben → VPD</div>`;

  const blocks=act.map(c=>{
    const p=phase(iso,c),a=getAction(iso,c);
    const cl=col(c),s=sym(c);
    const cd=saved.cycleData?.[c.id]||{};
    const nut=getNutrients(iso,c);
    const phLabel=p?PHASE_NAMES[p.ph]:'–';

    // Gießtag indicator
    const giessInfo=a?`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:${cl.hex}11;border-radius:8px;margin-bottom:6px">

        <div style="font-size:13px;font-weight:500;color:${cl.hex}">${a==='giess-naehr'?'Gießtag mit Nährstoffen':a==='giess-wasser'?'Gießtag – nur Wasser':actionLabel(a).split(' ')[0]}</div>
        <div style="font-size:11px;color:var(--text-muted)">Intervall: alle ${getInt(c,p?.ph||'bloom')} Tage</div>
      </div>
    </div>`:'';

    const nutSection=nut?`
      <div class="tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none;border-radius:10px 10px 0 0">
        <span style="font-size:12px;font-weight:500;color:#fff">Nährstofflösung (ml/L)</span>
        <span class="pill" style="background:${cl.hex}22;color:${cl.hex};font-size:10px">${phLabel}${p?.week?' Wo.'+p.week:''}</span>
      </div>
      <div class="tbl-wrap" style="border-color:${cl.hex}33">
        <div class="tbl-head" style="background:${cl.dk}">
          <span class="th" style="color:${cl.hex}">Nährstoff</span>
          <span class="th" style="text-align:right;color:${cl.hex}88">Empf.</span>
          <span class="th" style="text-align:right;color:${cl.hex}">Eingabe</span>
        </div>
        ${NUTRIENTS.map(n=>{
          const hint=nut[n.key]??0,val=cd.nutrients?.[n.key]||'';
          return`<div class="tbl-row"><span class="t-name">${n.label}</span>

          onchange="uEF('${c.id}','notes',this.value)">${cd.notes||''}</textarea>
      </div>
      ${hintBox}`;
  }).join('');

  const noActive=act.length===0?`<div class="empty-state"><div class="empty-icon">🌱</div><div style="font-size:13px;color:var(--text-muted)">Keine aktiven Zyklen.</div><button style="background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--green);cursor:pointer;font-family:var(--font)" onclick="goTo('set')">Zyklus erstellen</button></div>`:'';

  document.getElementById('entry-body').innerHTML=`
    <div class="sect-head">Umgebung</div>
    <div class="row2">
      <div class="inp-wrap"><div class="inp-label">Temperatur (°C)</div>

function uEnv(){
  const t=parseFloat(document.getElementById('et')?.value),r=parseFloat(document.getElementById('er')?.value);
  const v=calcVPD(t,r),z=vpdZone(v);
  if(v!==null&&z){
    const vv=document.getElementById('vpd-v'),vp=document.getElementById('vpd-p'),vm=document.getElementById('vpd-m');
    if(vv)vv.textContent=v.toFixed(2);
    if(vp){vp.textContent=z.label;vp.style.background=z.bg;vp.style.color=z.color;}
    if(vm)vm.style.left=Math.min(95,z.pct)+'%';
  }
}

function ensE(cId){
  if(!S.entries[editISO])S.entries[editISO]={temp:'',humidity:'',cycleData:{}};
  if(!S.entries[editISO].cycleData)S.entries[editISO].cycleData={};
  if(!S.entries[editISO].cycleData[cId])S.entries[editISO].cycleData[cId]={nutrients:{}};
  if(!S.entries[editISO].cycleData[cId].nutrients)S.entries[editISO].cycleData[cId].nutrients={};
}
function uEN(cId,k,v){ensE(cId);S.entries[editISO].cycleData[cId].nutrients[k]=v;}
function uEF(cId,f,v){ensE(cId);S.entries[editISO].cycleData[cId][f]=v;}
function saveEntry(){
  if(!editISO)return;
  if(S.cycles.length>0)ensE(S.cycles[0].id);
  S.entries[editISO].temp=document.getElementById('et')?.value||'';
  S.entries[editISO].humidity=document.getElementById('er')?.value||'';
  saveS();
  toast('Gespeichert ✓');
  setTimeout(()=>goTo(entryFrom),400);
}

loadS();calDate=new Date();
goTo('dash');
history.pushState(null,'',location.href);

// Swipe calendar – ONCE on the screen element
(function(){
  const scr=document.getElementById('scr-cal');
  let sx=0,sy=0,st=0;
  scr.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  scr.addEventListener('touchend',e=>{
    if(Date.now()-st>500)return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8)changeMonth(dx<0?1:-1);
  },{passive:true});
})();
</script>
