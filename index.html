/**
 * Returns a concrete "what to do today" instruction card for a cycle.
 * Used on the dashboard to show beginners exactly what action to take today,
 * with water amount, pH target, fertilizer status, and a short rationale.
 * Returns null if nothing actionable today.
 */
/**
 * Klartext-Satz „was ist heute zu tun" für den Anfänger-Modus.
 * Ein einziger, verständlicher Satz in Alltagssprache. Wird über der
 * Schritt-Liste eingeblendet. Fachbegriffe bewusst vermieden.
 */
function plainSentence(action, c, p, waterMl) {
  const isOutdoor = c.growType === 'outdoor';
  const isVorzucht = p && p.ph === 'vorzucht';
  const isVegiOut = p && p.ph === 'vegi_out';
  // Tag 1 der Anzucht: Biologisch setzt man den Samen in leicht angefeuchtete Erde
  // und gießt NICHT. Die App sollte das klar kommunizieren statt nur Wasser-ml zu empfehlen.
  if ((action === 'giess_anz' || action === 'giess') && p && p.day === 1 && (p.ph === 'anzucht' || p.ph === 'vorzucht')) {
    return `Heute setzt du deinen Samen in leicht angefeuchtete Erde. <b>Nicht nachgießen</b> — der Samen braucht nur feuchte Erde um zu keimen. Zu viel Wasser ertränkt ihn. Trag einfach <b>0 ml</b> ein und mach morgen weiter.`;
  }
  if (action === 'giess_anz') {
    if (isVorzucht) {
      return `Gib deiner vorgezogenen Pflanze heute etwa <b>${waterMl} ml</b> lauwarmes Wasser — sie ist noch drinnen, du musst nicht aufs Wetter achten.`;
    }
    return isOutdoor
      ? `Prüf kurz den Topf — ist er leicht, gib etwa <b>${waterMl} ml</b> lauwarmes Wasser in einem Ring um die Pflanze.`
      : `Gib deiner Pflanze heute ganz vorsichtig etwa <b>${waterMl} ml</b> lauwarmes Wasser — nicht direkt auf den Stängel, sondern drumherum.`;
  }
  if (action === 'giess') {
    if (isVegiOut) {
      return `Deine Pflanze steht draußen im Wachstum. Prüf den Topf — wenn leicht, gieß etwa <b>${waterMl} ml</b>. Nach Regentagen kannst du auch einfach einen Gießtag auslassen. <b>Bei Hitze (über 28°C):</b> ggf. morgens UND abends gießen, die Pflanze verdunstet dann deutlich mehr.`;
    }
    return isOutdoor
      ? `Prüf ob der Topf sich leicht anfühlt. Wenn ja, gieß etwa <b>${waterMl} ml</b> lauwarmes Wasser. Wenn er schwer ist, warte bis morgen. <b>Bei Hitze:</b> Pflanze kann täglich (oder sogar 2×) Wasser brauchen.`
      : `Gib deiner Pflanze heute etwa <b>${waterMl} ml</b> lauwarmes Wasser. Langsam gießen bis unten ein bisschen Wasser rausläuft (das ist richtig so).`;
  }
  if (action === 'spuelen') {
    return `Heute nur klares Wasser ohne Dünger — davon ungefähr <b>${waterMl} ml</b>. Das spült die letzten Nährsalze aus der Erde.`;
  }
  if (action === 'ice') {
    return `Heute gießt du mit Eiswasser — kalt macht die Pflanze zusätzliches Harz. Langsam, etwa <b>${waterMl} ml</b>.`;
  }
  if (action === 'ernte') {
    return `Heute ist Erntetag! Schneide die Pflanze ab und häng sie kopfüber zum Trocknen auf.`;
  }
  if (action === 'trocknen') {
    return `Deine Pflanze trocknet gerade. Einfach täglich kurz prüfen — 18–21°C, nicht zu trocken, nicht zu feucht.`;
  }
  return null;
}

function getTodayAction(c, p, a, iso) {
  if (!p) return null;
  const cl = col(c);
  const pot = S.potSize || 11;
  const waterMl = waterSuggestion(c, p);
  const iv = getInt(c, p.ph);

  // Determine fertilizer week same as entry screen
  let fertWk = 1;
  if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
  else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
  else {
    const td = c.startDate ? isoDiff(iso, c.startDate) : 0;
    fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10));
  }
  const doses = getWeekDoses(c.id, fertWk, c);
  const activeDoses = Object.entries(doses).filter(([, v]) => v > 0);

  // ABHÄRTEN-Phase: eigene Karte, unabhängig von der normalen Action-Logik.
  // Die Pflanze wird 7 Tage an Außenklima gewöhnt bevor sie ins Beet kommt.
  if (p.ph === 'abhärten') {
    const daysLeft = 7 - (p.vegDay || 1) + 1;
    const steps = [
      p.vegDay <= 2 ? 'Tag 1-2: 2-3 Stunden raus (Halbschatten, windgeschützt)' : '',
      p.vegDay >= 3 && p.vegDay <= 4 ? 'Tag 3-4: 4-6 Stunden raus (auch direktere Sonne)' : '',
      p.vegDay >= 5 && p.vegDay <= 6 ? 'Tag 5-6: Den ganzen Tag raus, abends rein' : '',
      p.vegDay === 7 ? 'Tag 7: Bereit fürs Auspflanzen! Morgen ins Beet.' : '',
      'Bei Frost: drin lassen. Bei starkem Wind: geschützten Platz wählen.',
    ].filter(Boolean);
    return {
      title: `🌤 Abhärten · Tag ${p.vegDay}/7`,
      icon: '🌤',
      color: cl.hex,
      steps,
      hint: daysLeft > 1 ? `Noch ${daysLeft - 1} Tage bis raus ins Beet. Sonst normal gießen (Topf leicht = gießen).` : 'Morgen geht\'s raus ins endgültige Beet!',

      icon: '💧',
      color: cl.hex,
      steps: isVorzucht ? [

      ] : isOutdoor ? [

        `Falls gießen: ca. <b>${waterMl} ml</b> lauwarmes Wasser (pH 6.4)`,
        activeDoses.length > 0 ? `Dünger (${fertWk >= 2 ? '½ Dosis' : 'noch keiner nötig'}): ${activeDoses.length} Produkte` : 'Noch kein Dünger',
      ] : [
        `Ca. <b>${waterMl} ml</b> lauwarmes Wasser (pH 6.4)`,
        p.day <= 5 ? 'Ring um den Sämling, nicht direkt drauf' : 'Radius allmählich vergrößern',
        activeDoses.length > 0 ? `Dünger (${fertWk >= 2 ? '½ Dosis' : 'noch keiner nötig'}): ${activeDoses.length} Produkte` : 'Noch kein Dünger',
      ],
      hint: isVorzucht
        ? 'Pflanze noch drinnen — wetterunabhängig gießen. Sie wird dann abgehärtet bevor sie raus kommt.'
        : isOutdoor
        ? 'Outdoor: Regen zählt! Nach Regentag lieber 1–2 Tage warten.'

  if (a === 'giess') {

      steps: isOutdoor ? [

        activeDoses.length > 0

      steps: [

/**
 * Cache-Struktur: S.weather = { lat, lon, city, lastFetch, data }
 * data = { current: {temp, rain_mm, weather_code}, forecast: [{date, tmin, tmax, rain_sum}] }
 * Cache-Dauer: 1 Stunde. Nur für Outdoor-User sinnvoll.
 */
function hasOutdoorCycle() {
  return (S.cycles || []).some(c => c.active && c.growType === 'outdoor');
}

/** Open-Meteo Weather Code → Emoji + Label (vereinfacht). */
function weatherCodeToIcon(code) {
  if (code === 0) return { icon: '☀️', label: 'Klar' };
  if (code <= 3) return { icon: '⛅', label: 'Bewölkt' };
  if (code <= 48) return { icon: '🌫', label: 'Nebel' };
  if (code <= 57) return { icon: '🌦', label: 'Nieselregen' };
  if (code <= 67) return { icon: '🌧', label: 'Regen' };
  if (code <= 77) return { icon: '🌨', label: 'Schnee' };
  if (code <= 82) return { icon: '🌧', label: 'Schauer' };
  if (code <= 86) return { icon: '🌨', label: 'Schneeschauer' };
  if (code <= 99) return { icon: '⛈', label: 'Gewitter' };
  return { icon: '🌡', label: '' };
}

/** Wetter-Daten laden. Nutzt Browser-Geolocation einmalig, cached dann im S.weather. */
async function loadWeatherData(force = false) {
  try {
    // Ohne Outdoor-Zyklus macht's keinen Sinn
    if (!hasOutdoorCycle()) return null;

    // Cache-Check: 1 Stunde gültig
    const now = Date.now();
    if (!force && S.weather?.lastFetch && (now - S.weather.lastFetch) < 60 * 60 * 1000 && S.weather.data) {
      return S.weather.data;
    }

    // Geolocation holen falls nicht gecached oder älter als 1 Tag
    let lat = S.weather?.lat, lon = S.weather?.lon;
    if (!lat || !lon) {
      if (!navigator.geolocation) {
        toast('⚠ Geolocation nicht verfügbar');
        return null;
      }
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, maximumAge: 3600000 });
      });
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
    }

    // Open-Meteo API (kein Key nötig)
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,weather_code,precipitation`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code`
      + `&forecast_days=7&timezone=auto`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API-Fehler ' + res.status);
    const json = await res.json();

    const data = {
      current: {
        temp: Math.round(json.current?.temperature_2m),
        rain_mm: json.current?.precipitation || 0,
        weather_code: json.current?.weather_code,
      },
      forecast: (json.daily?.time || []).map((date, i) => ({
        date,
        tmin: Math.round(json.daily.temperature_2m_min[i]),
        tmax: Math.round(json.daily.temperature_2m_max[i]),
        rain_sum: json.daily.precipitation_sum[i] || 0,
        weather_code: json.daily.weather_code[i],
      })),
    };

    S.weather = { lat, lon, lastFetch: now, data };
    saveS();
    return data;
  } catch (e) {
    console.warn('Weather load failed:', e);
    toast('⚠ Wetter konnte nicht geladen werden');
    return null;
  }
}

/** Wetter-Widget-HTML für's Dashboard. Leerer String wenn nicht Outdoor oder keine Daten. */
function weatherWidget() {
  if (!hasOutdoorCycle()) return '';
  const d = S.weather?.data;

  // Noch nicht geladen: Button zum Aktivieren anzeigen
  if (!d) {
    return `<div onclick="loadWeatherData(true).then(r=>r&&renderDash())" style="margin-top:8px;padding:12px 14px;background:rgba(90,171,240,0.06);border:0.5px solid rgba(90,171,240,0.25);border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">🌤</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:var(--blue)">Wetter aktivieren</div>
        <div style="font-size:10px;color:var(--text-muted);line-height:1.4">Für deinen Outdoor-Grow — Standort wird gebraucht</div>
      </div>
      <span style="color:var(--blue);font-size:14px">›</span>
    </div>`;
  }

  const cur = d.current || {};
  const curIcon = weatherCodeToIcon(cur.weather_code);
  const fc = (d.forecast || []).slice(0, 4);
  const todayRain = fc[0]?.rain_sum || 0;

  // Biophysikalische Interpretation der Wetterlage
  // Wir generieren bis zu 2 Hinweise basierend auf Vorhersage und aktiven Zyklen
  const hints = [];
  const act = active();
  const hasActiveOutdoor = act.some(c => c.growType === 'outdoor');

  if (hasActiveOutdoor) {
    // 1. Regen-Hint (wie bisher)
    if (todayRain >= 5) {
      hints.push({ type: 'info', text: '💧 Heute viel Regen — Gießen überspringen (Regen-Button drücken)' });
    } else if (todayRain >= 1) {
      hints.push({ type: 'info', text: 'ℹ Leichter Regen heute — weniger gießen nötig' });
    }

    // 2. Hitzewelle der nächsten 3 Tage
    const upcomingMax = fc.slice(0, 3).map(d => d.tmax).filter(t => !isNaN(t));
    const hotDays = upcomingMax.filter(t => t >= 30).length;
    if (hotDays >= 2) {
      hints.push({
        type: 'warn',
        text: `🔥 Hitzewelle voraus (${hotDays}× ≥30°C) — Schatten + Mulch vorbereiten, morgens gießen`,
      });
    } else if (upcomingMax.some(t => t >= 33)) {
      hints.push({ type: 'warn', text: '🌡️ Hitzespitze erwartet — Stomata-Schluss ab 30°C, Photosynthese bremst' });
    }

    // 3. Kommende Regenperiode (kumuliert)
    const rain3Days = fc.slice(0, 3).reduce((sum, d) => sum + (d.rain_sum || 0), 0);
    if (rain3Days >= 20 && todayRain < 5) {
      hints.push({ type: 'info', text: `🌧 ${rain3Days.toFixed(0)}mm Regen in 3 Tagen — vorher nochmal düngen, dann Pause` });
    }

    // 4. Nachtkühle-Info für aktive Blüte-Zyklen
    const inLateBloom = act.some(c => {
      const p = phase(todayISO(), c);
      return p && p.ph === 'bloom' && p.week >= 4 && c.growType === 'outdoor';
    });
    if (inLateBloom) {
      const minTemps = fc.slice(0, 3).map(d => d.tmin).filter(t => !isNaN(t));
      const coolNights = minTemps.filter(t => t >= 5 && t <= 13).length;
      if (coolNights >= 2) {
        hints.push({
          type: 'tip',
          text: `❄️ ${coolNights} kühle Nächte voraus — Kälte-Signal triggert Trichom- und Anthocyan-Produktion`,
        });
      }
    }

    // 5. Herbst-Schimmelrisiko: September-Oktober + hohe RLF + kühl
    const today12 = new Date(todayISO() + 'T12:00:00');
    const month = today12.getMonth(); // 8=Sept, 9=Okt
    const isAutumn = month === 8 || month === 9;
    const inAnyBloom = act.some(c => {
      const p = phase(todayISO(), c);
      return p && p.ph === 'bloom' && c.growType === 'outdoor';
    });
    if (isAutumn && inAnyBloom) {
      // Mehrere Regentage oder kühl+nass → Schimmelrisiko
      const wetCoolDays = fc.slice(0, 4).filter(d => d.rain_sum >= 3 && d.tmax <= 20).length;
      if (wetCoolDays >= 2) {
        hints.push({
          type: 'warn',
          text: `🍄 Schimmelrisiko hoch (nass + kühl) — Buds täglich auf graue Stellen prüfen, ggf. frühe Ernte erwägen`,
        });
      }
    }
  }

  const days = fc.map((day, i) => {
    const icon = weatherCodeToIcon(day.weather_code);
    const label = i === 0 ? 'Heute' : i === 1 ? 'Morgen' : fmtDE(day.date, { weekday: 'short' });
    return `<div style="flex:1;text-align:center;min-width:0">
      <div style="font-size:10px;color:var(--text-muted);font-weight:600">${label}</div>
      <div style="font-size:20px;margin:2px 0">${icon.icon}</div>
      <div style="font-size:11px;color:var(--text);font-weight:600">${day.tmax}°</div>
      <div style="font-size:9px;color:var(--text-muted)">${day.tmin}°</div>
      ${day.rain_sum > 0 ? `<div style="font-size:9px;color:var(--blue);margin-top:2px">💧 ${day.rain_sum.toFixed(0)}mm</div>` : ''}
    </div>`;
  }).join('');

  const hintColors = { warn: 'var(--orange)', info: 'var(--blue)', tip: 'var(--green)' };
  const hintHTML = hints.slice(0, 3).map(h =>
    `<div style="font-size:11px;color:${hintColors[h.type] || 'var(--blue)'};margin-top:6px;line-height:1.4">${h.text}</div>`
  ).join('');

  return `<div style="margin-top:8px;padding:12px 14px;background:linear-gradient(135deg,rgba(90,171,240,0.1),rgba(90,171,240,0.03));border:0.5px solid rgba(90,171,240,0.3);border-radius:12px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:28px">${curIcon.icon}</span>
      <div style="flex:1">
        <div style="font-size:18px;font-weight:700;color:var(--text)">${cur.temp}°C <span style="font-size:11px;color:var(--text-muted);font-weight:500">· ${curIcon.label}</span></div>
        <div style="font-size:10px;color:var(--text-muted)">Outdoor-Wetter</div>
      </div>
      <button onclick="loadWeatherData(true).then(r=>r&&renderDash())" style="background:none;border:none;color:var(--text-hint);font-size:12px;cursor:pointer;padding:4px 6px" title="Neu laden">↻</button>
    </div>
    <div style="display:flex;gap:4px;padding:8px 0;border-top:0.5px solid var(--border)">${days}</div>
    ${hintHTML}
  </div>`;
}

      return `<div style="background:linear-gradient(135deg,rgba(176,106,200,0.12),rgba(176,106,200,0.04));border:1px solid rgba(176,106,200,0.35);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:22px;flex-shrink:0">${a.icon}</span>
        <div style="flex:1;font-size:12px;color:var(--text);line-height:1.5">${a.text}</div>
        <button onclick="addPhotoFromDash('${a.cId}');dismissMilestone('${a.cId}','${a.key}')" style="background:var(--purple);border:none;color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:var(--font);font-weight:600">📸</button>
        <button onclick="dismissMilestone('${a.cId}','${a.key}')" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 4px" aria-label="Ausblenden">✕</button>
      </div>`;
    }
    const bg = { warn: '#1a1000', info: '#001020', success: '#001a00', tip: '#101000' }[a.type] || '#111';
    const bc = { warn: '#6a4000', info: '#004080', success: '#006000', tip: '#606000' }[a.type] || '#333';
    // Alerts with action=trichome jump to the trichome widget in today's entry
    const clickable = a.action === 'trichome' && a.cId;
    const extraAttr = clickable
      ? ` onclick="entryFrom='dash';openEntryAndScroll('${today}','trich-${a.cId}')" style="background:${bg};border-color:${bc};cursor:pointer"`
      : ` style="background:${bg};border-color:${bc}"`;
    return `<div class="alert"${extraAttr}>
      <span style="font-size:16px;flex-shrink:0">${a.icon}</span>
      <div style="font-size:12px;color:var(--text-sub);line-height:1.5">${a.text}</div>
      ${clickable ? `<span style="color:var(--yellow);font-size:16px;margin-left:auto">›</span>` : ''}
    </div>`;
  }).join('');

  // PROAKTIVE DIAGNOSE-HINTS (Phase 4 Schritt 2 Teil 3):
  // Prüft ob Zyklen auffällige Messwerte haben — wenn ja, sanfte Einladung
  // zum Problem-Diagnostiker. User kann Hint pro Zyklus ausblenden.
  const diagHints = act
    .map(c => getDiagnosticHints(c))
    .filter(h => h && !(S.dismissedDiagHints || []).includes(h.cycleId));
  const diagHintsHTML = diagHints.map(h =>
    `<div style="background:linear-gradient(135deg,rgba(232,136,74,0.12),rgba(232,136,74,0.04));border:1px solid rgba(232,136,74,0.4);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:22px;flex-shrink:0">${h.icon}</span>
      <div style="flex:1;font-size:12px;color:var(--text);line-height:1.5">${h.text}</div>
      <button onclick="openDiagnostics('${h.cycleId}')" style="background:var(--orange);border:none;color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:var(--font);font-weight:600;white-space:nowrap">Diagnose</button>
      <button onclick="dismissDiagHint('${h.cycleId}')" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 4px" aria-label="Ausblenden">✕</button>
    </div>`
  ).join('');

  const todayCard = act.length > 0 ? `<div class="card" style="gap:6px;display:flex;flex-direction:column">
    <div style="font-size:12px;color:var(--green);font-weight:600">${fmt}</div>
    ${act.map(c => {
      const p = phase(today, c), a = getAction(today, c), next = nextGiessTag(c, today);
      const cl = col(c);
      // Düngeplan-Woche berechnen
      let fertWk = 1;
      if (p) {
        if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
        else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
        else { const td = isoDiff(today, c.startDate); fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10)); }
      }
      const weekNames = {1:'Keimling',2:'Frühes Wachstum',3:'Vegetation',4:'Vorblüte',5:'Übergang',6:'Stacking',7:'Bud-Entw.',8:'Peak Bloom',9:'Finale Reife',10:'Herbst',11:'Spülen',12:'Ernte'};
      // Beginner: nur Phase + Tag. Profi: alle Infos inkl. Düngeplan-Woche.
      const subLine = S.beginnerMode
        ? `${PH_ICON[p?.ph] || ''} ${p ? PN[p.ph] : '—'} · ${phaseDayLabel(p)}`
        : `${PH_ICON[p?.ph] || ''} ${p ? PN[p.ph] : '—'} · ${phaseDayLabel(p)} · <span style="color:${cl.hex}">Wo${fertWk}</span> ${weekNames[fertWk] || ''}`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
        <span style="font-size:16px">${sym(c)}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${c.name}</div>
          <div style="font-size:11px;color:var(--text-muted)">${subLine}</div>
        </div>
        <div style="font-size:12px;color:${cl.hex};font-weight:500">${a
          ? (ACT_ICON[a] || '') + ' ' + (a === 'giess' ? 'Gießtag' : a === 'giess_anz' ? 'Anzucht' : PN[a] || a)
          : (next ? 'in ' + next.days + 'd' : '—')
        }</div>
      </div>`;
    }).join('')}
  </div>` : '';

  // Fokus-Zyklus (fc) für Stats: bevorzugt einen Zyklus mit einer Aktion heute.
  // Sonst nimmt die App einfach den ersten aktiven Zyklus. Das sorgt bei mehreren
  // Zyklen dafür dass die relevanteste Karte zuerst angezeigt wird.
  const cycleWithAction = act.find(c => getAction(today, c));
  const fc = cycleWithAction || act[0];
  const fcAction = fc ? getAction(today, fc) : null;

  // E2: "Heute zu tun"-Cards (only for cycles with an action today)
  const actionCards = act.map(c => {
    const p = phase(today, c), a = getAction(today, c);
    const td = getTodayAction(c, p, a, today);
    if (!td) return '';
    // Outdoor + Gieß-Tag: Regen-Skip-Button anbieten
    const isGiessToday = ['giess','giess_anz','spuelen','ice'].includes(a);
    const rainBtn = (c.growType === 'outdoor' && isGiessToday)
      ? `<button onclick="event.stopPropagation();skipGiessRain('${c.id}','${today}')" style="background:rgba(90,171,240,0.12);border:0.5px solid rgba(90,171,240,0.35);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--blue);cursor:pointer;font-family:var(--font);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px"><span>🌧</span><span>Es hat geregnet — heute nicht gießen</span></button>`
      : '';

    // "Erledigt"-Status: Timestamp als Schlüssel für schnelles Feedback
    const doneTs = S.entries[today]?.cycleData?.[c.id]?._doneTodo;
    const doneTime = doneTs ? new Date(doneTs).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }) : null;

    if (doneTs) {
      // Compact "✓ Erledigt" mode
      return `<div style="background:linear-gradient(135deg,rgba(76,175,112,0.1),rgba(76,175,112,0.04));border:1px solid rgba(76,175,112,0.4);border-radius:14px;padding:12px 16px;cursor:pointer" onclick="entryFrom='dash';openEntry('${today}')">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:22px">✓</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:var(--green)">Heute erledigt · ${doneTime}</div>
            <div style="font-size:11px;color:var(--text-muted)">${sym(c)} ${c.name} · ${td.title.replace(/^[^\w]*/,'').replace(/^Heute: /,'')}</div>
          </div>
          <button onclick="event.stopPropagation();markTodayUndone('${c.id}','${today}')" style="background:none;border:none;color:var(--text-hint);font-size:11px;cursor:pointer;padding:4px 8px;font-family:var(--font)">↺ Rückgängig</button>
        </div>
      </div>`;
    }

    return `<div style="background:linear-gradient(135deg,${td.color}18,${td.color}08);border:1px solid ${td.color}55;border-radius:14px;padding:14px 16px;cursor:pointer" onclick="entryFrom='dash';openEntry('${today}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:22px">${td.icon}</span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:${td.color}">${td.title}</div>
          <div style="font-size:11px;color:var(--text-muted)">${sym(c)} ${c.name}</div>
        </div>
        <span style="color:${td.color};font-size:20px">›</span>
      </div>
      ${S.beginnerMode && plainSentence(a, c, p, waterSuggestion(c, p)) ? `<div style="background:rgba(255,255,255,0.03);border:0.5px solid ${td.color}33;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:var(--text);line-height:1.55">${plainSentence(a, c, p, waterSuggestion(c, p))}</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:6px">
        ${td.steps.map((s, i) => `<div style="display:flex;gap:6px;font-size:12px;color:var(--text-sub);line-height:1.5">
          <span style="color:${td.color};font-weight:600;flex-shrink:0">${i + 1}.</span>
          <span>${s}</span>
        </div>`).join('')}
      </div>
      ${td.hint ? `<div style="font-size:10px;color:${td.color};opacity:0.85;border-top:0.5px solid ${td.color}33;padding-top:6px;margin-top:4px;line-height:1.4">💡 ${td.hint}</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
        <button onclick="event.stopPropagation();markTodayDone('${c.id}','${today}')" style="flex:1;background:${td.color};border:none;color:#fff;border-radius:10px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px">
          <span>✓</span><span>Erledigt</span>
        </button>
        ${rainBtn}
      </div>
    </div>`;
  }).filter(Boolean).join('');

  // Smart stats — einmaliger Durchlauf statt 3 separater Iterationen
  // (filter → map/filter → reduce). Bei vielen Entries wirkt sich das aus.
  let avgPH = '—', totalWater = 0, harvestDate = '—';
  if (fc) {
    let phSum = 0, phCount = 0;
    const allDates = Object.keys(S.entries);
    for (let i = 0; i < allDates.length; i++) {
      const cd = S.entries[allDates[i]]?.cycleData?.[fc.id];
      if (!cd?.water) continue;
      totalWater += parseFloat(cd.water) || 0;
      const phVal = parseFloat(cd.ph);
      if (phVal > 0) { phSum += phVal; phCount++; }
    }
    if (phCount > 0) avgPH = (phSum / phCount).toFixed(1);
    const hDays = (fc.anzuchtDays||PHASE_DEFAULTS.anzuchtDays) + (fc.bloomDays||PHASE_DEFAULTS.bloomDays) + (fc.flushDays||PHASE_DEFAULTS.flushDays) + (fc.iceDays||PHASE_DEFAULTS.iceDays);
    harvestDate = fmtDE(isoPlus(fc.startDate, hDays), {day:'2-digit', month:'short'});
  }

  // Bei mehreren aktiven Zyklen: Label zeigen auf welchen Zyklus sich die Stats beziehen.
  // Sonst wäre "Gesamt 39L" bei 3 Zyklen missverständlich.
  const multiCycLabel = act.length > 1 && fc ? `
    <div style="font-size:10px;color:var(--text-muted);padding:2px 4px 4px;display:flex;align-items:center;gap:6px">
      <span>${sym(fc)} <b style="color:${col(fc).hex}">${fc.name}</b></span>
      <span style="color:var(--text-hint)">· Werte beziehen sich auf diesen Zyklus</span>
    </div>
  ` : '';

  // Ernte-Countdown mit Unsicherheit (±X Tage) — ehrlicher als feste Zahl
  const fcCountdown = fc ? harvestCountdown(fc) : null;
  const harvestStatLabel = fcCountdown
    ? `${fcCountdown.daysRemaining >= 0 ? fcCountdown.daysRemaining : '—'}<span class="stat-unit"> ±${fcCountdown.uncertainty}d</span>`
    : '—';
  const harvestStatTitle = fcCountdown ? fcCountdown.tooltip : '';

  const stats = act.length > 0 ? (S.beginnerMode ? `<div class="stat-row">
    <div class="stat-box" title="${harvestStatTitle}"><div class="stat-lbl">Ernte in</div><div class="stat-val">${harvestStatLabel}</div></div>
    <div class="stat-box"><div class="stat-lbl">Heute</div><div class="stat-val" style="font-size:22px">${fcAction ? ACT_ICON[fcAction] || '💤' : '💤'}</div></div>
    <div class="stat-box"><div class="stat-lbl">Erntedatum</div><div class="stat-val" style="font-size:14px">${harvestDate}</div></div>
  </div>` : (() => {
    const streak = fc ? calcStreak(fc) : 0;
    // Streak: bei 0 einen Dash zeigen statt "0 🔥" — motivierender als demotivierender Startzustand.
    const streakDisplay = streak > 0
      ? `${streak}<span class="stat-unit"> 🔥</span>`
      : `<span style="color:var(--text-hint)">—</span>`;
    return `<div class="stat-row">
      <div class="stat-box" title="${harvestStatTitle}"><div class="stat-lbl">Ernte in</div><div class="stat-val">${harvestStatLabel}</div></div>
      <div class="stat-box"><div class="stat-lbl">Heute</div><div class="stat-val" style="font-size:22px">${fcAction ? ACT_ICON[fcAction] || '💤' : '💤'}</div></div>
      <div class="stat-box"><div class="stat-lbl">Ø pH</div><div class="stat-val" style="color:${avgPH !== '—' && parseFloat(avgPH) >= 6.2 && parseFloat(avgPH) <= 6.4 ? 'var(--green)' : avgPH !== '—' ? 'var(--orange)' : 'var(--text-hint)'}">${avgPH}</div></div>
    </div>
    <div class="stat-row" style="margin-top:6px">
      <div class="stat-box"><div class="stat-lbl">Gesamt 💧</div><div class="stat-val">${totalWater > 0 ? (totalWater/1000).toFixed(1) : '—'}<span class="stat-unit"> L</span></div></div>
      <div class="stat-box"><div class="stat-lbl">Erntedatum</div><div class="stat-val" style="font-size:14px">${harvestDate}</div></div>
      <div class="stat-box"><div class="stat-lbl">Streak</div><div class="stat-val">${streakDisplay}</div></div>
    </div>`;
  })()) : '';

  const cards = act.map(c => {
    const p = phase(today, c), a = getAction(today, c), cl = col(c), s = sym(c);
    const pct = p?.pct || 0, sf = fmtDE(c.startDate), next = nextGiessTag(c, today);
    const streak = calcStreak(c), wS = waterStats(c), maxW = Math.max(...wS, 1);
    const tip = getSmartTip(c, p);
    // pH/EC trend data (last 14 days)
    const phStats = [], ecStats = [];
    for (let i = 13; i >= 0; i--) {
      const d2 = isoPlus(today, -i);
      const cd2 = S.entries[d2]?.cycleData?.[c.id];
      phStats.push(parseFloat(cd2?.ph) || 0);
      ecStats.push(parseFloat(cd2?.ec) || 0);
    }
    const hasPhData = phStats.some(v => v > 0);
    const hasEcData = ecStats.some(v => v > 0);

    const stgNum = stageForCycle(c, today);
    const stgIcon = stgNum ? STAGE_ICONS[stgNum] : '';
    const stgName = stgNum ? STAGE_NAMES[stgNum] : null;

    return `<div style="background:${cl.dk};border:0.5px solid ${cl.hex}33;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;cursor:pointer" onclick="entryFrom='dash';openEntry('${today}')">
      <div style="display:flex;align-items:center;gap:12px">
        ${ring(pct, cl.hex)}
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
            ${stgIcon ? `<span style="width:22px;height:22px;display:inline-flex;flex-shrink:0">${stgIcon}</span>` : `<span style="font-size:16px">${s}</span>`}
            <span style="font-size:14px;font-weight:600">${c.name}</span>
            ${c.location ? `<span style="font-size:11px;color:var(--text-muted)">· ${c.location}</span>` : ''}
          </div>
          <div style="font-size:12px;color:${cl.hex};font-weight:500">${stgName || (p ? PN[p.ph] : '—')}${!S.beginnerMode && p?.week ? ' · Wo. ' + p.week : ''} · ${phaseDayLabel(p)}</div>
          ${S.beginnerMode ? '' : `<div style="display:flex;gap:8px;margin-top:3px;align-items:center">
            ${streak > 0 ? `<span class="streak">🔥 ${streak}</span>` : ''}
            <span style="font-size:10px;color:var(--text-muted)">Start ${sf}</span>
          </div>`}
        </div>
        <div style="text-align:center">
          <div style="font-size:26px">${a ? ACT_ICON[a] || '💤' : '💤'}</div>
          <div style="font-size:10px;color:${a ? cl.hex : 'var(--text-hint)'};font-weight:600;margin-top:1px">${a ? (a === 'giess' ? 'Gießen' : a === 'giess_anz' ? 'Gießen 🌱' : PN[a] || a) : 'Pause'}</div>
        </div>
      </div>
      ${!a && next ? `<div onclick="event.stopPropagation();entryFrom='dash';openEntry('${next.iso}')" style="background:${cl.hex}0c;border:0.5px solid ${cl.hex}22;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer">
        <span style="font-size:16px">💧</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:500;color:${cl.hex}">Nächster Gießtag</div>
          <div style="font-size:12px;color:var(--text-sub)">${fmtDE(next.iso, { weekday: 'long', day: '2-digit', month: 'short' })} · in ${next.days}d</div>
        </div>
        <span style="color:${cl.hex};font-size:16px">›</span>
      </div>` : ''}
      ${S.beginnerMode ? `<div style="display:flex;gap:6px;margin-top:4px">
        <button onclick="event.stopPropagation();addPhotoFromDash('${c.id}')" style="flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--text-sub);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px">
          <span style="font-size:16px">📸</span><span>Foto</span>
        </button>
        <button onclick="event.stopPropagation();entryFrom='dash';openEntry('${today}')" style="flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:12px;color:var(--text-sub);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px">
          <span style="font-size:16px">📝</span><span>Eintrag</span>
        </button>
      </div>` : ''}
      ${S.beginnerMode ? '' : `
      ${wS.filter(v => v > 0).length >= 3 ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text-hint);white-space:nowrap">14d 💧</span>
        <div class="mini-chart" style="flex:1">${wS.map(v =>
          `<div class="mini-bar" style="height:${Math.max(2, v / maxW * 100)}%;background:${cl.hex}${v ? '88' : '33'}"></div>`
        ).join('')}</div>
      </div>` : ''}
      ${hasPhData && phStats.filter(v => v > 0).length >= 3 ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text-hint);white-space:nowrap">14d pH</span>
        <div class="mini-chart" style="flex:1">${phStats.map(v => {
          const h = v > 0 ? Math.max(8, ((v - 5) / 2.5) * 100) : 2;
          const clr = v >= 6.2 && v <= 6.6 ? 'var(--green)' : v > 0 ? 'var(--orange)' : 'var(--border)';
          return `<div class="mini-bar" style="height:${Math.min(100, h)}%;background:${clr}55"></div>`;
        }).join('')}</div>
      </div>` : ''}
      ${hasEcData && ecStats.filter(v => v > 0).length >= 3 ? `<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text-hint);white-space:nowrap">14d EC</span>
        <div class="mini-chart" style="flex:1">${ecStats.map(v => {
          const h = v > 0 ? Math.max(8, (v / 3) * 100) : 2;
          const clr = v > 2.5 ? 'var(--red)' : v > 0 ? 'var(--teal)' : 'var(--border)';
          return `<div class="mini-bar" style="height:${Math.min(100, h)}%;background:${clr}55"></div>`;
        }).join('')}</div>
      </div>` : ''}
      `}
    </div>`;
  }).join('');

  // Empty-State: Wenn der User schon den Welcome-Screen gesehen hat (S._welcomeSeen=true)
  // ist eine erneute "Willkommen!"-Optik verwirrend — sie sieht aus wie ein Loop zurück.
  // In diesem Fall zeigen wir eine ruhigere "Dein Dashboard ist leer"-Variante.
  const empty = act.length === 0 ? (S._welcomeSeen ? `<div class="empty-state" style="padding:48px 20px 32px">
    <div style="font-size:56px;opacity:0.3;margin-bottom:12px">🌱</div>
    <div style="font-size:16px;color:var(--text-sub);font-weight:600;margin-bottom:6px">Noch kein aktiver Zyklus</div>
    <div style="font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:20px;max-width:300px">
      Sobald du einen Zyklus anlegst, siehst du hier dein Dashboard mit Tagesaufgaben, Wachstumskurven und Fotos.
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:stretch;width:100%;max-width:280px;margin:0 auto">
      <button id="welcome-start-btn" style="background:var(--green);border:none;border-radius:12px;padding:13px 18px;font-size:14px;color:#fff;cursor:pointer;font-family:var(--font);font-weight:700" onclick="openCycleWizard('dash')">🌱 Zyklus jetzt anlegen</button>
      <button onclick="welcomeStartDemo()" style="background:transparent;border:1px solid var(--border);border-radius:12px;padding:11px 18px;font-size:13px;color:var(--text-sub);cursor:pointer;font-family:var(--font);font-weight:500">🎓 Demo-Zyklus laden</button>
    </div>
    <div style="font-size:11px;color:var(--text-hint);margin-top:18px;line-height:1.5;max-width:280px">
      💡 Unten in den Tabs findest du <b>Kalender</b>, <b>Tipps</b> und <b>Einstellungen</b> zum Erkunden.
    </div>
  </div>` : `<div class="empty-state" style="padding:40px 20px">
    <div style="font-size:56px;opacity:0.3;margin-bottom:8px">🌱</div>

  </div>`) : '';

  // Charts section per active cycle (between Meine Zyklen and Foto-Galerie)

// =====================================================================
//  [SEKTION]: CALENDAR
// =====================================================================
const MN = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('cal-lbl').textContent = `${MN[m]} ${y}`;
  const act = active(), arch = archived(), today = todayISO();
  const fd = new Date(y, m, 1).getDay(), dim = new Date(y, m + 1, 0).getDate();
  const off = fd === 0 ? 6 : fd - 1;

  // Wetter nachladen falls Outdoor-Zyklus aktiv und Daten fehlen/alt.
  // loadWeatherData() hat eigenen Cache (1h), daher kein Spam.
  // Re-Render nur wenn wir vorher keine Daten hatten (vermeidet Schleife).
  if (act.some(c => c.growType === 'outdoor') && typeof loadWeatherData === 'function') {
    const hadData = !!(S.weather?.data?.forecast);
    loadWeatherData().then(data => {
      if (data && !hadData) renderCal();
    }).catch(() => {});
  }

  let cells = '';
  for (let i = 0; i < off; i++) cells += '<div></div>';

  // WETTER-OVERLAY (Phase 3 Schritt 5):
  // Nur aktiv wenn mindestens ein Outdoor-Zyklus läuft UND Wetter-Daten da sind.
  // Zeigt für die nächsten 7 Tage ein kleines Icon rechts oben in der Zelle.
  const hasOutdoor = act.some(c => c.growType === 'outdoor');
  const weatherForecast = (hasOutdoor && S.weather?.data?.forecast) ? S.weather.data.forecast : [];
  const weatherByDate = {};
  weatherForecast.forEach(f => { weatherByDate[f.date] = f; });

  for (let d = 1; d <= dim; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = iso === today;
    const hasEntry = !!S.entries[iso];
    const dayInfo = act.map(c => ({ c, a: getAction(iso, c), p: phase(iso, c) })).filter(x => x.p);
    const actionDay = dayInfo.find(x => x.a);
    const phaseDay = dayInfo[0];
    const isStart = act.some(c => c.startDate === iso);
    // Archived cycle phase info (faded)
    const archInfo = !phaseDay ? arch.map(c => ({ c, p: phase(iso, c) })).filter(x => x.p)[0] : null;
    // Check if this is a topping rest day or skipped day
    const isToppingRest = act.some(c => c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 2));
    const isToppingDay = act.some(c => c.toppingDate === iso);
    const isSkipped = act.some(c => c.skippedDays && c.skippedDays.includes(iso));

    // Action-type color mapping (v0.8.91): highlight key events beyond just emoji
    // Gießen stays in cycle-color. Ernte = gold. Spülen = light-blue. Ice = teal. Trocknen = amber.
    const ACT_COLORS = {
      ernte:    { bg: '#2a1f08', border: '#f0c050aa' },  // gold/amber — high-value event
      spuelen:  { bg: '#082028', border: '#5ab0d888' },  // light blue — water-related
      ice:      { bg: '#0a2428', border: '#6fdce088' },  // teal — cold
      trocknen: { bg: '#1f1408', border: '#c88a4888' },  // warm brown — drying
    };

    // PHASE-ÜBERGANG-MARKER (Phase 3 Schritt 3):
    // Prüfe ob heute der ERSTE Tag einer neuen Phase ist (gegenüber gestern).
    // Dann zeige einen dünnen farbigen Streifen an der linken Kante der Zelle.
    // Farben matchen mit dem Zyklus-Overview-Streifen.
    const PHASE_MARKER_COLORS = {
      anzucht: '#4caf70',
      vorzucht: '#4caf70',
      vegi_out: '#4caf70',
      abhärten: '#8acfa3',
      bloom: '#e8884a',
      flush: '#5ab0d8',
      ice: '#6fdce0',
      harvest: '#f0c050',
      dry: '#c88a48',
    };
    let phaseMarkerColor = null;
    let phaseMarkerLabel = null;
    if (phaseDay && phaseDay.p) {
      const yesterdayISO = isoPlus(iso, -1);
      const yp = phase(yesterdayISO, phaseDay.c);
      if (!yp || yp.ph !== phaseDay.p.ph) {
        // Phase-Übergang heute (oder Start-Tag)
        phaseMarkerColor = PHASE_MARKER_COLORS[phaseDay.p.ph];
        phaseMarkerLabel = PN[phaseDay.p.ph] || '';
      }
    }

    let bg = '#151515', border = 'transparent';
    if (isStart) { bg = '#1e1a04'; border = '#f0d050aa'; }
    else if (actionDay && ACT_COLORS[actionDay.a]) {
      // Use special color for key actions (ernte, spuelen, ice, trocknen)
      bg = ACT_COLORS[actionDay.a].bg;
      border = ACT_COLORS[actionDay.a].border;
    }
    else if (actionDay) { const cl = col(actionDay.c); bg = cl.dk; border = cl.hex + '77'; }
    else if (isToppingRest) { bg = '#150820'; border = 'rgba(176,106,200,0.3)'; }
    else if (isSkipped) { bg = '#1a1010'; border = 'rgba(224,96,96,0.15)'; }

    let icon = '';
    if (isStart) icon = START_ICON;
    else if (isToppingDay) icon = '✂️';
    else if (isToppingRest) icon = '😴';
    else if (isSkipped) icon = '🚫';
    else if (actionDay) icon = calActionIcon(actionDay.a);

    const tagCol = actionDay ? col(actionDay.c).hex : (phaseDay ? col(phaseDay.c).hex : 'rgba(255,255,255,0.35)');

    // Phase-Marker: dünner farbiger Strich am linken Rand (nicht am Start-Tag,
    // der hat schon seine eigene goldene Markierung)
    const phaseMarkerHTML = (phaseMarkerColor && !isStart)
      ? `<div title="${phaseMarkerLabel}" style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${phaseMarkerColor};border-radius:3px 0 0 3px;pointer-events:none"></div>`
      : '';

    // MULTI-ZYKLUS-PUNKTE (Phase 3 Schritt 4):
    // Bei mehreren aktiven Zyklen: Icon zeigt nur den Haupt-Zyklus (actionDay).
    // Zusätzliche Zyklen mit Aktion oder Topping-Tag werden als farbige
    // Punkte unten rechts in der Zelle markiert. So sieht der User auf einen
    // Blick wie viele Zyklen an dem Tag was zu tun haben.
    let multiCycleDotsHTML = '';
    if (act.length > 1) {
      const primaryCycle = actionDay?.c || (isToppingDay ? act.find(c => c.toppingDate === iso) : null);
      const extras = dayInfo
        .filter(info => {
          if (primaryCycle && info.c.id === primaryCycle.id) return false;
          // Zeige Punkt wenn: andere Aktion ODER Topping-Tag ODER Topping-Rest
          const hasEvent = !!info.a
            || info.c.toppingDate === iso
            || (info.c.toppingDate && isoDiff(iso, info.c.toppingDate) >= 1 && isoDiff(iso, info.c.toppingDate) <= (info.c.toppingPause || 2));
          return hasEvent;
        })
        .slice(0, 3); // max 3 Punkte (Platz-Limit)
      if (extras.length > 0) {
        // Wenn Entry-Dot vorhanden: Multi-Cycle-Dots links davon platzieren.
        // Sonst normal rechts.
        const rightOffset = hasEntry ? 14 : 2;
        multiCycleDotsHTML = `<div style="position:absolute;bottom:2px;right:${rightOffset}px;display:flex;gap:2px;pointer-events:none">
          ${extras.map(info => `<span style="width:5px;height:5px;border-radius:50%;background:${col(info.c).hex};box-shadow:0 0 0 1px rgba(0,0,0,0.4)"></span>`).join('')}
        </div>`;
      }
    }

    // Wetter-Icon für diesen Tag (Outdoor + in Forecast-Range)
    let weatherHTML = '';
    const wf = weatherByDate[iso];
    if (wf && !actionDay && !isStart) {
      // Nur zeigen wenn kein Action-Icon die Stelle braucht — Icon-Konflikte vermeiden.
      // Bei Gießtagen hat die Action-Info Vorrang. An Nicht-Aktions-Tagen zeigt das
      // Wetter-Icon oben rechts (subtil, pointer-events:none).
      const wi = weatherCodeToIcon(wf.weather_code);
      const rainWarn = wf.rain_sum >= 5 ? '💧' : ''; // kleine Tropfen-Warnung bei >5mm
      weatherHTML = `<span title="${wi.label} · ${wf.tmin}°–${wf.tmax}°C · ${wf.rain_sum}mm" style="position:absolute;top:1px;right:2px;font-size:10px;opacity:0.7;pointer-events:none;line-height:1">${wi.icon}${rainWarn}</span>`;
    }

    cells += `<div class="cal-cell ${isToday ? 'today' : ''}" style="background:${bg};border-color:${border};position:relative"
      onclick="calClick('${iso}')" oncontextmenu="return false" ontouchstart="lpS('${iso}',event)" ontouchend="lpE()" ontouchmove="lpE()">
      ${phaseMarkerHTML}
      ${weatherHTML}
      ${icon ? `<span class="cal-icon">${icon}</span>` : ''}
      <span class="cal-num" ${isStart ? 'style="color:#f0d050;font-weight:800"' : ''}>${d}</span>
      ${phaseDay ? `<span class="cal-tag" style="color:${tagCol}">T${phaseDay.p.day}</span>` : 
        archInfo ? `<span class="cal-tag" style="color:${col(archInfo.c).hex}44;font-size:8px">T${archInfo.p.day}</span>` : ''}
      ${hasEntry ? `<div class="cal-dot"></div>` : ''}
      ${multiCycleDotsHTML}
    </div>`;
  }

  const cycLeg = act.map(c =>
    `<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text-muted)">
      <span style="width:8px;height:8px;border-radius:50%;background:${col(c).hex};display:inline-block"></span>
      ${sym(c)} ${c.name}
    </span>`
  ).join(' ');

  document.getElementById('cal-body').innerHTML = `
    ${act.map(c => cycleOverviewStrip(c)).join('')}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(x => `<div style="text-align:center;font-size:11px;color:var(--text-muted);font-weight:600">${x}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    <div style="padding:6px 0;border-top:0.5px solid var(--border);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px">${cycLeg}</div>
    ${S.beginnerMode ? `
    <div style="padding:4px 0 2px;display:flex;flex-wrap:wrap;gap:4px 10px;font-size:10px;color:var(--text-hint)">
      <span>💧 Gießen</span>
      <span>✂️ Topping</span>
      <span>😴 Ruhetag</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:14px;height:14px;display:inline-flex">${CAL_SVG.spuelen}</span> Spülen</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:14px;height:14px;display:inline-flex">${CAL_SVG.ernte}</span> Ernte</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:14px;height:14px;display:inline-flex">${CAL_SVG.trocknen}</span> Trocknen</span>
    </div>
    <div style="font-size:10px;color:var(--text-hint);padding:2px 0">💡 Tipp: Auf einen Tag tippen zeigt alle Optionen</div>
    ` : `
    <div style="padding:4px 0 2px;display:flex;flex-wrap:wrap;gap:4px 10px;font-size:10px;color:var(--text-hint)">
      <span style="color:#f0d050">☘️ Start</span>
      <span>🌱 Anzucht</span>
      <span>💧 Gießen</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:14px;height:14px;display:inline-flex">${CAL_SVG.spuelen}</span> Spülen</span>
      <span>🧊 Ice</span>
      <span>✂️ Topping</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:14px;height:14px;display:inline-flex">${CAL_SVG.ernte}</span> Ernte</span>
      <span>😴 Ruhetag</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:14px;height:14px;display:inline-flex">${CAL_SVG.trocknen}</span> Trocknen</span>
    </div>
    <div style="padding:4px 0 2px;display:flex;flex-wrap:wrap;gap:4px 10px;font-size:10px;color:var(--text-hint)">
      <span style="color:#f0c050">Ernte-Tag (gold)</span>
      <span style="color:#5ab0d8">Spülen (blau)</span>
    </div>
    <div style="font-size:10px;color:var(--text-hint);padding:2px 0">📌 Gedrückt halten = Gießtag verschieben</div>
    `}`;
}

function changeMonth(d) { calDate = new Date(calDate.getFullYear(), calDate.getMonth() + d, 1); renderCal(); }

// =====================================================================
//  [SEKTION]: LONG PRESS + CONTEXT MENU (offsetHistory-based shifting)
// =====================================================================
let lpT = null;
let lpDone = false; // flag to prevent click after long-press
let lpX = 0, lpY = 0; // stored touch coords

function lpS(iso, e) {
  lpDone = false;
  // Store coordinates immediately before event gets recycled
  const touch = e.touches?.[0];
  if (touch) { lpX = touch.clientX; lpY = touch.clientY; }
  lpT = setTimeout(() => {
    lpT = null;
    lpDone = true; // mark that long-press completed
    vibrate(30);
    showCtx(iso);
  }, 450);
}

function lpE() { if (lpT) { clearTimeout(lpT); lpT = null; } }

function calClick(iso) {
  // Don't open entry if we just did a long-press
  if (lpDone) { lpDone = false; return; }
  // Anfänger-Modus: Statt direkt ins Entry springen, zeigen wir einen Tag-Picker
  // mit den verfügbaren Aktionen (Eintrag öffnen + ggf. Gießtag-Aktionen).
  // Das macht das Kontext-Menü entdeckbar ohne Long-Press zu kennen.
  if (S.beginnerMode) {
    showDayPicker(iso);
    return;
  }
  entryFrom = 'cal';
  openEntry(iso);
}

/**
 * Beginner Tag-Picker: Kleines Menü bei jedem Kalender-Tap mit:
 *  - "Eintrag öffnen" (Hauptaktion)
 *  - Ggf. verfügbare Kontextaktionen (Gießtag verschieben, Topping-Tag etc.)
 */
function showDayPicker(iso) {
  const act = active(), df = fmtDE(iso), today = todayISO();
  const hasEntry = !!S.entries[iso];
  const isFuture = iso >= today;
  const relevantCycles = act.map(c => ({ c, a: getAction(iso, c), p: phase(iso, c) })).filter(x => x.p);

  // Header-Text: was ist an diesem Tag?
  let dayTypeText = '';
  const actionOnDay = relevantCycles.find(x => x.a);
  if (actionOnDay) {
    const actLabel = { giess: 'Gießtag', giess_anz: 'Anzucht-Gießtag', spuelen: 'Spültag', ice: 'IceFlush', ernte: 'Erntetag', trocknen: 'Trocknung' }[actionOnDay.a] || PN[actionOnDay.a] || actionOnDay.a;
    dayTypeText = `${ACT_ICON[actionOnDay.a] || ''} ${actLabel}`;
  } else if (relevantCycles.length > 0) {
    const p = relevantCycles[0].p;
    dayTypeText = `${PH_ICON[p.ph] || ''} ${PN[p.ph]} · ${phaseDayLabel(p)}`;
  } else {
    dayTypeText = 'Kein aktiver Zyklus';
  }

  const overlay = document.createElement('div');
  overlay.setAttribute('data-day-picker', '1');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:16px;animation:modalIn 0.18s ease';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  // Aktions-Buttons bauen
  const hasShiftable = isFuture && relevantCycles.some(x => x.a && !isToppingLocked(x.c, iso));
  const canTopping = !isFuture === false && relevantCycles.some(x => !x.c.toppingDate);  // simplified: user can always mark later
  // Ruhetag nach Topping: User kann Pause um 1 Tag verlängern wenn Pflanze mehr Zeit braucht.
  const extendableTopCycles = isFuture ? relevantCycles.filter(x => {
    if (!x.c.toppingDate) return false;
    const d = isoDiff(iso, x.c.toppingDate);
    const pause = x.c.toppingPause || 2;
    return d >= 1 && d <= pause;
  }).map(x => x.c) : [];

  let actionsHTML = '';
  if (hasShiftable) {
    actionsHTML += `
      <button onclick="document.querySelectorAll('[data-day-picker]').forEach(x=>x.remove());showCtx('${iso}')" style="display:flex;align-items:center;gap:12px;width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;font-family:var(--font);color:var(--text);text-align:left;margin-bottom:8px">
        <span style="font-size:22px">📆</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">Gießtag verschieben</div>
          <div style="font-size:11px;color:var(--text-muted)">Vorziehen, verschieben oder entfernen</div>
        </div>
        <span style="color:var(--text-muted);font-size:16px">›</span>
      </button>`;
  }
  if (extendableTopCycles.length > 0) {
    const c0 = extendableTopCycles[0];
    actionsHTML += `
      <button onclick="document.querySelectorAll('[data-day-picker]').forEach(x=>x.remove());extendToppingPause('${c0.id}')" style="display:flex;align-items:center;gap:12px;width:100%;background:var(--card2);border:1px solid rgba(176,106,200,0.3);border-radius:12px;padding:14px;cursor:pointer;font-family:var(--font);color:var(--purple);text-align:left;margin-bottom:8px">
        <span style="font-size:22px">😴</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">Ruhetag verlängern (+1 Tag)</div>
          <div style="font-size:11px;color:var(--text-muted)">Pflanze braucht mehr Erholung nach Topping</div>
        </div>
        <span style="color:var(--text-muted);font-size:16px">›</span>
      </button>`;
  }

  overlay.innerHTML = `
    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:14px;font-weight:600;color:var(--text)">${df}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${dayTypeText}${hasEntry ? ' · 📝 Eintrag vorhanden' : ''}</div>
      </div>
      ${!isFuture ? (() => {
        const preview = dayDataPreview(iso);

      })() : ''}
      <button onclick="document.querySelectorAll('[data-day-picker]').forEach(x=>x.remove());entryFrom='cal';openEntry('${iso}')" style="display:flex;align-items:center;gap:12px;width:100%;background:var(--green);border:none;border-radius:12px;padding:14px;cursor:pointer;font-family:var(--font);color:#fff;text-align:left;margin-bottom:8px;font-weight:700">
        <span style="font-size:22px">📝</span>
        <div style="flex:1">
          <div style="font-size:14px">${hasEntry ? 'Eintrag bearbeiten' : 'Neuen Eintrag anlegen'}</div>
          <div style="font-size:11px;opacity:0.85;font-weight:500">Werte, Notizen, Fotos</div>
        </div>

    </div>
  `;
  document.body.appendChild(overlay);
}

function showCtx(iso) {
  const act = active(), df = fmtDE(iso), today = todayISO();
  let items = [];
  const isFuture = iso >= today;

  act.forEach(c => {
    const p = phase(iso, c);
    if (!p) return;
    const s = sym(c), a = getAction(iso, c);
    const lockReason = isToppingLocked(c, iso);

    if (isFuture && a && !lockReason) {
      // Gießtag in der Zukunft/heute → verschieben möglich
      items.push(`<div class="ctx-item ctx-b" onclick="doShift('${c.id}', -1, '${iso}')">
        <span class="ctx-ic">←</span>${s} ${ACT_ICON[a] || ''} Vorziehen
      </div>`);
      items.push(`<div class="ctx-item" style="color:var(--orange)" onclick="doShift('${c.id}', 1, '${iso}')">
        <span class="ctx-ic">→</span>${s} ${ACT_ICON[a] || ''} Auf morgen verschieben
      </div>`);
      items.push(`<div class="ctx-item ctx-r" onclick="skipDayFromCal('${c.id}','${iso}')">
        <span class="ctx-ic">🚫</span>${s} Gießtag entfernen
      </div>`);
    } else if (isFuture && a && lockReason) {
      // Gießtag liegt im Topping-Fenster — gesperrt, Hinweis zeigen
      items.push(`<div class="ctx-item" style="opacity:0.7;cursor:default;background:rgba(240,208,80,0.06);border-color:rgba(240,208,80,0.2)">
        <span class="ctx-ic">🔒</span><div style="font-size:11px;line-height:1.4">${s} Verschieben gesperrt<br><span style="font-size:10px;color:var(--text-muted)">${lockReason}</span></div>
      </div>`);
    }

    // Show restore option if this day was skipped
    if (c.skippedDays && c.skippedDays.includes(iso)) {
      items.push(`<div class="ctx-item ctx-g" onclick="restoreDayFromCal('${c.id}','${iso}')">
        <span class="ctx-ic">↩</span>${s} Gießtag wiederherstellen
      </div>`);
    }

    // Ruhetag-Verlängerung: Nur wenn dieser Tag in der aktuellen Topping-Pause liegt
    // (also Tag 1…pause nach dem Topping-Datum) UND in Zukunft/heute.
    // Das gibt dem User einen schnellen Weg der Pflanze noch einen Tag mehr Ruhe zu geben
    // ohne manuell das Topping aufzuheben und neu zu setzen.
    if (isFuture && c.toppingDate) {
      const daysSinceTop = isoDiff(iso, c.toppingDate);
      const pause = c.toppingPause || 2;
      if (daysSinceTop >= 1 && daysSinceTop <= pause) {
        items.push(`<div class="ctx-item" style="color:var(--purple)" onclick="extendToppingPause('${c.id}')">
          <span class="ctx-ic">😴</span>${s} Ruhetag verlängern (+1)
        </div>`);
      }
    }
  });

  if (items.length) items.push('<div class="ctx-div"></div>');

  // Start inactive cycles on this date
  S.cycles.filter(c => !c.active).forEach(c =>
    items.push(`<div class="ctx-item ctx-g" onclick="startOn('${c.id}','${iso}')">
      <span class="ctx-ic">▶</span>${sym(c)} ${c.name} starten
    </div>`)
  );

  // End active cycles — nur am Start-Tag ODER am Ernte-Tag sichtbar.
  // Phase 3 Schritt 7: Schützt vor Fehl-Taps mitten im Zyklus. Für echte
  // Abbrüche gibt's "Archivieren" in den Einstellungen.
  act.forEach(c => {
    if (!c.startDate) return;
    const ctx = contextFor(c, iso);
    const isStartDay = c.startDate === iso;
    // Ernte-Tag = erster Tag der Ernte-Phase (isHarvest = true an dem Tag)
    // Oder der Tag davor (Flush-/Ice-Ende) — wir nehmen den Ernte-Phase-Beginn.
    const isHarvestDay = ctx && ctx.isHarvest;
    if (!isStartDay && !isHarvestDay) return;

    const label = isStartDay ? 'Zyklus abbrechen' : 'Ernte & beenden';
    items.push(`<div class="ctx-item ctx-r" onclick="stopC('${c.id}','${isStartDay ? 'cancel' : 'harvest'}')">
      <span class="ctx-ic">${isStartDay ? '✕' : '🌾'}</span>${sym(c)} ${c.name} — ${label}
    </div>`);
  });

  if (items.length) items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calClick('${iso}');closeCtx()"><span class="ctx-ic">✏</span>Eintrag öffnen</div>`);

  const menu = document.getElementById('ctx-m');
  const dayInfo = act.map(c => { const p = phase(iso, c); const cl2 = col(c); return p ? `<span style="color:${cl2.hex}">${sym(c)} T${p.day}</span>` : ''; }).filter(Boolean).join(' ');
  const actionInfo = act.map(c => { const a2 = getAction(iso, c); return a2 ? ACT_ICON[a2] : ''; }).filter(Boolean).join(' ');

  // HISTORISCHE DATENVORSCHAU (Phase 3 Schritt 2):
  // Für vergangene Tage mit Einträgen zeigen wir direkt die wichtigsten Werte.
  // Helper dayDataPreview() respektiert Prinzip 8 (Ehrlichkeit der Daten).
  let previewHTML = '';
  if (!isFuture) {
    const preview = dayDataPreview(iso);
    if (preview) previewHTML = `<div style="padding:0 16px 6px">${preview}</div>`;
  }

  menu.innerHTML = `<div style="padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:600;color:var(--text)">${df}</span>
    <span style="font-size:12px">${dayInfo} ${actionInfo}</span>
  </div>${previewHTML}` + items.join('');

  const x = lpX ? Math.min(Math.max(8, lpX), window.innerWidth - 280) : window.innerWidth / 2 - 140;
  // Y-Position berücksichtigt ca. 48px pro Item + evtl. Preview-Höhe (~80px wenn vorhanden)
  const extraH = previewHTML ? 90 : 0;
  const y = lpY ? Math.min(lpY - 20, window.innerHeight - items.length * 48 - 40 - extraH) : window.innerHeight / 2;
  menu.style.left = x + 'px';
  menu.style.top = Math.max(8, y) + 'px';
  menu.classList.add('show');
  document.getElementById('ctx-ov').classList.add('show');
}

function closeCtx() {
  document.getElementById('ctx-m').classList.remove('show');
  document.getElementById('ctx-ov').classList.remove('show');
}

/**
 * Checks if a watering day is "locked" from shifting because of a planned topping.
 * Returns a string with the reason if locked, null otherwise.
 *
 * The rule: A watering 2–4h before topping is critical for clean healing. Once set,
 * do not move it. Also: the days immediately around the topping date are off-limits
 * for rhythm changes because the whole topping-sequence is pre-planned.
 *
 * Locked windows:
 *   - The topping date itself (already a rest-day, but block explicitly)
 *   - The day BEFORE topping (that's the "Gieß vor Topping"-day)
 *   - Any day within the topping rest period (toppingDate + 1 … toppingDate + pause)
 */
function isToppingLocked(c, iso) {
  if (!c || !c.toppingDate) return null;
  const diff = isoDiff(iso, c.toppingDate);
  const pause = c.toppingPause || 2;
  if (diff === 0) return 'Topping-Tag — nicht verschieben.';
  if (diff === -1) return 'Gieß-Tag vor dem Topping — muss 2–4h vor dem Schnitt liegen (Turgordruck).';
  if (diff >= 1 && diff <= pause) return 'Ruhetag nach Topping — Rhythmus läuft nach der Pause weiter.';
  return null;
}

/**
 * Shift watering grid for a cycle.
 * +1 = Auf morgen verschieben (Topf noch nass)
 * -1 = Vorziehen (Topf schon trocken)
 *
 * actionISO = das Datum des Gießtags, der verschoben wird.
 * Jeder Shift erzeugt einen neuen Eintrag in offsetHistory.
 * Die Grenze (date) ist der Tag, AB dem der neue Offset gilt.
 */
function doShift(cId, days, actionISO) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const today = todayISO();

  // actionISO kommt direkt vom Kontextmenü = der angeklickte Gießtag
  // Falls nicht übergeben (Fallback): nächsten Gießtag ab heute suchen
  const actionDay = actionISO || findNextActionDay(c, today);
  if (!actionDay) { toast('⚠ Kein Gießtag gefunden'); return; }

  // Guard: Lock around topping (Turgordruck, Stress, Nährstoffe)
  const lockReason = isToppingLocked(c, actionDay);
  if (lockReason) { toast('🚫 ' + lockReason); return; }

  // Block: Vorziehen nur wenn Aktionstag NACH heute liegt
  if (days < 0 && actionDay <= today) {
    toast('⚠ Kann nicht weiter vorziehen');
    return;
  }

  // Grenze: Bei Vorziehen 1 Tag VOR dem Aktionstag,
  // damit das vorgezogene Icon im neuen Offset-Bereich landet.
  // Bei Verschieben: der Aktionstag selbst (dort verschwindet das Icon,
  // und am Folgetag erscheint es im neuen Raster).
  const boundary = days < 0 ? isoPlus(actionDay, -1) : actionDay;

  if (!c.offsetHistory) c.offsetHistory = [];
  c.offsetHistory.push({ date: boundary, offset: days });

  saveS();
  renderCal();
  vibrate();
  toast(days > 0 ? '→ Auf morgen verschoben' : '← Vorgezogen');
}

/** Same as doShift but re-renders the entry screen */
function doShiftFromEntry(cId, days) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const today = todayISO();

  const actionDay = findNextActionDay(c, today);
  if (!actionDay) { toast('⚠ Kein Gießtag gefunden'); return; }

  // Guard: Lock around topping
  const lockReason = isToppingLocked(c, actionDay);
  if (lockReason) { toast('🚫 ' + lockReason); return; }

  if (days < 0 && actionDay <= today) {
    toast('⚠ Kann nicht weiter vorziehen');
    return;
  }

  const boundary = days < 0 ? isoPlus(actionDay, -1) : actionDay;

  if (!c.offsetHistory) c.offsetHistory = [];
  c.offsetHistory.push({ date: boundary, offset: days });

  saveS();
  vibrate();
  toast(days > 0 ? '→ Auf morgen verschoben' : '← Vorgezogen');
  if (editISO) renderEntry(editISO);
}

/** Find the next action day from a given date (inclusive) */
function findNextActionDay(c, from) {
  for (let i = 0; i <= 30; i++) {
    const iso = isoPlus(from, i);
    if (getAction(iso, c)) return iso;
  }
  return null;
}

/** Skip a day from calendar context menu */
function skipDayFromCal(cId, iso) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  if (!c.skippedDays) c.skippedDays = [];
  if (!c.skippedDays.includes(iso)) c.skippedDays.push(iso);
  saveS();
  vibrate();
  renderCal();
  toast('🚫 Gießtag entfernt');
}

/** Restore a skipped day from calendar context menu */
function restoreDayFromCal(cId, iso) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.skippedDays) return;
  c.skippedDays = c.skippedDays.filter(d => d !== iso);
  saveS();
  vibrate();
  renderCal();
  toast('↩ Wiederhergestellt');
}

/**
 * Topping: Gießen + Toppen am aktuellen Tag.
 * Danach 3 Tage Ruhe. Der Offset wird so berechnet,
 * dass der erste Guss exakt am Tag nach der Ruhe landet.
 */
async function doTopping(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const pause = c.toppingPause || 2;
  const ok = await customConfirm(
    '✂️ Jetzt Toppen?',
    `Heute gießen + toppen. Danach ${pause} Tage Ruhe. Erster Guss am ${fmtDE(isoPlus(iso, pause + 1), {day:'2-digit', month:'2-digit'})}.`,
    'Toppen', 'var(--purple)'
  );
  if (!ok) return;
  c.toppingDate = iso;

  // Berechne den Offset so, dass der erste Guss nach der Pause
  // exakt auf toppingDate + pause + 1 fällt
  const resumeDay = isoPlus(iso, pause + 1);
  const neededOffset = calcToppingOffset(c, iso, pause);

  if (neededOffset !== 0) {
    const boundary = isoPlus(iso, 1);
    if (!c.offsetHistory) c.offsetHistory = [];
    c.offsetHistory.push({ date: boundary, offset: neededOffset });
    // Remember which offset entry was added by topping (for undo)
    c._toppingOffsetBoundary = boundary;
    c._toppingOffsetValue = neededOffset;
  } else {
    c._toppingOffsetBoundary = null;
    c._toppingOffsetValue = 0;
  }
  saveS();
  vibrate();
  toast(`✂️ Getoppt! Nächster Guss: ${fmtDE(resumeDay, {day:'2-digit', month:'2-digit'})}`);
  if (editISO) renderEntry(editISO);
}

/**
 * Topping-Ruhetag um einen Tag verlängern.
 * Die Pflanze braucht mehr Erholung → Pause +1, nachfolgende Gießtage +1 verschieben.
 * Nutzt die gleiche Offset-Mechanik wie doTopping — löscht den alten Topping-Offset
 * und rechnet ihn mit der neuen Pause neu, damit der resumeDay wieder auf's Raster fällt.
 */
async function extendToppingPause(cId) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.toppingDate) return;
  const oldPause = c.toppingPause || 2;
  const newPause = oldPause + 1;
  const newResume = isoPlus(c.toppingDate, newPause + 1);
  const ok = await customConfirm(
    '😴 Ruhetag verlängern?',
    `Die Pflanze bekommt einen zusätzlichen Tag Ruhe. Pause wird von ${oldPause} auf ${newPause} Tage verlängert. Alle nachfolgenden Gießtage verschieben sich um einen Tag nach hinten.\n\nNächster Guss dann: ${fmtDE(newResume, {day:'2-digit', month:'2-digit', year:'numeric'})}`,
    'Verlängern', 'var(--purple)'
  );
  if (!ok) return;

  pushUndo();

  // 1. Alten Topping-Offset aus offsetHistory entfernen (falls vorhanden)
  if (c._toppingOffsetBoundary && c._toppingOffsetValue && c.offsetHistory) {
    const b = c._toppingOffsetBoundary;
    const v = c._toppingOffsetValue;
    const idx = c.offsetHistory.findIndex(e => e.date === b && e.offset === v);
    if (idx >= 0) c.offsetHistory.splice(idx, 1);
  }

  // 2. Neue Pause setzen
  c.toppingPause = newPause;

  // 3. Neuen Offset mit neuer Pause berechnen
  const neededOffset = calcToppingOffset(c, c.toppingDate, newPause);
  if (neededOffset !== 0) {
    const boundary = isoPlus(c.toppingDate, 1);
    if (!c.offsetHistory) c.offsetHistory = [];
    c.offsetHistory.push({ date: boundary, offset: neededOffset });
    c._toppingOffsetBoundary = boundary;
    c._toppingOffsetValue = neededOffset;
  } else {
    c._toppingOffsetBoundary = null;
    c._toppingOffsetValue = 0;
  }

  saveS();
  closeCtx();
  vibrate();
  toast(`😴 Ruhetag verlängert — nächster Guss: ${fmtDE(newResume, {day:'2-digit', month:'2-digit'})}`);
  renderCal();
  if (editISO) renderEntry(editISO);
}

/** Undo topping: clear toppingDate and remove the associated offset */
async function undoTopping(cId) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.toppingDate) return;
  const ok = await customConfirm(
    '↩ Topping rückgängig machen?',
    `Das Topping vom ${fmtDE(c.toppingDate, {day:'2-digit', month:'2-digit', year:'numeric'})} wird entfernt. Die Ruhetage und der Offset werden zurückgesetzt, der Gießrhythmus läuft wie zuvor weiter.`,
    'Rückgängig', 'var(--red)'
  );
  if (!ok) return;

  // Remove the offset entry that was added by topping
  if (c._toppingOffsetBoundary && c._toppingOffsetValue && c.offsetHistory) {
    const b = c._toppingOffsetBoundary;
    const v = c._toppingOffsetValue;
    // Find and remove the matching entry (first match with same date+offset)
    const idx = c.offsetHistory.findIndex(e => e.date === b && e.offset === v);
    if (idx !== -1) c.offsetHistory.splice(idx, 1);
  }
  c.toppingDate = null;
  c._toppingOffsetBoundary = null;
  c._toppingOffsetValue = 0;

  saveS();
  vibrate();
  toast('↩ Topping zurückgesetzt');
  if (editISO) renderEntry(editISO);
  renderCal();
}

function pickTrainingType(cId, iso, type) {

/**
 * Entfernt einen Trainings-Event nach Bestätigung.
 */
async function removeTrainingEvent(cId, iso, idx) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.trainingEvents) return;

  const event = (c.trainingEvents || []).filter(e => e.date === iso)[idx];
  if (!event) return;
  const meta = T.training[event.type];
  const label = meta ? meta.label : event.type;

  const ok = await customConfirm(
    `${meta?.icon || '🌿'} ${label} entfernen?`,
    'Der Eintrag wird aus der Trainings-Historie entfernt.',
    'Entfernen', 'var(--red)'
  );
  if (!ok) return;

  // Entferne den richtigen Event (derselbe iso + Index im gefilterten Array)
  let filteredIdx = 0;
  const newEvents = c.trainingEvents.filter(e => {
    if (e.date !== iso) return true;
    const keep = filteredIdx !== idx;
    filteredIdx++;
    return keep;
  });
  c.trainingEvents = newEvents;
  saveS();
  vibrate();
  toast('Entfernt');
  if (editISO) renderEntry(editISO);
}

/**
 * Berechnet den minimalen Offset damit der Gießtag auf den Resume-Tag fällt.
 * Probiert Offsets 0 bis interval-1 durch.
 * Benutzt den kumulativen Offset aus offsetHistory für den Resume-Tag.
 */
function calcToppingOffset(c, toppingISO, pause) {
  const resumeDay = isoPlus(toppingISO, pause + 1);

  // Kumulativen Offset für den Resume-Tag berechnen (ohne den neuen Topping-Offset)
  let currentOffset = 0;
  for (const entry of c.offsetHistory || []) {
    if (resumeDay >= entry.date) currentOffset += entry.offset;
  }

  const diffFromStart = isoDiff(resumeDay, c.startDate);
  const a = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const iv = diffFromStart < a ? (c.intAnzucht || 3) : (c.intBloom || 3);

  for (let testOff = 0; testOff < iv; testOff++) {
    const totalOff = currentOffset + testOff;
    const vs = isoPlus(c.startDate, totalOff);
    const diff = isoDiff(resumeDay, vs);
    if (diff < 0) continue;
    const ps = diff < a ? 0 : a;
    const dip = diff - ps;
    if (dip >= 0 && dip % iv === 0) return testOff;
  }
  return 1; // fallback
}

/**
 * Einzelnen Gießtag entfernen (stumm schalten).
 * Das Raster bleibt komplett intakt – nur dieser eine Tag wird übersprungen.
 */
async function skipDay(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const ok = await customConfirm(
    'Gießtag entfernen?',
    `Dieser Gießtag wird übersprungen. Das Raster bleibt unverändert – alle anderen Gießtage bleiben wo sie sind.`,
    'Entfernen', 'var(--red)'
  );
  if (!ok) return;
  if (!c.skippedDays) c.skippedDays = [];
  if (!c.skippedDays.includes(iso)) c.skippedDays.push(iso);
  saveS();
  vibrate();
  toast('🚫 Gießtag entfernt');
  if (editISO) renderEntry(editISO);
}

/**
 * Outdoor: User markiert den Tag als "Regen hat gegossen" — Gieß-Plan bleibt
 * unverändert, nur dieser eine Tag gilt als erledigt ohne eigenes Gießen.
 * Technisch identisch zu skipDay (beide nutzen skippedDays), aber mit
 * positivem Framing: kein Confirm-Dialog, anderer Toast.
 */
function rainSkip(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  if (!c.skippedDays) c.skippedDays = [];
  if (!c.skippedDays.includes(iso)) c.skippedDays.push(iso);
  saveS();
  vibrate(8);
  toast('☔ Regen-Tag markiert — Plan läuft weiter');
  if (editISO) renderEntry(editISO);
}

/** Entfernten Gießtag wiederherstellen */
function restoreDay(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.skippedDays) return;
  c.skippedDays = c.skippedDays.filter(d => d !== iso);
  saveS();
  vibrate();
  toast('↩ Wiederhergestellt');
  if (editISO) renderEntry(editISO);
}

function startOn(cId, iso) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  c.active = true;
  c.startDate = iso;
  saveS();
  renderCal();
  toast(`${sym(c)} gestartet!`);
  setTimeout(() => { selId = cId; draft = {}; goTo('set'); }, 800);
}

async function stopC(cId, mode = 'default') {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;

  // Mode-spezifische Warnung:
  //   'cancel'  — Start-Tag: Zyklus wurde gerade angelegt, Abbruch = fast folgenlos
  //   'harvest' — Ernte-Tag: planmäßige Ernte, freundliche Bestätigung
  //   'default' — alter Aufruf-Pfad (z.B. aus Einstellungen)
  let title, msg, btnText;
  if (mode === 'cancel') {
    title = `"${c.name}" abbrechen?`;
    msg = 'Der Zyklus wurde erst heute angelegt. Beim Abbruch bleiben Zyklus und Einträge erhalten, werden aber als inaktiv markiert. Du kannst das später in den Einstellungen rückgängig machen.';
    btnText = 'Abbrechen';
  } else if (mode === 'harvest') {
    title = `🌾 "${c.name}" ernten & beenden?`;
    msg = 'Glückwunsch zur Ernte! Der Zyklus wird deaktiviert, aber Startdatum, Einträge und Fotos bleiben für immer erhalten. Perfekt für den Rückblick und Zyklus-Vergleich.';
    btnText = 'Ernten';
  } else {
    title = `"${c.name}" beenden?`;
    msg = 'Der Zyklus wird deaktiviert. Startdatum und Einträge bleiben erhalten — tippe "Archivieren" in den Einstellungen falls du die Phasen im Kalender noch sehen willst.';
    btnText = 'Beenden';
  }

  const ok = await customConfirm(title, msg, btnText, 'var(--red)');
  if (!ok) return;
  // Only deactivate — keep startDate, offsetHistory, toppingDate, skippedDays
  // so past entries remain readable and phase/action renders correctly.
  c.active = false;
  saveS();
  renderCal();
  toast(mode === 'harvest' ? `🌾 Ernte eingeleitet — gute Trocknung!` : `${sym(c)} beendet`);
}

/**
 * Meta-search handler for Tips tab.
 * Searches across _tipsSnapshot (current tips) + LEXIKON + HOWTO in one go.
 * DOM-stable: only updates #tips-search-results, keeps search input intact
 * so mobile keyboard stays open.
 */
function _onTipsSearchInput(q) {
  const query = (q || '').trim();
  const normQuery = _normSearch(query);
  const resultsEl = document.getElementById('tips-search-results');
  const normalEl = document.getElementById('tips-normal');
  const clearBtn = document.getElementById('tips-search-clear');
  if (!resultsEl || !normalEl) return;

  // Toggle visibility
  normalEl.style.display = query ? 'none' : 'block';
  resultsEl.style.display = query ? 'block' : 'none';
  if (clearBtn) clearBtn.style.display = query ? 'flex' : 'none';

  if (!query) {
    resultsEl.innerHTML = '';
    return;
  }

  // --- Collect matches from three sources ---

  // 1. Tips (from current snapshot)
  const tipHits = (_tipsSnapshot || []).filter(t => {
    const hay = _normSearch((t.text || '') + ' ' + (t.cat || ''));
    return hay.includes(normQuery);
  });

  // 2. Lexikon entries
  const lexHits = [];
  if (typeof LEXIKON !== 'undefined') {
    LEXIKON.forEach(cat => {
      cat.items.forEach(item => {
        const hay = _normSearch((item.t || '') + ' ' + (item.txt || '') + ' ' + cat.cat);
        if (hay.includes(normQuery)) {
          lexHits.push({ title: item.t, text: item.txt, cat: cat.cat });
        }
      });
    });
  }

  // 3. How-to entries
  const howtoHits = [];
  if (typeof HOWTO !== 'undefined') {
    HOWTO.forEach(cat => {
      cat.items.forEach(item => {
        const hay = _normSearch((item.t || '') + ' ' + (item.txt || '') + ' ' + cat.cat);
        if (hay.includes(normQuery)) {
          howtoHits.push({ title: item.t, text: item.txt, cat: cat.cat });
        }
      });
    });
  }

  const totalHits = tipHits.length + lexHits.length + howtoHits.length;

  // --- Build output HTML ---

  const headerHTML = `

  const tipsSection = tipHits.length > 0 ? `

    ${tipHits.map(t => `
      <div class="tip-card" ${t.lex ? `onclick="openLexikonEntry('${t.lex}')" style="cursor:pointer"` : ''}>

      </div>
    `).join('')}` : '';

  // How-to section
  const howtoSection = howtoHits.length > 0 ? `

  resultsEl.innerHTML = headerHTML + tipsSection + lexSection + howtoSection;
}

/**
 * Extract a snippet of text around the first match of query, stripping HTML.
 * Returns up to maxLen chars centered on the match, with "…" prefixes/suffixes as needed.
 */
function _snippet(html, query, maxLen) {
  const txt = String(html).replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  const normTxt = _normSearch(txt);
  const normQuery = _normSearch(query);
  if (!normQuery) return txt.slice(0, maxLen) + (txt.length > maxLen ? '…' : '');
  const idx = normTxt.indexOf(normQuery);
  if (idx < 0) return txt.slice(0, maxLen) + (txt.length > maxLen ? '…' : '');
  const start = Math.max(0, idx - Math.floor(maxLen / 3));
  const end = Math.min(txt.length, start + maxLen);
  const prefix = start > 0 ? '…' : '';
  const suffix = end < txt.length ? '…' : '';
  return prefix + txt.slice(start, end) + suffix;
}
