/**
 * Druckbarer Grow-Bericht: Öffnet ein neues Fenster mit formatiertem HTML
 * das der User per Browser-Funktion als PDF speichern kann. Enthält alle Fotos,
 * pH/EC-Verlauf, Gießmengen, Notizen und Zyklus-Zusammenfassung.
 */
function exportReportPDF(cId) {
  const c = cId
    ? S.cycles.find(x => x.id === cId)
    : (active()[0] || S.cycles[0]);
  if (!c) { toast('Keine Zyklen zum Exportieren'); return; }

  const dates = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[c.id]).sort();
  const cl = col(c);
  const startStr = fmtDE(c.startDate, { day:'2-digit', month:'long', year:'numeric' });
  const today = todayISO();
  const p = phase(today, c);

  // Statistiken sammeln — nur GEMESSENE Werte (Ehrlichkeit Prinzip 8)
  let totalWater = 0;
  const phVals = [], ecVals = [];
  const runoffPhDeltas = [], runoffEcDeltas = [];
  let measuredPh = 0, suggestedPh = 0;
  let measuredEc = 0, suggestedEc = 0;
  let sweetSpotCount = 0, weightMeasurements = 0;
  const allPhotos = [];

  dates.forEach(d => {
    const cd = S.entries[d].cycleData[c.id];
    const sugg = cd._suggested || {};

    if (cd.water) totalWater += parseFloat(cd.water) || 0;

    if (cd.ph) {
      if (sugg.ph) { suggestedPh++; }
      else { measuredPh++; phVals.push(parseFloat(cd.ph)); }
    }
    if (cd.ec) {
      if (sugg.ec) { suggestedEc++; }
      else { measuredEc++; ecVals.push(parseFloat(cd.ec)); }
    }

    // Runoff-Deltas (Phase 2 Schritt 6)
    if (cd.runoffPh && cd.ph) {
      const d2 = parseFloat(cd.runoffPh) - parseFloat(cd.ph);
      if (isFinite(d2)) runoffPhDeltas.push(d2);
    }
    if (cd.runoffEc && cd.ec) {
      const d2 = parseFloat(cd.runoffEc) - parseFloat(cd.ec);
      if (isFinite(d2)) runoffEcDeltas.push(d2);
    }

    // Restgewicht Sweet-Spot-Quote
    let pct = null;
    if (cd.weightG !== undefined && cd.weightG !== null && c.saturatedWeight && c.dryWeight) {
      pct = calcRestPct(cd.weightG, c.saturatedWeight, c.dryWeight);
    } else if (cd.restPct !== undefined && cd.restPct !== null) {
      pct = parseFloat(cd.restPct);
    }
    if (pct !== null && isFinite(pct)) {
      weightMeasurements++;
      const ctx = contextFor(c, d);
      const clf = classifyRestPct(pct, ctx && ctx.isFinisher);
      if (clf && (clf.label && clf.label.toLowerCase().includes('sweet'))) {
        sweetSpotCount++;
      }
    }

    (cd.photos || []).forEach(ph => allPhotos.push({ date: d, src: ph }));
  });

  const avgPh = phVals.length > 0 ? (phVals.reduce((a,b) => a+b, 0) / phVals.length).toFixed(2) : '—';
  const avgEc = ecVals.length > 0 ? (ecVals.reduce((a,b) => a+b, 0) / ecVals.length).toFixed(2) : '—';
  const avgRunoffPhDelta = runoffPhDeltas.length > 0 ? (runoffPhDeltas.reduce((a,b) => a+b, 0) / runoffPhDeltas.length).toFixed(2) : '—';
  const avgRunoffEcDelta = runoffEcDeltas.length > 0 ? (runoffEcDeltas.reduce((a,b) => a+b, 0) / runoffEcDeltas.length).toFixed(2) : '—';
  const sweetSpotRate = weightMeasurements > 0 ? Math.round((sweetSpotCount / weightMeasurements) * 100) + '%' : '—';
  const totalDays = c.startDate ? isoDiff(today, c.startDate) : 0;

  // Düngeplan: bevorzugt getPreset (unified access)
  const preset = S.presetKey ? getPreset(S.presetKey) : null;
  const presetName = preset?.name || '—';

  // Strain-Details (wenn in DB)
  const strainDetails = c.strain ? getStrainDetails(c.strain) : null;

  // Ernte-Countdown
  const hc = harvestCountdown(c, today);

  // Trainings-Events
  const events = (c.trainingEvents || []).slice().sort((a,b) => a.date.localeCompare(b.date));

  // Eintrags-Tabelle — erweitert mit Runoff und Restgewicht
  const entryRows = dates.map(d => {
    const e = S.entries[d];
    const cd = e.cycleData[c.id];
    const p2 = phase(d, c);
    const vpd = calcVPD(parseFloat(e.temp), parseFloat(e.humidity));

    // Restgewicht
    let restStr = '—';
    if (cd.weightG !== undefined && cd.weightG !== null && c.saturatedWeight && c.dryWeight) {
      const pct = calcRestPct(cd.weightG, c.saturatedWeight, c.dryWeight);
      if (pct !== null) restStr = `${pct.toFixed(0)}% (${cd.weightG}g)`;
    } else if (cd.restPct !== undefined && cd.restPct !== null) {
      restStr = `${cd.restPct}%`;
    }

    // Runoff-Kurzform
    let runoffStr = '—';
    if (cd.runoffPh || cd.runoffEc) {
      const parts = [];
      if (cd.runoffPh) parts.push(`pH ${cd.runoffPh}`);
      if (cd.runoffEc) parts.push(`EC ${cd.runoffEc}`);
      runoffStr = parts.join(' · ');
    }

    // Markierung für vorgeschlagene Werte
    const sugg = cd._suggested || {};
    const suggStyle = 'color:#999;font-style:italic';
    const phCell = cd.ph ? `<span style="${sugg.ph ? suggStyle : ''}">${cd.ph}</span>` : '—';
    const ecCell = cd.ec ? `<span style="${sugg.ec ? suggStyle : ''}">${cd.ec}</span>` : '—';
    const waterCell = cd.water ? `<span style="${sugg.water ? suggStyle : ''}">${cd.water} ml</span>` : '—';

    return `
      <tr>
        <td>${fmtDE(d, { day:'2-digit', month:'short' })}</td>
        <td>${p2 ? PN[p2.ph] + ' T' + p2.day : '—'}</td>
        <td>${e.temp || '—'}${e.temp ? '°C' : ''}</td>
        <td>${e.humidity || '—'}${e.humidity ? '%' : ''}</td>
        <td>${vpd !== null ? vpd.toFixed(2) : '—'}</td>
        <td>${waterCell}</td>
        <td>${phCell}</td>

 * chronologisch in einem Grid. Der User kann das als PDF speichern, als Bild

 * das nativ im Browser rendert.
 */
function exportCollage(cId) {
  const c = cId
    ? S.cycles.find(x => x.id === cId)
    : (active()[0] || S.cycles[0]);
  if (!c) { toast('Keine Zyklen mit Fotos vorhanden'); return; }

  const allPhotos = [];
  Object.keys(S.entries).sort().forEach(d => {
    const cd = S.entries[d]?.cycleData?.[c.id];
    if (cd?.photos?.length > 0) {
      const p = phase(d, c);
      cd.photos.forEach(ph => {
        allPhotos.push({
          date: d,
          src: ph,
          phase: p,
          day: p?.day,
        });
      });
    }
  });

  if (allPhotos.length === 0) {
    toast('Noch keine Fotos für diesen Zyklus');
    return;
  }

  // Ein Foto pro Woche nehmen (das letzte je Kalenderwoche) für die Kollage.
  // So bekommen wir eine schöne, nicht zu volle Timeline.
  const byWeek = new Map();
  allPhotos.forEach(ph => {
    const dt = new Date(ph.date + 'T12:00:00');
    // Montag-basierte Wochen-Nummer
    const wkKey = `${dt.getFullYear()}-W${Math.ceil((dt.getDate() + (new Date(dt.getFullYear(), dt.getMonth(), 1).getDay() || 7) - 1) / 7)}-${dt.getMonth()}`;
    byWeek.set(wkKey, ph); // spätere überschreiben = letztes Foto der Woche
  });
  const weeklyPhotos = [...byWeek.values()];

  const tiles = weeklyPhotos.map(ph => `
    <div class="tile">
      <img src="${ph.src}" alt="${ph.date}"/>
      <div class="tile-label">
        <div class="tile-day">Tag ${ph.day || '—'}</div>
        <div class="tile-date">${fmtDE(ph.date, { day:'2-digit', month:'short' })}</div>
        ${ph.phase ? `<div class="tile-phase">${PN[ph.phase.ph]}</div>` : ''}
      </div>
    </div>
  `).join('');

  const firstDate = allPhotos[0].date;
  const lastDate = allPhotos[allPhotos.length - 1].date;
  const totalDays = isoDiff(lastDate, firstDate);

  const html = `<!DOCTYPE html>

  .tile img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .tile-label { padding: 8px 10px; text-align: center; }
  .tile-day { font-size: 12px; color: #2d6b44; font-weight: 700; }

/**
 * Factory reset: Löscht ALLE App-Daten und bringt die App in den Zustand
 * wie frisch installiert. Dreifach abgesichert:
 *   1. Warnung + Backup-Angebot
 *   2. Typ-Bestätigung ("LÖSCHEN" eintippen)
 *   3. Final-Confirm
 *
 * Nach dem Reset: localStorage wird geleert, window.location.reload() bringt
 * die App frisch hoch mit Welcome-Screen.
 */
async function factoryReset() {
  // Schritt 1: Warnung + Backup anbieten
  const step1 = await customConfirm(
    '⚠ App komplett zurücksetzen?',
    `Das löscht ALLES:
• ${(S.cycles || []).length} Zyklen
• ${Object.keys(S.entries || {}).length} Tageseinträge
• ${(S.fertPlans || []).length} Düngepläne
• Alle Fotos und Notizen
• Alle Einstellungen

Vorher ein Backup ziehen? (dringend empfohlen)`,
    'Backup & Reset', 'var(--orange)'
  );
  if (!step1) return;

  // Backup automatisch herunterladen
  exportData();
  // Kurze Pause damit der Download anläuft
  await new Promise(r => setTimeout(r, 500));

  // Schritt 2: Typ-Bestätigung
  const typed = await _promptFactoryReset();
  if (typed !== 'LÖSCHEN') {
    if (typed !== null) toast('Abgebrochen — "LÖSCHEN" nicht korrekt getippt');
    return;
  }

  // Schritt 3: Final-Confirm
  const final = await customConfirm(
    'Wirklich jetzt?',
    'Letzte Chance! Nach diesem Klick ist alles weg. (Du hast dein Backup)',
    'Ja, alles löschen', 'var(--red)'
  );
  if (!final) return;

  // Execute: localStorage wegwischen, Reload
  try {
    localStorage.removeItem(SK);
  } catch (e) {}
  // Kleinen Toast zeigen bevor reload (wird kurz sichtbar sein)
  toast('🔄 App wird neu gestartet...');
  setTimeout(() => {
    window.location.reload();
  }, 600);
}

/**
 * Schnell-Reset für Test-Phase. Nur 1 Bestätigung, kein Backup-Download.
 * Bewusst weniger sicher als factoryReset() — gedacht für die App-Test-Phase
 * wenn der User immer wieder resetten möchte ohne Download-Dateien zu sammeln.
 */

Tipp: Wenn du den Zyklus eigentlich behalten willst, drück Abbrechen und nimm den normalen Reset darüber (mit Backup).`,
    'Ja, alles weg', 'var(--yellow)'
  );

    localStorage.removeItem(SK);

}

          <button data-act="cancel" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--card2);color:var(--text-sub);border:0.5px solid var(--border)">Abbrechen</button>
          <button data-act="ok" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--red);color:#fff">Bestätigen</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#_resetInp');
    setTimeout(() => inp.focus(), 50);
    const done = (val) => { overlay.remove(); resolve(val); };
    overlay.querySelector('[data-act="cancel"]').onclick = () => done(null);
    overlay.querySelector('[data-act="ok"]').onclick = () => done(inp.value.trim());
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') done(inp.value.trim());
      else if (e.key === 'Escape') done(null);
    };
  });
}

async function importData() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        const ok = await customConfirm(
          'Backup laden?',
          `${(d.cycles || []).length} Zyklen gefunden. Aktuelle Daten werden überschrieben!`,
          'Laden', 'var(--green)'
        );
        if (!ok) return;
        S = Object.assign({
          cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
        }, d);
        // Ensure offsetHistory exists on imported cycles (migrate old format)
        S.cycles.forEach(c => {
          if (!c.offsetHistory) {
            c.offsetHistory = [];
            if (c.dayOffset && c.dayOffset !== 0 && c.offsetDate) {
              c.offsetHistory.push({ date: c.offsetDate, offset: c.dayOffset });
            }
          }
          delete c.dayOffset; delete c.offsetDate;
        });
        delete S.skipDays; // remove legacy
        saveS();
        toast('Geladen ✓');
        goTo('dash');
      } catch (err) { toast('Fehler beim Laden'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

async function toggleNotify(enabled) {
  if (enabled) {
    if (!('Notification' in window)) {
      toast('⚠ Browser unterstützt keine Notifications');
      S.notifyEnabled = false;
      renderSet();
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      toast('⚠ Notification-Berechtigung abgelehnt');
      S.notifyEnabled = false;
      renderSet();
      return;
    }
    S.notifyEnabled = true;
    scheduleNotify();
    toast('🔔 Erinnerung aktiviert');
  } else {
    S.notifyEnabled = false;
    if (_notifyTimer) { clearTimeout(_notifyTimer); _notifyTimer = null; }
    toast('🔕 Erinnerung deaktiviert');
  }
  saveS();
  renderSet();
}

let _notifyTimer = null;

function scheduleNotify() {
  if (!S.notifyEnabled) return;
  if (_notifyTimer) clearTimeout(_notifyTimer);

  const today = todayISO();
  const act = active();
  // Find next watering day
  let nextDay = null;
  for (const c of act) {
    if (isGiessTag(today, c)) { nextDay = today; break; }
    const n = nextGiessTag(c, today);
    if (n && (!nextDay || n.iso < nextDay)) nextDay = n.iso;
  }
  if (!nextDay) return;

  // Reminder at 20:00 the EVENING BEFORE the watering day
  // So the user can prepare water (Leitungswasser abstehen lassen)
  const eveBefore = isoPlus(nextDay, -1);
  const target = new Date(eveBefore + 'T20:00:00');
  const now = Date.now();
  const ms = target.getTime() - now;

  if (ms > 0 && ms < 7 * 86400000) {
    _notifyTimer = setTimeout(() => {
      const actions = act.map(c => {
        const a = getAction(nextDay, c);
        return a ? `${sym(c)} ${c.name}: ${ACT_ICON[a] || ''}` : null;
      }).filter(Boolean);
      if (actions.length > 0) {
        new Notification('💧 Morgen ist Gießtag!', {
          body: 'Wasser jetzt bereitstellen.\n' + actions.join('\n'),
          icon: '🌱',
          tag: 'growsmart-water',
        });
      }
      setTimeout(scheduleNotify, 60000);
    }, ms);
  } else if (ms <= 0) {
    // Evening already passed — check if today IS the watering day and it's morning
    const todayTarget = new Date(today + 'T08:00:00');
    const msToday = todayTarget.getTime() - now;
    if (msToday > 0 && isGiessTag(today, act[0])) {
      // Fallback: morning reminder if evening was missed
      _notifyTimer = setTimeout(() => {
        new Notification('🌱 Heute ist Gießtag!', {
          body: 'Nicht vergessen zu gießen!',
          tag: 'growsmart-water',
        });
        setTimeout(scheduleNotify, 60000);
      }, msToday);
    } else {
      // Retry in 1h
      _notifyTimer = setTimeout(scheduleNotify, 3600000);
    }
  }
}

// Auto-start notification scheduling on load
setTimeout(() => { if (S.notifyEnabled) scheduleNotify(); }, 2000);

function exportDiary() {
  const act = S.cycles;
  if (act.length === 0) { toast('Keine Zyklen vorhanden'); return; }

  let md = `# 🌱 GrowSmart Grow-Tagebuch\n`;
  md += `Exportiert: ${new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'long', year:'numeric' })}\n\n`;

  act.forEach(c => {
    const cl = col(c);
    md += `## ${sym(c)} ${c.name}\n`;
    md += `- **Status:** ${c.active ? 'Aktiv' : 'Inaktiv'}\n`;
    if (c.startDate) md += `- **Start:** ${fmtDE(c.startDate, { day:'2-digit', month:'long', year:'numeric' })}\n`;
    if (c.location) md += `- **Standort:** ${c.location}\n`;
    md += `- **Phasen:** Anzucht ${c.anzuchtDays||PHASE_DEFAULTS.anzuchtDays}d → Blüte ${c.bloomDays||PHASE_DEFAULTS.bloomDays}d → Spülen ${c.flushDays||PHASE_DEFAULTS.flushDays}d → Ice ${c.iceDays||PHASE_DEFAULTS.iceDays}d\n`;
    if (S.presetKey) md += `- **Düngeplan:** ${getPreset(S.presetKey)?.name || S.presetKey}\n`;
    else if ((S.products || []).length > 0) md += `- **Düngeplan:** ✨ Eigener Plan · ${S.products.length} Produkte\n`;
    md += `- **Topfgröße:** ${S.potSize || 11}L\n\n`;

    // Entries sorted by date
    const dates = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[c.id]).sort();
    if (dates.length === 0) {
      md += `*Keine Einträge.*\n\n`;
      return;
    }

    md += `### Einträge\n\n`;
    dates.forEach(d => {
      const e = S.entries[d];
      const cd = e.cycleData[c.id];
      const p = phase(d, c);
      md += `#### ${fmtDE(d, { weekday:'long', day:'2-digit', month:'long' })}`;
      if (p) md += ` — ${PN[p.ph]} Tag ${p.day}`;
      md += `\n`;

      if (e.temp || e.humidity) md += `- 🌡️ ${e.temp || '—'}°C / 💨 ${e.humidity || '—'}% RLF`;
      const vpd = calcVPD(parseFloat(e.temp), parseFloat(e.humidity));
      if (vpd !== null) md += ` → VPD ${vpd.toFixed(2)} kPa`;
      if (e.temp || e.humidity) md += `\n`;

      if (cd.water) md += `- 💧 ${cd.water} ml`;
      if (cd.ph) md += ` · pH ${cd.ph}`;
      if (cd.ec) md += ` · EC ${cd.ec}`;
      if (cd.water || cd.ph || cd.ec) md += `\n`;

      // Doses (cd.doses stores the calculated amount in display unit, not per-litre plan)
      const doseEntries = Object.entries(cd.doses || {}).filter(([,v]) => v > 0);
      if (doseEntries.length > 0) {
        md += `- 🧪 Dünger: `;
        md += doseEntries.map(([pid, v]) => {
          const prod = S.products.find(p => p.id === pid);
          return `${prod?.name || pid} ${v} ${displayUnit(prod?.unit)}`;
        }).join(', ');
        md += `\n`;
      }

      // Trichomes
      if (cd.trichomes) {
        md += `- 🔬 Trichome: ${cd.trichomes.clear||0}% klar / ${cd.trichomes.milky||0}% milchig / ${cd.trichomes.amber||0}% bernstein\n`;
      }

      if (cd.notes) md += `- 📝 ${cd.notes}\n`;
      if (cd.photos?.length) md += `- 📸 ${cd.photos.length} Foto(s)\n`;
      md += `\n`;
    });
    md += `---\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `growsmart_tagebuch_${todayISO()}.md`;
  a.click();
  toast('📓 Tagebuch exportiert ✓');
}

/**
 * Smart Quick-Actions: kontextuelle Vorschläge basierend auf
 * Tag, Phase, und ob bestimmte Meilensteine schon markiert wurden.
 * Gibt Array von { label, icon, type } zurück.
 * type: 'note' (als Notiz-Tag) | 'state' (Zustand der Pflanze)
 */
function getSmartQuickNotes(c, p, cd, iso) {
  if (!p) return [];
  const out = [];
  const day = p.day || 1;
  const allEntries = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[c.id]);
  const notesAllTime = allEntries.map(d => S.entries[d]?.cycleData?.[c.id]?.notes || '').join(' ');

  // === ZUSTANDS-CHECKS (immer relevant) ===
  out.push({ label: 'Sieht gesund aus', icon: '✅', type: 'state' });
  out.push({ label: 'Blätter hängen', icon: '🥀', type: 'state' });

  // === PHASE-SPEZIFISCH ===
  if (isVegiPhase(p.ph)) {
    // Tag 1-3: Keimung
    if (day <= 3 && !notesAllTime.includes('Keimling sichtbar')) {
      out.push({ label: 'Keimling sichtbar', icon: '🌱', type: 'milestone' });
    }
    // Tag 4-10: Erste Blätter
    if (day >= 3 && day <= 10 && !notesAllTime.includes('Erste Blätter')) {
      out.push({ label: 'Erste Blätter (Cotyledons)', icon: '🌿', type: 'milestone' });
    }
    // Tag 7-15: Echte Blätter
    if (day >= 7 && day <= 18 && !notesAllTime.includes('Echte Blätter')) {
      out.push({ label: 'Echte Blätter da', icon: '🍃', type: 'milestone' });
    }
    // Umtopfen Hinweis ab Tag 10
    if (day >= 10 && !notesAllTime.includes('Umgetopft')) {
      out.push({ label: 'Umgetopft', icon: '🪴', type: 'milestone' });
    }
    // Standard-Checks in Anzucht
    out.push({ label: 'Blätter gelblich', icon: '🟡', type: 'state' });
    out.push({ label: 'Überwässert', icon: '💧', type: 'state' });
  }

  if (p.ph === 'bloom') {
    const bloomWeek = p.week || 1;
    // Wo 1-2: Stretch + erste Blüten
    if (bloomWeek <= 2 && !notesAllTime.includes('Erste Blüten')) {
      out.push({ label: 'Erste Blüten', icon: '🌸', type: 'milestone' });
    }
    if (bloomWeek <= 2) {
      out.push({ label: 'Stretch sichtbar', icon: '📏', type: 'state' });
    }
    // Wo 3-5: Buds formen sich
    if (bloomWeek >= 2 && bloomWeek <= 5 && !notesAllTime.includes('Stütze gesetzt')) {
      out.push({ label: 'Stütze gesetzt', icon: '🪵', type: 'milestone' });
    }
    // Wo 4+: Geruch
    if (bloomWeek >= 4) {
      out.push({ label: 'Geruch intensiv', icon: '👃', type: 'state' });
    }
    // Wo 6+: Trichome & Reife
    if (bloomWeek >= 6) {
      out.push({ label: 'Trichome klar', icon: '💎', type: 'observation' });
      out.push({ label: 'Trichome milchig', icon: '🥛', type: 'observation' });
    }
    if (bloomWeek >= 7) {
      out.push({ label: 'Trichome bernstein', icon: '🍯', type: 'observation' });
    }
    // Vergilbung ist ab Wo 6 normal
    if (bloomWeek >= 6) {
      out.push({ label: 'Untere Blätter gelb', icon: '🍂', type: 'state' });
    }
  }

  if (p.ph === 'flush') {
    out.push({ label: 'Nur klares Wasser', icon: '💧', type: 'action' });
    out.push({ label: 'Runoff klar', icon: '✨', type: 'observation' });
  }

  if (p.ph === 'ice') {
    out.push({ label: 'Eiswasser gegeben', icon: '🧊', type: 'action' });
    out.push({ label: 'Trichome glitzern', icon: '✨', type: 'observation' });
  }

  if (p.ph === 'harvest') {
    if (!notesAllTime.includes('Geerntet')) out.push({ label: 'Geerntet!', icon: '🏆', type: 'milestone' });
    out.push({ label: 'Wet Trim', icon: '✂️', type: 'action' });
    out.push({ label: 'Aufgehängt', icon: '🪢', type: 'milestone' });
  }

  if (p.ph === 'dry') {
    out.push({ label: 'Stiele knacken', icon: '🔊', type: 'observation' });
    out.push({ label: 'In Gläser gefüllt', icon: '🫙', type: 'milestone' });
    out.push({ label: 'Burping gemacht', icon: '💨', type: 'action' });
  }

  // === PROBLEM-MARKER (phasenübergreifend) ===
  out.push({ label: 'Schädling gesehen', icon: '🐛', type: 'problem' });

  return out;
}

function _restoreEntrySnapshot() {

/**
 * Prompts the user when trying to leave the entry screen with unsaved changes.
 * Returns a Promise that resolves to one of:
 *   'save'     — save & proceed
 *   'discard'  — discard changes & proceed (was the missing option!)
 *   'cancel'   — stay on entry, do nothing
 */
function _entryDirtyPrompt() {
  return new Promise((resolve) => {
    // Build inline overlay (keeps this modal independent of customConfirm state)
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:modalIn 0.2s ease';
    overlay.innerHTML = `
      <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6)">
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">💾 Ungespeicherte Änderungen</div>
        <div style="font-size:13px;color:var(--text-sub);line-height:1.6;margin-bottom:18px">
          Du hast diesen Eintrag bearbeitet. Was möchtest du tun?
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button data-act="save" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--green);color:#fff">✓ Speichern & weiter</button>
          <button data-act="discard" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--orange);color:#fff">✗ Verwerfen & weiter</button>
          <button data-act="cancel" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--card2);color:var(--text-sub);border:0.5px solid var(--border)">← Hier bleiben</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const done = (choice) => {
      overlay.remove();
      resolve(choice);
    };
    overlay.querySelectorAll('[data-act]').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); done(btn.getAttribute('data-act')); };
    });
    // Tap backdrop = cancel
    overlay.onclick = (e) => { if (e.target === overlay) done('cancel'); };
  });
}

async function navFromEntry(targetTab) {
  if (!_entryDirty) {
    goTo(targetTab);
    return;
  }
  const choice = await _entryDirtyPrompt();
  if (choice === 'save') {
    saveEntry();
    setTimeout(() => goTo(targetTab), 50);
  } else if (choice === 'discard') {
    _restoreEntrySnapshot();
    goTo(targetTab);
  }
  // cancel: stay
}

async function entryNav(dir) {
  if (!editISO) return;
  const doNav = () => {
    const newISO = isoPlus(editISO, dir);
    editISO = newISO;
    // New day = new snapshot (state was just saved or discarded)
    _entrySnapshot = S.entries[newISO] ? JSON.parse(JSON.stringify(S.entries[newISO])) : null;
    _updateEntryTitle(newISO);
    renderEntry(newISO);
    vibrate(8);
  };
  if (!_entryDirty) { doNav(); return; }
  const choice = await _entryDirtyPrompt();
  if (choice === 'save') {
    saveEntry();
    setTimeout(doNav, 50);
  } else if (choice === 'discard') {
    _restoreEntrySnapshot();
    doNav();

  // cancel: stay
}

(function() {

    const dx = e.changedTouches[0].clientX - sx;

})();

            ${z && z.label === 'Blüte ✓' || z && z.label === 'Anzucht ✓' || z && z.label === 'Spätblüte ✓'
              ? `✓ Luft passt für diese Phase`
              : z && z.hint ? `💡 ${z.hint}` : 'Luftwerte passen'}
          </div>`
        : '')
    : (vpd !== null
      ? `<div class="vpd-box">
          <div>
            <div style="font-size:10px;color:#3a7a7a;margin-bottom:2px;font-weight:600">VPD</div>
            <div style="display:flex;align-items:baseline;gap:3px">
              <span class="vpd-val" id="vpd-v">${vpd.toFixed(2)}</span>
              <span style="font-size:11px;color:#3a7a7a"> kPa</span>
            </div>
            <span class="vpd-pill" id="vpd-p" style="background:${z.bg};color:${z.color}">${z.label}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;width:88px">
            <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>Anz.</span><span>Blüte</span><span>Stress</span></div>
            <div class="vpd-scale">
              <div class="vpd-seg" style="background:#1e3a6e"></div>
              <div class="vpd-seg" style="background:#1e6e3a"></div>
              <div class="vpd-seg" style="background:#6e4a1e"></div>
            </div>
            <div class="vpd-mrow"><div class="vpd-marker" id="vpd-m" style="left:${Math.min(95, z.pct)}%"></div></div>
            <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>0.4</span><span>0.8</span><span>1.2</span><span>1.8</span></div>
          </div>
        </div>`
      : `<div style="background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--text-muted)">Temp & RLF eingeben → VPD</div>`);

  // Build per-cycle blocks
  const blocks = act.map(c => {
    const p = phase(iso, c);
    const a = getAction(iso, c);
    const cl = col(c), s = sym(c);
    const cd = saved.cycleData?.[c.id] || {};
    // Düngeplan-Woche: Phase-bewusst!
    // Spülen/IceFlush → immer Wo11, Ernte/Trocknung → Wo12
    // Anzucht/Blüte → Gesamtwoche seit Zyklusstart (max Wo10)
    let wk = 1;
    if (p) {
      if (p.ph === 'flush' || p.ph === 'ice') {
        wk = 11;
      } else if (p.ph === 'harvest' || p.ph === 'dry') {
        wk = 12;
      } else {
        const totalDay = c.startDate ? isoDiff(iso, c.startDate) : 0;
        wk = Math.max(1, Math.min(Math.floor(totalDay / 7) + 1, 10));
      }
    }
    const doses = getWeekDoses(c.id, wk, c);
    const isWaterDay = a === 'giess' || a === 'giess_anz' || a === 'spuelen' || a === 'ice';
    const waterSug = waterSuggestion(c, p);

    // === ACTION CARD (header for each cycle) ===
    const giessCard = a
      ? `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${cl.hex}11;border:0.5px solid ${cl.hex}33;border-radius:10px;margin-bottom:8px">
          <span style="font-size:24px">${ACT_ICON[a] || '💧'}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:${cl.hex}">${
              a === 'giess_anz' ? '🌱 Anzucht-Gießtag!' :
              a === 'giess' ? '💧 Gießtag!' :
              a === 'spuelen' ? '🚿 Spültag' :
              a === 'ice' ? '🧊 IceFlush!' :
              a === 'ernte' ? '✂️ Erntetag!' : '🍂 Trocknung'
            }</div>
            ${isWaterDay ? `<div style="font-size:11px;color:var(--text-muted)">Vorschlag: ~${waterSug} ml · Topf ${S.potSize || 11}L · ${getInt(c, p?.ph || 'bloom')}d Intervall</div>` : ''}
          </div>
        </div>
        ${(isWaterDay && iso >= todayISO()) ? `<div style="display:flex;gap:8px;margin-bottom:4px">
          <button onclick="doShiftFromEntry('${c.id}',-1)" style="flex:1;background:var(--blue-bg);border:0.5px solid rgba(90,171,240,0.25);border-radius:10px;padding:10px 8px;font-size:12px;color:var(--blue);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px">
            ← Vorziehen
          </button>
          <button onclick="doShiftFromEntry('${c.id}',1)" style="flex:1;background:var(--orange-bg);border:0.5px solid rgba(232,136,74,0.25);border-radius:10px;padding:10px 8px;font-size:12px;color:var(--orange);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px">
            Auf morgen verschieben →
          </button>
        </div>
        ${c.growType === 'outdoor' ? `<button onclick="rainSkip('${c.id}','${iso}')" style="width:100%;background:linear-gradient(135deg, rgba(90,171,240,0.15), rgba(90,171,240,0.08));border:0.5px solid rgba(90,171,240,0.4);border-radius:10px;padding:10px;font-size:12px;color:var(--blue);cursor:pointer;font-family:var(--font);margin-bottom:8px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px">
          ☔ Regen heute — Gießen nicht nötig
        </button>` : ''}
        <button onclick="skipDay('${c.id}','${iso}')" style="width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px;font-size:11px;color:var(--red);cursor:pointer;font-family:var(--font);margin-bottom:8px;opacity:0.7">
          🚫 Diesen Gießtag entfernen
        </button>` : ''}`
      : (!a && p && c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 2))
        // Topping rest day
        ? `<div style="padding:10px 12px;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.25);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
            <span style="font-size:20px">✂️</span>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--purple)">Ruhetag nach Topping</div>
              <div style="font-size:11px;color:var(--text-muted)">Tag ${isoDiff(iso, c.toppingDate)} von ${c.toppingPause || 2} · Kein Gießen</div>
            </div>
          </div>`
      : (!a && p && c.skippedDays && c.skippedDays.includes(iso))
        // Skipped day - show restore option
        ? `<div style="padding:10px 12px;background:rgba(224,96,96,0.06);border:0.5px solid rgba(224,96,96,0.2);border-radius:10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">🚫</span>
              <div>
                <div style="font-size:12px;color:var(--red)">Gießtag entfernt</div>
                <div style="font-size:11px;color:var(--text-muted)">Raster bleibt unverändert</div>
              </div>
            </div>
            <button onclick="restoreDay('${c.id}','${iso}')" style="background:none;border:0.5px solid rgba(76,175,112,0.3);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--green);cursor:pointer;font-family:var(--font)">
              ↩ Wiederherstellen
            </button>
          </div>`
      : (!a && p && ['flush','ice','harvest','dry'].includes(p.ph)
        ? `<div style="padding:8px 12px;background:${cl.hex}08;border:0.5px solid ${cl.hex}1a;border-radius:10px;margin-bottom:8px;font-size:12px;color:${cl.hex}99">${PH_ICON[p.ph] || ''} ${PN[p.ph]} – kein Gießtag</div>`
        : ''
      );

    // Topping button: frühestens ab Tag 15 (4-5 Nodien entwickelt), latestens Blüte Wo.3.
    // Vor Tag 15 ist die Pflanze meist zu klein (noch 3 Nodien), Topping stresst mehr als es nützt.
    // Das Goldfenster ist typisch Tag 15-21 je nachdem welche Nodie der User anpeilt.
    const canTop = isWaterDay && !c.toppingDate && p && p.day >= 15
      && (isVegiPhase(p.ph) || (p.ph === 'bloom' && p.week <= 3))
      && iso >= todayISO();
    // Undo Topping button: show on the topping day itself OR on any rest day after topping
    const isToppingDay = c.toppingDate === iso;
    const isToppingRest = c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 2);
    const showUndoTop = isToppingDay || isToppingRest;

    // Hinweis warum Toppen nicht mehr möglich ist — nur bei Automatics in der Blüte ab Woche 4.
    // Bei Feminisierten (Photoperiode) entscheidet der User selbst über den Blüte-Start via 12/12,
    // daher ist die Blüte-Wochen-Grenze dort nicht als "zu spät" interpretierbar.
    const showTopTooLateHint = !canTop && !c.toppingDate && iso >= todayISO()
      && isWaterDay
      && c.seedType === 'auto'
      && p && p.ph === 'bloom' && p.week >= 4;

    const toppingBtn = canTop
      ? `<div style="background:rgba(76,175,112,0.08);border:0.5px solid rgba(76,175,112,0.25);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:11px;color:var(--green);line-height:1.5">
          💡 <b>Vor dem Toppen gießen!</b> 2–4 Stunden vorher volles Gießen mit Dünger — das macht die Pflanze turgor-prall für einen sauberen Schnitt und versorgt die Wundheilung. Nach dem Topping: ${(c.toppingPause || 2)} Tage Ruhe ohne Gießen.<br><span style="color:var(--text-hint);font-size:10px">Tag ${p.day}: gute Zeit zum Toppen über dem 4.–5. Nodium (sichtbar durchzählen von unten).</span>
        </div>
        <button onclick="doTopping('${c.id}','${iso}')" style="width:100%;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.25);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--purple);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px">
          ✂️ Jetzt Toppen (${(c.toppingPause || 2)} Tage Pause danach)
        </button>`
      : showTopTooLateHint
      ? `<div style="background:rgba(240,208,80,0.06);border:0.5px solid rgba(240,208,80,0.25);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:11px;color:var(--text-sub);line-height:1.5">
          ⏰ <b style="color:var(--yellow)">Toppen nicht mehr empfohlen</b> – Blüte Woche ${p.week}. Bei Automatics ist das Zeitfenster in den ersten 3 Blüte-Wochen vorbei; ein Schnitt jetzt würde die Blüte zurückwerfen statt Ertrag zu bringen.<br><span style="color:var(--text-hint);font-size:10px">Beim nächsten Zyklus: rechtzeitig toppen (Anzucht ab Tag 21 bis Blüte Wo.3).</span>
        </div>`
      : showUndoTop
      ? `<div style="background:rgba(176,106,200,0.06);border:0.5px solid rgba(176,106,200,0.2);border-radius:10px;padding:10px 12px;margin-bottom:8px">
          <div style="font-size:12px;color:var(--purple);font-weight:600;margin-bottom:6px">✂️ ${isToppingDay ? 'Topping-Tag' : 'Topping-Ruhetag ' + isoDiff(iso, c.toppingDate) + '/' + (c.toppingPause || 2)}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px;line-height:1.5">Getoppt am ${fmtDE(c.toppingDate, {day:'2-digit',month:'2-digit'})}. Nächster Guss am ${fmtDE(isoPlus(c.toppingDate, (c.toppingPause||2)+1), {day:'2-digit',month:'2-digit'})}.</div>
          <button onclick="undoTopping('${c.id}')" style="width:100%;background:var(--surface);border:0.5px solid rgba(224,96,96,0.3);border-radius:8px;padding:8px;font-size:12px;color:var(--red);cursor:pointer;font-family:var(--font)">↩ Topping rückgängig machen</button>
        </div>`
      : '';

    // TRAININGS-EVENTS (Phase 4 Schritt 3):
    // Nicht-Topping-Methoden dokumentieren: FIM, LST, Mainlining, Super-Cropping,
    // Defoliation, Lollipopping, SCROG, Schucking. Topping selbst bleibt in seinem
    // eigenen Flow (hat komplexere Logik mit Ruhe-Tagen).
    // Events werden als Array pro Zyklus gespeichert: c.trainingEvents = [{date, type, notes}]
    const trainingEventsToday = (c.trainingEvents || []).filter(e => e.date === iso);
    const canAddTraining = isWaterDay && iso <= todayISO(); // nur heute oder Vergangenheit
    const trainingBtn = (canAddTraining || trainingEventsToday.length > 0)
      ? (() => {
          const listHTML = trainingEventsToday.length > 0
            ? `<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px">
                ${trainingEventsToday.map((ev, idx) => {
                  const meta = T.training[ev.type];
                  if (!meta) return '';
                  return `<div style="display:flex;align-items:center;gap:8px;background:rgba(176,106,200,0.08);border:0.5px solid rgba(176,106,200,0.2);border-radius:8px;padding:8px 10px">
                    <span style="font-size:14px">${meta.icon}</span>
                    <div style="flex:1;min-width:0">
                      <div style="font-size:11px;font-weight:600;color:var(--purple)">${meta.label}</div>
                      ${ev.notes ? `<div style="font-size:10px;color:var(--text-muted);font-style:italic;line-height:1.4;margin-top:2px">${ev.notes}</div>` : ''}
                    </div>
                    <button onclick="removeTrainingEvent('${c.id}','${ev.date}',${idx})" style="background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:2px 6px" title="Entfernen">✕</button>
                  </div>`;
                }).join('')}
              </div>`
            : '';
          const addBtn = canAddTraining
            ? `<button onclick="openTrainingPicker('${c.id}','${iso}')" style="width:100%;background:rgba(176,106,200,0.04);border:0.5px dashed rgba(176,106,200,0.3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--purple);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px">
                🌿 Training hinzufügen
              </button>`
            : '';
          return `<div style="margin-bottom:8px">${listHTML}${addBtn}</div>`;
        })()
      : '';

    // === NUTRIENT / ADDITIVE TABLE ===
    // Show on ALL water days: giess, giess_anz get full nutrients
    // spuelen, ice get "Zusätze" (e.g. CalMag, pH-Down – user can log what they actually use)
    const isFlushType = a === 'spuelen' || a === 'ice';
    const showNutrients = a === 'giess' || a === 'giess_anz';

    let nutSection = '';
    if (isWaterDay) {
      // Water amount input for calculation
      const savedWater = cd.water || '';
      const waterAmt = parseFloat(savedWater) || waterSug;

      const drainMl = Math.round(waterSug * 0.1);
      const pot = S.potSize || 11;
      const iv = getInt(c, p?.ph || 'bloom');
      const growDay = p?.day || 1;
      const showDrain = growDay >= 25 || p?.ph === 'flush' || p?.ph === 'ice'; // Drain erst ab Vollsättigung

      // RESTGEWICHT UI (Hebe-Test oder Waage).
      // Lift-Mode: Slider 0-100%, direkt klassifiziert.
      // Scale-Mode: Gramm-Input → calcRestPct via saturatedWeight/dryWeight → klassifiziert.
      // Beide Modi teilen sich die Status-Anzeige. Finisher-Modus verschiebt Sweet-Spot.
      let liftTestBlock = '';
      if (c.weightMode === 'lift' || c.weightMode === 'scale') {
        const ctx = contextFor(c, iso);
        const isFinisher = ctx && ctx.isFinisher;
        const isScale = c.weightMode === 'scale';
        const hasRefs = isScale && c.saturatedWeight && c.dryWeight;

        // Aktuellen Wert pro Tag laden — bei Scale: cd.weightG (Gramm), bei Lift: cd.restPct (%)
        let restVal, clf;
        let savedForDisplay = null;
        if (isScale) {
          const savedG = cd.weightG !== undefined && cd.weightG !== null ? parseFloat(cd.weightG) : null;
          if (savedG !== null && hasRefs) {
            restVal = calcRestPct(savedG, c.saturatedWeight, c.dryWeight);
            clf = restVal !== null ? classifyRestPct(restVal, isFinisher) : null;
            savedForDisplay = savedG;
          } else if (savedG !== null) {
            restVal = null; // Gramm da, aber keine Referenzen — keine Klassifikation
            clf = null;
            savedForDisplay = savedG;
          } else {
            restVal = null;
            clf = null;
          }
        } else {
          const savedRest = cd.restPct !== undefined && cd.restPct !== null ? parseFloat(cd.restPct) : null;
          restVal = savedRest !== null ? savedRest : 50;
          clf = savedRest !== null ? classifyRestPct(restVal, isFinisher) : null;
          savedForDisplay = savedRest;
        }

        // Header: Titel + Finisher-Badge + Erklärung
        const header = `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:14px">${isScale ? '⚖️' : '✋'}</span>
            <span style="font-size:12px;font-weight:600;color:var(--text)">${isScale ? 'Waage' : 'Hebe-Test'}</span>
            ${isFinisher ? '<span style="font-size:9px;background:rgba(224,96,96,0.15);color:var(--red);padding:2px 6px;border-radius:8px;font-weight:600">FINISHER</span>' : ''}
          </div>
          <div style="font-size:10px;color:var(--text-muted)">${isScale ? 'Topf mit Pflanze wiegen' : 'Hebe den Topf — wie schwer fühlt er sich?'}</div>
        </div>`;

        // Body: je nach Modus Slider oder Gramm-Input
        let body = '';
        if (isScale) {
          // Bei fehlenden Referenzen: Warnung + Shortcut zum Setup
          if (!hasRefs) {
            body = `<div style="background:rgba(240,208,80,0.08);border-left:2px solid var(--yellow);padding:10px 12px;border-radius:6px;font-size:11px;line-height:1.55;color:var(--text-sub)">
              <div style="color:var(--yellow);font-weight:600;margin-bottom:4px">⚠ Referenz-Gewichte fehlen</div>
              Für die Auswertung brauchen wir <b>Saturated</b> (voll gesättigt) und <b>Dry</b> (bone-dry). Bisher gesetzt: ${c.saturatedWeight ? 'Saturated ✓' : 'Saturated —'} · ${c.dryWeight ? 'Dry ✓' : 'Dry —'}.
              <button onclick="setWeightModeScale(S.cycles.find(c=>c.id==='${c.id}'))" style="margin-top:6px;background:var(--card);border:0.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--yellow);cursor:pointer;font-family:var(--font)">Referenzen setzen</button>
            </div>`;
            // Gramm-Input bleibt trotzdem nutzbar (wird gespeichert, nur nicht klassifiziert)
            body += `<div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              <button onclick="stepWeightG('${c.id}',-50)" class="stepper-btn">−</button>
              <input class="inp-field" type="number" step="50" id="weight-g-${c.id}"
                value="${savedForDisplay !== null ? savedForDisplay : ''}"
                placeholder="Gewicht in g"
                oninput="uWeightG('${c.id}',this.value)"
                style="flex:1;height:34px;font-size:14px;font-weight:600;font-family:var(--mono);text-align:center"/>
              <button onclick="stepWeightG('${c.id}',50)" class="stepper-btn">+</button>
              <span style="font-size:12px;color:var(--text-muted);min-width:14px">g</span>
            </div>`;
          } else {
            // Voll ausgestattet: Gramm-Input + % + Referenz-Info
            const pctDisplay = restVal !== null ? `${restVal.toFixed(0)}%` : '—';
            body = `<div style="display:flex;align-items:center;gap:8px">
              <button onclick="stepWeightG('${c.id}',-50)" class="stepper-btn">−</button>
              <input class="inp-field" type="number" step="50" id="weight-g-${c.id}"
                value="${savedForDisplay !== null ? savedForDisplay : ''}"
                placeholder="${Math.round((c.saturatedWeight + c.dryWeight) / 2)}"
                oninput="uWeightG('${c.id}',this.value)"
                style="flex:1;height:34px;font-size:14px;font-weight:600;font-family:var(--mono);text-align:center"/>
              <button onclick="stepWeightG('${c.id}',50)" class="stepper-btn">+</button>
              <span style="font-size:12px;color:var(--text-muted);min-width:14px">g</span>
              <div style="min-width:50px;text-align:right;font-size:14px;font-weight:700;font-family:var(--mono);color:${clf ? clf.color : 'var(--text-hint)'}">${pctDisplay}</div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-hint);font-family:var(--mono);margin-top:4px;padding:0 38px">
              <span>Dry ${c.dryWeight}g</span>
              <span>Sat ${c.saturatedWeight}g</span>
            </div>`;
          }
        } else {
          // Lift-Mode Slider
          body = `<div style="display:flex;align-items:center;gap:10px">
            <button onclick="stepRestPct('${c.id}',-5)" class="stepper-btn">−</button>
            <div style="flex:1;display:flex;flex-direction:column;gap:4px;min-width:0">
              <input type="range" min="0" max="100" step="5" value="${restVal}" id="rest-slider-${c.id}"
                oninput="uRestPct('${c.id}',this.value)"
                style="width:100%;accent-color:${clf ? clf.color : 'var(--green)'};cursor:pointer"/>
              <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-hint);font-family:var(--mono)">
                <span>0% leicht</span>
                <span style="color:${clf ? clf.color : 'var(--text-muted)'};font-weight:700;font-size:14px" id="rest-val-${c.id}">${savedForDisplay !== null ? restVal + '%' : '— tippen'}</span>
                <span>100% voll</span>
              </div>
            </div>
            <button onclick="stepRestPct('${c.id}',5)" class="stepper-btn">+</button>
          </div>`;
        }

        // Status-Box (geteilt für beide Modi)
        let statusBox = '';
        if (clf) {
          statusBox = `<div style="margin-top:8px;padding:8px 10px;background:${clf.color}14;border-left:2px solid ${clf.color};border-radius:6px;font-size:11px;line-height:1.5;color:var(--text-sub)">
            <div style="font-weight:600;color:${clf.color};margin-bottom:2px">${clf.label}</div>
            <div>${clf.text}</div>
          </div>`;
        } else if (hasRefs || !isScale) {
          // Noch kein Wert eingetragen — Placeholder-Hinweis
          statusBox = `<div style="margin-top:8px;padding:8px 10px;background:var(--card2);border-radius:6px;font-size:11px;line-height:1.5;color:var(--text-hint)">
            ${isScale ? 'Trage das aktuelle Topfgewicht ein — % und Status werden automatisch berechnet.' : 'Tippe den Slider oder +/− um dein geschätztes Restgewicht festzuhalten.'}

        <div style="display:flex;gap:6px;margin-bottom:8px">

/** Live-update the calculated amounts when water input changes */
function updateCalc(cId, wk) {
  const waterEl = document.getElementById('water-calc-' + cId);
  if (!waterEl) return;
  const ml = parseFloat(waterEl.value) || parseFloat(waterEl.placeholder) || waterSuggestion(null, { ph: 'bloom', day: 35 });

  // Update only calc cells for THIS cycle (scoped by data-cycle attribute)
  document.querySelectorAll(`.nt-calc[data-cycle="${cId}"]`).forEach(cell => {
    const plan = parseFloat(cell.dataset.plan) || 0;
    if (plan > 0) {
      cell.textContent = (plan * ml / 1000).toFixed(1) + ' ml';
    }
  });

  // Mix-Reihenfolge-Zellen genauso aktualisieren (Dünger unten bei "⚗️ MISCHREIHENFOLGE")
  document.querySelectorAll(`.mix-calc[data-cycle="${cId}"]`).forEach(cell => {
    const plan = parseFloat(cell.dataset.plan) || 0;
    const unit = cell.dataset.unit || 'ml/L';
    const current = plan > 0 ? calcDose(plan, ml, unit).toFixed(1) : '0';
    const dispUnit = displayUnit(unit);
    cell.textContent = `${current} ${dispUnit}`;
  });

  // Gieß-Guide live mitziehen: angezeigte Wassermenge und Drain (10% Regel) anpassen.
  // So sieht der User sofort wie sich Zielwert und Drain-Menge ändern wenn er +/− drückt.
  document.querySelectorAll(`.live-water[data-cycle="${cId}"]`).forEach(el => {
    el.textContent = Math.round(ml);
  });
  document.querySelectorAll(`.live-drain[data-cycle="${cId}"]`).forEach(el => {
    el.textContent = Math.round(ml * 0.1);
  });
}

/**
 * Live-Version von stepMixDose: liest aktuellen Gießmengen-Wert aus dem Input-Feld
 * (nicht aus dem gespeicherten cd.water) und führt die Änderung damit durch.
 * Dadurch passen sich Dünger-Mengen sofort an — auch wenn der User die Gießmenge
 * gerade geändert aber noch nicht gespeichert hat.
 */
function stepMixDoseLive(btn) {
  const cId = btn.dataset.cycle;
  const prodId = btn.dataset.prod;
  const wk = parseInt(btn.dataset.wk);
  const stepMl = parseFloat(btn.dataset.step);
  // Aktuellen Wasserwert aus dem Input-Feld lesen (live-Wert vor Save)
  const waterEl = document.getElementById('water-calc-' + cId);
  const waterAmt = waterEl ? (parseFloat(waterEl.value) || parseFloat(waterEl.placeholder) || 0) : 0;
  stepMixDose(cId, prodId, wk, stepMl, waterAmt);
}

/** Step water amount by 50ml increments */
function stepWater(cId, step, wk) {
  const el = document.getElementById('water-calc-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || parseFloat(el.placeholder) || 0;
  const newVal = Math.max(0, Math.round((current + step) / 50) * 50);
  el.value = newVal;
  uEF(cId, 'water', String(newVal));
  updateCalc(cId, wk);
  vibrate(8);
}

/** Step pH by 0.1 increments */
function stepPH(cId, step) {
  const el = document.getElementById('ph-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || 6.4;
  const newVal = Math.max(4, Math.min(9, Math.round((current + step) * 10) / 10));
  el.value = newVal;
  uEF(cId, 'ph', String(newVal));

/**
 * Step EC value up/down by step amount. Default 1.4 (middle of Cup-Standard 0.8-2.0).
 * Treats empty or zero as "use default" to match stepEnv/stepPH behaviour:
 * user sees placeholder 1.4 and expects next + to land on 1.5, not 0.1.
 */
function stepEC(cId, step) {
  const el = document.getElementById('ec-' + cId);
  if (!el) return;
  const raw = parseFloat(el.value);
  const current = (isNaN(raw) || raw === 0) ? 1.4 : raw;
  const newVal = Math.max(0, Math.min(5, Math.round((current + step) * 10) / 10));
  el.value = newVal;
  uEF(cId, 'ec', String(newVal));
  vibrate(8);
}

/**
 * Update Restgewicht (Hebe-Test) — live re-render damit Status + Farbe mitgehen.
 * Der Slider selbst ruft uRestPct bei jedem Stop auf; der ± Button ruft stepRestPct.
 * Beide schreiben in cd.restPct und triggern renderEntry für die Status-Box.
 */

/** Step environment inputs (temperature/humidity) */
function stepEnv(id, step) {
  const el = document.getElementById(id);
  if (!el) return;
  // Default if empty OR zero: 23.5°C for temp, 60% for humidity.
  // Treating 0 as "use default" is intentional: a user seeing the placeholder
  // 23.5 expects the next + to go to 23.6, not 0.1. A genuine 0°C is not a
  // realistic grow scenario anyway.
  const defaultVal = id === 'et' ? 23.5 : 60;
  const raw = parseFloat(el.value);
  const current = (isNaN(raw) || raw === 0) ? defaultVal : raw;
  // Range: temp 0-45, humidity 0-100
  const min = 0;
  const max = id === 'et' ? 45 : 100;
  // Precision: 1 decimal for both temp (0.1 steps) and humidity (0.2 steps)
  const precision = Math.abs(step) < 1 ? 10 : 1;
  const newVal = Math.max(min, Math.min(max, Math.round((current + step) * precision) / precision));
  el.value = newVal;
  uEnv();
  vibrate(8);
}

/**
 * Toggle a mix-step check. Persisted per entry day, keyed by product id,
 * so checks survive re-renders (e.g. after ± dose adjustment on another product).
 * Checks are intentionally per-day: a new watering day starts fresh.
 */
function toggleMixCheck(cId, prodId) {
  if (!editISO || !cId || !prodId) return;
  ensE(cId);
  const cd = S.entries[editISO].cycleData[cId];
  if (!cd.mixChecks) cd.mixChecks = {};
  cd.mixChecks[prodId] = !cd.mixChecks[prodId];
  // Clean up the key if it was un-toggled (keeps state lean)
  if (!cd.mixChecks[prodId]) delete cd.mixChecks[prodId];
  saveS();
  vibrate(10);
  // Re-render entry to reflect visual check state
  if (editISO) renderEntry(editISO);
}

/**
 * Adjust a fertilizer dose by ±stepMl on the DISPLAY (ml actually poured into the
 * water can). The stored plan value (ml/L) becomes a fractional number — that's
 * intentional. User wants to think in "poured ml", not in "concentration".
 * If waterAmt is missing, falls back to ±0.1 ml/L plan-value steps.
 */
function stepMixDose(cId, prodId, wk, stepMl, waterAmt) {
  const key = 'global_w' + wk;
  if (!S.weekSchedule[key]) S.weekSchedule[key] = {};
  const plan = S.weekSchedule[key][prodId] || 0;
  const prod = (S.products || []).find(p => p.id === prodId);
  const perLitre = isPerLitre(prod?.unit);
  let newPlan;
  if (perLitre && waterAmt && waterAmt > 0) {
    // Per-litre unit: current displayed amount → add step → back to per-litre plan
    const currentAmt = plan * waterAmt / 1000;
    const newAmt = Math.max(0, Math.round((currentAmt + stepMl) * 10) / 10);
    newPlan = newAmt * 1000 / waterAmt;
    // Keep stored plan value to a sensible precision (4 decimals is plenty)
    newPlan = Math.round(newPlan * 10000) / 10000;
  } else {
    // Absolute unit OR missing water: step the plan value directly
    newPlan = Math.max(0, Math.round((plan + stepMl) * 10) / 10);
  }
  S.weekSchedule[key][prodId] = newPlan;
  saveS();
  vibrate(8);
  // Re-render the entry to reflect updated doses
  if (editISO) renderEntry(editISO);
}

function uEnv() {

  const gt4vpd = actL.length > 0 ? actL[0].growType : 'indoor';
  const v = calcVPD(t, r), z = vpdZone(v, p4vpd, gt4vpd);
  if (v !== null && z) {

    if (vm) vm.style.left = Math.min(95, z.pct) + '%';

}

/**
 * Apply one-click recommended values for a watering day:
 * sets water to the suggestion, pH to 6.4, and writes all planned fertilizer
 * doses (ml/L × water / 1000) as the logged amounts. Skips flush day fertilizers
 * since flush = water only. Fires toast on success.
 */
function applyRecommended(cId, wk) {
  if (!editISO) return;
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const p = phase(editISO, c);
  const a = getAction(editISO, c);
  if (!p || !a) return;
  ensE(cId);
  const cd = S.entries[editISO].cycleData[cId];
  // "_suggested" markiert welche Werte nur vorgeschlagen sind (grau angezeigt,
  // in Statistiken ignoriert). Sobald der User den Wert manuell tippt wird das
  // Flag entfernt → Wert gilt als echter Datenpunkt.
  if (!cd._suggested) cd._suggested = {};

  // Water: use suggestion
  const waterMl = waterSuggestion(c, p);
  cd.water = String(waterMl);
  cd._suggested.water = true;
  // pH: 6.4 standard target
  cd.ph = '6.4';
  cd._suggested.ph = true;
  // Fertilizers: only on normal watering days (giess, giess_anz), not flush/ice
  if (a === 'giess' || a === 'giess_anz') {
    const doses = getWeekDoses(cId, wk, c);
    if (!cd._suggestedDoses) cd._suggestedDoses = {};
    Object.entries(doses).forEach(([prodId, plan]) => {
      if (plan > 0) {
        const prod = (S.products || []).find(p => p.id === prodId);
        cd.doses[prodId] = calcDose(plan, waterMl, prod?.unit);
        cd._suggestedDoses[prodId] = true;
      }
    });
  }
  // Environment: only set if empty (don't overwrite real measurements)
  const e = S.entries[editISO];
  if (!e.temp || String(e.temp).trim() === '') {
    e.temp = '23.5';
    if (!e._suggested) e._suggested = {};
    e._suggested.temp = true;
  }
  if (!e.humidity || String(e.humidity).trim() === '') {
    e.humidity = '60';
    if (!e._suggested) e._suggested = {};
    e._suggested.humidity = true;
  }
  saveS();
  vibrate(15);
  toast('✨ Werte vorgeschlagen — tippe einen Wert um ihn als "gemessen" zu markieren');
  renderEntry(editISO);
}
function uTrich(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].trichomes) S.entries[editISO].cycleData[cId].trichomes = { clear: 70, milky: 25, amber: 5 };
  S.entries[editISO].cycleData[cId].trichomes[field] = parseInt(v) || 0;
}

function addQN(cId, el, textArg) {
  ensE(cId);
  // Read label from data-label (preferred) or fall back to argument for backwards compat.
  // This avoids fragile apostrophe escaping in onclick handlers.
  const text = textArg || el.dataset.label || '';
  if (!text) return;
  const icon = el.dataset.icon || '+';
  const ta = document.getElementById('note-' + cId);
  const ex = ta?.value || S.entries[editISO].cycleData[cId].notes || '';

  // TOGGLE: if already added, remove it
  if (ex.includes(text)) {
    let nv = ex.replace(new RegExp('(,\\s*)?' + text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(,\\s*)?', 'g'),
      (match, before, after) => (before && after) ? ', ' : '');
    nv = nv.replace(/^,\s*/, '').replace(/,\s*$/, '').replace(/,\s*,/g, ',').trim();

    S.entries[editISO].cycleData[cId].notes = nv;
    if (ta) ta.value = nv;
    el.classList.remove('active');
    el.textContent = icon + ' ' + text;
    vibrate(8);
    toast('− ' + text);
    return;
  }

  // ADD
  const nv = ex.trim() ? (ex.trim() + ', ' + text) : text;
  S.entries[editISO].cycleData[cId].notes = nv;
  if (ta) ta.value = nv;
  el.classList.add('active');
  el.textContent = '✓ ' + text;
  vibrate(10);
  toast('✓ ' + text);
}

function saveEntry() {
  if (!editISO) return;
  if (S.cycles.length > 0) ensE(S.cycles[0].id);
  S.entries[editISO].temp = document.getElementById('et')?.value || '';
  S.entries[editISO].humidity = document.getElementById('er')?.value || '';

  // Also save water from smart calculator inputs
  active().forEach(c => {
    const waterCalcEl = document.getElementById('water-calc-' + c.id);
    if (waterCalcEl && waterCalcEl.value) {
      ensE(c.id);
      S.entries[editISO].cycleData[c.id].water = waterCalcEl.value;
    }
  });

  saveS();
  _entryDirty = false;
  // Refresh snapshot: saved state is now the new baseline for future discard
  _entrySnapshot = S.entries[editISO] ? JSON.parse(JSON.stringify(S.entries[editISO])) : null;
  vibrate();
  toast('Gespeichert ✓');

  // Visuelles Save-Feedback: Button kurz grün aufleuchten lassen.
  // Wichtig für Anfänger die sich sonst fragen "hat's geklappt?".
  const saveBtns = document.querySelectorAll('.big-save, .save-pill');
  saveBtns.forEach(btn => {
    const orig = btn.textContent;
    btn.textContent = '✓ Gespeichert';
    btn.style.background = 'var(--green)';
    btn.style.color = '#fff';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = '';
      btn.style.color = '';
    }, 1200);
  });
  // Re-render to activate VPD display with saved temp/humidity
  setTimeout(() => renderEntry(editISO), 1300);
}

/**
 * Foto direkt vom Dashboard aus hinzufügen — ohne dass der User erst in den
 * Eintrag-Screen muss. Setzt editISO auf heute und schließt mit renderDash()
 * statt renderEntry() ab, damit der User auf dem Dashboard bleibt.
 */
function addPhotoFromDash(cId) {
  editISO = todayISO();
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { toast('Max 10MB'); return; }
    toast('📸 Foto wird verarbeitet...', 3000);
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        ensE(cId);
        if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
        S.entries[editISO].cycleData[cId].photos.push(compressed);
        try {
          localStorage.setItem(SK, JSON.stringify(S));
        } catch (err) {
          S.entries[editISO].cycleData[cId].photos.pop();
          if (err && (err.name === 'QuotaExceededError' || err.code === 22)) {
            customConfirm('💾 Speicher voll!', 'Der Browser-Speicher reicht nicht mehr für weitere Fotos. Bitte lösche einige alte Fotos oder exportiere ein Backup.', 'Verstanden', 'var(--orange)');
          } else {
            toast('⚠ Foto konnte nicht gespeichert werden');
          }
          return;
        }
        saveS();
        renderDash();
        toast('📸 Foto gespeichert');
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

function addPhoto(cId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { toast('Max 10MB'); return; }
    toast('📸 Foto wird verarbeitet...', 3000);

    const r = new FileReader();
    r.onload = ev => {
      // Compress image via canvas (max 1200px wide)
      const img = new Image();
      img.onload = () => {
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        ensE(cId);
        if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
        S.entries[editISO].cycleData[cId].photos.push(compressed);
        // Quota probe: saveS() swallows errors, so we do one explicit write here
        // to detect QuotaExceededError and roll back cleanly. If the probe succeeds,
        // saveS() will redo the write (with orphan cleanup & undo push) — a small
        // cost in exchange for proper user-visible quota handling.
        try {
          localStorage.setItem(SK, JSON.stringify(S));
        } catch (err) {
          S.entries[editISO].cycleData[cId].photos.pop(); // rollback in-memory state
          if (err && (err.name === 'QuotaExceededError' || err.code === 22)) {
            customConfirm(
              '💾 Speicher voll!',
              'Der Browser-Speicher reicht nicht mehr für weitere Fotos. Bitte lösche einige alte Fotos oder exportiere ein Backup (JSON) und starte danach frisch. Dein aktuelles Foto wurde nicht gespeichert.',
              'Verstanden', 'var(--orange)'
            );
          } else {
            toast('⚠ Foto konnte nicht gespeichert werden');
          }
          return;
        }
        // Probe succeeded — commit via saveS (undo push, flash, etc.)
        saveS();
        renderEntry(editISO);
        toast('✓ Foto gespeichert');
        maybeWarnStorageQuota();
      };
      img.onerror = () => toast('⚠ Foto konnte nicht geladen werden');
      img.src = ev.target.result;
    };
    r.onerror = () => toast('⚠ Fehler beim Lesen');
    r.readAsDataURL(f);
  };
  inp.click();
}

/** Estimate localStorage usage. Warns user if >3 MB. */
let _lastQuotaWarn = 0;
function maybeWarnStorageQuota() {
  try {
    const size = (localStorage.getItem(SK) || '').length;
    // Each char in a serialized JSON is ~1 byte (ASCII) or 2 (UTF-16 in memory, 1 stored).
    const mb = size / 1048576;
    const now = Date.now();
    if (mb > 3.5 && now - _lastQuotaWarn > 300000) { // max 1 warn per 5min
      _lastQuotaWarn = now;
      toast(`⚠ Speicher ${mb.toFixed(1)} MB — bald voll. Alte Fotos löschen?`, 4500);
    }
  } catch (e) {}
}

    { t: 'EC-Wert (Osmotischer Druck)',
      brief: 'Misst die Gesamt-Nährstoffkonzentration. Steuert ob die Pflanze Wasser aufnehmen kann — oder ob das Substrat ihr welches entzieht.',
      mechanism: 'Pflanzen nehmen Wasser durch <b>Osmose</b> auf — Wasser wandert immer von niedriger zu höherer Salzkonzentration. Ist die Konzentration im Substrat niedriger als in der Wurzel → Wasser fließt rein. Wird sie höher (Überdüngung, Versalzung) → <b>der Sog kehrt sich um</b>, das Substrat zieht aktiv Wasser aus der Pflanze. Ergebnis: „Nutrient Burn" — sie vertrocknet in nasser Erde.',
      practice: '<b>Zielwerte (in Erde, Light-Mix):</b><br>• Anzucht: 0.4–0.8<br>• Vegi: 0.8–1.4<br>• Blüte Mitte: 1.4–2.0<br>• Spülen: <0.4<br><br>EC immer nach allen Düngern messen, vor pH-Einstellung. <b>Runoff-EC</b> höher als Inflow = Salze sammeln sich → Flushen.',
      pitfall: 'Über 2.5 im Substrat ist gefährlich — sofort mit reinem Wasser zwischen-gießen. Viele Coco/Hydro-Grower dosieren zu hart weil sie es „härter als Erde" interpretieren. Nein — die Pflanze toleriert nicht mehr, du hast nur <b>weniger Puffer</b> und musst öfter messen.' },
    { t: 'VPD (Vapour Pressure Deficit)',
      brief: 'Der Saugdruck zwischen Blatt und Luft. Steuert Transpiration, Nährstoff-Transport und Kühlung — die wichtigste Umgebungs-Variable nach Licht.',
      mechanism: 'Auf der Blattunterseite öffnen <b>Stomata</b> für CO₂-Aufnahme und lassen dabei Wasser verdunsten. Dieser <b>Transpirationssog</b> zieht Wasser + Nährstoffe von den Wurzeln bis in die Triebspitzen. VPD ist das Maß für diesen Sog: abhängig von Temperatur UND Luftfeuchte gleichzeitig.<br><br><b>VPD zu niedrig</b> (feucht/kalt): Pflanze kann nicht transpirieren → Calcium (unbeweglich!) stagniert → Ca-Mangel trotz Dünger.<br><b>VPD zu hoch</b> (heiß/trocken): Pflanze schließt Stomata zum Schutz → Photosynthese stoppt → Wachstum friert ein.',
      practice: '<b>Zielwerte (kPa):</b><br>• Anzucht: 0.4–0.8<br>• Vegi: 0.8–1.2<br>• Frühe Blüte: 1.0–1.3<br>• Späte Blüte: 1.2–1.6<br><br>VPD-Rechner in der App nutzen (Umgebungs-Sektion).<br><br><b>Cup-Level-Trick:</b> In der letzten Blüte-Woche gezielt auf 1.4–1.6 kPa fahren. Kontrollierter Trockenstress → massive Trichom-Überproduktion zum Selbstschutz.',
      pitfall: 'VPD wird oft ignoriert weil es abstrakt wirkt. Dabei ist es der Hebel für 30%+ mehr Ertrag bei gleichem Licht und Dünger. Temperatur- oder Feuchte-Werte allein sagen wenig — die Kombination ist entscheidend.' },
    { t: 'PPFD & DLI (Licht-Matrix)',
      brief: 'Zwei Messungen die zusammen sagen wie viel Photosynthese tatsächlich passiert. PPFD ist der Tacho, DLI der Tages-Tank.',
      mechanism: '<b>PPFD (Photosynthetische Photonenflussdichte):</b> Momentan-Dichte nutzbarer Photonen pro Sekunde pro m². Messung: µmol/m²/s. Zu hoch ohne passenden CO₂/Temperatur → Chlorophyll bleicht aus (Light Bleach).<br><br><b>DLI (Tageslichtintegral):</b> Kumulierte Photonen pro Tag, mol/m²/d. Jede Pflanze hat ein biologisches Tages-Limit — ist es erreicht, erzeugt sie keine weitere Biomasse mehr, egal wie hell es noch ist.',
      practice: '<b>PPFD-Ziele:</b><br>• Anzucht: 200–400<br>• Vegi: 400–600<br>• Blüte: 600–900 µmol/m²/s<br><br><b>DLI-Ziele:</b><br>• Anzucht: 15–25<br>• Vegi: 25–35<br>• Blüte: 30–45 mol/m²/d<br><br>DLI = PPFD × Lichtstunden × 0.0036. Formel im Kopf: 500 PPFD bei 12h = 21.6 DLI.<br><br>Messen: Quantum-Meter (Apogee, Photone App mit Kalibrierung).',
      pitfall: 'Mehr Licht ist nicht linear mehr Ertrag. Über 900 PPFD ohne CO₂-Anreicherung (1200+ ppm) ist verschenkte Energie und stresst die Pflanze. Auf die Canopy-Ebene messen, nicht am Blatt-Ende wo das Meter leicht verschattet wird.' },
    { t: 'Transpiration (Hydraulische Pumpe)',
      brief: 'Mehr als „Schwitzen" — ist der Motor der Wasser und Nährstoffe entgegen der Schwerkraft bis in die oberste Blüte zieht.',
      mechanism: 'Wasser verdunstet durch Stomata und erzeugt <b>Unterdruck im Xylem</b> (den Leitbahnen). Dieser Transpirationssog wirkt wie ein physikalisches Vakuum — zieht Wasser + gelöste Ionen aus den Wurzeln nach oben. Gleichzeitig <b>kühlt</b> die Verdunstung das Blatt. Ohne Transpiration würden Blätter unter starken LEDs überhitzen.',
      practice: 'Transpiration stoppt bei:<br>• zu niedrigem VPD (feucht-kalt)<br>• geschlossenen Stomata (zu heiß/trocken, Wassermangel)<br>• Wurzelproblemen (Fäule, zu kalt)<br><br>Sichtbares Zeichen: hängende Blätter trotz nasser Erde = Transpiration läuft nicht. Ursache VPD oder Wurzel, nicht Wassermangel.',
      pitfall: 'Wer VPD ignoriert, stoppt diese Pumpe. Nährstoff-Transport fällt aus (besonders Ca, unbeweglich) UND die Pflanze überhitzt gleichzeitig. Klassische Diagnose-Falle: „Ca-Mangel" düngen bringt nichts, weil es ein Transport-Problem ist.' },
    { t: 'Photosynthese (Metabolischer Reaktor)',
      brief: 'Die Umwandlung von Licht + CO₂ + Wasser in Zucker. Alles andere — Wachstum, Blüte, Harz — wird aus diesem Zucker gebaut.',
      mechanism: 'Photonen treffen auf <b>Chlorophyll</b> in den Chloroplasten. Die Energie wird genutzt um H₂O (aus Wurzeln) und CO₂ (aus Luft) in <b>Glukose</b> umzuwandeln. Abfall-Produkt: Sauerstoff. Die Glukose ist der <b>universelle Baustoff</b> — daraus werden Zellulose (Struktur), Proteine, Terpene, Harz gebaut.',
      practice: 'Photosynthese braucht <b>alle drei Inputs gleichzeitig</b> — Licht (PPFD), CO₂ (Luft-Umsatz!), Wasser. Fehlt einer, limitiert er alles andere (Liebig-Minimum).<br><br>Praxis-Konsequenz: perfekter Dünger hilft nichts wenn Ventilation mies (CO₂-Mangel). 900 PPFD bringt nichts wenn Blätter welken (H₂O-Mangel).',
      pitfall: 'Grower erhöhen gern Licht weil es sichtbar mehr ist. Aber wenn CO₂ bei Raum-Standard 400 ppm bleibt, bringt mehr Licht über 700 PPFD kaum mehr Wachstum. Die Reihenfolge der Upgrades ist: Klima → Dünger → Licht → CO₂.' },
    { t: 'Makro- vs. Mikronährstoffe & Mobilität',
      brief: 'Welche Nährstoffe bewegt die Pflanze durch sich durch — und welche nicht. Der Schlüssel zur Diagnose: oben oder unten?',
      mechanism: '<b>Makronährstoffe</b> werden in großen Mengen gebraucht:<br>• Primär: Stickstoff (N), Phosphor (P), Kalium (K)<br>• Sekundär: Calcium (Ca), Magnesium (Mg), Schwefel (S)<br><br><b>Mikronährstoffe</b> nur in Spuren, aber essenziell: Eisen (Fe), Mangan (Mn), Zink (Zn), Kupfer (Cu), Bor (B), Molybdän (Mo).<br><br><b>Mobilität — der Diagnose-Schlüssel:</b><br>• <b>Mobil</b> (N, P, K, Mg): Pflanze zieht sie aus alten Blättern ins neue Wachstum → <b>Mangel zeigt sich unten zuerst</b>.<br>• <b>Immobil</b> (Ca, Fe, S, Mn, Zn, B): einmal in der Zelle, bleiben sie dort → <b>Mangel zeigt sich oben</b>.',
      practice: 'Gelbe Blattspitzen oben = Ca- oder Fe-Problem. Vergilbung unten = N- oder Mg-Problem. <b>Position vor Farbe lesen!</b><br><br>Beispiel: komplett gelbe Pflanze mit jungen grünen Triebspitzen = N-Mangel (mobil, wird nach oben verschoben).<br>Beispiel: neue Triebe gelb mit grünen Adern = Fe-Mangel (immobil, bleibt in alten Blättern).',
      pitfall: 'Bei Ca- oder Fe-„Mangel" oft zuerst pH checken — Lockout häufiger als Mangel. Mg-Mangel bei LED-Anbau mit weichem Wasser fast Standard → CalMag von Anfang an dazu.' },
    { t: 'Kationenaustauschkapazität (KAK/CEC)',
      brief: 'Wie gut dein Substrat Nährstoffe festhält. Bestimmt Puffer, Fehlertoleranz und Gieß-Häufigkeit.',
      mechanism: 'Die KAK misst wie viele <b>positiv geladene Ionen</b> (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) das Substrat wie ein Magnet binden kann. Hohe KAK = Substrat speichert Nährstoffe, gibt sie bedarfsgerecht ab, puffert pH- und EC-Schwankungen. Niedrige KAK = alles muss der Grower bei jedem Guss liefern.',
      practice: '<b>Hohe KAK</b> (gutmütig, fehlerverzeihend):<br>• Light-Mix, All-Mix (Torf-basiert)<br>• Wurmhumus, Kompost<br>→ Mehrere Tage zwischen Gießen OK, Dünger-Fehler werden abgefedert<br><br><b>Niedrige KAK</b> (präzise steuerbar):<br>• Coco (inert)<br>• Steinwolle, Perlite<br>• Hydroponic-Systeme<br>→ Jeder Guss muss perfekt dosiert sein, dafür volle Kontrolle',
      pitfall: 'Coco oft mit Erde verwechselt — beides braun, aber <b>komplett andere Regeln</b>. Coco = täglich gießen mit voller Nährlösung, jedesmal. Wer Coco wie Erde behandelt, produziert Mangel nach wenigen Tagen.' },
    { t: 'Substrattypen',
      brief: 'Was unter der Pflanze ist entscheidet über fast alles andere. Die vier wichtigsten Kategorien.',
      mechanism: '<b>Light-Mix:</b> Torf + Perlite, wenig vorgedüngt (~2 Wochen) → für Dauerdüngung ab Woche 2-3.<br><br><b>All-Mix:</b> Wie Light-Mix, aber mit 6 Wochen Vordüngung → wenig Dünger nötig bis Mitte Blüte.<br><br><b>Coco (Kokos):</b> Inert, kein Nährstoff drin, hält Wasser + Luft perfekt → Grower muss jeden Nährstoff liefern, dafür volle Kontrolle.<br><br><b>Perlite:</b> Kein eigenständiges Substrat, sondern Drainage-Zusatz (20-30 % ins Erd-Gemisch mischen für mehr Sauerstoff).',
      practice: '<b>Empfehlung nach Erfahrung:</b><br>• Einsteiger + Erde: All-Mix (verzeiht Dünger-Fehler)<br>• Einsteiger + Präzision: Light-Mix (mehr Kontrolle, weniger Pufferschock)<br>• Fortgeschritten: Coco mit CalMag-Protokoll<br>• Profi/Cup: Living Soil (eigener Kompost-Mix) oder Hydro<br><br>Bio-Supplemente (Algen, Enzyme) funktionieren <b>nur in lebendigem Boden</b> (Torf mit KAK), nicht in Coco.',
      pitfall: 'All-Mix von Anfang an zu düngen = Überdüngung. Mindestens 3-4 Wochen nur Wasser oder leicht CalMag. Coco ohne Calmag = garantierter Ca-Mangel, weil Coco aktiv Calcium bindet.' },
    { t: 'Cannabinoide',
      brief: 'Die aktiven Wirkstoffe der Pflanze. Entscheiden über Wirkung — nicht Geschmack.',
      mechanism: 'Alle Cannabinoide stammen aus <b>CBGA</b> (der „Mutter-Zelle"). Je nach Genetik und Reife bildet die Pflanze sie um:<br><br><b>THC</b> (Tetrahydrocannabinol): Psychoaktiv, schmerzlindernd, appetit-steigernd.<br><b>CBD</b> (Cannabidiol): Nicht-psychoaktiv, entzündungshemmend, balanciert THC ab.<br><b>CBG</b>: Nicht-psychoaktiv, antibakteriell, wird beim Reifen großteils umgewandelt.<br><b>CBN</b>: Abbauprodukt von THC durch Oxidation → stark sedierend, schlaffördernd.',
      practice: '<b>THC-Maximum</b> bei milchigen Trichomen + ~10% Amber.<br><b>CBN-lastig</b> (für Schlaf): 30-50% Amber Trichome, späte Ernte.<br><b>CBG-hoch</b> (selten): sehr frühe Ernte oder spezielle Genetik (z.B. „White CBG").<br><br>Wichtig: Cannabinoide sind in <b>COOH-Form (THCA, CBDA)</b> in der frischen Pflanze — erst durch Hitze (Decarboxylierung) werden sie psychoaktiv. Roh gegessen wirkt Cannabis nicht.',
      pitfall: 'Amber-Trichome = mehr CBN = mehr Sedation, aber auch <b>weniger Gesamt-THC</b> (wird ja abgebaut). Wer „knock-out" will, erntet spät. Wer Wirkung will, erntet bei milchig.' },
    { t: 'Terpene (Aroma-Profile)',
      brief: 'Die flüchtigen Duftstoffe. Bestimmen Geruch, Geschmack UND Wirkungs-Richtung (Entourage-Effekt).',
      mechanism: 'Terpene sind <b>leicht flüchtige Kohlenwasserstoffe</b> die in den Trichom-Drüsen produziert werden. Sie allein haben keine psychoaktive Wirkung, modulieren aber das Wirkspektrum der Cannabinoide — der sogenannte <b>Entourage-Effekt</b>.',
      practice: '<b>Die 5 wichtigsten:</b><br>• <b>Myrcen</b> (erdig, moschusartig): Indica-typisch, couch-lock, sedierend<br>• <b>Limonen</b> (zitrus): Sativa-typisch, stimmungsaufhellend<br>• <b>Pinen</b> (Kiefernnadeln): Fokus, öffnet Bronchien, kontert Kurzzeitgedächtnis-Effekt von THC<br>• <b>Caryophyllen</b> (pfeffrig): dockt direkt an CB2-Rezeptoren an, Stress-Linderung<br>• <b>Linalool</b> (Lavendel): Beruhigend, angstlösend<br><br><b>Terpen-Schutz:</b> Kühl + dunkel lagern. Hitze (über 25°C) und UV zerstören Terpene schnell.',
      pitfall: 'Im Spülen nicht übertreiben — Terpen-Synthese läuft bis zuletzt. Ernte bei milchig (Terpen-Peak), nicht warten bis alles amber (dann sind viele Terpene schon verflogen). Trocknung bei 18-21 °C kritisch: darüber verdampfen Terpene spürbar.' },
    { t: 'Phytochrom (Licht-Sensor)',
      brief: 'Das Molekül das in Feminisierten die Blüte auslöst. Warum absolute Dunkelheit in der Nacht kritisch ist.',
      mechanism: 'Cannabis hat in den Blättern das Photorezeptor-Protein <b>Phytochrom</b> in zwei Formen:<br>• <b>Pr</b>: inaktiv, absorbiert Rotlicht (~660 nm)<br>• <b>Pfr</b>: aktiv, absorbiert Fernrot (~730 nm)<br><br>Tagsüber wird Pr → Pfr umgewandelt. In der Dunkelheit zerfällt Pfr langsam zurück zu Pr. Fällt das Pfr-Level nachts unter eine Schwelle (entspricht >10h Dunkelheit), <b>aktiviert die Pflanze den Blüte-Signalweg</b>.',
      practice: '<b>Feminisiert Indoor:</b> 12/12-Zyklus mit absoluter Dunkelheit in den 12 Stunden aus.<br><b>Outdoor:</b> Natürlich ab Mitte August wenn Tag unter 14h fällt.<br><b>Automatics:</b> Ignorieren Phytochrom komplett, blühen altersbedingt.<br><br>Tipp: Zelt-Dichtigkeit testen — 5 Min reinstellen ohne Licht, Handy-Kamera schaut ob irgendwo Streulicht sichtbar ist.',
      pitfall: 'Schon wenige Minuten Störlicht können Pfr reaktivieren und den Blüte-Trigger verhindern oder Hermies (Zwitter) auslösen. Häufige Fehler: Netzstecker-LEDs, Stand-by-Lampen, Telefon-Displays, Straßenlaterne außen, schlecht abgedichteter Zelt-Reißverschluss.' },
    { t: 'Anthocyane (Lila-/Rot-Färbung)',
      brief: 'Die violetten Farbstoffe in manchen Buds. Genetisch bedingt oder durch kühle Nächte triggerbar.',
      mechanism: 'Anthocyane sind <b>wasserlösliche Pigmente</b> die die Pflanze als UV-Schutz und Kälteschutz produziert. Manche Strains (z.B. Purple Punch, Granddaddy Purple) haben das Gen für starke Produktion eingebaut. Bei niedrigen Nachttemperaturen unter 15°C wird die Chlorophyll-Produktion gedrosselt → Anthocyane werden sichtbar da sie vorher von grünem Chlorophyll überdeckt wurden.',
      practice: '<b>Triggern</b> (bei vorhandenem genetischem Potenzial): In den letzten 2 Blüte-Wochen Nachttemperatur auf 14-16 °C fallen lassen, Tag bei 22-24 °C halten. Temperaturdifferenz ist der Schlüssel.<br><br><b>Nicht triggerbar</b>: Grüne Genetik bleibt grün. Keine Kälte-Folter an grünen Pflanzen — bringt nichts, nur Stress.',
      pitfall: 'Lila bedeutet <b>nicht automatisch stärker oder besser</b>. Es ist Mode — Cannabinoid-Gehalt hat nichts mit Farbe zu tun. Manche grüne Strains haben mehr THC als lila. Kühle Nächte über 2 Wochen können auch schimmelanfällig machen bei hoher Luftfeuchte.' },
  ]},
  { cat: '💧 Bewässerung', items: [
    { t: 'Dryback (Trocken-Nass-Zyklus)',
      brief: 'Das Intervall zwischen Gießen. Der wichtigste Hebel für gesunde Wurzeln — wichtiger als der Dünger selbst.',
      mechanism: 'Wurzeln brauchen <b>Sauerstoff</b>. Wenn die Pflanze Wasser aufnimmt und es verdunstet, entsteht im Substrat leichter Unterdruck — der frischen Sauerstoff in die Wurzelzone zieht. Dauerfeuchtigkeit = kein Sog = keine Sauerstoff-Versorgung = faulende Wurzeln und schwaches Wurzelsystem.<br><br>Gleichzeitig <b>triggert der leichte Stress des Antrocknens</b> die massenhafte Ausschüttung von Wuchshormonen in den Wurzelspitzen. Die Pflanze reagiert mit aktiverem, dichterem Wurzelwachstum.',
      practice: '<b>Dryback-Zielwerte (Restgewicht):</b><br>• Anzucht: 50-60 %<br>• Vegi: 40-50 %<br>• Blüte Mitte: 35-45 %<br>• Blüte Ende/Finisher: 25-35 %<br><br>Messen: Topf wiegen oder Hebe-Test mit Erfahrung. Die App kann beide Methoden (Einstellungen → Bewässerungs-Modus).<br><br><b>Praxis-Signal:</b> Topf fühlt sich leicht an, Pflanze ist nicht welk → guter Guss-Zeitpunkt. Lieber einen Tag zu spät als zu früh.',
