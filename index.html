<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#111111"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GrowSmart"/>
<link rel="manifest" href="manifest.json"/>
<title>GrowSmart</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--card2:#1f1f1f;
  --border:#262626;--border-light:#333;
  --green:#4caf70;--green-dk:#1a3a24;--green-bg:#0d1e0d;--green-hint:#3a6e4a;--green-glow:rgba(76,175,112,0.15);
  --blue:#5aabf0;--blue-bg:#0a1520;--blue-dk:#1a3050;
  --teal:#5adada;--teal-bg:#0e1a1a;--teal-bd:#1e3535;
  --red:#e06060;--red-bg:#2a0d0d;
  --orange:#e8884a;--orange-bg:#1e0e04;
  --purple:#b06ac8;--purple-bg:#150820;
  --yellow:#f0d050;
  --text:#e8e8e8;--text-sub:#aaa;--text-muted:#666;--text-hint:#555;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
#app{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:12px;}
.scroll::-webkit-scrollbar{display:none;}

/* TOPBAR */
.topbar{background:linear-gradient(180deg,var(--surface) 0%,rgba(20,20,20,0.95) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tb-title{font-size:14px;font-weight:500;color:var(--text);}
.app-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.icon-btn{background:none;border:none;color:var(--green);font-size:22px;cursor:pointer;padding:4px;}
.save-pill{background:var(--green);border:none;border-radius:20px;padding:6px 16px;font-size:12px;color:#fff;cursor:pointer;font-family:var(--font);font-weight:600;box-shadow:0 2px 12px rgba(76,175,112,0.3);}

/* NAV */
.bottom-nav{background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;cursor:pointer;background:none;border:none;opacity:0.4;transition:all 0.2s;}
.nav-btn.active{opacity:1;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;color:var(--green);font-weight:600;font-family:var(--font);letter-spacing:0.02em;}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px;transition:transform 0.15s;}
.sect-head{font-size:11px;color:var(--green);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 0 2px;}
.stat-row{display:flex;gap:8px;}
.stat-box{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:10px 12px;border:0.5px solid var(--border);}
.stat-lbl{font-size:10px;color:var(--text-hint);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.05em;}
.stat-val{font-size:18px;font-weight:600;color:var(--text);}
.stat-unit{font-size:11px;color:var(--text-hint);}
.prog-bg{height:5px;background:var(--border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.inp-wrap{display:flex;flex-direction:column;gap:3px;flex:1;}
.inp-label{font-size:11px;color:var(--text-hint);font-weight:500;}
.inp-field{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:9px 11px;color:var(--text-sub);font-size:13px;font-family:var(--font);width:100%;outline:none;transition:border-color 0.2s;}
.inp-field:focus{border-color:var(--green-hint);box-shadow:0 0 0 3px var(--green-glow);}
.row2{display:flex;gap:8px;}

/* VPD */
.vpd-box{background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.vpd-val{font-size:22px;font-weight:600;color:var(--teal);font-family:var(--mono);}
.vpd-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;margin-top:3px;}
.vpd-scale{display:flex;height:5px;border-radius:3px;overflow:hidden;}
.vpd-seg{flex:1;}
.vpd-mrow{position:relative;height:8px;}
.vpd-marker{position:absolute;top:0;width:2px;height:9px;background:#fff;border-radius:2px;transition:left 0.3s;}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:0.78;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;border:0.5px solid transparent;background:#151515;user-select:none;padding:2px;transition:transform 0.1s,background 0.2s;}
.cal-cell:active{transform:scale(0.92);}
.cal-cell.today{border:2px solid #fff!important;box-shadow:0 0 8px rgba(255,255,255,0.15);}
.cal-num{font-size:14px;color:var(--text-sub);font-weight:700;line-height:1;}
.cal-cell.today .cal-num{color:#fff;}
.cal-tag{font-size:7.5px;color:rgba(255,255,255,0.65);line-height:1;margin-top:1px;text-align:center;}
.cal-icon{font-size:14px;line-height:1;margin-bottom:1px;}
.cal-dot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:2px;right:3px;background:rgba(255,255,255,0.7);}

/* NUTRIENT TABLE */
.nut-tbl-hdr{border-radius:var(--radius-sm) var(--radius-sm) 0 0;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.nut-tbl-wrap{border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);overflow:hidden;}
.nut-tbl-head{display:grid;grid-template-columns:1fr 58px 60px;padding:5px 10px;border-bottom:0.5px solid var(--border);}
.nth{font-size:11px;font-weight:500;}.nth:not(:first-child){text-align:right;}
.nut-row-tbl{display:grid;grid-template-columns:1fr 58px 60px;padding:5px 10px;border-bottom:0.5px solid #1e1e1e;align-items:center;}
.nut-row-tbl:last-child{border:none;}
.nut-row-tbl:nth-child(odd){background:#171717;}
.nut-row-tbl:nth-child(even){background:var(--surface);}
.nt-name{font-size:12px;color:#bbb;}.nt-hint{font-size:12px;text-align:right;font-family:var(--mono);}
.nt-inp{background:#1e1e1e;border:0.5px solid var(--border);border-radius:5px;padding:3px 6px;color:#ddd;font-size:12px;font-family:var(--mono);width:56px;text-align:right;outline:none;}
.nt-inp:focus{border-color:var(--green-hint);}

/* NOTE */
.note-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;}
.note-ta{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:8px 10px;color:#aaa;font-size:12px;font-family:var(--font);width:100%;min-height:65px;resize:none;outline:none;line-height:1.6;}
.note-ta:focus{border-color:var(--green-hint);}
.big-save{border:none;border-radius:var(--radius-sm);padding:14px;font-size:14px;font-weight:600;color:#fff;width:100%;cursor:pointer;font-family:var(--font);letter-spacing:-0.2px;transition:opacity 0.2s;}
.big-save:active{opacity:0.8;}

/* ALERTS */
.alert{border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;border:0.5px solid transparent;}

/* SETTINGS */
.tab-row{display:flex;gap:6px;flex-wrap:wrap;}
.tab-item{display:flex;align-items:center;gap:6px;background:var(--surface);border-radius:8px;padding:6px 12px;border:0.5px solid var(--border);cursor:pointer;font-size:12px;color:var(--text-muted);font-family:var(--font);transition:all 0.2s;}
.tab-item.sel{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.dur-grid{display:flex;flex-wrap:wrap;gap:8px;}
.dur-box{display:flex;flex-direction:column;gap:3px;width:calc(33% - 6px);}
.dur-lbl{font-size:11px;color:var(--text-hint);}
.dur-inp{background:var(--card2);border:0.5px solid var(--border);border-radius:var(--radius-xs);padding:6px;color:var(--text-sub);font-size:13px;text-align:center;width:100%;outline:none;font-family:var(--mono);}
.sub-head{font-size:11px;color:var(--text-hint);font-weight:500;margin-top:8px;margin-bottom:4px;}
.sw-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.sw{position:relative;width:44px;height:26px;cursor:pointer;}
.sw input{opacity:0;width:0;height:0;}
.sl{position:absolute;inset:0;background:#333;border-radius:26px;transition:0.2s;}
.sl:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#888;border-radius:50%;transition:0.2s;}
input:checked+.sl{background:var(--green-dk);}
input:checked+.sl:before{transform:translateX(18px);background:var(--green);}
.del-btn{display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;background:none;border:none;font-size:13px;color:var(--red);font-family:var(--font);}
.sec-tog{background:var(--card);border-radius:12px;border:0.5px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text);transition:background 0.2s;}
.sec-tog:active{background:var(--card2);}
.sec-tog span{flex:1;}
.add-btn{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--green);cursor:pointer;font-family:var(--font);font-weight:600;transition:all 0.2s;}
.add-btn:active{background:var(--green-dk);}
.sav-btn{border:none;border-radius:var(--radius-sm);padding:12px;font-size:13px;font-weight:600;color:#fff;width:100%;cursor:pointer;font-family:var(--font);margin-top:6px;transition:opacity 0.2s;}
.sav-btn:active{opacity:0.8;}

/* COLOR/SYMBOL PICKER */
.pick-row{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0;}
.col-opt{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.2s;}
.col-opt.sel{border-color:#fff;transform:scale(1.2);}
.sym-opt{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--card2);border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform 0.15s;}
.sym-opt.sel{border-color:#fff;transform:scale(1.15);}

/* DÜNGER PRODUCT CARD */
.prod-card{background:var(--card2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;transition:transform 0.1s;}
.prod-card:active{transform:scale(0.98);}
.prod-color{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

/* AI CHAT */
.ai-chat-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.ai-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px;}
.ai-messages::-webkit-scrollbar{display:none;}
.ai-msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;animation:msgIn 0.25s ease;}
.ai-msg.user{align-self:flex-end;background:var(--green-dk);color:var(--green);border-bottom-right-radius:4px;}
.ai-msg.bot{align-self:flex-start;background:var(--card);border:0.5px solid var(--border);color:var(--text-sub);border-bottom-left-radius:4px;}
.ai-input-bar{display:flex;gap:8px;padding:10px 14px;background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0;}
.ai-input{flex:1;background:var(--card);border:0.5px solid var(--border);border-radius:22px;padding:9px 16px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;}
.ai-input:focus{border-color:var(--green-hint);}
.ai-input::placeholder{color:var(--text-hint);}
.ai-send{width:38px;height:38px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s;}
.ai-send:active{opacity:0.7;}
.ai-send:disabled{opacity:0.3;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* DISCLAIMER */
.ai-disclaimer{background:var(--orange-bg);border:0.5px solid rgba(232,136,74,0.3);border-radius:var(--radius-sm);padding:8px 12px;font-size:11px;color:var(--orange);line-height:1.5;display:flex;gap:8px;align-items:flex-start;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,30,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#ddd;padding:10px 22px;border-radius:22px;font-size:13px;z-index:9999;border:0.5px solid #444;pointer-events:none;opacity:0;transition:all 0.3s ease;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* CTX MENU */
#ctx-m{position:fixed;z-index:9998;background:rgba(30,30,30,0.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:0.5px solid #3a3a3a;border-radius:16px;padding:6px;min-width:260px;box-shadow:0 12px 48px rgba(0,0,0,0.7);display:none;animation:ctxIn 0.2s ease;}
#ctx-m.show{display:block;}
@keyframes ctxIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
.ctx-item{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.ctx-item:active{background:rgba(255,255,255,0.06);}
.ctx-g{color:var(--green);}.ctx-r{color:var(--red);}
.ctx-ic{font-size:15px;width:22px;text-align:center;}
.ctx-div{height:0.5px;background:#333;margin:4px 0;}
#ctx-ov{position:fixed;inset:0;z-index:9997;display:none;}
#ctx-ov.show{display:block;}

/* SPINNER */
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:sp 0.7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px 20px;text-align:center;}

/* QUICK ACTIONS */
.qa-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0;scrollbar-width:none;-ms-overflow-style:none;}
.qa-row::-webkit-scrollbar{display:none;}
.qa-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--card);border:0.5px solid var(--border);border-radius:22px;padding:8px 14px;font-size:12px;color:var(--text-sub);cursor:pointer;font-family:var(--font);transition:all 0.2s;white-space:nowrap;}
.qa-btn:active{background:var(--card2);transform:scale(0.96);}

/* STREAK */
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#2a1500,#1a0a00);border:0.5px solid rgba(232,136,74,0.4);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--orange);font-weight:600;}

/* PROGRESS RING */
.ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text);}

/* PHOTO */
.photo-grid{display:flex;gap:6px;flex-wrap:wrap;}
.photo-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;border:0.5px solid var(--border);cursor:pointer;}
.photo-add{width:56px;height:56px;border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-hint);cursor:pointer;transition:border-color 0.2s;}
.photo-add:active{border-color:var(--green);}

/* STATS MINI CHART */
.mini-chart{display:flex;align-items:flex-end;gap:2px;height:32px;}
.mini-bar{flex:1;min-width:3px;background:var(--green);border-radius:2px 2px 0 0;transition:height 0.3s ease;}
</style>
</head>
<body>
<div id="app">
  <!-- DASHBOARD -->
  <div class="screen active" id="scr-dash">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">🌿 GrowSmart</span>
      <button class="icon-btn" onclick="openEntry(todayISO())">＋</button>
    </div>
    <div class="scroll" id="dash-body"></div>
    <nav class="bottom-nav" id="nav-dash"></nav>
  </div>
  <!-- CALENDAR -->
  <div class="screen" id="scr-cal">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button onclick="changeMonth(-1)" style="background:none;border:none;color:var(--green);font-size:28px;cursor:pointer;padding:0 10px;line-height:1">‹</button>
      <span style="font-size:16px;font-weight:600;letter-spacing:-0.3px" id="cal-lbl">–</span>
      <button onclick="changeMonth(1)" style="background:none;border:none;color:var(--green);font-size:28px;cursor:pointer;padding:0 10px;line-height:1">›</button>
    </div>
    <div class="scroll" id="cal-body" style="padding:8px;gap:6px;"></div>
    <nav class="bottom-nav" id="nav-cal"></nav>
  </div>
  <!-- AI COACH (Chat) -->
  <div class="screen" id="scr-ai">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">✦ KI-Coach</span>
      <button class="icon-btn" onclick="clearAIChat()" style="font-size:14px;padding:4px 8px;">🗑</button>
    </div>
    <div class="ai-chat-wrap">
      <div class="ai-messages" id="ai-messages"></div>
      <div class="ai-input-bar" style="padding-bottom:max(10px,env(safe-area-inset-bottom))">
        <input class="ai-input" id="ai-inp" placeholder="Frag den KI-Coach..." onkeydown="if(event.key==='Enter')sendAI()"/>
        <button class="ai-send" onclick="sendAI()" id="ai-send-btn">↑</button>
      </div>
    </div>
    <nav class="bottom-nav" id="nav-ai"></nav>
  </div>
  <!-- SETTINGS -->
  <div class="screen" id="scr-set">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <span class="app-title">Einstellungen</span>
    </div>
    <div class="scroll" id="set-body"></div>
    <nav class="bottom-nav" id="nav-set"></nav>
  </div>
  <!-- ENTRY -->
  <div class="screen" id="scr-entry">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button class="icon-btn" id="entry-back" style="font-size:20px">←</button>
      <span class="tb-title" id="entry-ttl">Eintrag</span>
      <button class="save-pill" onclick="saveEntry()">Speichern</button>
    </div>
    <div class="scroll" id="entry-body"></div>
  </div>
  <!-- DÜNGER MANAGER -->
  <div class="screen" id="scr-duenger">
    <div class="topbar" style="padding-top:max(12px,env(safe-area-inset-top))">
      <button class="icon-btn" onclick="goTo('set')" style="font-size:20px">←</button>
      <span class="app-title">Meine Dünger</span>
      <button class="icon-btn" onclick="addProduct()">＋</button>
    </div>
    <div class="scroll" id="duenger-body"></div>
  </div>
  <!-- PHOTO VIEWER -->
  <div id="photo-viewer" style="position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;cursor:pointer" onclick="this.style.display='none'">
    <img id="photo-view-img" style="max-width:92%;max-height:85%;border-radius:12px;object-fit:contain"/>
  </div>
</div>
<div id="ctx-ov" onclick="closeCtx()"></div>
<div id="ctx-m"></div>
<div id="toast"></div>

<script>
// ============================================================
// COLORS & SYMBOLS
// ============================================================
const COLORS=[
  {id:'g1',hex:'#4caf70',dk:'#071a0c'},{id:'g2',hex:'#5aabf0',dk:'#071422'},
  {id:'g3',hex:'#e8884a',dk:'#1e0e04'},{id:'g4',hex:'#b06ac8',dk:'#150820'},
  {id:'g5',hex:'#f0d050',dk:'#1e1a04'},{id:'g6',hex:'#e06060',dk:'#1e0606'},

// GROW LOGIC
// ============================================================
function todayISO(){return new Date().toISOString().split('T')[0];}
function isoPlus(iso,d){const o=new Date(iso+'T12:00:00');o.setDate(o.getDate()+d);return o.toISOString().split('T')[0];}

function phase(iso,c){
  if(!c.startDate)return null;
  const diff=Math.floor((new Date(iso+'T12:00:00')-new Date(c.startDate+'T12:00:00'))/86400000);
  if(diff<0)return null;
  const a=c.anzuchtDays||17,b=a+(c.bloomDays||66),f=b+(c.flushDays||9),
        i=f+(c.iceDays||6),h=i+(c.harvestDays||1),d2=h+(c.dryDays||7);
  if(diff<a)return{ph:'anzucht',day:diff+1,week:Math.floor(diff/7)+1,total:d2};
  if(diff<b)return{ph:'bloom',day:diff+1,week:Math.floor((diff-a)/7)+1,total:d2};
  if(diff<f)return{ph:'flush',day:diff+1,week:null,total:d2};
  if(diff<i)return{ph:'ice',day:diff+1,week:null,total:d2};
  if(diff<h)return{ph:'harvest',day:diff+1,week:null,total:d2};
  if(diff<=d2)return{ph:'dry',day:diff+1,week:null,total:d2};
  return null;
}

function getInt(c,ph){
  if(ph==='anzucht')return c.intAnzucht||RI.anzucht;
  if(ph==='flush')return c.intFlush||RI.flush;
  return c.intBloom||RI.bloom;
}

function getAction(iso,c){
  const p=phase(iso,c);
  if(!p)return null;
  if(p.ph==='harvest')return'ernte';
  if(p.ph==='dry')return'trocknen';
  if(p.ph==='ice')return'ice';
  if(p.ph==='flush')return'spuelen';
  const interval=getInt(c,p.ph);
  if((p.day-1)%interval!==0)return null;
  return'giess';
}

function isGiessTag(iso,c){return['giess','spuelen','ice'].includes(getAction(iso,c)||'');}

function getWeekDoses(cycleId,week){
  const ownKey=cycleId+'_w'+week;
  if(S.weekSchedule[ownKey])return S.weekSchedule[ownKey];
  const glKey='global_w'+week;
  if(S.weekSchedule[glKey])return S.weekSchedule[glKey];
  return {};
}
function setWeekDoses(key,doses){S.weekSchedule[key]=doses;}

function nextGiessTag(c,fromISO){
  if(!c.active||!c.startDate)return null;
  for(let i=1;i<=30;i++){const iso=isoPlus(fromISO,i);if(isGiessTag(iso,c))return{iso,days:i};}
  return null;
}
function daysToHarvest(c){
  if(!c.startDate)return null;
  const hd=(c.anzuchtDays||17)+(c.bloomDays||66)+(c.flushDays||9)+(c.iceDays||6);
  const diff=Math.ceil((new Date(c.startDate+'T12:00:00').getTime()+hd*86400000-Date.now())/86400000);
  return diff>0?diff:0;
}
function active(){return S.cycles.filter(c=>c.active&&c.startDate);}

// STREAK CALCULATOR
function calcStreak(c){
  const today=todayISO();
  let streak=0;
  for(let i=0;i<60;i++){
    const iso=isoPlus(today,-i);
    if(isGiessTag(iso,c)){
      const cd=S.entries[iso]?.cycleData?.[c.id];
      if(cd&&cd.water)streak++;
      else break;
    }
  }
  return streak;
}

// WATER STATS (last 14 days)
function waterStats(c){
  const today=todayISO();
  const vals=[];
  for(let i=13;i>=0;i--){
    const iso=isoPlus(today,-i);
    const w=parseFloat(S.entries[iso]?.cycleData?.[c.id]?.water)||0;
    vals.push(w);
  }
  return vals;
}

// COLLECT ALL NOTES for AI context
function collectNotes(){
  const notes=[];
  const entries=Object.entries(S.entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
  entries.forEach(([date,e])=>{
    if(!e.cycleData)return;
    Object.entries(e.cycleData).forEach(([cId,cd])=>{
      if(cd.notes&&cd.notes.trim()){
        const c=S.cycles.find(x=>x.id===cId);
        notes.push({date,cycle:c?.name||'Unbekannt',text:cd.notes.trim(),ph:cd.ph||'',water:cd.water||'',ph_val:cd.ph||''});
      }
    });
  });
  return notes;
}

function getAlerts(c){
  const today=todayISO();const p=phase(today,c);if(!p||!c.active)return[];
  const out=[];
  const lastW=Object.keys(S.entries).filter(d=>d<=today&&S.entries[d]?.cycleData?.[c.id]?.water).sort().pop();
  if(lastW){
    const days=Math.floor((new Date(today+'T12:00:00')-new Date(lastW+'T12:00:00'))/86400000);
    const iv=getInt(c,p.ph);
    if(days>iv+1)out.push({type:'warn',icon:'⚠️',title:`${sym(c)} Gießen überfällig`,text:`Letztes Gießen vor ${days} Tagen (Intervall: ${iv} Tage).`});
  }
  if(p.ph==='bloom'){
    const bloomDay=p.day-(c.anzuchtDays||17);
    const rem=(c.bloomDays||66)-bloomDay;
    if(rem>0&&rem<=7)out.push({type:'info',icon:'🚿',title:`${sym(c)} Spülung in ${rem} Tagen`,text:'Letzten Dünger kaufen – danach nur noch klares Wasser.'});
    if(p.week&&p.week>=7)out.push({type:'tip',icon:'🔬',title:`${sym(c)} Woche ${p.week} – Trichome checken`,text:'Lupe bereithalten. Auf bernsteinfarbene Trichome achten.'});
  }
  if(p.ph==='ice'||p.ph==='harvest')out.push({type:'success',icon:'✂️',title:`${sym(c)} Ernte nähert sich!`,text:'Trichome prüfen, Ernte-Equipment vorbereiten.'});
  return out;
}

// SMART TIPS based on phase + VPD
function smartTip(c,p,vpd){
  if(!p)return null;
  const tips=[];
  if(p.ph==='anzucht'&&p.week===1)tips.push('🌱 Erste Woche: Erde feucht halten, kein Dünger nötig. Licht auf 18/6 stellen.');
  if(p.ph==='anzucht'&&p.week>=2)tips.push('💡 Ab Woche 2 kann leichter Dünger (25-50% Dosis) gestartet werden.');
  if(p.ph==='bloom'&&p.week===1)tips.push('🌸 Blütestart! Licht auf 12/12 umstellen. Phosphor/Kalium erhöhen.');
  if(p.ph==='bloom'&&p.week>=4&&p.week<=6)tips.push('🔍 Peak-Blüte: Maximale Nährstoffaufnahme. Trichome beobachten.');
  if(p.ph==='flush')tips.push('🚿 Nur klares Wasser geben. pH zwischen 6.0 und 6.5 halten.');
  if(p.ph==='ice')tips.push('❄️ Eiswasser (unter 10°C) in den letzten Tagen kann Trichom-Produktion anregen.');
  if(vpd!==null){
    if(vpd<0.4)tips.push('⚠️ VPD zu niedrig! Luftfeuchtigkeit senken oder Temperatur erhöhen.');
    if(vpd>1.5)tips.push('⚠️ VPD zu hoch! Luftfeuchtigkeit erhöhen oder Temperatur senken.');
  }
  return tips.length>0?tips[Math.floor(Math.random()*tips.length)]:null;
}

function calcVPD(t,rh){if(isNaN(t)||isNaN(rh))return null;return Math.round(0.6108*Math.exp(17.27*t/(t+237.3))*(1-rh/100)*100)/100;}
function vpdZone(v){
  if(v===null)return null;
  if(v<0.4)return{label:'Zu feucht – Schimmel!',color:'#7a7af0',bg:'#1e1e3a',hint:'Belüftung erhöhen, Schimmelgefahr!',pct:Math.round(v/0.4*15)};
  if(v<0.8)return{label:'Anzucht – optimal',color:'#5aabf0',bg:'#0d1e2e',hint:'Ideal für Anzucht.',pct:Math.round(15+(v-0.4)/0.4*35)};
  if(v<1.2)return{label:'Blüte – optimal',color:'#4caf70',bg:'#0d1e0d',hint:'Perfekt für Blüte!',pct:Math.round(50+(v-0.8)/0.4*25)};
  if(v<1.6)return{label:'Etwas hoch',color:'#c8a04a',bg:'#2a1e0d',hint:'Luftfeuchtigkeit leicht erhöhen.',pct:Math.round(75+(v-1.2)/0.4*15)};
  return{label:'Pflanzenstress!',color:'#e06060',bg:'#2a0d0d',hint:'Sofort Luftfeuchtigkeit anpassen!',pct:Math.min(97,Math.round(90+(v-1.6)*10))};
}

// ============================================================
// SHIFT LOGIC (FIXED!)
// ============================================================
function shiftGiessTage(cId,days){
  const c=S.cycles.find(x=>x.id===cId);
  if(!c||!c.startDate)return;
  // Actually shift the start date - this properly moves all watering days
  const newStart=isoPlus(c.startDate,days);
  // Also shift logged data
  const keys=Object.keys(S.entries).sort((a,b)=>days>0?b.localeCompare(a):a.localeCompare(b));
  const moves=[];
  keys.forEach(d=>{
    if(S.entries[d]?.cycleData?.[cId])
      moves.push({from:d,to:isoPlus(d,days),log:JSON.parse(JSON.stringify(S.entries[d].cycleData[cId]))});
  });
  moves.forEach(({from,to,log})=>{
    delete S.entries[from].cycleData[cId];
    if(!S.entries[to])S.entries[to]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[to].cycleData)S.entries[to].cycleData={};
    S.entries[to].cycleData[cId]=log;
  });
  // Clean empty entries
  Object.keys(S.entries).forEach(d=>{const e=S.entries[d];if(!e.temp&&!e.humidity&&!Object.keys(e.cycleData||{}).length)delete S.entries[d];});
  c.startDate=newStart;
}

function shiftAll(cId,days){
  const keys=Object.keys(S.entries).sort((a,b)=>days>0?b.localeCompare(a):a.localeCompare(b));
  const moves=[];
  keys.forEach(d=>{if(S.entries[d]?.cycleData?.[cId])moves.push({from:d,to:isoPlus(d,days),log:S.entries[d].cycleData[cId]});});
  moves.forEach(({from,to,log})=>{
    delete S.entries[from].cycleData[cId];
    if(!S.entries[to])S.entries[to]={temp:'',humidity:'',cycleData:{}};
    if(!S.entries[to].cycleData)S.entries[to].cycleData={};
    S.entries[to].cycleData[cId]=log;
  });
  Object.keys(S.entries).forEach(d=>{const e=S.entries[d];if(!e.temp&&!e.humidity&&!Object.keys(e.cycleData||{}).length)delete S.entries[d];});
}

function progressRing(pct,color,size=64){

  return`<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--border)" stroke-width="5" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="5" fill="none"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset 0.8s ease"/>
    </svg>
    <div class="ring-label">${Math.round(pct)}%</div>
  </div>`;
}

const MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-lbl').textContent=`${MN[m]} ${y}`;
  const act=active(),today=todayISO();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),off=fd===0?6:fd-1;
  let cells='';
  for(let i=0;i<off;i++)cells+='<div></div>';

  for(let d=1;d<=dim;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===today,hasEntry=!!S.entries[iso];
    const gc=act.filter(c=>isGiessTag(iso,c));
    const allPh=act.map(c=>({c,p:phase(iso,c)})).filter(x=>x.p);
    const isStart=act.some(c=>c.startDate===iso);

    let bg='#151515',border='transparent';
    if(gc.length===1){const cl=col(gc[0]);bg=cl.dk;border=cl.hex+'88';}
    else if(gc.length>=2){const c1=col(gc[0]),c2=col(gc[1]);bg=`linear-gradient(135deg,${c1.dk} 50%,${c2.dk} 50%)`;border=c1.hex+'66';}

    const a=gc.length>0?getAction(iso,gc[0]):null;
    const icon=isStart?'🏁':a?({'giess':'🪣','spuelen':'🚿','ice':'❄️','ernte':'✂️','trocknen':'🍃'}[a]||''):'';
    const tagInfo=allPh[0];
    const tagCol=gc.length>0?col(gc[0]).hex:(tagInfo?col(tagInfo.c).hex:'rgba(255,255,255,0.4)');

    cells+=`<div class="cal-cell ${isToday?'today':''}" style="background:${bg};border-color:${border}"
      onclick="calClick('${iso}')"
      ontouchstart="lpS('${iso}',event)" ontouchend="lpE()" ontouchmove="lpE()">
      ${icon?`<span class="cal-icon">${icon}</span>`:''}
      <span class="cal-num">${d}</span>
      ${tagInfo?`<span class="cal-tag" style="color:${tagCol}">T${tagInfo.p.day}</span>`:''}
      ${hasEntry?`<div class="cal-dot"></div>`:''}
    </div>`;
  }

  const cycLeg=act.map(c=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)"><span style="width:8px;height:8px;border-radius:50%;background:${col(c).hex};display:inline-block"></span>${sym(c)} ${c.name}</span>`).join(' ');
  const actLeg=`<span style="font-size:10px;color:var(--text-hint)">🪣 Gießen &nbsp;🚿 Spülen &nbsp;❄️ Ice &nbsp;✂️ Ernte &nbsp;🏁 Start</span>`;

  document.getElementById('cal-body').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(x=>`<div style="text-align:center;font-size:11px;color:var(--text-muted);font-weight:600">${x}</div>`).join('')}
    </div>
    <div class="cal-grid">${cells}</div>
    <div style="padding:6px 0;border-top:0.5px solid var(--border);margin-top:5px;display:flex;flex-wrap:wrap;gap:6px">${cycLeg}</div>
    <div style="padding:2px 0 4px">${actLeg}</div>`;
}

function calClick(iso){entryFrom='cal';openEntry(iso);}
function changeMonth(d){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+d,1);renderCal();}

let lpT=null;
function lpS(iso,e){
  e.preventDefault();
  lpT=setTimeout(()=>{lpT=null;showCtx(iso,e);},500);
}
function lpE(){if(lpT){clearTimeout(lpT);lpT=null;}}

function showCtx(iso,e){
  const act=active(),today=todayISO();
  const df=new Date(iso+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  let items=[];
  
  // Fixed shift options - now properly shifts the entire cycle
  act.forEach(c=>{
    const p=phase(iso,c);if(!p)return;
    const cl=col(c);
    items.push(`<div class="ctx-item ctx-g" onclick="shiftCycle('${c.id}',1)"><span class="ctx-ic">→</span>${sym(c)} ${c.name} – 1 Tag verschieben</div>`);
    items.push(`<div class="ctx-item" style="color:${cl.hex}" onclick="shiftCycle('${c.id}',-1)"><span class="ctx-ic">←</span>${sym(c)} ${c.name} – 1 Tag vorverlegen</div>`);
  });
  
  if(items.length)items.push('<div class="ctx-div"></div>');
  S.cycles.filter(c=>!c.active).forEach(c=>items.push(`<div class="ctx-item ctx-g" onclick="startOn('${c.id}','${iso}')"><span class="ctx-ic">▶</span>${sym(c)} ${c.name} starten</div>`));
  act.forEach(c=>items.push(`<div class="ctx-item ctx-r" onclick="stopC('${c.id}')"><span class="ctx-ic">■</span>${sym(c)} ${c.name} beenden</div>`));
  if(items.length)items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calClick('${iso}');closeCtx()"><span class="ctx-ic">✏</span>Eintrag ${df} öffnen</div>`);

  // Ask AI about this day
  items.push(`<div class="ctx-item" style="color:var(--teal)" onclick="askAIAboutDay('${iso}');closeCtx()"><span class="ctx-ic">✦</span>KI zu Tag ${df} fragen</div>`);

  const menu=document.getElementById('ctx-m');
  menu.innerHTML=`<div style="font-size:11px;color:var(--text-hint);padding:8px 16px 2px;font-weight:600">${df}</div>`+items.join('');
  const t=e?.touches?.[0]||e?.changedTouches?.[0];
  const x=t?Math.min(t.clientX,window.innerWidth-270):window.innerWidth/2-130;
  const y=t?Math.min(t.clientY,window.innerHeight-Math.min(items.length*50,380)):window.innerHeight/2;
  menu.style.left=x+'px';menu.style.top=y+'px';
  menu.classList.add('show');document.getElementById('ctx-ov').classList.add('show');
}
function closeCtx(){document.getElementById('ctx-m').classList.remove('show');document.getElementById('ctx-ov').classList.remove('show');}

// FIXED: Shift entire cycle (start date + data)
function shiftCycle(cId,days){
  closeCtx();
  const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  shiftGiessTage(cId,days);
  saveS();renderCal();
  toast(`${sym(c)} ${c.name}: ${days>0?'+':''}${days} Tag verschoben ✓`);
}

function startOn(cId,iso){
  closeCtx();const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  c.active=true;c.startDate=iso;saveS();renderCal();
  toast(`${sym(c)} ${c.name} gestartet!`);
  setTimeout(()=>{selId=cId;draft={};goTo('set');},900);
}
function stopC(cId){
  closeCtx();const c=S.cycles.find(x=>x.id===cId);if(!c)return;
  if(!confirm(`"${c.name}" beenden?`))return;
  c.active=false;c.startDate=null;saveS();renderCal();toast(`${sym(c)} beendet`);
}

function buildAIContext(){
  const act=active(),today=todayISO(),entry=S.entries[today]||{};
  const vpd=calcVPD(parseFloat(entry.temp),parseFloat(entry.humidity));
  const notes=collectNotes();
  const allAlerts=act.flatMap(c=>getAlerts(c)).map(a=>`${a.icon} ${a.title}: ${a.text}`).join('\n')||'keine';
  const prodNames=(S.products||[]).map(p=>p.name+' ('+p.note+')').join(', ')||'keine';

  const cycleInfo=act.map(c=>{
    const p=phase(today,c),a=getAction(today,c);
    const streak=calcStreak(c);
    return`${sym(c)} ${c.name}: Tag ${p?.day||'–'}, ${p?PN[p.ph]:'–'}${p?.week?' Wo.'+p.week:''}, Intervall ${getInt(c,p?.ph||'bloom')}d, Heute: ${a||'Pause'}, Streak: ${streak} Gießtage`;
  }).join('\n');

  const notesSummary=notes.length>0?
    'NOTIZEN DES NUTZERS (chronologisch):\n'+notes.slice(0,15).map(n=>`[${n.date}] ${n.cycle}: "${n.text}"${n.water?' ('+n.water+'ml)':''}${n.ph_val?' pH:'+n.ph_val:''}`).join('\n'):
    'Keine Notizen vorhanden.';

  // Recent pH and water data
  const recentData=[];
  for(let i=0;i<7;i++){
    const iso=isoPlus(today,-i);
    const e=S.entries[iso];
    if(e){
      const items=[];
      if(e.temp)items.push(`${e.temp}°C`);
      if(e.humidity)items.push(`${e.humidity}% RLF`);
      Object.entries(e.cycleData||{}).forEach(([cId,cd])=>{
        if(cd.water)items.push(`Wasser:${cd.water}ml`);
        if(cd.ph)items.push(`pH:${cd.ph}`);
      });
      if(items.length)recentData.push(`${iso}: ${items.join(', ')}`);
    }
  }

  return`Du bist ein erfahrener Cannabis-Grow-Berater in der App "GrowSmart". Du antwortest auf Deutsch, freundlich und konkret. Max 200 Wörter.

WICHTIG: Weise den Nutzer bei Dosierungsempfehlungen darauf hin, dass er die Angaben mit den Herstellerhinweisen vergleichen sollte. Sei ehrlich wenn du etwas nicht sicher weißt.

AKTUELLE DATEN:
Datum: ${today}
Temp: ${entry.temp||'nicht gemessen'}°C, RLF: ${entry.humidity||'nicht gemessen'}%, VPD: ${vpd!==null?vpd.toFixed(2)+' kPa':'nicht berechnet'}
Dünger-Produkte: ${prodNames}
Warnungen: ${allAlerts}

Zyklen:
${cycleInfo||'Keine aktiven Zyklen'}

Letzte 7 Tage Messwerte:
${recentData.join('\n')||'Keine Daten'}

${notesSummary}`;
}

async function sendAI(){
  const inp=document.getElementById('ai-inp');
  const text=inp.value.trim();
  if(!text||aiSending)return;
  
  inp.value='';
  aiSending=true;
  document.getElementById('ai-send-btn').disabled=true;
  
  // Add user message
  S.aiChat.push({role:'user',text});
  
  // Add thinking indicator
  const container=document.getElementById('ai-messages');
  renderAIChatMessages();
  container.innerHTML+=`<div class="ai-msg bot" id="ai-thinking"><div class="spin"></div></div>`;
  container.scrollTop=container.scrollHeight;
  
  try{
    // Build messages for API with context
    const systemPrompt=buildAIContext();
    const apiMessages=S.aiChat.map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
    
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:apiMessages
      })
    });
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||'Entschuldigung, ich konnte keine Antwort generieren.';
    
    S.aiChat.push({role:'bot',text:reply});
    saveS();
  }catch(e){
    S.aiChat.push({role:'bot',text:'⚠️ Verbindungsfehler. Bitte prüfe deine Internetverbindung und versuche es erneut.'});
  }
  
  aiSending=false;
  document.getElementById('ai-send-btn').disabled=false;
  renderAIChatMessages();
  container.scrollTop=container.scrollHeight;
}

function renderAIChatMessages(){
  const container=document.getElementById('ai-messages');
  let html=`<div class="ai-disclaimer">
    <span style="font-size:16px;flex-shrink:0">⚠️</span>

  const sel=S.cycles.find(c=>c.id===selId);
  if(sel&&draft.id!==sel.id)draft={...sel};
  const d=draft,cl=d.colorId?COLORS.find(x=>x.id===d.colorId)||COLORS[0]:COLORS[0];

  const tabs=S.cycles.map(c=>`<div class="tab-item ${c.id===selId?'sel':''}" onclick="selCyc('${c.id}')"><span style="font-size:14px">${sym(c)}</span><span style="color:${col(c).hex}">${c.name}</span></div>`).join('');
  const colPick=COLORS.map(x=>`<div class="col-opt ${d.colorId===x.id?'sel':''}" style="background:${x.hex}" onclick="dd('colorId','${x.id}')"></div>`).join('');
  const symPick=SYMS.map(s=>`<div class="sym-opt ${d.symbol===s?'sel':''}" onclick="ddS('symbol','${s}')">${s}</div>`).join('');

  const durs=sel?[
    ['Anzucht','anzuchtDays',17],['Blüte','bloomDays',66],['Spülen','flushDays',9],
    ['IceFlush','iceDays',6],['Ernte','harvestDays',1],['Trocknen','dryDays',7]
  ].map(([l,k,def])=>`<div class="dur-box"><div class="dur-lbl">${l} (Tage)</div><input class="dur-inp" type="number" value="${d[k]!==undefined?d[k]:def}" oninput="dd('${k}',this.value)"/></div>`).join(''):'';

  document.getElementById('set-body').innerHTML=`
    <div class="card" style="gap:10px;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between"><div class="sect-head">Meine Zyklen</div><button class="add-btn" onclick="addCyc()">＋ Neu</button></div>
      <div class="tab-row">${tabs}</div>
      ${sel?`<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
        <div class="sub-head">Farbe</div><div class="pick-row">${colPick}</div>
        <div class="sub-head">Symbol</div><div class="pick-row">${symPick}</div>
        <div class="inp-wrap"><div class="inp-label">Name</div><input class="inp-field" value="${d.name||''}" oninput="dd('name',this.value)" style="border-color:${cl.hex}44"/></div>
        <div class="inp-wrap"><div class="inp-label">Standort / Zelt</div><input class="inp-field" value="${d.location||''}" oninput="dd('location',this.value)"/></div>
        <div class="sw-row"><span style="font-size:13px;color:var(--text-sub)">Aktiv</span><label class="sw"><input type="checkbox" ${sel.active?'checked':''} onchange="toggleAct('${sel.id}',this.checked)"/><span class="sl"></span></label></div>
        <div class="inp-wrap"><div class="inp-label">Startdatum</div><input class="inp-field" type="date" value="${d.startDate||''}" oninput="dd('startDate',this.value)" style="color-scheme:dark"/></div>
        <div class="sub-head">Phasendauern</div><div class="dur-grid">${durs}</div>
        <div class="sub-head">Gießintervall pro Phase</div>
        <div style="font-size:11px;color:var(--text-hint);margin-bottom:4px">Empfehlung: Anzucht 4 · Blüte 3 · Spülen 2 Tage</div>
        <div class="dur-grid">
          <div class="dur-box"><div class="dur-lbl">Anzucht</div><input class="dur-inp" type="number" value="${d.intAnzucht||4}" oninput="dd('intAnzucht',this.value)"/></div>
          <div class="dur-box"><div class="dur-lbl">Blüte</div><input class="dur-inp" type="number" value="${d.intBloom||3}" oninput="dd('intBloom',this.value)"/></div>
          <div class="dur-box"><div class="dur-lbl">Spülen</div><input class="dur-inp" type="number" value="${d.intFlush||2}" oninput="dd('intFlush',this.value)"/></div>
        </div>
        <button class="sav-btn" style="background:${cl.hex}" onclick="saveDraft()">💾 ${sym(d)||'🌿'} ${d.name||'Zyklus'} speichern</button>
        <button class="del-btn" onclick="delCyc('${sel.id}')">🗑 Zyklus löschen</button>
      </div>`:'<div style="font-size:13px;color:var(--text-muted)">Noch keine Zyklen.</div>'}
    </div>
    <div class="sec-tog" onclick="openDuenger()" style="border-color:rgba(76,175,112,0.3)">
      <span>🧪</span>
      <div><div style="font-weight:500">Meine Dünger & Wochenplan</div><div style="font-size:11px;color:var(--text-muted)">${(S.products||[]).length} Produkte konfiguriert</div></div>
      <span style="color:var(--text-muted)">›</span>
    </div>
    <!-- DATA EXPORT -->
    <div class="sec-tog" onclick="exportData()">
      <span>📤</span>
      <div><div style="font-weight:500">Daten exportieren</div><div style="font-size:11px;color:var(--text-muted)">Backup als JSON speichern</div></div>
      <span style="color:var(--text-muted)">›</span>
    </div>
    <div class="sec-tog" onclick="importData()">
      <span>📥</span>
      <div><div style="font-weight:500">Daten importieren</div><div style="font-size:11px;color:var(--text-muted)">Backup wiederherstellen</div></div>
      <span style="color:var(--text-muted)">›</span>
    </div>
    <div style="text-align:center;padding:16px 0;font-size:11px;color:var(--text-hint)">GrowSmart v2.0 · Made with 🌿</div>
    <div style="height:20px"></div>`;
}

function dd(k,v){draft[k]=isNaN(v)||v===''?v:Number(v);}
function ddS(k,v){draft[k]=v;renderSet();}
function saveDraft(){
  const c=S.cycles.find(x=>x.id===selId);if(!c)return;
  const old=c.startDate,nw=draft.startDate;
  if(old&&nw&&old!==nw){const diff=Math.round((new Date(nw+'T12:00:00')-new Date(old+'T12:00:00'))/86400000);if(diff)shiftAll(c.id,diff);}
  Object.assign(c,{...draft,id:c.id});
  saveS();toast(`${sym(c)} ${c.name} gespeichert ✓`);renderSet();
}
function selCyc(id){selId=id;draft={};renderSet();}
function addCyc(){
  const i=S.cycles.length;
  const c={id:Date.now().toString(),name:`Zyklus ${i+1}`,location:'',active:false,startDate:null,
    colorId:COLORS[i%COLORS.length].id,symbol:SYMS[i%SYMS.length],
    anzuchtDays:17,bloomDays:66,flushDays:9,iceDays:6,harvestDays:1,dryDays:7,
    intAnzucht:4,intBloom:3,intFlush:2};
  S.cycles.push(c);selId=c.id;draft={...c};saveS();renderSet();
}
function toggleAct(id,checked){
  const c=S.cycles.find(x=>x.id===id);if(!c)return;
  c.active=checked;if(checked&&!c.startDate)c.startDate=todayISO();if(!checked)c.startDate=null;
  draft.active=c.active;draft.startDate=c.startDate;saveS();renderSet();
}
function delCyc(id){
  if(!confirm('Zyklus und alle Logs löschen?'))return;
  S.cycles=S.cycles.filter(x=>x.id!==id);
  Object.keys(S.entries).forEach(d=>{if(S.entries[d]?.cycleData?.[id])delete S.entries[d].cycleData[id];});
  selId=S.cycles[0]?.id||null;draft={};saveS();renderSet();toast('Zyklus gelöscht');
}

// EXPORT / IMPORT
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='growsmart_backup_'+todayISO()+'.json';
  a.click();URL.revokeObjectURL(url);
  toast('Backup heruntergeladen ✓');
}
function importData(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!confirm(`Backup laden? ${(d.cycles||[]).length} Zyklen, ${Object.keys(d.entries||{}).length} Einträge. ACHTUNG: Aktuelle Daten werden überschrieben!`))return;
        S=Object.assign({cycles:[],entries:{},products:[],weekSchedule:{},aiChat:[]},d);
        saveS();toast('Backup geladen ✓');goTo('dash');
      }catch(err){toast('Fehler beim Laden');}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ============================================================
// ENTRY SCREEN (enhanced with photos + AI helper)
// ============================================================
function openEntry(iso){
  editISO=iso;
  document.getElementById('entry-back').onclick=()=>goTo(entryFrom);
  document.getElementById('entry-ttl').textContent=`Eintrag – ${new Date(iso+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}`;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr-entry').classList.add('active');
  renderEntry(iso);
}

function renderEntry(iso){
  const act=active(),saved=S.entries[iso]||{},temp=saved.temp||'',rh=saved.humidity||'';
  const vpd=calcVPD(parseFloat(temp),parseFloat(rh)),z=vpdZone(vpd);

  const vpdBox=vpd!==null?`<div class="vpd-box"><div>
    <div style="font-size:10px;color:#3a7a7a;margin-bottom:2px;font-weight:600">VPD (automatisch)</div>
    <div style="display:flex;align-items:baseline;gap:3px"><span class="vpd-val" id="vpd-v">${vpd.toFixed(2)}</span><span style="font-size:11px;color:#3a7a7a"> kPa</span></div>
    <span class="vpd-pill" id="vpd-p" style="background:${z.bg};color:${z.color}">${z.label}</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:3px;width:88px">
    <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>Anzucht</span><span>Blüte</span><span>Stress</span></div>
    <div class="vpd-scale"><div class="vpd-seg" style="background:#1e3a6e"></div><div class="vpd-seg" style="background:#1e6e3a"></div><div class="vpd-seg" style="background:#6e4a1e"></div></div>
    <div class="vpd-mrow"><div class="vpd-marker" id="vpd-m" style="left:${Math.min(95,z.pct)}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-hint)"><span>0.4</span><span>0.8</span><span>1.2</span><span>1.8</span></div>
  </div></div>`:
  `<div style="background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text-muted)">Temperatur &amp; Luftfeuchtigkeit eingeben → VPD</div>`;

  const blocks=act.map(c=>{
    const p=phase(iso,c),a=getAction(iso,c);
    const cl=col(c),s=sym(c);
    const cd=saved.cycleData?.[c.id]||{};
    const phLabel=p?PN[p.ph]:'–';
    const wk=p?Math.min(p.week||1,10):1;
    const doses=getWeekDoses(c.id,wk);

    const giessCard=a?`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${cl.hex}11;border:0.5px solid ${cl.hex}33;border-radius:var(--radius-sm);margin-bottom:6px">
      <span style="font-size:24px">${{'giess':'🪣','spuelen':'🚿','ice':'❄️','ernte':'✂️','trocknen':'🍃'}[a]||'💤'}</span>
      <div>
        <div style="font-size:13px;font-weight:600;color:${cl.hex}">${a==='giess'?'Gießtag – heute gießen':a==='spuelen'?'Spültag – nur klares Wasser':a==='ice'?'IceFlush – sehr kaltes Wasser':a==='ernte'?'Erntetag! ✂️':'Trocknungsphase'}</div>
        ${a==='giess'?`<div style="font-size:11px;color:var(--text-muted)">Intervall: alle ${getInt(c,p?.ph||'bloom')} Tage · Woche ${wk}</div>`:''}
      </div>
    </div>`:'';

    const prodRows=(S.products||[]).map(prod=>{
      const planDose=doses[prod.id]||0;
      const loggedDose=cd.doses?.[prod.id]||'';
      return`<div class="nut-row-tbl">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${prod.color};flex-shrink:0"></div><span class="nt-name">${prod.name}</span></div>
        <span class="nt-hint" style="color:${prod.color}88">${planDose>0?planDose:'–'}</span>
        <input class="nt-inp" style="border-color:${prod.color}44" type="number" step="0.1" value="${loggedDose}" placeholder="${planDose||'0'}" onchange="uDose('${c.id}','${prod.id}',this.value)"/>
      </div>`;
    }).join('');

    const nutSection=a==='giess'?`
      <div class="nut-tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none">
        <span style="font-size:12px;font-weight:600;color:#fff">Nährstoffe</span>
        <button onclick="openDuenger()" style="background:none;border:none;color:${cl.hex};font-size:11px;cursor:pointer;padding:0">Plan ✏</button>
      </div>
      <div class="nut-tbl-wrap" style="border-color:${cl.hex}33;background:var(--surface)">
        <div class="nut-tbl-head" style="background:${cl.dk}">
          <span class="nth" style="color:${cl.hex}">Produkt</span>
          <span class="nth" style="text-align:right;color:${cl.hex}88">Plan</span>
          <span class="nth" style="text-align:right;color:${cl.hex}">Gegeben</span>
        </div>
        ${prodRows||`<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Keine Dünger konfiguriert. <span style="color:var(--blue);cursor:pointer" onclick="openDuenger()">Einrichten →</span></div>`}
      </div>`:'';

    const al=getAlerts(c)[0];
    const hint=al?`<div style="background:${cl.dk};border:0.5px solid ${cl.hex}33;border-radius:9px;padding:8px 11px;display:flex;gap:7px;align-items:flex-start;margin-top:4px"><span style="font-size:14px">${al.icon}</span><div style="font-size:12px;color:${cl.hex}cc;line-height:1.5"><b style="color:${cl.hex}">Hinweis:</b> ${al.text}</div></div>`:
    z?`<div style="background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:9px;padding:8px 11px;font-size:12px;color:#7ab88a;margin-top:4px">💡 ${z.hint}</div>`:'';

    // Photo section
    const photos=cd.photos||[];
    const photoHTML=`<div class="photo-grid">
      ${photos.map((ph,i)=>`<img class="photo-thumb" src="${ph}" onclick="viewPhoto('${ph.replace(/'/g,"\\'")}')"/>`).join('')}
      <div class="photo-add" onclick="addPhoto('${c.id}')">📷</div>
    </div>`;

    return`
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;margin-bottom:4px">
        <span style="font-size:20px">${s}</span>
        <div><div style="font-size:13px;font-weight:600;color:${cl.hex}">${c.name}${c.location?' · '+c.location:''}</div>
        <div style="font-size:11px;color:var(--text-muted)">${phLabel}${p?.week?' Wo.'+p.week:''} · Tag ${p?.day||'–'}</div></div>
      </div>
      ${giessCard}
      ${nutSection}
      <div class="row2" style="margin-top:4px">
        <div class="inp-wrap"><div class="inp-label">Wasser gesamt (ml)</div>
          <input class="inp-field" type="number" value="${cd.water||''}" placeholder="z. B. 3500"
            onchange="uEF('${c.id}','water',this.value)" style="border-color:${cl.hex}44"/></div>
        <div style="width:78px;flex-shrink:0"><div class="inp-label">pH-Wert</div>
          <input class="inp-field" type="number" step="0.1" value="${cd.ph||''}" placeholder="6.2"
            onchange="uEF('${c.id}','ph',this.value)"/></div>
      </div>
      <div class="note-wrap" style="border-color:${cl.hex}33;margin-top:4px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
          <div class="inp-label">Notizen</div>
          <button onclick="askAINote('${c.id}')" style="background:none;border:none;color:var(--teal);font-size:11px;cursor:pointer;padding:0;font-family:var(--font)">✦ KI-Hilfe</button>
        </div>
        <textarea class="note-ta" id="note-${c.id}" placeholder="z. B. Blätter leicht gelb, Licht angepasst..."
          onchange="uEF('${c.id}','notes',this.value)">${cd.notes||''}</textarea>
      </div>
      <div style="margin-top:4px"><div class="inp-label" style="margin-bottom:4px">Fotos</div>${photoHTML}</div>
      ${hint}`;
  }).join('');

  const noActive=act.length===0?`<div class="empty-state"><div style="font-size:40px;opacity:0.3">🌱</div><div style="font-size:13px;color:var(--text-muted)">Keine aktiven Zyklen.</div><button style="background:var(--green-bg);border:0.5px solid var(--green-dk);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--green);cursor:pointer;font-family:var(--font)" onclick="goTo('set')">Zyklus erstellen</button></div>`:'';

  document.getElementById('entry-body').innerHTML=`
    <div class="sect-head">Umgebung</div>
    <div class="row2">
      <div class="inp-wrap"><div class="inp-label">Temperatur (°C)</div><input class="inp-field" type="number" value="${temp}" placeholder="z. B. 23" id="et" oninput="uEnv()"/></div>
      <div class="inp-wrap"><div class="inp-label">Luftfeuchtigkeit (%)</div><input class="inp-field" type="number" value="${rh}" placeholder="z. B. 48" id="er" oninput="uEnv()"/></div>
    </div>
    <div id="vpd-c">${vpdBox}</div>
    ${noActive}${blocks}
    <button class="big-save" style="background:${act.length>0?col(act[0]).hex:'var(--green-dk)'}" onclick="saveEntry()">💾 Speichern</button>
    <div style="height:20px"></div>`;
}

function uEnv(){
  const t=parseFloat(document.getElementById('et')?.value),r=parseFloat(document.getElementById('er')?.value);
  const v=calcVPD(t,r),z=vpdZone(v);
  if(v!==null&&z){
    const vv=document.getElementById('vpd-v'),vp=document.getElementById('vpd-p'),vm=document.getElementById('vpd-m');
    if(vv)vv.textContent=v.toFixed(2);
    if(vp){vp.textContent=z.label;vp.style.background=z.bg;vp.style.color=z.color;}
    if(vm)vm.style.left=Math.min(95,z.pct)+'%';
  }
}

function ensE(cId){
  if(!S.entries[editISO])S.entries[editISO]={temp:'',humidity:'',cycleData:{}};
  if(!S.entries[editISO].cycleData)S.entries[editISO].cycleData={};
  if(!S.entries[editISO].cycleData[cId])S.entries[editISO].cycleData[cId]={doses:{},water:'',ph:'',notes:'',photos:[]};
  if(!S.entries[editISO].cycleData[cId].doses)S.entries[editISO].cycleData[cId].doses={};
  if(!S.entries[editISO].cycleData[cId].photos)S.entries[editISO].cycleData[cId].photos=[];
}
function uDose(cId,prodId,val){ensE(cId);S.entries[editISO].cycleData[cId].doses[prodId]=parseFloat(val)||0;}
function uEF(cId,f,v){ensE(cId);S.entries[editISO].cycleData[cId][f]=v;}
function saveEntry(){
  if(!editISO)return;
  if(S.cycles.length>0)ensE(S.cycles[0].id);
  S.entries[editISO].temp=document.getElementById('et')?.value||'';
  S.entries[editISO].humidity=document.getElementById('er')?.value||'';
  saveS();toast('Gespeichert ✓');setTimeout(()=>goTo(entryFrom),400);
}

// PHOTO
function addPhoto(cId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>3*1024*1024){toast('Max 3 MB pro Foto');return;}
    const r=new FileReader();
    r.onload=ev=>{
      ensE(cId);
      S.entries[editISO].cycleData[cId].photos.push(ev.target.result);
      saveS();renderEntry(editISO);toast('Foto hinzugefügt 📸');
    };
    r.readAsDataURL(f);
  };
  inp.click();
}
function viewPhoto(src){
  const v=document.getElementById('photo-viewer');
  document.getElementById('photo-view-img').src=src;
  v.style.display='flex';
}

// ASK AI about current note
function askAINote(cId){
  const note=document.getElementById('note-'+cId)?.value||'';
  const c=S.cycles.find(x=>x.id===cId);
  if(!c)return;
  
  goTo('ai');
  setTimeout(()=>{
    const p=phase(editISO,c);
    let question='';
    if(note.trim()){
      question=`Zu meiner Notiz bei ${c.name} (${p?PN[p.ph]:''} Tag ${p?.day||'?'}): "${note}" – Was denkst du dazu? Gibt es Tipps?`;
    }else{
      question=`Was sollte ich bei ${c.name} (${p?PN[p.ph]:''} Tag ${p?.day||'?'}) heute beachten und in die Notizen schreiben?`;
    }
    document.getElementById('ai-inp').value=question;
    sendAI();
  },300);
}

// INIT
// ============================================================
loadS();calDate=new Date();
goTo('dash');
history.pushState(null,'',location.href);

// Swipe calendar
(function(){
  const scr=document.getElementById('scr-cal');
  let sx=0,sy=0,st=0;
  scr.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  scr.addEventListener('touchend',e=>{
    if(Date.now()-st>500)return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8)changeMonth(dx<0?1:-1);
  },{passive:true});
})();
</script>
