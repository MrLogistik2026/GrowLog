/**
 * Returns a concrete "what to do today" instruction card for a cycle.
 * Used on the dashboard to show beginners exactly what action to take today,
 * with water amount, pH target, fertilizer status, and a short rationale.
 * Returns null if nothing actionable today.
 */
function getTodayAction(c, p, a, iso) {
  if (!p) return null;
  const cl = col(c);
  const pot = S.potSize || 11;
  const waterMl = waterSuggestion(c, p);
  const iv = getInt(c, p.ph);

  // Determine fertilizer week same as entry screen
  let fertWk = 1;
  if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
  else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
  else {
    const td = c.startDate ? isoDiff(iso, c.startDate) : 0;
    fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10));
  }
  const doses = getWeekDoses(c.id, fertWk, c);
  const activeDoses = Object.entries(doses).filter(([, v]) => v > 0);

  if (a === 'giess_anz') {
    return {
      title: '🌱 Heute: Anzucht gießen',
      icon: '💧',
      color: cl.hex,
      steps: [
        `Ca. <b>${waterMl} ml</b> lauwarmes Wasser (pH 6.4)`,
        p.day <= 5 ? 'Ring um den Sämling, nicht direkt drauf' : 'Radius allmählich vergrößern',
        activeDoses.length > 0 ? `Dünger (${fertWk >= 2 ? '½ Dosis' : 'noch keiner nötig'}): ${activeDoses.length} Produkte` : 'Noch kein Dünger',
      ],
      hint: 'Erde leicht feucht, nicht nass. Obere 1-2cm dürfen antrocknen.',
    };
  }
  if (a === 'giess') {
    return {
      title: '💧 Heute: Gießtag',
      icon: '💧',
      color: cl.hex,
      steps: [
        `Ca. <b>${waterMl} ml</b> Wasser bis ~10% Drain`,
        `pH auf <b>6.4</b> einstellen · EC im Ziel 0.8–2.0`,
        activeDoses.length > 0
          ? `Nährstoffe Wo. ${fertWk}: ${activeDoses.length} Produkte (siehe Eintrag)`
          : 'Kein Plan für diese Woche',
      ],
      hint: p.day >= 25 ? '5–10% Drain erzeugen, Drain sofort entsorgen' : 'Noch kein Drain nötig (Topf nicht vollgesättigt)',
    };
  }
  if (a === 'spuelen') {
    return {
      title: '🚿 Heute: Spültag',
      icon: '🚿',
      color: cl.hex,
      steps: [
        `Ca. <b>${waterMl} ml</b> reines Wasser · pH 6.4`,
        '<b>KEIN Dünger</b> — nur klares Wasser!',
        'Bis viel Drain unten durchläuft (durchspülen)',
      ],
      hint: 'Pflanze baut Nährstoffreste ab → sauberer Geschmack',
    };
  }
  if (a === 'ice') {
    return {
      title: '🧊 Heute: IceFlush',
      icon: '🧊',
      color: cl.hex,
      steps: [
        `Eiskaltes Wasser (<10°C), ca. <b>${waterMl} ml</b>`,
        'Kältestress fördert Trichom-Produktion',
        'Nur in den letzten Tagen vor Ernte',
      ],
      hint: 'Eiswürfel direkt auf die Erde legen geht auch',
    };
  }
  if (a === 'ernte') {
    return {
      title: '✂️ Heute: Ernte!',
      icon: '✂️',
      color: cl.hex,
      steps: [
        'Trichome final checken (90% milchig + max 10% bernstein)',
        'Früh am Morgen ernten (maximaler Terpengehalt)',
        'Dunkel hängen lassen: 18–21°C, 55–65% RLF',
      ],
      hint: '7–14 Tage Trocknung, dann Curing in Gläsern',
    };
  }
  if (a === 'trocknen') {
    return {
      title: '🍂 Trocknung läuft',
      icon: '🍂',
      color: cl.hex,
      steps: [
        'Täglich prüfen: Geruch, Feuchtigkeit',
        'Stiele sollten bald knacken beim Biegen',
        '18–21°C, 55–65% RLF halten',
      ],
      hint: 'Zu schnell trocken = Heu-Geschmack. Geduld!',
    };
  }
  return null;
}

function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('cal-lbl').textContent = `${MN[m]} ${y}`;
  const act = active(), arch = archived(), today = todayISO();
  const fd = new Date(y, m, 1).getDay(), dim = new Date(y, m + 1, 0).getDate();
  const off = fd === 0 ? 6 : fd - 1;

  let cells = '';
  for (let i = 0; i < off; i++) cells += '<div></div>';

  for (let d = 1; d <= dim; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = iso === today;
    const hasEntry = !!S.entries[iso];
    const dayInfo = act.map(c => ({ c, a: getAction(iso, c), p: phase(iso, c) })).filter(x => x.p);
    const actionDay = dayInfo.find(x => x.a);
    const phaseDay = dayInfo[0];
    const isStart = act.some(c => c.startDate === iso);
    // Archived cycle phase info (faded)
    const archInfo = !phaseDay ? arch.map(c => ({ c, p: phase(iso, c) })).filter(x => x.p)[0] : null;
    // Check if this is a topping rest day or skipped day
    const isToppingRest = act.some(c => c.toppingDate && isoDiff(iso, c.toppingDate) >= 1 && isoDiff(iso, c.toppingDate) <= (c.toppingPause || 3));
    const isToppingDay = act.some(c => c.toppingDate === iso);
    const isSkipped = act.some(c => c.skippedDays && c.skippedDays.includes(iso));

    // Action-type color mapping (v0.8.91): highlight key events beyond just emoji
    // Gießen stays in cycle-color. Ernte = gold. Spülen = light-blue. Ice = teal. Trocknen = amber.
    const ACT_COLORS = {
      ernte:    { bg: '#2a1f08', border: '#f0c050aa' },  // gold/amber — high-value event
      spuelen:  { bg: '#082028', border: '#5ab0d888' },  // light blue — water-related
      ice:      { bg: '#0a2428', border: '#6fdce088' },  // teal — cold
      trocknen: { bg: '#1f1408', border: '#c88a4888' },  // warm brown — drying

    let bg = '#151515', border = 'transparent';
    if (isStart) { bg = '#1e1a04'; border = '#f0d050aa'; }
    else if (actionDay && ACT_COLORS[actionDay.a]) {
      // Use special color for key actions (ernte, spuelen, ice, trocknen)
      bg = ACT_COLORS[actionDay.a].bg;
      border = ACT_COLORS[actionDay.a].border;
    }
    else if (actionDay) { const cl = col(actionDay.c); bg = cl.dk; border = cl.hex + '77'; }
    else if (isToppingRest) { bg = '#150820'; border = 'rgba(176,106,200,0.3)'; }
    else if (isSkipped) { bg = '#1a1010'; border = 'rgba(224,96,96,0.15)'; }

    let icon = '';
    if (isStart) icon = START_ICON;
    else if (isToppingDay) icon = '✂️';
    else if (isToppingRest) icon = '😴';
    else if (isSkipped) icon = '🚫';
    else if (actionDay) icon = calActionIcon(actionDay.a);

    const tagCol = actionDay ? col(actionDay.c).hex : (phaseDay ? col(phaseDay.c).hex : 'rgba(255,255,255,0.35)');

    cells += `<div class="cal-cell ${isToday ? 'today' : ''}" style="background:${bg};border-color:${border}"
      onclick="calClick('${iso}')" oncontextmenu="return false" ontouchstart="lpS('${iso}',event)" ontouchend="lpE()" ontouchmove="lpE()">
      ${icon ? `<span class="cal-icon">${icon}</span>` : ''}
      <span class="cal-num" ${isStart ? 'style="color:#f0d050;font-weight:800"' : ''}>${d}</span>
      ${phaseDay ? `<span class="cal-tag" style="color:${tagCol}">T${phaseDay.p.day}</span>` : 
        archInfo ? `<span class="cal-tag" style="color:${col(archInfo.c).hex}44;font-size:8px">T${archInfo.p.day}</span>` : ''}
      ${hasEntry ? `<div class="cal-dot"></div>` : ''}

  }

  const cycLeg = act.map(c =>
    `<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text-muted)">
      <span style="width:8px;height:8px;border-radius:50%;background:${col(c).hex};display:inline-block"></span>
      ${sym(c)} ${c.name}

  ).join(' ');

  document.getElementById('cal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px">

    </div>

    <div style="padding:4px 0 2px;display:flex;flex-wrap:wrap;gap:4px 10px;font-size:10px;color:var(--text-hint)">
      <span style="color:#f0d050">☘️ Start</span>
      <span>🌱 Anzucht</span>
      <span>💧 Gießen</span>

function changeMonth(d) { calDate = new Date(calDate.getFullYear(), calDate.getMonth() + d, 1); renderCal(); }

// =====================================================================
//  LONG PRESS + CONTEXT MENU (offsetHistory-based shifting)
// =====================================================================
let lpT = null;
let lpDone = false; // flag to prevent click after long-press
let lpX = 0, lpY = 0; // stored touch coords

function lpS(iso, e) {
  lpDone = false;
  // Store coordinates immediately before event gets recycled
  const touch = e.touches?.[0];
  if (touch) { lpX = touch.clientX; lpY = touch.clientY; }
  lpT = setTimeout(() => {
    lpT = null;
    lpDone = true; // mark that long-press completed
    vibrate(30);
    showCtx(iso);
  }, 450);
}

function lpE() { if (lpT) { clearTimeout(lpT); lpT = null; } }

function calClick(iso) {
  // Don't open entry if we just did a long-press
  if (lpDone) { lpDone = false; return; }
  entryFrom = 'cal';
  openEntry(iso);
}

function showCtx(iso) {
  const act = active(), df = fmtDE(iso), today = todayISO();
  let items = [];
  const isFuture = iso >= today;

  act.forEach(c => {
    const p = phase(iso, c);
    if (!p) return;
    const s = sym(c), a = getAction(iso, c);
    const lockReason = isToppingLocked(c, iso);

    if (isFuture && a && !lockReason) {
      // Gießtag in der Zukunft/heute → verschieben möglich
      items.push(`<div class="ctx-item ctx-b" onclick="doShift('${c.id}', -1, '${iso}')">
        <span class="ctx-ic">←</span>${s} ${ACT_ICON[a] || ''} Vorziehen
      </div>`);
      items.push(`<div class="ctx-item" style="color:var(--orange)" onclick="doShift('${c.id}', 1, '${iso}')">
        <span class="ctx-ic">→</span>${s} ${ACT_ICON[a] || ''} Auf morgen verschieben
      </div>`);
      items.push(`<div class="ctx-item ctx-r" onclick="skipDayFromCal('${c.id}','${iso}')">
        <span class="ctx-ic">🚫</span>${s} Gießtag entfernen
      </div>`);
    } else if (isFuture && a && lockReason) {
      // Gießtag liegt im Topping-Fenster — gesperrt, Hinweis zeigen
      items.push(`<div class="ctx-item" style="opacity:0.7;cursor:default;background:rgba(240,208,80,0.06);border-color:rgba(240,208,80,0.2)">
        <span class="ctx-ic">🔒</span><div style="font-size:11px;line-height:1.4">${s} Verschieben gesperrt<br><span style="font-size:10px;color:var(--text-muted)">${lockReason}</span></div>
      </div>`);
    }

    // Show restore option if this day was skipped
    if (c.skippedDays && c.skippedDays.includes(iso)) {
      items.push(`<div class="ctx-item ctx-g" onclick="restoreDayFromCal('${c.id}','${iso}')">
        <span class="ctx-ic">↩</span>${s} Gießtag wiederherstellen
      </div>`);
    }
  });

  if (items.length) items.push('<div class="ctx-div"></div>');

  // Start inactive cycles on this date
  S.cycles.filter(c => !c.active).forEach(c =>
    items.push(`<div class="ctx-item ctx-g" onclick="startOn('${c.id}','${iso}')">
      <span class="ctx-ic">▶</span>${sym(c)} ${c.name} starten
    </div>`)
  );

  // End active cycles
  act.forEach(c =>
    items.push(`<div class="ctx-item ctx-r" onclick="stopC('${c.id}')">
      <span class="ctx-ic">■</span>${sym(c)} ${c.name} beenden
    </div>`)
  );

  if (items.length) items.push('<div class="ctx-div"></div>');
  items.push(`<div class="ctx-item" onclick="calClick('${iso}');closeCtx()"><span class="ctx-ic">✏</span>Eintrag öffnen</div>`);

  const menu = document.getElementById('ctx-m');
  const dayInfo = act.map(c => { const p = phase(iso, c); const cl2 = col(c); return p ? `<span style="color:${cl2.hex}">${sym(c)} T${p.day}</span>` : ''; }).filter(Boolean).join(' ');
  const actionInfo = act.map(c => { const a2 = getAction(iso, c); return a2 ? ACT_ICON[a2] : ''; }).filter(Boolean).join(' ');
  menu.innerHTML = `<div style="padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:600;color:var(--text)">${df}</span>
    <span style="font-size:12px">${dayInfo} ${actionInfo}</span>
  </div>` + items.join('');

  const x = lpX ? Math.min(Math.max(8, lpX), window.innerWidth - 280) : window.innerWidth / 2 - 140;
  const y = lpY ? Math.min(lpY - 20, window.innerHeight - items.length * 48 - 40) : window.innerHeight / 2;
  menu.style.left = x + 'px';
  menu.style.top = Math.max(8, y) + 'px';
  menu.classList.add('show');
  document.getElementById('ctx-ov').classList.add('show');
}

function closeCtx() {
  document.getElementById('ctx-m').classList.remove('show');
  document.getElementById('ctx-ov').classList.remove('show');
}

/**
 * Checks if a watering day is "locked" from shifting because of a planned topping.
 * Returns a string with the reason if locked, null otherwise.
 *
 * The rule: A watering 2–4h before topping is critical for clean healing. Once set,
 * do not move it. Also: the days immediately around the topping date are off-limits
 * for rhythm changes because the whole topping-sequence is pre-planned.
 *
 * Locked windows:
 *   - The topping date itself (already a rest-day, but block explicitly)
 *   - The day BEFORE topping (that's the "Gieß vor Topping"-day)
 *   - Any day within the topping rest period (toppingDate + 1 … toppingDate + pause)
 */
function isToppingLocked(c, iso) {
  if (!c || !c.toppingDate) return null;
  const diff = isoDiff(iso, c.toppingDate);
  const pause = c.toppingPause || 3;
  if (diff === 0) return 'Topping-Tag — nicht verschieben.';
  if (diff === -1) return 'Gieß-Tag vor dem Topping — muss 2–4h vor dem Schnitt liegen (Turgordruck).';
  if (diff >= 1 && diff <= pause) return 'Ruhetag nach Topping — Rhythmus läuft nach der Pause weiter.';
  return null;
}

/**
 * Shift watering grid for a cycle.
 * +1 = Auf morgen verschieben (Topf noch nass)
 * -1 = Vorziehen (Topf schon trocken)
 *
 * actionISO = das Datum des Gießtags, der verschoben wird.
 * Jeder Shift erzeugt einen neuen Eintrag in offsetHistory.
 * Die Grenze (date) ist der Tag, AB dem der neue Offset gilt.
 */
function doShift(cId, days, actionISO) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const today = todayISO();

  // actionISO kommt direkt vom Kontextmenü = der angeklickte Gießtag
  // Falls nicht übergeben (Fallback): nächsten Gießtag ab heute suchen
  const actionDay = actionISO || findNextActionDay(c, today);
  if (!actionDay) { toast('⚠ Kein Gießtag gefunden'); return; }

  // Guard: Lock around topping (Turgordruck, Stress, Nährstoffe)
  const lockReason = isToppingLocked(c, actionDay);
  if (lockReason) { toast('🚫 ' + lockReason); return; }

  // Block: Vorziehen nur wenn Aktionstag NACH heute liegt
  if (days < 0 && actionDay <= today) {
    toast('⚠ Kann nicht weiter vorziehen');
    return;
  }

  // Grenze: Bei Vorziehen 1 Tag VOR dem Aktionstag,
  // damit das vorgezogene Icon im neuen Offset-Bereich landet.
  // Bei Verschieben: der Aktionstag selbst (dort verschwindet das Icon,
  // und am Folgetag erscheint es im neuen Raster).
  const boundary = days < 0 ? isoPlus(actionDay, -1) : actionDay;

  if (!c.offsetHistory) c.offsetHistory = [];
  c.offsetHistory.push({ date: boundary, offset: days });

  saveS();
  renderCal();
  vibrate();
  toast(days > 0 ? '→ Auf morgen verschoben' : '← Vorgezogen');
}

/** Same as doShift but re-renders the entry screen */
function doShiftFromEntry(cId, days) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const today = todayISO();

  const actionDay = findNextActionDay(c, today);
  if (!actionDay) { toast('⚠ Kein Gießtag gefunden'); return; }

  // Guard: Lock around topping
  const lockReason = isToppingLocked(c, actionDay);
  if (lockReason) { toast('🚫 ' + lockReason); return; }

  if (days < 0 && actionDay <= today) {
    toast('⚠ Kann nicht weiter vorziehen');
    return;
  }

  const boundary = days < 0 ? isoPlus(actionDay, -1) : actionDay;

  if (!c.offsetHistory) c.offsetHistory = [];
  c.offsetHistory.push({ date: boundary, offset: days });

  saveS();
  vibrate();
  toast(days > 0 ? '→ Auf morgen verschoben' : '← Vorgezogen');
  if (editISO) renderEntry(editISO);
}

/** Find the next action day from a given date (inclusive) */
function findNextActionDay(c, from) {
  for (let i = 0; i <= 30; i++) {
    const iso = isoPlus(from, i);
    if (getAction(iso, c)) return iso;
  }
  return null;
}

/** Skip a day from calendar context menu */
function skipDayFromCal(cId, iso) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  if (!c.skippedDays) c.skippedDays = [];
  if (!c.skippedDays.includes(iso)) c.skippedDays.push(iso);
  saveS();
  vibrate();
  renderCal();
  toast('🚫 Gießtag entfernt');
}

/** Restore a skipped day from calendar context menu */
function restoreDayFromCal(cId, iso) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.skippedDays) return;
  c.skippedDays = c.skippedDays.filter(d => d !== iso);
  saveS();
  vibrate();
  renderCal();
  toast('↩ Wiederhergestellt');
}

/**
 * Topping: Gießen + Toppen am aktuellen Tag.
 * Danach 3 Tage Ruhe. Der Offset wird so berechnet,
 * dass der erste Guss exakt am Tag nach der Ruhe landet.
 */
async function doTopping(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const pause = c.toppingPause || 3;
  const ok = await customConfirm(
    '✂️ Jetzt Toppen?',
    `Heute gießen + toppen. Danach ${pause} Tage Ruhe. Erster Guss am ${fmtDE(isoPlus(iso, pause + 1), {day:'2-digit', month:'2-digit'})}.`,
    'Toppen', 'var(--purple)'
  );
  if (!ok) return;
  c.toppingDate = iso;

  // Berechne den Offset so, dass der erste Guss nach der Pause
  // exakt auf toppingDate + pause + 1 fällt
  const resumeDay = isoPlus(iso, pause + 1);
  const neededOffset = calcToppingOffset(c, iso, pause);

  if (neededOffset !== 0) {
    const boundary = isoPlus(iso, 1);
    if (!c.offsetHistory) c.offsetHistory = [];
    c.offsetHistory.push({ date: boundary, offset: neededOffset });
    // Remember which offset entry was added by topping (for undo)
    c._toppingOffsetBoundary = boundary;
    c._toppingOffsetValue = neededOffset;
  } else {
    c._toppingOffsetBoundary = null;
    c._toppingOffsetValue = 0;
  }
  saveS();
  vibrate();
  toast(`✂️ Getoppt! Nächster Guss: ${fmtDE(resumeDay, {day:'2-digit', month:'2-digit'})}`);
  if (editISO) renderEntry(editISO);
}

/** Undo topping: clear toppingDate and remove the associated offset */
async function undoTopping(cId) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.toppingDate) return;
  const ok = await customConfirm(
    '↩ Topping rückgängig machen?',
    `Das Topping vom ${fmtDE(c.toppingDate, {day:'2-digit', month:'2-digit', year:'numeric'})} wird entfernt. Die Ruhetage und der Offset werden zurückgesetzt, der Gießrhythmus läuft wie zuvor weiter.`,
    'Rückgängig', 'var(--red)'
  );
  if (!ok) return;

  // Remove the offset entry that was added by topping
  if (c._toppingOffsetBoundary && c._toppingOffsetValue && c.offsetHistory) {
    const b = c._toppingOffsetBoundary;
    const v = c._toppingOffsetValue;
    // Find and remove the matching entry (first match with same date+offset)
    const idx = c.offsetHistory.findIndex(e => e.date === b && e.offset === v);
    if (idx !== -1) c.offsetHistory.splice(idx, 1);
  }
  c.toppingDate = null;
  c._toppingOffsetBoundary = null;
  c._toppingOffsetValue = 0;

  saveS();
  vibrate();
  toast('↩ Topping zurückgesetzt');
  if (editISO) renderEntry(editISO);
  renderCal();
}

/**
 * Berechnet den minimalen Offset damit der Gießtag auf den Resume-Tag fällt.
 * Probiert Offsets 0 bis interval-1 durch.
 * Benutzt den kumulativen Offset aus offsetHistory für den Resume-Tag.
 */
function calcToppingOffset(c, toppingISO, pause) {
  const resumeDay = isoPlus(toppingISO, pause + 1);

  // Kumulativen Offset für den Resume-Tag berechnen (ohne den neuen Topping-Offset)
  let currentOffset = 0;
  for (const entry of c.offsetHistory || []) {
    if (resumeDay >= entry.date) currentOffset += entry.offset;
  }

  const diffFromStart = isoDiff(resumeDay, c.startDate);
  const a = c.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const iv = diffFromStart < a ? (c.intAnzucht || 3) : (c.intBloom || 3);

  for (let testOff = 0; testOff < iv; testOff++) {
    const totalOff = currentOffset + testOff;
    const vs = isoPlus(c.startDate, totalOff);
    const diff = isoDiff(resumeDay, vs);
    if (diff < 0) continue;
    const ps = diff < a ? 0 : a;
    const dip = diff - ps;
    if (dip >= 0 && dip % iv === 0) return testOff;
  }
  return 1; // fallback
}

/**
 * Einzelnen Gießtag entfernen (stumm schalten).
 * Das Raster bleibt komplett intakt – nur dieser eine Tag wird übersprungen.
 */
async function skipDay(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const ok = await customConfirm(
    'Gießtag entfernen?',
    `Dieser Gießtag wird übersprungen. Das Raster bleibt unverändert – alle anderen Gießtage bleiben wo sie sind.`,
    'Entfernen', 'var(--red)'
  );
  if (!ok) return;
  if (!c.skippedDays) c.skippedDays = [];
  if (!c.skippedDays.includes(iso)) c.skippedDays.push(iso);
  saveS();
  vibrate();
  toast('🚫 Gießtag entfernt');
  if (editISO) renderEntry(editISO);
}

/**
 * Outdoor: User markiert den Tag als "Regen hat gegossen" — Gieß-Plan bleibt
 * unverändert, nur dieser eine Tag gilt als erledigt ohne eigenes Gießen.
 * Technisch identisch zu skipDay (beide nutzen skippedDays), aber mit
 * positivem Framing: kein Confirm-Dialog, anderer Toast.
 */
function rainSkip(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  if (!c.skippedDays) c.skippedDays = [];
  if (!c.skippedDays.includes(iso)) c.skippedDays.push(iso);
  saveS();
  vibrate(8);
  toast('☔ Regen-Tag markiert — Plan läuft weiter');
  if (editISO) renderEntry(editISO);
}

/** Entfernten Gießtag wiederherstellen */
function restoreDay(cId, iso) {
  const c = S.cycles.find(x => x.id === cId);
  if (!c || !c.skippedDays) return;
  c.skippedDays = c.skippedDays.filter(d => d !== iso);
  saveS();
  vibrate();
  toast('↩ Wiederhergestellt');
  if (editISO) renderEntry(editISO);
}

function startOn(cId, iso) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  c.active = true;
  c.startDate = iso;
  saveS();
  renderCal();
  toast(`${sym(c)} gestartet!`);
  setTimeout(() => { selId = cId; draft = {}; goTo('set'); }, 800);
}

async function stopC(cId) {
  closeCtx();
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const ok = await customConfirm(
    `"${c.name}" beenden?`,
    'Der Zyklus wird deaktiviert. Startdatum und Einträge bleiben erhalten — tippe "Archivieren" in den Einstellungen falls du die Phasen im Kalender noch sehen willst.',
    'Beenden', 'var(--red)'
  );
  if (!ok) return;
  // Only deactivate — keep startDate, offsetHistory, toppingDate, skippedDays
  // so past entries remain readable and phase/action renders correctly.
  c.active = false;
  saveS();
  renderCal();
  toast(`${sym(c)} beendet`);
}

/**
 * Meta-search handler for Tips tab.
 * Searches across _tipsSnapshot (current tips) + LEXIKON + HOWTO in one go.
 * DOM-stable: only updates #tips-search-results, keeps search input intact
 * so mobile keyboard stays open.
 */
function _onTipsSearchInput(q) {
  const query = (q || '').trim();
  const normQuery = _normSearch(query);
  const resultsEl = document.getElementById('tips-search-results');
  const normalEl = document.getElementById('tips-normal');
  const clearBtn = document.getElementById('tips-search-clear');
  if (!resultsEl || !normalEl) return;

  // Toggle visibility
  normalEl.style.display = query ? 'none' : 'block';
  resultsEl.style.display = query ? 'block' : 'none';
  if (clearBtn) clearBtn.style.display = query ? 'flex' : 'none';

  if (!query) {
    resultsEl.innerHTML = '';
    return;
  }

  // --- Collect matches from three sources ---

  // 1. Tips (from current snapshot)
  const tipHits = (_tipsSnapshot || []).filter(t => {
    const hay = _normSearch((t.text || '') + ' ' + (t.cat || ''));
    return hay.includes(normQuery);
  });

  // 2. Lexikon entries
  const lexHits = [];
  if (typeof LEXIKON !== 'undefined') {
    LEXIKON.forEach(cat => {
      cat.items.forEach(item => {
        const hay = _normSearch((item.t || '') + ' ' + (item.txt || '') + ' ' + cat.cat);
        if (hay.includes(normQuery)) {
          lexHits.push({ title: item.t, text: item.txt, cat: cat.cat });
        }
      });
    });
  }

  // 3. How-to entries
  const howtoHits = [];
  if (typeof HOWTO !== 'undefined') {
    HOWTO.forEach(cat => {
      cat.items.forEach(item => {
        const hay = _normSearch((item.t || '') + ' ' + (item.txt || '') + ' ' + cat.cat);
        if (hay.includes(normQuery)) {
          howtoHits.push({ title: item.t, text: item.txt, cat: cat.cat });
        }
      });
    });
  }

  const totalHits = tipHits.length + lexHits.length + howtoHits.length;

  // --- Build output HTML ---

  const headerHTML = `
    <div style="padding:12px 14px;background:var(--card);border:0.5px solid var(--green-dk);border-radius:12px;margin-bottom:10px">
      <div style="font-size:12px;color:var(--green);font-weight:600">🔍 ${totalHits} ${totalHits === 1 ? 'Treffer' : 'Treffer'} für „${query.replace(/</g, '&lt;')}"</div>
      ${totalHits === 0 ? '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.5">Nichts gefunden. Probier: <i>pH, calmag, drain, trichome, ernte, trocknen, spülen, schimmel</i></div>' : `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">💡 ${tipHits.length} Tipps · 📖 ${lexHits.length} Lexikon · 🎓 ${howtoHits.length} How-to</div>`}
    </div>`;

  // Tips section
  const tipsSection = tipHits.length > 0 ? `
    <div class="sect-head" style="font-size:12px;padding:10px 0 6px">💡 Tipps</div>
    ${tipHits.map(t => `
      <div class="tip-card" ${t.lex ? `onclick="openLexikonEntry('${t.lex}')" style="cursor:pointer"` : ''}>
        <span style="font-size:18px;flex-shrink:0">${t.icon}</span>
        <div style="flex:1;font-size:12px;color:var(--green);line-height:1.6">${_highlightMatches(t.text, query)}</div>
        ${t.lex ? '<span style="font-size:10px;color:var(--text-hint)">📖›</span>' : ''}
      </div>
    `).join('')}` : '';

  // Lexikon section
  const lexSection = lexHits.length > 0 ? `
    <div class="sect-head" style="font-size:12px;padding:10px 0 6px">📖 Lexikon</div>
    ${lexHits.map(h => `
      <div onclick="openLexikonEntry('${h.title.replace(/'/g, "\\'")}')" style="background:var(--card);border:0.5px solid rgba(176,106,200,0.2);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer">
        <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">${h.cat}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">${_highlightMatches(h.title, query)}</div>
        <div style="font-size:11px;color:var(--text-sub);line-height:1.5">${_highlightMatches(_snippet(h.text, query, 140), query)}</div>
      </div>
    `).join('')}` : '';

  // How-to section
  const howtoSection = howtoHits.length > 0 ? `
    <div class="sect-head" style="font-size:12px;padding:10px 0 6px">🎓 How-to</div>
    ${howtoHits.map(h => `
      <div onclick="openHowto();setTimeout(()=>{const s=document.getElementById('howto-search');if(s){s.value='${query.replace(/'/g, "\\'").replace(/"/g, '&quot;')}';_onHowtoSearchInput('${query.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')}},150)" style="background:var(--card);border:0.5px solid rgba(90,171,240,0.2);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer">
        <div style="font-size:10px;color:var(--text-hint);margin-bottom:2px">${h.cat}</div>
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">${_highlightMatches(h.title, query)}</div>
        <div style="font-size:11px;color:var(--text-sub);line-height:1.5">${_highlightMatches(_snippet(h.text, query, 140), query)}</div>
      </div>
    `).join('')}` : '';

  resultsEl.innerHTML = headerHTML + tipsSection + lexSection + howtoSection;
}

/**
 * Extract a snippet of text around the first match of query, stripping HTML.
 * Returns up to maxLen chars centered on the match, with "…" prefixes/suffixes as needed.
 */
function _snippet(html, query, maxLen) {
  const txt = String(html).replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  const normTxt = _normSearch(txt);
  const normQuery = _normSearch(query);
  if (!normQuery) return txt.slice(0, maxLen) + (txt.length > maxLen ? '…' : '');
  const idx = normTxt.indexOf(normQuery);
  if (idx < 0) return txt.slice(0, maxLen) + (txt.length > maxLen ? '…' : '');
  const start = Math.max(0, idx - Math.floor(maxLen / 3));
  const end = Math.min(txt.length, start + maxLen);
  const prefix = start > 0 ? '…' : '';
  const suffix = end < txt.length ? '…' : '';
  return prefix + txt.slice(start, end) + suffix;
}

async function loadPreset(key) {
  const pr = FERT_PRESETS[key];
  if (!pr) return;

  // Check ob schon ein Plan mit diesem Preset existiert
  const existing = (S.fertPlans || []).find(p => p.presetKey === key);

  let confirmTitle, confirmBody, confirmBtn;
  if (existing) {
    // Plan mit diesem Preset existiert → wechsle dahin
    confirmTitle = `Zu "${existing.name}" wechseln?`;
    confirmBody = 'Dieser Plan existiert bereits. Wir wechseln einfach dahin, deine anderen Pläne bleiben unverändert.';
    confirmBtn = 'Wechseln';
  } else {
    // Kein Plan mit diesem Preset → neuen anlegen (alte Pläne bleiben)
    confirmTitle = `"${pr.name}" laden?`;
    confirmBody = 'Ein neuer Düngeplan wird angelegt und aktiviert. Deine bestehenden Pläne bleiben erhalten.';
    confirmBtn = 'Plan anlegen';
  }

  const ok = await customConfirm(confirmTitle, confirmBody, confirmBtn, 'var(--green)');
  if (!ok) return;

  if (existing) {
    // Einfach aktivieren
    syncGlobalsToActivePlan(); // pending edits sichern
    S._activePlanId = existing.id;
    syncActivePlanToGlobals(); // aus dem Plan laden
    saveS();
    renderDuenger();
    toast(`✓ Zu "${existing.name}" gewechselt`);
    return;
  }

  // Neuen Plan mit Preset-Daten anlegen
  if (!S.fertPlans) S.fertPlans = [];

  // Vor dem Anlegen pending edits des aktuellen Plans persistieren
  syncGlobalsToActivePlan();

  const newId = 'fp_' + Date.now();
  const products = pr.products.map((p, i) => ({ id: 'p' + Date.now() + '_' + i, ...p }));
  const schedule = {};
  Object.entries(pr.schedule || {}).forEach(([w, doses]) => {
    const mapped = {};
    Object.entries(doses || {}).forEach(([name, dose]) => {
      const prod = products.find(p => p.name === name);
      if (prod) mapped[prod.id] = dose;
    });
    schedule['w' + w] = mapped;
  });

  S.fertPlans.push({
    id: newId,
    name: pr.name,
    products,
    schedule,
    mixOrder: pr.mixOrder ? [...pr.mixOrder] : [],
    mixInfo: pr.mixInfo || '',
    drainInfo: pr.drainInfo || null,
    presetKey: key,
    createdAt: Date.now(),
  });

  S._activePlanId = newId;
  syncActivePlanToGlobals(); // globals aus dem neuen Plan laden
  saveS();
  renderDuenger();
  toast(`✓ "${pr.name}" angelegt`);
}

/**
 * Start a blank custom plan — for Profis with their own fertilizer system.
 * Clears products, schedule, preset key, mix order and mix info so the user
 * starts from a clean slate and builds up.
 */
async function startCustomPlan() {
  const prodCount = (S.products || []).length;
  const hasPreset = !!S.presetKey;
  const hasCustomPlan = !hasPreset && prodCount > 0;

  if (hasCustomPlan) {
    // User already has their own plan — extra-careful warning
    const ok = await customConfirm(
      '⚠ Eigenen Plan zurücksetzen?',
      `Du hast aktuell einen eigenen Plan mit ${prodCount} Produkt${prodCount === 1 ? '' : 'en'}.\n\nAlle Produkte, Mischreihenfolge, Mix-Info und der gesamte Wochenplan werden dauerhaft gelöscht.`,
      'Alles löschen', 'var(--red)'
    );
    if (!ok) return;
  } else if (hasPreset) {
    // Preset is loaded — standard warning
    const ok = await customConfirm(
      'Eigenen Plan starten?',
      `Die Vorlage "${FERT_PRESETS[S.presetKey]?.name || S.presetKey}" und alle Anpassungen werden gelöscht. Du startest danach mit leerem Plan.`,
      'Neu starten', 'var(--purple)'
    );
    if (!ok) return;
  }
  // else: nothing to lose — skip confirm entirely
  // Ensure at least one plan exists
  if (!S.fertPlans || S.fertPlans.length === 0) {
    S.fertPlans = [{
      id: 'fp_' + Date.now(), name: 'Mein Plan',
      products: [], schedule: {}, mixOrder: [], mixInfo: '', drainInfo: null, presetKey: null,
      createdAt: Date.now(),
    }];
    S._activePlanId = S.fertPlans[0].id;
  }
  S.products = [];
  S.weekSchedule = {};
  S.presetKey = null;
  S.mixOrder = [];
  S.mixInfo = '';
  S.drainInfo = null;
  saveS();
  renderDuenger();
  toast('✨ Leerer Plan bereit — füge deine Produkte hinzu');
}

/** Prompt user for a plan name. Returns trimmed string or null if cancelled/empty. */
async function _promptPlanName(title, defaultVal) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:modalIn 0.2s ease';
    overlay.innerHTML = `
      <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6)">
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px">${title}</div>
        <input id="_planNameInp" type="text" value="${(defaultVal || '').replace(/"/g, '&quot;')}" placeholder="z.B. BioBizz Outdoor, Hydro Mineral..." style="width:100%;padding:10px;border-radius:8px;background:var(--card2);border:0.5px solid var(--border);color:var(--text);font-size:13px;font-family:var(--font);outline:none;box-sizing:border-box;margin-bottom:14px"/>
        <div style="display:flex;gap:10px">
          <button data-act="cancel" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--card2);color:var(--text-sub);border:0.5px solid var(--border)">Abbrechen</button>
          <button data-act="ok" style="flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--blue);color:#fff">OK</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#_planNameInp');
    setTimeout(() => inp.focus(), 50);
    const done = (val) => { overlay.remove(); resolve(val); };
    overlay.querySelector('[data-act="cancel"]').onclick = () => done(null);
    overlay.querySelector('[data-act="ok"]').onclick = () => {
      const v = (inp.value || '').trim();
      done(v || null);
    };
    inp.onkeydown = (e) => {
      if (e.key === 'Enter') {
        const v = (inp.value || '').trim();
        done(v || null);
      } else if (e.key === 'Escape') {
        done(null);
      }
    };
  });
}

/** Add a new empty plan, make it active, and re-render. */
async function addFertPlan() {
  const name = await _promptPlanName('Neuer Düngeplan', '');
  if (!name) return;
  if (!S.fertPlans) S.fertPlans = [];
  const id = 'fp_' + Date.now();
  S.fertPlans.push({
    id, name,
    products: [],
    schedule: {},
    mixOrder: [],
    mixInfo: '',
    drainInfo: null,
    presetKey: null,
    createdAt: Date.now(),
  });
  S._activePlanId = id;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  toast(`✓ Plan "${name}" angelegt`);
}

/** Switch the active plan in the Dünger screen. */
function switchFertPlan(id) {
  // Persist any pending edits on the current plan first
  syncGlobalsToActivePlan();
  S._activePlanId = id;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  vibrate(8);
}

/** Rename the plan with given id. */
async function renameFertPlan(id) {
  const plan = (S.fertPlans || []).find(p => p.id === id);
  if (!plan) return;
  const newName = await _promptPlanName('Plan umbenennen', plan.name);
  if (!newName || newName === plan.name) return;
  plan.name = newName;
  saveS();
  renderDuenger();
  toast(`✓ Umbenannt in "${newName}"`);
}

/** Duplicate a plan and make the copy active. */
async function duplicateFertPlan(id) {
  const plan = (S.fertPlans || []).find(p => p.id === id);
  if (!plan) return;
  const newName = await _promptPlanName('Plan duplizieren', plan.name + ' (Kopie)');
  if (!newName) return;
  const copy = JSON.parse(JSON.stringify(plan));
  copy.id = 'fp_' + Date.now();
  copy.name = newName;
  copy.createdAt = Date.now();
  delete copy.updatedAt;
  S.fertPlans.push(copy);
  S._activePlanId = copy.id;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  toast(`✓ Dupliziert als "${newName}"`);
}

/** Delete a plan. Fails if any cycle uses it (confirms first). */
async function deleteFertPlan(id) {
  const plan = (S.fertPlans || []).find(p => p.id === id);
  if (!plan) return;
  if ((S.fertPlans || []).length <= 1) {
    toast('⚠ Mindestens ein Plan muss erhalten bleiben');
    return;
  }
  const usedBy = (S.cycles || []).filter(c => c.fertPlanId === id && !c.archived);
  const warn = usedBy.length > 0
    ? `⚠ ${usedBy.length} Zyklus${usedBy.length === 1 ? '' : 'se'} nutzen diesen Plan. Diese werden auf den ersten verbleibenden Plan umgestellt.`
    : 'Dieser Plan wird dauerhaft gelöscht.';
  const ok = await customConfirm(
    `"${plan.name}" löschen?`,
    warn,
    'Löschen', 'var(--red)'
  );
  if (!ok) return;
  // Reassign cycles to another plan
  const fallback = S.fertPlans.find(p => p.id !== id);
  S.cycles.forEach(c => { if (c.fertPlanId === id) c.fertPlanId = fallback ? fallback.id : null; });
  // Remove the plan
  S.fertPlans = S.fertPlans.filter(p => p.id !== id);
  // If it was active, pick another
  if (S._activePlanId === id) S._activePlanId = fallback ? fallback.id : null;
  syncActivePlanToGlobals();
  saveS();
  renderDuenger();
  toast(`✓ "${plan.name}" gelöscht`);
}

function selPC(c) {
  _pColor = c;
  PROD_COLORS.forEach((x, i) => {
    const el = document.getElementById('pc-' + i);
    if (el) el.style.borderColor = x === c ? '#fff' : 'transparent';
  });
}

function setGD(w, pid, v) {
  const k = 'global_w' + w;
  if (!S.weekSchedule[k]) S.weekSchedule[k] = {};
  S.weekSchedule[k][pid] = parseFloat(v) || 0;
}

function addProduct() { editProd = 'new'; _pColor = PROD_COLORS[0]; renderDuenger(); }
function editProduct(id) { editProd = id; const p = S.products.find(x => x.id === id); if (p) _pColor = p.color; renderDuenger(); }

function saveProd() {
  const name = document.getElementById('pn')?.value?.trim();
  if (!name) { toast('Name eingeben'); return; }
  const note = document.getElementById('pnote')?.value?.trim() || '';
  const unit = document.getElementById('punit')?.value || 'ml/L';
  if (editProd === 'new') {
    S.products.push({ id: 'p' + Date.now(), name, note, unit, color: _pColor });
    // Auto-append to mixOrder if one exists (custom plan or preset-derived)
    if (S.mixOrder && !S.mixOrder.includes(name)) {
      S.mixOrder.push(name);
    }
  } else {
    const p = S.products.find(x => x.id === editProd);
    if (p) {
      // Update mixOrder entry if name changed
      if (S.mixOrder && p.name !== name) {
        const idx = S.mixOrder.indexOf(p.name);
        if (idx !== -1) S.mixOrder[idx] = name;
      }
      Object.assign(p, { name, note, unit, color: _pColor });
    }
  }
  editProd = null;
  saveS();
  renderDuenger();
  toast('Gespeichert ✓');
}

async function delProduct(id) {
  const ok = await customConfirm('Produkt löschen?', 'Dieses Dünger-Produkt wird entfernt.', 'Löschen');
  if (!ok) return;
  const p = S.products.find(x => x.id === id);
  S.products = S.products.filter(x => x.id !== id);
  // Keep mixOrder in sync
  if (S.mixOrder && p) {
    S.mixOrder = S.mixOrder.filter(n => n !== p.name);
  }
  saveS();
  renderDuenger();
  toast('Gelöscht');
}

/**
 * Move a product in mixOrder up (-1) or down (+1).
 * Clamps to valid range. Used for custom-plan profi workflow.
 */
function moveMixStep(idx, delta) {
  if (!S.mixOrder || !S.mixOrder.length) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= S.mixOrder.length) return;
  const tmp = S.mixOrder[idx];
  S.mixOrder[idx] = S.mixOrder[newIdx];
  S.mixOrder[newIdx] = tmp;
  saveS();
  renderDuenger();
  vibrate(8);
}

/**
 * Update mixInfo text from the textarea. Called on blur/input.
 */
function updateMixInfo(val) {
  S.mixInfo = val || '';
  saveS();
}

                  const bs = solstice >= minVegi ? solstice : minVegi;
                  const yyyy = bs.getFullYear();
                  const mm = String(bs.getMonth() + 1).padStart(2, '0');
                  const dd2 = String(bs.getDate()).padStart(2, '0');
                  return `${yyyy}-${mm}-${dd2}`;
                })()

function dd(k, v) { draft[k] = isNaN(v) || v === '' ? v : Number(v); }
function ddS(k, v) { draft[k] = v; renderSet(); }

function saveDraft() {
  const c = S.cycles.find(x => x.id === selId);
  if (!c) return;

  // Auto-activate if not yet active and has a startDate in draft
  if (!draft.active && draft.startDate) {
    draft.active = true;
  }
  // If active but no startDate, set today
  if (draft.active && !draft.startDate) {
    draft.startDate = todayISO();
  }

  // If start date changed, migrate entry data
  const old = c.startDate, nw = draft.startDate;
  if (old && nw && old !== nw) {
    const diff = isoDiff(nw, old);
    if (diff) {
      const keys = Object.keys(S.entries).sort((a, b) => diff > 0 ? b.localeCompare(a) : a.localeCompare(b));
      keys.forEach(d => {
        if (!S.entries[d]?.cycleData?.[c.id]) return;
        const nd = isoPlus(d, diff);
        const data = JSON.parse(JSON.stringify(S.entries[d].cycleData[c.id]));
        delete S.entries[d].cycleData[c.id];
        if (!S.entries[nd]) S.entries[nd] = { temp: '', humidity: '', cycleData: {} };
        if (!S.entries[nd].cycleData) S.entries[nd].cycleData = {};
        S.entries[nd].cycleData[c.id] = data;
      });
    }
  }

  Object.assign(c, { ...draft, id: c.id });
  saveS();
  vibrate();
  toast(`${sym(c)} ${c.name} gespeichert ✓`);
  renderSet();
}

function selCyc(id) { selId = id; draft = {}; renderSet(); }

/**
 * Legt einen vollständigen Demo-Zyklus an — damit der User sofort sieht wie die App
 * mit echten Daten aussieht. Der Zyklus ist klar als "Demo" markiert, so dass der
 * User ihn später einfach löschen oder ersetzen kann.
 */
function welcomeStartDemo() {
  S._welcomeSeen = true;

  // Start-Datum: heute minus 25 Tage, damit die Pflanze schon in der Blüte ist
  // und der User Gieß/Dünger-Aktionen direkt sehen kann.
  const demoStart = new Date();
  demoStart.setDate(demoStart.getDate() - 25);
  const demoStartISO = demoStart.toISOString().split('T')[0];

  // Falls noch kein Düngeplan existiert: lege eine einfache BioBizz Light Vorlage an
  // als Demo-Plan. Das erspart dem User die Preset-Frage beim Demo.
  if (!S.fertPlans || S.fertPlans.length === 0) {
    const biolight = FERT_PRESETS?.biobizz_light;
    if (biolight) {
      const demoPlanId = 'fp_demo_' + Date.now();
      const products = biolight.products.map((p, i) => ({ id: 'p' + Date.now() + '_' + i, ...p }));
      const schedule = {};
      Object.entries(biolight.schedule || {}).forEach(([w, doses]) => {
        const mapped = {};
        Object.entries(doses || {}).forEach(([name, dose]) => {
          const prod = products.find(p => p.name === name);
          if (prod) mapped[prod.id] = dose;
        });
        schedule['w' + w] = mapped;
      });
      S.fertPlans = [{
        id: demoPlanId,
        name: biolight.name,
        products, schedule,
        mixOrder: biolight.mixOrder ? [...biolight.mixOrder] : [],
        mixInfo: biolight.mixInfo || '',
        drainInfo: biolight.drainInfo || null,
        presetKey: 'biobizz_light',
        createdAt: Date.now(),
      }];
      S._activePlanId = demoPlanId;
      syncActivePlanToGlobals();
    }
  }

  // Demo-Zyklus anlegen
  addCyc({
    name: 'Demo-Zyklus (zum Erkunden)',
    growType: 'indoor',
    seedType: 'auto',
    startDate: demoStartISO,
    potSize: 11,
    fertPlanId: S.fertPlans?.[0]?.id || null,
  });

  // Ein paar Demo-Einträge der letzten Tage für realistischen Einstieg
  const cycleId = S.cycles[S.cycles.length - 1]?.id;
  if (cycleId) {
    const demoEntries = [
      { daysBack: 10, temp: 24.5, hum: 58, ph: 6.3, note: 'Pflanze sieht super aus, erstes Blütenansatz-Zeichen.' },
      { daysBack: 7, temp: 25.0, hum: 55, ph: 6.2, ec: 1.2, note: 'Leicht angedüngt, alles im grünen Bereich.' },
      { daysBack: 4, temp: 24.8, hum: 56, ph: 6.3, ec: 1.4 },
      { daysBack: 1, temp: 25.2, hum: 54, ph: 6.2, ec: 1.5, note: 'Blüten entwickeln sich schön.' },
    ];
    demoEntries.forEach(e => {
      const d = new Date();
      d.setDate(d.getDate() - e.daysBack);
      const iso = d.toISOString().split('T')[0];
      if (!S.entries[iso]) S.entries[iso] = {};
      const ent = S.entries[iso];
      if (e.temp) ent.temp = e.temp;
      if (e.hum) ent.humidity = e.hum;
      if (!ent.cycleData) ent.cycleData = {};
      if (!ent.cycleData[cycleId]) ent.cycleData[cycleId] = {};
      if (e.ph) ent.cycleData[cycleId].ph = e.ph;
      if (e.ec) ent.cycleData[cycleId].ec = e.ec;
      if (e.note) ent.cycleData[cycleId].note = e.note;
    });
  }

  saveS();
  goTo('dash');
  toast('🎓 Demo-Zyklus angelegt — du kannst ihn jederzeit löschen');
}

/**

 * Wird bei openCycleWizard() resettet.

let _wizStep = 0;
let _wizAnswers = {};

function openCycleWizard() {
  _wizStep = 0;
  _wizAnswers = {};
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-wizard').classList.add('active');
  _renderWiz();
}

function closeWizard() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-set').classList.add('active');
  renderSet();
}

/** Profi-Bypass: direkt ins klassische Formular, Zyklus sofort anlegen */
function skipToExpertForm() {
  closeWizard();
  addCyc();
}

function _wizNext() {
  _wizStep++;
  _renderWiz();
}

function _wizBack() {
  if (_wizStep > 0) { _wizStep--; _renderWiz(); }
}

function _wizAnswer(key, value) {
  _wizAnswers[key] = value;
  _wizNext();
}

function _renderWiz() {
  const body = document.getElementById('wiz-body');

  // Skip-Logic: bei Outdoor kein Samentyp-Screen für Licht-Zyklus, bei Indoor
  // kein Outdoor-Timing-Screen. Screens werden in _wizScreens zusammengesetzt.
  const screens = [
    _wizStepWelcome,
    _wizStepLocation,   // 1: drinnen / draußen
    _wizStepSeedOrTiming, // 2: je nach (1): Samentyp oder Outdoor-Timing
    _wizStepPotSize,    // 3: Topfgröße (mit Empfehlung)
    _wizStepFertPlan,   // 4: Düngeplan
    _wizStepNameSummary, // 5: Name + Zusammenfassung

  const idx = Math.max(0, Math.min(_wizStep, screens.length - 1));
  const progressHTML = idx > 0 ? `<div style="height:3px;background:var(--border);border-radius:2px;margin:0 16px 12px">
    <div style="height:100%;background:var(--green);border-radius:2px;width:${(idx / (screens.length - 1)) * 100}%;transition:width 0.3s"></div>

  body.innerHTML = progressHTML + screens[idx](a);
}

/** Löst aus den Wizard-Antworten ein ISO-Startdatum ab. */
function _wizResolveStartDate(a) {
  if (a.startOption === 'today' || !a.startOption) {
    return { date: todayISO(), note: 'Heute' };
  }
  if (a.startOption === 'prevegged') {
    // 3 Wochen zurück als Standard-Annahme für vorgezogene Pflanzen
    const d = new Date();
    d.setDate(d.getDate() - 21);
    return { date: d.toISOString().split('T')[0], note: 'Vor 3 Wochen (anpassbar)' };
  }
  if (a.startOption === 'later') {
    return { date: todayISO(), note: 'Manuell anpassen' };
  }
  return { date: todayISO(), note: 'Heute' };
}

/** Wizard abschließen: Zyklus anlegen, aktiver Pflanzen-Typ, los */
function _wizFinish() {
  const a = _wizAnswers;
  const startInfo = _wizResolveStartDate(a);

  // Indoor: Seed-Type kam, draußen kam es nicht — Default auto für Outdoor
  const seedType = a.seedType || (a.growType === 'outdoor' ? 'fem' : 'auto');

  const overrides = {
    name: a.name || undefined,
    growType: a.growType || 'indoor',
    seedType,
    startDate: startInfo.date,
    potSize: a.potSize,
    fertPlanId: a.fertPlanId !== undefined ? a.fertPlanId : null,
  };

  addCyc(overrides);
  closeWizard();
  toast(`🌱 Dein neuer Zyklus ist bereit!`);
}

function addCyc(overrides) {
  const o = overrides || {};
  const i = S.cycles.length;
  const c = {
    id: Date.now().toString(),
    name: o.name || `Zyklus ${i + 1}`,
    location: o.location || '',
    active: true,
    startDate: o.startDate || todayISO(),
    colorId: COLORS[i % COLORS.length].id,
    symbol: SYMS[i % SYMS.length],
    seedType: o.seedType || 'auto',
    lightVeg: o.lightVeg || '18/6',
    lightBloom: o.lightBloom || '18/6',
    anzuchtDays: PHASE_DEFAULTS.anzuchtDays, bloomDays: PHASE_DEFAULTS.bloomDays,
    flushDays: PHASE_DEFAULTS.flushDays, iceDays: PHASE_DEFAULTS.iceDays,
    harvestDays: PHASE_DEFAULTS.harvestDays, dryDays: PHASE_DEFAULTS.dryDays,
    intAnzucht: RI.anzucht, intBloom: RI.bloom, intFlush: RI.flush,
    intIce: RI.ice, intErnte: RI.ernte, intDry: RI.dry,
    offsetHistory: [], toppingDate: null, toppingPause: 3, skippedDays: [],
    // Outdoor-support fields
    growType: o.growType || 'indoor',
    hemisphere: o.hemisphere || 'north',
    phaseMode: 'days',
    // v0.9: inherit the plan that's currently active in the Dünger screen.
    // If none exists, falls back to first plan. If no plans at all → null (user assigns later).
    fertPlanId: o.fertPlanId !== undefined ? o.fertPlanId : (S._activePlanId || (S.fertPlans && S.fertPlans[0]?.id) || null),
  };
  // Pot size: if wizard supplied one, save globally (TODO: per-cycle field in later iteration)
  if (o.potSize) S.potSize = o.potSize;
  S.cycles.push(c);
  selId = c.id;
  draft = { ...c };
  saveS();
  renderSet();
  toast(`🌱 ${c.name} erstellt — Start: ${fmtDE(c.startDate, {day:'2-digit',month:'2-digit'})}`);
  return c;
}

function toggleAct(id, checked) {

/**
 * Count past watering days (giess/giess_anz/spuelen/ice) between startDate and today
 * that have no entry yet. Used to decide whether to show the backfill button and how
 * many days it covers.
 */
function countMissingPastWateringDays(c) {
  if (!c.startDate) return 0;
  const today = todayISO();
  let count = 0;
  let iter = c.startDate;
  // Safety limit: don't iterate more than 200 days (covers longest possible grow + buffer)
  for (let i = 0; i < 200 && iter < today; i++) {
    const a = getAction(iter, c);
    if (['giess','giess_anz','spuelen','ice'].includes(a)) {
      const existing = S.entries[iter]?.cycleData?.[c.id];
      const hasData = existing && (existing.water || existing.ph || (existing.doses && Object.values(existing.doses).some(v => v > 0)));
      if (!hasData) count++;
    }
    iter = isoPlus(iter, 1);
  }
  return count;
}

/**
 * Fill past watering days with planned values. Skips days that already have data
 * (non-destructive). Computes fertilizer week per phase + day, same logic as entry render.
 */
async function backfillPast(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c || !c.startDate) return;
  const missing = countMissingPastWateringDays(c);
  if (missing === 0) return;
  const ok = await customConfirm(
    `🕐 ${missing} vergangene Gießtage auto-eintragen?`,
    `Wasser, pH 6.4 und Plan-Dünger werden für ${missing} Gießtage zwischen ${fmtDE(c.startDate, {day:'2-digit',month:'short'})} und heute eingetragen. Bestehende Einträge bleiben unverändert.`,
    'Auto-eintragen', 'var(--yellow)'
  );
  if (!ok) return;
  
  const today = todayISO();
  let filled = 0;
  let iter = c.startDate;
  for (let i = 0; i < 200 && iter < today; i++) {
    const a = getAction(iter, c);
    if (['giess','giess_anz','spuelen','ice'].includes(a)) {
      const existing = S.entries[iter]?.cycleData?.[c.id];
      const hasData = existing && (existing.water || existing.ph || (existing.doses && Object.values(existing.doses).some(v => v > 0)));
      if (!hasData) {
        const p = phase(iter, c);
        if (p) {
          // Compute fert week: same as entry screen logic
          let fertWk = 1;
          if (p.ph === 'flush' || p.ph === 'ice') fertWk = 11;
          else if (p.ph === 'harvest' || p.ph === 'dry') fertWk = 12;
          else {
            const td = isoDiff(iter, c.startDate);
            fertWk = Math.max(1, Math.min(Math.floor(td / 7) + 1, 10));
          }
          // Ensure entry exists with proper shape
          if (!S.entries[iter]) S.entries[iter] = { temp: '', humidity: '', cycleData: {} };
          if (!S.entries[iter].cycleData) S.entries[iter].cycleData = {};
          if (!S.entries[iter].cycleData[c.id]) S.entries[iter].cycleData[c.id] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
          const cd = S.entries[iter].cycleData[c.id];
          if (!cd.doses) cd.doses = {};
          
          const waterMl = waterSuggestion(c, p);
          cd.water = String(waterMl);
          cd.ph = '6.4';
          // Only fertilizers on normal watering days
          if (a === 'giess' || a === 'giess_anz') {
            const doses = getWeekDoses(c.id, fertWk, c);
            Object.entries(doses).forEach(([prodId, plan]) => {
              if (plan > 0) {
                const prod = (S.products || []).find(p => p.id === prodId);
                cd.doses[prodId] = calcDose(plan, waterMl, prod?.unit);
              }
            });
          }
          // Environment: only set if still empty
          const e = S.entries[iter];
          if (!e.temp || String(e.temp).trim() === '') e.temp = '23.5';
          if (!e.humidity || String(e.humidity).trim() === '') e.humidity = '60';
          // Mark auto-filled so user knows
          if (!cd.notes) cd.notes = '🤖 Auto-eingetragen';
          filled++;
        }
      }
    }
    iter = isoPlus(iter, 1);
  }
  saveS();
  vibrate(20);
  toast(`✓ ${filled} Tage eingetragen`);
  renderSet();
}

    'Alles zurücksetzen?',
    `Alle Einträge für "${c.name}" werden gelöscht: Notizen, Wasser, pH, Fotos, Düngerdaten. Der Zyklus selbst bleibt erhalten.`,
    'Alles zurücksetzen'

/** Bulk: Remove notes from all inactive cycles */
async function resetInactive() {
  const inactive = S.cycles.filter(c => !c.active);
  if (inactive.length === 0) { toast('Keine inaktiven Zyklen'); return; }
  const ok = await customConfirm(
    'Notizen aller inaktiven Zyklen löschen?',
    `Betrifft ${inactive.length} Zyklen: ${inactive.map(c => sym(c)+' '+c.name).join(', ')}. Nur Notizen werden gelöscht, Wasser/pH/Fotos bleiben. Aktive Zyklen werden nicht verändert.`,
    'Notizen löschen', 'var(--orange)'
  );
  if (!ok) return;
  const inactiveIds = new Set(inactive.map(c => c.id));
  let count = 0;
  Object.keys(S.entries).forEach(d => {
    const cd = S.entries[d]?.cycleData || {};
    Object.keys(cd).forEach(cId => {
      if (inactiveIds.has(cId) && cd[cId].notes) {
        cd[cId].notes = '';
        count++;
      }
    });
  });
  saveS();
  toast(`✓ ${count} Notizen-Einträge geleert`);

/** Bulk: Wipe all data from inactive cycles */
async function wipeInactive() {
  const inactive = S.cycles.filter(c => !c.active);
  if (inactive.length === 0) { toast('Keine inaktiven Zyklen'); return; }
  const ok = await customConfirm(
    'Alle Daten inaktiver Zyklen löschen?',
    `Betrifft ${inactive.length} Zyklen: ${inactive.map(c => sym(c)+' '+c.name).join(', ')}. ALLE Einträge (Wasser, pH, Fotos, Notizen, Dünger) werden gelöscht. Die Zyklen selbst bleiben bestehen. Aktive Zyklen sind nicht betroffen.`,
    'Alle Daten löschen'
  );
  if (!ok) return;
  const inactiveIds = new Set(inactive.map(c => c.id));
  let count = 0;
  Object.keys(S.entries).forEach(d => {
    const e = S.entries[d];
    if (!e?.cycleData) return;
    Object.keys(e.cycleData).forEach(cId => {
      if (inactiveIds.has(cId)) {
        delete e.cycleData[cId];
        count++;
      }
    });
    if (Object.keys(e.cycleData).length === 0 && !e.temp && !e.humidity) {
      delete S.entries[d];
    }
  });
  // Reset offset/topping on the cycles themselves
  inactive.forEach(c => { c.offsetHistory = []; c.toppingDate = null; c.skippedDays = []; });
  saveS();
  renderSet();
  toast(`✓ ${count} Einträge gelöscht`);
}

/** Wipe absolutely ALL entries (for when no cycles exist) */
async function wipeAllEntries() {
  const count = Object.keys(S.entries).length;
  if (count === 0) { toast('Keine Einträge vorhanden'); return; }
  const ok = await customConfirm(
    `${count} Einträge endgültig löschen?`,
    `Alle ${count} Tageseinträge (Wasser, pH, EC, Fotos, Notizen, Temperatur, RLF) werden unwiderruflich gelöscht. Nur durchführen wenn keine Zyklen mehr da sind!`,
    'Alle löschen'
  );
  if (!ok) return;
  S.entries = {};
  saveS();
  renderSet();
  toast(`🗑 ${count} Einträge gelöscht`);
}

/** Purge all orphaned entries — entries with no active cycle data */
async function purgeOrphans() {
  const activeCycleIds = new Set(S.cycles.map(c => c.id));
  let count = 0;

  Object.keys(S.entries).forEach(d => {
    const e = S.entries[d];
    if (!e) { delete S.entries[d]; count++; return; }

    // Remove cycleData for non-existent cycles
    if (e.cycleData) {
      Object.keys(e.cycleData).forEach(cId => {
        if (!activeCycleIds.has(cId)) {
          delete e.cycleData[cId];
        }
      });
    }

    // Check if entry has real (non-empty) cycle data
    const hasCycleData = e.cycleData && Object.keys(e.cycleData).some(cId => {
      const cd = e.cycleData[cId];
      if (!cd) return false;
      return Object.entries(cd).some(([, v]) => {
        if (v === '' || v === null || v === undefined || v === 0) return false;
        if (Array.isArray(v)) return v.length > 0;
        if (typeof v === 'object') return Object.keys(v).length > 0;
        return true;
      });
    });

    // Check env data: only count as real if truthy AND not empty string
    const hasEnv = (e.temp && String(e.temp).trim() !== '') || (e.humidity && String(e.humidity).trim() !== '');

    if (!hasCycleData && !hasEnv) {
      delete S.entries[d];
      count++;
    }
  });

  saveS();
  renderSet();
  toast(count > 0 ? `🧹 ${count} Einträge bereinigt` : '✓ Keine verwaisten Einträge');
}

async function delCyc(id) {
  const c = S.cycles.find(x => x.id === id);
  if (!c) return;
  const ok = await customConfirm(
    `"${c.name}" löschen?`,
    'Der Zyklus und alle zugehörigen Daten (Einträge, Fotos, Notizen) werden unwiderruflich gelöscht!',
    'Endgültig löschen'
  );
  if (!ok) return;

  S.cycles = S.cycles.filter(x => x.id !== id);
  // Remove all cycle data from entries + clean up empty entries
  Object.keys(S.entries).forEach(d => {
    if (S.entries[d]?.cycleData?.[id]) delete S.entries[d].cycleData[id];
    // Remove entry if no cycle data remains and no env data
    const e = S.entries[d];
    if (e && (!e.cycleData || Object.keys(e.cycleData).length === 0) && !e.temp && !e.humidity) {
      delete S.entries[d];
    }
  });
  selId = S.cycles[0]?.id || null;
  draft = {};
  saveS();
  renderSet();
  toast('Gelöscht');
}

async function importData() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        const ok = await customConfirm(
          'Backup laden?',
          `${(d.cycles || []).length} Zyklen gefunden. Aktuelle Daten werden überschrieben!`,
          'Laden', 'var(--green)'
        );
        if (!ok) return;
        S = Object.assign({
          cycles: [], entries: {}, products: [], weekSchedule: {}, potSize: 11,
        }, d);
        // Ensure offsetHistory exists on imported cycles (migrate old format)
        S.cycles.forEach(c => {
          if (!c.offsetHistory) {
            c.offsetHistory = [];
            if (c.dayOffset && c.dayOffset !== 0 && c.offsetDate) {
              c.offsetHistory.push({ date: c.offsetDate, offset: c.dayOffset });
            }
          }
          delete c.dayOffset; delete c.offsetDate;
        });
        delete S.skipDays; // remove legacy
        saveS();
        toast('Geladen ✓');
        goTo('dash');
      } catch (err) { toast('Fehler beim Laden'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

// =====================================================================
//  GIEESS-ERINNERUNG (Push Notifications)
// =====================================================================
async function toggleNotify(enabled) {
  if (enabled) {
    if (!('Notification' in window)) {
      toast('⚠ Browser unterstützt keine Notifications');
      S.notifyEnabled = false;
      renderSet();
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      toast('⚠ Notification-Berechtigung abgelehnt');
      S.notifyEnabled = false;
      renderSet();
      return;
    }
    S.notifyEnabled = true;
    scheduleNotify();
    toast('🔔 Erinnerung aktiviert');
  } else {
    S.notifyEnabled = false;
    if (_notifyTimer) { clearTimeout(_notifyTimer); _notifyTimer = null; }
    toast('🔕 Erinnerung deaktiviert');
  }
  saveS();
  renderSet();
}

let _notifyTimer = null;

function scheduleNotify() {
  if (!S.notifyEnabled) return;
  if (_notifyTimer) clearTimeout(_notifyTimer);

  const today = todayISO();
  const act = active();
  // Find next watering day
  let nextDay = null;
  for (const c of act) {
    if (isGiessTag(today, c)) { nextDay = today; break; }
    const n = nextGiessTag(c, today);
    if (n && (!nextDay || n.iso < nextDay)) nextDay = n.iso;
  }
  if (!nextDay) return;

  // Reminder at 20:00 the EVENING BEFORE the watering day
  // So the user can prepare water (Leitungswasser abstehen lassen)
  const eveBefore = isoPlus(nextDay, -1);
  const target = new Date(eveBefore + 'T20:00:00');
  const now = Date.now();
  const ms = target.getTime() - now;

  if (ms > 0 && ms < 7 * 86400000) {
    _notifyTimer = setTimeout(() => {
      const actions = act.map(c => {
        const a = getAction(nextDay, c);
        return a ? `${sym(c)} ${c.name}: ${ACT_ICON[a] || ''}` : null;
      }).filter(Boolean);
      if (actions.length > 0) {
        new Notification('💧 Morgen ist Gießtag!', {
          body: 'Wasser jetzt bereitstellen.\n' + actions.join('\n'),
          icon: '🌱',
          tag: 'growsmart-water',
        });
      }
      setTimeout(scheduleNotify, 60000);
    }, ms);
  } else if (ms <= 0) {
    // Evening already passed — check if today IS the watering day and it's morning
    const todayTarget = new Date(today + 'T08:00:00');
    const msToday = todayTarget.getTime() - now;
    if (msToday > 0 && isGiessTag(today, act[0])) {
      // Fallback: morning reminder if evening was missed
      _notifyTimer = setTimeout(() => {
        new Notification('🌱 Heute ist Gießtag!', {
          body: 'Nicht vergessen zu gießen!',
          tag: 'growsmart-water',
        });
        setTimeout(scheduleNotify, 60000);
      }, msToday);
    } else {
      // Retry in 1h
      _notifyTimer = setTimeout(scheduleNotify, 3600000);
    }
  }
}

// Auto-start notification scheduling on load
setTimeout(() => { if (S.notifyEnabled) scheduleNotify(); }, 2000);

function exportDiary() {
  const act = S.cycles;
  if (act.length === 0) { toast('Keine Zyklen vorhanden'); return; }

  let md = `# 🌱 GrowSmart Grow-Tagebuch\n`;
  md += `Exportiert: ${new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'long', year:'numeric' })}\n\n`;

  act.forEach(c => {
    const cl = col(c);
    md += `## ${sym(c)} ${c.name}\n`;
    md += `- **Status:** ${c.active ? 'Aktiv' : 'Inaktiv'}\n`;
    if (c.startDate) md += `- **Start:** ${fmtDE(c.startDate, { day:'2-digit', month:'long', year:'numeric' })}\n`;
    if (c.location) md += `- **Standort:** ${c.location}\n`;
    md += `- **Phasen:** Anzucht ${c.anzuchtDays||PHASE_DEFAULTS.anzuchtDays}d → Blüte ${c.bloomDays||PHASE_DEFAULTS.bloomDays}d → Spülen ${c.flushDays||PHASE_DEFAULTS.flushDays}d → Ice ${c.iceDays||PHASE_DEFAULTS.iceDays}d\n`;
    if (S.presetKey) md += `- **Düngeplan:** ${FERT_PRESETS[S.presetKey]?.name || S.presetKey}\n`;
    else if ((S.products || []).length > 0) md += `- **Düngeplan:** ✨ Eigener Plan · ${S.products.length} Produkte\n`;
    md += `- **Topfgröße:** ${S.potSize || 11}L\n\n`;

    // Entries sorted by date
    const dates = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[c.id]).sort();
    if (dates.length === 0) {
      md += `*Keine Einträge.*\n\n`;
      return;
    }

    md += `### Einträge\n\n`;
    dates.forEach(d => {
      const e = S.entries[d];
      const cd = e.cycleData[c.id];
      const p = phase(d, c);
      md += `#### ${fmtDE(d, { weekday:'long', day:'2-digit', month:'long' })}`;
      if (p) md += ` — ${PN[p.ph]} Tag ${p.day}`;
      md += `\n`;

      if (e.temp || e.humidity) md += `- 🌡️ ${e.temp || '–'}°C / 💨 ${e.humidity || '–'}% RLF`;
      const vpd = calcVPD(parseFloat(e.temp), parseFloat(e.humidity));
      if (vpd !== null) md += ` → VPD ${vpd.toFixed(2)} kPa`;
      if (e.temp || e.humidity) md += `\n`;

      if (cd.water) md += `- 💧 ${cd.water} ml`;
      if (cd.ph) md += ` · pH ${cd.ph}`;
      if (cd.ec) md += ` · EC ${cd.ec}`;
      if (cd.water || cd.ph || cd.ec) md += `\n`;

      // Doses (cd.doses stores the calculated amount in display unit, not per-litre plan)
      const doseEntries = Object.entries(cd.doses || {}).filter(([,v]) => v > 0);
      if (doseEntries.length > 0) {
        md += `- 🧪 Dünger: `;
        md += doseEntries.map(([pid, v]) => {
          const prod = S.products.find(p => p.id === pid);
          return `${prod?.name || pid} ${v} ${displayUnit(prod?.unit)}`;
        }).join(', ');
        md += `\n`;
      }

      // Trichomes
      if (cd.trichomes) {
        md += `- 🔬 Trichome: ${cd.trichomes.clear||0}% klar / ${cd.trichomes.milky||0}% milchig / ${cd.trichomes.amber||0}% bernstein\n`;
      }

      if (cd.notes) md += `- 📝 ${cd.notes}\n`;
      if (cd.photos?.length) md += `- 📸 ${cd.photos.length} Foto(s)\n`;
      md += `\n`;
    });
    md += `---\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `growsmart_tagebuch_${todayISO()}.md`;
  a.click();
  toast('📓 Tagebuch exportiert ✓');
}

/**
 * Smart Quick-Actions: kontextuelle Vorschläge basierend auf
 * Tag, Phase, und ob bestimmte Meilensteine schon markiert wurden.
 * Gibt Array von { label, icon, type } zurück.
 * type: 'note' (als Notiz-Tag) | 'state' (Zustand der Pflanze)
 */
function getSmartQuickNotes(c, p, cd, iso) {
  if (!p) return [];
  const out = [];
  const day = p.day || 1;
  const allEntries = Object.keys(S.entries).filter(d => S.entries[d]?.cycleData?.[c.id]);
  const notesAllTime = allEntries.map(d => S.entries[d]?.cycleData?.[c.id]?.notes || '').join(' ');

  // === ZUSTANDS-CHECKS (immer relevant) ===
  out.push({ label: 'Sieht gesund aus', icon: '✅', type: 'state' });
  out.push({ label: 'Blätter hängen', icon: '🥀', type: 'state' });

  // === PHASE-SPEZIFISCH ===
  if (p.ph === 'anzucht') {
    // Tag 1-3: Keimung
    if (day <= 3 && !notesAllTime.includes('Keimling sichtbar')) {
      out.push({ label: 'Keimling sichtbar', icon: '🌱', type: 'milestone' });
    }
    // Tag 4-10: Erste Blätter
    if (day >= 3 && day <= 10 && !notesAllTime.includes('Erste Blätter')) {
      out.push({ label: 'Erste Blätter (Cotyledons)', icon: '🌿', type: 'milestone' });
    }
    // Tag 7-15: Echte Blätter
    if (day >= 7 && day <= 18 && !notesAllTime.includes('Echte Blätter')) {
      out.push({ label: 'Echte Blätter da', icon: '🍃', type: 'milestone' });
    }
    // Umtopfen Hinweis ab Tag 10
    if (day >= 10 && !notesAllTime.includes('Umgetopft')) {
      out.push({ label: 'Umgetopft', icon: '🪴', type: 'milestone' });
    }
    // Standard-Checks in Anzucht
    out.push({ label: 'Blätter gelblich', icon: '🟡', type: 'state' });
    out.push({ label: 'Überwässert', icon: '💧', type: 'state' });
  }

  if (p.ph === 'bloom') {
    const bloomWeek = p.week || 1;
    // Wo 1-2: Stretch + erste Blüten
    if (bloomWeek <= 2 && !notesAllTime.includes('Erste Blüten')) {
      out.push({ label: 'Erste Blüten', icon: '🌸', type: 'milestone' });
    }
    if (bloomWeek <= 2) {
      out.push({ label: 'Stretch sichtbar', icon: '📏', type: 'state' });
    }
    // Wo 3-5: Buds formen sich
    if (bloomWeek >= 2 && bloomWeek <= 5 && !notesAllTime.includes('Stütze gesetzt')) {
      out.push({ label: 'Stütze gesetzt', icon: '🪵', type: 'milestone' });
    }
    // Wo 4+: Geruch
    if (bloomWeek >= 4) {
      out.push({ label: 'Geruch intensiv', icon: '👃', type: 'state' });
    }
    // Wo 6+: Trichome & Reife
    if (bloomWeek >= 6) {
      out.push({ label: 'Trichome klar', icon: '💎', type: 'observation' });
      out.push({ label: 'Trichome milchig', icon: '🥛', type: 'observation' });
    }
    if (bloomWeek >= 7) {
      out.push({ label: 'Trichome bernstein', icon: '🍯', type: 'observation' });
    }
    // Vergilbung ist ab Wo 6 normal
    if (bloomWeek >= 6) {
      out.push({ label: 'Untere Blätter gelb', icon: '🍂', type: 'state' });
    }
  }

  if (p.ph === 'flush') {
    out.push({ label: 'Nur klares Wasser', icon: '💧', type: 'action' });
    out.push({ label: 'Runoff klar', icon: '✨', type: 'observation' });
  }

  if (p.ph === 'ice') {
    out.push({ label: 'Eiswasser gegeben', icon: '🧊', type: 'action' });
    out.push({ label: 'Trichome glitzern', icon: '✨', type: 'observation' });
  }

  if (p.ph === 'harvest') {
    if (!notesAllTime.includes('Geerntet')) out.push({ label: 'Geerntet!', icon: '🏆', type: 'milestone' });
    out.push({ label: 'Wet Trim', icon: '✂️', type: 'action' });
    out.push({ label: 'Aufgehängt', icon: '🪢', type: 'milestone' });
  }

  if (p.ph === 'dry') {
    out.push({ label: 'Stiele knacken', icon: '🔊', type: 'observation' });
    out.push({ label: 'In Gläser gefüllt', icon: '🫙', type: 'milestone' });
    out.push({ label: 'Burping gemacht', icon: '💨', type: 'action' });
  }

  // === PROBLEM-MARKER (phasenübergreifend) ===
  out.push({ label: 'Schädling gesehen', icon: '🐛', type: 'problem' });

  return out;
}

function openEntry(iso) {
  editISO = iso;
  _entryDirty = false;
  // Deep-clone snapshot so "Verwerfen" can restore the pre-edit state.
  // We only clone the one day's entry — not the whole S — which is cheap.
  _entrySnapshot = S.entries[iso] ? JSON.parse(JSON.stringify(S.entries[iso])) : null;
  document.getElementById('entry-back').onclick = () => navFromEntry(entryFrom);
  _updateEntryTitle(iso);
  // Render bottom nav (no tab is "active" since we're in entry screen)
  document.getElementById('nav-entry').innerHTML = buildNav('__none__', `navFromEntry('__X__')`);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-entry').classList.add('active');
  renderEntry(iso);
}

/**
 * Restore the entry state from the snapshot taken on open.
 * Called when user picks "Verwerfen & weiter" in the dirty prompt.
 */
function _restoreEntrySnapshot() {
  if (!editISO) return;
  if (_entrySnapshot === null) {
    // No entry existed before editing — remove any data that was added
    delete S.entries[editISO];
  } else {
    S.entries[editISO] = JSON.parse(JSON.stringify(_entrySnapshot));
  }
  _entryDirty = false;
  saveS();
}

/**
 * Navigate away from entry screen. If there are unsaved changes, ask first.
 * Simple 2-button: OK = Save & go / Cancel = Stay here.
 */
/**
 * Prompts the user when trying to leave the entry screen with unsaved changes.
 * Returns a Promise that resolves to one of:
 *   'save'     — save & proceed
 *   'discard'  — discard changes & proceed (was the missing option!)
 *   'cancel'   — stay on entry, do nothing
 */
function _entryDirtyPrompt() {
  return new Promise((resolve) => {
    // Build inline overlay (keeps this modal independent of customConfirm state)
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:modalIn 0.2s ease';
    overlay.innerHTML = `
      <div style="background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.6)">
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">💾 Ungespeicherte Änderungen</div>
        <div style="font-size:13px;color:var(--text-sub);line-height:1.6;margin-bottom:18px">
          Du hast diesen Eintrag bearbeitet. Was möchtest du tun?
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button data-act="save" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--green);color:#fff">✓ Speichern & weiter</button>
          <button data-act="discard" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;background:var(--orange);color:#fff">✗ Verwerfen & weiter</button>
          <button data-act="cancel" style="padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--card2);color:var(--text-sub);border:0.5px solid var(--border)">← Hier bleiben</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const done = (choice) => {
      overlay.remove();
      resolve(choice);
    };
    overlay.querySelectorAll('[data-act]').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); done(btn.getAttribute('data-act')); };
    });
    // Tap backdrop = cancel
    overlay.onclick = (e) => { if (e.target === overlay) done('cancel'); };
  });
}

async function navFromEntry(targetTab) {
  if (!_entryDirty) {
    goTo(targetTab);
    return;
  }
  const choice = await _entryDirtyPrompt();
  if (choice === 'save') {
    saveEntry();
    setTimeout(() => goTo(targetTab), 50);
  } else if (choice === 'discard') {
    _restoreEntrySnapshot();
    goTo(targetTab);
  }
  // cancel: stay
}

function _updateEntryTitle(iso) {
  const act = active();
  const dayInfo = act.map(c => { const p = phase(iso, c); return p ? `Tag ${p.day}` : null; }).filter(Boolean);
  const titleExtra = dayInfo.length > 0 ? ' · ' + dayInfo.join(', ') : '';
  document.getElementById('entry-ttl').textContent = fmtDE(iso, { day: '2-digit', month: '2-digit', year: 'numeric' }) + titleExtra;
}

/** Navigate to prev/next day in entry screen. Prompts if there are unsaved changes. */
async function entryNav(dir) {
  if (!editISO) return;
  const doNav = () => {
    const newISO = isoPlus(editISO, dir);
    editISO = newISO;
    // New day = new snapshot (state was just saved or discarded)
    _entrySnapshot = S.entries[newISO] ? JSON.parse(JSON.stringify(S.entries[newISO])) : null;
    _updateEntryTitle(newISO);
    renderEntry(newISO);
    vibrate(8);
  };
  if (!_entryDirty) { doNav(); return; }
  const choice = await _entryDirtyPrompt();
  if (choice === 'save') {
    saveEntry();
    setTimeout(doNav, 50);
  } else if (choice === 'discard') {
    _restoreEntrySnapshot();
    doNav();
  }
  // cancel: stay
}

// Swipe on entry screen
(function() {
  let sx = 0, sy = 0, st = 0;
  const scr = document.getElementById('entry-body');
  scr.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now(); }, { passive: true });
  scr.addEventListener('touchend', e => {
    if (Date.now() - st > 500) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 2) entryNav(dx < 0 ? 1 : -1);
  }, { passive: true });
})();

    let nutSection = '';

      </div>
      ${(() => {

                    <button onclick="event.stopPropagation();stepMixDose('${c.id}','${pr?.id}',${wk},0.1,${waterAmt})" style="width:26px;height:26px;border-radius:5px;background:var(--surface);border:0.5px solid var(--border);color:var(--text-sub);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono)">+</button>
                  </div>
                </div>`;
              }).join('')}
            </div>`
          : '';

        nutSection = `${waterInput}
          <div class="nut-tbl-hdr" style="background:${cl.dk};border:0.5px solid ${cl.hex}44;border-bottom:none">

  // Umgebung (global, once, between nutrient section and tips/notes)
  const envHTML = act.length > 0 ? `

            <input class="inp-field" type="number" step="0.1" value="${temp}" placeholder="23.5" id="et" style="flex:1;text-align:center;height:32px;font-family:var(--mono);font-weight:600" oninput="uEnv()"/>
            <button onclick="stepEnv('et',0.1)" class="stepper-btn">+</button>
          </div>

        <div class="inp-wrap"><div class="inp-label">Luftfeuchtigkeit (%)</div>
