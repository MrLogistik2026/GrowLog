/** Live-update the calculated amounts when water input changes */
function updateCalc(cId, wk) {
  const waterEl = document.getElementById('water-calc-' + cId);
  if (!waterEl) return;
  const ml = parseFloat(waterEl.value) || parseFloat(waterEl.placeholder) || waterSuggestion(null, { ph: 'bloom', day: 35 });

  // Update only calc cells for THIS cycle (scoped by data-cycle attribute)
  document.querySelectorAll(`.nt-calc[data-cycle="${cId}"]`).forEach(cell => {
    const plan = parseFloat(cell.dataset.plan) || 0;
    if (plan > 0) {
      cell.textContent = (plan * ml / 1000).toFixed(1) + ' ml';
    }
  });
}

/** Step water amount by 50ml increments */
function stepWater(cId, step, wk) {
  const el = document.getElementById('water-calc-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || parseFloat(el.placeholder) || 0;
  const newVal = Math.max(0, Math.round((current + step) / 50) * 50);
  el.value = newVal;
  uEF(cId, 'water', String(newVal));
  updateCalc(cId, wk);
  vibrate(8);
}

/** Step pH by 0.1 increments */
function stepPH(cId, step) {
  const el = document.getElementById('ph-' + cId);
  if (!el) return;
  const current = parseFloat(el.value) || 6.4;
  const newVal = Math.max(4, Math.min(9, Math.round((current + step) * 10) / 10));
  el.value = newVal;
  uEF(cId, 'ph', String(newVal));
  vibrate(8);
}

/**
 * Step EC value up/down by step amount. Default 1.4 (middle of Cup-Standard 0.8-2.0).
 * Treats empty or zero as "use default" to match stepEnv/stepPH behaviour:
 * user sees placeholder 1.4 and expects next + to land on 1.5, not 0.1.
 */
function stepEC(cId, step) {
  const el = document.getElementById('ec-' + cId);
  if (!el) return;
  const raw = parseFloat(el.value);
  const current = (isNaN(raw) || raw === 0) ? 1.4 : raw;
  const newVal = Math.max(0, Math.min(5, Math.round((current + step) * 10) / 10));
  el.value = newVal;
  uEF(cId, 'ec', String(newVal));
  vibrate(8);
}

/** Step environment inputs (temperature/humidity) */
function stepEnv(id, step) {
  const el = document.getElementById(id);
  if (!el) return;
  // Default if empty OR zero: 23.5°C for temp, 60% for humidity.
  // Treating 0 as "use default" is intentional: a user seeing the placeholder
  // 23.5 expects the next + to go to 23.6, not 0.1. A genuine 0°C is not a
  // realistic grow scenario anyway.
  const defaultVal = id === 'et' ? 23.5 : 60;
  const raw = parseFloat(el.value);
  const current = (isNaN(raw) || raw === 0) ? defaultVal : raw;
  // Range: temp 0-45, humidity 0-100
  const min = 0;
  const max = id === 'et' ? 45 : 100;
  // Precision: 1 decimal for both temp (0.1 steps) and humidity (0.2 steps)
  const precision = Math.abs(step) < 1 ? 10 : 1;
  const newVal = Math.max(min, Math.min(max, Math.round((current + step) * precision) / precision));
  el.value = newVal;
  uEnv();
  vibrate(8);
}

/**
 * Toggle a mix-step check. Persisted per entry day, keyed by product id,
 * so checks survive re-renders (e.g. after ± dose adjustment on another product).
 * Checks are intentionally per-day: a new watering day starts fresh.
 */
function toggleMixCheck(cId, prodId) {
  if (!editISO || !cId || !prodId) return;
  ensE(cId);
  const cd = S.entries[editISO].cycleData[cId];
  if (!cd.mixChecks) cd.mixChecks = {};
  cd.mixChecks[prodId] = !cd.mixChecks[prodId];
  // Clean up the key if it was un-toggled (keeps state lean)
  if (!cd.mixChecks[prodId]) delete cd.mixChecks[prodId];
  saveS();
  vibrate(10);
  // Re-render entry to reflect visual check state
  if (editISO) renderEntry(editISO);
}

/**
 * Adjust a fertilizer dose by ±stepMl on the DISPLAY (ml actually poured into the
 * water can). The stored plan value (ml/L) becomes a fractional number — that's
 * intentional. User wants to think in "poured ml", not in "concentration".
 * If waterAmt is missing, falls back to ±0.1 ml/L plan-value steps.
 */
function stepMixDose(cId, prodId, wk, stepMl, waterAmt) {
  const key = 'global_w' + wk;
  if (!S.weekSchedule[key]) S.weekSchedule[key] = {};
  const plan = S.weekSchedule[key][prodId] || 0;
  const prod = (S.products || []).find(p => p.id === prodId);
  const perLitre = isPerLitre(prod?.unit);
  let newPlan;
  if (perLitre && waterAmt && waterAmt > 0) {
    // Per-litre unit: current displayed amount → add step → back to per-litre plan
    const currentAmt = plan * waterAmt / 1000;
    const newAmt = Math.max(0, Math.round((currentAmt + stepMl) * 10) / 10);
    newPlan = newAmt * 1000 / waterAmt;
    // Keep stored plan value to a sensible precision (4 decimals is plenty)
    newPlan = Math.round(newPlan * 10000) / 10000;
  } else {
    // Absolute unit OR missing water: step the plan value directly
    newPlan = Math.max(0, Math.round((plan + stepMl) * 10) / 10);
  }
  S.weekSchedule[key][prodId] = newPlan;
  saveS();
  vibrate(8);
  // Re-render the entry to reflect updated doses
  if (editISO) renderEntry(editISO);
}

function uEnv() {
  _entryDirty = true;
  const t = parseFloat(document.getElementById('et')?.value);
  const r = parseFloat(document.getElementById('er')?.value);
  // Phase-aware VPD zone: Spätblüte gets different zone labels (Cup-Niveau)
  const actL = active();
  const p4vpd = editISO && actL.length > 0 ? phase(editISO, actL[0]) : null;
  const gt4vpd = actL.length > 0 ? actL[0].growType : 'indoor';
  const v = calcVPD(t, r), z = vpdZone(v, p4vpd, gt4vpd);
  if (v !== null && z) {
    const vv = document.getElementById('vpd-v');
    const vp = document.getElementById('vpd-p');
    const vm = document.getElementById('vpd-m');
    if (vv) vv.textContent = v.toFixed(2);
    if (vp) { vp.textContent = z.label; vp.style.background = z.bg; vp.style.color = z.color; }
    if (vm) vm.style.left = Math.min(95, z.pct) + '%';
  }
}

function ensE(cId) {
  if (!S.entries[editISO]) S.entries[editISO] = { temp: '', humidity: '', cycleData: {} };
  if (!S.entries[editISO].cycleData) S.entries[editISO].cycleData = {};
  if (!S.entries[editISO].cycleData[cId]) S.entries[editISO].cycleData[cId] = { doses: {}, water: '', ph: '', ec: '', notes: '', photos: [], trichomes: null };
  if (!S.entries[editISO].cycleData[cId].doses) S.entries[editISO].cycleData[cId].doses = {};
  if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
}

function uDose(cId, pid, v) { _entryDirty = true; ensE(cId); S.entries[editISO].cycleData[cId].doses[pid] = parseFloat(v) || 0; }
function uEF(cId, f, v) { _entryDirty = true; ensE(cId); S.entries[editISO].cycleData[cId][f] = v; }

/**
 * Apply one-click recommended values for a watering day:
 * sets water to the suggestion, pH to 6.4, and writes all planned fertilizer
 * doses (ml/L × water / 1000) as the logged amounts. Skips flush day fertilizers
 * since flush = water only. Fires toast on success.
 */
function applyRecommended(cId, wk) {
  if (!editISO) return;
  const c = S.cycles.find(x => x.id === cId);
  if (!c) return;
  const p = phase(editISO, c);
  const a = getAction(editISO, c);
  if (!p || !a) return;
  ensE(cId);
  const cd = S.entries[editISO].cycleData[cId];
  // Water: use suggestion
  const waterMl = waterSuggestion(c, p);
  cd.water = String(waterMl);
  // pH: 6.4 standard target
  cd.ph = '6.4';
  // Fertilizers: only on normal watering days (giess, giess_anz), not flush/ice
  if (a === 'giess' || a === 'giess_anz') {
    const doses = getWeekDoses(cId, wk, c);
    Object.entries(doses).forEach(([prodId, plan]) => {
      if (plan > 0) {
        const prod = (S.products || []).find(p => p.id === prodId);
        cd.doses[prodId] = calcDose(plan, waterMl, prod?.unit);
      }
    });
  }
  // Environment: only set if empty (don't overwrite real measurements)
  const e = S.entries[editISO];
  if (!e.temp || String(e.temp).trim() === '') e.temp = '23.5';
  if (!e.humidity || String(e.humidity).trim() === '') e.humidity = '60';
  saveS();
  vibrate(15);
  toast('✨ Empfohlene Werte übernommen');
  renderEntry(editISO);
}
function uTrich(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].trichomes) S.entries[editISO].cycleData[cId].trichomes = { clear: 70, milky: 25, amber: 5 };
  S.entries[editISO].cycleData[cId].trichomes[field] = parseInt(v) || 0;
}
function uHarvest(cId, field, v) {
  ensE(cId);
  if (!S.entries[editISO].cycleData[cId].harvestLog) S.entries[editISO].cycleData[cId].harvestLog = {};
  S.entries[editISO].cycleData[cId].harvestLog[field] = v;
}

function addQN(cId, el, textArg) {
  ensE(cId);
  // Read label from data-label (preferred) or fall back to argument for backwards compat.
  // This avoids fragile apostrophe escaping in onclick handlers.
  const text = textArg || el.dataset.label || '';
  if (!text) return;
  const icon = el.dataset.icon || '+';
  const ta = document.getElementById('note-' + cId);
  const ex = ta?.value || S.entries[editISO].cycleData[cId].notes || '';

  // TOGGLE: if already added, remove it
  if (ex.includes(text)) {
    let nv = ex.replace(new RegExp('(,\\s*)?' + text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(,\\s*)?', 'g'),
      (match, before, after) => (before && after) ? ', ' : '');
    nv = nv.replace(/^,\s*/, '').replace(/,\s*$/, '').replace(/,\s*,/g, ',').trim();

    S.entries[editISO].cycleData[cId].notes = nv;
    if (ta) ta.value = nv;
    el.classList.remove('active');
    el.textContent = icon + ' ' + text;
    vibrate(8);
    toast('− ' + text);
    return;
  }

  // ADD
  const nv = ex.trim() ? (ex.trim() + ', ' + text) : text;
  S.entries[editISO].cycleData[cId].notes = nv;
  if (ta) ta.value = nv;
  el.classList.add('active');
  el.textContent = '✓ ' + text;
  vibrate(10);
  toast('✓ ' + text);
}

function saveEntry() {
  if (!editISO) return;
  if (S.cycles.length > 0) ensE(S.cycles[0].id);
  S.entries[editISO].temp = document.getElementById('et')?.value || '';
  S.entries[editISO].humidity = document.getElementById('er')?.value || '';

  // Also save water from smart calculator inputs
  active().forEach(c => {
    const waterCalcEl = document.getElementById('water-calc-' + c.id);
    if (waterCalcEl && waterCalcEl.value) {
      ensE(c.id);
      S.entries[editISO].cycleData[c.id].water = waterCalcEl.value;
    }
  });

  saveS();
  _entryDirty = false;
  // Refresh snapshot: saved state is now the new baseline for future discard
  _entrySnapshot = S.entries[editISO] ? JSON.parse(JSON.stringify(S.entries[editISO])) : null;
  vibrate();
  toast('Gespeichert ✓');
  // Re-render to activate VPD display with saved temp/humidity
  renderEntry(editISO);
}

function addPhoto(cId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 10 * 1024 * 1024) { toast('Max 10MB'); return; }
    toast('📸 Foto wird verarbeitet...', 3000);

    const r = new FileReader();
    r.onload = ev => {
      // Compress image via canvas (max 1200px wide)
      const img = new Image();
      img.onload = () => {
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.82);
        ensE(cId);
        if (!S.entries[editISO].cycleData[cId].photos) S.entries[editISO].cycleData[cId].photos = [];
        S.entries[editISO].cycleData[cId].photos.push(compressed);
        // Quota probe: saveS() swallows errors, so we do one explicit write here
        // to detect QuotaExceededError and roll back cleanly. If the probe succeeds,
        // saveS() will redo the write (with orphan cleanup & undo push) — a small
        // cost in exchange for proper user-visible quota handling.
        try {
          localStorage.setItem(SK, JSON.stringify(S));
        } catch (err) {
          S.entries[editISO].cycleData[cId].photos.pop(); // rollback in-memory state
          if (err && (err.name === 'QuotaExceededError' || err.code === 22)) {
            customConfirm(
              '💾 Speicher voll!',
              'Der Browser-Speicher reicht nicht mehr für weitere Fotos. Bitte lösche einige alte Fotos oder exportiere ein Backup (JSON) und starte danach frisch. Dein aktuelles Foto wurde nicht gespeichert.',
              'Verstanden', 'var(--orange)'
            );
          } else {
            toast('⚠ Foto konnte nicht gespeichert werden');
          }
          return;
        }
        // Probe succeeded — commit via saveS (undo push, flash, etc.)
        saveS();
        renderEntry(editISO);
        toast('✓ Foto gespeichert');
        maybeWarnStorageQuota();
      };
      img.onerror = () => toast('⚠ Foto konnte nicht geladen werden');
      img.src = ev.target.result;
    };
    r.onerror = () => toast('⚠ Fehler beim Lesen');
    r.readAsDataURL(f);
  };
  inp.click();
}

/** Estimate localStorage usage. Warns user if >3 MB. */
let _lastQuotaWarn = 0;
function maybeWarnStorageQuota() {
  try {
    const size = (localStorage.getItem(SK) || '').length;
    // Each char in a serialized JSON is ~1 byte (ASCII) or 2 (UTF-16 in memory, 1 stored).
    const mb = size / 1048576;
    const now = Date.now();
    if (mb > 3.5 && now - _lastQuotaWarn > 300000) { // max 1 warn per 5min
      _lastQuotaWarn = now;
      toast(`⚠ Speicher ${mb.toFixed(1)} MB — bald voll. Alte Fotos löschen?`, 4500);
    }
  } catch (e) {}
}

}

    { t: 'VPD (Vapour Pressure Deficit)', txt: '<b>Mechanik:</b> Auf der Blattunterseite regulieren <b>Schließzellen (Stomata)</b> den Gasaustausch. Sie öffnen sich um CO₂ aufzunehmen, wobei unweigerlich Wasser verdunstet. Dieser <b>Transpirationssog</b> zieht Wasser und Nährstoffe aus den Wurzeln bis in die Triebspitzen.<br><br><b>VPD zu niedrig (zu feucht/kalt):</b> Die Pflanze kann nicht verdunsten. Der Nährstofftransport — besonders von unbeweglichem <b>Calcium</b> — stagniert.<br><br><b>VPD zu hoch (zu trocken/heiß):</b> Die Pflanze verliert kritische Mengen Wasser, schließt aus Schutz die Stomata, stoppt die Photosynthese — Wachstum blockiert vollständig.<br><br><b>Zielwerte:</b> Anzucht 0.4–0.8 · frühe/mittlere Blüte 0.8–1.2 kPa.<br><br><b>Cup-Level Steuerung:</b> In der <b>Spätblüte</b> wird der VPD gezielt auf <b>1.4–1.6 kPa</b> erhöht. Dieser milde, kontrollierte Trockenstress zwingt die Pflanze, sich durch eine massive <b>Überproduktion von Harz (Trichomen)</b> vor Austrocknung zu schützen.' },
    { t: 'PPFD & DLI (Licht-Matrix)', txt: '<b>PPFD (Photosynthetische Photonenflussdichte):</b> Der <i>Echtzeit-Tacho</i> des Lichts — misst exakt wie viele nutzbare Photonen pro Sekunde auf einem Quadratmeter Blätterdach einschlagen. Zu viel PPFD ohne adäquate CO₂- und Temperaturwerte führt zum Ausbleichen der Chloroplasten (<i>Light Bleach</i>).<br><br><b>DLI (Tageslichtintegral):</b> Der <i>metabolische Tages-Tank</i> der Pflanze. Cannabis summiert die absorbierten Photonen über die gesamte Lichtphase. Ist das tägliche DLI-Limit erreicht (z.B. ~45 mol/m²/d in der Peak-Blüte), kann die Pflanze an diesem Tag <b>keine weitere Biomasse</b> durch Photosynthese generieren.<br><br><b>Richtwerte PPFD:</b> Anzucht 200–400 · Vegi 400–600 · Blüte 600–900 µmol/m²/s.<br><b>DLI-Ziele:</b> Anzucht 15–25 · Vegi 25–35 · Blüte 30–45 mol/m²/d.' },
    { t: 'Transpiration (Hydraulische Pumpe)', txt: '<b>Mechanik:</b> Transpiration ist weit mehr als nur das "Schwitzen" der Pflanze — es ist der <b>primäre Motor für den Wassertransport</b> entgegen der Schwerkraft. Wasser verdunstet durch die <b>Stomata</b> (Spaltöffnungen) der Blätter und erzeugt einen extremen Unterdruck im <b>Xylem</b> (den Leitbahnen). Dieser <i>Transpirationssog</i> zieht wie ein physikalisches Vakuum Wasser und gelöste Nährstoffe aus den Wurzeln bis in die obersten Triebspitzen.<br><br><b>Kühlfunktion:</b> Durch die Verdunstungskälte (Phasenübergang von flüssig zu gasförmig) kühlt die Pflanze ihre Blattoberfläche. Ohne Transpiration würden die Blätter unter hochintensiven LEDs schlichtweg <b>überhitzen</b>.<br><br><b>Konsequenz:</b> Wer VPD ignoriert, stoppt diesen Motor — Nährstofftransport und Kühlung fallen gleichzeitig aus.' },
    { t: 'Photosynthese (Metabolischer Reaktor)', txt: '<b>Mechanik:</b> Der Prozess, bei dem Lichtenergie in chemische Energie umgewandelt wird. Photonen treffen auf das <b>Chlorophyll</b> (die grünen Pigmente in den Chloroplasten). Diese Energie wird genutzt, um Wasser (H₂O) aus den Wurzeln und Kohlendioxid (CO₂) aus der Luft in <b>Glukose</b> (Zucker) umzuwandeln. Als Abfallprodukt entsteht Sauerstoff (O₂).<br><br><b>Biomasse-Produktion:</b> Die erzeugte Glukose ist der <b>universelle Baustoff</b> der Pflanze. Sie wird entweder sofort zur Energiegewinnung verbrannt oder in Zellulose (Struktur) und komplexe Kohlenhydrate (Blütenmasse, Terpene, Harz) umgewandelt.<br><br><b>Grenzen:</b> Photosynthese braucht alle drei Inputs gleichzeitig — Licht (PPFD), CO₂, Wasser. Fehlt einer, limitiert er den ganzen Prozess (Liebig-Minimum).' },
    { t: 'Makro- vs. Mikronährstoffe & Mobilität', txt: '<b>Makronährstoffe (Kraftstoff):</b> Elemente die die Pflanze in großen Mengen benötigt. <b>Primär:</b> Stickstoff (N), Phosphor (P), Kalium (K). <b>Sekundär:</b> Calcium (Ca), Magnesium (Mg), Schwefel (S).<br><br><b>Mikronährstoffe (Katalysatoren):</b> Spurenelemente in winzigen Dosen, aber essenziell für enzymatische Prozesse: Eisen (Fe), Mangan (Mn), Zink (Zn), Kupfer (Cu), Bor (B), Molybdän (Mo).<br><br><b>Mobilität — der Diagnose-Schlüssel:</b><br><b>Mobile Nährstoffe</b> (N, P, K, Mg): Die Pflanze kann diese bei Mangel aus alten, unteren Blättern abziehen und in die neuen Triebe umleiten. <b>Mangel zeigt sich zuerst unten</b>.<br><b>Immobile Nährstoffe</b> (Ca, Fe, S, Mn, Zn, B, Cu, Mo): Einmal in der Zelle verbaut, nicht mehr transportierbar. <b>Mangel zeigt sich zwingend an den neuen, obersten Trieben</b>.<br><br><b>Praxis:</b> Bei gelben Blattspitzen oben → Calcium/Eisen-Problem. Bei Vergilbung unten → Stickstoff oder Magnesium.' },
    { t: 'Kationenaustauschkapazität (KAK/CEC)', txt: '<b>Mechanik:</b> Die KAK beschreibt die Fähigkeit eines Substrats, <b>positiv geladene Ionen</b> (Kationen wie Ca²⁺, Mg²⁺, K⁺) wie ein Magnet an sich zu binden und sie vor dem Auswaschen zu schützen.<br><br><b>Substrat-Puffer:</b><br>• <b>Torf- und erdreiche Substrate</b> (Light-Mix, All-Mix) haben eine <b>hohe KAK</b>. Sie speichern Nährstoffe und geben sie bedarfsgerecht ab, puffern pH- und EC-Schwankungen ab.<br>• <b>Inerte Substrate</b> wie Kokos (Coco) oder Steinwolle haben eine <b>sehr geringe KAK</b>. Hier muss der Grower die Nährstoffzufuhr bei jedem Gießen exakt steuern — kein Puffer, keine Fehler-Toleranz.<br><br><b>Konsequenz:</b> Bio-Grower bevorzugen hohe KAK (entspannter). Hydro/Coco-Grower fahren mit niedriger KAK (mehr Kontrolle, weniger Pufferung).' },

    { t: 'Überdüngung', txt: 'Verbrannte Blattspitzen (gelb/braun). Sofort: Dosis um 20% reduzieren. Schwer: Zwischenguss mit reinem Wasser.' },
    { t: 'Mischreihenfolge', txt: '<b>1.</b> Wasser (RO) → <b>2.</b> CalMag → <b>3.</b> Basisdünger (NPK) → <b>4.</b> Bio-Additive → <b>5.</b> Humin-/Fulvosäuren → <b>6.</b> pH-Korrektur.<br><br>Humin-/Fulvosäuren immer zuletzt, da sie das pH stark verschieben. pH-Einstellung erst nach allen anderen Zusätzen.' },
    { t: 'Bio vs. Mineralisch', txt: '<b>Die Substrat-Philosophie:</b><br><br><b>Bio (Organisch):</b> Man füttert <b>nicht die Pflanze</b>, sondern das <b>Bodenleben</b> (Mikroorganismen). Diese zersetzen das organische Material und machen es für die Pflanze verfügbar. Wirkt <b>zeitverzögert</b>, baut einen starken Puffer auf, ist <b>extrem fehlerverzeihend</b>.<br><br><b>Mineralisch:</b> Man füttert die Pflanze <b>direkt mit sofort verfügbaren Ionen</b>. Erlaubt <b>chirurgisch präzises Crop Steering</b>, birgt aber bei Fehlern das sofortige Risiko von Versalzung und Wurzelverbrennung.<br><br><b>Praxis:</b> Bio = Einsteiger-freundlich, fehlertolerant, langsamer Reaktionszeit. Mineralisch = präzise, schnell, aber unbarmherzig bei Fehlern.' },
    { t: 'Silizium (Zellwand-Verstärker)', txt: '<b>Oft vernachlässigtes Element:</b> Silizium wird in die <b>Zellwände eingebaut</b> und bildet einen <b>physischen Panzer</b>.<br><br><b>Wirkung:</b><br>• <b>Mechanische Stabilität</b> — dicke Stämme, die schwere Colas tragen können<br>• <b>Resistenz gegen beißende Schädlinge</b> (Raupen, Käfer)<br>• <b>Hitze-Toleranz</b> — Blätter halten höhere Temperaturen aus<br><br><b>Praxis:</b> Si-Additive in Veg und früher Blüte dosieren. Silizium muss <b>vor allen anderen Nährstoffen</b> ins Wasser (sonst flockt es aus).' },
    { t: 'Humin- & Fulvosäuren (Chelatoren)', txt: '<b>Organische Moleküle</b>, die sich wie <b>Klauen um Nährstoff-Ionen legen</b> (<i>Chelatbildung</i>) und diese aktiv durch die Zellmembranen der Wurzeln transportieren.<br><br><b>Funktion:</b> Verbessern die Nährstoffaufnahme besonders bei Mikro-Nährstoffen (Eisen, Mangan, Zink) drastisch.<br><br><b>Kritische Mischreihenfolge:</b> Immer <b>als Letztes</b> hinzufügen — sie verschieben das pH-Gleichgewicht der Lösung stark.<br><br><b>Praxis:</b> In BioBizz-Plänen ist das <b>Top·Max</b>. Zuletzt rein, dann pH prüfen und einstellen.' },
    { t: 'Enzyme (Katalysatoren)', txt: '<b>Mechanik:</b> Enzyme (z.B. <b>Zellulasen</b>) spalten <b>abgestorbene Wurzelmasse</b> im Substrat auf und wandeln sie in verwertbare Kohlenhydrate um.<br><br><b>Wirkung:</b><br>• <b>Reinigt die Wurzelzone</b> — keine tote Biomasse mehr<br>• <b>Verhindert Fäulnis</b> (Pythium/Wurzelfäule)<br>• <b>Maximiert die Nährstoffaufnahme</b> durch saubere, aktive Wurzeln<br><br><b>Praxis:</b> Regelmäßig in kleinen Dosen (z.B. Cannazym, Sensizym). Besonders wichtig bei Recycling-Substrat oder langen Zyklen.' },
    { t: 'Mykorrhiza (Symbiose-Pilze)', txt: '<b>Spezialisierte Bodenpilze</b>, die in die Pflanzenwurzeln <b>eindringen oder sie ummanteln</b>. Sie vergrößern die aktive Absorptionsfläche des Wurzelsystems <b>um bis zu 700 %</b>.<br><br><b>Die Symbiose:</b> Im Austausch liefert die Pflanze dem Pilz <b>durch Photosynthese erzeugten Zucker</b>.<br><br><b>Praxis:</b><br>• <b>Einmal ausbringen</b> — Pilze leben mit der Pflanze, keine Nachdosierung nötig<br>• <b>Direkt an die Wurzel</b> beim Umtopfen oder Einpflanzen<br>• <b>Nicht mit chemischen Fungiziden</b> kombinieren — tötet die Mykorrhiza' },
    { t: 'Nährstoff-Lockout', txt: '<b>Der Systemkollaps:</b> Nährstoffe sind im Substrat <b>reichlich vorhanden</b> — die Pflanze kann sie aber <b>nicht aufnehmen</b>.<br><br><b>Drei Ursachen (immer abiotisch):</b><br>1. <b>pH außerhalb 6.2–6.4</b> (Erde) — Kationenaustausch blockiert<br>2. <b>EC zu hoch</b> — Substrat versalzt, osmotischer Druck kehrt sich um<br>3. <b>Sauerstoffmangel</b> — Wurzeln können nicht atmen, Aufnahme stoppt<br><br><b>Symptome:</b> Mangelerscheinungen trotz normaler Düngung. Typisch: gelbe Blätter, stagnierendes Wachstum, braune Flecken.<br><br><b>Lösung:</b> Ursache identifizieren (pH messen, EC messen, Drainage prüfen) → beheben, nicht mehr düngen. Bei Versalzung: Flushen.' },
    { t: 'Flushen (Zwischenguss)', txt: '<b>Nicht zu verwechseln mit der finalen Spülung</b> vor der Ernte!<br><br><b>Mechanik:</b> Das Substrat wird gezielt mit <b>leichter Enzym-Lösung oder pH-reguliertem Wasser</b> durchgespült — um <b>toxische Salz-Akkumulationen</b> zu entfernen und den <b>EC-Wert im Boden zu resetten</b>.<br><br><b>Wann:</b> Bei Überdüngung, Lockout durch Versalzung, oder als präventive Reinigung nach 4–6 Wochen intensiver Düngung.<br><br><b>Praxis:</b> 2–3x das Topfvolumen mit sauberem Wasser durchspülen (bei 11L Topf ≈ 20–30L Wasser). Drain-EC messen — sollte niedriger als Inflow sein. Danach normale Düngung fortsetzen.' },
  ]},
  { cat: '💡 Licht', items: [
    { t: 'Lichtzyklen', txt: 'Anzucht/Veg: 18h Licht / 6h Dunkel. Blüte: 12/12 — Dunkelphase absolut einhalten! Licht in der Nacht = Zwittern.' },
    { t: 'Lichtabstand', txt: 'LED zu nah = Lichtbrand (gebleichte Spitzen). Zu weit = Stretching. Handtest: Hand auf Pflanzenhöhe, 30s — zu heiß? Höher!' },
    { t: 'Lampen-Typen (LED / HPS / CFL)', txt: '<b>LED (Light Emitting Diode):</b> Der <b>moderne Cup-Standard</b>. Bietet ein steuerbares Vollspektrum, höchste Photonen-Effizienz (µmol/J) und geringe Wärmeabstrahlung — was präzises VPD-Management ermöglicht.<br><br><b>HPS (High Pressure Sodium / NDL):</b> Veralteter Standard. Produziert massiv <b>Infrarotstrahlung (Hitze)</b>, was das Blätterdach verbrennt und die Raumklimakontrolle extrem erschwert.<br><br><b>CFL (Kompaktleuchtstoffröhre):</b> Ineffizient für die Blüte — maximal noch für die <b>früheste Anzucht oder Klone</b> nutzbar.' },
    { t: 'Lichtspektrum & Emerson-Effekt', txt: '<b>Blaues Licht (400–500 nm):</b> Hält die Internodienabstände kurz — Kompaktwuchs in der Veg-Phase.<br><br><b>Rotes Licht (600–700 nm):</b> Treibt die <b>Blütenmasse-Produktion</b> an.<br><br><b>Der Emerson-Effekt:</b> Die simultane Bestrahlung mit <b>tiefrotem (680 nm)</b> und <b>fernrotem Licht (730 nm / Far-Red)</b> stimuliert zwei verschiedene Photosysteme gleichzeitig. Die Photosyntheserate steigt dadurch <b>überproportional an</b> (Synergie-Effekt).<br><br><b>Praxis:</b> Moderne LED-Vollspektrum-Lampen decken all diese Wellenlängen ab. Zusätzliche Far-Red-Emitter am Ende der Lichtphase können den Übergang in die Dunkelheit beschleunigen.' },
    { t: 'UV-Bestrahlung (UV-A / UV-B)', txt: '<b>Mechanik:</b> Gezielter <b>abiotischer Stress</b> in der Spätblüte. UV-B-Strahlung schädigt zelluläre Strukturen.<br><br><b>Abwehrreaktion:</b> Als <i>"pflanzliche Sonnencreme"</i> produziert die Pflanze massiv <b>sekundäre Metaboliten</b> — der <b>Harzbesatz und die Cannabinoid-Konzentration steigen signifikant</b>.<br><br><b>Praxis:</b> Nur in den letzten 2–4 Wochen der Blüte einsetzen. Überdosierung führt zu echten Strahlenschäden. Schutzbrille beim Arbeiten im Grow-Zelt ist bei UV-B Pflicht.' },
    { t: 'Photoperiode (18/6 vs. 12/12)', txt: '<b>Definition:</b> Das Verhältnis von Licht- zu Dunkelstunden.<br><br><b>18/6:</b> Hält <b>photoperiodische Genetik</b> in der vegetativen Phase. Die Pflanze wächst kontinuierlich, keine Blütenbildung.<br><br><b>12/12:</b> Die Umstellung simuliert den <b>nahenden Herbst</b> und triggert hormonell die Blütephase. Der Zeitpunkt bestimmt die finale Größe der Pflanze.<br><br><b>Autoflower:</b> Unabhängig von der Photoperiode — daher oft dauerhaft 18/6 oder sogar 20/4 (mehr Photonen = mehr Ertrag, solange die Pflanze die Intensität verkraftet).' },
    { t: 'Störlicht & absolute Dunkelphase', txt: '<b>Mechanik:</b> In der 12-stündigen Nachtphase baut die Pflanze das Blühhormon <b>Florigen</b> auf. Selbst <b>minimale Lichtverschmutzung</b> (z.B. eine Standby-LED, eine blinkende Steckdose, Straßenlicht durch einen Spalt) <b>zerstört dieses Hormon sofort</b>.<br><br><b>Konsequenzen:</b><br>• <b>Zwitterbildung (Hermaphroditismus)</b> — die Pflanze bildet zusätzlich männliche Blüten, bestäubt sich selbst, produziert Samen statt Harz.<br>• <b>Re-Vegging (Ergrünen)</b> — die Pflanze fällt in die Wachstumsphase zurück, Blüten werden aufgelöst.<br><br><b>Praxis:</b> Grow-Zelt wirklich lichtdicht machen. Alle Standby-Leuchten abkleben. In der Dunkelphase das Zelt nicht öffnen — eine grüne Arbeitslampe ist für kurze Checks OK, weißes Licht nie.' },
  ]},
  { cat: '💨 Klima & Umgebung', items: [
    { t: 'CO₂-Anreicherung', txt: '<b>Standard-Atmosphäre:</b> ~400 ppm CO₂. Auf Cup-Niveau wird auf <b>1000–1500 ppm</b> angehoben.<br><br><b>Die harte Regel:</b> CO₂ ist nur sinnvoll, wenn <b>Licht und Temperatur am absoluten Limit</b> gefahren werden:<br>• <b>PPFD > 1000 µmol/m²/s</b><br>• <b>Temperatur 28–30°C</b><br><br><b>Warum:</b> Die Pflanze kann <b>nur so viel CO₂ verstoffwechseln</b>, wie Licht und Wärme erlauben. Zu viel CO₂ ohne passendes Licht = Verschwendung oder sogar Schaden.<br><br><b>Praxis:</b> Für Hobby-Grower meist <b>nicht sinnvoll</b> — braucht CO₂-Flasche, Sensoren, Regelung, abgedichtetes Zelt. Lohnt erst bei kommerziellem Setup oder fortgeschrittenen Indoor-Profis.' },
    { t: 'Luftwechselrate (Abluft)', txt: '<b>Mechanik:</b> Wie oft das gesamte Luftvolumen des Zeltes pro Stunde ausgetauscht werden muss. Richtwert: <b>30–60 Mal pro Stunde</b>.<br><br><b>Funktion:</b> Eine korrekt dimensionierte <b>Abluftanlage (m³/h)</b> ist der <b>primäre Schutz</b> gegen:<br>• <b>Hitzestau</b> (Temperatur > 30°C)<br>• <b>Luftfeuchtigkeitsbedingte Pilzinfektionen</b> (Botrytis, Mehltau)<br>• CO₂-Mangel (verbrauchte Luft)<br><br><b>Berechnung:</b> Zelt-Volumen (m³) × 40 = benötigte Abluftleistung in m³/h.<br>Beispiel: 1×1×2m-Zelt = 2m³ × 40 = <b>80 m³/h</b> (als Minimum, mit Filter 120+).<br><br><b>Praxis:</b> Abluft regelbar machen (Drehzahlregler oder EC-Lüfter). Dauerlauf minimal, Volllast bei Hitze.' },
    { t: 'Oszillatoren & Clip-Fans (Umluft)', txt: '<b>Interne Ventilatoren</b>, die <b>keinen Luftaustausch</b>, sondern <b>Luftbewegung</b> erzeugen.<br><br><b>Zwei Funktionen:</b><br><br><b>1. Mikroklima-Auflösung:</b> Zerstört <b>feuchte Luftschichten</b> rund um die Blüten — verhindert Schimmelnester und Mehltau.<br><br><b>2. Stamm-Training:</b> Der mechanische Reiz des Windes simuliert <b>Umweltstress</b>. Die Pflanze reagiert mit verstärkter <b>Zellulose-Einlagerung</b> → dicke, belastbare Stämme, die schwere Colas tragen.<br><br><b>Praxis:</b> Clip-Fans an mehreren Positionen, oszillierend. Nicht direkt auf einen Punkt pusten (Windbrand), lieber sanfte Bewegung durchs Canopy. Immer laufen lassen — auch in der Dunkelphase.' },
    { t: 'Aktivkohlefilter (AKF)', txt: '<b>Geruchsmanagement:</b> Ein <b>Zylinder gefüllt mit hochporöser Aktivkohle</b>, durch den die Abluft gesaugt wird. Die <b>Terpen-Moleküle verfangen sich in den Poren</b>.<br><br><b>⚠ Kritische Grenze:</b> Steigt die <b>RLF im Zelt über 70 %</b>, <b>kondensiert Wasser in der Kohle</b>, die Poren verkleben — und der <b>Filter verliert sofort seine neutralisierende Wirkung</b>.<br><br><b>Praxis:</b><br>• AKF muss <b>vor dem Abluft-Lüfter</b> sitzen (Druckseite oder Saugseite je nach Setup)<br>• <b>Lebensdauer:</b> 12–24 Monate bei normalem Betrieb<br>• <b>RLF unter 70%</b> halten — sonst ist der AKF nutzlos und der Geruch durchbricht<br>• Neuer AKF vor großen Zyklen einplanen' },
    { t: 'Grow-Tent vs. Grow-Room', txt: '<b>Tent (Zelt):</b> Ein <b>in sich geschlossenes, leicht zu steuerndes Mikroklima</b>.<br>• <b>Vorteile:</b> Hohe Effizienz durch stark reflektierende Innenwände (<b>Mylar</b>). Billig, flexibel, leicht auf/abbaubar. Temperatur und RLF schnell steuerbar.<br>• <b>Nachteile:</b> Begrenztes Volumen, limitiert die Anzahl Pflanzen.<br><br><b>Room (Raum):</b> Erfordert <b>komplexe, oft industrielle Klimatechnik</b> (große Entfeuchter, Klimaanlagen).<br>• <b>Vorteile:</b> Mehr Platz, mehr Pflanzen, mehr Ertrag.<br>• <b>Nachteile:</b> Das <b>große Luftvolumen reagiert träge</b> — Parameter-Änderungen dauern. Höhere Kosten, aufwendiger.<br><br><b>Empfehlung:</b> Für Hobby-Grow ist das Zelt der Standard. Room erst wenn Volumen oder Pflanzenzahl das sinnvoll machen.' },
  ]},
  { cat: '🧬 Genetik & Entwicklung', items: [
    { t: 'Genotyp vs. Phänotyp', txt: '<b>Genotyp:</b> Der im Samen festgeschriebene, <b>unveränderliche genetische Code</b> (die DNA-Blaupause).<br><br><b>Phänotyp:</b> Das tatsächliche, <b>physische Erscheinungsbild</b> der Pflanze — Geruch, Farbe, Harzbesatz, Ertrag.<br><br><b>Die Gleichung:</b> <i>Phänotyp = Genotyp + Umweltbedingungen</i>. Selbst zehn Samen derselben Mutterpflanze (gleicher Genotyp) wachsen leicht unterschiedlich.<br><br><b>Das Prinzip des Crop Steerings:</b> Unser gesamtes Cup-Level-Setup (VPD, PPFD, Drybacks, pH, EC) dient nur einem Zweck — die Umweltbedingungen so perfekt zu steuern, dass die Pflanze das <b>absolute Maximum ihres genetischen Potenzials</b> ausbilden muss. Gute Genetik + schlechte Umgebung = mittelmäßiger Phänotyp. Gute Genetik + perfekte Umgebung = das Beste was dieser Samen hergeben kann.' },
    { t: 'Photoperiodismus (Automatic vs. Photoperiodisch)', txt: '<b>Die botanische Klarstellung:</b> Die Begriffe "Feminisiert" und "Automatic" schließen sich <b>nicht aus</b>. Feminisiert bedeutet nur, dass der Samen zu 99.9 % <b>weiblich</b> ist — das ist eine Aussage über das <b>Geschlecht</b>. Der wahre Unterschied liegt im <b>Auslöser der Blüte</b>:<br><br><b>Photoperiodisch:</b> Diese Pflanzen besitzen ein <b>Phytochrom-System</b>. Sie messen die Dauer der <b>ununterbrochenen Dunkelheit</b>. Solange sie >14 Stunden Licht bekommen, bleiben sie in der Wachstumsphase. Erst wenn der Grower das Licht auf 12/12 umstellt, suggeriert dies den nahenden Herbst — und die Blüte beginnt. Das bietet <b>maximale Kontrolle über die Größe</b> der Pflanze.<br><br><b>Autoflowering (Automatic):</b> Durch das Einkreuzen von <b>Cannabis Ruderalis</b> (an extrem kurze sibirische Sommer angepasst) wurde der Pflanze der Photoperiodismus <b>weggezüchtet</b>. Sie blüht rein nach <b>chronologischem Alter</b> (meist ab Woche 3–4), unabhängig vom Lichtzyklus. Sie verzeiht dadurch <b>keine Fehler</b> oder Wachstumsstopps in der frühen Phase.<br><br><b>In der App:</b> Bei Automatic ist kein Licht-Umschaltpunkt nötig — die Blüte startet von selbst. Bei Feminisiert (photoperiodisch) erinnert die App an die 12/12-Umschaltung.' },
    { t: 'Indica vs. Sativa vs. Ruderalis', txt: '<b>Indica:</b> Evolutionär angepasst an das raue <b>Bergklima Zentralasiens</b> (Hindu Kush).<br>Morphologie: breitblättrig, gedrungener buschiger Wuchs, dichte Blüten, <b>kurze Blütezeit (7–9 Wochen)</b>. Sehr widerstandsfähig.<br><br><b>Sativa:</b> Evolutionär angepasst an <b>feucht-heiße, äquatoriale Zonen</b>.<br>Morphologie: schmalblättrig, enormes Längenwachstum (<b>Stretch</b>), offene und luftige Blütenstruktur (Schutz vor Schimmel), <b>sehr lange Blütezeit (10–14+ Wochen)</b>. Sensibel gegenüber Stickstoffüberschuss.<br><br><b>Ruderalis:</b> Die <b>sibirische Wildform</b>. Produziert kaum Terpene oder Cannabinoide und bleibt sehr klein. Wird in der modernen Zucht ausschließlich wegen ihres <b>"Autoflower"-Gens</b> genutzt.<br><br><b>Praxis-Hybride:</b> Reine Indica/Sativa sind selten — die meisten modernen Strains sind Kreuzungen mit spezifischen Verhältnissen (z.B. "70% Sativa / 30% Indica"). Das erklärt Blütezeit und Wuchs-Charakter.' },
  ]},
  { cat: '✂️ Training', items: [
    { t: 'Apikaldominanz & Auxin', txt: '<b>Die Evolutionsfalle:</b> Cannabis hat den natürlichen Drang, einen <b>dominanten Haupttrieb</b> zu bilden — um in der Natur Konkurrenten zu überragen. Dieser Wuchs wird chemisch durch das Hormon <b>Auxin</b> gesteuert, welches in der obersten Spitze produziert wird und das Wachstum aller darunterliegenden Triebe <b>hemmt</b>.<br><br><b>Konsequenz:</b> Unter stationären Kunstlichtquellen ist diese Wuchsform <b>hochgradig ineffizient</b> — ein riesiger Haupttrieb bekommt das meiste Licht, die Seitentriebe kümmern dahin. Durch gezieltes Training (Topping, LST, SCROG) wird die Apikaldominanz gebrochen.' },
    { t: 'Topping', txt: '<b>Definition:</b> Technik der Pflanzenmanipulation, bei der die oberste Wachstumsspitze (das <b>apikale Meristem</b>) des Haupttriebs mit einer sterilen Schere entfernt wird.<br><br><b>Wirkungsweise:</b> Cannabis wächst natürlich in Tannenbaum-Form, weil die oberste Spitze das Hormon <b>Auxin</b> produziert. Das Hormon wandert nach unten und hemmt das Wachstum der Seitentriebe (<i>Apikaldominanz</i>). Wird die Spitze entfernt, stoppt die Auxin-Produktion schlagartig. Die Pflanze leitet ihre Energie in die darunterliegenden Seitentriebe um.<br><br><b>Ergebnis:</b> Statt einem großen Haupttrieb entwickelt die Pflanze <b>zwei neue Haupttriebe</b> und wächst breiter und buschiger — mehr Lichtausbeute, mehr Ertrag. Schnitt über dem 4.–5. Nodium, nur in der Vegi, danach 3 Tage Ruhe.' },
    { t: 'Reihenfolge: Gießen vor Topping', txt: 'Bei einem geplanten Topping muss die Pflanze <b>zwingend vorher gegossen werden</b> (idealerweise 2–4 Stunden vor dem Schnitt). Umgekehrt = starker Stress und Wachstumsverzögerung.<br><br><b>1. Zellspannung (Turgordruck):</b> Eine gut gewässerte Pflanze hat pralle, feste Zellen. Der Schnitt durch einen wassergefüllten Stängel ist sauber und glatt. Bei einer durstigen Pflanze ist das Gewebe weich — die Schere quetscht die Zellen statt sie sauber zu trennen, was die Wundheilung verschlechtert.<br><br><b>2. Stressvermeidung:</b> Der Dryback bedeutet für die Pflanze schon leichten Trockenstress. Das Abschneiden der Spitze ist massiver mechanischer Stress. Kombiniert = Überlebensmodus, Wachstum stoppt vorübergehend.<br><br><b>3. Nährstoffverfügbarkeit:</b> Nach dem Schnitt muss die Pflanze die Wunde heilen und Energie in die neuen Triebe leiten. Dafür braucht sie Wasser und gelöste Nährstoffe. Wenn kurz vor dem Toppen gegossen wurde, stehen diese in den Leitbahnen abrufbereit bereit.<br><br><b>Praxis:</b> Am Morgen vor dem Topping volles Gießen (mit Plan-Dünger) → 2–4h warten → Topping am frühen Nachmittag → keine Düngung mehr heute → 3 Tage Ruhe ohne Gießen.' },
    { t: 'Canopy-Management', txt: '<b>Das Prinzip:</b> Lichtintensität nimmt <b>im Quadrat zur Entfernung</b> ab. Ein Trieb der 10 cm näher an der Lampe ist, bekommt nicht 10% mehr Licht — sondern erheblich mehr.<br><br><b>Das Ziel:</b> Canopy-Management (z.B. <b>LST</b> = Low Stress Training oder <b>SCROG</b> = Screen of Green) zielt darauf ab, alle Triebspitzen auf ein <b>exakt horizontales Niveau</b> zu manipulieren. So erhält jeder Trieb die <b>identische PPFD-Dosis</b>.<br><br><b>Ergebnis:</b> Multiple, <b>gleichwertige Hauptblüten</b> statt einer Kolatrieb + vielen unterentwickelten Seitentrieben. Deutlich höherer und konsistenterer Ertrag.' },
    { t: 'LST (Low Stress)', txt: 'Triebe sanft herunterbiegen und fixieren. Gleichmäßiges Kronendach = mehr Licht = mehr Blüten. Jederzeit möglich. Teil des Canopy-Managements.' },
    { t: 'HST (High Stress)', txt: '<b>Supercropping:</b> Gezieltes Quetschen des Stamminneren (Stängel vorsichtig knicken, nicht brechen). Erzeugt einen <b>Kallus</b> (Verdickung), der den Nährstofftransport <b>dauerhaft stärkt</b>. Nur für Erfahrene. Voller Turgordruck ist Voraussetzung.' },
    { t: 'Defoliation (Entlaubung)', txt: '<b>Parasitäre Biomasse:</b> Blätter im stark beschatteten <b>unteren Drittel</b> der Pflanze verbrauchen metabolisch <b>mehr Energie als sie durch Photosynthese generieren</b>. Sie agieren als <i>Ertragsparasiten</i>.<br><br><b>Die Intervention:</b> Durch systematisches Entfernen dieser Biomasse leitet die Pflanze Nährstoffe — insbesondere <b>Phosphor und Kalium</b> in der Blütephase — zwingend nach oben in die Blütenstände.<br><br><b>Bonus:</b> Reduzierte Transpirationsfläche ermöglicht eine <b>präzise Kontrolle der Raumluftfeuchtigkeit</b> — wichtig für Schimmelprävention in der Spätblüte.<br><br><b>Praxis:</b> Schubweise und gezielt (nie mehr als 30% der Blätter auf einmal). Optimale Zeitpunkte: Tag der Blüte-Umschaltung + vor der Peak-Blüte.' },
    { t: 'Fimming (F.I.M.)', txt: '<b>Name:</b> "Fuck I Missed" — entstanden als Fehler beim Topping, heute eigenständige Technik.<br><br><b>Mechanik:</b> Statt den Haupttrieb komplett zu entfernen, werden nur <b>70–80 % der neuen Triebspitze</b> durchtrennt — quasi ein schlampiges Topping mit Absicht.<br><br><b>Ergebnis:</b> Die Pflanze bildet oft <b>4 (oder mehr) neue Haupttriebe</b> statt nur 2 wie beim Topping. Höheres Ertragspotenzial, aber auch höheres Risiko einer asymmetrischen Entwicklung.<br><br><b>Praxis:</b> Selbe Regeln wie beim Topping — Turgordruck maximal, steriles Werkzeug, 2–4h vorher gießen.' },
    { t: 'SCROG (Screen of Green)', txt: '<b>Mechanik:</b> Nutzung eines <b>horizontalen Netzes</b> über der Pflanze. Jeder Zweig wird gezielt unter das Netz gewebt, bis das gesamte Raster gefüllt ist.<br><br><b>Ergebnis:</b> Das <b>perfekte, lückenlose Kronendach</b> (Canopy) für maximale Lichtausbeute auf einer <b>exakten Höhe</b>. Keine Trieb-Spitze schattet eine andere ab — jeder bekommt die identische PPFD-Dosis.<br><br><b>Praxis:</b> Netz auf ~20 cm über dem Topf spannen. Ab Veg-Ende damit beginnen. Wenn das Netz voll ist = Umstellung auf 12/12. Passt ideal zu photoperiodischen Strains (Auto hat zu wenig Zeit dafür).' },
    { t: 'SOG (Sea of Green)', txt: '<b>Das Gegenteil von SCROG:</b> Sehr viele Pflanzen auf engem Raum mit extrem kurzer (oder gar keiner) Veg-Phase.<br><br><b>Ziel:</b> Pro Pflanze nur eine einzige, <b>massive Hauptcola</b> zu züchten. Kein Training, keine Topping — reine Kolatrieb-Dominanz ausnutzen.<br><br><b>Vorteil:</b> <b>Maximiert die Geschwindigkeit</b> des Grow-Zyklus. Schneller Turnover, weniger Pflanzenmanagement pro Pflanze.<br><br><b>Ideal für:</b> Klone (identische Genetik = gleichmäßiges Canopy) und Autoflower (kurze Veg-Phase passt zur SOG-Logik).' },
    { t: 'Mainlining / Manifolding', txt: '<b>Radikale Trainingsmethode:</b> Die Pflanze wird <b>mehrfach getoppt und symmetrisch aufgespalten</b> — wie ein Verteilerrohr (Manifold).<br><br><b>Ziel:</b> <b>Perfekte hydraulische Symmetrie</b>. Jeder Trieb hat den <b>exakt gleichen Abstand zur Wurzel</b>, wodurch die Nährstoffe absolut gleichmäßig verteilt werden.<br><br><b>Ergebnis:</b> 4, 8, 16 oder 32 gleich große Hauptcolas je nach Aufspaltungsgrad. Extrem gleichmäßiger Ertrag, aber hoher Zeitaufwand und nur für photoperiodische Strains geeignet (braucht lange Veg-Phase).' },
    { t: 'Monster Cropping', txt: '<b>Mechanik:</b> Das Nehmen von Stecklingen (Klonen) von einer Pflanze, die sich bereits <b>2–3 Wochen in der Blüte</b> befindet.<br><br><b>Ergebnis:</b> Wird der Klon zurück ins vegetative Licht (18/6) gestellt, <b>mutiert er beim Re-Vegging</b> zu einem <b>extrem buschigen Monster</b> mit unzähligen Seitentrieben. Die blütenaktivierten Hormone bleiben teils erhalten, sorgen für hohe Triebdichte.<br><br><b>Praxis:</b> Nur für fortgeschrittene Grower. Das Re-Vegging dauert 2–4 Wochen mit zwittriger Wuchsform (Blatt-Mutationen), bevor normales Wachstum einsetzt.' },
    { t: 'Pflanzen-Stütze (Yo-Yos & Netze)', txt: '<b>Problem:</b> In der Spätblüte werden Cup-Level Colas <b>so schwer</b>, dass sie ihre eigene Struktur zerstören. Stängel knicken unter der Biomasse ein.<br><br><b>Konsequenz:</b> Ein geknickter Stängel <b>klemmt den Nährstofffluss ab</b> — die betroffene Cola hört auf zu reifen.<br><br><b>Lösungen:</b><br>• <b>Yo-Yos:</b> Rollen mit Haken, die an der Zelt-Decke befestigt werden. Flexibel einstellbar, greifen einzelne Triebe.<br>• <b>Stütznetze:</b> Horizontale Netze (auch nach SCROG), die die gesamte Canopy tragen.<br>• <b>Bambusstäbe:</b> Klassisch, für einzelne schwere Triebe.' },
  ]},
  { cat: '🌸 Lebensphasen', items: [
    { t: 'Keimung', txt: '<b>Der embryonale Start:</b> Der Samen nimmt durch <b>Osmose</b> Wasser auf, die Schale platzt, die <b>Pfahlwurzel (Radicula)</b> bricht durch.<br><br><b>Milieu:</b> Findet im <b>feuchten, aber sauerstoffreichen</b> Umfeld statt (z.B. Jiffy oder Zewa-Methode). Stauwasser = kein Sauerstoff = Schimmel, kein Keimen.<br><br><b>Zeit:</b> 24–72h bis die Wurzel sichtbar ist. Bei Autoflower unbedingt <b>direkt in den Endtopf</b> — Umtopfen stresst, kostet Tage.' },
    { t: 'Sämlingsphase', txt: '<b>Definition:</b> Von der Entfaltung der <b>Keimblätter (Kotyledonen)</b> bis zur Bildung der ersten echten, mehrfingrigen Blätter.<br><br><b>Besonderheit:</b> Die Pflanze hat <b>kein etabliertes Wurzelsystem</b> und reagiert extrem sensibel auf:<br>• <b>Hohen EC-Wert</b> (Düngersalze) — Sämlinge brauchen kaum Dünger<br>• <b>Falschen VPD</b> — zu niedrig = Kondensation/Schimmel, zu hoch = Austrocknung<br><br><b>Praxis:</b> VPD 0.4–0.8 kPa. Nur ganz leicht wässern (Spritzflasche oder wenige ml). Kein Dünger in den ersten 7–10 Tagen.' },
    { t: 'Vegetationsphase', txt: '<b>Fokus:</b> Rein auf <b>Biomasse- und Wurzelaufbau</b>. Die Pflanze baut Strukturen auf die sie später in der Blüte braucht.<br><br><b>Nährstoffbedarf:</b> Hoher <b>Stickstoffbedarf (N)</b> für Blattmasse und Chlorophyll. NPK-Verhältnis in Richtung hoher N.<br><br><b>Training-Fenster:</b> Hier finden <b>alle primären Trainings-Interventionen</b> statt — Topping, Fimming, LST, SCROG-Aufbau, Mainlining. Danach stoppt das Strukturwachstum.<br><br><b>Dauer:</b> Bei Photoperiodisch frei wählbar (4–8 Wochen typisch). Bei Autoflower fix ~21 Tage.' },
    { t: 'Stretch (Pre-Flower)', txt: '<b>Definition:</b> Die ersten <b>10–21 Tage nach der Umstellung auf 12/12</b> (bzw. beim Autoflower: Tag 21–35).<br><br><b>Mechanik:</b> Ein massiver, <b>hormonell gesteuerter Höhenwachstumsschub</b>. Pflanzen können ihre Größe <b>verdoppeln bis verdreifachen</b>.<br><br><b>Finale Festlegung:</b> Der <b>internodiale Abstand</b> (Abstand zwischen den Blatt-Etagen) wird final bestimmt. Danach wächst kein Längenwachstum mehr — nur noch Blütenfüllung.<br><br><b>Konsequenz:</b> Spätestens jetzt muss die Lampen-Höhe und Stütz-Planung stehen. Canopy-Management entscheidet sich hier.' },
    { t: 'Blüte-Phasen (früh / mittel / spät)', txt: '<b>Frühe Blüte (Woche 1–3):</b> Transition. Umstellung von Wachstum auf Reproduktion. Weiße <b>Stigmen/Pistils</b> (Härchen) bilden sich. Stretch läuft parallel.<br><br><b>Mittlere Blüte (Woche 4–6):</b> <b>Bulk-Phase</b>. Das Höhenwachstum stoppt komplett. Der Nährstoffbedarf dreht sich <b>von Stickstoff (N) massiv hin zu Phosphor und Kalium (P/K)</b>. <b>Kelche (Calyxe)</b> schwellen an.<br><br><b>Späte Blüte (Ripening / Woche 7+):</b> Das <b>Ausreifen</b>. Harzproduktion erreicht ihr Maximum, Terpene werden stark volatil (flüchtig). Cup-Level VPD auf 1.4–1.6 kPa anheben für Trichom-Boost.' },
    { t: 'Reife (Seneszenz)', txt: '<b>Der programmierte Zelltod:</b> Die Pflanze stellt die <b>Nährstoffaufnahme ein</b> (oder wird aktiv geflusht).<br><br><b>Sichtbare Zeichen:</b> <b>Chlorophyll wird abgebaut</b> — die grüne Farbe der Blätter verschwindet. Dadurch werden die im Blatt verborgenen <b>Anthocyane</b> (rote/violette Farbpigmente) sichtbar.<br><br><b>Interpretation:</b> Gelbe und lila Verfärbungen am Ende der Blüte sind <b>kein Mangel</b> sondern das <b>natürliche Ende des Lebenszyklus</b>. Die Pflanze verschiebt die letzten Nährstoffe aus den Blättern in die Blüten.<br><br><b>Ernte-Signal:</b> In Kombination mit milchigen Trichomen = optimaler Erntezeitpunkt.' },
  ]},
  { cat: '🔬 Ernte', items: [
    { t: 'Trichom-Analyse (Ernte-Trigger)', txt: '<b>Die einzig valide Methode</b> zur Erntebestimmung. Die harzigen Drüsenköpfe (<b>Trichome</b>) werden mit einem <b>Taschenmikroskop (60x+)</b> analysiert.<br><br><b>Stadien:</b><br>• <b>Klar:</b> Unreif, nur Vorstufen produziert.<br>• <b>Milchig/Trüb:</b> <b>Peak THC-A</b>. Maximale Potenz.<br>• <b>Bernsteinfarben:</b> THC-A degradiert durch Oxidation zu <b>CBN</b> (sedierender Couchlock-Effekt).<br><br><b>Cup-Standard:</b> <b>90% milchig, max 10% bernstein</b> — nie mehr. Mehr Amber = mehr CBN-Abbau = Potenz-Verlust. Für mehr Euphorie: früher ernten (weniger Amber). Für mehr Sedierung: Trocken- und Curing-Zyklus länger, nicht später ernten.' },
    { t: 'Dunkelphase vor der Ernte (48–72h)', txt: '<b>Abschließender abiotischer Stressor:</b> Die <b>absolute Dunkelheit</b> kurz vor der Ernte (48–72 Stunden).<br><br><b>Wirkung:</b><br>• <b>Schützt flüchtige Terpene</b> vor Verdampfung durch Licht/Hitze<br>• <b>Stoppt die Photosynthese</b> — Stärkeabbau in den Blättern wird gefördert<br>• Soll eine letzte Harz-Erhöhung triggern (umstritten, aber gängige Praxis)<br><br><b>Praxis:</b> Zelt 48–72h vor dem Schnitt komplett dunkel halten. Temperatur etwas absenken. Kein Gießen mehr.' },
    { t: 'Wet Trim vs. Dry Trim', txt: '<b>Wet Trim:</b> Maniküren der <b>nassen Pflanze direkt nach dem Schnitt</b>.<br>• <b>Vorteil:</b> Schneller, Blätter stehen ab und sind leicht zu entfernen.<br>• <b>Nachteil:</b> Die Blätter bluten <b>Chlorophyll aus</b> — kratziger Geschmack. Die Blüten trocknen oft <b>zu schnell</b>.<br><br><b>Dry Trim (Cup-Standard):</b> Die Pflanze wird im Ganzen (<b>inkl. Blätter</b>) kopfüber getrocknet, erst nach der Trocknung manikürt.<br>• <b>Vorteil:</b> Blätter legen sich wie ein <b>Schutzmantel</b> um die Blüten. Langsame, schonende Trocknung (10–14 Tage), <b>Terpene maximal erhalten</b>.<br>• <b>Nachteil:</b> Aufwendigeres Maniküren (trockene Blätter kleben).' },
    { t: 'Spülung', txt: 'Letzte <b>7–14 Tage nur reines Wasser</b>. Pflanze baut Nährstoffdepots und Chlorophyll ab. Sauberer Geschmack beim Rauchen, keine bitteren Noten.' },
    { t: 'IceFlush', txt: 'Eiswasser (<10°C) in den <b>letzten 48h vor der Ernte</b>. Frost-Simulation stresst die Pflanze und pusht Harz (Trichome) und lila Farben (Anthocyane).' },
    { t: 'Wurzelschnitt (Splitting)', txt: '<b>Extreme und umstrittene Stressmethode</b> kurz vor der Ernte.<br><br><b>Mechanik:</b> Durch <b>physische Verletzung des Stammes oder der Wurzeln</b> (Splitting) soll in den letzten 48 Stunden eine <b>panikartige Not-Harzproduktion</b> erzwungen werden. Die Pflanze glaubt zu sterben und pumpt alles in die Blüten.<br><br><b>Realität:</b> Die wissenschaftliche Evidenz ist dünn. In der Praxis oft mehr Risiko (Pflanze welkt vorzeitig) als Ertrag. Nicht Cup-Standard — <b>eher ein Experiment für Fortgeschrittene</b>.' },
  ]},
  { cat: '🍂 Nach der Ernte', items: [
    { t: 'Trocknung', txt: '7–14 Tage, 18–21°C, 55–65% RLF. Dunkel, gute Luftzirkulation. Stiele knacken = fertig. Zu schnell = Heu-Geschmack. Dry Trim (ungeschnitten) ist Cup-Standard.' },
    { t: 'Curing (Veredelung)', txt: '<b>Nach der Trocknung:</b> Blüten haben ca. <b>10–12% Restfeuchte</b> erreicht. Jetzt werden sie <b>luftdicht in Gläsern</b> gelagert.<br><br><b>Mechanik:</b> <b>Mikrobielle und enzymatische Prozesse</b> brechen in den folgenden Wochen <b>restliches Chlorophyll und Zucker ab</b>. Dieser Prozess eliminiert das "kratzige" Heu-Aroma.<br><br><b>Praxis:</b> Erste Woche täglich 15 Min öffnen (<b>Burping</b>). Dann alle 2–3 Tage. <b>Minimum 2 Wochen, ideal 4–8 Wochen</b>. Bei 60–65% RLF im Glas.' },
    { t: 'Dekarboxylierung', txt: '<b>Der biochemische Schlüssel:</b> Cannabis produziert <b>kein psychoaktives THC</b>, sondern die <b>nicht-psychoaktive Säure THC-A</b>.<br><br><b>Mechanik:</b> Erst durch <b>Hitze</b> (beim Rauchen, Verdampfen oder Backen) spaltet sich ein <b>Kohlendioxid-Molekül (CO₂)</b> ab. Aus THC-A wird <b>psychoaktives THC</b>.<br><br><b>Konsequenz:</b> Frische, ungetrocknete Blüten sind <b>kaum wirksam</b>. Auch nach der Trocknung braucht es Hitze zur Aktivierung. Beim Backen von Edibles muss vorher dekarboxyliert werden (ca. 110°C, 30–40 Min im Ofen).' },
    { t: 'Aroma-Entwicklung (Terpen-Reifung)', txt: '<b>Während des Curings</b> stabilisieren sich die Terpene. Das molekulare Profil reift — ähnlich wie bei einem guten Wein.<br><br><b>Mechanik:</b><br>• <b>Monoterpene</b> (leicht, flüchtig — z.B. Limonen, Myrcen) verflüchtigen sich langsam<br>• <b>Sesquiterpene</b> (schwerer, stabiler — z.B. Caryophyllen) treten in den Vordergrund<br><br><b>Ergebnis:</b> Die Aromatik wird <b>komplexer, runder, reifer</b>. Erste Woche noch "grasig", nach 4–8 Wochen voll entwickelt.' },
    { t: 'Feuchtigkeits-Regulatoren (Boveda / Integra)', txt: '<b>Zwei-Wege-Membranen</b>, die im Curing-Glas platziert werden.<br><br><b>Mechanik:</b> Sie <b>geben Feuchtigkeit ab oder nehmen sie auf</b> — um ein permanentes, perfektes Mikroklima von exakt <b>58 % oder 62 % RLF</b> zu garantieren.<br><br><b>Vorteil:</b><br>• <b>Schimmelbildung ausgeschlossen</b> (zu feucht)<br>• <b>Terpene konserviert</b> (zu trocken = Heu-Aroma)<br>• Wartungsarm — kein tägliches Burping mehr nötig nach der initialen Curing-Woche.<br><br><b>Welche Größe:</b> 62% für Lagerung, 58% für Long-Term. Größe je nach Glas-Volumen.' },
    { t: 'Lagerung', txt: 'Dunkel, kühl (15–20°C), trocken (58–62% RLF). Boveda-Packs halten RLF konstant. Kein Plastik, kein Licht.' },
  ]},
  { cat: '🐛 Probleme', items: [
    { t: 'Trauermücken (Sciaridae)', txt: '<b>Kleine schwarze Fliegen.</b> Die Fliegen selbst sind harmlos, aber ihre <b>Larven fressen die feinen Wurzelhaare</b> der Pflanze — das ist das eigentliche Problem.<br><br><b>Ursache:</b> Mangelhafter Dryback. <b>Dauerfeuchtes Substrat</b> = perfekter Brutplatz.<br><br><b>Bekämpfung:</b><br>• <b>Gelbtafeln</b> — fangen die adulten Fliegen<br>• <b>Nematoden</b> (Steinernema feltiae) im Gießwasser gegen die Larven<br>• <b>BTI-Bakterien</b> (Bacillus thuringiensis) — biologisch, sicher<br>• <b>Oberste Erdschicht trocken halten</b> (Bottom-Watering hilft präventiv)' },
    { t: 'Spinnmilben (Tetranychidae)', txt: '<b>Mikroskopisch kleine Milben</b>, die meist auf der <b>Blattunterseite</b> sitzen und den Zellsaft aussaugen.<br><br><b>Frühsymptome:</b><br>• Winzige <b>weiße Punkte</b> auf den Blättern<br>• Später <b>feine Netze</b> um die Blüten<br>• Spröde, trockene Blätter trotz Bewässerung<br><br><b>Explodieren bei:</b> trockenem, heißem Klima (VPD zu hoch). Eine Population verdoppelt sich alle 3 Tage.<br><br><b>Bekämpfung:</b><br>• <b>Raubmilben</b> (Phytoseiulus persimilis) — biologischer Gegenspieler<br>• <b>Neemöl</b> — nur in der Wachstumsphase sprühen! Niemals auf Blüten.<br>• <b>Luftfeuchte erhöhen</b> kurzfristig als Präventiv-Maßnahme' },
    { t: 'Thripse', txt: '<b>Winzige, längliche Insekten</b>, die die Blattzellen aussaugen.<br><br><b>Symptome:</b><br>• <b>Silbrig-glänzende Flecken</b> auf den Blättern<br>• <b>Winzige schwarze Kot-Punkte</b><br>• Verformungen neuer Blätter<br><br><b>Bekämpfung:</b><br>• <b>Blautafeln</b> (Thripse reagieren auf Blau — nicht Gelb wie Trauermücken!)<br>• <b>Raubmilben</b> oder <b>Florfliegenlarven</b> (biologische Gegenspieler)<br>• Neemöl in Veg' },
    { t: 'Echter Mehltau', txt: '<b>Pilz</b>, der sich als <b>abwischbarer, weißer mehliger Belag</b> auf der Blattoberseite zeigt.<br><br><b>Tritt auf bei:</b><br>• Starken Temperaturschwankungen <b>Tag/Nacht</b><br>• Mangelnder <b>Umluft</b> (stehende Luftschichten)<br>• Zu hoher Luftfeuchte bei zu warmer Temperatur<br><br><b>Wichtig:</b> Ist ein <b>systemischer Pilz</b> — dringt in die Pflanze ein. Abwischen reicht nicht.<br><br><b>Prävention & Behandlung:</b> Luftbewegung (Clip-Fans), Tag/Nacht-Differenz unter 8°C halten, bei Befall biologische Fungizide (Milchsäure, Bacillus-Präparate) in Veg. In der Blüte: befallene Blätter entfernen.' },
    { t: 'Wurzelfäule (Pythium)', txt: '<b>Pathogener Pilz</b>, der durch <b>Sauerstoffmangel im Wurzelbereich</b> (Staunässe) entsteht.<br><br><b>Symptome:</b><br>• Wurzeln verfärben sich <b>braun</b> (gesund = weiß)<br>• Werden <b>schleimig</b><br>• <b>Stinken modrig</b><br>• Oberirdisch: Pflanze welkt trotz nasser Erde<br><br><b>Ursachen:</b> Zu enges Gießintervall, zu großer Topf relativ zur Pflanze, schlechte Drainage, Wassertemperatur >22°C (weniger gelöster Sauerstoff).<br><br><b>Behandlung:</b> Substrat trocknen lassen, Enzyme einsetzen (zersetzen totes Wurzelmaterial), in schweren Fällen umtopfen in frisches Substrat.' },
    { t: 'Lichtbrand (Phototoxizität)', txt: '<b>PPFD übersteigt die Verarbeitungskapazität</b> der Pflanze.<br><br><b>Symptome:</b><br>• Obere Blätter und Blüten <b>bleichen aus</b> (weiß oder gelb)<br>• <b>Oft ohne Hitzesymptome</b> — das unterscheidet es von Hitzestress!<br>• Tritt direkt unter der Lampe auf, nicht im Rand<br><br><b>Ursache:</b> Moderne <b>hochintensive LEDs</b> bei zu geringem Abstand. Besonders in der Spätblüte wenn die Pflanze näher an die Lampe wächst.<br><br><b>Lösung:</b> Lampe <b>höher hängen</b> (10–15 cm) oder dimmen. Handtest: Hand auf Pflanzenhöhe, 30s — zu heiß oder zu hell? Mehr Abstand.' },
    { t: 'Hitzestress', txt: '<b>Ab ca. 30 °C</b> (ohne CO₂-Zusatz).<br><br><b>Klassisches Symptom:</b> Die <b>Blattränder rollen sich nach oben ein</b> — das sogenannte <i>"Taco-Blatt"</i>. Die Pflanze minimiert die Transpirationsfläche um Feuchtigkeitsverlust zu reduzieren.<br><br><b>Folgen:</b> Stomata schließen sich → CO₂-Aufnahme stoppt → Photosynthese stagniert → Wachstum stoppt.<br><br><b>Sofortmaßnahmen:</b><br>• <b>Abluft erhöhen</b><br>• Lampen-Abstand vergrößern<br>• Ggf. temporär auf Nacht-Zyklus umstellen (Licht aus wenn es tagsüber zu warm ist)<br>• Verdunstungskühlung (feuchter Boden im Zelt-Aufstellraum)' },
    { t: 'Kältestress', txt: '<b>Temperaturen unter 18 °C</b> verlangsamen den Stoffwechsel massiv.<br><br><b>Typisches Problem:</b> <b>Temperaturbedingter Phosphor-Lockout</b> — die Pflanze kann P nicht mehr aufnehmen.<br><br><b>Symptome:</b><br>• <b>Violette oder rote Stängel und Blätter</b><br>• Langsames Wachstum<br>• Hängen der Blätter<br><br><b>⚠ Wichtige Unterscheidung:</b> Rote Blätter <b>am Ende der Blüte</b> können <b>genetisch gewollt</b> sein (Anthocyan-Aktivierung bei kühlen Nächten). In der <b>Veg-Phase</b> sind sie <b>fast immer ein Warnsignal</b>.<br><br><b>Lösung:</b> Heizung (Heizmatte, Raumheizung). Besonders kritisch in der Nacht-Phase im Winter.' },
    { t: 'Schimmel (Botrytis)', txt: 'Botrytis (Grauschimmel) in dichten Buds. Vorbeugung: gute Luftzirkulation, RLF unter 60% in der Blüte. Befallene Stellen sofort entfernen — Pilz-Sporen verbreiten sich schnell.' },
  ]},

/** Open Lexikon and auto-expand a specific entry by title */
function openLexikonEntry(title) {

function renderLexikon(highlightTitle) {
  document.getElementById('lexikon-body').innerHTML = LEXIKON.map(cat => `
    <div style="margin-bottom:4px">
      <div class="sect-head" style="font-size:12px;padding:6px 0">${cat.cat}</div>
      ${cat.items.map(item => {
        const isHL = highlightTitle && item.t === highlightTitle;
        return `
        <div id="lex-${item.t.replace(/[^a-zA-Z]/g,'')}" style="background:${isHL ? 'var(--green-bg)' : 'var(--card)'};border:0.5px solid ${isHL ? 'var(--green-dk)' : 'var(--border)'};border-radius:10px;overflow:hidden;margin-bottom:6px;${isHL ? 'scroll-margin-top:80px' : ''}">
          <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.ltgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'" 
            style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px">
            <div style="flex:1;font-size:13px;font-weight:${isHL ? '700' : '500'};color:${isHL ? 'var(--green)' : 'var(--text)'}">${item.t}</div>
            <span class="ltgl" style="color:var(--text-muted);font-size:14px">${isHL ? '▾' : '▸'}</span>
          </div>
          <div style="display:${isHL ? 'block' : 'none'};padding:0 14px 12px">
            <div style="font-size:12px;color:var(--text-sub);line-height:1.7">${item.txt}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('') + '<div style="height:20px"></div>';

  // Auto-scroll to highlighted entry
  if (highlightTitle) {
    setTimeout(() => {
      const el = document.getElementById('lex-' + highlightTitle.replace(/[^a-zA-Z]/g, ''));
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}

/**
 * Normalize a string for search matching.
 * Lowercase, strip HTML, replace German umlauts so "düngen"/"duengen"/"DÜNGEN" all match.

// =====================================================================
//  CHARTS: Zeitreihen-Visualisierung pro Zyklus (v0.8.89)
//  Eigene SVG-Implementierung, kein externes Chart-Library nötig.
// =====================================================================

/**
 * Collect a time-series of a specific metric from a cycle's entries.
 * Returns an array of {day, iso, val, phase} sorted by day.
 * Skips days without the metric set (or where value is empty/NaN).
 */
function collectMetric(cycleId, field, subfield) {
  const cyc = S.cycles.find(c => c.id === cycleId);
  if (!cyc || !cyc.startDate) return [];
  const points = [];
  Object.keys(S.entries || {}).forEach(iso => {
    const e = S.entries[iso];
    if (!e) return;
    let val;
    if (subfield) {
      // cycleData field (e.g. 'ph', 'ec', 'water')
      val = e.cycleData && e.cycleData[cycleId] && e.cycleData[cycleId][subfield];
    } else {
      // top-level (e.g. 'temp', 'humidity')
      val = e[field];
    }
    const num = parseFloat(val);
    if (isNaN(num)) return;
    const day = isoDiff(iso, cyc.startDate);
    if (day < 0) return;
    const ph = phase(iso, cyc);
    points.push({ day, iso, val: num, phase: ph ? ph.ph : null });
  });
  points.sort((a, b) => a.day - b.day);
  return points;
}

/**
 * Collect VPD time-series. VPD is computed from temp + humidity on each day
 * that has both values.
 */
function collectVPDSeries(cycleId) {
  const cyc = S.cycles.find(c => c.id === cycleId);
  if (!cyc || !cyc.startDate) return [];
  const points = [];
  Object.keys(S.entries || {}).forEach(iso => {
    const e = S.entries[iso];
    if (!e) return;
    const t = parseFloat(e.temp);
    const r = parseFloat(e.humidity);
    if (isNaN(t) || isNaN(r)) return;
    const v = calcVPD(t, r);
    if (v === null) return;
    const day = isoDiff(iso, cyc.startDate);
    if (day < 0) return;
    const ph = phase(iso, cyc);
    points.push({ day, iso, val: v, phase: ph ? ph.ph : null });
  });
  points.sort((a, b) => a.day - b.day);
  return points;
}

/**
 * Build an SVG line or bar chart for a time-series.
 *
 * config: {
 *   title: string,
 *   unit: string,               // e.g. 'pH', 'mS/cm', 'kPa', 'L'
 *   min: number, max: number,   // Y-axis range
 *   zones: [{from, to, color, label}]  // optional background zones
 *   type: 'line' | 'bar',
 *   chartId: string             // unique DOM id for tooltip targeting
 * }
 */
function buildChart(points, totalDays, config) {
  const W = 320, H = 140;
  const padL = 32, padR = 10, padT = 10, padB = 22;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  // Map data coords to SVG coords
  const xMax = Math.max(totalDays || 1, 1);
  const xAt = (day) => padL + (day / xMax) * innerW;
  const yAt = (v) => padT + innerH - ((v - config.min) / (config.max - config.min)) * innerH;

  // Zones as background rects
  const zoneHTML = (config.zones || []).map(z => {
    const y1 = yAt(z.to);
    const y2 = yAt(z.from);
    const h = y2 - y1;
    return `<rect x="${padL}" y="${y1}" width="${innerW}" height="${h}" fill="${z.color}" opacity="0.12"/>`;
  }).join('');

  // Y-axis grid + labels (4 lines)
  const ySteps = 4;
  let gridHTML = '';
  for (let i = 0; i <= ySteps; i++) {
    const v = config.min + (config.max - config.min) * (i / ySteps);
    const y = yAt(v);
    gridHTML += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#2a3b2a" stroke-width="0.5" opacity="0.5"/>`;
    gridHTML += `<text x="${padL - 4}" y="${y + 3}" font-size="9" text-anchor="end" fill="#8a9a8a" font-family="monospace">${v.toFixed(config.decimals ?? 1)}</text>`;
  }

  // X-axis labels (every ~20% of width)
  let xLabelHTML = '';
  const xLabelSteps = 4;
  for (let i = 0; i <= xLabelSteps; i++) {
    const day = Math.round((xMax * i) / xLabelSteps);
    const x = xAt(day);
    xLabelHTML += `<text x="${x}" y="${H - 6}" font-size="9" text-anchor="middle" fill="#8a9a8a" font-family="monospace">T${day}</text>`;
  }

  // Data rendering
  let dataHTML = '';
  if (points.length === 0) {
    dataHTML = `<text x="${W/2}" y="${H/2}" font-size="11" text-anchor="middle" fill="#5a6a5a" font-family="system-ui">Noch keine Daten</text>`;
  } else if (config.type === 'bar') {
    // Bar chart (for water amounts)
    const barWidth = Math.max(2, innerW / xMax * 0.6);
    dataHTML = points.map((p, i) => {
      const x = xAt(p.day);
      const y = yAt(p.val);
      const h = yAt(config.min) - y;
      return `<rect class="chart-bar-${config.chartId}" data-idx="${i}" x="${x - barWidth/2}" y="${y}" width="${barWidth}" height="${h}" fill="#4CAF70" opacity="0.75" onclick="showChartTooltip('${config.chartId}', ${i}, event)" style="cursor:pointer"/>`;
    }).join('');
  } else {
    // Line chart
    if (points.length > 1) {
      const pathD = points.map((p, i) => {
        const cmd = i === 0 ? 'M' : 'L';
        return `${cmd}${xAt(p.day).toFixed(1)},${yAt(p.val).toFixed(1)}`;
      }).join(' ');
      dataHTML += `<path d="${pathD}" fill="none" stroke="#4CAF70" stroke-width="1.5"/>`;
    }
    dataHTML += points.map((p, i) => {
      return `<circle class="chart-pt-${config.chartId}" data-idx="${i}" cx="${xAt(p.day).toFixed(1)}" cy="${yAt(p.val).toFixed(1)}" r="5" fill="#4CAF70" stroke="#0a1a0a" stroke-width="1.5" onclick="showChartTooltip('${config.chartId}', ${i}, event)" style="cursor:pointer"/>`;
    }).join('');
  }

  // Tooltip container (absolute positioned inside wrapper)
  const pointsJSON = JSON.stringify(points).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
  return `
    <div style="position:relative" data-chart-points="${pointsJSON}" data-chart-unit="${config.unit || ''}" id="chart-wrap-${config.chartId}">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">
        ${zoneHTML}
        ${gridHTML}
        ${xLabelHTML}
        ${dataHTML}
      </svg>
      <div id="chart-tt-${config.chartId}" style="display:none;position:absolute;background:#0a1a0a;border:1px solid #4CAF70;border-radius:6px;padding:6px 8px;font-size:11px;color:#e0f0e0;pointer-events:none;white-space:nowrap;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>
    </div>
  `;
}

/**
 * Show tooltip for a chart point. Called from onclick on circle/rect elements.
 */
function showChartTooltip(chartId, idx, ev) {
  ev.stopPropagation();
  const wrap = document.getElementById('chart-wrap-' + chartId);
  const tt = document.getElementById('chart-tt-' + chartId);
  if (!wrap || !tt) return;
  const rawPoints = wrap.getAttribute('data-chart-points');
  const unit = wrap.getAttribute('data-chart-unit') || '';
  let points;
  try {
    points = JSON.parse(rawPoints.replace(/&#39;/g, "'").replace(/&quot;/g, '"'));
  } catch (_) { return; }
  const p = points[idx];
  if (!p) return;

  // Phase labels
  const phaseLabels = { anzucht: 'Anzucht', bloom: 'Blüte', flush: 'Spülen', ice: 'Ice', harvest: 'Ernte', dry: 'Trocknung' };
  const phLabel = p.phase ? phaseLabels[p.phase] || p.phase : '';

  tt.innerHTML = `
    <div style="font-weight:600;color:#4CAF70">${fmtDE(p.iso, { day: '2-digit', month: '2-digit', year: 'numeric' })}</div>
    <div style="color:#b0c0b0;font-size:10px;margin-top:2px">Tag ${p.day + 1}${phLabel ? ' · ' + phLabel : ''}</div>
    <div style="margin-top:3px;font-family:monospace;font-size:13px"><b>${p.val.toFixed(2)}</b> ${unit}</div>
  `;

  // Position tooltip near click point, clamped to wrapper bounds
  const wrapRect = wrap.getBoundingClientRect();
  let left = ev.clientX - wrapRect.left + 8;
  let top = ev.clientY - wrapRect.top - 10;
  tt.style.display = 'block';
  // Clamp after rendering so we have dimensions
  const ttRect = tt.getBoundingClientRect();
  if (left + ttRect.width > wrapRect.width - 4) left = wrapRect.width - ttRect.width - 4;
  if (left < 4) left = 4;
  if (top + ttRect.height > wrapRect.height - 4) top = wrapRect.height - ttRect.height - 4;
  if (top < 0) top = 4;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

/**
 * Hide all chart tooltips (called when clicking outside).
 */
function hideChartTooltips() {
  document.querySelectorAll('[id^="chart-tt-"]').forEach(tt => { tt.style.display = 'none'; });
}
// Set up global click-outside handler
document.addEventListener('click', (e) => {
  if (!e.target.closest('[id^="chart-wrap-"]')) hideChartTooltips();
});

/**
 * Build the complete charts section for a cycle.
 * Returns HTML string with all 4 charts or a "not enough data" notice.
 */
function buildChartsSection(cycleId) {
  const cyc = S.cycles.find(c => c.id === cycleId);
  if (!cyc || !cyc.startDate) return '';

  const phData = collectMetric(cycleId, null, 'ph');
  const ecData = collectMetric(cycleId, null, 'ec');
  const waterData = collectMetric(cycleId, null, 'water');
  const vpdData = collectVPDSeries(cycleId);

  const minPoints = 3;
  const total = Math.max(phData.length, ecData.length, waterData.length, vpdData.length);
  if (total < minPoints) {
    return `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:4px">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">📈 Verlauf & Charts</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.5">Noch nicht genug Daten. Ab <b>${minPoints} Einträgen</b> mit Werten (pH, EC, Temperatur, Luftfeuchte oder Wasser) siehst du hier die Verläufe.</div>
    </div>`;
  }

  // Figure out cycle total days (up to end of dry phase)
  const a = cyc.anzuchtDays || PHASE_DEFAULTS.anzuchtDays;
  const b = a + (cyc.bloomDays || PHASE_DEFAULTS.bloomDays);
  const f = b + (cyc.flushDays || PHASE_DEFAULTS.flushDays);
  const ic = f + (cyc.iceDays || PHASE_DEFAULTS.iceDays);
  const h = ic + (cyc.harvestDays || PHASE_DEFAULTS.harvestDays);
  const dr = h + (cyc.dryDays || PHASE_DEFAULTS.dryDays);

  // Chart configs
  const phChart = buildChart(phData, dr, {
    title: 'pH-Verlauf', unit: 'pH', min: 5.0, max: 7.5, decimals: 1,
    zones: [{ from: 6.2, to: 6.4, color: '#4CAF70' }],
    type: 'line', chartId: 'ph-' + cycleId,
  });
  const ecChart = buildChart(ecData, dr, {
    title: 'EC-Verlauf', unit: 'mS/cm', min: 0, max: 3.0, decimals: 1,
    zones: [{ from: 1.2, to: 2.2, color: '#4CAF70' }],
    type: 'line', chartId: 'ec-' + cycleId,
  });
  const vpdChart = buildChart(vpdData, dr, {
    title: 'VPD-Verlauf', unit: 'kPa', min: 0, max: 2.0, decimals: 2,
    zones: [{ from: 0.8, to: 1.2, color: '#4CAF70' }],
    type: 'line', chartId: 'vpd-' + cycleId,
  });
  const waterMax = Math.max(5, ...waterData.map(p => p.val)) * 1.1;
  const waterChart = buildChart(waterData, dr, {
    title: 'Wassermenge', unit: 'L', min: 0, max: waterMax, decimals: 1,
    type: 'bar', chartId: 'water-' + cycleId,
  });

  // Layout — each chart is independently collapsible, all start collapsed
  return `
    <div class="sect-head" style="margin-top:4px">📈 Verlauf & Charts</div>
    ${_chartBlock('📊 pH-Verlauf', phData.length, 'Grüner Bereich: 6.2–6.4 (Erde, ideal) · tipp auf Punkt für Details', phChart)}
    ${_chartBlock('📊 EC-Verlauf', ecData.length, 'Grüner Bereich: 1.2–2.2 mS/cm (typisch Vegi→Blüte)', ecChart)}
    ${_chartBlock('📊 VPD-Verlauf', vpdData.length, 'Grüner Bereich: 0.8–1.2 kPa (Blüte optimal) · Cup-Niveau Spätblüte: gezielt 1.4–1.6 für Trichom-Boost · aus Temp + Luftfeuchte berechnet', vpdChart)}
    ${_chartBlock('📊 Wassermenge', waterData.length, 'Bar = Liter pro Gießtag', waterChart)}
  `;
}

function _chartBlock(label, count, legend, chartHTML) {
  // Each chart is its own collapsible accordion block, starts closed.
  return `
    <div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">
      <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.ctgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'"

function _normSearch(s) {
  if (!s) return '';
  return String(s)
    .replace(/<[^>]+>/g, ' ')
    .toLowerCase()
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/\s+/g, ' ')
    .trim();
}

function _escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/**
 * Highlight all case-insensitive occurrences of `query` in `html`, without breaking tags.
 */
function _highlightMatches(html, query) {
  if (!query) return html;
  const parts = html.split(/(<[^>]+>)/g);
  return parts.map(p => {
    if (p.startsWith('<')) return p;
    const re = new RegExp(_escRegex(query), 'gi');
    return p.replace(re, m => `<mark style="background:rgba(240,208,80,0.35);color:var(--text);padding:1px 2px;border-radius:3px">${m}</mark>`);
  }).join('');
}

/** Build the info box + filtered chapters HTML (no search field, no tours) */
function _buildHowtoResults(query) {
  const totalEntries = HOWTO.reduce((sum, cat) => sum + cat.items.length, 0);
  const normQuery = _normSearch(query);

  let matchedCats = HOWTO;
  let matchCount = totalEntries;
  if (normQuery) {
    matchedCats = HOWTO.map(cat => ({
      cat: cat.cat,
      items: cat.items.filter(item => {
        const hay = _normSearch(item.t + ' ' + item.txt + ' ' + cat.cat);
        return hay.includes(normQuery);
      })
    })).filter(cat => cat.items.length > 0);
    matchCount = matchedCats.reduce((s, c) => s + c.items.length, 0);
  }

  const infoBox = normQuery
    ? `<div style="padding:12px 14px;background:var(--card);border:0.5px solid var(--green-dk);border-radius:12px;margin-bottom:10px">
         <div style="font-size:12px;color:var(--green);font-weight:600">🔍 ${matchCount} ${matchCount === 1 ? 'Treffer' : 'Treffer'} für „${query.replace(/</g, '&lt;')}"</div>
         ${matchCount === 0 ? '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;line-height:1.5">Nichts gefunden. Probier: <i>wasser, pH, düngen, ernte, trocknen, spülen, trichome, lexikon</i></div>' : ''}
       </div>`
    : `<div style="padding:14px 16px;background:linear-gradient(135deg, rgba(90,171,240,0.08), rgba(176,106,200,0.05));border:0.5px solid rgba(90,171,240,0.25);border-radius:14px;margin-bottom:10px">
         <div style="font-size:14px;font-weight:700;color:var(--blue);margin-bottom:4px">📖 Anleitung zum Nachlesen</div>
         <div style="font-size:12px;color:var(--text-sub);line-height:1.6">${HOWTO.length} Kapitel · ${totalEntries} Einträge. Tipp auf eine Überschrift um den Text auf- oder zuzuklappen, oder benutz die Suche oben. Weiter unten findest du auch interaktive Touren.</div>
       </div>`;

  const entriesOpen = !!normQuery;
  const bodyDisplay = entriesOpen ? 'block' : 'none';
  const toggleIcon = entriesOpen ? '▾' : '▸';

  const chapters = matchedCats.map(cat => `
    <div style="margin-bottom:4px">
      <div class="sect-head" style="font-size:12px;padding:10px 0 6px">${cat.cat}</div>
      ${cat.items.map(item => {
        const titleHTML = _highlightMatches(item.t, query);
        const bodyHTML = _highlightMatches(item.txt, query);
        return `<div style="background:var(--card);border:0.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px">
          <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.htgl').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'"
            style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px">
            <div style="flex:1;font-size:13px;font-weight:500;color:var(--text)">${titleHTML}</div>
            <span class="htgl" style="color:var(--text-muted);font-size:14px">${toggleIcon}</span>
          </div>
          <div style="display:${bodyDisplay};padding:0 14px 12px">
            <div style="font-size:12px;color:var(--text-sub);line-height:1.7">${bodyHTML}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');

  return infoBox + chapters;
}

function openGallery() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-gallery').classList.add('active');
  renderGallery();
}

function renderGallery() {
  const act = S.cycles;
  const allPhotos = [];
  Object.keys(S.entries).sort().forEach(d => {
    const e = S.entries[d];
    if (!e?.cycleData) return;
    Object.keys(e.cycleData).forEach(cId => {
      const cd = e.cycleData[cId];
      const c = S.cycles.find(x => x.id === cId);
      if (cd?.photos?.length) {
        cd.photos.forEach(src => {
          allPhotos.push({ date: d, cId, name: c?.name || '–', src });
        });
      }
    });
  });

  if (allPhotos.length === 0) {
    document.getElementById('gallery-body').innerHTML = `
      <div class="empty-state"><div style="font-size:40px;opacity:0.3">📷</div>
      <div style="font-size:13px;color:var(--text-muted)">Noch keine Fotos.</div></div>`;
    return;
  }

  // Group by month
  const months = {};
  allPhotos.forEach(p => {
    const key = p.date.substring(0, 7);
    if (!months[key]) months[key] = [];
    months[key].push(p);
  });

  document.getElementById('gallery-body').innerHTML = Object.entries(months).reverse().map(([key, photos]) => {
    const [y, m] = key.split('-');
    return `<div>
      <div class="sect-head">${MN[parseInt(m)-1]} ${y} · ${photos.length} Fotos</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        ${photos.map(p => {
          // Find the photo's index in its cycle's daily array to enable delete
          const cd = S.entries[p.date]?.cycleData?.[p.cId];
          const idx = cd?.photos ? cd.photos.indexOf(p.src) : -1;
          return `<div class="photo-wrap" style="width:72px;height:72px">
            <img src="${p.src}" style="width:72px;height:72px;border-radius:8px;object-fit:cover;cursor:pointer;border:0.5px solid var(--border);display:block" onclick="viewPhoto(this.src)"/>
            <div style="position:absolute;bottom:2px;left:2px;font-size:8px;color:#fff;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:4px;pointer-events:none">${fmtDE(p.date)}</div>
            ${idx >= 0 ? `<button class="photo-del" onclick="delPhotoFromGallery('${p.cId}','${p.date}',${idx})" title="Foto löschen">×</button>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('') + '<div style="height:20px"></div>';
}
